<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Электроника: лаборатория цепи</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --text: #eef0f6; --muted: #8b8fa3;
    --accent: #5b8cff; --good: #2fbf71; --bad: #ef5350; --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  h1 { font-size: 1.15rem; margin: 14px 0 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; }
  canvas { width: 100%; height: auto; display: block; border-radius: 10px; background: #05060a; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .presets button {
    flex: 1 1 auto; min-width: 120px; background: #232838; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: .82rem; cursor: pointer;
  }
  .presets button.active { border-color: var(--accent); background: rgba(91,140,255,0.15); }
  .controls { margin-top: 14px; }
  .control-row { margin-bottom: 14px; }
  .control-row label { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: 6px; }
  .control-row .val { color: var(--accent); font-weight: 600; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .stats { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .stat { flex: 1 1 auto; background: #171a24; border-radius: 10px; padding: 8px 12px; min-width: 110px; }
  .stat .label { font-size: .72rem; color: var(--muted); }
  .stat .value { font-size: 1.05rem; font-weight: 700; }
  .reset-btn {
    margin-top: 12px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    background: #232838; color: var(--text); font-size: .9rem; cursor: pointer;
  }
  .explain { margin-top: 10px; font-size: .85rem; color: #c7cadb; line-height: 1.5; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80; --border: #e3e5ee; }
    .presets button, .stat, .reset-btn { background: #f7f8fc; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="../tests/electronics.html">&larr; Тест по теме</a>
    <a class="back" href="../index.html">Все тесты</a>
  </div>
  <h1>Лаборатория: электрическая цепь</h1>
  <div class="subtitle">Батарея, провод и лампочка. Меняйте напряжение, качество контакта и внутреннее сопротивление источника — смотрите, как это отражается на цепи.</div>

  <div class="card">
    <canvas id="scene" width="640" height="320"></canvas>
    <div class="stats">
      <div class="stat"><div class="label">Ток в цепи</div><div class="value" id="statI">—</div></div>
      <div class="stat"><div class="label">Мощность лампы</div><div class="value" id="statP">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="presets" id="presets"></div>
  </div>

  <div class="card controls">
    <div class="control-row">
      <label>Напряжение источника U <span class="val" id="uVal">12 В</span></label>
      <input type="range" id="uSlider" min="3" max="30" step="0.5" value="12">
    </div>
    <div class="control-row">
      <label>Сопротивление контакта Rj <span class="val" id="rjVal">1 Ом</span></label>
      <input type="range" id="rjSlider" min="0.05" max="40" step="0.05" value="1">
    </div>
    <div class="control-row">
      <label>Внутреннее сопротивление батареи r <span class="val" id="rVal">0.3 Ом</span></label>
      <input type="range" id="rSlider" min="0.05" max="8" step="0.05" value="0.3">
    </div>
    <button class="reset-btn" id="restartBtn">Сбросить (погасить искры, вернуть лампу)</button>
    <div class="explain" id="explainText"></div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const uSlider = document.getElementById("uSlider");
  const rjSlider = document.getElementById("rjSlider");
  const rSlider = document.getElementById("rSlider");
  const uVal = document.getElementById("uVal");
  const rjVal = document.getElementById("rjVal");
  const rVal = document.getElementById("rVal");
  const statI = document.getElementById("statI");
  const statP = document.getElementById("statP");
  const explainText = document.getElementById("explainText");
  const presetsEl = document.getElementById("presets");

  const R_BULB = 4;
  const R_SHORT = 0.05;
  let shorted = false;
  let burnt = false;
  let sparkParticles = [];
  let frame = 0;

  function getParams() {
    return { U: parseFloat(uSlider.value), Rj: parseFloat(rjSlider.value), r: parseFloat(rSlider.value) };
  }

  function compute() {
    const { U, Rj, r } = getParams();
    if (shorted) {
      const Rpar = (R_BULB * R_SHORT) / (R_BULB + R_SHORT);
      const Itotal = U / (r + Rj + Rpar);
      const Ibulb = Itotal * Rpar / R_BULB;
      const Ishort = Itotal * Rpar / R_SHORT;
      return { I: Itotal, Pbulb: Ibulb * Ibulb * R_BULB, Pjunction: Itotal * Itotal * Rj, Pshort: Ishort * Ishort * R_SHORT };
    }
    const I = U / (r + Rj + R_BULB);
    return { I, Pbulb: I * I * R_BULB, Pjunction: I * I * Rj, Pshort: 0 };
  }

  function updateLabels() {
    uVal.textContent = uSlider.value + " В";
    rjVal.textContent = rjSlider.value + " Ом";
    rVal.textContent = rSlider.value + " Ом";
  }

  function resetFault() {
    shorted = false;
    burnt = false;
    sparkParticles = [];
  }

  function junctionColor(p) {
    if (p < 2) return "#3a3f52";
    if (p < 5) return "#e0c341";
    if (p < 9) return "#e0793f";
    return "#ffffff";
  }

  function step() {
    frame++;
    const res = compute();
    if (!burnt && res.Pbulb > 40) {
      burnt = true;
    }
    const hotP = shorted ? res.Pshort : res.Pjunction;
    if (hotP > 9 && frame % 2 === 0) {
      sparkParticles.push({
        x: 320 + (Math.random() - 0.5) * 20,
        y: 90 + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 3,
        vy: -Math.random() * 2 - 1,
        life: 20
      });
    }
    sparkParticles.forEach(s => { s.x += s.vx; s.y += s.vy; s.life--; });
    sparkParticles = sparkParticles.filter(s => s.life > 0);
  }

  function drawWire(x1, y1, x2, y2, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width || 4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function render() {
    const res = compute();
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, W, H);

    const wireColor = "#7d8299";
    // battery
    ctx.fillStyle = "#3a3f52";
    ctx.fillRect(70, 130, 30, 60);
    ctx.fillStyle = "#e0c341";
    ctx.font = "16px sans-serif";
    ctx.fillText("+", 78, 150);
    ctx.fillStyle = "#8b8fa3";
    ctx.fillText("−", 78, 182);

    // wires: top from battery to junction to bulb, bottom returns
    drawWire(85, 130, 85, 90, wireColor);
    drawWire(85, 90, 260, 90, wireColor);
    const jColor = junctionColor(shorted ? res.Pshort : res.Pjunction);
    drawWire(260, 90, 380, 90, jColor, 6);
    drawWire(380, 90, 480, 90, wireColor);
    drawWire(480, 90, 480, 150, wireColor);

    drawWire(85, 190, 85, 230, wireColor);
    drawWire(85, 230, 480, 230, wireColor);
    drawWire(480, 230, 480, 210, wireColor);

    // junction resistor zigzag
    ctx.strokeStyle = jColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(260, 90);
    for (let i = 0; i < 6; i++) {
      ctx.lineTo(270 + i * 10, 90 + (i % 2 === 0 ? -10 : 10));
    }
    ctx.lineTo(380, 90);
    ctx.stroke();

    // short-circuit bypass wire
    if (shorted) {
      ctx.strokeStyle = "#ff5252";
      ctx.lineWidth = 5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(480, 150);
      ctx.lineTo(520, 150);
      ctx.lineTo(520, 210);
      ctx.lineTo(480, 210);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // sparks
    sparkParticles.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,220,120," + (s.life / 20) + ")";
      ctx.fill();
    });

    // bulb
    const cx = 480, cy = 180, radius = 30;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    if (burnt) {
      ctx.fillStyle = "#2a2e3d";
      ctx.fill();
      ctx.strokeStyle = "#555";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#8b8fa3";
      ctx.font = "12px sans-serif";
      ctx.fillText("перегорела", cx - 28, cy + 50);
    } else {
      const bulbP = shorted ? res.Pbulb : res.Pbulb;
      const intensity = Math.min(1, bulbP / 20);
      const glowR = radius + intensity * 25;
      const grad = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, glowR);
      grad.addColorStop(0, `rgba(255,240,180,${0.9 * intensity + 0.1})`);
      grad.addColorStop(1, "rgba(255,240,180,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,${200 + Math.round(intensity * 55)},${120 + Math.round(intensity * 135)},${0.25 + intensity * 0.6})`;
      ctx.fill();
      ctx.strokeStyle = "rgba(200,210,230,0.6)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    statI.textContent = res.I.toFixed(2) + " А";
    statP.textContent = (burnt ? 0 : res.Pbulb).toFixed(1) + " Вт";
  }

  function loop() { step(); render(); }

  const PRESETS = [
    { name: "Нормальная работа", U: 12, Rj: 1, r: 0.3, shorted: false, explain: "Исправная цепь: лампа горит ровно и ярко." },
    { name: "Плохой контакт", U: 12, Rj: 20, r: 0.3, shorted: false, explain: "Высокое сопротивление в месте соединения — лампа тускнеет, а сам узел заметно греется." },
    { name: "Короткое замыкание", U: 12, Rj: 1, r: 0.2, shorted: true, explain: "Провод замкнул лампу в обход — почти весь ток идёт через шунт, провод искрит, лампа гаснет (напряжение на ней падает почти до нуля)." },
    { name: "Перегрузка (лампа сгорает)", U: 24, Rj: 0.5, r: 0.1, shorted: false, explain: "Слишком высокое напряжение источника — через лампу течёт ток, на порядок превышающий номинал, и она перегорает." },
    { name: "Слабая батарейка", U: 12, Rj: 1, r: 5, shorted: false, explain: "Большое внутреннее сопротивление источника 'съедает' напряжение под нагрузкой — лампа заметно тусклее, хотя внешняя цепь та же." }
  ];

  function applyPreset(p) {
    uSlider.value = p.U;
    rjSlider.value = p.Rj;
    rSlider.value = p.r;
    updateLabels();
    resetFault();
    shorted = p.shorted;
    explainText.textContent = p.explain;
    document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
    const btn = document.querySelector('.presets button[data-name="' + p.name + '"]');
    if (btn) btn.classList.add("active");
  }

  PRESETS.forEach(p => {
    const btn = document.createElement("button");
    btn.textContent = p.name;
    btn.dataset.name = p.name;
    btn.addEventListener("click", () => applyPreset(p));
    presetsEl.appendChild(btn);
  });

  [uSlider, rjSlider, rSlider].forEach(s => {
    s.addEventListener("input", () => {
      updateLabels();
      document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
    });
  });
  document.getElementById("restartBtn").addEventListener("click", resetFault);

  updateLabels();
  applyPreset(PRESETS[0]);
  setInterval(loop, 16);
})();
</script>
</body>
</html>
