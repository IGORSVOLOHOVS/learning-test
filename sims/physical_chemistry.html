<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Физическая химия: лаборатория реакции</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --text: #eef0f6; --muted: #8b8fa3;
    --accent: #5b8cff; --good: #2fbf71; --bad: #ef5350; --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  h1 { font-size: 1.15rem; margin: 14px 0 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; }
  canvas { width: 100%; height: auto; display: block; border-radius: 10px; background: #05060a; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .presets button {
    flex: 1 1 auto; min-width: 120px; background: #232838; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: .82rem; cursor: pointer;
  }
  .presets button:active { transform: scale(0.98); }
  .presets button.active { border-color: var(--accent); background: rgba(91,140,255,0.15); }
  .controls { margin-top: 14px; }
  .control-row { margin-bottom: 14px; }
  .control-row label { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: 6px; }
  .control-row .val { color: var(--accent); font-weight: 600; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .stats { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .stat { flex: 1 1 auto; background: #171a24; border-radius: 10px; padding: 8px 12px; min-width: 120px; }
  .stat .label { font-size: .72rem; color: var(--muted); }
  .stat .value { font-size: 1.05rem; font-weight: 700; }
  .reset-btn {
    margin-top: 12px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    background: #232838; color: var(--text); font-size: .9rem; cursor: pointer;
  }
  .explain { margin-top: 10px; font-size: .85rem; color: #c7cadb; line-height: 1.5; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80; --border: #e3e5ee; }
    .presets button, .stat, .reset-btn { background: #f7f8fc; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="../tests/physical_chemistry.html">&larr; Тест по теме</a>
    <a class="back" href="../index.html">Все тесты</a>
  </div>
  <h1>Лаборатория: скорость химической реакции</h1>
  <div class="subtitle">Молекулы в колбе меняют цвет (реагент → продукт) со скоростью, заданной уравнением Аррениуса. Меняйте температуру и энергию активации и наблюдайте.</div>

  <div class="card">
    <canvas id="scene" width="640" height="320"></canvas>
    <div class="stats">
      <div class="stat"><div class="label">Превращено в продукт</div><div class="value" id="statPct">0%</div></div>
      <div class="stat"><div class="label">Условная k (скорость)</div><div class="value" id="statK">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="presets" id="presets"></div>
  </div>

  <div class="card controls">
    <div class="control-row">
      <label>Температура T <span class="val" id="tVal">300 K</span></label>
      <input type="range" id="tSlider" min="100" max="1000" step="10" value="300">
    </div>
    <div class="control-row">
      <label>Энергия активации Ea <span class="val" id="eaVal">45 кДж/моль</span></label>
      <input type="range" id="eaSlider" min="10" max="150" step="1" value="45">
    </div>
    <button class="reset-btn" id="restartBtn">Перезапустить симуляцию</button>
    <div class="explain" id="explainText"></div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const tSlider = document.getElementById("tSlider");
  const eaSlider = document.getElementById("eaSlider");
  const tVal = document.getElementById("tVal");
  const eaVal = document.getElementById("eaVal");
  const statPct = document.getElementById("statPct");
  const statK = document.getElementById("statK");
  const explainText = document.getElementById("explainText");
  const presetsEl = document.getElementById("presets");

  const R = 8.314;
  const N_MOLECULES = 44;
  const FLASK = { left: 120, right: W - 120, top: 90, bottom: H - 20, neckW: 60 };

  let molecules = [];
  let bubbles = [];
  let frame = 0;

  function initMolecules() {
    molecules = [];
    for (let i = 0; i < N_MOLECULES; i++) {
      molecules.push({
        x: FLASK.left + 10 + Math.random() * (FLASK.right - FLASK.left - 20),
        y: FLASK.top + 40 + Math.random() * (FLASK.bottom - FLASK.top - 50),
        vx: (Math.random() - 0.5),
        vy: (Math.random() - 0.5),
        reacted: false,
        flash: 0
      });
    }
    bubbles = [];
    frame = 0;
  }

  function getParams() {
    return { T: parseFloat(tSlider.value), Ea: parseFloat(eaSlider.value) };
  }

  function computeRate() {
    const { T, Ea } = getParams();
    const rawExponent = -(Ea * 1000) / (R * T);
    const squashed = 1 / (1 + Math.exp(-(rawExponent + 15) / 3));
    const kDisplay = 1e13 * Math.exp(rawExponent);
    return { squashed, kDisplay, rawExponent };
  }

  function formatK(k) {
    if (k < 1e-6) return "≈ 0 (реакция не идёт)";
    const exp = Math.floor(Math.log10(k));
    const mant = k / Math.pow(10, exp);
    return mant.toFixed(2) + "×10" + toSuperscript(exp) + " с⁻¹";
  }
  function toSuperscript(n) {
    const map = { "-": "⁻", "0": "⁰", "1": "¹", "2": "²", "3": "³", "4": "⁴", "5": "⁵", "6": "⁶", "7": "⁷", "8": "⁸", "9": "⁹" };
    return String(n).split("").map(c => map[c] || c).join("");
  }

  function bgColorForT(T) {
    const f = Math.min(1, Math.max(0, (T - 100) / 900));
    const r = Math.round(20 + f * 120);
    const g = Math.round(30 + (1 - Math.abs(f - 0.5) * 2) * 40);
    const b = Math.round(140 - f * 110);
    return `rgb(${r},${g},${b})`;
  }

  function drawFlask() {
    ctx.strokeStyle = "rgba(200,210,230,0.5)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W / 2 - FLASK.neckW / 2, 20);
    ctx.lineTo(W / 2 - FLASK.neckW / 2, FLASK.top);
    ctx.lineTo(FLASK.left, FLASK.top + 20);
    ctx.quadraticCurveTo(FLASK.left - 10, FLASK.bottom, FLASK.left + 20, FLASK.bottom);
    ctx.lineTo(FLASK.right - 20, FLASK.bottom);
    ctx.quadraticCurveTo(FLASK.right + 10, FLASK.bottom, FLASK.right, FLASK.top + 20);
    ctx.lineTo(W / 2 + FLASK.neckW / 2, FLASK.top);
    ctx.lineTo(W / 2 + FLASK.neckW / 2, 20);
    ctx.stroke();
  }

  function step() {
    frame++;
    const { T } = getParams();
    const { squashed } = computeRate();
    const jitter = 0.3 + Math.min(1, (T - 100) / 900) * 2.8;
    const isBoiling = squashed > 0.55 && T > 500;

    for (const m of molecules) {
      m.x += m.vx * jitter;
      m.y += m.vy * jitter;
      if (Math.random() < 0.04) { m.vx = (Math.random() - 0.5) * 1.4; m.vy = (Math.random() - 0.5) * 1.4; }
      const marginX = 16, marginTop = FLASK.top + 45, marginBottom = FLASK.bottom - 10;
      if (m.x < FLASK.left + marginX) { m.x = FLASK.left + marginX; m.vx *= -1; }
      if (m.x > FLASK.right - marginX) { m.x = FLASK.right - marginX; m.vx *= -1; }
      if (m.y < marginTop) { m.y = marginTop; m.vy *= -1; }
      if (m.y > marginBottom) { m.y = marginBottom; m.vy *= -1; }

      if (!m.reacted && Math.random() < squashed * 0.12) {
        m.reacted = true;
        m.flash = 10;
      }
      if (m.flash > 0) m.flash--;
    }

    if (isBoiling && frame % 4 === 0) {
      bubbles.push({ x: FLASK.left + 20 + Math.random() * (FLASK.right - FLASK.left - 40), y: FLASK.bottom - 5, life: 40 });
    }
    bubbles.forEach(b => { b.y -= 2.2; b.life--; });
    bubbles = bubbles.filter(b => b.life > 0 && b.y > FLASK.top + 30);
  }

  function render() {
    const { T } = getParams();
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(FLASK.left, FLASK.top + 20);
    ctx.quadraticCurveTo(FLASK.left - 10, FLASK.bottom, FLASK.left + 20, FLASK.bottom);
    ctx.lineTo(FLASK.right - 20, FLASK.bottom);
    ctx.quadraticCurveTo(FLASK.right + 10, FLASK.bottom, FLASK.right, FLASK.top + 20);
    ctx.closePath();
    ctx.fillStyle = bgColorForT(T);
    ctx.globalAlpha = 0.25;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    drawFlask();

    for (const b of bubbles) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(180,210,255,0.5)";
      ctx.stroke();
    }

    for (const m of molecules) {
      ctx.beginPath();
      const radius = m.flash > 0 ? 8 + m.flash * 0.4 : 6;
      ctx.arc(m.x, m.y, radius, 0, Math.PI * 2);
      if (m.flash > 0) {
        ctx.fillStyle = "rgba(255,255,255," + (m.flash / 10) + ")";
      } else {
        ctx.fillStyle = m.reacted ? "#ff9f43" : "#5b8cff";
      }
      ctx.fill();
    }

    const reactedCount = molecules.filter(m => m.reacted).length;
    const pct = Math.round((reactedCount / N_MOLECULES) * 100);
    statPct.textContent = pct + "%";
    const { kDisplay } = computeRate();
    statK.textContent = formatK(kDisplay);
  }

  function loop() {
    step();
    render();
  }

  const PRESETS = [
    { name: "Комнатная температура", T: 300, Ea: 45, explain: "Обычные условия: реакция идёт с умеренной, наблюдаемой скоростью." },
    { name: "Заморозка", T: 150, Ea: 45, explain: "При низкой температуре молекулам не хватает энергии — реакция практически останавливается, хотя барьер тот же." },
    { name: "Катализатор добавлен", T: 300, Ea: 20, explain: "Та же температура, но катализатор снизил энергию активации — реакция идёт значительно быстрее без нагрева." },
    { name: "Взрывная реакция", T: 900, Ea: 20, explain: "Высокая температура и низкий барьер вместе — почти мгновенное превращение и активное 'кипение'." },
    { name: "Реакция заблокирована", T: 300, Ea: 150, explain: "Слишком высокий энергетический барьер — реакция не идёт, даже несмотря на комнатную температуру." }
  ];

  function applyPreset(p) {
    tSlider.value = p.T;
    eaSlider.value = p.Ea;
    updateLabels();
    explainText.textContent = p.explain;
    initMolecules();
    document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
    const btn = document.querySelector('.presets button[data-name="' + p.name + '"]');
    if (btn) btn.classList.add("active");
  }

  PRESETS.forEach(p => {
    const btn = document.createElement("button");
    btn.textContent = p.name;
    btn.dataset.name = p.name;
    btn.addEventListener("click", () => applyPreset(p));
    presetsEl.appendChild(btn);
  });

  function updateLabels() {
    tVal.textContent = tSlider.value + " K";
    eaVal.textContent = eaSlider.value + " кДж/моль";
  }

  tSlider.addEventListener("input", () => { updateLabels(); initMolecules(); document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active")); });
  eaSlider.addEventListener("input", () => { updateLabels(); initMolecules(); document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active")); });
  document.getElementById("restartBtn").addEventListener("click", initMolecules);

  updateLabels();
  applyPreset(PRESETS[0]);
  setInterval(loop, 16);
})();
</script>
</body>
</html>
