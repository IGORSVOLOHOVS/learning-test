<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Прагматика: тренажёр ответов</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --text: #eef0f6; --muted: #8b8fa3;
    --accent: #5b8cff; --good: #2fbf71; --bad: #ef5350; --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  h1 { font-size: 1.15rem; margin: 14px 0 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 12px; }
  .progress { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
  .prompt { font-size: 1rem; margin: 6px 0 14px; line-height: 1.5; padding: 12px 14px; background: #171a24; border-radius: 10px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left; background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: .92rem; cursor: pointer; line-height: 1.4;
  }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .explain { margin-top: 14px; padding: 12px 14px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--accent); font-size: .9rem; color: #c7cadb; display: none; line-height: 1.5; }
  .explain.show { display: block; }
  .nav { margin-top: 16px; }
  button.btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; font-size: .95rem; cursor: pointer; }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .score { text-align: center; }
  .score .big { font-size: 2.6rem; font-weight: 700; color: var(--accent); }
  .restart-btn { margin-top: 14px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #232838; color: var(--text); font-size: .9rem; cursor: pointer; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80; --border: #e3e5ee; }
    .opt, .restart-btn { background: #f7f8fc; }
    .prompt, .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="../tests/pragmatics_model.html">&larr; Тест по теме</a>
    <a class="back" href="../index.html">Все тесты</a>
  </div>
  <h1>Тренажёр: двухэтапная модель прагматика</h1>
  <div class="subtitle">Рабочая ситуация → выберите формулировку ответа, которая лучше всего следует модели.</div>

  <div class="card" id="caseCard">
    <div class="progress" id="progress"></div>
    <div class="prompt" id="prompt"></div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain"></div>
    <div class="nav"><button class="btn" id="nextBtn" disabled>Далее</button></div>
  </div>

  <div class="card score" id="scoreCard" style="display:none;">
    <div class="big" id="scoreBig"></div>
    <div style="color:var(--muted); margin-top:6px;">лучших формулировок из 6</div>
    <button class="restart-btn" id="restartBtn">Пройти заново</button>
  </div>
</div>

<script>
(function () {
  const caseCard = document.getElementById("caseCard");
  const scoreCard = document.getElementById("scoreCard");
  const progressEl = document.getElementById("progress");
  const promptEl = document.getElementById("prompt");
  const optionsEl = document.getElementById("options");
  const explainEl = document.getElementById("explain");
  const nextBtn = document.getElementById("nextBtn");
  const scoreBig = document.getElementById("scoreBig");

  const CASES = [
    {
      prompt: "Руководитель спрашивает: «Когда будет готова функция?» Вы ещё не оценивали объём работы.",
      options: [
        "Наверное, скоро, я постараюсь успеть побыстрее",
        "Я назову срок, когда закончу оценку объёма работы и распланирую этапы",
        "Не знаю, отстаньте, я занят",
        "Точно через неделю, обещаю"
      ],
      correct: 1,
      explain: "Это точное применение формулы Этапа 2: вместо гадания или эмоциональной реакции — конкретное условие, при выполнении которого появится срок."
    },
    {
      prompt: "Задача уже полностью проанализирована: 5 этапов, около 15 часов работы. Коллега спрашивает статус.",
      options: [
        "Задача довольно объёмная, но, думаю, всё будет хорошо",
        "Задача включает 5 этапов, общий объём — примерно 15 часов работы",
        "Ну как сказать... сложно однозначно ответить",
        "Это займёт целую вечность, если честно"
      ],
      correct: 1,
      explain: "Этап 1 модели: факт уже известен — сообщаем его сухо, только цифры и сроки, без оценочных слов и эмоций."
    },
    {
      prompt: "Клиент раздражённо пишет: «Почему до сих пор нет даты доставки?!»",
      options: [
        "Простите, я сам не знаю, как так вышло, это ужасно",
        "Мы сможем назвать точную дату доставки, когда завершим согласование с таможней",
        "Вы слишком нетерпеливы, доставка придёт, когда придёт",
        "Дата доставки, скорее всего, будет примерно как обычно"
      ],
      correct: 1,
      explain: "Несмотря на эмоциональное давление, ответ не поддаётся раздражению и не гадает — называет конкретное условие получения точной даты."
    },
    {
      prompt: "Коллега без энтузиазма говорит о задаче: «Это очень муторная и неприятная задача, я не уверен, сколько это займёт».",
      options: [
        "Задача требует интеграции с 3 внешними API; точный срок назову после оценки сложности каждой интеграции",
        "Задача действительно муторная, приготовьтесь ждать долго",
        "Я расстроен из-за этой задачи и не хочу её делать",
        "Задача, наверное, займёт вечность, честно говоря"
      ],
      correct: 0,
      explain: "Формулировка убирает оценочные слова ('муторная') и заменяет их либо конкретными параметрами, либо чётким условием получения срока — по структуре модели."
    },
    {
      prompt: "Инвестор спрашивает точную дату выхода на самоокупаемость. Точной цифры пока нет.",
      options: [
        "Мы сможем назвать точную дату, когда завершим оптимизацию затрат и получим данные за квартал",
        "Мы точно выйдем на самоокупаемость через полгода, обещаю",
        "Это невозможно предсказать, и мы не будем даже пытаться",
        "Наверное, довольно скоро, если всё пойдёт хорошо"
      ],
      correct: 0,
      explain: "Ответ не даёт необоснованного точного обещания и не уклоняется полностью — указывает конкретное условие, при выполнении которого появится точная дата."
    },
    {
      prompt: "Известно точно: проблема будет устранена через 2 часа, начиная с 14:00. Как сообщить об этом клиенту?",
      options: [
        "Проблема будет устранена в течение 2 часов, начиная с 14:00",
        "Проблема довольно серьёзная, но мы стараемся изо всех сил",
        "Всё будет исправлено очень скоро, не переживайте",
        "Проблема неприятная, но терпимая, подождите немного"
      ],
      correct: 0,
      explain: "Факт уже известен (Этап 1) — нужно сообщить его сухо и конкретно, а не заменять успокаивающими, но неинформативными фразами."
    }
  ];

  let idx = 0, score = 0, answered = false;

  function showCase() {
    const c = CASES[idx];
    answered = false;
    progressEl.textContent = "Кейс " + (idx + 1) + " / " + CASES.length;
    promptEl.textContent = c.prompt;
    explainEl.className = "explain";
    nextBtn.disabled = true;
    nextBtn.textContent = idx === CASES.length - 1 ? "Завершить" : "Далее";

    optionsEl.innerHTML = "";
    c.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.textContent = opt;
      btn.addEventListener("click", () => selectOption(i));
      optionsEl.appendChild(btn);
    });
  }

  function selectOption(i) {
    if (answered) return;
    answered = true;
    const c = CASES[idx];
    const btns = optionsEl.querySelectorAll(".opt");
    btns.forEach((b, j) => {
      b.classList.add("disabled");
      if (j === c.correct) b.classList.add("correct");
      else if (j === i) b.classList.add("wrong");
    });
    if (i === c.correct) score++;
    explainEl.textContent = c.explain;
    explainEl.classList.add("show");
    nextBtn.disabled = false;
  }

  nextBtn.addEventListener("click", () => {
    idx++;
    if (idx >= CASES.length) {
      caseCard.style.display = "none";
      scoreCard.style.display = "block";
      scoreBig.textContent = score + " / " + CASES.length;
    } else {
      showCase();
    }
  });

  document.getElementById("restartBtn").addEventListener("click", () => {
    idx = 0; score = 0;
    caseCard.style.display = "block";
    scoreCard.style.display = "none";
    showCase();
  });

  showCase();
})();
</script>
</body>
</html>
