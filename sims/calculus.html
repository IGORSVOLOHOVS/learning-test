<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Матанализ: лаборатория производной</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --text: #eef0f6; --muted: #8b8fa3;
    --accent: #5b8cff; --good: #2fbf71; --bad: #ef5350; --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  h1 { font-size: 1.15rem; margin: 14px 0 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; }
  canvas { width: 100%; height: auto; display: block; border-radius: 10px; background: #05060a; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .presets button {
    flex: 1 1 auto; min-width: 120px; background: #232838; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: .82rem; cursor: pointer;
  }
  .presets button.active { border-color: var(--accent); background: rgba(91,140,255,0.15); }
  .controls { margin-top: 14px; }
  .control-row { margin-bottom: 14px; }
  .control-row label { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: 6px; }
  .control-row .val { color: var(--accent); font-weight: 600; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  select { width: 100%; padding: 10px; border-radius: 10px; background: #171a24; color: var(--text); border: 1px solid var(--border); font-size: .9rem; }
  .stats { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .stat { flex: 1 1 auto; background: #171a24; border-radius: 10px; padding: 8px 12px; min-width: 130px; }
  .stat .label { font-size: .72rem; color: var(--muted); }
  .stat .value { font-size: 1.0rem; font-weight: 700; }
  .explain { margin-top: 10px; font-size: .85rem; color: #c7cadb; line-height: 1.5; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80; --border: #e3e5ee; }
    .presets button, .stat { background: #f7f8fc; }
    select { background: #f7f8fc; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="../tests/calculus.html">&larr; Тест по теме</a>
    <a class="back" href="../index.html">Все тесты</a>
  </div>
  <h1>Лаборатория: производная как наклон</h1>
  <div class="subtitle">Машина едет по графику функции. Касательная в точке машины и есть производная — "скорость" изменения функции.</div>

  <div class="card">
    <canvas id="scene" width="640" height="360"></canvas>
    <div class="stats">
      <div class="stat"><div class="label">f(x)</div><div class="value" id="statF">—</div></div>
      <div class="stat"><div class="label">f'(x) — "скорость"</div><div class="value" id="statDeriv">—</div></div>
    </div>
  </div>

  <div class="card">
    <div class="presets" id="presets"></div>
  </div>

  <div class="card controls">
    <div class="control-row">
      <label>Функция</label>
      <select id="funcSelect">
        <option value="quad">Разгон: f(x) = 0.4x²</option>
        <option value="hill">Вершина холма: f(x) = -0.4x²+3</option>
        <option value="cubic">Точка перегиба: f(x) = 0.15x³</option>
        <option value="asym">Асимптота: f(x) = 1/x</option>
        <option value="abs">Излом: f(x) = |x|</option>
      </select>
    </div>
    <div class="control-row">
      <label>Положение x <span class="val" id="xVal">0.0</span></label>
      <input type="range" id="xSlider" min="-4" max="4" step="0.05" value="0">
    </div>
    <div class="explain" id="explainText"></div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const CX = W / 2, CY = H * 0.62, SCALE = 55;

  const funcSelect = document.getElementById("funcSelect");
  const xSlider = document.getElementById("xSlider");
  const xVal = document.getElementById("xVal");
  const statF = document.getElementById("statF");
  const statDeriv = document.getElementById("statDeriv");
  const explainText = document.getElementById("explainText");
  const presetsEl = document.getElementById("presets");

  const FUNCS = {
    quad: { f: x => 0.4 * x * x, d: x => 0.8 * x, domain: [-4, 4] },
    hill: { f: x => -0.4 * x * x + 3, d: x => -0.8 * x, domain: [-4, 4] },
    cubic: { f: x => 0.15 * x * x * x, d: x => 0.45 * x * x, domain: [-4, 4] },
    asym: { f: x => 1 / x, d: x => -1 / (x * x), domain: [0.3, 4] },
    abs: { f: x => Math.abs(x), d: x => (x === 0 ? NaN : (x > 0 ? 1 : -1)), domain: [-4, 4] }
  };

  function toScreen(x, y) { return { x: CX + x * SCALE, y: CY - y * SCALE }; }

  function currentFunc() { return FUNCS[funcSelect.value]; }

  function clampX(x) {
    const [lo, hi] = currentFunc().domain;
    return Math.max(lo, Math.min(hi, x));
  }

  function render() {
    const fn = currentFunc();
    let x = clampX(parseFloat(xSlider.value));
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, W, H);

    // axes
    ctx.strokeStyle = "rgba(150,160,190,0.35)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, CY); ctx.lineTo(W, CY);
    ctx.moveTo(CX, 0); ctx.lineTo(CX, H);
    ctx.stroke();

    // curve
    ctx.strokeStyle = "#5b8cff";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    let started = false;
    const [lo, hi] = fn.domain;
    for (let px = -4; px <= 4; px += 0.05) {
      if (px < lo || px > hi) continue;
      if (funcSelect.value === "asym" && Math.abs(px) < 0.05) continue;
      const y = fn.f(px);
      if (Math.abs(y) > 8) { started = false; continue; }
      const s = toScreen(px, y);
      if (!started) { ctx.moveTo(s.x, s.y); started = true; } else ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();

    // tangent line (fixed pixel length through the point, correct angle)
    const y0 = fn.f(x);
    const slope = fn.d(x);
    if (!isNaN(slope)) {
      const angle = Math.atan2(-slope * SCALE, SCALE);
      const len = 90;
      const p0 = toScreen(x, y0);
      const p1 = { x: p0.x - Math.cos(angle) * len, y: p0.y - Math.sin(angle) * len };
      const p2 = { x: p0.x + Math.cos(angle) * len, y: p0.y + Math.sin(angle) * len };
      ctx.strokeStyle = "#2fbf71";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }

    // car at (x, f(x))
    const carPos = toScreen(x, y0);
    const carAngle = isNaN(slope) ? 0 : Math.atan2(-slope * SCALE, SCALE);
    ctx.save();
    ctx.translate(carPos.x, carPos.y);
    ctx.rotate(carAngle);
    ctx.fillStyle = "#ff9f43";
    ctx.fillRect(-14, -8, 28, 8);
    ctx.beginPath();
    ctx.arc(-8, 0, 4, 0, Math.PI * 2);
    ctx.arc(8, 0, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#111319";
    ctx.fill();
    ctx.restore();

    statF.textContent = y0.toFixed(2);
    statDeriv.textContent = isNaN(slope) ? "не определена" : slope.toFixed(2);
  }

  function updateLabel() { xVal.textContent = parseFloat(xSlider.value).toFixed(2); }

  const PRESETS = [
    { name: "Разгон", func: "quad", x: 3, explain: "Парабола вверх — по мере роста x машина 'разгоняется', наклон (производная) растёт." },
    { name: "Вершина холма", func: "hill", x: 0, explain: "В вершине наклон касательной равен нулю — машина на мгновение 'останавливается'." },
    { name: "Точка перегиба", func: "cubic", x: 0, explain: "В точке x=0 меняется направление выпуклости кривой, хотя сама производная тут не равна нулю." },
    { name: "Асимптота", func: "asym", x: 0.35, explain: "При приближении x к нулю функция стремится к бесконечности — машина никогда не 'доезжает' до края." },
    { name: "Излом (разрыв производной)", func: "abs", x: 0, explain: "В точке излома |x| производная не определена — наклон касательной резко меняется с -1 на +1." }
  ];

  function applyPreset(p) {
    funcSelect.value = p.func;
    xSlider.min = FUNCS[p.func].domain[0];
    xSlider.max = FUNCS[p.func].domain[1];
    xSlider.value = p.x;
    updateLabel();
    explainText.textContent = p.explain;
    render();
    document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
    const btn = document.querySelector('.presets button[data-name="' + p.name + '"]');
    if (btn) btn.classList.add("active");
  }

  PRESETS.forEach(p => {
    const btn = document.createElement("button");
    btn.textContent = p.name;
    btn.dataset.name = p.name;
    btn.addEventListener("click", () => applyPreset(p));
    presetsEl.appendChild(btn);
  });

  xSlider.addEventListener("input", () => {
    updateLabel();
    render();
    document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
  });
  funcSelect.addEventListener("change", () => {
    xSlider.min = currentFunc().domain[0];
    xSlider.max = currentFunc().domain[1];
    xSlider.value = Math.max(currentFunc().domain[0], Math.min(currentFunc().domain[1], parseFloat(xSlider.value)));
    updateLabel();
    render();
    document.querySelectorAll(".presets button").forEach(b => b.classList.remove("active"));
  });

  updateLabel();
  applyPreset(PRESETS[0]);
})();
</script>
</body>
</html>
