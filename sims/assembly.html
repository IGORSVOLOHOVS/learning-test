<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ассемблер: визуализатор регистров и стека</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --text: #eef0f6; --muted: #8b8fa3;
    --accent: #5b8cff; --good: #2fbf71; --bad: #ef5350; --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  h1 { font-size: 1.15rem; margin: 14px 0 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .presets button {
    flex: 1 1 auto; min-width: 120px; background: #232838; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: .82rem; cursor: pointer;
  }
  .presets button.active { border-color: var(--accent); background: rgba(91,140,255,0.15); }
  .code {
    background: #05060a; border-radius: 10px; padding: 12px 14px; font-family: "Consolas", monospace;
    font-size: .85rem; line-height: 1.7; white-space: pre; overflow-x: auto;
  }
  .code .line { padding: 1px 6px; border-radius: 4px; color: #9aa2b8; }
  .code .line.current { background: rgba(91,140,255,0.25); color: #eef0f6; }
  .regs { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .reg-box { flex: 1 1 auto; min-width: 70px; background: #171a24; border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; }
  .reg-box .name { font-size: .7rem; color: var(--muted); }
  .reg-box .val { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .reg-box.changed { border-color: var(--good); }
  .stack-area { margin-top: 12px; }
  .stack-area h3 { font-size: .8rem; color: var(--muted); margin: 0 0 8px; text-transform: uppercase; letter-spacing: .04em; }
  .stack-item { background: #171a24; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; font-size: .85rem; font-family: monospace; }
  .note { margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--accent); font-size: .88rem; color: #c7cadb; }
  .nav { display: flex; gap: 10px; margin-top: 14px; }
  .nav button { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; font-size: .92rem; cursor: pointer; }
  .nav button.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  .nav button:disabled { opacity: .4; pointer-events: none; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80; --border: #e3e5ee; }
    .presets button, .nav button.secondary, .reg-box, .stack-item { background: #f7f8fc; }
    .code { background: #eef0f6; }
    .code .line { color: #5a5f70; }
    .note { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="../tests/assembly.html">&larr; Тест по теме</a>
    <a class="back" href="../index.html">Все тесты</a>
  </div>
  <h1>Визуализатор: регистры и стек</h1>
  <div class="subtitle">Выполняйте ассемблерную программу по одной инструкции — смотрите, как меняются регистры, флаги и стек.</div>

  <div class="card">
    <div class="presets" id="presets"></div>
    <div class="code" id="codeView"></div>
    <div class="regs" id="regsView"></div>
    <div class="stack-area"><h3>Стек</h3><div id="stackView"></div></div>
    <div class="note" id="noteBox"></div>
    <div class="nav">
      <button class="secondary" id="resetBtn">Сначала</button>
      <button id="nextBtn">Следующая инструкция ▸</button>
    </div>
  </div>
</div>

<script>
(function () {
  const codeView = document.getElementById("codeView");
  const regsView = document.getElementById("regsView");
  const stackView = document.getElementById("stackView");
  const noteBox = document.getElementById("noteBox");
  const nextBtn = document.getElementById("nextBtn");
  const presetsEl = document.getElementById("presets");

  const PROGRAMS = {
    arithmetic: {
      name: "Арифметика и флаги",
      lines: ["MOV AX, 10", "MOV BX, 10", "SUB AX, BX", "ADD AX, 5"],
      steps: [
        { line: 0, regs: { AX: 10, BX: 0, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "AX ← 10" },
        { line: 1, regs: { AX: 10, BX: 10, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "BX ← 10" },
        { line: 2, regs: { AX: 0, BX: 10, CX: 0 }, flags: { ZF: 1 }, stack: [], note: "AX = AX − BX = 0 → результат нулевой, флаг ZF установлен в 1" },
        { line: 3, regs: { AX: 5, BX: 10, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "AX = AX + 5 = 5 → результат не нулевой, ZF сброшен в 0" }
      ]
    },
    call: {
      name: "Вызов функции (CALL/RET)",
      lines: ["MOV AX, 1", "CALL func", "ADD AX, 100", "HLT", "func:", "    MOV BX, 42", "    RET"],
      steps: [
        { line: 0, regs: { AX: 1, BX: 0, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "AX ← 1" },
        { line: 1, regs: { AX: 1, BX: 0, CX: 0 }, flags: { ZF: 0 }, stack: ["адрес возврата → строка 3 (ADD AX,100)"], note: "CALL сохраняет адрес возврата в стеке и передаёт управление в func" },
        { line: 5, regs: { AX: 1, BX: 42, CX: 0 }, flags: { ZF: 0 }, stack: ["адрес возврата → строка 3 (ADD AX,100)"], note: "Внутри func: BX ← 42" },
        { line: 6, regs: { AX: 1, BX: 42, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "RET извлекает адрес возврата из стека и возвращает управление вызывающему коду" },
        { line: 2, regs: { AX: 101, BX: 42, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "Выполнение продолжилось после CALL: AX = AX + 100 = 101" },
        { line: 3, regs: { AX: 101, BX: 42, CX: 0 }, flags: { ZF: 0 }, stack: [], note: "HLT — программа остановлена" }
      ]
    },
    loop: {
      name: "Цикл со счётчиком (JNZ)",
      lines: ["MOV CX, 3", "loop_start:", "    ADD AX, 1", "    SUB CX, 1", "    JNZ loop_start", "HLT"],
      steps: [
        { line: 0, regs: { AX: 0, BX: 0, CX: 3 }, flags: { ZF: 0 }, stack: [], note: "CX ← 3 (счётчик итераций)" },
        { line: 2, regs: { AX: 1, BX: 0, CX: 3 }, flags: { ZF: 0 }, stack: [], note: "Итерация 1: AX = AX + 1 = 1" },
        { line: 3, regs: { AX: 1, BX: 0, CX: 2 }, flags: { ZF: 0 }, stack: [], note: "CX = CX − 1 = 2, результат не нулевой → ZF=0" },
        { line: 4, regs: { AX: 1, BX: 0, CX: 2 }, flags: { ZF: 0 }, stack: [], note: "JNZ: ZF=0 (CX≠0) → переход обратно на loop_start" },
        { line: 2, regs: { AX: 2, BX: 0, CX: 2 }, flags: { ZF: 0 }, stack: [], note: "Итерация 2: AX = AX + 1 = 2" },
        { line: 3, regs: { AX: 2, BX: 0, CX: 1 }, flags: { ZF: 0 }, stack: [], note: "CX = CX − 1 = 1, ZF=0" },
        { line: 4, regs: { AX: 2, BX: 0, CX: 1 }, flags: { ZF: 0 }, stack: [], note: "JNZ: ZF=0 (CX≠0) → снова переход на loop_start" },
        { line: 2, regs: { AX: 3, BX: 0, CX: 1 }, flags: { ZF: 0 }, stack: [], note: "Итерация 3: AX = AX + 1 = 3" },
        { line: 3, regs: { AX: 3, BX: 0, CX: 0 }, flags: { ZF: 1 }, stack: [], note: "CX = CX − 1 = 0 → результат нулевой, ZF=1" },
        { line: 4, regs: { AX: 3, BX: 0, CX: 0 }, flags: { ZF: 1 }, stack: [], note: "JNZ: ZF=1 (CX=0) → переход НЕ выполняется, идём дальше" },
        { line: 5, regs: { AX: 3, BX: 0, CX: 0 }, flags: { ZF: 1 }, stack: [], note: "HLT — цикл завершён, AX содержит 3 (число выполненных итераций)" }
      ]
    }
  };

  let current = null;
  let stepIdx = 0;
  let prevRegs = {};

  function renderCode() {
    codeView.innerHTML = current.lines.map((l, i) =>
      '<div class="line' + (i === current.steps[stepIdx].line ? ' current' : '') + '">' + escapeHtml(l) + '</div>'
    ).join("");
  }
  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function renderState() {
    const step = current.steps[stepIdx];
    renderCode();
    regsView.innerHTML = "";
    ["AX", "BX", "CX"].forEach(r => {
      const changed = prevRegs[r] !== undefined && prevRegs[r] !== step.regs[r];
      regsView.innerHTML += '<div class="reg-box' + (changed ? " changed" : "") + '"><div class="name">' + r + '</div><div class="val">' + step.regs[r] + '</div></div>';
    });
    regsView.innerHTML += '<div class="reg-box"><div class="name">ZF</div><div class="val">' + step.flags.ZF + '</div></div>';

    stackView.innerHTML = step.stack.length
      ? step.stack.map(s => '<div class="stack-item">' + escapeHtml(s) + '</div>').join("")
      : '<div style="color:var(--muted); font-size:.85rem;">(пусто)</div>';

    noteBox.textContent = step.note;
    nextBtn.disabled = stepIdx >= current.steps.length - 1;
    nextBtn.textContent = stepIdx >= current.steps.length - 1 ? "Конец программы" : "Следующая инструкция ▸";
    prevRegs = step.regs;
  }

  function loadProgram(key) {
    current = PROGRAMS[key];
    stepIdx = 0;
    prevRegs = {};
    renderState();
    document.querySelectorAll(".presets button").forEach(b => b.classList.toggle("active", b.dataset.key === key));
  }

  nextBtn.addEventListener("click", () => {
    if (stepIdx < current.steps.length - 1) {
      stepIdx++;
      renderState();
    }
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    stepIdx = 0;
    prevRegs = {};
    renderState();
  });

  Object.keys(PROGRAMS).forEach(key => {
    const btn = document.createElement("button");
    btn.textContent = PROGRAMS[key].name;
    btn.dataset.key = key;
    btn.addEventListener("click", () => loadProgram(key));
    presetsEl.appendChild(btn);
  });

  loadProgram("arithmetic");
})();
</script>
</body>
</html>
