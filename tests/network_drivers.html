<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сетевые драйверы</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

    <div class="topbar">

    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script>
(function () {
  const TEST_ID = "network_drivers";
  const QUESTIONS = [{"q": "Что такое драйвер устройства (device driver) в операционной системе?", "options": ["Встроенный в BIOS/UEFI модуль первичной настройки материнской платы", "Прикладная программа для просмотра видео, фото и анимации", "Текстовый файл конфигурации с сетевыми адресами устройства", "Программный слой между ОС и конкретным аппаратным устройством"], "correct": 3, "explain": "Драйвер — программный слой, транслирующий стандартные вызовы ОС в конкретные команды для аппаратного устройства (в данном случае сетевого адаптера) и обратно.", "usage": {"code": false, "without": "Приложение обращается к железу своими командами, и под каждую модель карты нужен отдельный код — небезопасно и непереносимо.", "with": "Драйвер даёт ОС единый интерфейс и транслирует стандартные вызовы в команды конкретного устройства и обратно.", "benefit": "Один код приложения работает с любым устройством."}}, {"q": "В чём заключается основная задача сетевого драйвера (NIC driver)?", "options": ["Управление файловой системой и разметкой дискового раздела", "Отрисовка графического интерфейса, окон и меню пользователя", "Компиляция исходного кода приложений в машинный код процессора", "Связь сетевой карты (NIC) с сетевым стеком операционной системы"], "correct": 3, "explain": "Сетевой драйвер управляет сетевым адаптером на низком уровне: приём/передача пакетов, настройка регистров устройства, обработка прерываний.", "usage": {"code": false, "without": "Сетевой стек сам должен знать регистры каждой карты, чтобы отправить кадр — стек привязан к железу.", "with": "Драйвер связывает NIC со стеком: стек шлёт/принимает кадры через абстрактный net_device.", "benefit": "Стек не зависит от модели адаптера."}}, {"q": "Что такое режим ядра (kernel mode) в контексте работы драйверов?", "options": ["Режим максимальных привилегий для кода драйверов и ядра ОС", "Режим пониженного энергопотребления и сна процессора", "Режим отладки и тестирования графической подсистемы", "Режим работы пользовательских приложений с ограниченными правами"], "correct": 0, "explain": "Kernel mode даёт коду прямой доступ к аппаратуре и памяти системы, что необходимо большинству драйверов для эффективного управления устройствами.", "usage": {"code": false, "without": "Код в пользовательском режиме не может трогать регистры и DMA — каждый доступ идёт через syscall с большими задержками.", "with": "Драйвер в kernel mode напрямую пишет регистры и обрабатывает прерывания с привилегиями ядра.", "benefit": "Низколатентный прямой доступ к железу."}}, {"q": "Что такое прерывание (interrupt) в контексте работы сетевого адаптера?", "options": ["Полная аварийная остановка операционной системы и всех сервисов", "Метод сжатия данных пакета перед его отправкой в сеть", "Сигнал устройства процессору о событии, требующем внимания", "Способ шифрования сетевого трафика при его передаче"], "correct": 2, "explain": "Прерывание — механизм, позволяющий устройству асинхронно уведомить процессор о событии (например, о готовности данных), не заставляя ОС постоянно опрашивать устройство в цикле.", "usage": {"code": true, "without": "while (1) {\n  if (nic_has_packet()) handle();\n}\n// CPU крутится вхолостую, опрашивая карту", "with": "request_irq(nic_irq, rx_handler, ...);\n// карта сама будит CPU при получении пакета", "benefit": "CPU свободен, пока пакетов нет."}}, {"q": "Что такое DMA (Direct Memory Access) применительно к сетевым картам?", "options": ["Метод иерархической адресации IP-пакетов в локальной сети", "Протокол сквозного шифрования пользовательских данных", "Способ аппаратного сжатия видеопотока перед записью", "Прямой доступ устройства к памяти в обход процессора"], "correct": 3, "explain": "DMA позволяет сетевой карте самостоятельно передавать данные пакетов в оперативную память и обратно, освобождая процессор от копирования данных байт за байтом.", "usage": {"code": true, "without": "for (i = 0; i < len; i++)\n  buf[i] = inb(nic_data_port);\n// CPU копирует каждый байт вручную", "with": "dma_addr = dma_map_single(dev, buf, len, DMA_FROM_DEVICE);\nnic->rx_ring[i].addr = dma_addr; // карта сама пишет в память", "benefit": "CPU не тратится на побайтовое копирование."}}, {"q": "Что такое буфер приёма/передачи (RX/TX buffer, кольцевой буфер) в драйвере сетевой карты?", "options": ["Память, временно хранящая пакеты при приёме и передаче", "Конфигурационный файл с назначенным устройству IP-адресом", "Модуль антивирусной проверки всего входящего трафика", "Физический разъём для подключения витой пары к плате"], "correct": 0, "explain": "Кольцевые буферы (ring buffers) RX/TX используются драйвером и сетевой картой для организации очереди пакетов на приём и передачу без потери данных при временной перегрузке.", "usage": {"code": true, "without": "pkt = malloc(size); ... free(pkt);\n// аллокация/освобождение на каждый пакет в горячем пути", "with": "desc = &ring[head];\nhead = (head + 1) % RING_SIZE; // переиспользуем буферы по кругу", "benefit": "Нет аллокаций памяти в горячем пути."}}, {"q": "Что такое MAC-адрес сетевой карты?", "options": ["Логический адрес компьютера в локальной IP-сети провайдера", "Аппаратный идентификатор интерфейса на канальном уровне", "Пароль доступа к защищённой беспроводной Wi-Fi сети", "Название фирмы-производителя операционной системы"], "correct": 1, "explain": "MAC-адрес — уникальный (в теории) идентификатор сетевого адаптера, используемый на канальном уровне (Ethernet) для адресации кадров в локальной сети.", "usage": {"code": false, "without": "Без канального адреса кадр в Ethernet некому доставить: коммутатор не знает, на какой порт его слать.", "with": "У NIC есть уникальный MAC, и коммутатор адресует кадры по нему на канальном уровне.", "benefit": "Точная адресация внутри сегмента сети."}}, {"q": "Какова роль сетевого стека операционной системы (network stack) по отношению к драйверу сетевой карты?", "options": ["Сетевой стек управляет только графическим окном настроек сети", "Драйвер и сетевой стек — это один и тот же компонент ОС", "Стек реализует протоколы IP и TCP поверх интерфейса драйвера", "Сетевой стек полностью заменяет собой драйвер устройства"], "correct": 2, "explain": "Сетевой стек ОС (реализующий TCP/IP и другие протоколы) взаимодействует с драйвером как с абстрактным интерфейсом для отправки/приёма сырых кадров, не заботясь о специфике конкретного оборудования.", "usage": {"code": false, "without": "Каждое приложение само реализует TCP/IP и говорит с картой — дублирование логики в каждой программе.", "with": "Стек ОС реализует протоколы один раз и общается с картой через интерфейс драйвера.", "benefit": "Протоколы реализованы один раз в ядре."}}, {"q": "Что такое NAPI (New API) в контексте linux-драйверов сетевых карт?", "options": ["Механизм, сочетающий прерывания и опрос устройства", "Формат заголовков сетевых пакетов в протоколе IPv6", "Утилита командной строки для настройки правил firewall", "Протокол шифрования данных в беспроводных сетях Wi-Fi"], "correct": 0, "explain": "NAPI — механизм в ядре Linux, позволяющий драйверу переключаться между прерываниями (при низкой нагрузке) и опросом устройства (при высокой), снижая накладные расходы на обработку большого числа прерываний.", "usage": {"code": true, "without": "// IRQ на каждый пакет; при 10G это миллионы прерываний/с — interrupt storm", "with": "napi_schedule(&napi); // отключаем IRQ и опрашиваем пачку\nrx_poll(&napi, budget);", "benefit": "Одна обработка на много пакетов при нагрузке."}}, {"q": "Что означает термин 'привязка драйвера' (driver binding) к устройству в операционной системе?", "options": ["Ручная настройка IP-адреса адаптера администратором системы", "Физическое подключение сетевого кабеля в разъём платы", "Процесс установки антивирусного ПО в операционную систему", "Сопоставление драйвера устройству по PCI-идентификаторам"], "correct": 3, "explain": "При обнаружении устройства (например, через PCI) ОС ищет подходящий драйвер, сопоставляя идентификаторы устройства (vendor/device ID) с драйверами, заявляющими поддержку соответствующего оборудования.", "usage": {"code": true, "without": "// админ вручную указывает, какой драйвер к какой карте", "with": "static const struct pci_device_id ids[] = {\n  { PCI_DEVICE(VENDOR, DEVICE) }, { 0 }\n}; // ядро само сопоставляет по ID", "benefit": "Plug and Play без ручной привязки."}}, {"q": "Почему сетевые драйверы обычно работают в режиме ядра, а не в пользовательском пространстве, несмотря на риски для стабильности системы?", "options": ["Драйверы никогда не выполняются в режиме ядра в любых ОС", "Пользовательский режим даёт более быстрый доступ к железу", "Низколатентный доступ к DMA и прерываниям требует прав ядра", "Режим ядра выбран лишь по историческим причинам, без обоснования"], "correct": 2, "explain": "Прямое взаимодействие с аппаратурой (регистры, прерывания, DMA) исторически и архитектурно требует привилегий ядра для минимизации задержек; современные подходы (например, DPDK, io_uring) частично переносят часть логики в userspace ради иных компромиссов.", "usage": {"code": false, "without": "Перенос драйвера в userspace: каждая операция с регистром — переключение режима, задержка на каждый пакет.", "with": "Драйвер в ядре трогает регистры и DMA напрямую, без переключений на горячем пути.", "benefit": "Минимум переключений контекста, ниже задержка."}}, {"q": "Почему использование прерываний для каждого входящего пакета становится неэффективным при очень высокой сетевой нагрузке (например, десятки гигабит в секунду)?", "options": ["Прерывания не создают накладных расходов при любой их частоте", "Высокая нагрузка сама снижает частоту прерываний без драйвера", "Каждое прерывание требует переключения контекста процессора", "Обработка прерываний никак не связана с производительностью CPU"], "correct": 2, "explain": "При высокой частоте пакетов число прерываний может стать настолько большим, что процессор тратит большую часть времени на обработку самих прерываний (переключение контекста), а не на полезную обработку данных — отсюда необходимость механизмов вроде NAPI или интерфейсной группировки прерываний (interrupt coalescing).", "usage": {"code": true, "without": "// прерывание на каждый из миллионов пакетов — CPU тонет в переключениях контекста", "with": "// interrupt coalescing: один IRQ на пачку пакетов\nnic->rx_int_delay = 100; // мкс", "benefit": "CPU обрабатывает данные, а не прерывания."}}, {"q": "Как DMA снижает нагрузку на процессор по сравнению с программным вводом-выводом (PIO), при котором каждый байт данных копируется процессором вручную?", "options": ["DMA всегда работает медленнее программного копирования процессором", "DMA технически невозможно применить к сетевым устройствам", "Карта сама пишет в память по адресам, минуя CPU на каждом байте", "При DMA процессор всё равно копирует каждый байт данных вручную"], "correct": 2, "explain": "При PIO процессор должен активно участвовать в передаче каждого байта данных между устройством и памятью, тогда как DMA позволяет устройству асинхронно работать с памятью напрямую, значительно снижая нагрузку на CPU при больших объёмах данных.", "usage": {"code": true, "without": "// PIO: CPU участвует в передаче каждого байта\nwhile (len--) *dst++ = inb(port);", "with": "// DMA: карта сама переносит блок, CPU занят другим\nnic->tx_ring[i].addr = dma_map_single(...);", "benefit": "CPU освобождён для других задач."}}, {"q": "Почему кольцевые буферы (ring buffers) в драйверах сетевых карт спроектированы именно как кольцевая (циклическая), а не линейная структура?", "options": ["Кольцевые буферы всегда медленнее линейных при любой нагрузке", "Линейная структура всегда эффективнее для сетевых буферов", "Циклическая форма выбрана произвольно, без связи со скоростью", "Буферы переиспользуются по кругу без выделения новой памяти"], "correct": 3, "explain": "Кольцевая (циклическая) структура позволяет драйверу и устройству непрерывно переиспользовать один и тот же набор дескрипторов/буферов без постоянных затрат на выделение новой памяти для каждого пакета, что важно для высокой пропускной способности.", "usage": {"code": true, "without": "// линейный буфер: дошли до конца — сдвиг данных или новый malloc", "with": "idx = (idx + 1) % N; // индекс идёт по кругу, буферы переиспользуются", "benefit": "Бесконечный поток без перевыделения памяти."}}, {"q": "Почему обработчик прерывания (interrupt handler) сетевого драйвера обычно спроектирован так, чтобы выполнять минимум работы немедленно, откладывая основную обработку (например, через 'нижнюю половину' — bottom half/tasklet/softirq)?", "options": ["Обработчик блокирует другие прерывания, тяжёлое выносят в softirq", "Деление на верхнюю и нижнюю половину не влияет на скорость", "Отложенная обработка прерываний невозможна в современных ОС", "Обработчик обязан целиком обработать пакет немедленно, без отсрочек"], "correct": 0, "explain": "Классическая архитектура разделения обработки прерывания на 'верхнюю половину' (быстрая, минимальная реакция) и 'нижнюю половину' (полная обработка в менее приоритетном контексте) минимизирует время, в течение которого блокируются другие прерывания и системные события.", "usage": {"code": true, "without": "irqreturn_t handler() {\n  parse_and_deliver_all_packets(); // прерывания закрыты надолго\n}", "with": "irqreturn_t handler() {\n  ack_irq(); napi_schedule(&napi); // разбор в softirq\n}", "benefit": "Короткий IRQ — другие прерывания не ждут."}}, {"q": "Как привязка драйвера к устройству по PCI Vendor/Device ID помогает операционной системе автоматически подобрать нужный драйвер при подключении нового сетевого адаптера?", "options": ["Идентификаторы PCI служат лишь для показа в диспетчере устройств", "ОС всегда требует ручного указания драйвера для любой карты", "Vendor/Device ID определяют только физический размер платы", "ОС сопоставляет vendor/device ID с таблицей известных драйверов"], "correct": 3, "explain": "Автоматическое определение оборудования (Plug and Play) во многом опирается именно на эти идентификаторы: ОС читает их с устройства при перечислении шины PCI и ищет драйвер, объявивший поддержку такой комбинации ID.", "usage": {"code": false, "without": "Для каждой новой карты администратор ищет и прописывает драйвер вручную.", "with": "ОС читает vendor/device ID с шины PCI и находит драйвер, объявивший поддержку этой комбинации.", "benefit": "Карта заработала без ручной настройки."}}, {"q": "Почему многие современные сетевые карты поддерживают несколько аппаратных очередей приёма/передачи (multi-queue), и как это связано с многоядерными процессорами?", "options": ["Очереди распределяют входящий трафик по разным ядрам параллельно", "Одна очередь всегда эффективнее нескольких при любой нагрузке", "Многоядерные CPU никогда не выигрывают от нескольких очередей", "Множество очередей нужно лишь для резервного копирования данных сети"], "correct": 0, "explain": "Multi-queue NIC (в сочетании с технологиями вроде RSS — Receive Side Scaling) распределяет входящие потоки пакетов по разным очередям, каждая из которых может обрабатываться отдельным ядром процессора, масштабируя пропускную способность обработки сетевого трафика на многоядерных системах.", "usage": {"code": false, "without": "Одна очередь RX — весь трафик обрабатывает одно ядро, остальные простаивают, упираемся в потолок.", "with": "RSS раскидывает потоки по нескольким очередям, каждую обрабатывает своё ядро.", "benefit": "Пропускная способность масштабируется по ядрам."}}, {"q": "Почему разработчики высокопроизводительных сетевых приложений иногда используют технологии типа DPDK (Data Plane Development Kit), полностью обходящие стандартный путь через ядро и обычный драйвер?", "options": ["DPDK служит только для настройки графического окна сети", "Стандартный путь через ядро не создаёт никаких накладных расходов", "DPDK всегда медленнее штатного драйвера ядра при любых условиях", "Приложение работает с картой прямо из userspace, минуя ядро"], "correct": 3, "explain": "DPDK и подобные фреймворки жертвуют универсальностью и безопасностью стандартного пути обработки пакетов через ядро ради экстремальной производительности, необходимой, например, в сетевом оборудовании телеком-операторов и высокочастотном трейдинге.", "usage": {"code": false, "without": "Каждый пакет идёт через прерывания, копирования и стек ядра — накладные расходы ограничивают pps.", "with": "Poll-mode драйвер DPDK работает с картой из userspace напрямую, минуя ядро.", "benefit": "Максимум pps при минимальной задержке."}}, {"q": "Как понятие 'zero-copy' в сетевых драйверах связано с общей идеей минимизации накладных расходов при передаче данных между устройством, ядром и приложением?", "options": ["Копирование между буферами не создаёт заметных накладных расходов", "Техника избегает лишних копий, передавая указатели на память", "Zero-copy применим лишь к файловым системам, а не к сетевым картам", "Zero-copy значит, что данные вообще не передаются по сети"], "correct": 1, "explain": "Каждое копирование крупного блока данных в памяти стоит времени процессора и пропускной способности памяти; zero-copy техники (например, передача указателей вместо копий, или sendfile) минимизируют число таких копирований на пути данных от устройства до приложения.", "usage": {"code": true, "without": "copy_to_user(app_buf, kernel_buf, len);\n// пакет копируется NIC -> буфер ядра -> буфер приложения", "with": "// приложению отдаётся указатель на DMA/буфер ядра, лишних копий нет\napp_iov.base = skb->data;", "benefit": "Экономия CPU и полосы памяти."}}, {"q": "Почему при разработке драйвера важно тщательно обрабатывать состояние гонки (race condition) между обработчиком прерывания и основным потоком выполнения драйвера, обращающимися к общим структурам данных (например, кольцевому буферу)?", "options": ["Гонки возможны лишь в пользовательских программах, не в драйверах", "Прерывание может прервать код, без блокировок данные портятся", "Синхронизация доступа к общим данным не важна для драйвера ядра", "Обработчик и код никогда не трогают одни данные одновременно"], "correct": 1, "explain": "Асинхронная природа прерываний означает, что обработчик может прервать выполнение основного кода драйвера в произвольный момент; без корректной синхронизации совместный доступ к общим структурам (например, кольцевому буферу) может привести к повреждению данных, зависаниям или крашу системы.", "usage": {"code": true, "without": "// IRQ-обработчик и поток меняют tail кольца без блокировки\nring->tail++; // прерывание посреди обновления рвёт структуру", "with": "spin_lock_irqsave(&ring->lock, f);\nring->tail++;\nspin_unlock_irqrestore(&ring->lock, f);", "benefit": "Нет повреждения общих данных."}}, {"q": "Как взаимодействуют между собой уровни архитектуры сетевого стека: приложение, сокеты, протокольный стек (TCP/IP), драйвер и физическое устройство — почему изменения на одном уровне обычно не требуют изменений на других?", "options": ["Все уровни стека жёстко связаны, изменение одного ломает остальные", "Разделение на уровни — лишь концепция, не отражающая архитектуру", "Каждый уровень даёт соседу стандартный интерфейс, скрывая детали", "Драйвер карты обязан знать детали реализации TCP в приложении"], "correct": 2, "explain": "Многоуровневая архитектура сетевого стека (по аналогии с моделью OSI) — классический пример инкапсуляции: каждый слой скрывает детали реализации от соседних, что позволяет независимо развивать и заменять компоненты (например, драйвер конкретной сетевой карты) без изменений в вышестоящих слоях.", "usage": {"code": false, "without": "Приложение знает детали конкретной карты — сменили NIC, переписывайте приложение.", "with": "Каждый слой даёт соседнему стандартный интерфейс, скрывая детали реализации нижних уровней.", "benefit": "Замена карты без правок приложения."}}, {"q": "Почему разработка драйверов часто использует чётко определённый программный интерфейс (API) взаимодействия с ядром, а не произвольный, специфичный для каждого драйвера способ?", "options": ["Стандартный API даёт ядру единообразно управлять драйверами", "Каждый драйвер обязан изобретать свой способ связи с ядром", "Стандартизация API драйверов не даёт никаких преимуществ", "Ядро никогда не предоставляет стандартного интерфейса драйверам"], "correct": 0, "explain": "Стандартизированные интерфейсы (например, struct net_device_ops в Linux) позволяют ядру единообразно взаимодействовать с любым сетевым драйвером, что упрощает как разработку новых драйверов, так и поддержку/эволюцию самого ядра.", "usage": {"code": true, "without": "// каждый драйвер придумывает свой способ регистрации — ядро не может им управлять единообразно", "with": "static const struct net_device_ops ops = {\n  .ndo_start_xmit = my_xmit,\n};\nregister_netdev(dev);", "benefit": "Ядро одинаково управляет любым драйвером."}}, {"q": "Как компромисс между задержкой (latency) и пропускной способностью (throughput) проявляется в архитектурном выборе между обработкой пакетов 'по одному, сразу' и батчевой обработкой (группировкой) пакетов в драйвере?", "options": ["Обработка по одному даёт малую задержку, батч — выше throughput", "Батчевая обработка всегда даёт и меньшую задержку, и выше throughput", "Способ обработки пакетов не влияет на задержку и throughput", "Задержка и throughput всегда меняются в одном направлении"], "correct": 0, "explain": "Классический компромисс сетевых систем: обработка пакетов небольшими батчами амортизирует накладные расходы (переключение контекста, прерывания) на большее число пакетов, повышая throughput, но за счёт небольшого увеличения задержки отдельных пакетов, ожидающих накопления батча.", "usage": {"code": false, "without": "Обрабатываем каждый пакет сразу: минимум задержки, но накладные расходы на каждый пакет ограничивают throughput.", "with": "Копим небольшой батч и обрабатываем группой, амортизируя накладные расходы на много пакетов.", "benefit": "Выше throughput ценой малой задержки."}}, {"q": "Почему архитектура с раздельными очередями приёма и передачи (RX и TX) в сетевой карте логически необходима, а не достаточно одной общей очереди?", "options": ["Раздельные очереди RX и TX лишь увеличивают расход памяти без пользы", "Приём и передача независимы, отдельные очереди ведут их параллельно", "Одна общая очередь всегда эффективнее раздельных очередей RX и TX", "Приём и передача идут строго последовательно, никогда одновременно"], "correct": 1, "explain": "Полнодуплексная связь предполагает одновременный независимый приём и передачу данных; отдельные очереди позволяют драйверу и аппаратуре обрабатывать оба направления параллельно без взаимной блокировки одного процесса другим.", "usage": {"code": false, "without": "Одна общая очередь: приём блокирует передачу, хотя канал full-duplex и оба направления независимы.", "with": "Раздельные кольца RX и TX работают одновременно и независимо друг от друга.", "benefit": "Параллельный дуплекс без взаимных блокировок."}}, {"q": "Как выбор между polling (постоянным опросом состояния устройства) и interrupt-driven (управляемым прерываниями) подходом влияет на энергопотребление и задержку системы?", "options": ["Выбор между polling и прерываниями не влияет на энергопотребление", "Polling всегда одновременно снижает и задержку, и энергопотребление", "Прерывания всегда дают наименьшую возможную задержку реакции", "Polling даёт малую задержку, но тратит энергию; прерывания наоборот"], "correct": 3, "explain": "Это классический архитектурный компромисс встраиваемых и сетевых систем: непрерывный опрос даёт предсказуемо низкую задержку ценой постоянной загрузки процессора (и энергопотребления), тогда как прерывания эффективнее в режиме простоя, но добавляют небольшую задержку реакции на событие.", "usage": {"code": false, "without": "Постоянный polling даёт минимальную задержку, но CPU занят и жрёт энергию даже в простое.", "with": "Interrupt-driven подход: CPU спит без трафика и будится по прерыванию на событие.", "benefit": "Экономия энергии в режиме ожидания."}}, {"q": "Почему архитектура offloading (разгрузки вычислений на аппаратный уровень сетевой карты, например, вычисление контрольных сумм или сегментация TCP) считается удачным разделением ответственности между драйвером/ОС и аппаратурой?", "options": ["Offloading всегда замедляет обработку данных против расчёта на CPU", "Простые частые операции делает железо карты, разгружая процессор", "Аппаратный offloading применим к видеокартам, но не к сетевым", "Разделение работы между железом и CPU не влияет на скорость"], "correct": 1, "explain": "Архитектурный принцип разделения труда: специализированное аппаратное ускорение эффективно справляется с простыми, но частыми и вычислительно затратными операциями, освобождая универсальный процессор для более гибких задач — классический паттерн, применяемый не только в сетевых картах, но и, например, в GPU.", "usage": {"code": false, "without": "CPU сам считает TCP-контрольную сумму и режет большой буфер на сегменты для каждого пакета.", "with": "NIC делает вычисление контрольных сумм и сегментацию (TSO) аппаратно.", "benefit": "CPU разгружен для более сложных задач."}}, {"q": "Как модель драйвера с чётким разделением на 'общий' (generic) и 'специфичный для устройства' (device-specific) код облегчает поддержку множества разных моделей сетевых карт в рамках одной операционной системы?", "options": ["Общий код даёт стандартные интерфейсы и служит многим устройствам", "Разделение на общий и специфичный код лишь усложняет разработку", "Каждый драйвер пишет всю логику стека с нуля, без переиспользования", "Специфичный код драйвера нельзя отделить от общей логики ОС"], "correct": 0, "explain": "Многоуровневая архитектура драйверов (общий фреймворк + специфичные для конкретного чипа реализации) — распространённый архитектурный паттерн, позволяющий переиспользовать значительную часть кода (взаимодействие с сетевым стеком, управление очередями) между драйверами разных производителей.", "usage": {"code": false, "without": "Каждый драйвер пишет всю логику работы со стеком с нуля — дублирование кода и одинаковые баги.", "with": "Общий слой переиспользуется многими картами, а специфичный код лишь трогает регистры конкретного чипа.", "benefit": "Меньше кода и багов на новый драйвер."}}, {"q": "Почему буферизация на нескольких уровнях (аппаратный буфер сетевой карты, буфер драйвера, буфер сокета приложения) считается разумным архитектурным решением, а не избыточным дублированием?", "options": ["Многоуровневая буферизация всегда избыточна и совсем бесполезна", "Буферы на разных уровнях всегда синхронны и работают как один", "Более одного уровня буферизации всегда замедляет всю систему", "Каждый уровень сглаживает разницу скоростей соседних узлов"], "correct": 3, "explain": "Каждый уровень буферизации решает свою локальную задачу сглаживания рассинхронизации скоростей между соседними компонентами (сетевая карта ↔ драйвер ↔ приложение), и такая многоуровневая амортизация — распространённый и оправданный архитектурный паттерн в системах с разной скоростью обработки на разных уровнях.", "usage": {"code": false, "without": "Единственный буфер между картой и приложением: всплеск трафика при занятом приложении — и пакеты теряются.", "with": "Буферы на каждом уровне (NIC, драйвер, сокет) сглаживают рассинхрон скоростей соседних компонентов.", "benefit": "Устойчивость к кратковременным всплескам."}}, {"q": "Как понимание модульной архитектуры драйверов (возможность динамической загрузки/выгрузки во время работы системы, например, модули ядра Linux) влияет на удобство обслуживания и обновления сетевого оборудования?", "options": ["Модульность архитектуры драйверов не влияет на их обновление", "Модуль можно заменить и обновить без перезагрузки и пересборки ядра", "Динамическая загрузка модулей невозможна для сетевых драйверов ядра", "Драйверы всегда встроены в ядро при компиляции, без загрузки"], "correct": 1, "explain": "Возможность загружать и выгружать драйвер как отдельный модуль ядра (например, insmod/rmmod в Linux) без пересборки всего ядра — важное архитектурное решение, значительно упрощающее разработку, отладку и эксплуатационное обслуживание системы.", "usage": {"code": true, "without": "# драйвер вкомпилён в ядро: для обновления нужна пересборка и перезагрузка всей системы", "with": "rmmod old_nic\ninsmod new_nic.ko   # замена драйвера на лету", "benefit": "Обновление драйвера без перезагрузки."}}, {"q": "Разработчик драйвера сетевой карты заметил, что при очень высокой сетевой нагрузке процессор почти полностью загружен обработкой прерываний, а полезная пропускная способность сети низкая. Какое архитектурное решение наиболее уместно для устранения этой проблемы?", "options": ["Увеличить максимальный размер каждого пакета без правок прерываний", "Полностью отключить прерывания карты без замены их чем-либо", "Внедрить механизм NAPI — прерывания вместе с опросом карты", "Заменить сетевую карту на заведомо более медленную модель"], "correct": 2, "explain": "Это классическая проблема 'interrupt storm' при высокой сетевой нагрузке; NAPI и подобные гибридные механизмы (прерывание + опрос) — стандартное архитектурное решение, снижающее накладные расходы CPU при экстремальном трафике.", "usage": {"code": true, "without": "// CPU 100% на прерываниях, throughput низкий — IRQ на каждый пакет", "with": "if (napi_schedule_prep(&napi)) {\n  disable_irq(); __napi_schedule(&napi); // опрос под нагрузкой\n}", "benefit": "CPU возвращается к полезной работе."}}, {"q": "Инженер отлаживает сетевой драйвер и обнаруживает редкое повреждение данных, происходящее только при очень высокой сетевой нагрузке, но не воспроизводящееся при низкой. Какая причина наиболее вероятна с учётом асинхронной природы устройства?", "options": ["Такие ошибки нельзя диагностировать и устранить программно", "Проблема гарантированно вызвана только неисправностью кабеля", "Порча данных под нагрузкой никогда не связана с общими ресурсами", "Вероятна гонка между обработчиком прерывания и кодом драйвера"], "correct": 3, "explain": "Состояния гонки по своей природе проявляются чаще при более интенсивном параллелизме (частых прерываниях), что и объясняет, почему проблема воспроизводится именно при высокой, а не низкой нагрузке — типичный сценарий для отладки конкурентного доступа в драйверах.", "usage": {"code": true, "without": "// общий доступ к кольцу из IRQ и потока без блокировки — редкое повреждение только под нагрузкой", "with": "spin_lock_irqsave(&lock, f);\n/* работа с общей структурой */\nspin_unlock_irqrestore(&lock, f);", "benefit": "Корректность даже при частых прерываниях."}}, {"q": "Команда разрабатывает сетевое приложение с крайне низкими требованиями к задержке (например, для алгоритмической торговли) и обнаруживает, что стандартный путь через ядро ОС создаёт слишком большую задержку. Какой подход наиболее уместен?", "options": ["Проблема решается только увеличением объёма оперативной памяти", "Оставить путь через ядро — задержка ядра всегда пренебрежимо мала здесь", "Единственный выход — перейти на более медленную по частоте сеть", "Применить kernel-bypass (DPDK): прямой доступ к карте из userspace"], "correct": 3, "explain": "Приложения с экстремальными требованиями к задержке (высокочастотный трейдинг, некоторые телеком-задачи) часто используют DPDK или аналогичные kernel-bypass технологии именно для устранения накладных расходов стандартного пути обработки пакетов через ядро.", "usage": {"code": false, "without": "Путь через ядро добавляет прерывания и копирования — задержка слишком велика для алгоритмической торговли.", "with": "Kernel-bypass (DPDK) даёт приложению прямой доступ к карте из userspace.", "benefit": "Минимальная задержка на пакет."}}, {"q": "При тестировании нового сетевого адаптера с несколькими аппаратными очередями (multi-queue) на многоядерном сервере наблюдается, что вся нагрузка обрабатывается только одним ядром процессора, несмотря на наличие нескольких очередей. Какая настройка, вероятно, была упущена?", "options": ["Multi-queue карты физически не умеют распределять нагрузку по ядрам", "Не настроены RSS или привязка IRQ affinity к ядрам процессора", "Использование нескольких очередей никогда не требует настройки", "Проблема связана только с процессором, а не с картой или драйвером"], "correct": 1, "explain": "Наличие аппаратных возможностей multi-queue не гарантирует их автоматического использования — часто требуется явная настройка RSS/IRQ affinity, чтобы драйвер и ОС действительно распределяли обработку трафика между разными ядрами процессора.", "usage": {"code": false, "without": "Карта multi-queue, но весь трафик обрабатывает одно ядро — RSS и IRQ affinity не настроены.", "with": "Настраиваем RSS и привязку IRQ к ядрам — очереди раскидываются по разным ядрам.", "benefit": "Реальная загрузка всех ядер."}}, {"q": "Разработчик драйвера сетевой карты хочет уменьшить задержку копирования больших объёмов данных между сетевой картой и приложением. Какая техника наиболее уместна?", "options": ["Увеличить число промежуточных копий данных ради надёжности", "Применить zero-copy, сократив число копий буфера при передаче", "Заменить DMA на программный ввод-вывод PIO ради предсказуемости", "Полностью отказаться от буферов памяти при передаче данных"], "correct": 1, "explain": "Zero-copy техники напрямую нацелены на уменьшение числа затратных операций копирования данных между слоями стека (устройство → ядро → приложение), что снижает задержку и нагрузку на процессор/память при передаче больших объёмов данных.", "usage": {"code": true, "without": "read(in, buf, n);\nwrite(out, buf, n); // данные копируются в userspace и обратно", "with": "sendfile(out, in, NULL, n);\n// данные идут напрямую, без копий в приложение", "benefit": "Ниже задержка и нагрузка на память."}}, {"q": "При подключении нового сетевого адаптера операционная система не может автоматически найти подходящий драйвер, хотя устройство физически подключено корректно. Какая наиболее вероятная причина?", "options": ["Нет драйвера, заявляющего поддержку PCI Vendor/Device ID этой карты", "ОС никогда не использует идентификаторы устройств для подбора драйверов", "Драйверы сетевых карт не привязываются к конкретным моделям", "Проблема всегда только в физической поломке самого устройства"], "correct": 0, "explain": "Если ни один установленный драйвер не заявляет поддержку конкретного Vendor/Device ID нового устройства, автоматическое сопоставление не сработает, и потребуется вручную установить корректный драйвер, поддерживающий это оборудование.", "usage": {"code": false, "without": "Карта воткнута, но ни один установленный драйвер не заявляет её vendor/device ID — ОС не подберёт драйвер.", "with": "Ставим драйвер производителя с нужной таблицей ID, и сопоставление срабатывает.", "benefit": "Устройство определяется автоматически."}}, {"q": "Специалист по производительности обнаруживает, что при передаче большого файла по сети процессор сильно загружен, хотя используется современная сетевая карта с поддержкой DMA. Какая настройка или проблема наиболее вероятно объясняет это?", "options": ["Высокая загрузка CPU при передаче не связана с настройками драйвера", "DMA всегда гарантирует нулевую нагрузку на CPU при любых настройках", "Карты с DMA физически не способны создавать нагрузку на процессор", "Не включён offload контрольных сумм и сегментации — их считает CPU"], "correct": 3, "explain": "Помимо DMA, современные сетевые карты часто поддерживают offloading (разгрузку) вычисления контрольных сумм, сегментации TCP и других задач на аппаратный уровень; если эти функции не задействованы (отключены или не поддерживаются драйвером), процессор берёт на себя дополнительную работу, увеличивая нагрузку.", "usage": {"code": false, "without": "DMA включён, но контрольные суммы и сегментацию считает CPU — он загружен при передаче файла.", "with": "Включаем offload (tx-checksum, TSO) на карте, снимая эту работу с процессора.", "benefit": "CPU разгружен при передаче больших данных."}}, {"q": "При обновлении ядра операционной системы старый сетевой драйвер перестал загружаться с ошибкой гостю почти прямой доступ к устройству, минуя эмуляцию.", "benefit": "Сеть в VM близко к скорости железа."}}, {"q": "После обновления драйвера сетевой карты администратор заметил случайные, трудновоспроизводимые зависания системы под высокой сетевой нагрузкой, которых не было в предыдущей версии драйвера. Какой подход к диагностике наиболее уместен в первую очередь?", "options": ["Немедленно переустановить всю операционную систему без анализа", "Заменить сетевую карту другой моделью без диагностики причины", "Проверить changelog, откатить версию и изучить логи ядра на паники", "Игнорировать: зависания под нагрузкой нормальны для любого драйвера"], "correct": 2, "explain": "Стандартный подход к диагностике регрессии после обновления — сначала подтвердить, что именно новая версия драйвера является причиной (откат для сравнения), и изучить системные логи на предмет конкретных ошибок ядра, прежде чем переходить к более радикальным мерам, таким как замена оборудования.", "usage": {"code": false, "without": "Новая версия драйвера вешает систему под нагрузкой, причину гадаем вслепую и сразу меняем железо.", "with": "Откатываемся на старую версию для подтверждения связи и читаем логи ядра на предмет паник.", "benefit": "Быстрая локализация регрессии."}}, {"q": "Сетевая карта передаёт данные с пропускной способностью 10 Гбит/с. Сколько это примерно в мегабайтах в секунду (округлённо, 1 байт = 8 бит)?", "options": ["10000 МБ/с", "250 МБ/с", "1250 МБ/с", "125 МБ/с"], "correct": 2, "explain": "10 Гбит/с = 10000 Мбит/с. 10000/8=1250 МБ/с.", "usage": {"code": true, "without": "// на глаз: 10 Гбит/с ~ 10000 МБ/с — забыли поделить на 8, ошибка в 8 раз", "with": "10000 Мбит/с / 8 = 1250 МБ/с", "benefit": "Корректный расчёт буферов и диска."}}, {"q": "Кольцевой буфер драйвера содержит 256 дескрипторов пакетов, каждый размером 2 КБ. Каков общий объём памяти, занимаемой буфером (без учёта служебных данных)?", "options": ["1024 КБ", "2048 КБ", "512 КБ", "256 КБ"], "correct": 2, "explain": "256×2 КБ=512 КБ.", "usage": {"code": true, "without": "// прикинули 256 КБ по числу дескрипторов, забыв размер каждого", "with": "256 * 2 КБ = 512 КБ", "benefit": "Точный размер памяти под кольцо."}}, {"q": "Сетевая карта генерирует одно прерывание на каждые 1000 полученных пакетов (interrupt coalescing). Если за секунду принято 1 000 000 пакетов, сколько прерываний будет сгенерировано за эту секунду?", "options": ["1000000", "100", "10000", "1000"], "correct": 3, "explain": "1000000/1000=1000 прерываний в секунду.", "usage": {"code": true, "without": "// испугались миллиона прерываний/с — посчитали без коалесинга", "with": "1000000 / 1000 = 1000 прерываний в секунду", "benefit": "Реальная оценка нагрузки от IRQ."}}, {"q": "DMA-контроллер передаёт блок данных размером 1 МБ со скоростью 500 МБ/с. Сколько миллисекунд займёт передача этого блока?", "options": ["5 мс", "2 мс", "20 мс", "0.5 мс"], "correct": 1, "explain": "Время=объём/скорость=1 МБ/500 МБ/с=0.002 с=2 мс.", "usage": {"code": true, "without": "// угадали 5 мс без формулы", "with": "t = 1 МБ / 500 МБ/с = 0.002 с = 2 мс", "benefit": "Точный бюджет времени DMA-передачи."}}, {"q": "Сетевой адаптер поддерживает 4 аппаратные очереди приёма (RX queues), равномерно распределённые между 4 ядрами процессора. Если общая нагрузка составляет 8 Гбит/с, сколько нагрузки в среднем приходится на одно ядро при идеальном распределении?", "options": ["2 Гбит/с", "1 Гбит/с", "4 Гбит/с", "8 Гбит/с"], "correct": 0, "explain": "8 Гбит/с / 4 ядра = 2 Гбит/с на ядро при равномерном распределении.", "usage": {"code": true, "without": "// решили, что одно ядро тянет все 8 Гбит/с", "with": "8 Гбит/с / 4 ядра = 2 Гбит/с на ядро", "benefit": "Видно, что нагрузка по ядрам подъёмна."}}, {"q": "Пакет Ethernet имеет максимальный размер полезной нагрузки (MTU) 1500 байт. Сколько пакетов потребуется для передачи файла размером 15 000 байт (без учёта заголовков)?", "options": ["5", "10", "15", "150"], "correct": 1, "explain": "15000/1500=10 пакетов.", "usage": {"code": true, "without": "// округлили до 5 пакетов наугад", "with": "15000 / 1500 = 10 пакетов", "benefit": "Точное число кадров для передачи."}}, {"q": "Драйвер сетевой карты использует технику interrupt coalescing с задержкой 100 микросекунд между группировкой прерываний. Сколько максимум таких групп прерываний может обработать система за 1 секунду (1 000 000 микросекунд)?", "options": ["1000", "100", "10000", "100000"], "correct": 2, "explain": "1000000 мкс / 100 мкс = 10000 групп прерываний в секунду (верхняя граница по этому параметру).", "usage": {"code": true, "without": "// не связали период 100 мкс с числом групп", "with": "1000000 мкс / 100 мкс = 10000 групп в секунду", "benefit": "Верхняя граница частоты обработки."}}, {"q": "Сервер использует zero-copy передачу и сокращает число копирований данных с 3 до 1 на каждый переданный пакет. Если раньше каждое копирование занимало 2 микросекунды, сколько микросекунд экономится на каждом пакете?", "options": ["8 мкс", "4 мкс", "2 мкс", "6 мкс"], "correct": 1, "explain": "Было 3 копирования × 2 мкс = 6 мкс, стало 1×2=2 мкс. Экономия: 6-2=4 мкс на пакет.", "usage": {"code": true, "without": "// было 3 копирования: 3 * 2 мкс = 6 мкс на пакет", "with": "// стало 1 копирование: 1 * 2 мкс = 2 мкс; экономия 6 - 2 = 4 мкс", "benefit": "4 мкс/пакет меньше задержки."}}, {"q": "При тестировании сетевой карты с пропускной способностью 25 Гбит/с передаётся файл размером 25 гигабит. Сколько секунд теоретически займёт передача (без учёта накладных расходов протокола)?", "options": ["2 секунды", "1 секунда", "25 секунд", "0.5 секунды"], "correct": 1, "explain": "25 гигабит / 25 Гбит/с = 1 секунда.", "usage": {"code": true, "without": "// спутали гигабиты и гигабайты — получили 8 с", "with": "25 гигабит / 25 Гбит/с = 1 с", "benefit": "Корректная оценка времени передачи."}}, {"q": "Сетевой адаптер обрабатывает в среднем 1.5 миллиона пакетов в секунду при среднем размере пакета 1000 байт. Какова примерная пропускная способность в мегабайтах в секунду?", "options": ["150 МБ/с", "500 МБ/с", "15000 МБ/с", "1500 МБ/с"], "correct": 3, "explain": "1.5 млн пакетов × 1000 байт = 1 500 000 000 байт = 1500 МБ/с.", "usage": {"code": true, "without": "// взяли 150 МБ/с, потеряв разряд", "with": "1500000 * 1000 = 1.5e9 байт = 1500 МБ/с", "benefit": "Точная пропускная способность."}}, {"q": "Драйвер использует batching (группировку) по 32 пакета перед обработкой прерывания. Если всего нужно обработать 128000 пакетов, сколько потребуется циклов обработки батчей?", "options": ["400", "8000", "4000", "2000"], "correct": 2, "explain": "128000/32=4000 батчей (циклов обработки).", "usage": {"code": true, "without": "// прикинули 8000 без деления на размер батча", "with": "128000 / 32 = 4000 батчей", "benefit": "Точное число циклов обработки."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
