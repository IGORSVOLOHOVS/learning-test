<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сетевые драйверы</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/network_drivers.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Сетевые драйверы</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "network_drivers";
  const QUESTIONS = [{"q": "Что такое драйвер устройства (device driver) в операционной системе?", "options": ["Часть BIOS/UEFI материнской платы", "Прикладная программа для просмотра видео", "Файл конфигурации сети", "Программный компонент, обеспечивающий взаимодействие операционной системы с конкретным аппаратным устройством"], "correct": 3, "explain": "Драйвер — программный слой, транслирующий стандартные вызовы ОС в конкретные команды для аппаратного устройства (в данном случае сетевого адаптера) и обратно."}, {"q": "В чём заключается основная задача сетевого драйвера (NIC driver)?", "options": ["Управление файловой системой диска", "Отображение графического интерфейса пользователя", "Компиляция кода приложений", "Обеспечение взаимодействия сетевой карты (NIC) с сетевым стеком операционной системы"], "correct": 3, "explain": "Сетевой драйвер управляет сетевым адаптером на низком уровне: приём/передача пакетов, настройка регистров устройства, обработка прерываний."}, {"q": "Что такое режим ядра (kernel mode) в контексте работы драйверов?", "options": ["Режим работы с максимальными привилегиями, в котором обычно выполняется код драйверов и ядра ОС", "Режим энергосбережения процессора", "Режим тестирования графического интерфейса", "Режим работы обычных пользовательских приложений с ограниченными правами"], "correct": 0, "explain": "Kernel mode даёт коду прямой доступ к аппаратуре и памяти системы, что необходимо большинству драйверов для эффективного управления устройствами."}, {"q": "Что такое прерывание (interrupt) в контексте работы сетевого адаптера?", "options": ["Полная остановка работы операционной системы", "Метод сжатия данных перед отправкой по сети", "Сигнал от устройства процессору, сообщающий о событии, требующем внимания (например, о получении нового пакета)", "Способ шифрования сетевого трафика"], "correct": 2, "explain": "Прерывание — механизм, позволяющий устройству асинхронно уведомить процессор о событии (например, о готовности данных), не заставляя ОС постоянно опрашивать устройство в цикле."}, {"q": "Что такое DMA (Direct Memory Access) применительно к сетевым картам?", "options": ["Метод адресации IP-пакетов", "Протокол шифрования данных в сети", "Способ сжатия видеопотока", "Технология, позволяющая устройству напрямую читать/записывать данные в оперативную память, минуя постоянное участие процессора"], "correct": 3, "explain": "DMA позволяет сетевой карте самостоятельно передавать данные пакетов в оперативную память и обратно, освобождая процессор от копирования данных байт за байтом."}, {"q": "Что такое буфер приёма/передачи (RX/TX buffer, кольцевой буфер) в драйвере сетевой карты?", "options": ["Область памяти, временно хранящая пакеты данных при приёме или передаче до их полной обработки", "Файл конфигурации IP-адреса", "Модуль антивирусной проверки трафика", "Физический разъём для подключения сетевого кабеля"], "correct": 0, "explain": "Кольцевые буферы (ring buffers) RX/TX используются драйвером и сетевой картой для организации очереди пакетов на приём и передачу без потери данных при временной перегрузке."}, {"q": "Что такое MAC-адрес сетевой карты?", "options": ["IP-адрес компьютера в локальной сети", "Уникальный аппаратный идентификатор сетевого интерфейса на канальном уровне", "Пароль для подключения к Wi-Fi сети", "Название производителя операционной системы"], "correct": 1, "explain": "MAC-адрес — уникальный (в теории) идентификатор сетевого адаптера, используемый на канальном уровне (Ethernet) для адресации кадров в локальной сети."}, {"q": "Какова роль сетевого стека операционной системы (network stack) по отношению к драйверу сетевой карты?", "options": ["Сетевой стек управляет исключительно графическим интерфейсом сетевых настроек", "Драйвер и сетевой стек — синонимы одного и того же компонента", "Сетевой стек реализует протоколы более высоких уровней (IP, TCP/UDP), передавая и принимая данные через интерфейс, предоставляемый драйвером", "Сетевой стек полностью заменяет собой необходимость в драйвере устройства"], "correct": 2, "explain": "Сетевой стек ОС (реализующий TCP/IP и другие протоколы) взаимодействует с драйвером как с абстрактным интерфейсом для отправки/приёма сырых кадров, не заботясь о специфике конкретного оборудования."}, {"q": "Что такое NAPI (New API) в контексте linux-драйверов сетевых карт?", "options": ["Механизм, комбинирующий прерывания и опрос (polling) для эффективной обработки сетевого трафика при высокой нагрузке", "Формат сетевых пакетов IPv6", "Утилита для настройки firewall", "Протокол шифрования Wi-Fi"], "correct": 0, "explain": "NAPI — механизм в ядре Linux, позволяющий драйверу переключаться между прерываниями (при низкой нагрузке) и опросом устройства (при высокой), снижая накладные расходы на обработку большого числа прерываний."}, {"q": "Что означает термин 'привязка драйвера' (driver binding) к устройству в операционной системе?", "options": ["Настройка IP-адреса вручную пользователем", "Физическое подключение сетевого кабеля к разъёму", "Процесс установки антивирусного ПО", "Процесс сопоставления конкретного драйвера конкретному обнаруженному аппаратному устройству по идентификаторам (например, PCI Vendor/Device ID)"], "correct": 3, "explain": "При обнаружении устройства (например, через PCI) ОС ищет подходящий драйвер, сопоставляя идентификаторы устройства (vendor/device ID) с драйверами, заявляющими поддержку соответствующего оборудования."}, {"q": "Почему сетевые драйверы обычно работают в режиме ядра, а не в пользовательском пространстве, несмотря на риски для стабильности системы?", "options": ["Драйверы никогда не работают в режиме ядра ни в одной операционной системе", "Пользовательский режим обеспечивает более быстрый доступ к устройствам, чем режим ядра", "Прямой, низколатентный доступ к аппаратуре (регистрам устройства, DMA, обработке прерываний) требует привилегий уровня ядра, а переключение в пользовательский режим для каждой операции добавило бы существенные накладные расходы", "Режим ядра выбирается исключительно по историческим причинам без технического обоснования"], "correct": 2, "explain": "Прямое взаимодействие с аппаратурой (регистры, прерывания, DMA) исторически и архитектурно требует привилегий ядра для минимизации задержек; современные подходы (например, DPDK, io_uring) частично переносят часть логики в userspace ради иных компромиссов."}, {"q": "Почему использование прерываний для каждого входящего пакета становится неэффективным при очень высокой сетевой нагрузке (например, десятки гигабит в секунду)?", "options": ["Прерывания никогда не создают накладных расходов независимо от их частоты", "Высокая сетевая нагрузка снижает частоту прерываний автоматически без вмешательства драйвера", "Каждое прерывание требует переключения контекста процессора, и при огромном количестве пакетов в секунду накладные расходы на обработку самих прерываний могут превысить полезную работу по обработке данных ('interrupt storm')", "Обработка прерываний не связана с производительностью процессора"], "correct": 2, "explain": "При высокой частоте пакетов число прерываний может стать настолько большим, что процессор тратит большую часть времени на обработку самих прерываний (переключение контекста), а не на полезную обработку данных — отсюда необходимость механизмов вроде NAPI или интерфейсной группировки прерываний (interrupt coalescing)."}, {"q": "Как DMA снижает нагрузку на процессор по сравнению с программным вводом-выводом (PIO), при котором каждый байт данных копируется процессором вручную?", "options": ["DMA всегда работает медленнее, чем программное копирование данных процессором", "DMA технически невозможно применить к сетевым устройствам", "DMA позволяет сетевой карте напрямую читать/записывать данные в память по заранее настроенным адресам без постоянного участия процессора в каждом отдельном байте передачи, освобождая процессор для других задач", "Процессор при использовании DMA всё равно должен вручную копировать каждый байт данных"], "correct": 2, "explain": "При PIO процессор должен активно участвовать в передаче каждого байта данных между устройством и памятью, тогда как DMA позволяет устройству асинхронно работать с памятью напрямую, значительно снижая нагрузку на CPU при больших объёмах данных."}, {"q": "Почему кольцевые буферы (ring buffers) в драйверах сетевых карт спроектированы именно как кольцевая (циклическая), а не линейная структура?", "options": ["Кольцевые буферы медленнее линейных структур при любых условиях нагрузки", "Линейная структура данных всегда эффективнее для сетевых буферов", "Циклическая структура выбрана произвольно, без связи с производительностью", "Кольцевая структура позволяет эффективно и непрерывно переиспользовать фиксированный набор буферов по кругу без постоянного выделения и освобождения памяти, что критично для производительности при непрерывном потоке пакетов"], "correct": 3, "explain": "Кольцевая (циклическая) структура позволяет драйверу и устройству непрерывно переиспользовать один и тот же набор дескрипторов/буферов без постоянных затрат на выделение новой памяти для каждого пакета, что важно для высокой пропускной способности."}, {"q": "Почему обработчик прерывания (interrupt handler) сетевого драйвера обычно спроектирован так, чтобы выполнять минимум работы немедленно, откладывая основную обработку (например, через 'нижнюю половину' — bottom half/tasklet/softirq)?", "options": ["Обработчик прерывания выполняется с высоким приоритетом и блокирует другие прерывания, поэтому долгое выполнение внутри него может задержать обработку других важных системных событий — тяжёлую работу выносят в отложенный контекст", "Разделение на верхнюю и нижнюю половину обработки прерывания не влияет на производительность системы", "Отложенная обработка прерываний технически невозможна в современных ОС", "Обработчик прерывания всегда должен выполнять всю обработку пакета целиком немедленно без каких-либо отложенных механизмов"], "correct": 0, "explain": "Классическая архитектура разделения обработки прерывания на 'верхнюю половину' (быстрая, минимальная реакция) и 'нижнюю половину' (полная обработка в менее приоритетном контексте) минимизирует время, в течение которого блокируются другие прерывания и системные события."}, {"q": "Как привязка драйвера к устройству по PCI Vendor/Device ID помогает операционной системе автоматически подобрать нужный драйвер при подключении нового сетевого адаптера?", "options": ["Идентификаторы PCI устройства используются только для отображения в диспетчере устройств, но не для выбора драйвера", "Операционная система всегда требует ручного указания драйвера для любого сетевого адаптера", "Vendor/Device ID определяют исключительно физический размер платы адаптера", "Каждое устройство сообщает уникальную комбинацию идентификаторов производителя и модели, и ОС сопоставляет её с таблицей поддерживаемых идентификаторов, заявленной каждым установленным драйвером, находя подходящее соответствие"], "correct": 3, "explain": "Автоматическое определение оборудования (Plug and Play) во многом опирается именно на эти идентификаторы: ОС читает их с устройства при перечислении шины PCI и ищет драйвер, объявивший поддержку такой комбинации ID."}, {"q": "Почему многие современные сетевые карты поддерживают несколько аппаратных очередей приёма/передачи (multi-queue), и как это связано с многоядерными процессорами?", "options": ["Несколько независимых очередей позволяют распределять обработку сетевого трафика между разными ядрами процессора параллельно, избегая узкого места одного ядра/очереди при высокой пропускной способности сети", "Одна очередь всегда эффективнее нескольких при любом уровне сетевой нагрузки", "Многоядерные процессоры никогда не выигрывают от использования нескольких сетевых очередей", "Множественные очереди используются только для резервного копирования данных, а не для параллельной обработки"], "correct": 0, "explain": "Multi-queue NIC (в сочетании с технологиями вроде RSS — Receive Side Scaling) распределяет входящие потоки пакетов по разным очередям, каждая из которых может обрабатываться отдельным ядром процессора, масштабируя пропускную способность обработки сетевого трафика на многоядерных системах."}, {"q": "Почему разработчики высокопроизводительных сетевых приложений иногда используют технологии типа DPDK (Data Plane Development Kit), полностью обходящие стандартный путь через ядро и обычный драйвер?", "options": ["DPDK предназначен исключительно для настройки графического интерфейса сетевых настроек", "Стандартный путь через ядро операционной системы никогда не создаёт накладных расходов", "DPDK всегда работает медленнее стандартного драйвера ядра при любых условиях", "DPDK позволяет приложению напрямую работать с сетевой картой из пользовательского пространства через poll-mode драйверы, избегая накладных расходов на прерывания, переключения контекста и копирование данных через ядро, что даёт значительно более высокую пропускную способность и низкую задержку"], "correct": 3, "explain": "DPDK и подобные фреймворки жертвуют универсальностью и безопасностью стандартного пути обработки пакетов через ядро ради экстремальной производительности, необходимой, например, в сетевом оборудовании телеком-операторов и высокочастотном трейдинге."}, {"q": "Как понятие 'zero-copy' в сетевых драйверах связано с общей идеей минимизации накладных расходов при передаче данных между устройством, ядром и приложением?", "options": ["Копирование данных между буферами никогда не создаёт заметных накладных расходов", "Zero-copy старается избежать лишних копирований данных пакета между разными буферами (устройство → буфер ядра → буфер приложения), напрямую передавая указатели на память вместо физического копирования содержимого, что экономит процессорное время и пропускную способность памяти", "Zero-copy технологии применимы только к файловым системам, но не к сетевым драйверам", "Zero-copy означает, что данные вообще не передаются по сети"], "correct": 1, "explain": "Каждое копирование крупного блока данных в памяти стоит времени процессора и пропускной способности памяти; zero-copy техники (например, передача указателей вместо копий, или sendfile) минимизируют число таких копирований на пути данных от устройства до приложения."}, {"q": "Почему при разработке драйвера важно тщательно обрабатывать состояние гонки (race condition) между обработчиком прерывания и основным потоком выполнения драйвера, обращающимися к общим структурам данных (например, кольцевому буферу)?", "options": ["Состояния гонки возможны только в пользовательских приложениях, но не в коде драйверов ядра", "Прерывание может произойти в любой момент, в том числе во время работы основного кода драйвера с теми же данными, и без должной синхронизации (блокировок, атомарных операций) это может привести к повреждению данных или непредсказуемому поведению системы", "Синхронизация доступа к общим данным не имеет значения для стабильности драйвера", "Обработчик прерывания и основной код драйвера никогда не обращаются к одним и тем же данным одновременно"], "correct": 1, "explain": "Асинхронная природа прерываний означает, что обработчик может прервать выполнение основного кода драйвера в произвольный момент; без корректной синхронизации совместный доступ к общим структурам (например, кольцевому буферу) может привести к повреждению данных, зависаниям или крашу системы."}, {"q": "Как взаимодействуют между собой уровни архитектуры сетевого стека: приложение, сокеты, протокольный стек (TCP/IP), драйвер и физическое устройство — почему изменения на одном уровне обычно не требуют изменений на других?", "options": ["Все уровни сетевого стека жёстко связаны друг с другом, и изменение любого требует переписывания остальных", "Разделение на уровни в сетевом стеке — чисто концептуальная идея, не отражающая реальную архитектуру ОС", "Каждый уровень предоставляет вышестоящему уровню стандартизированный интерфейс, скрывая детали реализации нижних уровней — это позволяет, например, заменить сетевую карту (и её драйвер) без изменения кода приложения или протокольного стека", "Драйвер сетевой карты должен напрямую знать детали реализации протокола TCP приложения"], "correct": 2, "explain": "Многоуровневая архитектура сетевого стека (по аналогии с моделью OSI) — классический пример инкапсуляции: каждый слой скрывает детали реализации от соседних, что позволяет независимо развивать и заменять компоненты (например, драйвер конкретной сетевой карты) без изменений в вышестоящих слоях."}, {"q": "Почему разработка драйверов часто использует чётко определённый программный интерфейс (API) взаимодействия с ядром, а не произвольный, специфичный для каждого драйвера способ?", "options": ["Стандартизированный API позволяет ядру единообразно управлять множеством разных драйверов (загрузка, выгрузка, обработка прерываний), а также упрощает разработку и поддержку новых драйверов, следующих общим соглашениям", "Каждый драйвер обязательно должен изобретать собственный уникальный способ взаимодействия с ядром без каких-либо общих соглашений", "Стандартизация API драйверов не даёт никаких практических преимуществ", "Ядро операционной системы никогда не предоставляет стандартного интерфейса для драйверов"], "correct": 0, "explain": "Стандартизированные интерфейсы (например, struct net_device_ops в Linux) позволяют ядру единообразно взаимодействовать с любым сетевым драйвером, что упрощает как разработку новых драйверов, так и поддержку/эволюцию самого ядра."}, {"q": "Как компромисс между задержкой (latency) и пропускной способностью (throughput) проявляется в архитектурном выборе между обработкой пакетов 'по одному, сразу' и батчевой обработкой (группировкой) пакетов в драйвере?", "options": ["Немедленная обработка каждого пакета минимизирует задержку отдельного пакета, но увеличивает накладные расходы на пакет, тогда как батчевая обработка группы пакетов снижает накладные расходы (выше пропускная способность), но может немного увеличить задержку отдельных пакетов, ожидающих накопления батча", "Батчевая обработка пакетов всегда даёт как меньшую задержку, так и большую пропускную способность одновременно", "Способ обработки пакетов (по одному или батчами) не влияет ни на задержку, ни на пропускную способность", "Задержка и пропускная способность всегда изменяются в одном и том же направлении без компромисса"], "correct": 0, "explain": "Классический компромисс сетевых систем: обработка пакетов небольшими батчами амортизирует накладные расходы (переключение контекста, прерывания) на большее число пакетов, повышая throughput, но за счёт небольшого увеличения задержки отдельных пакетов, ожидающих накопления батча."}, {"q": "Почему архитектура с раздельными очередями приёма и передачи (RX и TX) в сетевой карте логически необходима, а не достаточно одной общей очереди?", "options": ["Раздельные очереди приёма и передачи используются только для увеличения объёма занимаемой памяти без функциональной пользы", "Приём и передача данных — асинхронные, независимые по направлению процессы, которые могут происходить одновременно с разной скоростью, и раздельные очереди позволяют драйверу независимо управлять каждым направлением без взаимной блокировки", "Одна общая очередь всегда работает эффективнее раздельных очередей RX/TX", "Приём и передача данных всегда происходят строго последовательно, никогда одновременно"], "correct": 1, "explain": "Полнодуплексная связь предполагает одновременный независимый приём и передачу данных; отдельные очереди позволяют драйверу и аппаратуре обрабатывать оба направления параллельно без взаимной блокировки одного процесса другим."}, {"q": "Как выбор между polling (постоянным опросом состояния устройства) и interrupt-driven (управляемым прерываниями) подходом влияет на энергопотребление и задержку системы?", "options": ["Выбор между polling и interrupt-driven подходом не влияет на энергопотребление системы", "Polling всегда одновременно снижает и задержку, и энергопотребление по сравнению с прерываниями", "Использование прерываний всегда даёт наименьшую возможную задержку по сравнению с любым видом опроса", "Polling даёт минимальную задержку реакции (устройство проверяется постоянно), но потребляет больше энергии процессора даже при отсутствии активности, тогда как interrupt-driven подход экономит энергию в режиме ожидания ценой небольшой дополнительной задержки на обработку самого прерывания"], "correct": 3, "explain": "Это классический архитектурный компромисс встраиваемых и сетевых систем: непрерывный опрос даёт предсказуемо низкую задержку ценой постоянной загрузки процессора (и энергопотребления), тогда как прерывания эффективнее в режиме простоя, но добавляют небольшую задержку реакции на событие."}, {"q": "Почему архитектура offloading (разгрузки вычислений на аппаратный уровень сетевой карты, например, вычисление контрольных сумм или сегментация TCP) считается удачным разделением ответственности между драйвером/ОС и аппаратурой?", "options": ["Offloading всегда замедляет обработку данных по сравнению с выполнением тех же вычислений на процессоре", "Вычислительно затратные, но алгоритмически простые и повторяющиеся операции (контрольные суммы, разбиение крупных пакетов) эффективнее выполнять специализированной аппаратной логикой сетевой карты, освобождая процессор общего назначения для более сложных и разнообразных задач", "Аппаратный offloading неприменим к сетевым картам, только к видеокартам", "Разделение ответственности между аппаратурой и процессором не имеет отношения к производительности системы"], "correct": 1, "explain": "Архитектурный принцип разделения труда: специализированное аппаратное ускорение эффективно справляется с простыми, но частыми и вычислительно затратными операциями, освобождая универсальный процессор для более гибких задач — классический паттерн, применяемый не только в сетевых картах, но и, например, в GPU."}, {"q": "Как модель драйвера с чётким разделением на 'общий' (generic) и 'специфичный для устройства' (device-specific) код облегчает поддержку множества разных моделей сетевых карт в рамках одной операционной системы?", "options": ["Общий код реализует стандартные интерфейсы взаимодействия с сетевым стеком ОС и повторно используется для многих устройств, тогда как специфичный для конкретной модели код инкапсулирует особенности работы с конкретными регистрами и возможностями данного чипа", "Разделение на общий и специфичный код только усложняет разработку драйверов без каких-либо преимуществ", "Каждый сетевой драйвер должен полностью независимо реализовывать всю логику взаимодействия с сетевым стеком с нуля без переиспользования кода", "Специфичный для устройства код драйвера никогда не может быть отделён от общей логики ОС"], "correct": 0, "explain": "Многоуровневая архитектура драйверов (общий фреймворк + специфичные для конкретного чипа реализации) — распространённый архитектурный паттерн, позволяющий переиспользовать значительную часть кода (взаимодействие с сетевым стеком, управление очередями) между драйверами разных производителей."}, {"q": "Почему буферизация на нескольких уровнях (аппаратный буфер сетевой карты, буфер драйвера, буфер сокета приложения) считается разумным архитектурным решением, а не избыточным дублированием?", "options": ["Буферизация на нескольких уровнях одновременно всегда является избыточной и не даёт никакой практической пользы", "Буферы на разных уровнях системы всегда абсолютно синхронизированы и работают как единый буфер", "Наличие более одного уровня буферизации гарантированно замедляет всю систему без исключений", "Каждый уровень буферизации сглаживает временные несоответствия скорости между соседними компонентами системы (сеть, драйвер, приложение), позволяя всей цепочке работать устойчиво даже при кратковременных всплесках или задержках обработки на одном из уровней"], "correct": 3, "explain": "Каждый уровень буферизации решает свою локальную задачу сглаживания рассинхронизации скоростей между соседними компонентами (сетевая карта ↔ драйвер ↔ приложение), и такая многоуровневая амортизация — распространённый и оправданный архитектурный паттерн в системах с разной скоростью обработки на разных уровнях."}, {"q": "Как понимание модульной архитектуры драйверов (возможность динамической загрузки/выгрузки во время работы системы, например, модули ядра Linux) влияет на удобство обслуживания и обновления сетевого оборудования?", "options": ["Модульность архитектуры драйверов не влияет на удобство их обновления или замены", "Динамически загружаемые модули позволяют обновлять, заменять или отлаживать драйвер сетевой карты без полной перезагрузки или пересборки всего ядра операционной системы, что существенно упрощает сопровождение системы", "Динамическая загрузка модулей ядра технически невозможна для сетевых драйверов", "Драйверы всегда должны быть встроены непосредственно в ядро при его компиляции без возможности динамической загрузки"], "correct": 1, "explain": "Возможность загружать и выгружать драйвер как отдельный модуль ядра (например, insmod/rmmod в Linux) без пересборки всего ядра — важное архитектурное решение, значительно упрощающее разработку, отладку и эксплуатационное обслуживание системы."}, {"q": "Разработчик драйвера сетевой карты заметил, что при очень высокой сетевой нагрузке процессор почти полностью загружен обработкой прерываний, а полезная пропускная способность сети низкая. Какое архитектурное решение наиболее уместно для устранения этой проблемы?", "options": ["Увеличить размер каждого отдельного сетевого пакета до максимально возможного без изменения логики обработки прерываний", "Полностью отключить все прерывания от сетевой карты без какой-либо альтернативной обработки трафика", "Внедрить механизм наподобие NAPI (переключение между прерываниями и опросом устройства) для снижения накладных расходов на обработку избыточного числа прерываний при высокой нагрузке", "Единственное решение — заменить сетевую карту на более медленную модель"], "correct": 2, "explain": "Это классическая проблема 'interrupt storm' при высокой сетевой нагрузке; NAPI и подобные гибридные механизмы (прерывание + опрос) — стандартное архитектурное решение, снижающее накладные расходы CPU при экстремальном трафике."}, {"q": "Инженер отлаживает сетевой драйвер и обнаруживает редкое повреждение данных, происходящее только при очень высокой сетевой нагрузке, но не воспроизводящееся при низкой. Какая причина наиболее вероятна с учётом асинхронной природы устройства?", "options": ["Такие ошибки невозможно диагностировать и решить программными средствами", "Проблема гарантированно вызвана исключительно неисправностью физического сетевого кабеля", "Повреждение данных при высокой нагрузке никогда не связано с параллельным доступом к общим ресурсам", "Вероятно, присутствует состояние гонки (race condition) между обработчиком прерывания и основным кодом драйвера при обращении к общим структурам данных, которое проявляется чаще при высокой частоте событий"], "correct": 3, "explain": "Состояния гонки по своей природе проявляются чаще при более интенсивном параллелизме (частых прерываниях), что и объясняет, почему проблема воспроизводится именно при высокой, а не низкой нагрузке — типичный сценарий для отладки конкурентного доступа в драйверах."}, {"q": "Команда разрабатывает сетевое приложение с крайне низкими требованиями к задержке (например, для алгоритмической торговли) и обнаруживает, что стандартный путь через ядро ОС создаёт слишком большую задержку. Какой подход наиболее уместен?", "options": ["Проблема решается только увеличением объёма оперативной памяти сервера", "Оставить стандартный путь через ядро без изменений, так как задержка ядра всегда пренебрежимо мала", "Единственное решение — использовать более медленную по частоте сеть для снижения нагрузки", "Использовать технологии обхода ядра, такие как DPDK, для прямой работы с сетевой картой из пользовательского пространства, минимизируя накладные расходы стандартного сетевого стека"], "correct": 3, "explain": "Приложения с экстремальными требованиями к задержке (высокочастотный трейдинг, некоторые телеком-задачи) часто используют DPDK или аналогичные kernel-bypass технологии именно для устранения накладных расходов стандартного пути обработки пакетов через ядро."}, {"q": "При тестировании нового сетевого адаптера с несколькими аппаратными очередями (multi-queue) на многоядерном сервере наблюдается, что вся нагрузка обрабатывается только одним ядром процессора, несмотря на наличие нескольких очередей. Какая настройка, вероятно, была упущена?", "options": ["Multi-queue сетевые карты физически неспособны распределять нагрузку между несколькими ядрами процессора", "Настройка распределения прерываний/потоков между очередями и ядрами (например, RSS — Receive Side Scaling или ручная привязка IRQ affinity), без которой драйвер может по умолчанию использовать только одну очередь/ядро", "Использование нескольких очередей никогда не требует какой-либо дополнительной настройки", "Проблема связана исключительно с самим процессором, а не с настройкой сетевой карты или драйвера"], "correct": 1, "explain": "Наличие аппаратных возможностей multi-queue не гарантирует их автоматического использования — часто требуется явная настройка RSS/IRQ affinity, чтобы драйвер и ОС действительно распределяли обработку трафика между разными ядрами процессора."}, {"q": "Разработчик драйвера сетевой карты хочет уменьшить задержку копирования больших объёмов данных между сетевой картой и приложением. Какая техника наиболее уместна?", "options": ["Увеличение числа промежуточных копирований данных для повышения надёжности передачи", "Реализация zero-copy передачи данных, минимизирующей число промежуточных копирований буфера между устройством, ядром и приложением", "Замена DMA на программный ввод-вывод (PIO) для большей предсказуемости", "Полный отказ от использования буферов памяти при передаче сетевых данных"], "correct": 1, "explain": "Zero-copy техники напрямую нацелены на уменьшение числа затратных операций копирования данных между слоями стека (устройство → ядро → приложение), что снижает задержку и нагрузку на процессор/память при передаче больших объёмов данных."}, {"q": "При подключении нового сетевого адаптера операционная система не может автоматически найти подходящий драйвер, хотя устройство физически подключено корректно. Какая наиболее вероятная причина?", "options": ["В системе отсутствует драйвер, заявляющий поддержку конкретной комбинации PCI Vendor/Device ID этого устройства — требуется установка соответствующего драйвера от производителя", "Операционные системы никогда не используют идентификаторы устройств для подбора драйверов", "Драйверы для сетевых карт не привязываются к конкретным моделям устройств", "Проблема всегда связана исключительно с повреждением самого физического устройства"], "correct": 0, "explain": "Если ни один установленный драйвер не заявляет поддержку конкретного Vendor/Device ID нового устройства, автоматическое сопоставление не сработает, и потребуется вручную установить корректный драйвер, поддерживающий это оборудование."}, {"q": "Специалист по производительности обнаруживает, что при передаче большого файла по сети процессор сильно загружен, хотя используется современная сетевая карта с поддержкой DMA. Какая настройка или проблема наиболее вероятно объясняет это?", "options": ["Высокая загрузка процессора при передаче файлов никогда не связана с настройками сетевого драйвера", "Использование DMA всегда гарантирует нулевую нагрузку на процессор независимо от других настроек", "Современные сетевые карты с DMA физически не могут создавать нагрузку на процессор", "Возможно, DMA не задействован эффективно (например, из-за настроек драйвера или использования устаревшего режима PIO), или задача разгрузки контрольных сумм/сегментации (offloading) на сетевую карту не включена, из-за чего процессор дополнительно занят этой работой"], "correct": 3, "explain": "Помимо DMA, современные сетевые карты часто поддерживают offloading (разгрузку) вычисления контрольных сумм, сегментации TCP и других задач на аппаратный уровень; если эти функции не задействованы (отключены или не поддерживаются драйвером), процессор берёт на себя дополнительную работу, увеличивая нагрузку."}, {"q": "При обновлении ядра операционной системы старый сетевой драйвер перестал загружаться с ошибкой несовместимости интерфейсов. Какая наиболее вероятная причина этой проблемы?", "options": ["Драйверы сетевых карт никогда не зависят от конкретной версии ядра операционной системы", "Ошибки совместимости драйверов с версией ядра невозможны в принципе", "Внутренние интерфейсы (API) ядра, используемые драйвером, могли измениться между версиями ядра, и драйвер, скомпилированный или написанный под старый интерфейс, требует обновления/перекомпиляции под новую версию ядра", "Проблема всегда означает физическую поломку сетевого адаптера"], "correct": 2, "explain": "В отличие от пользовательских приложений с более стабильным ABI, внутренние интерфейсы ядра (особенно в Linux) могут меняться между версиями, что требует пересборки или адаптации драйверов под конкретную версию ядра — частая причина проблем совместимости при обновлении системы."}, {"q": "Команда разрабатывает виртуализированную инфраструктуру и замечает существенное падение производительности сети внутри виртуальных машин по сравнению с физическим сервером. Какой архитектурный аспект, связанный с драйверами, наиболее вероятно объясняет это падение?", "options": ["Дополнительный уровень виртуализации сетевого драйвера (виртуальный NIC, эмуляция или паравиртуализация) добавляет накладные расходы по сравнению с прямым доступом к физическому устройству — решения вроде SR-IOV или паравиртуализированных драйверов (virtio) призваны уменьшить этот разрыв", "Падение производительности сети внутри виртуальных машин всегда означает аппаратную неисправность сервера", "Виртуализация никогда не влияет на производительность сетевых драйверов", "Виртуальные машины физически не могут использовать сетевые драйверы"], "correct": 0, "explain": "Виртуализация добавляет промежуточный слой (гипервизор, эмуляция устройства) между гостевой ОС и физическим оборудованием, создавая дополнительные накладные расходы; технологии вроде SR-IOV (прямой проброс части физического устройства) или паравиртуализированных драйверов (virtio) минимизируют эти потери."}, {"q": "После обновления драйвера сетевой карты администратор заметил случайные, трудновоспроизводимые зависания системы под высокой сетевой нагрузкой, которых не было в предыдущей версии драйвера. Какой подход к диагностике наиболее уместен в первую очередь?", "options": ["Немедленно переустановить всю операционную систему без анализа причины", "Заменить сетевую карту на другую модель без предварительной диагностики программной причины", "Проверить changelog и известные проблемы новой версии драйвера, попробовать откатиться на предыдущую версию для подтверждения связи проблемы именно с обновлением, и изучить логи ядра на предмет паник/предупреждений во время зависаний", "Игнорировать проблему, так как зависания под высокой нагрузкой являются нормой для любого драйвера"], "correct": 2, "explain": "Стандартный подход к диагностике регрессии после обновления — сначала подтвердить, что именно новая версия драйвера является причиной (откат для сравнения), и изучить системные логи на предмет конкретных ошибок ядра, прежде чем переходить к более радикальным мерам, таким как замена оборудования."}, {"q": "Сетевая карта передаёт данные с пропускной способностью 10 Гбит/с. Сколько это примерно в мегабайтах в секунду (округлённо, 1 байт = 8 бит)?", "options": ["10000 МБ/с", "250 МБ/с", "1250 МБ/с", "125 МБ/с"], "correct": 2, "explain": "10 Гбит/с = 10000 Мбит/с. 10000/8=1250 МБ/с."}, {"q": "Кольцевой буфер драйвера содержит 256 дескрипторов пакетов, каждый размером 2 КБ. Каков общий объём памяти, занимаемой буфером (без учёта служебных данных)?", "options": ["1024 КБ", "2048 КБ", "512 КБ", "256 КБ"], "correct": 2, "explain": "256×2 КБ=512 КБ."}, {"q": "Сетевая карта генерирует одно прерывание на каждые 1000 полученных пакетов (interrupt coalescing). Если за секунду принято 1 000 000 пакетов, сколько прерываний будет сгенерировано за эту секунду?", "options": ["1000000", "100", "10000", "1000"], "correct": 3, "explain": "1000000/1000=1000 прерываний в секунду."}, {"q": "DMA-контроллер передаёт блок данных размером 1 МБ со скоростью 500 МБ/с. Сколько миллисекунд займёт передача этого блока?", "options": ["5 мс", "2 мс", "20 мс", "0.5 мс"], "correct": 1, "explain": "Время=объём/скорость=1 МБ/500 МБ/с=0.002 с=2 мс."}, {"q": "Сетевой адаптер поддерживает 4 аппаратные очереди приёма (RX queues), равномерно распределённые между 4 ядрами процессора. Если общая нагрузка составляет 8 Гбит/с, сколько нагрузки в среднем приходится на одно ядро при идеальном распределении?", "options": ["2 Гбит/с", "1 Гбит/с", "4 Гбит/с", "8 Гбит/с"], "correct": 0, "explain": "8 Гбит/с / 4 ядра = 2 Гбит/с на ядро при равномерном распределении."}, {"q": "Пакет Ethernet имеет максимальный размер полезной нагрузки (MTU) 1500 байт. Сколько пакетов потребуется для передачи файла размером 15 000 байт (без учёта заголовков)?", "options": ["5", "10", "15", "150"], "correct": 1, "explain": "15000/1500=10 пакетов."}, {"q": "Драйвер сетевой карты использует технику interrupt coalescing с задержкой 100 микросекунд между группировкой прерываний. Сколько максимум таких групп прерываний может обработать система за 1 секунду (1 000 000 микросекунд)?", "options": ["1000", "100", "10000", "100000"], "correct": 2, "explain": "1000000 мкс / 100 мкс = 10000 групп прерываний в секунду (верхняя граница по этому параметру)."}, {"q": "Сервер использует zero-copy передачу и сокращает число копирований данных с 3 до 1 на каждый переданный пакет. Если раньше каждое копирование занимало 2 микросекунды, сколько микросекунд экономится на каждом пакете?", "options": ["8 мкс", "4 мкс", "2 мкс", "6 мкс"], "correct": 1, "explain": "Было 3 копирования × 2 мкс = 6 мкс, стало 1×2=2 мкс. Экономия: 6-2=4 мкс на пакет."}, {"q": "При тестировании сетевой карты с пропускной способностью 25 Гбит/с передаётся файл размером 25 гигабит. Сколько секунд теоретически займёт передача (без учёта накладных расходов протокола)?", "options": ["2 секунды", "1 секунда", "25 секунд", "0.5 секунды"], "correct": 1, "explain": "25 гигабит / 25 Гбит/с = 1 секунда."}, {"q": "Сетевой адаптер обрабатывает в среднем 1.5 миллиона пакетов в секунду при среднем размере пакета 1000 байт. Какова примерная пропускная способность в мегабайтах в секунду?", "options": ["150 МБ/с", "500 МБ/с", "15000 МБ/с", "1500 МБ/с"], "correct": 3, "explain": "1.5 млн пакетов × 1000 байт = 1 500 000 000 байт = 1500 МБ/с."}, {"q": "Драйвер использует batching (группировку) по 32 пакета перед обработкой прерывания. Если всего нужно обработать 128000 пакетов, сколько потребуется циклов обработки батчей?", "options": ["400", "8000", "4000", "2000"], "correct": 2, "explain": "128000/32=4000 батчей (циклов обработки)."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
