<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Выдержка в фотографии и её контекст</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/photography_exposure.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Выдержка в фотографии и её контекст</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "photography_exposure";
  const QUESTIONS = [{"q": "Что такое экспозиция в фотографии?", "options": ["Цветовая температура источника света", "Расстояние от объектива до объекта съёмки", "Угол обзора объектива", "Количество света, попадающего на светочувствительную матрицу или плёнку за время съёмки кадра"], "correct": 3, "explain": "Экспозиция — суммарное количество света, зафиксированное сенсором/плёнкой при съёмке кадра, определяемое сочетанием диафрагмы, выдержки и светочувствительности (ISO)."}, {"q": "Что такое выдержка (shutter speed)?", "options": ["Время, в течение которого затвор камеры открыт и свет попадает на сенсор", "Диаметр отверстия диафрагмы", "Чувствительность матрицы к свету", "Фокусное расстояние объектива"], "correct": 0, "explain": "Выдержка — промежуток времени (например, 1/125 секунды), в течение которого свет проходит через открытый затвор на сенсор."}, {"q": "Что такое диафрагма (aperture) объектива?", "options": ["Датчик определения баланса белого", "Экран для просмотра снятых кадров", "Регулируемое отверстие в объективе, контролирующее количество проходящего света", "Механизм фокусировки объектива"], "correct": 2, "explain": "Диафрагма — отверстие переменного диаметра внутри объектива, регулирующее количество света, проходящего к сенсору, измеряется в диафрагменных числах (f/номер)."}, {"q": "Что означает число ISO в настройках камеры?", "options": ["Фокусное расстояние объектива", "Разрешение итогового изображения в мегапикселях", "Светочувствительность матрицы или плёнки к свету", "Скорость записи видео"], "correct": 2, "explain": "ISO характеризует чувствительность сенсора к свету: чем выше ISO, тем меньше света требуется для получения корректной экспозиции, но выше уровень шума на изображении."}, {"q": "Как диафрагменное число (например, f/2.8 против f/8) связано с размером отверстия диафрагмы?", "options": ["Число f всегда одинаково для любого объектива", "Чем меньше число f, тем уже открыта диафрагма (меньше света)", "Чем меньше число f, тем шире открыта диафрагма (больше света)", "Диафрагменное число не связано с размером отверстия"], "correct": 2, "explain": "Диафрагменные числа обратно пропорциональны диаметру отверстия: f/2.8 соответствует более широкому отверстию (больше света), чем f/8 (более узкое отверстие)."}, {"q": "Что такое глубина резкости (depth of field, DOF)?", "options": ["Яркость объекта в кадре", "Диапазон расстояний от камеры, в пределах которого объекты выглядят приемлемо резкими", "Общая резкость всего кадра независимо от расстояния", "Скорость фокусировки автофокуса"], "correct": 1, "explain": "Глубина резкости — зона перед и за точкой фокусировки, в которой объекты остаются достаточно чётко видны на снимке."}, {"q": "Как открытая диафрагма (малое число f, например f/1.8) обычно влияет на глубину резкости?", "options": ["Даёт большую глубину резкости (резко всё от переднего до заднего плана)", "Даёт малую глубину резкости (только узкая зона в фокусе, остальное размыто)", "Не влияет на глубину резкости вообще", "Полностью убирает резкость по всему кадру"], "correct": 1, "explain": "Широко открытая диафрагма (малое f-число) обычно даёт малую глубину резкости, создавая размытие фона (боке) при резком объекте в фокусе."}, {"q": "Что такое 'правило экспозиционного треугольника' в фотографии?", "options": ["Три способа компоновки кадра по правилу третей", "Три типа объективов, необходимых для полноценной съёмки", "Три взаимосвязанных параметра — выдержка, диафрагма и ISO, — совместно определяющие итоговую экспозицию кадра", "Три этапа постобработки фотографии"], "correct": 2, "explain": "Экспозиционный треугольник описывает взаимосвязь выдержки, диафрагмы и ISO: изменение одного параметра требует компенсации другими для сохранения той же экспозиции."}, {"q": "Что произойдёт с фотографией движущегося объекта при длинной выдержке (например, 1 секунда)?", "options": ["Цвета объекта изменятся на противоположные", "Объект будет заморожен без размытия", "Движущийся объект будет размыт в направлении движения (motion blur)", "Изображение станет темнее независимо от движения"], "correct": 2, "explain": "При длинной выдержке движущийся во время экспонирования объект оставляет 'смазанный' след на кадре — эффект motion blur, используемый как художественный приём или являющийся нежелательным артефактом."}, {"q": "Что такое 'боке' (bokeh) в фотографии?", "options": ["Техника фокусировки на нескольких объектах одновременно", "Визуальное качество размытых участков изображения вне зоны фокуса, особенно точечных источников света", "Настройка баланса белого камеры", "Способ обработки чёрно-белых фотографий"], "correct": 1, "explain": "Боке описывает эстетическое качество размытых, нерезких областей изображения (особенно бликов света), которое сильно зависит от конструкции объектива и диафрагмы."}, {"q": "Почему изменение диафрагмы на одну 'ступень' (например, с f/4 на f/5.6) вдвое уменьшает количество проходящего света, хотя числа f/4 и f/5.6 отличаются не в 2 раза?", "options": ["Диафрагменные числа связаны с площадью отверстия, которая пропорциональна квадрату диаметра, поэтому стандартная последовательность f-чисел (f/1.4, f/2, f/2.8, f/4, f/5.6...) устроена так, что каждый шаг соответствует ровно двукратному изменению площади (и, соответственно, света)", "Последовательность стандартных диафрагменных чисел выбрана произвольно, без математической логики", "Диафрагменные числа линейно пропорциональны количеству света без каких-либо квадратичных зависимостей", "Изменение диафрагмы никогда не влияет на количество проходящего света ровно в 2 раза"], "correct": 0, "explain": "Количество света пропорционально площади отверстия (πr²), а диафрагменное число обратно пропорционально диаметру; поэтому стандартная шкала f-чисел устроена так, что каждый полный шаг (умножение примерно на √2) даёт ровно вдвое больше или меньше света."}, {"q": "Почему экспозиционный треугольник называют именно 'треугольником', а не просто набором из трёх независимых настроек?", "options": ["Три параметра абсолютно независимы друг от друга и никогда не требуют взаимной компенсации", "Три параметра (выдержка, диафрагма, ISO) взаимозависимы: изменение одного для сохранения той же экспозиции требует компенсирующего изменения одного или обоих других параметров, что и создаёт эффект 'треугольного' компромисса", "'Треугольник' — чисто маркетинговый термин без технического обоснования", "Экспозиция определяется только одним из трёх параметров, а остальные два не имеют значения"], "correct": 1, "explain": "Именно взаимозависимость параметров (при заданной желаемой экспозиции изменение одного требует компенсации другими) и создаёт треугольную структуру компромиссов, а не просто список из трёх независимых настроек."}, {"q": "Почему увеличение ISO для компенсации недостатка света на тёмной сцене имеет побочный эффект в виде роста цифрового шума на изображении?", "options": ["Шум изображения не связан с уровнем усиления сигнала сенсора", "Увеличение ISO всегда улучшает качество изображения без каких-либо компромиссов", "Высокое ISO усиливает электрический сигнал с сенсора, но вместе с полезным сигналом усиливается и случайный шум считывания и тепловой шум, что снижает соотношение сигнал/шум", "ISO контролирует только цветопередачу, но не уровень шума на фотографии"], "correct": 2, "explain": "Повышение ISO — это усиление (программное или аппаратное) слабого сигнала с матрицы; вместе с полезным сигналом усиливается и присущий сенсору шум, поэтому соотношение сигнал/шум ухудшается при высоких значениях ISO."}, {"q": "Почему при съёмке спортивных сцен фотографы обычно предпочитают короткую выдержку, даже если это требует компромисса с ISO или диафрагмой?", "options": ["Короткая выдержка никогда не влияет на резкость движущихся объектов", "Длинная выдержка всегда лучше подходит для съёмки быстрого движения", "Короткая выдержка 'замораживает' быстрое движение, избегая размытия объекта, тогда как компенсация недостатка света через более высокое ISO или более открытую диафрагму — приемлемый компромисс ради резкости движущегося объекта", "Выбор выдержки не связан с наличием движения в кадре"], "correct": 2, "explain": "Классический приоритет в спортивной и репортажной съёмке — сначала зафиксировать короткую выдержку для резкости движения, а затем компенсировать нехватку света увеличением ISO или открытием диафрагмы, а не наоборот."}, {"q": "Почему широкоугольные объективы при той же диафрагме обычно дают визуально большую глубину резкости, чем телеобъективы?", "options": ["Глубина резкости определяется исключительно значением ISO", "Фокусное расстояние объектива никак не влияет на глубину резкости кадра", "Телеобъективы всегда дают большую глубину резкости, чем широкоугольные при том же f-числе", "Глубина резкости зависит не только от диафрагмы, но и от фокусного расстояния объектива и расстояния до объекта — при коротком фокусном расстоянии (широкий угол) глубина резкости при прочих равных условиях больше"], "correct": 3, "explain": "Помимо диафрагмы, на глубину резкости влияют фокусное расстояние и дистанция фокусировки; при коротком фокусном расстоянии (широкий угол) при том же f-числе и расстоянии до объекта глубина резкости обычно значительно больше, чем у телеобъектива."}, {"q": "Почему при съёмке против яркого источника света (контровой свет) автоматическая экспозамерная система камеры часто ошибочно затемняет основной объект съёмки?", "options": ["Контровой свет никогда не влияет на точность автоматического экспозамера", "Камера всегда правильно определяет экспозицию для переднего плана независимо от фона", "Экспонометр камеры усредняет яркость по всему кадру (или по замерной зоне), и очень яркий фон 'перетягивает' общую оценку экспозиции, из-за чего относительно менее яркий передний план оказывается недоэкспонированным", "Автоматический экспозамер всегда игнорирует яркость фона независимо от условий съёмки"], "correct": 2, "explain": "Стандартные режимы замера (особенно матричный/усреднённый) ориентируются на общую или доминирующую яркость сцены; яркий контровой фон смещает усреднённую оценку, из-за чего темнее объект в тени оказывается недоэкспонированным без ручной коррекции."}, {"q": "Почему съёмка в формате RAW даёт больше возможностей для коррекции экспозиции при постобработке, чем съёмка в формате JPEG?", "options": ["RAW сохраняет необработанные данные сенсора с большим динамическим диапазоном и без потерь, тогда как JPEG уже применяет сжатие с потерями и обрезает часть исходной информации, ограничивая гибкость последующей коррекции", "Формат файла не влияет на возможности последующей коррекции экспозиции", "JPEG всегда даёт больше возможностей для коррекции экспозиции, чем RAW", "RAW и JPEG всегда содержат абсолютно идентичный объём информации о сцене"], "correct": 0, "explain": "RAW-файл хранит необработанные, менее сжатые данные с сенсора (обычно 12-14 бит на канал), сохраняя больше деталей в светах и тенях, тогда как JPEG (обычно 8 бит с потерями) уже применяет необратимую обработку и сжатие, ограничивая последующую коррекцию."}, {"q": "Почему при использовании штатива и длинной выдержки (например, для ночной съёмки) можно использовать значительно более низкое ISO, чем при съёмке с рук?", "options": ["Штатив автоматически увеличивает чувствительность сенсора к свету", "ISO не связано с выбором выдержки при использовании штатива", "Длинная выдержка всегда требует более высокого ISO независимо от использования штатива", "Штатив устраняет необходимость короткой выдержки для избежания смазывания от дрожания рук, позволяя компенсировать недостаток света увеличением времени экспонирования вместо повышения ISO, сохраняя более низкий уровень шума"], "correct": 3, "explain": "Штатив снимает ограничение на минимально допустимую 'безопасную' выдержку (без смазывания от шевеления камеры), позволяя увеличивать время экспонирования вместо повышения ISO для получения достаточной экспозиции, что даёт менее шумное изображение."}, {"q": "Почему фотографы, снимающие портреты, часто выбирают среднюю диафрагму (например, f/4-f/5.6), а не максимально открытую (f/1.4), несмотря на желание получить размытый фон?", "options": ["Диафрагма не влияет на точность фокусировки при портретной съёмке", "Средняя диафрагма всегда даёт менее размытый фон, чем максимально открытая, без исключений", "Максимально открытая диафрагма всегда даёт наилучший результат для портретной съёмки без каких-либо компромиссов", "При максимально открытой диафрагме глубина резкости может стать настолько узкой, что даже небольшая ошибка фокусировки выведет из резкости важные детали (например, оба глаза модели), тогда как чуть более закрытая диафрагма даёт запас резкости при сохранении размытого фона"], "correct": 3, "explain": "При очень малой глубине резкости (широко открытая диафрагма) риск промаха фокуса возрастает — например, фокус может попасть на нос вместо глаз; небольшое прикрытие диафрагмы даёт разумный компромисс между размытием фона и запасом резкости."}, {"q": "Как гистограмма экспозиции на экране камеры помогает точнее оценить правильность экспозиции кадра, чем просто визуальный просмотр на маленьком экране?", "options": ["Гистограмма показывает исключительно цветовой баланс кадра, но не яркость", "Гистограмма показывает объективное распределение яркости пикселей по всему кадру, выявляя пересветы или недосветы, которые могут быть незаметны из-за ограничений яркости и калибровки маленького экрана камеры", "Гистограмма не связана с распределением яркости в кадре", "Визуальная оценка на экране камеры всегда точнее, чем анализ гистограммы"], "correct": 1, "explain": "В отличие от субъективного визуального восприятия на маленьком (и часто некалиброванном) экране камеры, гистограмма даёт объективные данные о распределении тонов, помогая точно выявить обрезанные света (клиппинг) или потерянные детали в тенях."}, {"q": "Как взаимодействуют между собой выбор диафрагмы (влияющей на глубину резкости) и выбор выдержки (влияющей на передачу движения) при проектировании общего художественного замысла кадра?", "options": ["Художественный замысел кадра никак не связан с выбором технических параметров экспозиции", "Оба параметра одновременно решают две разные творческие задачи (резкость по глубине и передача движения), и фотограф должен согласовать их выбор с общим художественным замыслом, а не оптимизировать каждый параметр изолированно", "Выдержка влияет только на яркость кадра, но не на передачу движения", "Диафрагма и выдержка всегда решают абсолютно одну и ту же творческую задачу без различий"], "correct": 1, "explain": "Диафрагма и выдержка одновременно определяют не только итоговую яркость, но и два разных художественных аспекта (резкость по глубине и статичность/размытость движения), поэтому продуманная композиция кадра требует согласованного, а не изолированного выбора этих параметров."}, {"q": "Почему при проектировании студийного освещения интенсивность источников света часто выбирают исходя из желаемой диафрагмы, а не наоборот?", "options": ["Диафрагма и интенсивность света — независимые, никак не связанные параметры съёмки", "Если художественный замысел требует определённой глубины резкости (то есть конкретной диафрагмы), интенсивность освещения подбирается так, чтобы обеспечить корректную экспозицию при этой заранее выбранной диафрагме, а не подстраивать диафрагму под случайную яркость света", "Интенсивность освещения не влияет на выбор диафрагмы в студийной съёмке", "Диафрагма всегда определяется автоматически камерой независимо от студийного света"], "correct": 1, "explain": "В контролируемой студийной среде источники света — управляемая переменная, поэтому логично сначала определить нужную диафрагму (исходя из требуемой глубины резкости), а затем настроить мощность света для получения корректной экспозиции при этом значении диафрагмы."}, {"q": "Как формат матрицы камеры (например, полнокадровая vs кроп-сенсор) влияет на восприятие эквивалентной глубины резкости при одинаковом диафрагменном числе?", "options": ["Размер сенсора никогда не влияет на воспринимаемую глубину резкости при одинаковом f-числе", "При одинаковом f-числе, но разном размере сенсора и, соответственно, разном фактическом фокусном расстоянии для того же угла обзора, глубина резкости визуально отличается — полнокадровые камеры при прочих равных условиях обычно дают меньшую глубину резкости, чем кроп-сенсоры", "Диафрагменное число полностью независимо от типа используемого сенсора", "Кроп-сенсоры всегда дают меньшую глубину резкости, чем полнокадровые при одинаковом f-числе"], "correct": 1, "explain": "Для получения одинакового угла обзора на кроп-сенсоре требуется меньшее фактическое фокусное расстояние, чем на полном кадре, а меньшее фокусное расстояние при том же f-числе увеличивает глубину резкости — отсюда разница в 'размытии фона' между форматами сенсоров при одинаковом диафрагменном числе."}, {"q": "Почему при разработке автоматических режимов камеры (например, 'спортивный режим' или 'портретный режим') инженеры закладывают разные приоритеты компромиссов экспозиционного треугольника для каждого сценария?", "options": ["Все автоматические режимы камеры используют абсолютно идентичные настройки независимо от типа сцены", "Разработка автоматических режимов не связана с приоритетами экспозиционного треугольника", "Разные жанры съёмки требуют разных приоритетов (заморозить движение vs получить размытый фон vs максимальная глубина резкости), поэтому автоматические режимы предустанавливают, какой параметр (выдержка, диафрагма или ISO) оптимизировать в первую очередь для конкретного типа сцены", "Портретный и спортивный режимы всегда дают идентичный результат съёмки"], "correct": 2, "explain": "'Спортивный режим' обычно приоритизирует короткую выдержку (жертвуя ISO при необходимости), тогда как 'портретный режим' приоритизирует открытую диафрагму для размытия фона — это встроенные в автоматику архитектурные решения о приоритете параметров треугольника под конкретный сценарий."}, {"q": "Как понимание экспозиционного треугольника помогает фотографу заранее спланировать серию кадров для сложных условий (например, смена света в течение дня при съёмке мероприятия), а не полагаться исключительно на автоматику камеры?", "options": ["Экспозиционный треугольник актуален только для студийной съёмки с постоянным освещением", "Понимание взаимосвязи параметров позволяет заранее продумать, какие компромиссы приемлемы в разных условиях освещения (утро, полдень, вечер), и быстро вручную корректировать нужный параметр без пересчёта всей экспозиции с нуля каждый раз", "Автоматика камеры всегда лучше ручного планирования при изменяющемся освещении", "Понимание взаимосвязи параметров не даёт никакого практического преимущества при съёмке мероприятий"], "correct": 1, "explain": "Заранее понимая, как связаны выдержка, диафрагма и ISO, фотограф может быстро адаптироваться к изменению условий освещения в течение съёмки, целенаправленно меняя нужный параметр, а не заново 'нащупывая' настройки методом проб и ошибок."}, {"q": "Почему при выборе объектива для конкретной задачи (например, портретной съёмки) важно учитывать не только максимальную открытую диафрагму, но и фокусное расстояние, — как эти два параметра совместно определяют характер размытия фона?", "options": ["Только диафрагма влияет на глубину резкости, фокусное расстояние не имеет значения", "Фокусное расстояние влияет исключительно на угол обзора, но никогда — на глубину резкости", "Выбор объектива для портрета не связан с сочетанием диафрагмы и фокусного расстояния", "И диафрагма, и фокусное расстояние влияют на глубину резкости и характер боке, поэтому объектив с определённой максимальной диафрагмой на разных фокусных расстояниях даёт качественно разное размытие и перспективу, что нужно учитывать при выборе инструмента под задачу"], "correct": 3, "explain": "Совместное влияние диафрагмы и фокусного расстояния на глубину резкости и перспективу — архитектурное соображение при выборе объектива: например, портретный телеобъектив с открытой диафрагмой даёт иной характер размытия фона, чем широкоугольный объектив с той же диафрагмой."}, {"q": "Как соотносятся друг с другом понятия 'динамический диапазон сенсора' и 'экспозиционный треугольник' при съёмке сцены с высоким контрастом (яркое небо и тёмная земля)?", "options": ["При любой контрастности сцены динамический диапазон сенсора не имеет значения", "Динамический диапазон определяет, какой разброс яркостей сенсор способен зафиксировать без потери деталей в светах и тенях одновременно, и при съёмке контрастной сцены параметры экспозиционного треугольника выбираются с учётом того, какую часть этого диапазона 'использовать' — например, жертвуя деталями в тенях ради сохранения деталей в светах", "Динамический диапазон сенсора не связан с выбором параметров экспозиции", "Экспозиционный треугольник полностью устраняет ограничения динамического диапазона сенсора"], "correct": 1, "explain": "Ограниченный динамический диапазон сенсора означает, что при очень контрастной сцене невозможно одновременно сохранить детали и в самых светлых, и в самых тёмных участках — выбор экспозиции определяет, какую часть тонового диапазона сцены 'пожертвовать' (пересвет неба или проваленные тени)."}, {"q": "Почему при проектировании смартфонных камер с маленькой матрицей инженеры компенсируют физические ограничения диафрагмы и размера сенсора программными методами (например, программным размытием фона)?", "options": ["Программное размытие фона используется исключительно для развлечения, а не для компенсации физических ограничений", "Размер сенсора не связан с естественной глубиной резкости или качеством в темноте", "Маленький физический размер сенсора смартфона ограничивает естественную малую глубину резкости и качество при слабом свете, которые достигаются на больших сенсорах чисто оптически, поэтому вычислительная фотография имитирует эти эффекты программно", "Маленькие сенсоры смартфонов физически дают точно такую же глубину резкости, как и полнокадровые камеры"], "correct": 2, "explain": "Физика оптики ограничивает малую глубину резкости на маленьких сенсорах смартфонов (из-за короткого фактического фокусного расстояния), поэтому вычислительная фотография (программное размытие по картам глубины) компенсирует то, что раньше достигалось только оптически на камерах с большими сенсорами и светосильными объективами."}, {"q": "Как принцип экспозиционного треугольника применяется при проектировании автоматического брекетинга экспозиции (auto-bracketing) для последующего HDR-объединения кадров?", "options": ["Брекетинг экспозиции всегда варьирует диафрагму, а не выдержку или ISO", "Камера намеренно делает серию кадров с разной экспозицией (обычно варьируя выдержку при неизменных диафрагме и ISO), чтобы захватить детали как в тенях, так и в светах отдельно, для последующего объединения в изображение с расширенным динамическим диапазоном", "HDR-съёмка не связана с понятием экспозиционного треугольника", "Все кадры серии брекетинга всегда имеют абсолютно одинаковую экспозицию"], "correct": 1, "explain": "Автоматический брекетинг обычно фиксирует диафрагму (чтобы сохранить одинаковую глубину резкости на всех кадрах серии) и варьирует именно выдержку, получая серию по-разному экспонированных кадров одной и той же сцены для последующего объединения в HDR-изображение с расширенным динамическим диапазоном."}, {"q": "Фотограф снимает бегущего спортсмена при слабом освещении вечером и получает смазанные, размытые кадры. Какое из изменений настроек наиболее вероятно решит проблему, сохраняя приемлемую экспозицию?", "options": ["Укоротить выдержку и компенсировать недостаток света увеличением ISO и/или открытием диафрагмы", "Полностью закрыть диафрагму для максимальной резкости", "Увеличить выдержку ещё больше для получения большего количества света", "Уменьшить ISO до минимального значения, игнорируя недостаток света"], "correct": 0, "explain": "Для устранения размытия движения нужна более короткая выдержка; чтобы сохранить нужную экспозицию при недостатке света, компенсацию делают за счёт увеличения ISO и/или открытия диафрагмы, а не за счёт удлинения выдержки."}, {"q": "Фотограф хочет снять пейзаж с максимальной резкостью от переднего плана до горизонта. Какие настройки экспозиционного треугольника наиболее уместны для этой задачи?", "options": ["Максимально короткая выдержка независимо от условий освещения", "Максимально высокое ISO независимо от освещения", "Максимально открытая диафрагма (f/1.4) для художественного размытия фона", "Закрытая диафрагма (например, f/11-f/16), штатив для компенсации более длинной выдержки, невысокое ISO"], "correct": 3, "explain": "Для большой глубины резкости (весь пейзаж в фокусе) нужна закрытая диафрагма; штатив компенсирует получившуюся более длинную выдержку, позволяя держать низкое ISO для минимального шума."}, {"q": "На свадебной съёмке в помещении с тусклым светом фотограф вынужден выбирать между повышением ISO (больше шума) и снижением выдержки (риск смазывания при движении гостей). Какой компромисс обычно предпочтителен для сохранения резких кадров с людьми?", "options": ["ISO никогда не стоит повышать выше базового значения независимо от условий", "Диафрагма не имеет значения в этой ситуации выбора", "Всегда нужно снижать выдержку до предела, полностью игнорируя риск смазывания", "Скорее приоритет отдаётся достаточно короткой выдержке (чтобы избежать смазывания движения людей) с компенсацией через повышение ISO, так как шум на фото обычно менее критичен, чем полностью смазанное изображение"], "correct": 3, "explain": "В большинстве случаев умеренно шумное, но резкое изображение предпочтительнее полностью размытого из-за смазывания движения — поэтому часто жертвуют чистотой (повышая ISO) ради сохранения резкости при недостатке света и движении в кадре."}, {"q": "Фотограф снимает портрет против яркого окна (контровой свет) и без ручной коррекции экспозиции получает силуэт с тёмным лицом модели. Какое решение наиболее уместно?", "options": ["Вручную увеличить экспозицию (компенсацию экспозиции) относительно автоматического замера или использовать точечный замер по лицу модели, а не по всей сцене", "Значительно уменьшить экспозицию ещё сильнее для более выразительного силуэта, если целью был портрет, а не силуэт", "Увеличить фокусное расстояние объектива, чтобы решить проблему недоэкспонирования", "Оставить настройки без изменений, так как автоматика всегда точна"], "correct": 0, "explain": "Для правильной экспозиции лица (а не фона) при контровом свете нужно либо вручную увеличить экспозицию относительно автоматической оценки, либо использовать точечный замер именно по лицу, игнорируя яркий фон."}, {"q": "Начинающий фотограф жалуется, что его ночные снимки города с рук получаются размытыми, хотя объекты в кадре статичны. Какая наиболее вероятная причина, не связанная с движением объектов?", "options": ["Проблема точно связана с неправильным фокусным расстоянием объектива", "Слишком длинная выдержка в сочетании с дрожанием рук самого фотографа (нужен штатив или более короткая выдержка/выше ISO)", "Диафрагма камеры была слишком закрыта, что всегда вызывает размытие независимо от выдержки", "ISO было установлено слишком низким, что технически невозможно приводит к размытию"], "correct": 1, "explain": "При съёмке ночью с рук без штатива длинная выдержка, необходимая для достаточной экспозиции при слабом свете, часто приводит к смазыванию из-за естественного дрожания рук — классическая причина 'размытых, хотя объекты статичны' ночных кадров."}, {"q": "Фотограф снимает продукт для каталога и хочет, чтобы весь товар от переднего до заднего плана был идеально резким, но также хочет минимизировать время экспонирования, чтобы избежать вибраций от студийного оборудования. Какой компромисс наиболее уместен?", "options": ["Максимально открыть диафрагму для короткой выдержки, жертвуя глубиной резкости всего товара", "Использовать среднюю или слегка закрытую диафрагму (например, f/8-f/11) вместе с достаточно мощным студийным светом, позволяющим сохранить короткую выдержку при этой диафрагме без повышения ISO", "Использовать максимально закрытую диафрагму (f/22) без дополнительного освещения, компенсируя очень длинной выдержкой", "Проблема решается только повышением ISO до максимума без изменения диафрагмы"], "correct": 1, "explain": "В студийной съёмке добавление достаточно мощного искусственного света позволяет использовать закрытую диафрагму (для резкости по глубине) и одновременно короткую выдержку (избегая вибраций), не прибегая к высокому ISO."}, {"q": "Фотограф снимает водопад и хочет создать эффект шёлкового, размытого движения воды, сохраняя резкость окружающих камней. Какая техника и настройки для этого нужны?", "options": ["Высокое ISO без изменения выдержки для создания эффекта размытия", "Длинная выдержка (например, несколько секунд) на штативе, с закрытой диафрагмой и/или нейтральным фильтром для снижения количества света при столь долгой экспозиции", "Максимально короткая выдержка для замораживания каждой капли воды", "Максимально открытая диафрагма без использования штатива"], "correct": 1, "explain": "Классическая техника пейзажной съёмки: длинная выдержка на устойчивом штативе создаёт размытие движущейся воды при резких статичных объектах (камнях); так как при ярком свете длинная выдержка может дать пересвет, часто используют нейтральный фильтр (ND) для уменьшения количества света."}, {"q": "Фотограф в помещении с смешанным освещением (окно и лампы) получает на фото странный цветовой оттенок кожи модели. Хотя это не связано напрямую с классическим экспозиционным треугольником, какая настройка камеры важна для решения этой проблемы?", "options": ["Диафрагма — единственная настройка, влияющая на цветопередачу", "Выдержка сама по себе устраняет любые проблемы с цветом кожи", "Баланс белого (white balance) — корректировка цветовой температуры под условия смешанного освещения", "ISO напрямую определяет корректность цветопередачи кожи"], "correct": 2, "explain": "Хотя баланс белого не входит в экспозиционный треугольник, именно эта настройка отвечает за корректную цветопередачу при разных источниках освещения — смешанный свет (тёплые лампы + холодное дневное окно) часто требует ручной коррекции или съёмки в RAW для последующей правки."}, {"q": "Оператор снимает интервью в помещении и вынужден выбирать между выдержкой 1/50 (стандартное правило для видео при 25 fps) и желанием получить более тёмную, атмосферную сцену. Какой параметр логично регулировать вместо изменения выдержки, которая жёстко привязана к частоте кадров?", "options": ["Единственный вариант — полностью отказаться от атмосферного тёмного освещения", "Диафрагму (более закрытую) и/или нейтральный фильтр (ND), а также ISO, оставляя выдержку неизменной согласно правилу видеосъёмки", "ISO нельзя регулировать при видеосъёмке ни при каких условиях", "Изменить выдержку значительно быстрее стандартного правила, игнорируя частоту кадров"], "correct": 1, "explain": "В видеосъёмке выдержка традиционно жёстко привязана к частоте кадров (примерно 1/(2×fps)) для естественного вида движения, поэтому яркость сцены регулируется в первую очередь диафрагмой, ND-фильтрами и ISO, а не изменением выдержки."}, {"q": "Астрофотограф снимает звёздное небо и должен одновременно обеспечить достаточную экспозицию для тусклых звёзд и избежать 'смазывания' звёзд в полосы из-за вращения Земли. Какой подход обычно применяется для разрешения этого противоречия?", "options": ["Использовать максимально длинную выдержку без ограничений, игнорируя вращение Земли", "Использовать так называемое 'правило 500' (или аналогичные формулы) для расчёта максимально допустимой выдержки в зависимости от фокусного расстояния объектива, компенсируя необходимую экспозицию открытой диафрагмой и повышенным ISO", "Полностью закрыть диафрагму для избежания смазывания звёзд", "ISO не имеет значения при съёмке ночного неба"], "correct": 1, "explain": "Так как слишком долгая выдержка превращает точки звёзд в дуги из-за вращения Земли, астрофотографы ограничивают выдержку по эмпирическим правилам (например, '500/фокусное расстояние'), компенсируя необходимую яркость открытой диафрагмой и повышенным ISO."}, {"q": "Диафрагма изменяется с f/4 на f/8 (закрытие на 2 полных ступени). Во сколько раз уменьшается количество света, проходящего через объектив?", "options": ["В 16 раза", "В 8 раза", "В 4 раза", "В 2 раза"], "correct": 2, "explain": "Каждая полная ступень диафрагмы меняет количество света в 2 раза; 2 ступени = 2×2=4 раза уменьшения света."}, {"q": "Выдержка изменяется с 1/100 секунды на 1/25 секунды. Во сколько раз увеличивается время экспонирования?", "options": ["В 8 раз", "В 2 раза", "В 25 раз", "В 4 раза"], "correct": 3, "explain": "1/25 разделить на 1/100 = 100/25=4 — выдержка увеличилась в 4 раза."}, {"q": "Фотограф увеличивает ISO со 100 до 400 (в 4 раза), чтобы компенсировать закрытие диафрагмы на 2 ступени (уменьшение света в 4 раза). Сохранится ли итоговая экспозиция такой же?", "options": ["Экспозиция не зависит от ISO вообще", "Нет, кадр станет вдвое темнее", "Нет, кадр станет вдвое ярче", "Да, так как увеличение ISO в 4 раза компенсирует уменьшение света в 4 раза"], "correct": 3, "explain": "Увеличение чувствительности ISO в 4 раза (в 2 ступени) точно компенсирует уменьшение количества света в 4 раза от закрытия диафрагмы на 2 ступени — итоговая экспозиция остаётся прежней."}, {"q": "При съёмке с фокусным расстоянием 50 мм по 'правилу 500' максимально допустимая выдержка для избежания смазывания звёзд рассчитывается как 500/50. Чему равна эта выдержка (в секундах)?", "options": ["25 секунд", "10 секунд", "50 секунд", "5 секунд"], "correct": 1, "explain": "500/50=10 секунд — максимально допустимая выдержка по этому эмпирическому правилу для объектива 50 мм."}, {"q": "Фотограф снимает при выдержке 1/250 секунды, диафрагме f/5.6 и ISO 200, получая корректную экспозицию. Если он хочет открыть диафрагму до f/2.8 (увеличение света в 4 раза), на сколько нужно сократить выдержку (во сколько раз), чтобы сохранить ту же экспозицию при том же ISO?", "options": ["Выдержку менять не нужно", "В 2 раза (до 1/500)", "В 4 раза (до 1/1000)", "В 8 раз (до 1/2000)"], "correct": 2, "explain": "Так как диафрагма даёт в 4 раза больше света, выдержку нужно сократить в 4 раза (пропустить в 4 раза меньше времени), чтобы компенсировать и сохранить прежнюю экспозицию: 1/250 → 1/1000."}, {"q": "Видеооператор снимает при частоте 25 кадров в секунду (fps) и следует стандартному правилу выдержки видео (примерно 1/(2×fps)). Какая выдержка соответствует этому правилу?", "options": ["1/12.5 секунды", "1/50 секунды", "1/25 секунды", "1/100 секунды"], "correct": 1, "explain": "1/(2×25) = 1/50 секунды — стандартная рекомендуемая выдержка для видео при 25 fps."}, {"q": "Фотоаппарат делает серию из 100 кадров при выдержке 1/1000 секунды каждый. Сколько суммарно времени (в секундах) занимает фактическое экспонирование всех 100 кадров (без учёта времени между кадрами)?", "options": ["0.1 секунды", "0.01 секунды", "1 секунда", "10 секунд"], "correct": 0, "explain": "100 × (1/1000) = 100/1000 = 0.1 секунды."}, {"q": "Диафрагма f/2.8 по сравнению с f/1.4 пропускает света в несколько раз меньше. Учитывая, что от f/1.4 до f/2.8 — это 2 полные ступени, во сколько раз меньше света проходит при f/2.8?", "options": ["В 6 раз", "В 8 раз", "В 2 раза", "В 4 раза"], "correct": 3, "explain": "2 полные ступени диафрагмы соответствуют изменению количества света в 2×2=4 раза."}, {"q": "Фотограф использует нейтральный фильтр (ND), уменьшающий количество света в 8 раз, чтобы снимать водопад днём с длинной выдержкой. Если без фильтра корректная выдержка была 1/125 секунды, какая выдержка потребуется с этим фильтром для той же экспозиции?", "options": ["1/16 секунды", "1/1000 секунды", "8/125 секунды (примерно 0.064 секунды)", "1/125 секунды без изменений"], "correct": 2, "explain": "Уменьшение света в 8 раз требует увеличения выдержки в 8 раз для компенсации: (1/125)×8=8/125≈0.064 секунды."}, {"q": "Съёмочная группа использует ISO 1600 вместо базового ISO 100 (увеличение в 16 раз) для съёмки в тёмном помещении, компенсируя это закрытием диафрагмы. На сколько полных ступеней диафрагмы нужно закрыться, чтобы компенсировать 16-кратное увеличение чувствительности ISO (каждая ступень диафрагмы меняет свет в 2 раза)?", "options": ["4 ступени", "2 ступени", "8 ступеней", "3 ступени"], "correct": 0, "explain": "16=2^4, значит нужно 4 полных ступени диафрагмы (каждая даёт изменение в 2 раза: 2×2×2×2=16), чтобы скомпенсировать 16-кратное увеличение ISO соответствующим уменьшением света."}, {"q": "Фотограф снимает HDR-серию из 3 кадров с шагом экспозиции в 2 ступени: базовый кадр при выдержке 1/125, недоэкспонированный и переэкспонированный. Какая выдержка будет у переэкспонированного кадра (в 4 раза больше света, то есть длиннее выдержка)?", "options": ["1/60", "1/30", "1/500", "1/250"], "correct": 1, "explain": "2 ступени = в 4 раза больше света = выдержка в 4 раза длиннее: (1/125)×4=4/125≈1/31, ближайшее значение — 1/30."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
