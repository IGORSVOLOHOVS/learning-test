<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Оптимизация производительности</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/performance_optimization.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Оптимизация производительности</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "performance_optimization";
  const QUESTIONS = [{"q": "Что такое профилирование (profiling) кода?", "options": ["Процесс шифрования исходного кода", "Метод визуального оформления интерфейса программы", "Процесс написания документации к коду", "Измерение и анализ того, где программа тратит время и ресурсы во время выполнения"], "correct": 3, "explain": "Профилирование — техника измерения производительности программы (время выполнения функций, использование памяти и т.д.) для выявления узких мест перед оптимизацией."}, {"q": "Что такое временная сложность алгоритма (time complexity)?", "options": ["Точное время выполнения программы в секундах на конкретном компьютере", "Размер исходного кода алгоритма в строках", "Оценка того, как растёт количество операций алгоритма в зависимости от размера входных данных", "Количество разработчиков, необходимых для написания алгоритма"], "correct": 2, "explain": "Временная сложность (обычно в нотации O-большое) описывает асимптотический рост количества операций относительно размера входных данных, независимо от конкретного оборудования."}, {"q": "Что означает нотация O(n) для алгоритма?", "options": ["Алгоритм требует ровно n байт памяти", "Время выполнения алгоритма растёт линейно пропорционально размеру входных данных", "Алгоритм никогда не завершается", "Алгоритм выполняется за постоянное время независимо от размера данных"], "correct": 1, "explain": "O(n) означает, что при увеличении размера входных данных n количество операций (и, соответственно, время выполнения) растёт линейно, пропорционально n."}, {"q": "Что такое узкое место (bottleneck) в производительности программы?", "options": ["Компонент или участок кода, который сильнее всего ограничивает общую производительность системы", "Место в коде, содержащее синтаксическую ошибку", "Место хранения резервных копий данных", "Название функции для обработки исключений"], "correct": 0, "explain": "Узкое место — самый медленный или наиболее нагруженный компонент системы, определяющий общую пропускную способность/скорость всей системы, аналогично самому узкому участку трубы."}, {"q": "Что такое кэширование (caching) в контексте оптимизации производительности?", "options": ["Процесс сжатия файлов перед передачей по сети", "Удаление неиспользуемых данных из памяти", "Метод шифрования конфиденциальных данных", "Сохранение результатов дорогостоящих вычислений или часто запрашиваемых данных для быстрого повторного доступа без повторного вычисления"], "correct": 3, "explain": "Кэширование сохраняет результат ранее выполненной дорогой операции (вычисления, запроса к БД) для быстрого повторного использования, избегая повторного выполнения той же работы."}, {"q": "Что такое 'преждевременная оптимизация' (premature optimization), о которой часто предупреждают в разработке ПО?", "options": ["Оптимизация, выполненная слишком поздно после релиза продукта", "Единственно верный подход к разработке эффективного программного обеспечения", "Автоматическая оптимизация кода компилятором", "Оптимизация кода до того, как известно, действительно ли этот участок является узким местом, что может привести к усложнению кода без реальной пользы"], "correct": 3, "explain": "Преждевременная оптимизация — трата усилий на ускорение кода до того, как профилирование подтвердило, что именно этот участок является реальным узким местом, часто в ущерб читаемости и без ощутимой пользы."}, {"q": "Что такое латентность (latency) в контексте производительности системы?", "options": ["Объём памяти, используемой системой", "Время, проходящее между отправкой запроса и получением ответа", "Общее количество запросов, обрабатываемых системой в секунду", "Количество серверов в кластере"], "correct": 1, "explain": "Латентность — задержка между инициированием операции (запросом) и получением результата, в отличие от пропускной способности (throughput), измеряющей объём работы за единицу времени."}, {"q": "Что такое пропускная способность (throughput) системы?", "options": ["Размер сетевого канала в метрах кабеля", "Количество операций/запросов, обрабатываемых системой за единицу времени", "Максимальный объём памяти, который может использовать программа", "Время отклика на единичный запрос"], "correct": 1, "explain": "Throughput измеряет объём полезной работы (например, запросов, транзакций), выполняемой системой за единицу времени, в отличие от латентности отдельного запроса."}, {"q": "Что такое амортизированная сложность (amortized complexity) операции, например, добавления элемента в динамический массив?", "options": ["Средняя сложность по случайно выбранным входным данным", "Сложность, усреднённая по большой последовательности операций, даже если отдельные редкие операции существенно дороже остальных", "Сложность в наихудшем возможном случае для одной операции", "Сложность, применяемая только к рекурсивным алгоритмам"], "correct": 1, "explain": "Амортизированный анализ усредняет затраты по длинной последовательности операций, показывая, что даже при редких дорогих операциях (например, реаллокация массива) средняя стоимость одной операции остаётся низкой."}, {"q": "Что означает термин 'горячий путь' (hot path) в оптимизации производительности?", "options": ["Участок кода, который выполняется крайне редко", "Путь передачи данных по зашифрованному каналу", "Наиболее часто выполняемый участок кода, на который стоит в первую очередь обратить внимание при оптимизации", "Название алгоритма сортировки"], "correct": 2, "explain": "Hot path — часто выполняемая часть программы (например, внутренний цикл, обрабатывающий большинство запросов), оптимизация которой даёт наибольший эффект на общую производительность."}, {"q": "Почему профилирование должно предшествовать оптимизации кода, а не полагаться на интуитивные догадки разработчика о том, что медленно?", "options": ["Профилирование всегда даёт менее точные результаты, чем интуиция опытного разработчика", "Оптимизация кода без предварительного профилирования всегда даёт такой же результат, как и с профилированием", "Узкие места производительности всегда находятся именно там, где разработчик их изначально ожидает", "Интуитивные предположения о причинах медленной работы часто оказываются неверны на практике — реальные узкие места нередко находятся в неожиданных местах, и профилирование даёт объективные данные вместо предположений"], "correct": 3, "explain": "Известное правило разработки ПО: 'не гадай, а измеряй' — эмпирические данные профилировщика систематически выявляют неожиданные узкие места, которые интуиция часто упускает или неверно определяет."}, {"q": "Почему алгоритм с временной сложностью O(n log n) обычно предпочтительнее O(n²) при работе с большими объёмами данных, даже если у O(n²) меньше константный коэффициент для малых n?", "options": ["O(n²) всегда быстрее O(n log n) независимо от размера входных данных", "При достаточно большом n асимптотический рост числа операций O(n²) значительно опережает рост O(n log n), и разница становится настолько существенной, что перевешивает любое преимущество в константном коэффициенте на малых данных", "Константный коэффициент всегда важнее асимптотической сложности при любом объёме данных", "Асимптотическая сложность не имеет значения при выборе алгоритма для реальных задач"], "correct": 1, "explain": "Асимптотический анализ показывает поведение при устремлении n к бесконечности; хотя при малых n алгоритм с худшей асимптотикой может быть быстрее из-за меньших констант, при достаточно большом n асимптотически лучший алгоритм неизбежно выигрывает."}, {"q": "Почему кэширование результатов дорогостоящих вычислений может ухудшить производительность системы, если кэш реализован без учёта паттернов инвалидации (устаревания) данных?", "options": ["Устаревшие (не инвалидированные вовремя) данные в кэше могут привести к возврату неверных результатов, а плохо спроектированная стратегия инвалидации/вытеснения может создать дополнительные накладные расходы, перевешивающие выгоду от кэширования", "Инвалидация кэша не влияет на корректность возвращаемых данных", "Кэш никогда не может содержать устаревшие данные при правильной реализации", "Кэширование всегда улучшает производительность системы без каких-либо возможных недостатков"], "correct": 0, "explain": "Кэширование — компромисс: помимо потенциальной пользы, оно добавляет сложность (нужно отслеживать актуальность данных) и, при плохой реализации инвалидации, может вернуть устаревшие данные или создать накладные расходы на управление самим кэшем, перевешивающие выгоду."}, {"q": "Как принцип локальности данных (data locality) объясняет, почему обход двумерного массива в порядке, соответствующем его физическому расположению в памяти, может быть значительно быстрее обхода в 'непоследовательном' порядке?", "options": ["Порядок обхода массива не влияет на производительность независимо от архитектуры процессора", "Кэш процессора одинаково эффективно обрабатывает любой порядок доступа к памяти", "Последовательный обход эффективно использует кэш процессора (данные, загруженные в кэш-линию, скорее всего понадобятся следующими), тогда как непоследовательный доступ вызывает частые промахи кэша, требующие обращения к значительно более медленной оперативной памяти", "Непоследовательный доступ к памяти всегда быстрее последовательного благодаря случайности"], "correct": 2, "explain": "Классический пример: обход двумерного массива по строкам (соответствующего порядку хранения в памяти в языках с row-major порядком) намного эффективнее использует кэш-линии процессора, чем обход по столбцам, требующий частых промахов кэша."}, {"q": "Почему компромисс между потреблением памяти и скоростью выполнения (space-time tradeoff) является фундаментальным паттерном оптимизации, а не просто частным случаем?", "options": ["Увеличение потребления памяти всегда одновременно замедляет выполнение программы без исключений", "Многие оптимизации по сути 'обменивают' дополнительную память (например, на хранение предвычисленных результатов, индексов, кэшей) на снижение времени вычислений, и почти любую задачу можно решать по-разному вдоль этого спектра компромисса", "Память и скорость выполнения программы всегда изменяются независимо друг от друга без какой-либо связи", "Существует единственно верное соотношение памяти и скорости, подходящее для любой задачи"], "correct": 1, "explain": "Space-time tradeoff — фундаментальный паттерн информатики: предвычисление и хранение результатов (таблицы поиска, индексы, кэши) обменивает дополнительную память на меньшее время вычислений, и почти каждая оптимизация так или иначе укладывается в этот спектр компромисса."}, {"q": "Почему оптимизация одного узкого места в системе иногда просто 'перемещает' проблему производительности на следующий по значимости компонент, а не устраняет её полностью?", "options": ["Общая производительность системы ограничивается самым медленным на данный момент компонентом (законом Амдала/принципом бутылочного горлышка), и после устранения текущего узкого места следующий по значимости компонент становится новым ограничивающим фактором", "В системе никогда не может быть более одного узкого места одновременно", "Узкие места производительности не связаны друг с другом внутри одной системы", "Устранение одного узкого места всегда полностью решает все проблемы производительности системы навсегда"], "correct": 0, "explain": "Классическая динамика оптимизации: устранение самого значительного узкого места обычно выявляет следующий по значимости ограничивающий фактор — процесс оптимизации часто итеративен, а не одноразовое полное решение всех проблем производительности."}, {"q": "Как закон Амдала объясняет ограниченную пользу от ускорения только части программы, если остальная часть остаётся последовательной (нераспараллеливаемой)?", "options": ["Закон Амдала утверждает, что любое ускорение части кода всегда даёт пропорциональное ускорение всей программы", "Закон Амдала применим только к однопоточным программам и не связан с параллелизмом", "Согласно закону Амдала, распараллеливание всегда даёт неограниченное ускорение независимо от доли последовательного кода", "Закон Амдала показывает, что максимально возможное ускорение всей программы ограничено долей кода, которую вообще можно ускорить/распараллелить — даже бесконечное ускорение параллелизуемой части не даст пропорционального ускорения всей программы, если значительная часть остаётся последовательной"], "correct": 3, "explain": "Закон Амдала формализует интуицию, что общее ускорение системы ограничено долей кода, не подлежащей ускорению; например, если 10% кода строго последовательно, максимальное ускорение никогда не превысит 10x, независимо от того, насколько сильно ускорены остальные 90%."}, {"q": "Почему асинхронная (неблокирующая) обработка операций ввода-вывода может значительно повысить пропускную способность системы, даже если латентность отдельной операции не меняется?", "options": ["Синхронная и асинхронная обработка операций ввода-вывода всегда дают идентичную пропускную способность системы", "Асинхронная обработка всегда уменьшает латентность каждой отдельной операции ввода-вывода", "Асинхронный подход позволяет процессору/потоку заниматься другой полезной работой, пока медленная операция ввода-вывода (например, сетевой запрос) выполняется в фоне, вместо простого ожидания (блокировки), что увеличивает общее количество обработанной за единицу времени работы", "Асинхронность не связана с повышением эффективности использования ресурсов процессора"], "correct": 2, "explain": "Асинхронность не ускоряет саму операцию ввода-вывода (латентность отдельного запроса та же), но освобождает вычислительный ресурс для полезной работы во время ожидания, значительно увеличивая общую пропускную способность системы при большом числе параллельных запросов."}, {"q": "Почему уменьшение числа обращений к внешним ресурсам (например, батчинг запросов к базе данных вместо множества отдельных запросов) часто даёт больший прирост производительности, чем оптимизация самого вычислительного кода?", "options": ["Обращения к базе данных всегда происходят с той же скоростью, что и обычные операции в памяти", "Батчинг запросов к внешним ресурсам никогда не влияет на общую производительность системы", "Обращения к внешним ресурсам (сеть, диск, БД) обычно на порядки медленнее обращений к памяти или локальных вычислений, поэтому сокращение количества таких дорогих обращений (даже ценой чуть более сложной логики) часто даёт значительно больший выигрыш, чем ускорение локальных вычислений", "Оптимизация локальных вычислений всегда важнее оптимизации сетевых или дисковых операций"], "correct": 2, "explain": "Огромная разница в порядках величины между локальными вычислениями (наносекунды) и сетевыми/дисковыми операциями (миллисекунды и больше) означает, что сокращение количества дорогих внешних обращений обычно даёт значительно больший практический эффект, чем микрооптимизация локального кода."}, {"q": "Как понимание разницы между оптимизацией 'в среднем случае' и 'в худшем случае' влияет на выбор алгоритма для системы с жёсткими требованиями к предсказуемости отклика (например, торговые системы, системы реального времени)?", "options": ["Средний и худший случай сложности алгоритма всегда идентичны для любого алгоритма", "Выбор между средним и худшим случаем сложности алгоритма не имеет практического значения", "Для систем реального времени средний случай производительности всегда важнее худшего", "Для систем, где важна гарантированная предсказуемость, иногда предпочитают алгоритм с чуть худшей средней производительностью, но с более предсказуемым, ограниченным худшим случаем, вместо алгоритма с лучшей средней, но непредсказуемой (изредка очень медленной) производительностью"], "correct": 3, "explain": "В системах, критичных к предсказуемости (не только к средней скорости), иногда осознанно жертвуют средней производительностью ради гарантированно ограниченного времени выполнения в худшем случае — классический архитектурный компромисс между throughput и predictability."}, {"q": "Как архитектурно взаимодействуют между собой профилирование, идентификация узкого места и последующая оптимизация как единый итеративный процесс, а не одноразовое действие?", "options": ["Цикл 'измерить → найти узкое место → оптимизировать → снова измерить' повторяется многократно, так как устранение одного узкого места обычно выявляет следующее, и без повторного профилирования после каждого изменения легко оптимизировать не то, что реально сейчас ограничивает производительность", "Узкое место в системе всегда только одно и, будучи один раз устранённым, не появляется вновь", "Оптимизация кода никогда не требует повторного измерения производительности после внесения изменений", "Профилирование выполняется только один раз в самом начале разработки и никогда не повторяется впоследствии"], "correct": 0, "explain": "Оптимизация производительности — по своей природе итеративный процесс: после устранения текущего узкого места структура ограничений системы меняется, и следующий цикл профилирования может выявить совершенно другое место, требующее внимания."}, {"q": "Почему выбор структуры данных (например, хеш-таблица вместо связного списка для поиска) часто даёт больший архитектурный выигрыш в производительности, чем последующая микрооптимизация кода, работающего с этой структурой?", "options": ["Микрооптимизация низкоуровневого кода всегда даёт больший выигрыш, чем смена структуры данных", "Фундаментальная асимптотическая сложность операций (например, O(1) в среднем для хеш-таблицы против O(n) для линейного поиска в списке) определяет масштаб возможного ускорения, который зачастую недостижим одной лишь оптимизацией низкоуровневых деталей реализации при сохранении неподходящей структуры данных", "Хеш-таблицы и связные списки всегда имеют одинаковую асимптотическую сложность поиска элемента", "Выбор структуры данных не оказывает влияния на асимптотическую сложность операций поиска"], "correct": 1, "explain": "Архитектурный выбор на уровне алгоритмов и структур данных задаёт принципиальные границы производительности (асимптотику), которые невозможно преодолеть одной лишь микрооптимизацией деталей реализации при сохранении принципиально неподходящей структуры данных."}, {"q": "Как компромисс между строгой консистентностью данных и производительностью проявляется в архитектурном решении использовать кэш с возможной временной несогласованностью (eventual consistency) вместо всегда актуальных данных?", "options": ["Допуская кратковременную несогласованность (устаревшие, но не критично неверные данные) в обмен на значительно более быструю и масштабируемую систему, разработчики принимают осознанный компромисс между строгой корректностью и производительностью, уместный не для всех, но для многих сценариев", "Строгая консистентность данных никогда не влияет на производительность системы", "Использование кэша всегда гарантирует абсолютно актуальные данные без каких-либо компромиссов", "Eventual consistency технически идентична строгой консистентности данных по определению"], "correct": 0, "explain": "Классический архитектурный компромисс распределённых систем (отражённый, например, в теореме CAP): ослабление строгих гарантий консистентности часто даёт существенный выигрыш в производительности и масштабируемости, уместный там, где кратковременная несогласованность приемлема для бизнес-логики."}, {"q": "Почему решение о том, оптимизировать ли под latency (задержку отдельного запроса) или throughput (общую пропускную способность), архитектурно зависит от характера использования системы (интерактивное приложение vs пакетная обработка данных)?", "options": ["Пакетная обработка данных всегда требует минимальной задержки отдельного запроса, как и интерактивные системы", "Интерактивные системы (например, пользовательский интерфейс) обычно приоритизируют низкую задержку отдельного действия, тогда как пакетные системы обработки больших объёмов данных чаще приоритизируют максимальную общую пропускную способность, даже если отдельные задания обрабатываются с большей задержкой", "Оптимизация под задержку и оптимизация под пропускную способность технически идентичны и не требуют разных архитектурных решений", "Задержка и пропускная способность всегда должны оптимизироваться в равной степени независимо от характера системы"], "correct": 1, "explain": "Архитектурный выбор приоритета (latency vs throughput) должен соответствовать реальному сценарию использования: пользователю в интерактивном интерфейсе важна мгновенная реакция, тогда как система пакетной обработки данных выигрывает от максимизации общего объёма обработанной работы, даже ценой задержки отдельных заданий."}, {"q": "Как понимание конкуренции за разделяемые ресурсы (shared resource contention) помогает архитектурно спроектировать систему так, чтобы она хорошо масштабировалась при увеличении параллельной нагрузки?", "options": ["Конкуренция за разделяемые ресурсы никогда не ограничивает масштабируемость параллельных систем", "Единая глобальная блокировка на все данные системы всегда одинаково хорошо масштабируется независимо от нагрузки", "Партиционирование данных никогда не помогает снизить конкуренцию за общие ресурсы", "Минимизация числа операций, требующих эксклюзивного доступа к общим ресурсам (единая блокировка, общий счётчик, единственное соединение с БД), и переход к партиционированию/шардированию данных снижает конкуренцию, позволяя системе эффективнее использовать дополнительные параллельные ресурсы (потоки, серверы)"], "correct": 3, "explain": "Проектирование с учётом снижения конкуренции за общие ресурсы (например, шардирование БД, локальные структуры данных вместо глобальных блокировок) — ключевой архитектурный принцип, обеспечивающий эффективное горизонтальное масштабирование системы при росте параллельной нагрузки."}, {"q": "Почему выбор между 'ленивым' (lazy) и 'энергичным' (eager) вычислением значений архитектурно влияет на распределение затрат производительности во времени выполнения программы?", "options": ["Ленивое вычисление откладывает затраты до момента, когда значение действительно понадобится (возможно, никогда), тогда как энергичное вычисление тратит ресурсы заранее независимо от того, будет ли значение использовано — выбор между ними влияет на то, когда именно и будут ли вообще понесены соответствующие затраты", "Ленивое и энергичное вычисление всегда дают абсолютно идентичное распределение затрат по времени выполнения", "Выбор стратегии вычисления значений не связан с общей производительностью программы", "Энергичное вычисление всегда быстрее ленивого при любых сценариях использования результата"], "correct": 0, "explain": "Lazy evaluation откладывает вычисление до фактической необходимости (что может сэкономить ресурсы, если значение вообще не понадобится), тогда как eager evaluation вычисляет всё заранее — архитектурный выбор между ними влияет на то, когда именно система несёт соответствующие вычислительные затраты и несёт ли их вообще."}, {"q": "Как принцип 'разделяй и властвуй' (divide and conquer) в контексте оптимизации производительности помогает распределённым системам обрабатывать объёмы данных, не помещающиеся на одной машине?", "options": ["Divide and conquer применим исключительно к рекурсивным алгоритмам на одном компьютере и не связан с распределёнными системами", "Разбиение большой задачи на независимые подзадачи меньшего размера, обрабатываемые параллельно на разных узлах, а затем объединение результатов, позволяет масштабировать обработку данных горизontально за пределы возможностей одной машины", "Распределённые системы обработки больших данных никогда не используют принцип разделения задачи на части", "Разбиение задачи на подзадачи всегда снижает общую производительность системы по сравнению с обработкой на одной машине"], "correct": 1, "explain": "Принцип 'разделяй и властвуй' лежит в основе многих систем распределённой обработки данных (например, MapReduce): большая задача разбивается на независимые части, обрабатываемые параллельно на разных узлах, что позволяет горизонтально масштабировать обработку за пределы возможностей одной машины."}, {"q": "Почему архитектурное решение денормализовать данные в базе данных (сознательно ввести избыточность) иногда применяется именно ради повышения производительности чтения, несмотря на усложнение записи и риск рассинхронизации?", "options": ["Денормализация данных не имеет отношения к производительности чтения запросов", "Денормализация избавляет от необходимости выполнять дорогостоящие операции соединения (join) таблиц при каждом чтении, что может значительно ускорить частые запросы на чтение ценой более сложной и потенциально более медленной логики записи/поддержания согласованности избыточных данных", "Нормализованные базы данных всегда работают быстрее денормализованных при любых сценариях использования", "Денормализация данных всегда одновременно ускоряет и чтение, и запись без каких-либо компромиссов"], "correct": 1, "explain": "Это классический архитектурный компромисс баз данных: денормализация обменивает более сложную и потенциально более медленную логику записи (нужно поддерживать согласованность дублированных данных) на существенно более быстрое чтение, избегая дорогих join-операций — уместно для систем с преобладанием чтения над записью."}, {"q": "Как понимание разницы между вертикальным (увеличение мощности одной машины) и горизонтальным (добавление большего числа машин) масштабированием влияет на архитектурные решения по оптимизации производительности при росте нагрузки?", "options": ["Вертикальное масштабирование всегда предпочтительнее горизонтального при любых объёмах нагрузки", "Вертикальное масштабирование проще в реализации, но физически ограничено максимальной мощностью одной машины, тогда как горизонтальное масштабирование потенциально безгранично, но требует архитектуры, способной эффективно распределять нагрузку и данные между множеством узлов", "Горизонтальное масштабирование не требует каких-либо архитектурных изменений в приложении", "Оба типа масштабирования всегда дают идентичный прирост производительности при равных затратах"], "correct": 1, "explain": "Выбор между вертикальным и горизонтальным масштабированием — фундаментальное архитектурное решение: вертикальное ограничено физическими пределами одной машины, тогда как горизонтальное требует более сложной, но потенциально неограниченно масштабируемой архитектуры (распределённые системы, шардирование, балансировка нагрузки)."}, {"q": "Веб-сервис показывает высокую среднюю задержку ответа, и профилирование выявило, что 80% времени тратится на один и тот же повторяющийся запрос к внешнему API с одинаковыми параметрами. Какая оптимизация наиболее уместна в первую очередь?", "options": ["Оптимизировать несвязанные части кода, не влияющие на выявленное узкое место", "Полностью переписать весь сервис на другом языке программирования без анализа причины задержки", "Увеличить количество серверов пропорционально росту нагрузки, игнорируя первопричину задержки", "Внедрить кэширование результата этого запроса, чтобы не повторять один и тот же дорогой вызов внешнего API при одинаковых параметрах"], "correct": 3, "explain": "Если профилирование чётко указывает на повторяющийся дорогой вызов с одинаковыми параметрами как основную причину задержки, кэширование результата — наиболее прямое и эффективное решение именно этого узкого места."}, {"q": "Команда обнаруживает, что добавление большего числа серверов не увеличивает пропорционально общую пропускную способность системы, а эффект от масштабирования постепенно уменьшается. Какая концепция лучше всего объясняет это наблюдение?", "options": ["Закон Амдала неприменим к масштабированию распределённых систем", "Закон Амдала — какая-то часть обработки запроса остаётся последовательной (не распараллеливаемой, например, работа с общей базой данных), что ограничивает максимально достижимое ускорение от добавления серверов", "Добавление серверов всегда даёт строго линейное увеличение пропускной способности без исключений", "Проблема гарантированно вызвана исключительно недостаточной мощностью сети между серверами"], "correct": 1, "explain": "Классическое проявление закона Амдала в контексте горизонтального масштабирования: если часть системы (например, единая база данных или общий ресурс) не может быть распараллелена, эффект от добавления серверов будет убывающим, а не линейным."}, {"q": "Инженер оптимизирует функцию обработки изображений, заменяя обход пикселей построчно (соответствующий порядку хранения в памяти) на обход по столбцам без явной причины для этого выбора. Производительность заметно упала. Какое объяснение наиболее вероятно?", "options": ["Проблема гарантированно связана с недостаточной тактовой частотой процессора, а не с порядком обхода данных", "Порядок обхода пикселей никогда не влияет на производительность обработки изображений", "Обход по столбцам всегда быстрее обхода по строкам независимо от организации памяти", "Обход по столбцам нарушает локальность данных, вызывая частые промахи кэша процессора по сравнению с последовательным построчным обходом, соответствующим физическому расположению данных в памяти"], "correct": 3, "explain": "Классическая ошибка производительности — изменение порядка обхода массива на 'непоследовательный' относительно хранения в памяти резко увеличивает число промахов кэша, что и объясняет заметное падение производительности в этом сценарии."}, {"q": "Разработчик добавил кэш для дорогостоящей функции, но со временем заметил, что кэш возвращает устаревшие результаты после изменения исходных данных, что приводит к неверному поведению приложения. Какая практика могла бы предотвратить эту проблему?", "options": ["Кэш никогда не может содержать устаревшие данные, поэтому проблема находится в другом месте системы", "Устаревание данных в кэше не может быть исправлено программными средствами", "Реализовать чёткую стратегию инвалидации кэша (например, по времени жизни записи, событию изменения данных или версионированию), гарантирующую своевременное обновление или удаление устаревших записей", "Единственное решение — полностью отказаться от использования кэширования в системе"], "correct": 2, "explain": "Классическая 'вторая самая сложная задача в информатике' (наряду с именованием переменных) — инвалидация кэша; продуманная стратегия (TTL, инвалидация по событию, версионирование) необходима для предотвращения возврата устаревших данных."}, {"q": "Команда разрабатывает систему обработки платежей с жёсткими требованиями к предсказуемости времени отклика (не более 100 мс в 99.9% случаев). Алгоритм A имеет лучшую среднюю производительность, но иногда (редко) занимает 2 секунды; алгоритм B немного медленнее в среднем, но гарантированно укладывается в 50 мс всегда. Какой алгоритм предпочтительнее для этой системы?", "options": ["Нужно использовать оба алгоритма одновременно без анализа требований системы", "Алгоритм A, так как лучшая средняя производительность всегда важнее в любых системах", "Алгоритм B, так как гарантированная предсказуемость времени отклика важнее чуть лучшей средней производительности для систем с жёсткими требованиями к задержке", "Выбор между алгоритмами не имеет значения, если оба в среднем достаточно быстры"], "correct": 2, "explain": "Для систем с жёсткими SLA по задержке (например, обработка платежей) редкие, но существенные всплески задержки алгоритма A могут нарушить требования системы, поэтому предсказуемый, пусть и немного менее быстрый в среднем, алгоритм B часто предпочтительнее."}, {"q": "При нагрузочном тестировании веб-приложения обнаружено, что при увеличении числа одновременных пользователей с 100 до 1000 время отклика выросло не в 10, а в 50 раз. Какая наиболее вероятная причина такого непропорционального ухудшения?", "options": ["Проблема гарантированно связана исключительно с недостаточной скоростью интернет-соединения тестировщика", "Непропорциональный рост задержки невозможен при корректно спроектированной системе", "Время отклика всегда растёт строго пропорционально числу пользователей независимо от архитектуры системы", "Вероятно, где-то в системе есть ограниченный разделяемый ресурс (например, пул соединений с базой данных, единая блокировка), который становится узким местом и вызывает очереди/конкуренцию при высокой нагрузке, а не линейное увеличение задержки"], "correct": 3, "explain": "Непропорциональный (супралинейный) рост задержки при увеличении нагрузки — классический признак конкуренции за ограниченный разделяемый ресурс (пул соединений, блокировка, очередь), который становится узким местом при достижении определённого порога нагрузки."}, {"q": "Разработчик добавил асинхронную обработку сетевых запросов вместо синхронной блокирующей модели, ожидая пропорционального увеличения пропускной способности сервиса. Однако прирост оказался значительно меньше ожидаемого. Какой фактор мог ограничить выигрыш от асинхронности?", "options": ["Синхронная и асинхронная модели ввода-вывода всегда дают идентичный прирост производительности", "Проблема гарантированно связана исключительно с ошибкой в реализации асинхронного кода", "Возможно, реальным узким местом является не ожидание сетевого ввода-вывода, а ограниченность другого ресурса (например, процессора при интенсивных вычислениях или базы данных), который асинхронность сама по себе не устраняет", "Асинхронная обработка всегда даёт строго пропорциональное увеличение пропускной способности независимо от других факторов системы"], "correct": 2, "explain": "Асинхронность помогает именно тогда, когда узкое место — ожидание ввода-вывода; если реальным ограничением являются вычисления на CPU или другой разделяемый ресурс (например, БД), одна лишь асинхронность операций ввода-вывода не устранит это иное узкое место."}, {"q": "Инженер применил амортизированный анализ и заявил, что операция добавления элемента в динамический массив имеет амортизированную сложность O(1), хотя отдельные вызовы иногда занимают O(n) из-за реаллокации памяти. Какой практический вывод из этого следует для оценки производительности длинной последовательности вставок?", "options": ["Амортизированный анализ означает, что реаллокации памяти никогда не происходят на практике", "В среднем по длинной последовательности вставок затраты на редкие дорогие реаллокации 'размазываются' между многими дешёвыми операциями, поэтому суммарное время для N вставок остаётся линейным (O(N)), а не квадратичным", "Каждая отдельная операция вставки гарантированно выполняется за строго постоянное время без исключений", "Общее время выполнения N вставок всегда будет квадратичным (O(N²)) независимо от амортизации"], "correct": 1, "explain": "Именно в этом смысл амортизированного анализа: хотя отдельные операции иногда дороги (реаллокация с копированием), их редкость означает, что суммарная стоимость по длинной последовательности операций остаётся линейной, что и делает динамические массивы практичными несмотря на отдельные более дорогие вставки."}, {"q": "При анализе производительности приложения выясняется, что 90% времени выполнения тратится в одной конкретной функции, вызываемой миллионы раз. Какая стратегия оптимизации наиболее эффективна с точки зрения соотношения затраченных усилий и результата?", "options": ["Оптимизировать в первую очередь редко вызываемые функции, составляющие оставшиеся 10% времени", "Равномерно оптимизировать все функции приложения независимо от того, сколько времени в них тратится", "Оптимизация конкретных горячих функций никогда не влияет на общую производительность приложения", "Сосредоточить основные усилия на оптимизации именно этой функции ('горячего пути'), так как даже небольшое улучшение её эффективности даст непропорционально большой эффект на общую производительность приложения"], "correct": 3, "explain": "Классический принцип оптимизации по данным профилирования (в духе принципа Парето): усилия должны быть сосредоточены именно на горячем пути, дающем наибольшую долю общего времени выполнения, где даже небольшое улучшение даёт максимальный совокупный эффект."}, {"q": "Алгоритм A выполняет 100 операций для n=10 (примерно n²), алгоритм B выполняет 30 операций для того же n (примерно n log n). При n=1000 сколько примерно операций выполнит алгоритм A (используя ту же зависимость n²)?", "options": ["1000", "100000", "10000", "1000000"], "correct": 3, "explain": "Если для n=10 A делает ~100=n² операций, то для n=1000: 1000²=1000000 операций."}, {"q": "Функция вызывается 1 000 000 раз в секунду, и профилирование показало, что каждый вызов в среднем занимает 2 микросекунды. Сколько секунд суммарно тратится на все вызовы за одну секунду работы программы?", "options": ["2 секунды", "0.2 секунды", "0.5 секунды", "20 секунд"], "correct": 0, "explain": "1000000 вызовов × 2 микросекунды = 2000000 микросекунд = 2 секунды."}, {"q": "Кэш уменьшил среднее время ответа сервиса с 200 мс до 20 мс для 80% запросов (остальные 20% по-прежнему занимают 200 мс, так как не кэшируются). Каково новое среднее время ответа по всем запросам?", "options": ["180 мс", "20 мс", "100 мс", "56 мс"], "correct": 3, "explain": "0.8×20 + 0.2×200 = 16+40=56 мс среднее время ответа."}, {"q": "Согласно закону Амдала, если 20% кода программы нельзя распараллелить (остаётся строго последовательным), а остальные 80% ускоряются бесконечно, каково максимально возможное ускорение всей программы?", "options": ["1.25 раза", "2 раза", "5 раз", "Бесконечное ускорение"], "correct": 2, "explain": "Максимальное ускорение = 1/(доля последовательной части) = 1/0.2 = 5 раз, даже при бесконечном ускорении остальной части."}, {"q": "Система обрабатывает 500 запросов в секунду при 10 серверах. Если нагрузку увеличить до 2000 запросов в секунду с сохранением той же пропускной способности на сервер, сколько серверов потребуется при линейном масштабировании?", "options": ["30", "50", "40", "20"], "correct": 2, "explain": "500 запросов/сек на 10 серверов = 50 запросов/сек на сервер. Для 2000 запросов/сек: 2000/50=40 серверов."}, {"q": "Функция без оптимизации выполняется за 800 мс. После оптимизации горячего пути, занимавшего 90% времени, это время сократилось втрое. Сколько составит новое общее время выполнения?", "options": ["266 мс", "480 мс", "400 мс", "320 мс"], "correct": 3, "explain": "Горячий путь: 800×0.9=720 мс, после ускорения втрое: 720/3=240 мс. Остальные 10%: 80 мс без изменений. Итого: 240+80=320 мс."}, {"q": "Динамический массив увеличивается вдвое при заполнении (амортизированный подход). Если начальная ёмкость 4 элемента, и в массив добавлено 20 элементов, сколько раз потребуется реаллокация (увеличение ёмкости) — от 4 до 8, 16, 32?", "options": ["1 раз", "2 раза", "3 раза", "4 раза"], "correct": 2, "explain": "Ёмкость растёт: 4→8→16→32; чтобы вместить 20 элементов, потребуется 3 реаллокации (8 не хватит для 20, нужно 16, потом 32)."}, {"q": "Сервис обрабатывает запросы с латентностью 50 мс каждый в синхронном режиме одним потоком. Сколько запросов максимум сможет обработать этот поток за 1 секунду (1000 мс) в синхронном режиме?", "options": ["20", "10", "50", "100"], "correct": 0, "explain": "1000 мс / 50 мс на запрос = 20 запросов в секунду при синхронной последовательной обработке одним потоком."}, {"q": "После внедрения батчинга запросов к базе данных количество отдельных запросов сократилось с 10000 до 100 (группировка по 100 запросов в один батч). Если каждый отдельный запрос имел накладные расходы 5 мс на установление соединения, сколько миллисекунд накладных расходов было устранено?", "options": ["50000 мс", "49500 мс", "9500 мс", "99500 мс"], "correct": 1, "explain": "Было: 10000×5=50000 мс накладных расходов. Стало: 100×5=500 мс. Устранено: 50000-500=49500 мс."}, {"q": "Профилирование показало, что функция A вызывается 1000 раз по 10 мс, а функция B — 10 раз по 500 мс. Какая функция в сумме потребляет больше времени выполнения и на сколько миллисекунд больше?", "options": ["Функция B больше на 5000 мс", "Функция A больше на 5000 мс", "Функция A больше на 500 мс", "Обе функции потребляют одинаковое время"], "correct": 1, "explain": "A: 1000×10=10000 мс. B: 10×500=5000 мс. Разница: 10000-5000=5000 мс — функция A суммарно потребляет на 5000 мс больше, несмотря на то что каждый отдельный вызов B гораздо дороже."}, {"q": "Горизонтальное масштабирование увеличило число серверов с 5 до 20 (в 4 раза), а пропускная способность выросла лишь с 1000 до 3000 запросов/сек (в 3 раза) из-за накладных расходов координации. Какова эффективность масштабирования в процентах от идеального линейного роста?", "options": ["100%", "50%", "125%", "75%"], "correct": 3, "explain": "Идеальный рост в 4 раза дал бы 4000 запросов/сек; фактический рост в 3 раза составляет 3/4=75% от идеальной эффективности масштабирования."}, {"q": "Денормализация базы данных ускорила типичный запрос на чтение с 300 мс до 50 мс, но замедлила запись с 20 мс до 80 мс. Если на каждую 1 запись приходится 20 чтений, как изменилось суммарное время на типичный набор операций (1 запись + 20 чтений)?", "options": ["Данных недостаточно для расчёта", "Стало быстрее: было 6020 мс, стало 1080 мс", "Стало медленнее: было 1080 мс, стало 6020 мс", "Время не изменилось"], "correct": 1, "explain": "До: 1×20+20×300=20+6000=6020 мс. После: 1×80+20×50=80+1000=1080 мс. Суммарное время сократилось с 6020 до 1080 мс благодаря преобладанию чтений над записью."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
