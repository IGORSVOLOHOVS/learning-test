<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok: алгоритмы рекомендаций</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
    </div>
    <h1>TikTok: алгоритмы рекомендаций</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "tiktok_algorithm";
  const QUESTIONS = [{"q": "Что такое лента 'Для вас' (For You Page, FYP) в TikTok?", "options": ["Список видео, загруженных самим пользователем", "Персонализированная лента рекомендаций видео, формируемая алгоритмом на основе поведения пользователя", "Список только тех аккаунтов, на которые пользователь подписан", "Раздел с настройками приватности аккаунта"], "correct": 1, "explain": "FYP — главная лента приложения, полностью формируемая рекомендательным алгоритмом на основе предсказанного интереса пользователя, а не только подписок."}, {"q": "Какой из перечисленных сигналов явно учитывается алгоритмом TikTok при оценке интереса пользователя к видео?", "options": ["Только количество подписчиков автора видео", "Досмотр видео до конца (completion rate), лайки, комментарии, репосты и повторные просмотры", "Исключительно дата загрузки видео", "Только текст, указанный в биографии автора"], "correct": 1, "explain": "Алгоритм явно опирается на поведенческие сигналы взаимодействия — как долго пользователь смотрел видео, лайкал ли, комментировал, делился, пересматривал ли его."}, {"q": "Что такое 'completion rate' (процент досмотра) видео в контексте рекомендательных алгоритмов?", "options": ["Процент пользователей, подписавшихся на автора после просмотра", "Доля видео, просмотренная пользователем от начала до конца (или полностью)", "Скорость загрузки видео на сервер", "Количество исправлений, внесённых в описание видео"], "correct": 1, "explain": "Completion rate измеряет, какую долю видео пользователь посмотрел — короткие вертикальные видео позволяют легко отслеживать полный досмотр как сильный сигнал заинтересованности."}, {"q": "Почему короткие видео (обычно от нескольких секунд до пары минут) являются основным форматом контента в TikTok?", "options": ["Короткий формат делает вовлечение и удержание внимания пользователя более измеримым и быстрым, позволяя алгоритму собирать сигналы интереса (досмотр, повтор) за короткое время и быстро адаптировать рекомендации", "Короткие видео технически проще загружать на сервер, чем длинные", "Короткий формат был выбран случайно, без связи с эффективностью алгоритма рекомендаций", "Длинные видео технически невозможно воспроизводить на мобильных устройствах"], "correct": 0, "explain": "Короткий формат ускоряет цикл 'показ → реакция пользователя → обновление рекомендаций', позволяя алгоритму быстро собирать много сигналов о предпочтениях за единицу времени просмотра ленты."}, {"q": "Что означает термин 'холодный старт' (cold start) применительно к рекомендательным системам, включая TikTok?", "options": ["Проблема рекомендаций для нового пользователя или нового видео, о котором алгоритм ещё не имеет достаточно данных", "Технический сбой сервера при запуске приложения", "Период, когда приложение недоступно для скачивания", "Специальный режим для просмотра только старых видео"], "correct": 0, "explain": "Cold start — классическая проблема рекомендательных систем: для нового пользователя (мало истории) или нового видео (мало взаимодействий) алгоритму сложнее сделать точные персонализированные рекомендации."}, {"q": "Что из перечисленного НЕ является типичным явным сигналом взаимодействия, который пользователь может дать видео в TikTok?", "options": ["Лайк", "Комментарий", "Скорость интернет-соединения пользователя", "Репост (share)"], "correct": 2, "explain": "Скорость интернет-соединения — техническая характеристика, а не поведенческий сигнал интереса пользователя к контенту, в отличие от лайков, комментариев и репостов."}, {"q": "Что такое 'пузырь фильтров' (filter bubble) применительно к рекомендательным алгоритмам вроде TikTok?", "options": ["Функция для размытия фона видео", "Явление, при котором пользователь со временем видит всё более узкий, однообразный набор контента, соответствующий его предыдущим реакциям, реже сталкиваясь с новыми точками зрения", "Специальный визуальный фильтр для приложения", "Способ шифрования личных сообщений пользователя"], "correct": 1, "explain": "Filter bubble — эффект, при котором персонализация со временем сужает разнообразие показываемого контента, усиливая уже существующие интересы и предпочтения пользователя."}, {"q": "Зачем рекомендательные алгоритмы, подобные TikTok, иногда намеренно показывают пользователю контент, немного выходящий за пределы его обычных интересов (exploration)?", "options": ["Чтобы собрать дополнительные данные о потенциально новых интересах пользователя и избежать чрезмерного сужения рекомендаций (баланс между 'exploration' и 'exploitation')", "Это происходит случайно, без какой-либо цели со стороны алгоритма", "Чтобы намеренно ухудшить качество рекомендаций для пользователя", "Такая практика не применяется ни в одной современной рекомендательной системе"], "correct": 0, "explain": "Компромисс exploration/exploitation — фундаментальная концепция рекомендательных систем: чистая 'эксплуатация' уже известных интересов рискует застоем рекомендаций, тогда как 'исследование' новых тем помогает выявить неочевидные интересы пользователя."}, {"q": "Что из перечисленного является примером неявного (implicit) сигнала обратной связи в рекомендательной системе, в отличие от явного (explicit)?", "options": ["Пользователь поставил видео явный лайк", "Пользователь пересмотрел видео несколько раз подряд, не оставляя лайка или комментария", "Пользователь написал развёрнутый комментарий под видео", "Пользователь пожаловался на видео через форму жалобы"], "correct": 1, "explain": "Неявные сигналы (время просмотра, повторные просмотры, скорость пролистывания) выводятся из поведения пользователя без явного действия вроде лайка/комментария, которые считаются явными сигналами."}, {"q": "Что означает термин 'вирусность' (virality) контента в контексте социальных сетей?", "options": ["Заражение устройства пользователя компьютерным вирусом при просмотре видео", "Быстрое и масштабное распространение контента за счёт активных репостов и органического охвата среди пользователей", "Скорость загрузки видео на сервер платформы", "Официальный статус, присваиваемый администрацией платформы избранным видео"], "correct": 1, "explain": "Вирусность описывает органическое, экспоненциальное распространение контента через репосты и рекомендации, когда каждый просмотревший делится с другими, значительно расширяя охват."}, {"q": "Почему рекомендательный алгоритм, ориентированный на явные сигналы (лайки, подписки), обычно менее точен в предсказании реального интереса, чем алгоритм, также использующий неявные поведенческие сигналы (время просмотра, повторы)?", "options": ["Явные действия (лайк, подписка) совершает далеко не каждый заинтересованный пользователь, тогда как неявные сигналы (сколько времени провёл, пересматривал ли) отражают фактическое поведение почти каждого просмотревшего видео, давая гораздо более полную картину интереса", "Неявные сигналы поведения технически невозможно измерить в приложениях вроде TikTok", "Явные действия пользователей всегда точнее отражают интерес, чем любые поведенческие метрики", "Использование неявных сигналов запрещено политиками конфиденциальности всех платформ"], "correct": 0, "explain": "Явные действия (лайк, комментарий, подписка) совершает лишь небольшая доля заинтересованных зрителей ('эффект 90-9-1' в интернет-сообществах), тогда как поведенческие метрики (время просмотра, повторы) собираются практически для каждого показа, давая алгоритму гораздо больше данных для точной персонализации."}, {"q": "Почему короткий формат видео в TikTok особенно хорошо подходит для быстрого итеративного обучения рекомендательной модели (по сравнению с длинными видео на других платформах)?", "options": ["Короткое видео даёт быстрый и чёткий сигнал (досмотрел / не досмотрел, пересмотрел) за секунды, тогда как для длинных видео сигнал о вовлечённости накапливается намного медленнее, что замедляет обратную связь для алгоритма", "Короткие видео дают алгоритму меньше данных для анализа по сравнению с длинными видео", "Длина видео не влияет на скорость сбора данных для рекомендательного алгоритма", "Короткий формат видео технически несовместим с любыми алгоритмами машинного обучения"], "correct": 0, "explain": "Быстрый цикл 'показ → реакция' при коротких видео (секунды на сигнал) резко ускоряет итеративное уточнение модели интересов пользователя по сравнению с форматами, где полный сигнал вовлечённости накапливается только через много минут просмотра."}, {"q": "Как компромисс между 'exploration' (исследование новых интересов) и 'exploitation' (использование уже известных предпочтений) архитектурно решается в рекомендательных системах через механизмы, аналогичные многоруким бандитам (multi-armed bandit)?", "options": ["Система периодически показывает контент за пределами уже подтверждённых интересов пользователя (exploration), собирая данные о потенциально новых предпочтениях, при этом основную часть времени показывая контент с высокой ожидаемой вовлечённостью (exploitation), балансируя между узнаванием нового и максимизацией текущей удовлетворённости", "Рекомендательные системы всегда показывают только уже проверенный, знакомый пользователю контент без какого-либо исследования нового", "Exploration и exploitation — взаимоисключающие подходы, никогда не комбинируемые в одной системе", "Многорукие бандиты — это концепция, применимая только к финансовым рынкам, а не к рекомендательным системам"], "correct": 0, "explain": "Задача многорукого бандита — классическая формализация компромисса exploration/exploitation, широко применяемая в рекомендательных системах: баланс между показом уже проверенно интересного контента и экспериментальным показом нового, потенциально ещё более интересного."}, {"q": "Почему быстрая адаптация ленты 'Для вас' к изменению поведения пользователя (например, после серии просмотров нового типа контента) считается одновременно преимуществом и потенциальным риском алгоритма?", "options": ["Быстрая адаптация делает рекомендации более релевантными новым интересам, но также означает, что кратковременное или случайное поведение (например, просмотр контента для друга) может быстро и, возможно, нежелательно исказить всю дальнейшую ленту рекомендаций", "Быстрая адаптация ленты никогда не может быть недостатком системы рекомендаций", "Изменение поведения пользователя никогда не влияет на скорость обновления рекомендаций", "Адаптация ленты происходит только раз в месяц независимо от поведения пользователя"], "correct": 0, "explain": "Высокая чувствительность алгоритма к недавнему поведению — палка о двух концах: она обеспечивает актуальность рекомендаций, но также означает уязвимость к кратковременным, нетипичным сессиям использования, способным временно 'испортить' персонализированную ленту."}, {"q": "Почему алгоритмы рекомендаций, оптимизированные исключительно на максимизацию вовлечённости (engagement), рискуют со временем продвигать более эмоционально заряженный или поляризующий контент?", "options": ["Контент, вызывающий сильные эмоциональные реакции (возмущение, удивление, сильное согласие), часто статистически получает больше взаимодействий (комментарии, репосты, долгий просмотр), поэтому чисто engagement-ориентированная оптимизация может неявно благоприятствовать такому контенту, даже без явного намерения его продвигать", "Оптимизация на вовлечённость никогда не влияет на характер продвигаемого контента", "Эмоционально нейтральный контент всегда получает больше вовлечённости, чем эмоционально заряженный", "Алгоритмы рекомендаций технически не способны различать эмоциональную окраску контента"], "correct": 0, "explain": "Это широко обсуждаемая в индустрии проблема: метрика вовлечённости, будучи прокси для 'интереса', эмпирически коррелирует и с эмоционально провокационным контентом, что создаёт неявный стимул для алгоритма продвигать такой контент, даже если это не было явной целью его разработчиков."}, {"q": "Как проблема холодного старта для нового видео (мало данных о реакции зрителей) решается через механизм пробного показа небольшой тестовой аудитории перед более широким распространением?", "options": ["Видео сначала показывается небольшой выборке пользователей, и на основе их реакции (досмотр, лайки, репосты) алгоритм оценивает потенциал видео, постепенно расширяя аудиторию показа при хороших метриках или ограничивая при слабых", "Все новые видео сразу же показываются максимально широкой аудитории без какого-либо предварительного тестирования", "Холодный старт для новых видео технически неразрешим и не имеет практических решений в реальных системах", "Реакция небольшой тестовой аудитории никогда не используется для прогнозирования потенциала видео"], "correct": 0, "explain": "Постепенное расширение аудитории показа на основе ранних сигналов вовлечённости от небольшой тестовой группы — практичный подход к проблеме холодного старта, позволяющий эффективно 'отфильтровать' потенциально вирусный контент от менее интересного без риска сразу показать неудачное видео всем."}, {"q": "Почему рекомендательные алгоритмы обычно учитывают не только содержание видео (например, через анализ визуальных признаков, звука, текста), но и коллаборативную фильтрацию (поведение похожих пользователей)?", "options": ["Комбинация content-based подхода (анализ самого контента) и коллаборативной фильтрации (сходство поведения пользователей) компенсирует слабые места друг друга: контентный анализ помогает с холодным стартом видео, а коллаборативная фильтрация улавливает неочевидные паттерны интереса, не всегда предсказуемые по содержанию", "Коллаборативная фильтрация никогда не используется в современных рекомендательных системах видео", "Анализ содержания видео технически невозможен для коротких видеоформатов", "Content-based и коллаборативный подходы взаимоисключающи и никогда не комбинируются"], "correct": 0, "explain": "Гибридные рекомендательные системы комбинируют оба подхода именно потому, что каждый компенсирует слабые стороны другого: content-based анализ работает даже для совершенно нового видео без истории взаимодействий, а коллаборативная фильтрация улавливает менее очевидные, эмпирические паттерны схожести интересов пользователей."}, {"q": "Как эффект 'пузыря фильтров' архитектурно связан с самим механизмом персонализации, а не является отдельной, независимой ошибкой алгоритма?", "options": ["Персонализация по своей сути означает всё более точную подстройку под уже проявленные интересы пользователя, и без явных механизмов противодействия (намеренное разнообразие, exploration) это естественным образом сужает разнообразие показываемого контента со временем", "Пузырь фильтров возникает исключительно из-за случайных технических сбоев алгоритма, не связанных с логикой персонализации", "Персонализация рекомендаций никогда не может привести к сужению разнообразия контента", "Пузырь фильтров — эффект, полностью независимый от того, насколько точно алгоритм подстраивается под интересы пользователя"], "correct": 0, "explain": "Filter bubble — не случайный побочный эффект, а логическое следствие самой цели персонализации (показывать то, что максимально соответствует прошлым реакциям); противодействие требует сознательного встраивания механизмов разнообразия (exploration) в саму архитектуру системы."}, {"q": "Почему платформы, подобные TikTok, часто используют многоступенчатую архитектуру рекомендаций (например, сначала грубый отбор из миллионов видео, затем более точное ранжирование небольшого подмножества), а не применяют один сложный алгоритм ко всем видео сразу?", "options": ["Применение самой точной, но вычислительно затратной модели ко всему огромному каталогу видео для каждого пользователя было бы непрактично медленным, поэтому сначала быстрый, менее точный этап отбирает разумное подмножество кандидатов, а затем более сложная модель точно ранжирует уже это меньшее количество вариантов", "Многоступенчатая архитектура рекомендаций используется исключительно по историческим причинам без реальной технической необходимости", "Применение одной сложной модели ко всем видео сразу всегда быстрее многоступенчатого подхода", "Каталог видео на платформах вроде TikTok достаточно мал, чтобы не требовать многоступенчатой архитектуры отбора"], "correct": 0, "explain": "Классический архитектурный паттерн промышленных рекомендательных систем: 'candidate generation' (быстрый грубый отбор из огромного каталога) → 'ranking' (более точная, но затратная модель для финального ранжирования уже отобранного меньшего набора кандидатов) — балансирует между масштабом и точностью."}, {"q": "Как избыточная оптимизация алгоритма под краткосрочные метрики вовлечённости (например, время в приложении сегодня) может противоречить долгосрочным интересам пользователя или платформы (удержание, доверие)?", "options": ["Контент, максимизирующий немедленное вовлечение (например, чрезмерно провокационный или навязчивый), может со временем вызвать у пользователя усталость, раздражение или потерю доверия к платформе, снижая долгосрочное удержание, даже если краткосрочные метрики выглядят хорошо", "Краткосрочная и долгосрочная метрики вовлечённости всегда полностью совпадают без каких-либо противоречий", "Оптимизация под краткосрочные метрики никогда не имеет негативных долгосрочных последствий для платформы", "Долгосрочное удержание пользователей никак не связано с типом контента, который им показывают"], "correct": 0, "explain": "Известное противоречие в дизайне рекомендательных систем: метрики, легко измеримые и оптимизируемые в краткосрочной перспективе (клики, время в приложении сегодня), не всегда совпадают с долгосрочным здоровьем платформы (удовлетворённость, доверие, устойчивое удержание пользователей)."}, {"q": "Как архитектурно взаимодействуют между собой этап 'candidate generation' (грубый отбор кандидатов) и этап 'ranking' (точное ранжирование) в типичном пайплайне рекомендательной системы?", "options": ["Candidate generation быстро отбирает разумное подмножество (сотни-тысячи) потенциально релевантных видео из миллионов, используя менее затратные методы, а ranking применяет более сложную, вычислительно дорогую модель уже к этому меньшему подмножеству для точного финального упорядочивания", "Оба этапа выполняют абсолютно одну и ту же функцию и полностью дублируют друг друга", "Ranking этап выполняется раньше candidate generation, определяя, какие видео вообще будут рассмотрены", "Candidate generation отбирает финальный порядок видео в ленте без дальнейшей обработки"], "correct": 0, "explain": "Двухэтапная архитектура — распространённый паттерн промышленных рекомендательных систем: дешёвый грубый отбор сокращает пространство поиска, после чего более точная (и дорогая) модель применяется только к уже сильно суженному набору кандидатов."}, {"q": "Почему рекомендательная система архитектурно комбинирует множество различных сигналов (completion rate, лайки, репосты, время между сессиями) в единую итоговую оценку, а не полагается на один универсальный показатель?", "options": ["Каждый отдельный сигнал отражает свой аспект интереса и подвержен собственным искажениям (например, кликбейт искажает CTR, но не completion rate), и комбинация нескольких независимых сигналов даёт более устойчивую и полную оценку истинной заинтересованности, чем любой один показатель в отдельности", "Использование более одного сигнала одновременно технически невозможно в рекомендательных системах", "Один универсальный показатель всегда точнее отражает интерес пользователя, чем комбинация нескольких сигналов", "Разные сигналы вовлечённости всегда полностью дублируют друг друга без дополнительной информации"], "correct": 0, "explain": "Как и в общих системах оценки (например, кредитный скоринг), комбинация разнородных, частично независимых сигналов снижает риск того, что манипуляция или искажение одного показателя (например, кликбейтный заголовок) полностью обманет всю систему оценки."}, {"q": "Как экспоненциальный характер распространения вирусного контента (каждый зритель потенциально делится с несколькими другими) архитектурно отличается от линейного роста охвата через прямые рекомендации алгоритма?", "options": ["Вирусное распространение через репосты имеет мультипликативную (экспоненциальную) динамику — каждый новый зритель потенциально порождает несколько следующих, тогда как чисто алгоритмические рекомендации обычно дают более предсказуемый, управляемый платформой линейный или ступенчатый рост охвата", "Вирусное распространение и алгоритмические рекомендации всегда дают идентичную по характеру динамику роста охвата", "Экспоненциальный рост охвата возможен только через прямые алгоритмические рекомендации, но не через репосты", "Репосты пользователей никогда не влияют на скорость распространения контента"], "correct": 0, "explain": "Вирусность в узком смысле — это именно эффект цепной реакции через социальные связи (репосты), который может расти намного быстрее, чем предсказуемое, управляемое платформой продвижение через прямые алгоритмические рекомендации."}, {"q": "Почему архитектура рекомендательной системы, полагающейся на коллаборативную фильтрацию, потенциально уязвима к скоординированным манипуляциям (например, фермам ботов, накручивающим лайки/просмотры)?", "options": ["Коллаборативная фильтрация по своей природе интерпретирует паттерны поведения пользователей как сигнал подлинного интереса, и если группа ботов имитирует поведение реальных заинтересованных пользователей, система может ошибочно интерпретировать это как органический сигнал качества контента", "Коллаборативная фильтрация технически не может быть обманута никакими скоординированными действиями", "Фермы ботов физически не способны взаимодействовать с рекомендательными алгоритмами видео", "Манипуляция сигналами вовлечённости никогда не влияет на решения рекомендательного алгоритма"], "correct": 0, "explain": "Уязвимость коллаборативной фильтрации к манипуляции ('накрутка') — известная проблема: поскольку алгоритм интерпретирует паттерны поведения как сигнал интереса, скоординированная имитация такого поведения (боты) может исказить итоговую оценку качества/популярности контента."}, {"q": "Как принцип 'многорукого бандита' помогает архитектурно решить задачу быстрого определения потенциально вирусного видео среди миллионов новых загрузок при ограниченных вычислительных и временных ресурсах на тестирование каждого?", "options": ["Вместо равномерного долгого тестирования каждого видео на большой аудитории, система быстро выделяет небольшую 'исследовательскую' аудиторию каждому новому видео, оперативно перераспределяя дальнейшее внимание (более широкий показ) в пользу видео с лучшими ранними метриками, экономя ресурсы на неперспективном контенте", "Каждое новое видео должно получать абсолютно одинаковый по размеру и продолжительности тестовый показ независимо от ранних результатов", "Многорукие бандиты применимы только к рекламным объявлениям, а не к органическому видеоконтенту", "Тестирование видео на аудитории никак не связано с принципами многоруких бандитов"], "correct": 0, "explain": "Задача многорукого бандита — прямая формализация проблемы эффективного распределения ограниченного 'бюджета показов' между множеством новых видео-кандидатов, быстро перенаправляя внимание в сторону наиболее перспективных на основе ранних сигналов, а не тратя равные ресурсы на проверку каждого."}, {"q": "Почему решение показывать пользователю небольшую долю контента за пределами его обычных интересов (диверсификация ленты) архитектурно требует отдельного, явного механизма, а не возникает 'само собой' из основной модели персонализации?", "options": ["Модель персонализации, обучаемая на исторических данных о предпочтениях, по своей природе стремится максимизировать соответствие уже известным интересам, и без отдельного явного механизма продвижения разнообразия (например, дополнительного слоя логики или штрафа за повторяемость) система естественным образом будет сужать, а не расширять разнообразие", "Диверсификация ленты рекомендаций естественным образом возникает без каких-либо специальных механизмов", "Модель персонализации автоматически балансирует между узкими интересами и разнообразием без дополнительной логики", "Явные механизмы диверсификации технически несовместимы с системами персонализации на основе машинного обучения"], "correct": 0, "explain": "Так как базовая цель модели персонализации — максимизация предсказанного соответствия интересам, диверсификация — это осознанное архитектурное дополнение (например, отдельный компонент постобработки ранжирования), а не естественное следствие основной оптимизации модели."}, {"q": "Как асимметрия в доступности данных (миллионы взаимодействий с популярным контентом против считанных с нишевым) влияет на архитектурный выбор между чисто коллаборативными методами и content-based методами для разных сегментов каталога видео?", "options": ["Для популярного, хорошо представленного в данных контента коллаборативная фильтрация работает особенно хорошо благодаря обилию сигналов, тогда как для нишевого контента с малым количеством взаимодействий content-based анализ (по содержанию видео) часто оказывается более надёжным источником сигнала", "Коллаборативная фильтрация одинаково хорошо работает для популярного и нишевого контента независимо от объёма данных", "Content-based методы неприменимы к видеоконтенту, только к текстовым рекомендациям", "Асимметрия объёма данных между популярным и нишевым контентом не влияет на выбор архитектуры рекомендательной системы"], "correct": 0, "explain": "Гибридные системы часто взвешивают вклад коллаборативных и content-based сигналов по-разному в зависимости от объёма доступных данных для конкретного видео — это архитектурное решение напрямую вытекает из фундаментальной асимметрии данных между популярным и нишевым контентом."}, {"q": "Почему платформы архитектурно разделяют модель предсказания 'вероятности взаимодействия' (например, вероятность лайка) и модель финального ранжирования, комбинирующую несколько таких предсказанных вероятностей с разными весами?", "options": ["Раздельные модели для отдельных типов взаимодействия (лайк, репост, досмотр) позволяют более точно предсказывать каждый конкретный сигнал независимо, а финальное ранжирование гибко комбинирует эти предсказания с настраиваемыми весами, отражающими текущие приоритеты платформы (например, больший вес на удержание vs на репосты)", "Использование нескольких отдельных моделей для разных типов взаимодействия всегда менее точно, чем одна универсальная модель", "Финальное ранжирование никогда не использует несколько предсказанных сигналов одновременно", "Веса разных сигналов в финальном ранжировании фиксированы навсегда и никогда не меняются платформой"], "correct": 0, "explain": "Модульная архитектура (отдельные модели предсказания для каждого типа сигнала + комбинирующий слой ранжирования) даёт гибкость: платформа может менять относительные веса разных сигналов (например, снижая вес чистого времени просмотра в пользу удовлетворённости) без необходимости переобучать всю систему с нуля."}, {"q": "Как понимание компромисса между точностью персонализации и вычислительной стоимостью её обновления в реальном времени влияет на архитектурное решение о том, как часто пересчитывать профиль интересов активного пользователя?", "options": ["Более частое обновление профиля интересов (например, после каждого нового видео) даёт более отзывчивую персонализацию, но требует значительно больше вычислительных ресурсов при огромном числе одновременных пользователей, поэтому системы ищут баланс между отзывчивостью и практической стоимостью вычислений в масштабе всей платформы", "Обновление профиля пользователя в реальном времени не требует каких-либо дополнительных вычислительных ресурсов по сравнению с редким пересчётом", "Частота обновления профиля интересов пользователя не влияет на качество или отзывчивость рекомендаций", "Все платформы всегда пересчитывают профиль интересов пользователя ровно раз в сутки без исключений"], "correct": 0, "explain": "Компромисс между отзывчивостью персонализации (более частые обновления) и вычислительной стоимостью в масштабе миллионов одновременных пользователей — классическое архитектурное решение systems design, требующее баланса между качеством персонализации и практическими ограничениями инфраструктуры."}, {"q": "Новый пользователь только что зарегистрировался в приложении вроде TikTok, и алгоритм пока не имеет истории его поведения. Какой подход наиболее уместен для формирования первых рекомендаций?", "options": ["Показать разнообразный набор популярного и разнопланового контента, одновременно внимательно отслеживая первые реакции пользователя для быстрого построения начального профиля интересов", "Сразу показать максимально узкий, специфический набор контента без предварительного изучения интересов пользователя", "Полностью отказаться от персонализации до момента, пока пользователь явно не укажет свои интересы в настройках", "Показывать пользователю случайный, никак не подобранный контент бесконечно долго без анализа реакций"], "correct": 0, "explain": "Классическое решение проблемы холодного старта нового пользователя — начать с разнообразного, широко популярного контента, одновременно быстро собирая поведенческие сигналы (досмотры, лайки) для построения персонализированного профиля."}, {"q": "Автор загрузил новое видео, но оно набирает крайне мало просмотров, хотя предыдущие видео этого автора были популярны. Какое из объяснений наиболее вероятно с точки зрения работы рекомендательного алгоритма, не связанное с содержанием видео?", "options": ["Видео могло не пройти начальный тестовый показ небольшой аудитории достаточно успешно (низкий completion rate или мало взаимодействий на раннем этапе), из-за чего алгоритм ограничил его дальнейшее распространение", "Популярность предыдущих видео автора должна автоматически гарантировать одинаковую популярность абсолютно всех последующих видео", "Алгоритм рекомендаций никогда не оценивает каждое новое видео независимо от истории автора", "Низкие просмотры видео всегда означают техническую ошибку платформы, а не результат работы алгоритма"], "correct": 0, "explain": "Даже у популярного автора каждое новое видео обычно проходит собственный этап оценки на небольшой тестовой аудитории; если ранние метрики вовлечённости (в частности, completion rate) слабые, алгоритм может ограничить дальнейшее продвижение независимо от общей популярности автора."}, {"q": "Пользователь заметил, что после нескольких дней просмотра только развлекательного контента лента стала показывать почти исключительно юмористические видео, полностью вытеснив темы, интересовавшие его раньше. Какое явление это иллюстрирует, и что может помочь его смягчить?", "options": ["Это иллюстрирует эффект 'пузыря фильтров' — намеренное или пассивное взаимодействие с более широким разнообразием контента (лайки/просмотры в других категориях) может помочь алгоритму снова расширить разнообразие ленты", "Такое сужение ленты — техническая ошибка, не связанная с логикой персонализации алгоритма", "Разнообразие ленты рекомендаций никогда не может сузиться в результате поведения пользователя", "Единственный способ восстановить разнообразие — полностью удалить и заново создать аккаунт"], "correct": 0, "explain": "Классическое проявление filter bubble: устойчивое поведение (просмотр только одной категории) быстро сужает рекомендации; осознанное взаимодействие с разнообразным контентом — практический способ 'расширить' профиль интересов, который считывает алгоритм."}, {"q": "Компания-разработчик платформы замечает, что чисто engagement-ориентированные метрики показывают рост, но опросы пользователей демонстрируют снижение удовлетворённости и рост усталости от приложения. Какой вывод и корректировка наиболее уместны?", "options": ["Стоит пересмотреть набор оптимизируемых метрик, включив показатели долгосрочного благополучия и удовлетворённости пользователей, а не полагаться исключительно на краткосрочные метрики вовлечённости", "Рост метрик вовлечённости всегда означает улучшение продукта независимо от других сигналов", "Опросы пользователей никогда не дают полезной информации по сравнению с количественными метриками вовлечённости", "Единственное решение — полностью отказаться от любых рекомендательных алгоритмов"], "correct": 0, "explain": "Расхождение между растущими краткосрочными метриками вовлечённости и падающей долгосрочной удовлетворённостью — сигнал того, что чисто engagement-ориентированная оптимизация может вредить долгосрочному здоровью платформы, что требует пересмотра набора целевых метрик."}, {"q": "Исследователь заметил, что рекомендательный алгоритм новостной ленты со временем стал чаще показывать более провокационные и поляризующие материалы по сравнению с началом использования приложения. Какое объяснение наиболее правдоподобно с точки зрения экономики внимания?", "options": ["Провокационный контент статистически чаще вызывает сильную реакцию (комментарии, репосты, долгое обсуждение), что делает его 'выгодным' для чисто engagement-ориентированного алгоритма, даже без явного намерения продвигать именно поляризующий контент", "Алгоритмы рекомендаций технически неспособны учитывать эмоциональную окраску текстового или видео контента", "Провокационный контент всегда получает меньше вовлечённости, чем нейтральный", "Изменение характера рекомендаций никогда не связано с оптимизацией метрик вовлечённости"], "correct": 0, "explain": "Это иллюстрация упомянутой ранее проблемы: эмоционально заряженный, поляризующий контент статистически чаще получает сильную реакцию, что неявно 'вознаграждается' чисто engagement-ориентированным алгоритмом, даже если это не было явной целью его разработки."}, {"q": "Маркетолог хочет, чтобы новое короткое видео о продукте набрало широкий органический охват через алгоритм рекомендаций. Какая стратегия, основанная на понимании метрик алгоритма, наиболее уместна?", "options": ["Сделать видео максимально захватывающим с первых секунд, стимулирующим полный досмотр и повторные просмотры, так как completion rate и повторные просмотры — сильные сигналы для дальнейшего продвижения алгоритмом", "Длина видео и качество завязки не имеют значения, если тема ролика достаточно интересна сама по себе", "Единственный способ гарантировать охват — купить платную рекламу, так как органический охват через алгоритм принципиально недостижим", "Совершенно неважно, досматривают ли зрители видео до конца, если общее количество показов высокое"], "correct": 0, "explain": "Понимание того, что completion rate и повторные просмотры — сильные поведенческие сигналы для алгоритма, напрямую подсказывает практическую стратегию создания контента: захватывающее начало и структура, стимулирующая полный просмотр, увеличивают шанс на дальнейшее органическое продвижение."}, {"q": "Платформа замечает, что видео с кликбейтными, вводящими в заблуждение превью получают высокий начальный клик-рейт, но очень низкий completion rate и много негативных реакций. Как алгоритм, ориентированный на комплексный набор сигналов (а не только на клики), должен отреагировать на такой паттерн?", "options": ["Алгоритм должен снижать дальнейшее продвижение такого контента, так как низкий completion rate и негативные реакции сигнализируют о несоответствии ожиданиям зрителя, несмотря на изначально высокий клик-рейт", "Высокий начальный клик-рейт должен автоматически гарантировать максимальное дальнейшее продвижение видео независимо от последующих метрик", "Completion rate и негативные реакции не должны учитываться алгоритмом, если начальный клик-рейт достаточно высок", "Кликбейтный контент всегда одинаково полезен для платформы независимо от последующего поведения зрителей"], "correct": 0, "explain": "Комплексная оценка сигналов (не только клик, но и последующее поведение — досмотр, реакции) позволяет алгоритму отличать контент с честной, привлекательной подачей от вводящего в заблуждение кликбейта, который выглядит хорошо только по одной изолированной метрике."}, {"q": "Пользователь, интересующийся узкоспециализированной темой (например, редким видом рукоделия), жалуется, что качественных рекомендаций по этой теме мало, хотя по массовым темам (юмор, музыка) рекомендации отличные. Какое объяснение наиболее вероятно с точки зрения работы рекомендательной системы?", "options": ["Для нишевых тем в системе может быть недостаточно данных о взаимодействиях (меньше пользователей и видео в этой категории), что усложняет как коллаборативную фильтрацию, так и общую точность рекомендаций по сравнению с массово популярными темами", "Алгоритмы рекомендаций технически не способны работать с нишевыми, малопопулярными темами вообще", "Качество рекомендаций никогда не зависит от объёма доступных данных о взаимодействиях в конкретной категории", "Массовые и нишевые темы всегда получают абсолютно одинаковое качество рекомендаций"], "correct": 0, "explain": "Меньший объём данных (пользователей, видео, взаимодействий) в нишевых категориях — классическая причина менее точных рекомендаций по сравнению с массовыми темами, где данных для обучения модели значительно больше."}, {"q": "Компания добавляет в рекомендательный алгоритм новый сигнал — время, прошедшее с момента последнего взаимодействия с похожим контентом (recency), чтобы избежать показа слишком похожих видео подряд. Какую проблему это решает?", "options": ["Это снижает риск чрезмерного повторения одной и той же узкой темы подряд, добавляя разнообразие в ленту и потенциально противодействуя эффекту пузыря фильтров", "Recency сигнал никак не связан с разнообразием контента в ленте рекомендаций", "Добавление recency сигнала всегда ухудшает точность рекомендаций без каких-либо преимуществ", "Эта техника применяется исключительно для видео, а не для любого другого типа контента"], "correct": 0, "explain": "Явный учёт 'свежести' взаимодействия с похожим контентом — практический механизм противодействия чрезмерному сужению разнообразия ленты (пузырю фильтров), намеренно вводящий больше вариативности в последовательность рекомендаций."}, {"q": "Регулятор запрашивает у платформы объяснение, почему рекомендательный алгоритм продвигает определённые категории контента чаще других. Какая трудность возникает при попытке дать полностью прозрачное объяснение работы такой системы?", "options": ["Современные рекомендательные алгоритмы часто основаны на сложных моделях машинного обучения с огромным количеством взаимодействующих сигналов, что затрудняет простое, полностью интерпретируемое объяснение конкретного решения о продвижении того или иного видео", "Рекомендательные алгоритмы всегда основаны на простых, полностью прозрачных и легко объяснимых правилах без каких-либо сложностей", "Прозрачность работы алгоритма не имеет значения для регуляторов и пользователей", "Любой рекомендательный алгоритм может быть полностью и просто объяснён в одном предложении без потери точности"], "correct": 0, "explain": "Это отражает более широкую проблему интерпретируемости сложных моделей машинного обучения (не только в контексте рекомендаций видео) — чем сложнее и многофакторнее модель, тем труднее дать простое, но точное объяснение конкретного решения, что создаёт напряжение между эффективностью и прозрачностью системы."}, {"q": "Видео набрало 100 000 показов, из которых 100% досмотрели до конца 40 000 пользователей. Какой completion rate у этого видео?", "options": ["20%", "40%", "60%", "80%"], "correct": 1, "explain": "40000/100000=0.4=40%."}, {"q": "Из 500 показанных тестовой аудитории видео только 50 показали completion rate выше 50% и были продвинуты дальше алгоритмом. Какова доля видео, прошедших этот порог?", "options": ["5%", "10%", "15%", "20%"], "correct": 1, "explain": "50/500=0.1=10%."}, {"q": "Видео показано 1 000 000 раз, получило 50 000 лайков и 200 000 полных просмотров. Чему равен коэффициент лайков относительно полных просмотров (в процентах)?", "options": ["5%", "10%", "25%", "50%"], "correct": 2, "explain": "50000/200000=0.25=25% — коэффициент лайков относительно полных (а не всех) просмотров."}, {"q": "Пользователь просматривает в среднем 150 видео в день по 20 секунд каждое. Сколько минут в день это составляет?", "options": ["30 минут", "50 минут", "60 минут", "100 минут"], "correct": 1, "explain": "150×20=3000 секунд = 3000/60=50 минут."}, {"q": "Из 10 000 новых видео, прошедших тестовый показ, 15% получили достаточно хорошие метрики для расширенного показа. Сколько видео это составляет?", "options": ["150", "1000", "1500", "2500"], "correct": 2, "explain": "10000×0.15=1500 видео."}, {"q": "Видео A получило 10 000 репостов при 500 000 просмотров, видео B — 5 000 репостов при 100 000 просмотров. У какого видео выше доля репостов относительно просмотров?", "options": ["У видео A (2%)", "У видео B (5%)", "Доли одинаковы", "Недостаточно данных для сравнения"], "correct": 1, "explain": "A: 10000/500000=0.02=2%. B: 5000/100000=0.05=5%. У видео B доля репостов выше."}, {"q": "Алгоритм тестирует видео на аудитории из 1000 пользователей, и если completion rate выше 45%, видео показывается ещё 10 000 пользователям. Если видео прошло тест и получило 45% нового completion rate на расширенной аудитории, сколько пользователей досмотрели видео до конца при расширенном показе?", "options": ["4500", "5000", "5500", "10000"], "correct": 0, "explain": "10000×0.45=4500 пользователей."}, {"q": "Платформа обрабатывает 1 миллиард видео-показов в день. Если 0.001% этих показов приводят к жалобе на контент, сколько жалоб поступает в день?", "options": ["100", "1000", "10000", "100000"], "correct": 2, "explain": "0.001% = 0.00001 в долях. 1000000000×0.00001=10000 жалоб в день."}, {"q": "Ленты рекомендаций для 50 миллионов активных пользователей обновляются в среднем каждые 30 секунд просмотра. Сколько обновлений ленты в среднем произойдёт за 10 минут (600 секунд) непрерывного использования одним пользователем?", "options": ["10", "20", "30", "60"], "correct": 1, "explain": "600/30=20 обновлений ленты за 10 минут."}, {"q": "Из 200 миллионов ежедневных загружаемых видео только 0.01% становятся 'вирусными' (превышают порог в 10 миллионов просмотров). Сколько видео в день становятся вирусными?", "options": ["200", "2000", "20000", "200000"], "correct": 2, "explain": "0.01% = 0.0001 в долях. 200000000×0.0001=20000 видео в день."}, {"q": "Тестовая аудитория для нового видео составляет 0.1% от 5 000 000 подписчиков автора. Сколько пользователей войдёт в тестовую аудиторию?", "options": ["500", "5000", "50000", "500000"], "correct": 1, "explain": "5000000×0.001=5000 пользователей (0.1% = 0.001 в долях)."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
