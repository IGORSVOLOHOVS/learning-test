<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok: алгоритмы рекомендаций</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/tiktok_algorithm.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>TikTok: алгоритмы рекомендаций</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script>
(function () {
  const TEST_ID = "tiktok_algorithm";
  const QUESTIONS = [{"q": "Что такое лента 'Для вас' (For You Page, FYP) в TikTok?", "options": ["Персонализированная лента рекомендаций видео, формируемая алгоритмом на основе поведения пользователя", "Список видео, загруженных самим пользователем", "Раздел с настройками приватности аккаунта", "Список только тех аккаунтов, на которые пользователь подписан"], "correct": 0, "explain": "FYP — главная лента приложения, полностью формируемая рекомендательным алгоритмом на основе предсказанного интереса пользователя, а не только подписок.", "usage": {"code": false, "without": "Автор думает, что попадёт в чью-то ленту только через подписчиков, и молча ждёт роста аудитории годами.", "with": "Понимая, что FYP — это персонализированная лента от алгоритма, а не только подписки, автор делает ролик под интерес незнакомой аудитории и может выстрелить без единого подписчика.", "benefit": "охват не упирается в число подписчиков"}}, {"q": "Какой из перечисленных сигналов явно учитывается алгоритмом TikTok при оценке интереса пользователя к видео?", "options": ["Только текст, указанный в биографии автора", "Досмотр видео до конца (completion rate), лайки, комментарии, репосты и повторные просмотры", "Исключительно дата загрузки видео", "Только количество подписчиков автора видео"], "correct": 1, "explain": "Алгоритм явно опирается на поведенческие сигналы взаимодействия — как долго пользователь смотрел видео, лайкал ли, комментировал, делился, пересматривал ли его.", "usage": {"code": false, "without": "Автор гонится только за лайками и подписками, игнорируя, досматривают ли ролик.", "with": "Зная, что алгоритм учитывает досмотр, комментарии, репосты и повторные просмотры, автор оптимизирует ролик под весь набор сигналов вовлечённости, а не под один лайк.", "benefit": "алгоритм видит реальный интерес, а не только лайки"}}, {"q": "Что такое 'completion rate' (процент досмотра) видео в контексте рекомендательных алгоритмов?", "options": ["Доля видео, просмотренная пользователем от начала до конца (или полностью)", "Количество исправлений, внесённых в описание видео", "Процент пользователей, подписавшихся на автора после просмотра", "Скорость загрузки видео на сервер"], "correct": 0, "explain": "Completion rate измеряет, какую долю видео пользователь посмотрел — короткие вертикальные видео позволяют легко отслеживать полный досмотр как сильный сигнал заинтересованности.", "usage": {"code": false, "without": "Автор делает длинное вступление на 10 секунд, зрители уходят, а он не понимает, почему ролик 'не заходит'.", "with": "Понимая, что completion rate — доля досмотра — сильный сигнал, автор режет ролик коротко и держит зрителя до конца.", "benefit": "высокий досмотр → больше показов"}}, {"q": "Почему короткие видео (обычно от нескольких секунд до пары минут) являются основным форматом контента в TikTok?", "options": ["Длинные видео технически невозможно воспроизводить на мобильных устройствах", "Короткий формат был выбран случайно, без связи с эффективностью алгоритма рекомендаций", "Короткие видео технически проще загружать на сервер, чем длинные", "Короткий формат делает вовлечение и удержание внимания пользователя более измеримым и быстрым, позволяя алгоритму собирать сигналы интереса (досмотр, повтор) за короткое время и быстро адаптировать рекомендации"], "correct": 3, "explain": "Короткий формат ускоряет цикл 'показ → реакция пользователя → обновление рекомендаций', позволяя алгоритму быстро собирать много сигналов о предпочтениях за единицу времени просмотра ленты.", "usage": {"code": false, "without": "Автор снимает длинные ролики и ждёт недели, чтобы понять, интересна ли тема.", "with": "Зная, что короткий формат ускоряет цикл 'показ → реакция → новая рекомендация', автор публикует короткие ролики и за часы получает сигнал, что заходит.", "benefit": "быстрая обратная связь по контенту"}}, {"q": "Что означает термин 'холодный старт' (cold start) применительно к рекомендательным системам, включая TikTok?", "options": ["Технический сбой сервера при запуске приложения", "Период, когда приложение недоступно для скачивания", "Специальный режим для просмотра только старых видео", "Проблема рекомендаций для нового пользователя или нового видео, о котором алгоритм ещё не имеет достаточно данных"], "correct": 3, "explain": "Cold start — классическая проблема рекомендательных систем: для нового пользователя (мало истории) или нового видео (мало взаимодействий) алгоритму сложнее сделать точные персонализированные рекомендации.", "usage": {"code": false, "without": "Новый автор обижается, что первые ролики почти никто не видит, и бросает канал.", "with": "Понимая проблему холодного старта — у алгоритма пока нет данных о новом видео/аккаунте, — автор терпеливо публикует и даёт системе накопить сигналы.", "benefit": "нет паники из-за слабого старта"}}, {"q": "Что из перечисленного НЕ является типичным явным сигналом взаимодействия, который пользователь может дать видео в TikTok?", "options": ["Скорость интернет-соединения пользователя", "Лайк", "Репост (share)", "Комментарий"], "correct": 0, "explain": "Скорость интернет-соединения — техническая характеристика, а не поведенческий сигнал интереса пользователя к контенту, в отличие от лайков, комментариев и репостов.", "usage": {"code": false, "without": "Автор верит, что мощный интернет и быстрая заливка как-то улучшат продвижение ролика.", "with": "Понимая, что скорость интернета — техническая метрика, а не сигнал интереса, автор вкладывается в досмотр, лайки и репосты — то, что реально считывает алгоритм.", "benefit": "усилия идут в настоящие сигналы"}}, {"q": "Что такое 'пузырь фильтров' (filter bubble) применительно к рекомендательным алгоритмам вроде TikTok?", "options": ["Функция для размытия фона видео", "Способ шифрования личных сообщений пользователя", "Специальный визуальный фильтр для приложения", "Явление, при котором пользователь со временем видит всё более узкий, однообразный набор контента, соответствующий его предыдущим реакциям, реже сталкиваясь с новыми точками зрения"], "correct": 3, "explain": "Filter bubble — эффект, при котором персонализация со временем сужает разнообразие показываемого контента, усиливая уже существующие интересы и предпочтения пользователя.", "usage": {"code": false, "without": "Пользователь удивляется, что лента показывает одно и то же, и винит 'глюк' приложения.", "with": "Понимая эффект пузыря фильтров — персонализация сужает контент под прошлые реакции, — он осознанно смотрит разные темы, чтобы расширить ленту.", "benefit": "осознанный контроль над разнообразием ленты"}}, {"q": "Зачем рекомендательные алгоритмы, подобные TikTok, иногда намеренно показывают пользователю контент, немного выходящий за пределы его обычных интересов (exploration)?", "options": ["Чтобы намеренно ухудшить качество рекомендаций для пользователя", "Чтобы собрать дополнительные данные о потенциально новых интересах пользователя и избежать чрезмерного сужения рекомендаций (баланс между 'exploration' и 'exploitation')", "Это происходит случайно, без какой-либо цели со стороны алгоритма", "Такая практика не применяется ни в одной современной рекомендательной системе"], "correct": 1, "explain": "Компромисс exploration/exploitation — фундаментальная концепция рекомендательных систем: чистая 'эксплуатация' уже известных интересов рискует застоем рекомендаций, тогда как 'исследование' новых тем помогает выявить неочевидные интересы пользователя.", "usage": {"code": false, "without": "Инженер жёстко показывает только то, что уже нравилось, и рекомендации застревают в одной теме.", "with": "Понимая баланс exploration/exploitation, он добавляет долю исследовательских показов, чтобы находить новые интересы пользователя.", "benefit": "система открывает неочевидные интересы"}}, {"q": "Что из перечисленного является примером неявного (implicit) сигнала обратной связи в рекомендательной системе, в отличие от явного (explicit)?", "options": ["Пользователь поставил видео явный лайк", "Пользователь написал развёрнутый комментарий под видео", "Пользователь пересмотрел видео несколько раз подряд, не оставляя лайка или комментария", "Пользователь пожаловался на видео через форму жалобы"], "correct": 2, "explain": "Неявные сигналы (время просмотра, повторные просмотры, скорость пролистывания) выводятся из поведения пользователя без явного действия вроде лайка/комментария, которые считаются явными сигналами.", "usage": {"code": false, "without": "Аналитик считает вовлечённым только того, кто явно лайкнул или прокомментировал.", "with": "Понимая ценность неявных сигналов, он учитывает повторные просмотры и время удержания — интерес виден и без единого лайка.", "benefit": "интерес молчаливого большинства не теряется"}}, {"q": "Что означает термин 'вирусность' (virality) контента в контексте социальных сетей?", "options": ["Заражение устройства пользователя компьютерным вирусом при просмотре видео", "Скорость загрузки видео на сервер платформы", "Официальный статус, присваиваемый администрацией платформы избранным видео", "Быстрое и масштабное распространение контента за счёт активных репостов и органического охвата среди пользователей"], "correct": 3, "explain": "Вирусность описывает органическое, экспоненциальное распространение контента через репосты и рекомендации, когда каждый просмотревший делится с другими, значительно расширяя охват.", "usage": {"code": false, "without": "Автор надеется на охват только за счёт покупки показов и рекламы.", "with": "Понимая механику вирусности — цепное распространение через репосты, — он делает ролик, которым хочется поделиться, и получает органический экспоненциальный охват.", "benefit": "органический охват без рекламного бюджета"}}, {"q": "Почему рекомендательный алгоритм, ориентированный на явные сигналы (лайки, подписки), обычно менее точен в предсказании реального интереса, чем алгоритм, также использующий неявные поведенческие сигналы (время просмотра, повторы)?", "options": ["Использование неявных сигналов запрещено политиками конфиденциальности всех платформ", "Явные действия пользователей всегда точнее отражают интерес, чем любые поведенческие метрики", "Неявные сигналы поведения технически невозможно измерить в приложениях вроде TikTok", "Явные действия (лайк, подписка) совершает далеко не каждый заинтересованный пользователь, тогда как неявные сигналы (сколько времени провёл, пересматривал ли) отражают фактическое поведение почти каждого просмотревшего видео, давая гораздо более полную картину интереса"], "correct": 3, "explain": "Явные действия (лайк, комментарий, подписка) совершает лишь небольшая доля заинтересованных зрителей ('эффект 90-9-1' в интернет-сообществах), тогда как поведенческие метрики (время просмотра, повторы) собираются практически для каждого показа, давая алгоритму гораздо больше данных для точной персонализации.", "usage": {"code": false, "without": "Инженер ранжирует контент только по явным лайкам и подпискам, теряя большинство молчаливых зрителей.", "with": "Понимая, что лайк ставит лишь малая доля заинтересованных (90-9-1), он добавляет неявные сигналы — время просмотра, повторы, — собираемые почти с каждого показа.", "benefit": "полнота данных об интересе почти со всех зрителей"}}, {"q": "Почему короткий формат видео в TikTok особенно хорошо подходит для быстрого итеративного обучения рекомендательной модели (по сравнению с длинными видео на других платформах)?", "options": ["Короткие видео дают алгоритму меньше данных для анализа по сравнению с длинными видео", "Короткое видео даёт быстрый и чёткий сигнал (досмотрел / не досмотрел, пересмотрел) за секунды, тогда как для длинных видео сигнал о вовлечённости накапливается намного медленнее, что замедляет обратную связь для алгоритма", "Короткий формат видео технически несовместим с любыми алгоритмами машинного обучения", "Длина видео не влияет на скорость сбора данных для рекомендательного алгоритма"], "correct": 1, "explain": "Быстрый цикл 'показ → реакция' при коротких видео (секунды на сигнал) резко ускоряет итеративное уточнение модели интересов пользователя по сравнению с форматами, где полный сигнал вовлечённости накапливается только через много минут просмотра.", "usage": {"code": false, "without": "Команда обучает модель на длинных видео, где сигнал вовлечённости копится минутами, и итерации идут медленно.", "with": "Понимая, что короткий ролик даёт чёткий сигнал 'досмотрел/пересмотрел' за секунды, они используют формат для быстрого итеративного дообучения модели.", "benefit": "быстрый цикл обучения модели интересов"}}, {"q": "Как компромисс между 'exploration' (исследование новых интересов) и 'exploitation' (использование уже известных предпочтений) архитектурно решается в рекомендательных системах через механизмы, аналогичные многоруким бандитам (multi-armed bandit)?", "options": ["Многорукие бандиты — это концепция, применимая только к финансовым рынкам, а не к рекомендательным системам", "Система периодически показывает контент за пределами уже подтверждённых интересов пользователя (exploration), собирая данные о потенциально новых предпочтениях, при этом основную часть времени показывая контент с высокой ожидаемой вовлечённостью (exploitation), балансируя между узнаванием нового и максимизацией текущей удовлетворённости", "Exploration и exploitation — взаимоисключающие подходы, никогда не комбинируемые в одной системе", "Рекомендательные системы всегда показывают только уже проверенный, знакомый пользователю контент без какого-либо исследования нового"], "correct": 1, "explain": "Задача многорукого бандита — классическая формализация компромисса exploration/exploitation, широко применяемая в рекомендательных системах: баланс между показом уже проверенно интересного контента и экспериментальным показом нового, потенциально ещё более интересного.", "usage": {"code": false, "without": "Система либо только эксплуатирует известные интересы (застой), либо хаотично экспериментирует (нерелевантно).", "with": "Применяя логику многорукого бандита, она балансирует показ проверенно интересного и пробного нового, перераспределяя внимание к перспективному.", "benefit": "баланс релевантности и открытия нового"}}, {"q": "Почему быстрая адаптация ленты 'Для вас' к изменению поведения пользователя (например, после серии просмотров нового типа контента) считается одновременно преимуществом и потенциальным риском алгоритма?", "options": ["Быстрая адаптация ленты никогда не может быть недостатком системы рекомендаций", "Адаптация ленты происходит только раз в месяц независимо от поведения пользователя", "Быстрая адаптация делает рекомендации более релевантными новым интересам, но также означает, что кратковременное или случайное поведение (например, просмотр контента для друга) может быстро и, возможно, нежелательно исказить всю дальнейшую ленту рекомендаций", "Изменение поведения пользователя никогда не влияет на скорость обновления рекомендаций"], "correct": 2, "explain": "Высокая чувствительность алгоритма к недавнему поведению — палка о двух концах: она обеспечивает актуальность рекомендаций, но также означает уязвимость к кратковременным, нетипичным сессиям использования, способным временно 'испортить' персонализированную ленту.", "usage": {"code": false, "without": "Инженер радуется, что лента мгновенно подстраивается, не задумываясь о рисках.", "with": "Понимая, что высокая чувствительность к недавнему поведению — палка о двух концах, он смягчает влияние случайных сессий (например, просмотр за друга), чтобы не искажать профиль.", "benefit": "лента устойчива к случайным сессиям"}}, {"q": "Почему алгоритмы рекомендаций, оптимизированные исключительно на максимизацию вовлечённости (engagement), рискуют со временем продвигать более эмоционально заряженный или поляризующий контент?", "options": ["Алгоритмы рекомендаций технически не способны различать эмоциональную окраску контента", "Оптимизация на вовлечённость никогда не влияет на характер продвигаемого контента", "Контент, вызывающий сильные эмоциональные реакции (возмущение, удивление, сильное согласие), часто статистически получает больше взаимодействий (комментарии, репосты, долгий просмотр), поэтому чисто engagement-ориентированная оптимизация может неявно благоприятствовать такому контенту, даже без явного намерения его продвигать", "Эмоционально нейтральный контент всегда получает больше вовлечённости, чем эмоционально заряженный"], "correct": 2, "explain": "Это широко обсуждаемая в индустрии проблема: метрика вовлечённости, будучи прокси для 'интереса', эмпирически коррелирует и с эмоционально провокационным контентом, что создаёт неявный стимул для алгоритма продвигать такой контент, даже если это не было явной целью его разработчиков.", "usage": {"code": false, "without": "Команда оптимизирует чистую вовлечённость и не понимает, почему всплывает всё более провокационный контент.", "with": "Понимая, что эмоционально заряженный контент статистически собирает больше реакций, они добавляют метрики качества, чтобы не поощрять поляризацию неявно.", "benefit": "меньше неявного крена в поляризацию"}}, {"q": "Как проблема холодного старта для нового видео (мало данных о реакции зрителей) решается через механизм пробного показа небольшой тестовой аудитории перед более широким распространением?", "options": ["Реакция небольшой тестовой аудитории никогда не используется для прогнозирования потенциала видео", "Все новые видео сразу же показываются максимально широкой аудитории без какого-либо предварительного тестирования", "Холодный старт для новых видео технически неразрешим и не имеет практических решений в реальных системах", "Видео сначала показывается небольшой выборке пользователей, и на основе их реакции (досмотр, лайки, репосты) алгоритм оценивает потенциал видео, постепенно расширяя аудиторию показа при хороших метриках или ограничивая при слабых"], "correct": 3, "explain": "Постепенное расширение аудитории показа на основе ранних сигналов вовлечённости от небольшой тестовой группы — практичный подход к проблеме холодного старта, позволяющий эффективно 'отфильтровать' потенциально вирусный контент от менее интересного без риска сразу показать неудачное видео всем.", "usage": {"code": false, "without": "Систему заставляют сразу лить новое видео на всю аудиторию, тратя охват на слабый контент.", "with": "Понимая холодный старт видео, инженер сначала показывает ролик малой тестовой группе и расширяет охват только при хороших ранних метриках.", "benefit": "охват тратится на перспективный контент"}}, {"q": "Почему рекомендательные алгоритмы обычно учитывают не только содержание видео (например, через анализ визуальных признаков, звука, текста), но и коллаборативную фильтрацию (поведение похожих пользователей)?", "options": ["Коллаборативная фильтрация никогда не используется в современных рекомендательных системах видео", "Content-based и коллаборативный подходы взаимоисключающи и никогда не комбинируются", "Комбинация content-based подхода (анализ самого контента) и коллаборативной фильтрации (сходство поведения пользователей) компенсирует слабые места друг друга: контентный анализ помогает с холодным стартом видео, а коллаборативная фильтрация улавливает неочевидные паттерны интереса, не всегда предсказуемые по содержанию", "Анализ содержания видео технически невозможен для коротких видеоформатов"], "correct": 2, "explain": "Гибридные рекомендательные системы комбинируют оба подхода именно потому, что каждый компенсирует слабые стороны другого: content-based анализ работает даже для совершенно нового видео без истории взаимодействий, а коллаборативная фильтрация улавливает менее очевидные, эмпирические паттерны схожести интересов пользователей.", "usage": {"code": false, "without": "Инженер строит рекомендации только по содержанию видео и промахивается на неочевидных интересах.", "with": "Понимая силу гибрида, он сочетает content-based анализ (спасает при холодном старте) и коллаборативную фильтрацию (ловит скрытые паттерны похожих пользователей).", "benefit": "каждый метод закрывает слабость другого"}}, {"q": "Как эффект 'пузыря фильтров' архитектурно связан с самим механизмом персонализации, а не является отдельной, независимой ошибкой алгоритма?", "options": ["Пузырь фильтров — эффект, полностью независимый от того, насколько точно алгоритм подстраивается под интересы пользователя", "Персонализация по своей сути означает всё более точную подстройку под уже проявленные интересы пользователя, и без явных механизмов противодействия (намеренное разнообразие, exploration) это естественным образом сужает разнообразие показываемого контента со временем", "Персонализация рекомендаций никогда не может привести к сужению разнообразия контента", "Пузырь фильтров возникает исключительно из-за случайных технических сбоев алгоритма, не связанных с логикой персонализации"], "correct": 1, "explain": "Filter bubble — не случайный побочный эффект, а логическое следствие самой цели персонализации (показывать то, что максимально соответствует прошлым реакциям); противодействие требует сознательного встраивания механизмов разнообразия (exploration) в саму архитектуру системы.", "usage": {"code": false, "without": "Разработчик считает пузырь фильтров случайным багом и ищет его в коде.", "with": "Понимая, что сужение — логическое следствие самой персонализации, он встраивает явный механизм разнообразия (exploration) в архитектуру.", "benefit": "разнообразие проектируется намеренно"}}, {"q": "Почему платформы, подобные TikTok, часто используют многоступенчатую архитектуру рекомендаций (например, сначала грубый отбор из миллионов видео, затем более точное ранжирование небольшого подмножества), а не применяют один сложный алгоритм ко всем видео сразу?", "options": ["Применение самой точной, но вычислительно затратной модели ко всему огромному каталогу видео для каждого пользователя было бы непрактично медленным, поэтому сначала быстрый, менее точный этап отбирает разумное подмножество кандидатов, а затем более сложная модель точно ранжирует уже это меньшее количество вариантов", "Многоступенчатая архитектура рекомендаций используется исключительно по историческим причинам без реальной технической необходимости", "Применение одной сложной модели ко всем видео сразу всегда быстрее многоступенчатого подхода", "Каталог видео на платформах вроде TikTok достаточно мал, чтобы не требовать многоступенчатой архитектуры отбора"], "correct": 0, "explain": "Классический архитектурный паттерн промышленных рекомендательных систем: 'candidate generation' (быстрый грубый отбор из огромного каталога) → 'ranking' (более точная, но затратная модель для финального ранжирования уже отобранного меньшего набора кандидатов) — балансирует между масштабом и точностью.", "usage": {"code": false, "without": "Инженер прогоняет одну тяжёлую модель по всему каталогу из миллионов видео — непрактично медленно.", "with": "Понимая многоступенчатую архитектуру, он делает быстрый грубый отбор кандидатов, а дорогую модель применяет только к суженному набору.", "benefit": "масштаб и точность одновременно"}}, {"q": "Как избыточная оптимизация алгоритма под краткосрочные метрики вовлечённости (например, время в приложении сегодня) может противоречить долгосрочным интересам пользователя или платформы (удержание, доверие)?", "options": ["Краткосрочная и долгосрочная метрики вовлечённости всегда полностью совпадают без каких-либо противоречий", "Долгосрочное удержание пользователей никак не связано с типом контента, который им показывают", "Оптимизация под краткосрочные метрики никогда не имеет негативных долгосрочных последствий для платформы", "Контент, максимизирующий немедленное вовлечение (например, чрезмерно провокационный или навязчивый), может со временем вызвать у пользователя усталость, раздражение или потерю доверия к платформе, снижая долгосрочное удержание, даже если краткосрочные метрики выглядят хорошо"], "correct": 3, "explain": "Известное противоречие в дизайне рекомендательных систем: метрики, легко измеримые и оптимизируемые в краткосрочной перспективе (клики, время в приложении сегодня), не всегда совпадают с долгосрочным здоровьем платформы (удовлетворённость, доверие, устойчивое удержание пользователей).", "usage": {"code": false, "without": "Продакт оптимизирует только время в приложении сегодня и радуется росту.", "with": "Понимая расхождение краткосрочных и долгосрочных метрик, он следит и за удержанием/доверием, чтобы не выжечь пользователя провокацией.", "benefit": "долгосрочное удержание не приносится в жертву"}}, {"q": "Как архитектурно взаимодействуют между собой этап 'candidate generation' (грубый отбор кандидатов) и этап 'ranking' (точное ранжирование) в типичном пайплайне рекомендательной системы?", "options": ["Оба этапа выполняют абсолютно одну и ту же функцию и полностью дублируют друг друга", "Ranking этап выполняется раньше candidate generation, определяя, какие видео вообще будут рассмотрены", "Candidate generation быстро отбирает разумное подмножество (сотни-тысячи) потенциально релевантных видео из миллионов, используя менее затратные методы, а ranking применяет более сложную, вычислительно дорогую модель уже к этому меньшему подмножеству для точного финального упорядочивания", "Candidate generation отбирает финальный порядок видео в ленте без дальнейшей обработки"], "correct": 2, "explain": "Двухэтапная архитектура — распространённый паттерн промышленных рекомендательных систем: дешёвый грубый отбор сокращает пространство поиска, после чего более точная (и дорогая) модель применяется только к уже сильно суженному набору кандидатов.", "usage": {"code": false, "without": "Инженер валит отбор и финальное ранжирование в один шаг и упирается в производительность.", "with": "Понимая связку candidate generation → ranking, он дешёвым этапом сужает пространство, а точной моделью ранжирует уже сотни кандидатов.", "benefit": "дорогая модель работает на малом наборе"}}, {"q": "Почему рекомендательная система архитектурно комбинирует множество различных сигналов (completion rate, лайки, репосты, время между сессиями) в единую итоговую оценку, а не полагается на один универсальный показатель?", "options": ["Разные сигналы вовлечённости всегда полностью дублируют друг друга без дополнительной информации", "Один универсальный показатель всегда точнее отражает интерес пользователя, чем комбинация нескольких сигналов", "Использование более одного сигнала одновременно технически невозможно в рекомендательных системах", "Каждый отдельный сигнал отражает свой аспект интереса и подвержен собственным искажениям (например, кликбейт искажает CTR, но не completion rate), и комбинация нескольких независимых сигналов даёт более устойчивую и полную оценку истинной заинтересованности, чем любой один показатель в отдельности"], "correct": 3, "explain": "Как и в общих системах оценки (например, кредитный скоринг), комбинация разнородных, частично независимых сигналов снижает риск того, что манипуляция или искажение одного показателя (например, кликбейтный заголовок) полностью обманет всю систему оценки.", "usage": {"code": false, "without": "Система оценивает контент по одному показателю (например, CTR), и кликбейт легко её обманывает.", "with": "Понимая ценность комбинации сигналов, инженер объединяет completion rate, лайки, репосты — манипуляция одной метрикой не ломает оценку.", "benefit": "устойчивость к накрутке одной метрики"}}, {"q": "Как экспоненциальный характер распространения вирусного контента (каждый зритель потенциально делится с несколькими другими) архитектурно отличается от линейного роста охвата через прямые рекомендации алгоритма?", "options": ["Вирусное распространение через репосты имеет мультипликативную (экспоненциальную) динамику — каждый новый зритель потенциально порождает несколько следующих, тогда как чисто алгоритмические рекомендации обычно дают более предсказуемый, управляемый платформой линейный или ступенчатый рост охвата", "Экспоненциальный рост охвата возможен только через прямые алгоритмические рекомендации, но не через репосты", "Вирусное распространение и алгоритмические рекомендации всегда дают идентичную по характеру динамику роста охвата", "Репосты пользователей никогда не влияют на скорость распространения контента"], "correct": 0, "explain": "Вирусность в узком смысле — это именно эффект цепной реакции через социальные связи (репосты), который может расти намного быстрее, чем предсказуемое, управляемое платформой продвижение через прямые алгоритмические рекомендации.", "usage": {"code": false, "without": "Маркетолог ждёт от алгоритмических показов такого же взрывного роста, как от вирусного репоста.", "with": "Понимая разницу между экспоненциальным вирусным распространением и линейным алгоритмическим охватом, он делает ставку на 'шерабельность' ролика.", "benefit": "верные ожидания по динамике охвата"}}, {"q": "Почему архитектура рекомендательной системы, полагающейся на коллаборативную фильтрацию, потенциально уязвима к скоординированным манипуляциям (например, фермам ботов, накручивающим лайки/просмотры)?", "options": ["Манипуляция сигналами вовлечённости никогда не влияет на решения рекомендательного алгоритма", "Коллаборативная фильтрация по своей природе интерпретирует паттерны поведения пользователей как сигнал подлинного интереса, и если группа ботов имитирует поведение реальных заинтересованных пользователей, система может ошибочно интерпретировать это как органический сигнал качества контента", "Коллаборативная фильтрация технически не может быть обманута никакими скоординированными действиями", "Фермы ботов физически не способны взаимодействовать с рекомендательными алгоритмами видео"], "correct": 1, "explain": "Уязвимость коллаборативной фильтрации к манипуляции ('накрутка') — известная проблема: поскольку алгоритм интерпретирует паттерны поведения как сигнал интереса, скоординированная имитация такого поведения (боты) может исказить итоговую оценку качества/популярности контента.", "usage": {"code": false, "without": "Команда доверяет сырым сигналам вовлечённости, и накрутка ботами задирает слабый контент.", "with": "Понимая уязвимость коллаборативной фильтрации к скоординированной имитации, они добавляют защиту от накрутки и фильтрацию аномального поведения.", "benefit": "меньше искажений от ботоферм"}}, {"q": "Как принцип 'многорукого бандита' помогает архитектурно решить задачу быстрого определения потенциально вирусного видео среди миллионов новых загрузок при ограниченных вычислительных и временных ресурсах на тестирование каждого?", "options": ["Каждое новое видео должно получать абсолютно одинаковый по размеру и продолжительности тестовый показ независимо от ранних результатов", "Тестирование видео на аудитории никак не связано с принципами многоруких бандитов", "Многорукие бандиты применимы только к рекламным объявлениям, а не к органическому видеоконтенту", "Вместо равномерного долгого тестирования каждого видео на большой аудитории, система быстро выделяет небольшую 'исследовательскую' аудиторию каждому новому видео, оперативно перераспределяя дальнейшее внимание (более широкий показ) в пользу видео с лучшими ранними метриками, экономя ресурсы на неперспективном контенте"], "correct": 3, "explain": "Задача многорукого бандита — прямая формализация проблемы эффективного распределения ограниченного 'бюджета показов' между множеством новых видео-кандидатов, быстро перенаправляя внимание в сторону наиболее перспективных на основе ранних сигналов, а не тратя равные ресурсы на проверку каждого.", "usage": {"code": false, "without": "Систему заставляют одинаково долго тестировать каждое из миллионов видео — ресурсы распылены.", "with": "Применяя многорукого бандита, инженер даёт каждому ролику малую исследовательскую аудиторию и быстро перекидывает показы к лидерам по ранним метрикам.", "benefit": "бюджет показов идёт к перспективным роликам"}}, {"q": "Почему решение показывать пользователю небольшую долю контента за пределами его обычных интересов (диверсификация ленты) архитектурно требует отдельного, явного механизма, а не возникает 'само собой' из основной модели персонализации?", "options": ["Модель персонализации автоматически балансирует между узкими интересами и разнообразием без дополнительной логики", "Диверсификация ленты рекомендаций естественным образом возникает без каких-либо специальных механизмов", "Явные механизмы диверсификации технически несовместимы с системами персонализации на основе машинного обучения", "Модель персонализации, обучаемая на исторических данных о предпочтениях, по своей природе стремится максимизировать соответствие уже известным интересам, и без отдельного явного механизма продвижения разнообразия (например, дополнительного слоя логики или штрафа за повторяемость) система естественным образом будет сужать, а не расширять разнообразие"], "correct": 3, "explain": "Так как базовая цель модели персонализации — максимизация предсказанного соответствия интересам, диверсификация — это осознанное архитектурное дополнение (например, отдельный компонент постобработки ранжирования), а не естественное следствие основной оптимизации модели.", "usage": {"code": false, "without": "Разработчик ждёт, что разнообразие ленты появится само из модели персонализации.", "with": "Понимая, что модель по природе сужает под известные интересы, он добавляет отдельный слой диверсификации (штраф за повторяемость).", "benefit": "разнообразие как явный компонент"}}, {"q": "Как асимметрия в доступности данных (миллионы взаимодействий с популярным контентом против считанных с нишевым) влияет на архитектурный выбор между чисто коллаборативными методами и content-based методами для разных сегментов каталога видео?", "options": ["Коллаборативная фильтрация одинаково хорошо работает для популярного и нишевого контента независимо от объёма данных", "Асимметрия объёма данных между популярным и нишевым контентом не влияет на выбор архитектуры рекомендательной системы", "Content-based методы неприменимы к видеоконтенту, только к текстовым рекомендациям", "Для популярного, хорошо представленного в данных контента коллаборативная фильтрация работает особенно хорошо благодаря обилию сигналов, тогда как для нишевого контента с малым количеством взаимодействий content-based анализ (по содержанию видео) часто оказывается более надёжным источником сигнала"], "correct": 3, "explain": "Гибридные системы часто взвешивают вклад коллаборативных и content-based сигналов по-разному в зависимости от объёма доступных данных для конкретного видео — это архитектурное решение напрямую вытекает из фундаментальной асимметрии данных между популярным и нишевым контентом.", "usage": {"code": false, "without": "Инженер применяет коллаборативную фильтрацию везде и получает слабые рекомендации по нишевым темам.", "with": "Понимая асимметрию данных, он опирается на content-based анализ для нишевого контента и на коллаборативный — для популярного.", "benefit": "метод подбирается под объём данных"}}, {"q": "Почему платформы архитектурно разделяют модель предсказания 'вероятности взаимодействия' (например, вероятность лайка) и модель финального ранжирования, комбинирующую несколько таких предсказанных вероятностей с разными весами?", "options": ["Раздельные модели для отдельных типов взаимодействия (лайк, репост, досмотр) позволяют более точно предсказывать каждый конкретный сигнал независимо, а финальное ранжирование гибко комбинирует эти предсказания с настраиваемыми весами, отражающими текущие приоритеты платформы (например, больший вес на удержание vs на репосты)", "Финальное ранжирование никогда не использует несколько предсказанных сигналов одновременно", "Использование нескольких отдельных моделей для разных типов взаимодействия всегда менее точно, чем одна универсальная модель", "Веса разных сигналов в финальном ранжировании фиксированы навсегда и никогда не меняются платформой"], "correct": 0, "explain": "Модульная архитектура (отдельные модели предсказания для каждого типа сигнала + комбинирующий слой ранжирования) даёт гибкость: платформа может менять относительные веса разных сигналов (например, снижая вес чистого времени просмотра в пользу удовлетворённости) без необходимости переобучать всю систему с нуля.", "usage": {"code": false, "without": "Команда лепит один универсальный скор и не может гибко менять приоритеты платформы.", "with": "Понимая пользу модульности, они держат отдельные модели предсказания (лайк, репост, досмотр) и комбинируют их весами в ранжировании.", "benefit": "веса меняются без переобучения всей системы"}}, {"q": "Как понимание компромисса между точностью персонализации и вычислительной стоимостью её обновления в реальном времени влияет на архитектурное решение о том, как часто пересчитывать профиль интересов активного пользователя?", "options": ["Обновление профиля пользователя в реальном времени не требует каких-либо дополнительных вычислительных ресурсов по сравнению с редким пересчётом", "Частота обновления профиля интересов пользователя не влияет на качество или отзывчивость рекомендаций", "Все платформы всегда пересчитывают профиль интересов пользователя ровно раз в сутки без исключений", "Более частое обновление профиля интересов (например, после каждого нового видео) даёт более отзывчивую персонализацию, но требует значительно больше вычислительных ресурсов при огромном числе одновременных пользователей, поэтому системы ищут баланс между отзывчивостью и практической стоимостью вычислений в масштабе всей платформы"], "correct": 3, "explain": "Компромисс между отзывчивостью персонализации (более частые обновления) и вычислительной стоимостью в масштабе миллионов одновременных пользователей — классическое архитектурное решение systems design, требующее баланса между качеством персонализации и практическими ограничениями инфраструктуры.", "usage": {"code": false, "without": "Инженер обновляет профиль пользователя строго раз в сутки — рекомендации отстают от поведения.", "with": "Понимая компромисс отзывчивость/стоимость, он выбирает частоту пересчёта профиля, балансируя между свежестью и нагрузкой на инфраструктуру.", "benefit": "отзывчивость без перегрузки инфраструктуры"}}, {"q": "Новый пользователь только что зарегистрировался в приложении вроде TikTok, и алгоритм пока не имеет истории его поведения. Какой подход наиболее уместен для формирования первых рекомендаций?", "options": ["Показывать пользователю случайный, никак не подобранный контент бесконечно долго без анализа реакций", "Полностью отказаться от персонализации до момента, пока пользователь явно не укажет свои интересы в настройках", "Сразу показать максимально узкий, специфический набор контента без предварительного изучения интересов пользователя", "Показать разнообразный набор популярного и разнопланового контента, одновременно внимательно отслеживая первые реакции пользователя для быстрого построения начального профиля интересов"], "correct": 3, "explain": "Классическое решение проблемы холодного старта нового пользователя — начать с разнообразного, широко популярного контента, одновременно быстро собирая поведенческие сигналы (досмотры, лайки) для построения персонализированного профиля.", "usage": {"code": false, "without": "Для нового пользователя система долго показывает случайный контент без анализа реакций.", "with": "Понимая холодный старт, она стартует с разнообразного популярного контента и быстро строит профиль по первым досмотрам и лайкам.", "benefit": "быстрый выход из холодного старта"}}, {"q": "Автор загрузил новое видео, но оно набирает крайне мало просмотров, хотя предыдущие видео этого автора были популярны. Какое из объяснений наиболее вероятно с точки зрения работы рекомендательного алгоритма, не связанное с содержанием видео?", "options": ["Низкие просмотры видео всегда означают техническую ошибку платформы, а не результат работы алгоритма", "Видео могло не пройти начальный тестовый показ небольшой аудитории достаточно успешно (низкий completion rate или мало взаимодействий на раннем этапе), из-за чего алгоритм ограничил его дальнейшее распространение", "Алгоритм рекомендаций никогда не оценивает каждое новое видео независимо от истории автора", "Популярность предыдущих видео автора должна автоматически гарантировать одинаковую популярность абсолютно всех последующих видео"], "correct": 1, "explain": "Даже у популярного автора каждое новое видео обычно проходит собственный этап оценки на небольшой тестовой аудитории; если ранние метрики вовлечённости (в частности, completion rate) слабые, алгоритм может ограничить дальнейшее продвижение независимо от общей популярности автора.", "usage": {"code": false, "without": "Популярный автор считает, что новый ролик обязан взлететь автоматически, и не смотрит на метрики.", "with": "Понимая, что каждое видео проходит свой тестовый показ, он анализирует слабый completion rate ролика, а не полагается на прошлую славу.", "benefit": "диагностика по метрикам, а не по репутации"}}, {"q": "Пользователь заметил, что после нескольких дней просмотра только развлекательного контента лента стала показывать почти исключительно юмористические видео, полностью вытеснив темы, интересовавшие его раньше. Какое явление это иллюстрирует, и что может помочь его смягчить?", "options": ["Это иллюстрирует эффект 'пузыря фильтров' — намеренное или пассивное взаимодействие с более широким разнообразием контента (лайки/просмотры в других категориях) может помочь алгоритму снова расширить разнообразие ленты", "Единственный способ восстановить разнообразие — полностью удалить и заново создать аккаунт", "Такое сужение ленты — техническая ошибка, не связанная с логикой персонализации алгоритма", "Разнообразие ленты рекомендаций никогда не может сузиться в результате поведения пользователя"], "correct": 0, "explain": "Классическое проявление filter bubble: устойчивое поведение (просмотр только одной категории) быстро сужает рекомендации; осознанное взаимодействие с разнообразным контентом — практический способ 'расширить' профиль интересов, который считывает алгоритм.", "usage": {"code": false, "without": "Пользователь думает, что однообразная лента — поломка, и хочет удалить аккаунт.", "with": "Понимая пузырь фильтров, он осознанно лайкает и досматривает контент других категорий, чтобы алгоритм снова расширил ленту.", "benefit": "лента восстанавливается без сброса аккаунта"}}, {"q": "Компания-разработчик платформы замечает, что чисто engagement-ориентированные метрики показывают рост, но опросы пользователей демонстрируют снижение удовлетворённости и рост усталости от приложения. Какой вывод и корректировка наиболее уместны?", "options": ["Рост метрик вовлечённости всегда означает улучшение продукта независимо от других сигналов", "Единственное решение — полностью отказаться от любых рекомендательных алгоритмов", "Опросы пользователей никогда не дают полезной информации по сравнению с количественными метриками вовлечённости", "Стоит пересмотреть набор оптимизируемых метрик, включив показатели долгосрочного благополучия и удовлетворённости пользователей, а не полагаться исключительно на краткосрочные метрики вовлечённости"], "correct": 3, "explain": "Расхождение между растущими краткосрочными метриками вовлечённости и падающей долгосрочной удовлетворённостью — сигнал того, что чисто engagement-ориентированная оптимизация может вредить долгосрочному здоровью платформы, что требует пересмотра набора целевых метрик.", "usage": {"code": false, "without": "Продакт видит рост вовлечённости и игнорирует падение удовлетворённости в опросах.", "with": "Понимая, что engagement может вредить долгосрочно, он добавляет в оптимизацию метрики благополучия и удержания.", "benefit": "продукт не выгорает ради краткосрочных цифр"}}, {"q": "Исследователь заметил, что рекомендательный алгоритм новостной ленты со временем стал чаще показывать более провокационные и поляризующие материалы по сравнению с началом использования приложения. Какое объяснение наиболее правдоподобно с точки зрения экономики внимания?", "options": ["Провокационный контент всегда получает меньше вовлечённости, чем нейтральный", "Алгоритмы рекомендаций технически неспособны учитывать эмоциональную окраску текстового или видео контента", "Изменение характера рекомендаций никогда не связано с оптимизацией метрик вовлечённости", "Провокационный контент статистически чаще вызывает сильную реакцию (комментарии, репосты, долгое обсуждение), что делает его 'выгодным' для чисто engagement-ориентированного алгоритма, даже без явного намерения продвигать именно поляризующий контент"], "correct": 3, "explain": "Это иллюстрация упомянутой ранее проблемы: эмоционально заряженный, поляризующий контент статистически чаще получает сильную реакцию, что неявно 'вознаграждается' чисто engagement-ориентированным алгоритмом, даже если это не было явной целью его разработки.", "usage": {"code": false, "without": "Исследователь удивляется росту поляризующего контента и винит чей-то умысел.", "with": "Понимая экономику внимания, он видит: провокация статистически собирает больше реакций и неявно вознаграждается engagement-алгоритмом.", "benefit": "верное объяснение крена ленты"}}, {"q": "Маркетолог хочет, чтобы новое короткое видео о продукте набрало широкий органический охват через алгоритм рекомендаций. Какая стратегия, основанная на понимании метрик алгоритма, наиболее уместна?", "options": ["Длина видео и качество завязки не имеют значения, если тема ролика достаточно интересна сама по себе", "Единственный способ гарантировать охват — купить платную рекламу, так как органический охват через алгоритм принципиально недостижим", "Сделать видео максимально захватывающим с первых секунд, стимулирующим полный досмотр и повторные просмотры, так как completion rate и повторные просмотры — сильные сигналы для дальнейшего продвижения алгоритмом", "Совершенно неважно, досматривают ли зрители видео до конца, если общее количество показов высокое"], "correct": 2, "explain": "Понимание того, что completion rate и повторные просмотры — сильные поведенческие сигналы для алгоритма, напрямую подсказывает практическую стратегию создания контента: захватывающее начало и структура, стимулирующая полный просмотр, увеличивают шанс на дальнейшее органическое продвижение.", "usage": {"code": false, "without": "Маркетолог делает вялую завязку и надеется на охват за счёт интересной темы.", "with": "Понимая, что completion rate и повторы — сильные сигналы, он цепляет зрителя с первых секунд ради полного досмотра.", "benefit": "высокий досмотр → органическое продвижение"}}, {"q": "Платформа замечает, что видео с кликбейтными, вводящими в заблуждение превью получают высокий начальный клик-рейт, но очень низкий completion rate и много негативных реакций. Как алгоритм, ориентированный на комплексный набор сигналов (а не только на клики), должен отреагировать на такой паттерн?", "options": ["Высокий начальный клик-рейт должен автоматически гарантировать максимальное дальнейшее продвижение видео независимо от последующих метрик", "Completion rate и негативные реакции не должны учитываться алгоритмом, если начальный клик-рейт достаточно высок", "Кликбейтный контент всегда одинаково полезен для платформы независимо от последующего поведения зрителей", "Алгоритм должен снижать дальнейшее продвижение такого контента, так как низкий completion rate и негативные реакции сигнализируют о несоответствии ожиданиям зрителя, несмотря на изначально высокий клик-рейт"], "correct": 3, "explain": "Комплексная оценка сигналов (не только клик, но и последующее поведение — досмотр, реакции) позволяет алгоритму отличать контент с честной, привлекательной подачей от вводящего в заблуждение кликбейта, который выглядит хорошо только по одной изолированной метрике.", "usage": {"code": false, "without": "Система продвигает ролик за высокий клик по кликбейтному превью, игнорируя, что его не досматривают.", "with": "Понимая ценность комплекса сигналов, алгоритм снижает продвижение при низком completion rate и негативных реакциях, несмотря на клики.", "benefit": "кликбейт не обманывает ранжирование"}}, {"q": "Пользователь, интересующийся узкоспециализированной темой (например, редким видом рукоделия), жалуется, что качественных рекомендаций по этой теме мало, хотя по массовым темам (юмор, музыка) рекомендации отличные. Какое объяснение наиболее вероятно с точки зрения работы рекомендательной системы?", "options": ["Алгоритмы рекомендаций технически не способны работать с нишевыми, малопопулярными темами вообще", "Для нишевых тем в системе может быть недостаточно данных о взаимодействиях (меньше пользователей и видео в этой категории), что усложняет как коллаборативную фильтрацию, так и общую точность рекомендаций по сравнению с массово популярными темами", "Качество рекомендаций никогда не зависит от объёма доступных данных о взаимодействиях в конкретной категории", "Массовые и нишевые темы всегда получают абсолютно одинаковое качество рекомендаций"], "correct": 1, "explain": "Меньший объём данных (пользователей, видео, взаимодействий) в нишевых категориях — классическая причина менее точных рекомендаций по сравнению с массовыми темами, где данных для обучения модели значительно больше.", "usage": {"code": false, "without": "Пользователь злится, что по редкому хобби мало рекомендаций, и винит алгоритм.", "with": "Понимая, что в нишевой категории мало данных о взаимодействиях, он принимает ограничение коллаборативной фильтрации на малых объёмах.", "benefit": "реалистичные ожидания по нишевым темам"}}, {"q": "Компания добавляет в рекомендательный алгоритм новый сигнал — время, прошедшее с момента последнего взаимодействия с похожим контентом (recency), чтобы избежать показа слишком похожих видео подряд. Какую проблему это решает?", "options": ["Добавление recency сигнала всегда ухудшает точность рекомендаций без каких-либо преимуществ", "Это снижает риск чрезмерного повторения одной и той же узкой темы подряд, добавляя разнообразие в ленту и потенциально противодействуя эффекту пузыря фильтров", "Эта техника применяется исключительно для видео, а не для любого другого типа контента", "Recency сигнал никак не связан с разнообразием контента в ленте рекомендаций"], "correct": 1, "explain": "Явный учёт 'свежести' взаимодействия с похожим контентом — практический механизм противодействия чрезмерному сужению разнообразия ленты (пузырю фильтров), намеренно вводящий больше вариативности в последовательность рекомендаций.", "usage": {"code": false, "without": "Инженер ранжирует только по релевантности и заваливает ленту почти одинаковыми роликами подряд.", "with": "Понимая роль recency, он добавляет сигнал свежести взаимодействия с похожим контентом, разбавляя однообразие.", "benefit": "меньше повторов, шире лента"}}, {"q": "Регулятор запрашивает у платформы объяснение, почему рекомендательный алгоритм продвигает определённые категории контента чаще других. Какая трудность возникает при попытке дать полностью прозрачное объяснение работы такой системы?", "options": ["Современные рекомендательные алгоритмы часто основаны на сложных моделях машинного обучения с огромным количеством взаимодействующих сигналов, что затрудняет простое, полностью интерпретируемое объяснение конкретного решения о продвижении того или иного видео", "Любой рекомендательный алгоритм может быть полностью и просто объяснён в одном предложении без потери точности", "Рекомендательные алгоритмы всегда основаны на простых, полностью прозрачных и легко объяснимых правилах без каких-либо сложностей", "Прозрачность работы алгоритма не имеет значения для регуляторов и пользователей"], "correct": 0, "explain": "Это отражает более широкую проблему интерпретируемости сложных моделей машинного обучения (не только в контексте рекомендаций видео) — чем сложнее и многофакторнее модель, тем труднее дать простое, но точное объяснение конкретного решения, что создаёт напряжение между эффективностью и прозрачностью системы.", "usage": {"code": false, "without": "Команда обещает регулятору простое однострочное объяснение решений алгоритма.", "with": "Понимая проблему интерпретируемости сложных ML-моделей с тысячами сигналов, они честно описывают ограничения прозрачности и дают агрегированные объяснения.", "benefit": "честная коммуникация об интерпретируемости"}}, {"q": "Видео набрало 100 000 показов, из которых 100% досмотрели до конца 40 000 пользователей. Какой completion rate у этого видео?", "options": ["60%", "80%", "40%", "20%"], "correct": 2, "explain": "40000/100000=0.4=40%.", "usage": {"code": true, "without": "# считаю на глаз: '40 тысяч из 100 тысяч, ну процентов 60?'", "with": "completion_rate = 40000 / 100000  # = 0.40 = 40%", "benefit": "досмотр считается точной долей"}}, {"q": "Из 500 показанных тестовой аудитории видео только 50 показали completion rate выше 50% и были продвинуты дальше алгоритмом. Какова доля видео, прошедших этот порог?", "options": ["5%", "10%", "15%", "20%"], "correct": 1, "explain": "50/500=0.1=10%.", "usage": {"code": true, "without": "# 'прошло 50 из 500 — где-то пятая часть' (неверно)", "with": "share = 50 / 500  # = 0.10 = 10% прошли порог", "benefit": "доля прошедших порог без ошибки"}}, {"q": "Видео показано 1 000 000 раз, получило 50 000 лайков и 200 000 полных просмотров. Чему равен коэффициент лайков относительно полных просмотров (в процентах)?", "options": ["50%", "5%", "25%", "10%"], "correct": 2, "explain": "50000/200000=0.25=25% — коэффициент лайков относительно полных (а не всех) просмотров.", "usage": {"code": true, "without": "# делю лайки на все показы вместо полных просмотров", "with": "like_ratio = 50000 / 200000  # = 0.25 = 25% относительно полных просмотров", "benefit": "верный знаменатель — полные просмотры"}}, {"q": "Пользователь просматривает в среднем 150 видео в день по 20 секунд каждое. Сколько минут в день это составляет?", "options": ["60 минут", "50 минут", "100 минут", "30 минут"], "correct": 1, "explain": "150×20=3000 секунд = 3000/60=50 минут.", "usage": {"code": true, "without": "# 'сто пятьдесят роликов по двадцать секунд — минут сорок?'", "with": "minutes = 150 * 20 / 60  # = 50 минут в день", "benefit": "время в приложении посчитано точно"}}, {"q": "Из 10 000 новых видео, прошедших тестовый показ, 15% получили достаточно хорошие метрики для расширенного показа. Сколько видео это составляет?", "options": ["1500", "1000", "150", "2500"], "correct": 0, "explain": "10000×0.15=1500 видео.", "usage": {"code": true, "without": "# '15 процентов от десяти тысяч... примерно тысяча?'", "with": "promoted = 10000 * 0.15  # = 1500 видео", "benefit": "количество прошедших порог точно"}}, {"q": "Видео A получило 10 000 репостов при 500 000 просмотров, видео B — 5 000 репостов при 100 000 просмотров. У какого видео выше доля репостов относительно просмотров?", "options": ["У видео A (2%)", "Недостаточно данных для сравнения", "У видео B (5%)", "Доли одинаковы"], "correct": 2, "explain": "A: 10000/500000=0.02=2%. B: 5000/100000=0.05=5%. У видео B доля репостов выше.", "usage": {"code": true, "without": "# сравниваю по абсолютным репостам: у A их 10000 > 5000, значит A? (ошибка)", "with": "a = 10000/500000  # 2%\nb = 5000/100000   # 5% — у B доля репостов выше", "benefit": "сравнение по доле, а не по абсолюту"}}, {"q": "Алгоритм тестирует видео на аудитории из 1000 пользователей, и если completion rate выше 45%, видео показывается ещё 10 000 пользователям. Если видео прошло тест и получило 45% нового completion rate на расширенной аудитории, сколько пользователей досмотрели видео до конца при расширенном показе?", "options": ["5000", "4500", "10000", "5500"], "correct": 1, "explain": "10000×0.45=4500 пользователей.", "usage": {"code": true, "without": "# путаю тестовую и расширенную аудиторию при расчёте досмотров", "with": "finished = 10000 * 0.45  # = 4500 досмотрели на расширенном показе", "benefit": "досмотры на нужной аудитории"}}, {"q": "Платформа обрабатывает 1 миллиард видео-показов в день. Если 0.001% этих показов приводят к жалобе на контент, сколько жалоб поступает в день?", "options": ["100000", "1000", "100", "10000"], "correct": 3, "explain": "0.001% = 0.00001 в долях. 1000000000×0.00001=10000 жалоб в день.", "usage": {"code": true, "without": "# теряюсь в нулях процента 0.001% от миллиарда", "with": "complaints = 1_000_000_000 * 0.00001  # = 10000 жалоб в день", "benefit": "перевод процента в долю без ошибки"}}, {"q": "Ленты рекомендаций для 50 миллионов активных пользователей обновляются в среднем каждые 30 секунд просмотра. Сколько обновлений ленты в среднем произойдёт за 10 минут (600 секунд) непрерывного использования одним пользователем?", "options": ["10", "60", "20", "30"], "correct": 2, "explain": "600/30=20 обновлений ленты за 10 минут.", "usage": {"code": true, "without": "# 'обновляется каждые 30 секунд за 10 минут... штук 30?'", "with": "updates = 600 / 30  # = 20 обновлений ленты за 10 минут", "benefit": "число обновлений посчитано верно"}}, {"q": "Из 200 миллионов ежедневных загружаемых видео только 0.01% становятся 'вирусными' (превышают порог в 10 миллионов просмотров). Сколько видео в день становятся вирусными?", "options": ["200", "2000", "20000", "200000"], "correct": 2, "explain": "0.01% = 0.0001 в долях. 200000000×0.0001=20000 видео в день.", "usage": {"code": true, "without": "# 0.01% от 200 миллионов — легко ошибиться на порядок", "with": "viral = 200_000_000 * 0.0001  # = 20000 вирусных видео в день", "benefit": "масштаб вирусности оценён точно"}}, {"q": "Тестовая аудитория для нового видео составляет 0.1% от 5 000 000 подписчиков автора. Сколько пользователей войдёт в тестовую аудиторию?", "options": ["500000", "50000", "5000", "500"], "correct": 2, "explain": "5000000×0.001=5000 пользователей (0.1% = 0.001 в долях).", "usage": {"code": true, "without": "# 0.1% от 5 миллионов — на глаз можно дать 50000 (ошибка)", "with": "test_audience = 5_000_000 * 0.001  # = 5000 в тестовой аудитории", "benefit": "размер тестовой выборки точно"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
