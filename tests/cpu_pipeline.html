<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Конвейер команд и параллелизм (ILP)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Конвейер команд и параллелизм (ILP)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "cpu_pipeline";
  const QUESTIONS = [{"q": "Что такое конвейер команд в процессоре?", "options": ["Разбиение обработки команды на стадии, работающие над разными командами сразу", "Одновременный запуск всех команд программы сразу на множестве отдельных вычислительных ядер", "Хранение очереди команд в кэше для ускорения повторного доступа к ним", "Механизм полного исполнения одной команды до начала выборки следующей"], "correct": 0, "explain": "Конвейер делит обработку на стадии: пока одна команда на EX, следующая на ID, а ещё одна на IF — стадии заняты разными командами.", "usage": {"code": false, "without": "Думаешь, что конвейер — это когда команды просто быстрее идут по одной за раз.", "with": "Понимаешь, что несколько команд обрабатываются одновременно, каждая на своей стадии.", "benefit": "Верно оцениваешь, откуда берётся рост пропускной способности."}}, {"q": "Какие пять классических стадий образуют RISC-конвейер?", "options": ["Загрузка, компиляция, оптимизация, исполнение, сохранение итогового значения", "Выборка, декодирование, исполнение, доступ к памяти, запись результата", "Прерывание, диспетчеризация, планирование, исполнение, освобождение контекста", "Выборка, кэширование, шифрование, исполнение, вывод конечного результата"], "correct": 1, "explain": "Классический пятистадийный конвейер: IF выборка, ID декодирование, EX исполнение, MEM доступ к памяти, WB запись.", "usage": {"code": false, "without": "Путаешь стадии железа со стадиями сборки программы вроде компиляции.", "with": "Держишь в голове ровно IF, ID, EX, MEM, WB как аппаратные шаги обработки.", "benefit": "Легко анализируешь, где команда находится в каждый такт."}}, {"q": "Для чего служит счётчик команд PC в процессоре?", "options": ["Считает общее число выполненных команд с момента запуска программы", "Хранит результат последней арифметической операции для следующей команды", "Хранит адрес следующей команды, подлежащей выборке из памяти", "Задаёт тактовую частоту, с которой процессор выбирает новые команды"], "correct": 2, "explain": "Program Counter содержит адрес очередной команды; после выборки он увеличивается или меняется при переходе.", "usage": {"code": false, "without": "Считаешь, что PC накапливает счётчик выполненных команд как статистику.", "with": "Понимаешь, что PC указывает адрес следующей команды и меняется при переходах.", "benefit": "Правильно объясняешь, как процессор находит следующую команду."}}, {"q": "Что происходит на стадии выборки IF?", "options": ["Операнды команды считываются из регистрового файла процессора", "Результат работы АЛУ записывается обратно в регистр назначения", "Определяется тип команды и вычисляются адреса её операндов", "Из памяти по адресу из PC читается код очередной команды"], "correct": 3, "explain": "IF instruction fetch — чтение самой команды из памяти по адресу, который хранится в PC.", "usage": {"code": false, "without": "Смешиваешь выборку команды с чтением её операндов из регистров.", "with": "Чётко разделяешь: IF достаёт код команды, а операнды берутся позже на ID.", "benefit": "Не путаешь, что именно происходит на первой стадии."}}, {"q": "Что делает стадия декодирования ID?", "options": ["Распознаёт команду и читает нужные операнды из регистрового файла", "Загружает команду из оперативной памяти по адресу из счётчика PC", "Выполняет арифметическую или логическую операцию над операндами", "Сохраняет вычисленный результат в память или в регистр назначения"], "correct": 0, "explain": "На ID процессор определяет, что это за команда, и извлекает её исходные операнды из регистров.", "usage": {"code": false, "without": "Считаешь, что декодирование уже что-то вычисляет.", "with": "Понимаешь, что ID лишь распознаёт команду и готовит операнды для EX.", "benefit": "Точно локализуешь, на какой стадии читаются регистры."}}, {"q": "На какой стадии АЛУ выполняет арифметику и вычисляет адреса?", "options": ["На стадии записи результата WB", "На стадии исполнения EX", "На стадии доступа к памяти MEM", "На стадии декодирования команды ID"], "correct": 1, "explain": "EX execute — стадия, где АЛУ производит вычисления: арифметику, логику и расчёт адресов памяти.", "usage": {"code": false, "without": "Думаешь, что вычисления идут при записи результата.", "with": "Знаешь, что собственно расчёт делается на EX силами АЛУ.", "benefit": "Верно указываешь стадию, где работает арифметико-логическое устройство."}}, {"q": "Что делает стадия доступа к памяти MEM?", "options": ["Выбирает следующую команду программы из памяти по адресу PC", "Выполняет сложение и сравнение операндов силами блока АЛУ", "Читает или записывает данные в память для команд load и store", "Помещает окончательный итоговый результат команды обратно в регистровый файл процессора"], "correct": 2, "explain": "MEM активна только для команд обращения к памяти: там load читает данные, а store записывает их.", "usage": {"code": false, "without": "Считаешь, что через MEM обязательно проходят все команды с данными.", "with": "Понимаешь, что MEM реально работает лишь для load и store.", "benefit": "Не приписываешь обращение к памяти обычным арифметическим командам."}}, {"q": "Что происходит на стадии записи результата WB?", "options": ["Команда впервые считывается из памяти по текущему адресу", "Вычисляется физический адрес операнда в оперативной памяти", "Проверяется условие перехода и обновляется счётчик команд", "Итог команды записывается в регистр назначения"], "correct": 3, "explain": "WB write back завершает команду, помещая её результат в целевой регистр регистрового файла.", "usage": {"code": false, "without": "Думаешь, что запись результата и обращение к памяти — одно и то же.", "with": "Знаешь, что WB кладёт итог именно в регистр назначения.", "benefit": "Чётко видишь, чем заканчивается путь команды по конвейеру."}}, {"q": "Зачем в процессоре нужны регистры?", "options": ["Дают сверхбыстрый доступ к данным, с которыми работают команды", "Служат основным энергонезависимым хранилищем программ и файлов", "Расширяют объём оперативной пам тна CPI, поэтому рост CPI в 1.5 раза снижает throughput ровно в 1.5 раза.", "usage": {"code": false, "without": "Путаешь направление и величину изменения пропускной способности.", "with": "Понимаешь, что throughput обратно пропорционален CPI при фиксированной частоте.", "benefit": "Быстро переводишь рост CPI в падение производительности."}}, {"q": "Конвейер удлинили с 5 до 10 стадий и удвоили частоту, но штраф промаха вырос. Что верно?", "options": ["И пиковая скорость, и штраф промаха остаются полностью прежними", "Пиковый throughput выше, зато цена промаха предсказания заметно больше", "Пиковая скорость падает, зато штраф промаха становится меньше", "Штраф промаха не зависит от числа стадий и потому неизменен"], "correct": 1, "explain": "Больше стадий дают выше частоту и пиковый throughput, но промах предсказания теперь сбрасывает больше стадий, увеличивая штраф в тактах.", "usage": {"code": false, "without": "Считаешь, что удлинение конвейера бесплатно повышает скорость.", "with": "Понимаешь компромисс: выше частота, но дороже каждый промах ветвления.", "benefit": "Взвешенно оцениваешь выгоду и риск глубоких конвейеров."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
