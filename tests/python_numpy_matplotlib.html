<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Практика Python (NumPy и Matplotlib)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
    </div>
    <h1>Практика Python (NumPy и Matplotlib)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "python_numpy_matplotlib";
  const QUESTIONS = [{"q": "Что такое NumPy array (ndarray)?", "options": ["Обычный список Python без ограничений типов", "Многомерный массив фиксированного типа данных, оптимизированный для числовых вычислений", "Файл конфигурации библиотеки", "Функция для построения графиков"], "correct": 1, "explain": "ndarray — базовая структура NumPy: однородный (один тип данных) многомерный массив, хранящийся компактно в памяти для быстрых векторизованных вычислений."}, {"q": "Что означает атрибут shape массива NumPy?", "options": ["Тип данных элементов массива", "Кортеж, описывающий размер массива по каждой оси", "Сумма всех элементов массива", "Количество измерений массива всегда равное 1"], "correct": 1, "explain": "shape — кортеж чисел, например (3,4), показывающий размер массива по каждому измерению (3 строки, 4 столбца)."}, {"q": "Что делает функция numpy.zeros((3,3))?", "options": ["Создаёт массив 3×3, заполненный единицами", "Создаёт массив 3×3, заполненный нулями", "Удаляет массив размером 3×3", "Создаёт список из 3 элементов"], "correct": 1, "explain": "numpy.zeros создаёт массив заданной формы, заполненный нулями — часто используется для инициализации."}, {"q": "Что такое broadcasting (транслирование) в NumPy?", "options": ["Отправка данных по сети", "Механизм, позволяющий выполнять поэлементные операции над массивами разной формы без явного копирования данных", "Функция для сортировки массива", "Способ сохранения массива в файл"], "correct": 1, "explain": "Broadcasting позволяет NumPy автоматически 'растягивать' массивы меньшей формы для соответствия большей форме при поэлементных операциях, без создания лишних копий в памяти."}, {"q": "Что возвращает функция matplotlib.pyplot.plot(x, y)?", "options": ["Строит линейный график по точкам (x,y)", "Вычисляет сумму массивов x и y", "Сохраняет данные в CSV-файл", "Создаёт таблицу базы данных"], "correct": 0, "explain": "plt.plot(x, y) строит линейный график, соединяя точки с координатами из массивов x и y."}, {"q": "Как называется базовый объект в matplotlib, представляющий всё окно/холст рисунка?", "options": ["Axes", "Figure", "Canvas только для веб", "Plot()"], "correct": 1, "explain": "Figure — верхнеуровневый контейнер, который может содержать один или несколько Axes (отдельных графиков/подграфиков)."}, {"q": "Что представляет собой объект Axes в matplotlib?", "options": ["Единственный доступный шрифт в библиотеке", "Отдельная область графика (с осями, данными, подписями) внутри Figure", "Синоним Figure", "Файл формата PNG"], "correct": 1, "explain": "Axes — это конкретная область построения графика (с осями X/Y, линиями, подписями), находящаяся внутри Figure; в одной Figure может быть несколько Axes (subplot)."}, {"q": "Как получить срез (slice) элементов массива arr с индекса 2 по индекс 5 (не включая 5)?", "options": ["arr[2:5]", "arr(2,5)", "arr{2:5}", "arr[2,5]"], "correct": 0, "explain": "Синтаксис среза в Python/NumPy — arr[start:stop], где stop не включается: arr[2:5] вернёт элементы с индексами 2,3,4."}, {"q": "Что делает функция numpy.mean(arr)?", "options": ["Находит максимальный элемент массива", "Вычисляет среднее арифметическое всех элементов массива", "Сортирует массив по возрастанию", "Меняет форму массива"], "correct": 1, "explain": "numpy.mean вычисляет среднее арифметическое значений массива (по умолчанию по всем элементам, либо по указанной оси)."}, {"q": "Какой тип объекта возвращает функция plt.subplots(2, 2)?", "options": ["Только Figure без Axes", "Кортеж (Figure, массив из 4 объектов Axes)", "Одиночный Axes", "Список чисел"], "correct": 1, "explain": "plt.subplots(2,2) создаёт Figure и сетку 2×2 подграфиков, возвращая кортеж (fig, axes), где axes — массив из 4 объектов Axes."}, {"q": "Почему NumPy-массивы значительно быстрее обычных списков Python для числовых вычислений?", "options": ["NumPy хранит данные в компактном непрерывном блоке памяти одного типа и использует векторизованные операции, реализованные на C, избегая накладных расходов интерпретатора Python на каждый элемент", "NumPy-массивы всегда занимают больше памяти, но это не влияет на скорость", "Списки Python используют тот же формат хранения, что и NumPy", "Скорость вычислений не зависит от структуры данных"], "correct": 0, "explain": "В отличие от списков Python (массив указателей на произвольные объекты), NumPy хранит однородные данные компактно и выполняет операции через оптимизированный C-код, векторизованно, без цикла Python для каждого элемента."}, {"q": "Как broadcasting позволяет сложить массив формы (3,4) с массивом формы (4,) без явного цикла?", "options": ["NumPy автоматически 'растягивает' (концептуально) меньший массив (4,) по недостающему измерению, применяя его к каждой из 3 строк большего массива", "Сложение массивов разной формы всегда вызывает ошибку без broadcasting", "Broadcasting работает только для массивов одинаковой формы", "Broadcasting требует явного копирования меньшего массива в цикле"], "correct": 0, "explain": "Правила broadcasting выравнивают формы массивов справа налево; массив (4,) совместим с (3,4), так как недостающее измерение (3) трактуется так, будто массив (4,) повторён 3 раза, без реального копирования в памяти."}, {"q": "Почему изменение формы массива через reshape обычно не требует копирования данных в памяти?", "options": ["reshape изменяет только метаданные (shape и strides) представления данных, оставляя сам буфер памяти неизменным, если это возможно при совместимой раскладке", "reshape всегда физически копирует и переставляет все элементы массива в памяти", "reshape невозможно применить без явного копирования при любых условиях", "Форма массива не связана со способом хранения данных в памяти"], "correct": 0, "explain": "Многие операции reshape в NumPy возвращают 'view' — новое представление того же блока памяти с другой интерпретацией размерностей, что эффективно, если раскладка данных позволяет это сделать."}, {"q": "В чём разница между 'view' (представлением) и 'copy' (копией) массива в NumPy, и почему это важно при изменении данных?", "options": ["View разделяет тот же буфер памяти с исходным массивом (изменение view меняет и оригинал), тогда как copy создаёт независимый дублирующий блок памяти", "View и copy всегда идентичны по поведению", "Изменение view никогда не влияет на исходный массив", "Copy всегда быстрее view, так как не требует дополнительной памяти"], "correct": 0, "explain": "Операции вроде срезов часто возвращают view (тот же буфер памяти), и изменение элементов через view также меняет исходный массив — это частый источник неожиданного поведения, если не учитывать это явно."}, {"q": "Почему векторизация операций (например, arr * 2 вместо цикла for) считается идиоматичным стилем работы с NumPy?", "options": ["Векторизованные операции выполняются в оптимизированном скомпилированном коде без накладных расходов интерпретации Python на каждой итерации, что значительно быстрее явных циклов", "Векторизация всегда даёт идентичную по скорости работу с явными циклами for", "Циклы for в Python всегда быстрее операций NumPy", "Векторизация невозможна для операций с более чем одним массивом"], "correct": 0, "explain": "NumPy реализует поэлементные операции на низком уровне (C/Fortran), избегая накладных расходов Python-байткода на каждой итерации явного цикла, что даёт существенный прирост производительности на больших массивах."}, {"q": "Зачем в matplotlib предпочтительно использовать объектно-ориентированный интерфейс (fig, ax = plt.subplots(); ax.plot(...)) вместо императивного pyplot-интерфейса (plt.plot(...)) в сложных программах?", "options": ["Объектно-ориентированный подход даёт явный контроль над конкретными объектами Figure и Axes, что упрощает создание сложных многопанельных графиков и избегает неоднозначности 'текущего' графика", "Императивный интерфейс pyplot всегда быстрее по производительности рендеринга", "Объектно-ориентированный интерфейс несовместим с несколькими subplot одновременно", "Разница между интерфейсами чисто косметическая и не имеет практического значения"], "correct": 0, "explain": "pyplot неявно отслеживает 'текущую' фигуру/оси, что может запутывать в сложных сценариях (несколько фигур, функции, повторное использование осей); явные объекты fig/ax дают предсказуемый и переиспользуемый код."}, {"q": "Почему выбор dtype (типа данных) массива NumPy (например, float32 вместо float64) может существенно повлиять на память и производительность при работе с большими данными?", "options": ["Каждый элемент float32 занимает вдвое меньше памяти, чем float64, что уменьшает объём используемой памяти и может ускорить операции за счёт лучшего использования кэша процессора, ценой меньшей точности", "Тип данных массива не влияет на объём занимаемой памяти", "float32 и float64 всегда занимают одинаковый объём памяти", "Выбор dtype влияет только на скорость печати массива, но не на вычисления"], "correct": 0, "explain": "float32 занимает 4 байта на элемент против 8 байт у float64; для больших массивов это удваивает эффективный объём данных, помещающихся в кэш, ускоряя операции, но снижая точность вычислений."}, {"q": "Почему при построении графика временного ряда с большим количеством точек (например, миллион) простое использование plt.plot() может стать неэффективным, и что обычно предпринимают?", "options": ["Рендеринг миллионов отдельных точек/сегментов линии требует много ресурсов и делает график визуально нечитаемым — обычно применяют прореживание (downsampling) или агрегацию данных перед отрисовкой", "matplotlib не имеет ограничений на количество отображаемых точек, и оптимизация никогда не требуется", "Единственное решение — полностью отказаться от визуализации таких данных", "plt.plot() автоматически и незаметно прореживает большие массивы данных"], "correct": 0, "explain": "Отрисовка избыточного количества точек снижает производительность и часто не добавляет визуальной информации (точки сливаются); практикуется прореживание, агрегация (например, скользящее среднее) или использование специализированных инструментов для больших данных."}, {"q": "Как работает индексация массива с помощью булевой маски (например, arr[arr > 5]) и почему это удобнее явного цикла с условием?", "options": ["Булева маска той же формы, что и массив, отбирает элементы, где значение маски True, выполняя это векторизованно и компактно без явного цикла по индексам", "Булевая индексация работает только для одномерных массивов", "Такая индексация требует предварительной сортировки массива", "Булевая маска всегда должна быть меньшего размера, чем исходный массив"], "correct": 0, "explain": "Булевая индексация создаёт маску той же формы (True/False для каждого элемента) и позволяет одним выражением отобрать нужные элементы без явного написания цикла с условным оператором."}, {"q": "Почему при работе с осями (axis) в NumPy-функциях (например, numpy.sum(arr, axis=0)) важно понимать, какая ось 'схлопывается' в результате операции?", "options": ["Указанная ось определяет направление агрегации: axis=0 обычно агрегирует по строкам (сворачивая их в одно значение на столбец), а неправильный выбор оси даёт результат с неожиданной формой и смыслом", "Параметр axis не влияет на результат операции суммирования", "axis=0 и axis=1 всегда дают идентичный результат для любых данных", "Указание оси имеет значение только для трёхмерных массивов и выше"], "correct": 0, "explain": "Ось, указанная в axis, — это измерение, вдоль которого происходит агрегация (и которое исчезает в результате); частая ошибка новичков — перепутать axis=0 (по столбцам, агрегируя строки) и axis=1 (по строкам, агрегируя столбцы)."}, {"q": "Как иерархия объектов Figure → Axes → (линии, подписи, легенда) в matplotlib влияет на подход к построению сложных многопанельных визуализаций?", "options": ["Каждый Axes независимо настраивается (свои оси, заголовок, легенда), а Figure управляет их общим расположением, что позволяет системно строить сложные компоновки из множества независимо настраиваемых графиков", "Все элементы визуализации всегда настраиваются глобально на уровне Figure без возможности независимой настройки отдельных Axes", "Axes и Figure — взаимозаменяемые понятия без иерархии между ними", "Легенда и подписи не относятся к объекту Axes"], "correct": 0, "explain": "Иерархическая модель matplotlib (Figure содержит один или несколько Axes, каждый со своими элементами) позволяет гибко компоновать сложные dashboard-подобные визуализации, настраивая каждую панель независимо."}, {"q": "Как модель хранения данных NumPy в виде непрерывного блока памяти с 'strides' (шагами) объясняет, почему транспонирование матрицы (arr.T) выполняется практически мгновенно, независимо от размера?", "options": ["Транспонирование обычно не копирует данные, а лишь меняет метаданные strides (порядок обхода памяти), поэтому эта операция занимает постоянное время независимо от размера массива", "Транспонирование всегда требует полного копирования и физической перестановки всех элементов в памяти", "Strides не имеют отношения к операции транспонирования", "Размер массива не влияет на время выполнения транспонирования по другим причинам"], "correct": 0, "explain": "NumPy хранит данные линейно в памяти и использует strides для интерпретации многомерной структуры; транспонирование лишь переставляет strides местами, не трогая сами данные — отсюда мгновенная работа независимо от размера."}, {"q": "Почему архитектурно матрично-векторные операции NumPy (например, через BLAS/LAPACK под капотом) масштабируются лучше на больших данных, чем наивная реализация тех же операций на чистом Python?", "options": ["NumPy делегирует тяжёлые линейно-алгебраические вычисления сильно оптимизированным, часто многопоточным низкоуровневым библиотекам (BLAS/LAPACK), написанным на C/Fortran и использующим аппаратные оптимизации", "NumPy никогда не использует внешние библиотеки для вычислений", "BLAS/LAPACK используются только для построения графиков, а не вычислений", "Наивная реализация на чистом Python всегда работает быстрее благодаря простоте кода"], "correct": 0, "explain": "Библиотеки вроде BLAS/LAPACK десятилетиями оптимизировались для эффективного использования кэша процессора, SIMD-инструкций и многопоточности — NumPy использует их вместо реализации линейной алгебры 'с нуля'."}, {"q": "Как решение matplotlib отделять 'создание данных для рисования' (например, plt.plot) от 'фактического рендеринга' (например, plt.show() или сохранение в файл) влияет на гибкость построения графиков в скриптах и ноутбуках?", "options": ["Отложенный рендеринг позволяет накапливать множество элементов на Axes/Figure перед финальной отрисовкой или сохранением, давая гибкость в построении сложных составных визуализаций пошагово", "matplotlib всегда рендерит график немедленно при каждом вызове plt.plot(), без возможности отложенного накопления", "Разделение создания и рендеринга не имеет практического значения", "plt.show() обязателен после каждого отдельного вызова plt.plot()"], "correct": 0, "explain": "matplotlib накапливает состояние Axes/Figure по мере вызовов (plot, scatter, title и т.д.), и только финальный вызов (show/savefig) вызывает фактическую отрисовку — это позволяет пошагово строить сложную визуализацию, комбинируя данные из разных источников."}, {"q": "Почему выбор способа хранения многомерного массива в памяти (row-major/C-order vs column-major/Fortran-order) может повлиять на производительность определённых операций (например, обхода по строкам vs по столбцам)?", "options": ["Обход элементов в порядке, соответствующем фактической раскладке памяти (например, по строкам при C-order), обращается к памяти последовательно, что лучше использует кэш процессора, чем обход 'поперёк' раскладки", "Порядок хранения в памяти (C-order/Fortran-order) не влияет на производительность операций", "NumPy поддерживает только один порядок хранения без возможности выбора", "Последовательный и непоследовательный доступ к памяти всегда одинаково быстры"], "correct": 0, "explain": "Современные процессоры эффективнее работают с последовательным доступом к памяти (лучшее использование кэш-линий); обход массива в порядке, не совпадающем с фактической раскладкой памяти, может привести к значительным замедлениям из-за частых промахов кэша."}, {"q": "Как понимание того, что NumPy-операции возвращают новые массивы (out-of-place) по умолчанию, а не изменяют исходный массив на месте (in-place), влияет на проектирование эффективного по памяти кода для больших датасетов?", "options": ["Понимание разницы позволяет сознательно использовать in-place операции (например, arr += 1 вместо arr = arr + 1) там, где нужно избежать лишнего выделения памяти под промежуточные копии больших массивов", "Все операции NumPy всегда изменяют массив на месте без создания копий", "Выбор между in-place и out-of-place операциями не влияет на потребление памяти", "In-place операции всегда недоступны в NumPy"], "correct": 0, "explain": "Операции вроде arr = arr + 1 создают новый массив, тогда как arr += 1 модифицирует существующий буфер на месте — для больших массивов сознательный выбор in-place операций может существенно сократить пиковое потребление памяти."}, {"q": "Почему при проектировании функции обработки данных полезно проектировать её так, чтобы она одинаково хорошо работала как с одним примером, так и с батчем примеров (используя broadcasting и векторизацию), а не писать отдельную логику для каждого случая?", "options": ["Векторизованный код, спроектированный с учётом broadcasting, естественно обобщается на батчи без дублирования логики, тогда как раздельная реализация для одного примера и батча увеличивает сложность поддержки и риск рассинхронизации логики", "Обработка одного примера и батча принципиально требует полностью разных алгоритмов без общих частей", "Broadcasting неприменимо к задачам batch-обработки данных", "Векторизация работает только для скалярных значений, а не батчей"], "correct": 0, "explain": "Продуманное использование broadcasting и осей (axis) позволяет писать единую векторизованную функцию, одинаково корректно работающую как для одного объекта, так и для батча — распространённый архитектурный паттерн в научных вычислениях и ML."}, {"q": "Как выбор между хранением данных в виде 'длинного' (long) формата (много строк, мало столбцов) и 'широкого' (wide) формата влияет на удобство последующей векторизованной обработки в NumPy/pandas и визуализации в matplotlib?", "options": ["Выбор формата данных определяет, насколько естественно данные ложатся на векторизованные операции и построение графиков — например, широкий формат может напрямую соответствовать нескольким сериям для отдельных линий на графике, тогда как длинный требует группировки", "Формат хранения данных (long vs wide) не влияет на удобство последующей обработки и визуализации", "Матрицы NumPy принципиально несовместимы с длинным форматом данных", "matplotlib поддерживает построение графиков только из широкого формата данных"], "correct": 0, "explain": "Выбор структуры данных (длинная vs широкая таблица) — архитектурное решение, влияющее на то, насколько прямолинейно данные транслируются в векторизованные вычисления и в конкретные вызовы построения графиков (например, одна линия на серию в широком формате)."}, {"q": "Почему совместное проектирование пайплайна 'вычисление в NumPy → визуализация в matplotlib' часто предполагает предварительную агрегацию/сведение данных перед передачей в функции построения графиков, а не прямую передачу сырых больших массивов?", "options": ["Функции построения графиков рассчитаны на разумное число точек/серий для читаемой визуализации, поэтому этап агрегации (в NumPy) логически отделяется от этапа отображения (в matplotlib), обеспечивая как производительность, так и ясность графика", "matplotlib всегда лучше работает с максимально большими, неагрегированными массивами данных", "NumPy не предназначен для предварительной агрегации данных перед визуализацией", "Агрегация данных перед визуализацией никогда не влияет на итоговый результат"], "correct": 0, "explain": "Разделение ответс   const STORAGE_KEY = "learntest_" + TEST_ID;

  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {

  });

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }

    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
