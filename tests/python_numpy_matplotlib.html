<style>
  :root {

  html, body {

    padding: 14px 16px; font-size: 1rem; cursor: pointer;

  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {

  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }

  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }

  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;

  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;

  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;

  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }

    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>

(function () {
  const TEST_ID = "python_numpy_matplotlib";
  const QUESTIONS = [{"q": "Что такое NumPy array (ndarray)?", "options": ["Обычный список Python без ограничений на тип элементов", "Функция для построения графиков и диаграмм данных", "Многомерный массив одного типа для числовых расчётов", "Файл конфигурации библиотеки с настройками импорта"], "correct": 2, "explain": "ndarray — базовая структура NumPy: однородный (один тип данных) многомерный массив, хранящийся компактно в памяти для быстрых векторизованных вычислений.", "usage": {"code": true, "without": "data = [1, 2, 3, 4]\n# список: элементы — разнотипные объекты с указателями, циклы по одному", "with": "import numpy as np\narr = np.array([1, 2, 3, 4])  # однородный ndarray в непрерывной памяти", "benefit": "компактное хранение и векторные операции"}}, {"q": "Что означает атрибут shape массива NumPy?", "options": ["Число измерений массива, всегда равное единице", "Кортеж с размером массива по каждой оси", "Тип данных элементов, хранящихся в массиве", "Сумма всех элементов массива по всем осям"], "correct": 1, "explain": "shape — кортеж чисел, например (3,4), показывающий размер массива по каждому измерению (3 строки, 4 столбца).", "usage": {"code": true, "without": "rows = len(matrix)\ncols = len(matrix[0])  # размеры считаем вручную", "with": "rows, cols = arr.shape  # (3, 4) — размер по каждой оси сразу", "benefit": "размерности одним атрибутом"}}, {"q": "Что делает функция numpy.zeros((3,3))?", "options": ["Удаляет из памяти массив формы 3×3", "Создаёт список из трёх нулей", "Создаёт массив 3×3, полный нулей", "Создаёт массив 3×3, полный единиц"], "correct": 2, "explain": "numpy.zeros создаёт массив заданной формы, заполненный нулями — часто используется для инициализации.", "usage": {"code": true, "without": "m = [[0]*3 for _ in range(3)]  # вложенные списки нулей", "with": "import numpy as np\nm = np.zeros((3, 3))  # готовый массив 3x3 из нулей", "benefit": "инициализация одной строкой"}}, {"q": "Что такое broadcasting (транслирование) в NumPy?", "options": ["Отправка данных по сети между узлами кластера", "Функция для сортировки массива по возрастанию", "Поэлементные операции над массивами разной формы", "Способ сохранения массива в бинарный файл"], "correct": 2, "explain": "Broadcasting позволяет NumPy автоматически 'растягивать' массивы меньшей формы для соответствия большей форме при поэлементных операциях, без создания лишних копий в памяти.", "usage": {"code": true, "without": "res = [[a[i][j] + b[j] for j in range(4)] for i in range(3)]", "with": "res = a + b  # (3,4) + (4,) — broadcasting сам растянет b", "benefit": "без вложенных циклов по формам"}}, {"q": "Что возвращает функция matplotlib.pyplot.plot(x, y)?", "options": ["Строит линейный график по точкам (x, y)", "Вычисляет поэлементную сумму массивов x и y", "Создаёт таблицу в реляционной базе данных", "Сохраняет пары (x, y) в CSV-файл на диск"], "correct": 0, "explain": "plt.plot(x, y) строит линейный график, соединяя точки с координатами из массивов x и y.", "usage": {"code": true, "without": "# рисуем линию вручную по точкам — своего движка нет", "with": "import matplotlib.pyplot as plt\nplt.plot(x, y)  # линейный график по точкам", "benefit": "график одной командой"}}, {"q": "Как называется базовый объект в matplotlib, представляющий всё окно/холст рисунка?", "options": ["Figure — весь холст всего рисунка", "Canvas — холст только в веб-бэкенде", "Plot — команда рисования линий", "Axes — отдельная область внутри"], "correct": 0, "explain": "Figure — верхнеуровневый контейнер, который может содержать один или несколько Axes (отдельных графиков/подграфиков).", "usage": {"code": true, "without": "# нет единого холста — каждый элемент рисуем отдельно", "with": "fig = plt.figure()  # верхнеуровневый контейнер всего рисунка", "benefit": "единый контейнер для всех осей"}}, {"q": "Что представляет собой объект Axes в matplotlib?", "options": ["Единственный доступный шрифт в библиотеке", "Файл растрового формата PNG с картинкой", "Область графика с осями внутри Figure", "Полный синоним верхнего объекта Figure"], "correct": 2, "explain": "Axes — это конкретная область построения графика (с осями X/Y, линиями, подписями), находящаяся внутри Figure; в одной Figure может быть несколько Axes (subplot).", "usage": {"code": true, "without": "# область графика с осями/подписями пришлось бы собирать руками", "with": "fig, ax = plt.subplots()\nax.plot(x, y)  # ax — отдельная область графика", "benefit": "явный объект области построения"}}, {"q": "Как получить срез (slice) элементов массива arr с индекса 2 по индекс 5 (не включая 5)?", "options": ["arr[2,5]", "arr[2:5]", "arr{2:5}", "arr(2,5)"], "correct": 1, "explain": "Синтаксис среза в Python/NumPy — arr[start:stop], где stop не включается: arr[2:5] вернёт элементы с индексами 2,3,4.", "usage": {"code": true, "without": "sub = [arr[i] for i in range(2, 5)]  # цикл по индексам", "with": "sub = arr[2:5]  # элементы с индексами 2,3,4", "benefit": "срез вместо цикла"}}, {"q": "Что делает функция numpy.mean(arr)?", "options": ["Сортирует массив по возрастанию значений", "Находит максимальный элемент массива", "Вычисляет среднее арифметическое элементов", "Меняет форму массива на новую заданную"], "correct": 2, "explain": "numpy.mean вычисляет среднее арифметическое значений массива (по умолчанию по всем элементам, либо по указанной оси).", "usage": {"code": true, "without": "m = sum(arr) / len(arr)  # среднее вручную", "with": "m = np.mean(arr)  # среднее по всем элементам", "benefit": "агрегат встроенной функцией"}}, {"q": "Какой тип объекта возвращает функция plt.subplots(2, 2)?", "options": ["Одиночный объект Axes (без Figure)", "Плоский список из четырёх чисел", "Только Figure, без объектов Axes", "Кортеж (Figure, массив из 4 Axes)"], "correct": 3, "explain": "plt.subplots(2,2) создаёт Figure и сетку 2×2 подграфиков, возвращая кортеж (fig, axes), где axes — массив из 4 объектов Axes.", "usage": {"code": true, "without": "# создаём фигуру и 4 области по одной, вручную раскладывая ных в виде 'длинного' (long) формата (много строк, мало столбцов) и 'широкого' (wide) формата влияет на удобство последующей векторизованной обработки в NumPy/pandas и визуализации в matplotlib?", "options": ["Формат long или wide не влияет на удобство обработки и визуализации", "Матрицы NumPy в принципе несовместимы с длинным форматом данных", "Формат данных задаёт, как легко они ложатся на векторные операции", "matplotlib строит графики только из данных широкого формата wide"], "correct": 2, "explain": "Выбор структуры данных (длинная vs широкая таблица) — архитектурное решение, влияющее на то, насколько прямолинейно данные транслируются в векторизованные вычисления и в конкретные вызовы построения графиков (например, одна линия на серию в широком формате).", "usage": {"code": false, "without": "long: строки (дата, серия, значение) — для нескольких линий нужна группировка", "with": "wide: столбец на серию — сразу ложится на несколько линий графика", "benefit": "формат под задачу упрощает обработку"}}, {"q": "Почему совместное проектирование пайплайна 'вычисление в NumPy → визуализация в matplotlib' часто предполагает предварительную агрегацию/сведение данных перед передачей в функции построения графиков, а не прямую передачу сырых больших массивов?", "options": ["Агрегация перед визуализацией никогда не влияет на итоговый результат", "Агрегацию данных в NumPy отделяют от отрисовки ради скорости и ясности", "matplotlib всегда работает лучше с огромными неагрегированными массивами", "NumPy не предназначен для агрегации данных перед их визуализацией"], "correct": 1, "explain": "Разделение ответственности (NumPy — вычисление и агрегация, matplotlib — отображение) — распространённый архитектурный паттерн: агрегированные, компактные данные и быстрее отрисовываются, и дают более читаемый график.", "usage": {"code": true, "without": "plt.plot(x, raw_million)  # сырые данные прямо в график", "with": "agg = raw.reshape(-1, 1000).mean(axis=1)\nplt.plot(agg)  # агрегируем, по что операция поэлементного умножения двух больших NumPy-массивов разных dtype (float32 и float64) работает медленнее ожидаемого. Какая вероятная причина?", "options": ["Проблема решается только полной заменой NumPy на другую библиотеку", "Тип данных массивов не влияет на скорость поэлементных операций", "NumPy приводит массивы к float64, и данных для счёта становится больше", "Разные dtype массивов физически несовместимы для арифметики совсем"], "correct": 2, "explain": "При операциях между массивами разных типов NumPy выполняет неявное приведение типов (type promotion) к более широкому типу, что увеличивает используемую память и может снизить производительность по сравнению с работой в едином типе данных.", "usage": {"code": true, "without": "c = a_f32 * b_f64  # неявное приведение к float64, больше данных", "with": "c = a_f32 * b_f64.astype(np.float32)  # единый тип", "benefit": "без лишнего расширения типа и памяти"}}, {"q": "Компания визуализирует большой набор экспериментальных данных с помощью matplotlib и получает нечитаемый график с наложенными друг на друга элементами и нечитаемыми подписями. Какой подход улучшения визуализации наиболее уместен в первую очередь?", "options": ["Проблема решается только увеличением размера итогового файла картинки", "Единственный выход — случайно выбросить часть данных без анализа", "Сменить тип графика, агрегировать данные, задать размер и разметку осей", "Нечитаемость не связана с matplotlib, дело только в самих данных"], "correct": 2, "explain": "Читаемость визуализации определяется продуманным выбором типа графика, агрегации, компоновки (subplot) и разметки, а не просто повышением разрешения — грамотный дизайн визуализации требует пересмотра структуры представления данных.", "usage": {"code": false, "without": "просто поднять dpi/разрешение — элементы всё равно наложены", "with": "сменить тип графика, агрегировать данные, задать размер фигуры и разметку осей", "benefit": "читаемость через дизайн, а не dpi"}}, {"q": "При работе с двумя массивами разной формы (100, 1) и (1, 50) программист ожидал ошибку, но операция сложения выполнилась успешно, вернув массив формы (100, 50). Что произошло?", "options": ["Broadcasting растянул обе единичные оси до (100, 50) — так и задумано", "Результат формы (100, 50) в этом случае посчитан совершенно неверно", "Массивы разной формы всегда обрезаются до меньшей общей формы", "Это баг библиотеки NumPy, который надо немедленно чинить вручную"], "correct": 0, "explain": "Правила broadcasting позволяют комбинировать 'вектор-столбец' (100,1) и 'вектор-строку' (1,50), давая внешнее произведение по форме (100,50) — мощная, но иногда неожиданная особенность NumPy, если не знать правил broadcasting.", "usage": {"code": true, "without": "# ждём ошибку от разных форм и обрабатываем вручную", "with": "a = np.zeros((100, 1))\nb = np.zeros((1, 50))\nc = a + b  # broadcasting -> (100, 50)", "benefit": "внешнее произведение по правилам форм"}}, {"q": "Дата-сайентист хочет ускорить обработку очень большого CSV-файла, который не помещается целиком в память при загрузке в NumPy-массив. Какой подход наиболее практичен?", "options": ["Единственный выход — вручную удалить часть данных, уменьшив файл", "Читать данные частями (chunksize в pandas), не грузя весь файл сразу", "Проблема решается только увеличением SWAP-файла операционной системы", "NumPy сам обрабатывает файлы любого размера (np.loadtxt) без ограничений памяти"], "correct": 1, "explain": "Для данных, не помещающихся в оперативную память, стандартный подход — потоковая (chunked) обработка, читая и обрабатывая данные частями, а не загружая весь набор в один NumPy-массив целиком.", "usage": {"code": true, "without": "data = np.loadtxt('huge.csv')  # весь файл в память — падает", "with": "for chunk in pd.read_csv('huge.csv', chunksize=100000):\n    process(chunk)", "benefit": "обработка частями без переполнения памяти"}}, {"q": "Специалист использует matplotlib для построения графика с логарифмической и линейной осями одновременно на одном рисунке (например, для сравнения величин разных порядков). Какой подход наиболее уместен?", "options": ["Единственный выход — логарифмировать данные вручную без встроенных средств", "Логарифмическая и линейная оси никогда не уживаются на одном графике", "matplotlib вообще не поддерживает логарифмические оси (log scale) никак", "Взять subplots или twinx и задать set_yscale('log') для нужной оси"], "correct": 3, "explain": "matplotlib поддерживает set_yscale('log') для конкретной оси, а twinx()/twiny() позволяют иметь вторую независимую ось с другим масштабом на том же графике — стандартный инструмент для данных разных порядков величины.", "usage": {"code": true, "without": "y2 = [math.log10(v) for v in y]\nplt.plot(x, y2)  # логарифмируем руками", "with": "ax.set_yscale('log')  # или twinx() для второй оси", "benefit": "встроенный лог-масштаб и вторая ось"}}, {"q": "При тестировании кода обнаружено, что функция, ожидающая NumPy-массив, получает обычный список Python и выдаёт неожиданную ошибку при попытке поэлементного умножения на число. Как это объясняется различием в поведении списков и массивов?", "options": ["Списки Python и массивы NumPy при умножении на число ведут себя одинаково", "list * n повторяет список, а массив умножает поэлементно — разный *", "Ошибка возникает лишь из-за версии Python, а не из-за типа данных", "Массивы NumPy никогда не поддерживают умножение на скаляр вообще"], "correct": 1, "explain": "list * 3 в Python повторяет список 3 раза (конкатенация), тогда как np.array * 3 выполняет поэлементное умножение каждого элемента на 3 — разное поведение одного и того же оператора для разных типов данных, частый источник путаницы у новичков.", "usage": {"code": true, "without": "data = [1, 2, 3]\ndata * 3  # -> [1,2,3,1,2,3] (повтор списка)", "with": "np.array([1, 2, 3]) * 3  # -> [3, 6, 9] поэлементно", "benefit": "скалярное умножение вместо конкатенации"}}, {"q": "Дан массив arr = numpy.array([1,2,3,4,5]). Чему равен arr[1:4]?", "options": ["[2,3,4]", "[1,2,3,4]", "[2,3,4,5]", "[1,2,3]"], "correct": 0, "explain": "Срез [1:4] включает индексы 1,2,3 (не включая 4): элементы 2,3,4.", "usage": {"code": true, "without": "sub = [arr[i] for i in range(1, 4)]  # цикл по индексам", "with": "sub = arr[1:4]  # -> [2, 3, 4]", "benefit": "срез вместо ручного перебора"}}, {"q": "Дан массив shape (3, 4). Сколько всего элементов в этом массиве?", "options": ["34", "12", "7", "43"], "correct": 1, "explain": "Общее число элементов = произведение размеров по всем осям: 3×4=12.", "usage": {"code": true, "without": "n = 0\nfor row in matrix:\n    n += len(row)  # считаем элементы вручную", "with": "n = arr.size  # или произведение: 3*4 = 12", "benefit": "общее число элементов сразу"}}, {"q": "Массив arr = numpy.array([2,4,6,8,10]). Чему равен numpy.mean(arr)?", "options": ["6.5", "5", "6", "30"], "correct": 2, "explain": "Среднее = (2+4+6+8+10)/5 = 30/5 = 6.", "usage": {"code": true, "without": "m = (2+4+6+8+10) / 5  # = 6.0 вручную", "with": "m = np.mean(np.array([2,4,6,8,10]))  # 6.0", "benefit": "среднее встроенной функцией"}}, {"q": "Массив A формы (2,3) складывается с массивом B формы (3,) через broadcasting. Какая будет форма результата?", "options": ["(2,)", "(2,3)", "Ошибка, сложение невозможно", "(3,3)"], "correct": 1, "explain": "Массив (3,) 'растягивается' до (2,3) построчно, результат сложения имеет форму (2,3).", "usage": {"code": true, "without": "res = [[a[i][j] + b[j] for j in range(3)] for i in range(2)]", "with": "res = A + B  # (2,3) + (3,) -> (2,3)", "benefit": "broadcasting даёт форму (2,3)"}}, {"q": "Что выведет print(numpy.array([1,2,3]) * 2)?", "options": ["[1,2,3,1,2,3]", "Ошибка", "[1,2,3]", "[2,4,6]"], "correct": 3, "explain": "В отличие от списка Python, умножение NumPy-массива на число выполняется поэлементно: [1,2,3]*2 = [2,4,6].", "usage": {"code": true, "without": "print([v*2 for v in [1,2,3]])  # цикл для [2,4,6]", "with": "print(np.array([1,2,3]) * 2)  # [2 4 6]", "benefit": "поэлементное умножение без цикла"}}, {"q": "Дан двумерный массив arr формы (4,5). Что вернёт numpy.sum(arr, axis=0)?", "options": ["Одно число — общая сумма всех элементов массива", "Массив формы (4,), сумма вдоль столбцов массива", "Массив формы (5,), сумма по каждому столбцу", "Массив формы (4,5), исходный массив без изменений"], "correct": 2, "explain": "axis=0 агрегирует (суммирует) вдоль первой оси (строк), в результате получая по одному значению на каждый из 5 столбцов — массив формы (5,).", "usage": {"code": true, "without": "cols = [sum(arr[i][j] for i in range(4)) for j in range(5)]", "with": "np.sum(arr, axis=0)  # массив формы (5,) — сумма по столбцам", "benefit": "сумма по оси одной командой"}}, {"q": "Функция plt.subplots(2,3) создаёт сетку подграфиков. Сколько всего отдельных Axes будет создано?", "options": ["3", "6", "2", "5"], "correct": 1, "explain": "Сетка 2 строки × 3 столбца = 2×3 = 6 отдельных Axes.", "usage": {"code": true, "without": "# создаём 6 областей по одной и раскладываем их вручную", "with": "fig, axes = plt.subplots(2, 3)  # 2*3 = 6 Axes", "benefit": "сетка 6 подграфиков за вызов"}}, {"q": "Массив содержит значения [10, 20, 30, 40, 50]. С помощью булевой маски arr[arr > 25] какие элементы будут выбраны?", "options": ["[10,20,30]", "Все элементы массива", "[10,20]", "[30,40,50]"], "correct": 3, "explain": "Маска arr>25 выбирает элементы, большие 25: 30, 40, 50.", "usage": {"code": true, "without": "res = [x for x in arr if x > 25]  # [30,40,50] через цикл", "with": "res = arr[arr > 25]  # [30 40 50] маской", "benefit": "фильтр по условию векторно"}}, {"q": "Массив A формы (100,) и массив B формы (100,) складываются поэлементно (A+B). Сколько операций сложения потребуется выполнить (по числу элементов)?", "options": ["10000", "200", "100", "10"], "correct": 2, "explain": "Поэлементное сложение двух массивов из 100 элементов требует ровно 100 операций сложения (по одной на каждую пару элементов).", "usage": {"code": true, "without": "res = []\nfor i in range(100):\n    res.append(A[i] + B[i])  # 100 итераций в Python", "with": "res = A + B  # 100 сложений в C-коде", "benefit": "те же 100 операций, но векторно"}}, {"q": "Дан массив изображений формы (batch=16, height=32, width=32, channels=3). Сколько всего числовых значений в этом массиве?", "options": ["16×32×32×3 = 49152", "16×32×32 = 16384", "16×32×32×2 = 32768", "16×32×32×4 = 65536"], "correct": 0, "explain": "Общий объём = 16 × 32 × 32 × 3 = 49152 значений.", "usage": {"code": true, "without": "n = 0\nfor b in range(16):\n  for h in range(32):\n    for w in range(32):\n      n += 3  # считаем перебором", "with": "n = img.size  # 16*32*32*3 = 49152", "benefit": "объём массива одним атрибутом"}}, {"q": "Массив A формы (5,1) умножается на массив B формы (1,4) через broadcasting. Какая будет форма результата?", "options": ["(1,4)", "(5,1)", "(5,4)", "(4,5)"], "correct": 2, "explain": "Broadcasting растягивает обе оси размером 1 навстречу друг другу: результат имеет форму (5,4) — внешнее произведение.", "usage": {"code": true, "without": "res = [[A[i][0] * B[0][j] for j in range(4)] for i in range(5)]", "with": "res = A * B  # (5,1) * (1,4) -> (5,4)", "benefit": "внешнее произведение через broadcasting"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
