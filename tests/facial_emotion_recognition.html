<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Распознавание эмоций человека по лицу</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/facial_emotion_recognition.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Распознавание эмоций человека по лицу</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "facial_emotion_recognition";
  const QUESTIONS = [{"q": "Что такое базовые (универсальные) эмоции согласно теории Пола Экмана?", "options": ["Только радость и грусть", "Радость, грусть, гнев, страх, удивление, отвращение (иногда презрение)", "Эмоции, возникающие исключительно у взрослых людей", "Любые эмоции, названные в любом языке мира"], "correct": 1, "explain": "Экман выделил набор базовых эмоций, которые, по его исследованиям, распознаются по мимике представителями разных культур схожим образом."}, {"q": "Что такое микровыражение лица (micro-expression)?", "options": ["Полностью осознанная и контролируемая гримаса", "Выражение, которое видно только на фотографии, но не в реальном времени", "Выражение, характерное только для младенцев", "Очень краткое (доли секунды) непроизвольное выражение лица, часто отражающее скрываемую истинную эмоцию"], "correct": 3, "explain": "Микровыражения — быстрые (обычно 1/25–1/5 секунды) непроизвольные сокращения лицевых мышц, которые сложно подделать или подавить полностью."}, {"q": "Что такое система кодирования лицевых движений FACS (Facial Action Coding System)?", "options": ["Метод измерения температуры тела по лицу", "Система, описывающая мимику через комбинации отдельных 'единиц действия' (action units) лицевых мышц", "Алгоритм сжатия видео с лицами", "Система классификации языков жестов"], "correct": 1, "explain": "FACS (Экман и Фризен) разбивает мимику на отдельные, анатомически обоснованные 'единицы действия' (AU), комбинации которых соответствуют определённым эмоциональным выражениям."}, {"q": "Что такое 'единица действия' (Action Unit, AU) в системе FACS?", "options": ["Единица измерения расстояния между глазами", "Название конкретной базовой эмоции", "Минимальное различимое движение одной лицевой мышцы или группы мышц", "Полное эмоциональное выражение лица целиком"], "correct": 2, "explain": "AU — атомарная единица FACS, соответствующая сокращению конкретной мышцы (например, AU12 — поднятие уголков губ), комбинации AU формируют распознаваемые эмоциональные выражения."}, {"q": "Какую роль играют глаза и область вокруг них при распознавании искренности улыбки (например, 'улыбка Дюшена')?", "options": ["Область глаз никогда не связана с искренностью выражения лица", "Искренность улыбки определяется исключительно шириной рта", "Искренняя улыбка обычно сопровождается сокращением мышц вокруг глаз (появлением 'гусиных лапок'), тогда как вежливая/наигранная улыбка часто затрагивает только рот", "Улыбка Дюшена — это улыбка, которая никогда не бывает искренней"], "correct": 2, "explain": "'Улыбка Дюшена' названа по имени французского врача, впервые описавшего, что подлинная радость активирует круговую мышцу глаза (orbicularis oculi), которую трудно контролировать сознательно, в отличие от одной лишь улыбки ртом."}, {"q": "Что затрудняет распознавание эмоций исключительно по статичному изображению лица по сравнению с видео?", "options": ["Распознавание эмоций одинаково эффективно и по фото, и по видео без каких-либо различий", "Видео никогда не содержит дополнительной информации по сравнению с фото", "Статичные изображения всегда дают более точное распознавание эмоций, чем видео", "Статичное изображение не передаёт динамику (скорость появления и изменения выражения), которая часто важна для правильной интерпретации эмоции"], "correct": 3, "explain": "Динамика выражения (скорость появления, длительность, последовательность движений) несёт дополнительную информацию о подлинности и типе эмоции, которую невозможно получить из единственного статичного кадра."}, {"q": "Что такое 'valence' (валентность) и 'arousal' (возбуждение) в размерностной (dimensional) модели эмоций?", "options": ["Возбуждение относится исключительно к физическим упражнениям", "Валентность измеряет только продолжительность эмоции", "Валентность и возбуждение — синонимы одного и того же понятия", "Валентность — положительность/отрицательность эмоции, возбуждение — интенсивность физиологической активации"], "correct": 3, "explain": "Размерностные модели эмоций (например, круговая модель Рассела) описывают эмоцию через две независимые оси: валентность (приятно/неприятно) и возбуждение (спокойствие/высокая активация)."}, {"q": "Какова роль контекста (ситуации, культуры, предыдущих взаимодействий) в интерпретации выражения лица человеком-наблюдателем?", "options": ["Контекст никогда не влияет на интерпретацию мимики", "Контекст важен только для вербальной коммуникации, но не для мимики", "Контекст может существенно менять интерпретацию одного и того же выражения лица, так как эмоциональные сигналы редко считываются полностью изолированно от ситуации", "Выражение лица интерпретируется абсолютно одинаково независимо от ситуации и культуры"], "correct": 2, "explain": "Многочисленные исследования показывают, что одно и то же выражение лица может интерпретироваться по-разному в зависимости от контекста ситуации, языка тела и культурных норм наблюдателя."}, {"q": "Что такое алекситимия применительно к распознаванию эмоций?", "options": ["Синдром, вызывающий постоянную улыбку", "Заболевание глаз, мешающее видеть выражения лиц", "Способность идеально распознавать любые эмоции без ошибок", "Затруднённость в осознании и словесном описании собственных эмоций (что может затруднять и распознавание чужих эмоций)"], "correct": 3, "explain": "Алекситимия — трудности в идентификации и вербализации собственных эмоциональных состояний, что в некоторых исследованиях связывают также с трудностями в распознавании эмоций других людей."}, {"q": "Что такое 'эффект собственной расы' (own-race bias/effect) в распознавании лиц и эмоций?", "options": ["Полное отсутствие различий в распознавании между разными группами людей", "Способность распознавать эмоции только у людей той же профессии", "Метод, применяемый исключительно в судебной экспертизе", "Явление, при котором люди в среднем лучше распознают лица и выражения представителей своей расы/этнической группы, чем других"], "correct": 3, "explain": "Own-race effect — задокументированный в психологии эффект, при котором из-за большего опыта взаимодействия с представителями своей группы люди в среднем точнее распознают лица и мимику 'своей' расы/этничности, что имеет значение и для оценки предвзятости автоматических систем."}, {"q": "Почему автоматическое распознавание эмоций по лицу (компьютерным зрением) обычно использует комбинацию признаков лица (например, положение ключевых точек — landmarks), а не просто сырые пиксели изображения?", "options": ["Ключевые точки лица никогда не используются в системах распознавания эмоций", "Ключевые точки лица (глаза, брови, рот) явно кодируют геометрические изменения, соответствующие мимике, упрощая задачу по сравнению с работой напрямую с неструктурированными пикселями", "Распознавание эмоций невозможно без использования видео с высоким разрешением", "Сырые пиксели всегда дают более точный результат, чем структурированные признаки"], "correct": 1, "explain": "Landmarks (ключевые точки контуров глаз, бровей, рта) дают компактное, интерпретируемое представление геометрии лица, изменение которой напрямую связано с активацией конкретных лицевых мышц (AU) и, соответственно, эмоций."}, {"q": "Почему система FACS считается более объективным инструментом анализа мимики, чем прямая классификация 'на глаз' по названию эмоции (например, 'это гнев')?", "options": ["FACS не связана с наблюдаемыми физическими движениями лица", "Прямая классификация эмоций по названию всегда точнее анатомического описания движений", "FACS описывает наблюдаемые физические движения мышц независимо от интерпретации их эмоционального значения, что позволяет разным исследователям кодировать одно и то же выражение согласованно, прежде чем делать вывод об эмоции", "FACS всегда даёт другой результат по сравнению с классификацией эмоций 'на глаз', поэтому объективнее"], "correct": 2, "explain": "Разделение объективного описания движений (FACS-кодирование) и последующей психологической интерпретации (какая это эмоция) снижает субъективность и повышает воспроизводимость анализа между разными наблюдателями."}, {"q": "Почему микровыражения считаются более надёжным индикатором скрываемой эмоции, чем макровыражения (обычные, продолжительные выражения лица)?", "options": ["Макровыражения никогда не могут быть намеренно фальсифицированы", "Микровыражения слишком кратковременны, чтобы их можно было сознательно контролировать или подавить, в отличие от макровыражений, которые человек может намеренно изобразить или скрыть", "Микровыражения полностью подконтрольны сознательному контролю человека", "Микровыражения всегда длятся дольше макровыражений"], "correct": 1, "explain": "Из-за крайне малой длительности (доли секунды) микровыражения ускользают от сознательного подавления, что делает их потенциальным индикатором подлинной, часто скрываемой эмоциональной реакции."}, {"q": "Почему универсальность базовых эмоций Экмана (кросс-культурная схожесть распознавания) остаётся предметом научных дискуссий, несмотря на первоначальные результаты исследований?", "options": ["Все современные исследователи полностью согласны с оригинальной теорией Экмана без изменений", "Культурные различия никогда не влияют на выражение или интерпретацию эмоций", "Универсальность базовых эмоций является абсолютно доказанным и неоспоримым фактом без каких-либо контраргументов", "Более поздние исследования указывают на значительное влияние культурных норм выражения эмоций (display rules) и методологические ограничения оригинальных экспериментов, что ставит под вопрос строгую универсальность"], "correct": 3, "explain": "Критики теории Экмана указывают на 'правила отображения' (display rules) — культурно обусловленные нормы, регулирующие, какие эмоции и как принято проявлять — что осложняет строгую универсальность выводов, сделанных на основе ограниченных кросс-культурных выборок."}, {"q": "Почему при построении автоматической системы распознавания эмоций важно учитывать не только положение лицевых точек, но и временную динамику (последовательность кадров)?", "options": ["Скорость появления мимических изменений никогда не связана с их эмоциональной подлинностью", "Одного кадра всегда достаточно для полного и точного анализа эмоционального состояния", "Временная динамика не имеет значения для распознавания эмоций, важна только финальная поза лица", "Многие эмоциональные проявления (особенно микровыражения и подлинность улыбки) определяются именно скоростью и последовательностью движений лицевых мышц, которые невозможно уловить по единственному статичному кадру"], "correct": 3, "explain": "Как и в случае 'улыбки Дюшена' или отличия микро- от макровыражений, временная составляющая (скорость появления, удержания и исчезновения) несёт важную информацию, недоступную статичному изображению."}, {"q": "Почему размерностные модели эмоций (valence-arousal) считаются более гибкими для описания смешанных или неоднозначных эмоциональных состояний, чем категориальная модель базовых эмоций?", "options": ["Размерностные модели эмоций не способны описывать интенсивность переживания", "Valence и arousal — это просто другие названия для конкретных базовых эмоций", "Категориальная модель всегда точнее описывает любое эмоциональное состояние, чем размерностная", "Непрерывное двумерное (или многомерное) пространство valence-arousal может представлять промежуточные и смешанные состояния, тогда как дискретный набор из нескольких базовых категорий вынуждает относить сложное состояние к одной 'ближайшей' категории"], "correct": 3, "explain": "Непрерывное пространство даёт возможность разместить любое эмоциональное состояние где-то на плоскости valence-arousal, тогда как жёсткая категоризация теряет нюансы промежуточных или смешанных эмоций."}, {"q": "Как культурные 'правила отображения' (display rules) могут привести к расхождению между внутренне переживаемой эмоцией и наблюдаемым выражением лица?", "options": ["Display rules всегда точно совпадают с реальным внутренним состоянием без каких-либо расхождений", "Расхождение между внутренним состоянием и выражением лица невозможно в принципе", "Культурные нормы никогда не влияют на то, как люди проявляют эмоции внешне", "В некоторых культурах принято маскировать определённые эмоции (например, улыбкой скрывать смущение или дискомфорт), из-за чего наблюдаемая мимика может не отражать истинное внутреннее состояние человека напрямую"], "correct": 3, "explain": "Display rules — культурно специфичные нормы о том, когда и как уместно проявлять определённые эмоции, что может приводить к сознательной или полусознательной маскировке подлинного эмоционального состояния наблюдаемым выражением лица."}, {"q": "Почему одновременная активация противоречивых Action Units (например, характерных и для радости, и для отвращения) может свидетельствовать о смешанной или маскируемой эмоции?", "options": ["Только одна Action Unit может быть активна в любой момент времени", "Активация нескольких AU одновременно всегда является ошибкой измерения, а не значимым сигналом", "Комбинации AU никогда не несут дополнительной информации помимо отдельных AU", "Комбинация AU, не соответствующая ни одному из 'чистых' прототипов базовых эмоций, часто указывает на то, что человек испытывает сложное, смешанное состояние или пытается подавить одно выражение, непроизвольно проявляя другое"], "correct": 3, "explain": "FACS-анализ конфликтующих или смешанных комбинаций AU (например, признаки истинной эмоции 'просачиваются' сквозь попытку изобразить другую) — один из инструментов, используемых для выявления потенциально скрываемых или сложных эмоциональных состояний."}, {"q": "Почему автоматические системы распознавания эмоций, обученные преимущественно на данных одной культуры/этнической группы, могут показывать сниженную точность на людях из других групп?", "options": ["Модели распознавания эмоций никогда не зависят от состава обучающих данных", "Мимика и эмоциональные выражения абсолютно идентичны у всех людей независимо от происхождения, поэтому проблема не может возникнуть", "Обучающий датасет может недостаточно отражать вариативность выражения лиц (в том числе из-за физиогномических особенностей и культурных норм отображения) в других группах, что приводит к систематическому смещению модели", "Точность распознавания эмоций не может отличаться между разными демографическими группами"], "correct": 2, "explain": "Как и в других задачах компьютерного зрения, недостаточно репрезентативный обучающий датасет приводит к смещению (bias) модели, снижающему точность для недопредставленных групп — важная этическая и техническая проблема при разработке подобных систем."}, {"q": "Как соотносятся понятия 'распознавание выражения лица' (facial expression recognition) и 'распознавание истинной эмоции' (то, что человек на самом деле чувствует) — почему это не всегда одно и то же?", "options": ["Выражение лица и внутренняя эмоция всегда полностью совпадают без исключений", "Выражение лица — наблюдаемый физический сигнал, который может как отражать, так и маскировать/имитировать внутреннее эмоциональное состояние, поэтому распознавание выражения не гарантирует точное определение подлинного переживания", "Люди никогда не способны имитировать выражение лица, не испытывая соответствующей эмоции", "Распознавание выражения лица технически идентично прямому измерению эмоционального состояния мозга"], "correct": 1, "explain": "Это фундаментальное ограничение всех систем (человеческих и автоматических) анализа мимики: они измеряют наблюдаемый внешний сигнал (выражение), который лишь коррелирует, но не идентичен внутреннему субъективному переживанию, и может быть намеренно или ненамеренно искажён."}, {"q": "Как проектируется система автоматического распознавания эмоций на архитектурном уровне — какие этапы обычно предшествуют финальной классификации эмоции?", "options": ["Обычно сначала детектируется лицо на изображении, затем извлекаются ключевые точки (landmarks) или карты признаков, и только затем классификатор определяет эмоцию по этим признакам — это последовательный конвейер, а не единый ость распознавания эмоций по сравнению с анализом отдельных кадров", "Пространственные признаки полностью взаимозаменяемы с временными без потери информации"], "correct": 0, "explain": "Так как многие ключевые аспекты (например, скорость появления улыбки, наличие микровыражений) — временные по своей природе, современные системы часто комбинируют CNN (пространственные признаки кадра) с RNN/attention (временная динамика последовательности кадров)."}, {"q": "Почему при проектировании системы распознавания эмоций важно явно решить, будет ли она использовать категориальную модель (список эмоций) или размерностную модель (valence-arousal), и как это влияет на выбор функции потерь при обучении?", "options": ["Выбор модели эмоций (категориальная vs размерностная) не влияет на архитектуру или обучение системы", "Обе модели эмоций всегда используют идентичную функцию потерь и архитектуру выходного слоя", "Размерностная модель эмоций несовместима с методами машинного обучения", "Категориальная модель обычно соответствует задаче классификации (кросс-энтропийная функция потерь), тогда как размерностная модель соответствует задаче регрессии непрерывных значений (например, среднеквадратичная ошибка) — выбор модели напрямую определяет архитектуру выходного слоя и функцию потерь"], "correct": 3, "explain": "Архитектурное решение (классификация дискретных категорий vs регрессия непрерывных координат valence/arousal) напрямую определяет тип выходного слоя модели (softmax для категорий vs линейный выход для регрессии) и соответствующую функцию потерь."}, {"q": "Как компромисс между чувствительностью (recall) и специфичностью (precision) проявляется при проектировании системы обнаружения конкретной эмоции, например, 'дистресса' в системе мониторинга благополучия?", "options": ["Precision и recall всегда изменяются в одном и том же направлении без компромисса", "Для задачи обнаружения эмоций компромисс между precision и recall не имеет практического значения", "Специфичность и чувствительность — это одно и то же понятие в контексте распознавания эмоций", "Более чувствительная настройка (высокий recall) обнаружит больше реальных случаев дистресса, но также даст больше ложных срабатываний (низкий precision), и выбор порога зависит от того, что дороже — пропустить реальный случай или создать ложную тревогу"], "correct": 3, "explain": "Как и в других задачах бинарной классификации (например, медицинском скрининге), выбор порога чувствительности определяет баланс между пропущенными случаями и ложными тревогами — решение зависит от конкретного контекста применения и цены каждого типа ошибки."}, {"q": "Почему объединение (ensemble) нескольких модальностей — выражения лица, тона голоса и текста речи — часто даёт более надёжное распознавание эмоций, чем анализ одной лишь мимики?", "options": ["Голос и текст никогда не содержат информации об эмоциональном состоянии, только мимика значима", "Использование нескольких модальностей всегда снижает точность по сравнению с одной хорошей моделью", "Разные модальности несут частично независимую и взаимодополняющую информацию об эмоциональном состоянии, и их комбинация компенсирует ограничения и шум, присущие каждому отдельному каналу восприятия", "Мультимодальный анализ эмоций технически невозможен из-за несовместимости типов данных"], "correct": 2, "explain": "Как и в sensor fusion в других областях, комбинация мимики, интонации голоса и содержания речи (мультимодальный анализ) даёт более полную и устойчивую картину эмоционального состояния, компенсируя слабые места и неоднозначности каждого отдельного канала."}, {"q": "Почему при архитектурном проектировании системы важно разделять этап 'обнаружения активации Action Units' и этап 'интерпретации эмоции по комбинации AU', а не обучать модель сразу предсказывать финальную эмоцию по сырому изображению?", "options": ["Разделение на этапы AU и финальной эмоции только усложняет систему без каких-либо преимуществ", "Action Units не могут использоваться как промежуточное представление в архитектуре системы", "Промежуточный слой AU даёт интерпретируемое, анатомически обоснованное представление, которое можно валидировать независимо и переиспользовать для разных целевых задач (не только базовых эмоций, но и, например, детекции боли или скрытых микровыражений)", "Прямое предсказание эмоции по сырому изображению всегда даёт более интерпретируемый и переиспользуемый результат, чем через AU"], "correct": 2, "explain": "Модульная архитектура (сначала общее, анатомически обоснованное представление через AU, затем специализированная интерпретация) даёт гибкость и интерпретируемость, аналогично тому, как в CV полезно разделять извлечение признаков и финальную классификацию."}, {"q": "Как выбор обучающего датасета (постановочные, наигранные эмоции в лаборатории vs 'дикие' (in-the-wild) эмоции из реальных видео) архитектурно влияет на обобщающую способность системы распознавания эмоций в реальных условиях?", "options": ["Естественные ('дикие') данные никогда не используются при обучении подобных систем", "Модели, обученные преимущественно на постановочных, преувеличенных выражениях, часто плохо обобщаются на более тонкие, естественные и смешанные эмоции реальной жизни, что требует включения в обучение данных 'in-the-wild'", "Постановочные датасеты всегда дают лучшее качество распознавания эмоций в реальной жизни, чем естественные видео", "Тип обучающих данных (постановочные vs естественные) не влияет на качество работы системы в реальных условиях"], "correct": 1, "explain": "Классическая проблема сдвига распределения: постановочные эмоции в лаборатории часто более выражены и однозначны, чем тонкие, смешанные проявления в реальной жизни, поэтому современные датасеты (например, AffectNet, FER-Wild) всё больше опираются на 'дикие' данные для лучшего обобщения."}, {"q": "Почему интерпретируемость (объяснимость) результата важна при проектировании систем распознавания эмоций, применяемых в чувствительных контекстах (медицина, HR, право), а не только итоговая точность классификации?", "options": ["Возможность объяснить, на основе каких конкретных признаков (например, каких AU) модель сделала вывод, позволяет экспертам верифицировать решение, выявлять предвзятость и обоснованно доверять или не доверять результату в ответственных ситуациях", "Интерпретируемость не имеет значения, если итоговая точность модели достаточно высока", "Модели распознавания эмоций никогда не могут быть интерпретируемыми по своей природе", "В чувствительных контекстах точность классификации всегда важнее возможности объяснить решение"], "correct": 0, "explain": "В высокорисковых применениях (медицинская диагностика, юридические решения, найм) 'чёрный ящик' с высокой точностью, но без объяснения, недостаточен — важна возможность проверить, что решение основано на релевантных, а не случайных или предвзятых признаках."}, {"q": "HR-специалист хочет использовать систему автоматического анализа эмоций на видеоинтервью для оценки 'искренности' кандидатов. Какая существенная методологическая проблема здесь наиболее важна?", "options": ["Автоматический анализ эмоций всегда лучше человеческой оценки без каких-либо ограничений", "Такие системы дают стопроцентно точный и объективный результат, поэтому проблем не возникает", "Автоматическое распознавание эмоций по лицу имеет ограниченную точность и подвержено культурным/индивидуальным различиям, поэтому использование его как единственного и решающего критерия оценки кандидата этически и методологически сомнительно", "Использование подобных систем не имеет никаких этических последствий"], "correct": 2, "explain": "Помимо технических ограничений точности, использование анализа эмоций для принятия решений о найме поднимает серьёзные этические вопросы (предвзятость, недостаточная научная обоснованность связи 'выражение = внутреннее состояние'), из-за чего в ряде юрисдикций такие практики уже ограничиваются законодательно."}, {"q": "Психолог замечает, что клиент во время описания травматичного события на короткое время демонстрирует выражение, похожее на едва заметную улыбку, а затем возвращается к грустному выражению. Как это можно интерпретировать с учётом теории микровыражений?", "options": ["Любая улыбка всегда означает искреннюю радость независимо от контекста", "Микровыражения никогда не появляются в разговоре о травматичных событиях", "Это может быть микровыражение, отражающее сложную или противоречивую внутреннюю реакцию (например, смущение или неловкость), а не обязательно радость — требуется осторожная интерпретация в общем контексте, а не поспешный вывод", "Это точно означает, что клиент лжёт о своих чувствах"], "correct": 2, "explain": "Интерпретация микровыражений требует осторожности: одно и то же движение мышц (например, лёгкое поднятие уголков губ) может быть связано с разными внутренними состояниями (смущение, неловкость, нервная реакция), а не только с однозначной радостью или обманом."}, {"q": "Разработчик системы видеоконференций хочет добавить функцию 'индикатор вовлечённости' на основе анализа выражений лиц участников. Какая практическая и этическая проблема здесь наиболее значима?", "options": ["Помимо технических ограничений точности анализа эмоций, постоянный мониторинг мимики участников поднимает серьёзные вопросы приватности и может создавать давление, влияющее на естественное поведение людей", "Подобная функция технически тривиальна и не создаёт никаких сложностей или рисков", "Анализ вовлечённости по лицу гарантированно точен для всех участников без исключений", "Мониторинг выражений лица участников видеозвонков не связан с вопросами приватности"], "correct": 0, "explain": "Постоянный анализ мимики в реальном времени поднимает вопросы согласия, приватности данных и возможного психологического давления ('эффект слежки'), помимо базовых технических ограничений точности такого анализа."}, {"q": "Маркетинговая компания тестирует рекламный ролик, анализируя выражения лиц зрителей камерой, и делает вывод о 'позитивной реакции' на основе увеличения активности мышц, поднимающих уголки губ. Какая интерпретационная ошибка здесь возможна?", "options": ["Активация одной мышечной группы (например, зигоматической, поднимающей уголки губ) может быть вызвана не только истинной радостью, но и социальной улыбкой, смущением или иными причинами — без учёта, например, активации мышц вокруг глаз, вывод о 'позитивной реакции' может быть поспешным", "Такой анализ гарантированно и точно измеряет истинное отношение зрителя к ролику", "Мышцы лица не связаны с выражением эмоционального отношения к контенту", "Активация любой лицевой мышцы всегда однозначно указывает на конкретную эмоцию без исключений"], "correct": 0, "explain": "Без дополнительных признаков (например, активации orbicularis oculi, как в 'улыбке Дюшена') одного лишь движения уголков губ недостаточно для надёжного вывода об искренней позитивной эмоции — это классическая ошибка чрезмерного упрощения при интерпретации мимики."}, {"q": "В ходе судебного разбирательства эксперт предлагает использовать анализ микровыражений подсудимого как доказательство лжи. Какое возражение с научной точки зрения наиболее обосновано?", "options": ["Анализ микровыражений является общепризнанным и стопроцентно надёжным методом детекции лжи в судебной практике", "Научная база, связывающая конкретные микровыражения с однозначным фактом лжи, недостаточно надёжна и общепринята для использования в качестве судебного доказательства — корреляция не равна строгому детектору лжи", "Любое эмоциональное выражение лица является прямым и однозначным доказательством в суде", "Микровыражения никогда не могут быть связаны с эмоциональным состоянием человека"], "correct": 1, "explain": "Несмотря на популярность идеи 'чтения лжи по лицу' в массовой культуре, научное сообщество в целом скептически относится к использованию анализа микровыражений как надёжного, юридически обоснованного детектора лжи из-за недостаточной доказательной базы для такого строгого вывода."}, {"q": "Разработчик системы безопасности аэропорта хочет использовать автоматическое распознавание 'подозрительных' эмоций (например, повышенной тревожности) по лицам пассажиров. Какая фундаментальная проблема ограничивает надёжность такого подхода?", "options": ["Системы распознавания эмоций гарантированно различают тревожность из-за угрозы и тревожность по бытовым причинам", "Повышенная тревожность может быть вызвана множеством безобидных причин (страх перед полётом, спешка, личный стресс), не связанных с реальной угрозой, что делает эмоциональное состояние ненадёжным индикатором злого умысла", "Тревожность всегда однозначно указывает на злонамеренные действия человека", "Эмоциональное состояние человека не может быть распознано автоматической системой в принципе"], "correct": 1, "explain": "Эмоциональное состояние — не прямой индикатор намерений; множество факторов, не связанных с угрозой, могут вызывать схожие внешние проявления тревожности, что делает подобные системы безопасности потенциально дискриминационными и ненадёжными без дополнительного контекста."}, {"q": "Терапевт использует видеозапись сессии, чтобы позже проанализировать невербальные сигналы клиента, которые не были замечены в реальном времени. Какое преимущество это иллюстрирует по сравнению с анализом 'на лету'?", "options": ["Просмотр записи никогда не даёт дополнительной информации по сравнению с наблюдением в реальном времени", "Микровыражения одинаково легко заметить и в реальном времени, и на замедленном повторе", "Видеозапись сессии полезна только для юридических целей, а не для клинического анализа", "Повторный, замедленный просмотр записи позволяет заметить краткие микровыражения и тонкие изменения мимики, которые физически сложно уловить человеческим глазом в реальном времени разговора"], "correct": 3, "explain": "Из-за крайне малой длительности микровыражений (доли секунды) их гораздо легче выявить при замедленном повторном просмотре записи, чем в реальном времени живого разговора — этим же принципом пользуются и обучающие программы по распознаванию микровыражений (например, METT)."}, {"q": "Компания разрабатывает систему для водителей, определяющую усталость по анализу лица (моргание, зевота, положение головы). Почему для надёжности такой системы важно комбинировать несколько признаков, а не полагаться только на один (например, только частоту моргания)?", "options": ["Отдельные признаки (только моргание, только зевота) могут давать ложные срабатывания или пропуски из-за индивидуальных различий и посторонних факторов, тогда как комбинация нескольких независимых сигналов повышает надёжность обнаружения истинного состояния усталости", "Зевота и положение головы не связаны с состоянием усталости водителя", "Частота моргания — абсолютно надёжный и достаточный признак усталости сам по себе", "Комбинирование нескольких признаков всегда снижает точность системы по сравнению с одним признаком"], "correct": 0, "explain": "Как и в общем анализе эмоций, комбинация независимых индикаторов (мультимодальность) снижает вероятность ошибки по сравнению с одним сигналом, который может быть подвержен индивидуальным особенностям или посторонним помехам (например, обычное частое моргание у конкретного человека)."}, {"q": "Учитель на онлайн-занятии использует программу, которая анализирует лица учеников и сообщает об уровне их 'вовлечённости' в реальном времени. Ученик с расстройством аутистического спектра, чья мимика менее выразительна, стабильно получает низкие оценки вовлечённости, хотя внимательно следит за уроком. Какой вывод наиболее уместен?", "options": ["Система всегда абсолютно точно определяет реальный уровень внимания независимо от индивидуальных особенностей мимики", "Такие системы не нужно подвергать сомнению, если они основаны на анализе лица", "Низкая оценка вовлечённости точно означает, что ученик не следит за уроком", "Система, вероятно, недостаточно учитывает индивидуальные и нейроразнообразные особенности мимики, и её выводы не стоит интерпретировать как объективную истину об уровне внимания конкретного ученика"], "correct": 3, "explain": "Системы анализа эмоций/вовлечённости калибруются на 'типичных' проявлениях мимики и могут систематически неверно интерпретировать поведение людей с иной, менее выразительной или атипичной мимикой (например, при расстройствах аутистического спектра), что подчёркивает риски слепого доверия таким метрикам."}, {"q": "Согласно системе FACS, комбинация AU6 (поднятие щёк) и AU12 (поднятие уголков губ) традиционно связывается с каким выражением?", "options": ["Гнев", "Искренняя улыбка (радость)", "Отвращение", "Страх"], "correct": 1, "explain": "Комбинация AU6 (напряжение мышцы вокруг глаз, поднимающей щёки) и AU12 (поднятие уголков губ) — классическое описание искренней ('дюшеновской') улыбки радости в системе FACS."}, {"q": "Если микровыражение длится в среднем 1/15 секунды, сколько кадров видео при частоте съёмки 30 кадров в секунду (fps) потребуется для его полного захвата?", "options": ["30 кадров", "2 кадра", "1 кадр", "15 кадров"], "correct": 1, "explain": "1/15 секунды при 30 кадрах в секунду соответствует 30×(1/15)=2 кадрам — именно поэтому для надёжного захвата микровыражений часто нужна повышенная частота съёмки."}, {"q": "В исследовании из 200 испытуемых 150 правильно распознали эмоцию 'удивление' по фотографии. Какова доля правильных ответов (в процентах)?", "options": ["85%", "50%", "75%", "65%"], "correct": 2, "explain": "150/200=0.75=75%."}, {"q": "Система автоматического распознавания эмоций классифицирует 500 изображений, из которых верно определила эмоцию на 425. Какова точность (accuracy) системы?", "options": ["90%", "80%", "75%", "85%"], "correct": 3, "explain": "425/500=0.85=85%."}, {"q": "Если частота съёмки видео составляет 25 кадров в секунду, сколько миллисекунд длится один кадр?", "options": ["40 мс", "10 мс", "100 мс", "25 мс"], "correct": 0, "explain": "1000 мс / 25 кадров = 40 мс на кадр."}, {"q": "В двумерной модели valence-arousal эмоция расположена в координатах (valence=+0.8, arousal=+0.7). Какой квадрант это соответствует, и какой эмоции это может примерно соответствовать?", "options": ["Высокая позитивная валентность и высокое возбуждение — например, восторг/радость", "Высокая валентность и низкое возбуждение — например, спокойствие", "Низкая валентность и низкое возбуждение — например, скука", "Низкая валентность и высокое возбуждение — например, гнев"], "correct": 0, "explain": "Положительные значения обеих координат (valence и arousal) соответствуют квадранту 'высокая позитивная валентность + высокая активация', типичному для таких эмоций, как восторг или радостное возбуждение."}, {"q": "В базе данных из 1000 видео с выражениями лиц 40% помечены как 'нейтральные'. Сколько видео помечено другими эмоциями?", "options": ["400", "900", "600", "500"], "correct": 2, "explain": "Если 40% (400 видео) нейтральные, то оставшиеся 60% (600 видео) соответствуют другим эмоциям: 1000-400=600."}, {"q": "Эксперимент показал, что из 60 микровыражений, отмеченных экспертами при просмотре видео в реальном времени, было замечено только 12. Какова доля замеченных микровыражений?", "options": ["30%", "50%", "10%", "20%"], "correct": 3, "explain": "12/60=0.2=20% — иллюстрация того, насколько сложно улавливать микровыражения без замедленного повтора."}, {"q": "Обучающий датасет для системы распознавания эмоций содержит 10000 изображений, разделённых на 7 классов эмоций поровну. Сколько изображений приходится в среднем на один класс?", "options": ["1000", "1300", "700", "1429"], "correct": 3, "explain": "10000/7 ≈ 1428.57, округляя — примерно 1429 изображений на класс."}, {"q": "Система распознавания эмоций имеет precision 0.8 и recall 0.6 для класса 'гнев'. Чему приблизительно равен F1-score (2·P·R/(P+R))?", "options": ["0.70", "0.69", "0.60", "0.80"], "correct": 1, "explain": "F1=2×0.8×0.6/(0.8+0.6)=0.96/1.4≈0.686≈0.69."}, {"q": "Из 50 испытуемых 10 продемонстрировали 'улыбку Дюшена' (искреннюю), а остальные — только вежливую улыбку. Какова доля искренних улыбок в процентах?", "options": ["50%", "40%", "10%", "20%"], "correct": 3, "explain": "10/50=0.2=20%."}, {"q": "Датасет эмоций содержит 6 базовых классов и 1 нейтральный класс поровну распределённых на 3500 изображений. Сколько изображений приходится на класс 'гнев'?", "options": ["583", "400", "500", "350"], "correct": 2, "explain": "3500/7=500 изображений на класс."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
