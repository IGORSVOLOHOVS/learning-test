<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Распознавание эмоций человека по лицу</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>

</div>

<script>
(function () {
  const TEST_ID = "facial_emotion_recognition";
  const QUESTIONS = [{"q": "Что такое базовые (универсальные) эмоции согласно теории Пола Экмана?", "options": ["Только радость и грусть", "Радость, грусть, гнев, страх, удивление, отвращение (иногда презрение)", "Эмоции, возникающие исключительно у взрослых людей", "Любые эмоции, названные в любом языке мира"], "correct": 1, "explain": "Экман выделил набор базовых эмоций, которые, по его исследованиям, распознаются по мимике представителями разных культур схожим образом.", "usage": {"code": false, "without": "Каждый разметчик клеит эмоциям свои произвольные ярлыки ('тоска', 'интерес', 'кайф'), схемы у всех разные и несопоставимые.", "with": "Используют канонический набор базовых эмоций Экмана (радость, грусть, гнев, страх, удивление, отвращение, презрение) как фиксированные классы.", "benefit": "единая согласованная разметка, сравнимая между наборами данных"}}, {"q": "Что такое микровыражение лица (micro-expression)?", "options": ["Полностью осознанная и контролируемая гримаса", "Выражение, которое видно только на фотографии, но не в реальном времени", "Выражение, характерное только для младенцев", "Очень краткое (доли секунды) непроизвольное выражение лица, часто отражающее скрываемую истинную эмоцию"], "correct": 3, "explain": "Микровыражения — быстрые (обычно 1/25–1/5 секунды) непроизвольные сокращения лицевых мышц, которые сложно подделать или подавить полностью.", "usage": {"code": false, "without": "Смотрят только на явные длительные гримасы и считают их полной картиной чувств.", "with": "Целенаправленно ищут краткие (доли секунды) непроизвольные микровыражения, которые человек не успевает подавить.", "benefit": "видно скрываемую истинную реакцию, а не только показное"}}, {"q": "Что такое система кодирования лицевых движений FACS (Facial Action Coding System)?", "options": ["Метод измерения температуры тела по лицу", "Система, описывающая мимику через комбинации отдельных 'единиц действия' (action units) лицевых мышц", "Алгоритм сжатия видео с лицами", "Система классификации языков жестов"], "correct": 1, "explain": "FACS (Экман и Фризен) разбивает мимику на отдельные, анатомически обоснованные 'единицы действия' (AU), комбинации которых соответствуют определённым эмоциональным выражениям.", "usage": {"code": false, "without": "Мимику описывают сразу целым ярлыком 'это гнев', полагаясь на субъективное впечатление.", "with": "Раскладывают выражение на комбинации анатомических единиц действия (AU) по системе FACS.", "benefit": "воспроизводимое анатомическое описание вместо догадки"}}, {"q": "Что такое 'единица действия' (Action Unit, AU) в системе FACS?", "options": ["Единица измерения расстояния между глазами", "Название конкретной базовой эмоции", "Минимальное различимое движение одной лицевой мышцы или группы мышц", "Полное эмоциональное выражение лица целиком"], "correct": 2, "explain": "AU — атомарная единица FACS, соответствующая сокращению конкретной мышцы (например, AU12 — поднятие уголков губ), комбинации AU формируют распознаваемые эмоциональные выражения.", "usage": {"code": false, "without": "Оперируют только целыми выражениями, не имея языка для отдельных движений мышц.", "with": "Описывают мимику атомарными единицами действия (напр. AU12 — подъём уголков губ), из которых собираются выражения.", "benefit": "точный разбор любого выражения на составные движения"}}, {"q": "Какую роль играют глаза и область вокруг них при распознавании искренности улыбки (например, 'улыбка Дюшена')?", "options": ["Область глаз никогда не связана с искренностью выражения лица", "Искренность улыбки определяется исключительно шириной рта", "Искренняя улыбка обычно сопровождается сокращением мышц вокруг глаз (появлением 'гусиных лапок'), тогда как вежливая/наигранная улыбка часто затрагивает только рот", "Улыбка Дюшена — это улыбка, которая никогда не бывает искренней"], "correct": 2, "explain": "'Улыбка Дюшена' названа по имени французского врача, впервые описавшего, что подлинная радость активирует круговую мышцу глаза (orbicularis oculi), которую трудно контролировать сознательно, в отличие от одной лишь улыбки ртом.", "usage": {"code": false, "without": "Судят об искренности улыбки по одной лишь ширине рта.", "with": "Проверяют сокращение мышц вокруг глаз (AU6, 'гусиные лапки') — маркер улыбки Дюшена.", "benefit": "отличают подлинную радость от вежливой улыбки"}}, {"q": "Что затрудняет распознавание эмоций исключительно по статичному изображению лица по сравнению с видео?", "options": ["Распознавание эмоций одинаково эффективно и по фото, и по видео без каких-либо различий", "Видео никогда не содержит дополнительной информации по сравнению с фото", "Статичные изображения всегда дают более точное распознавание эмоций, чем видео", "Статичное изображение не передаёт динамику (скорость появления и изменения выражения), которая часто важна для правильной интерпретации эмоции"], "correct": 3, "explain": "Динамика выражения (скорость появления, длительность, последовательность движений) несёт дополнительную информацию о подлинности и типе эмоции, которую невозможно получить из единственного статичного кадра.", "usage": {"code": true, "without": "emotion = classify(single_frame)  # только одна поза, динамика потеряна", "with": "clip = frames[t0:t1]\nspeed = onset_speed(clip)  # скорость появления улыбки\nemotion = classify_dynamic(clip, speed)", "benefit": "учитывает скорость и последовательность движений, а не одну позу"}}, {"q": "Что такое 'valence' (валентность) и 'arousal' (возбуждение) в размерностной (dimensional) модели эмоций?", "options": ["Возбуждение относится исключительно к физическим упражнениям", "Валентность измеряет только продолжительность эмоции", "Валентность и возбуждение — синонимы одного и того же понятия", "Валентность — положительность/отрицательность эмоции, возбуждение — интенсивность физиологической активации"], "correct": 3, "explain": "Размерностные модели эмоций (например, круговая модель Рассела) описывают эмоцию через две независимые оси: валентность (приятно/неприятно) и возбуждение (спокойствие/высокая активация).", "usage": {"code": true, "without": "emotion = softmax(logits)  # только 7 дискретных категорий", "with": "valence, arousal = model(face)  # 2 непрерывные оси\n# (+0.8, +0.7) -> радостное возбуждение", "benefit": "описывает промежуточные и смешанные состояния"}}, {"q": "Какова роль контекста (ситуации, культуры, предыдущих взаимодействий) в интерпретации выражения лица человеком-наблюдателем?", "options": ["Контекст никогда не влияет на интерпретацию мимики", "Контекст важен только для вербальной коммуникации, но не для мимики", "Контекст может существенно менять интерпретацию одного и того же выражения лица, так как эмоциональные сигналы редко считываются полностью изолированно от ситуации", "Выражение лица интерпретируется абсолютно одинаково независимо от ситуации и культуры"], "correct": 2, "explain": "Многочисленные исследования показывают, что одно и то же выражение лица может интерпретироваться по-разному в зависимости от контекста ситуации, языка тела и культурных норм наблюдателя.", "usage": {"code": false, "without": "Трактуют выражение лица изолированно, вырвав его из ситуации.", "with": "Интерпретируют мимику вместе с контекстом ситуации, культурой и предысторией взаимодействия.", "benefit": "меньше грубых ошибок интерпретации одного и того же лица"}}, {"q": "Что такое алекситимия применительно к распознаванию эмоций?", "options": ["Синдром, вызывающий постоянную улыбку", "Заболевание глаз, мешающее видеть выражения лиц", "Способность идеально распознавать любые эмоции без ошибок", "Затруднённость в осознании и словесном описании собственных эмоций (что может затруднять и распознавание чужих эмоций)"], "correct": 3, "explain": "Алекситимия — трудности в идентификации и вербализации собственных эмоциональных состояний, что в некоторых исследованиях связывают также с трудностями в распознавании эмоций других людей.", "usage": {"code": false, "without": "Предполагают, что любой человек одинаково легко осознаёт и называет свои эмоции.", "with": "Учитывают алекситимию — трудность в осознании и вербализации эмоций у части людей.", "benefit": "адекватная оценка и помощь тем, кому сложно называть чувства"}}, {"q": "Что такое 'эффект собственной расы' (own-race bias/effect) в распознавании лиц и эмоций?", "options": ["Полное отсутствие различий в распознавании между разными группами людей", "Способность распознавать эмоции только у людей той же профессии", "Метод, применяемый исключительно в судебной экспертизе", "Явление, при котором люди в среднем лучше распознают лица и выражения представителей своей расы/этнической группы, чем других"], "correct": 3, "explain": "Own-race effect — задокументированный в психологии эффект, при котором из-за большего опыта взаимодействия с представителями своей группы люди в среднем точнее распознают лица и мимику 'своей' расы/этничности, что имеет значение и для оценки предвзятости автоматических систем.", "usage": {"code": true, "without": "acc = accuracy(y_true, y_pred)  # одна общая цифра скрывает провалы", "with": "for g in groups:\n    print(g, accuracy(y_true[g], y_pred[g]))  # точность по расам/группам", "benefit": "вскрывает падение точности на недопредставленных группах"}}, {"q": "Почему автоматическое распознавание эмоций по лицу (компьютерным зрением) обычно использует комбинацию признаков лица (например, положение ключевых точек — landmarks), а не просто сырые пиксели изображения?", "options": ["Ключевые точки лица никогда не используются в системах распознавания эмоций", "Ключевые точки лица (глаза, брови, рот) явно кодируют геометрические изменения, соответствующие мимике, упрощая задачу по сравнению с работой напрямую с неструктурированными пикселями", "Распознавание эмоций невозможно без использования видео с высоким разрешением", "Сырые пиксели всегда дают более точный результат, чем структурированные признаки"], "correct": 1, "explain": "Landmarks (ключевые точки контуров глаз, бровей, рта) дают компактное, интерпретируемое представление геометрии лица, изменение которой напрямую связано с активацией конкретных лицевых мышц (AU) и, соответственно, эмоций.", "usage": {"code": true, "without": "X = image.reshape(-1)  # сырые пиксели: шум фона, освещения", "with": "X = detect_landmarks(image)  # 68 точек: глаза, брови, рот", "benefit": "компактные интерпретируемые признаки геометрии мимики"}}, {"q": "Почему система FACS считается более объективным инструментом анализа мимики, чем прямая классификация 'на глаз' по названию эмоции (например, 'это гнев')?", "options": ["FACS не связана с наблюдаемыми физическими движениями лица", "Прямая классификация эмоций по названию всегда точнее анатомического описания движений", "FACS описывает наблюдаемые физические движения мышц независимо от интерпретации их эмоционального значения, что позволяет разным исследователям кодировать одно и то же выражение согласованно, прежде чем делать вывод об эмоции", "FACS всегда даёт другой результат по сравнению с классификацией эмоций 'на глаз', поэтому объективнее"], "correct": 2, "explain": "Разделение объективного описания движений (FACS-кодирование) и последующей психологической интерпретации (какая это эмоция) снижает субъективность и повышает воспроизводимость анализа между разными наблюдателями.", "usage": {"code": false, "without": "Наблюдатель сразу пишет вывод 'гнев', и у двух экспертов результаты расходятся.", "with": "Сначала объективно кодируют движения мышц по FACS, и лишь потом интерпретируют эмоцию.", "benefit": "согласованность кодирования между разными наблюдателями"}}, {"q": "Почему микровыражения считаются более надёжным индикатором скрываемой эмоции, чем макровыражения (обычные, продолжительные выражения лица)?", "options": ["Макровыражения никогда не могут быть намеренно фальсифицированы", "Микровыражения слишком кратковременны, чтобы их можно было сознательно контролировать или подавить, в отличие от макровыражений, которые человек может намеренно изобразить или скрыть", "Микровыражения полностью подконтрольны сознательному контролю человека", "Микровыражения всегда длятся дольше макровыражений"], "correct": 1, "explain": "Из-за крайне малой длительности (доли секунды) микровыражения ускользают от сознательного подавления, что делает их потенциальным индикатором подлинной, часто скрываемой эмоциональной реакции.", "usage": {"code": false, "without": "Доверяют длительным выражениям, которые легко сознательно изобразить или скрыть.", "with": "Опираются на неконтролируемые микровыражения длиной в доли секунды.", "benefit": "устойчивость к намеренному притворству"}}, {"q": "Почему универсальность базовых эмоций Экмана (кросс-культурная схожесть распознавания) остаётся предметом научных дискуссий, несмотря на первоначальные результаты исследований?", "options": ["Все современные исследователи полностью согласны с оригинальной теорией Экмана без изменений", "Культурные различия никогда не влияют на выражение или интерпретацию эмоций", "Универсальность базовых эмоций является абсолютно доказанным и неоспоримым фактом без каких-либо контраргументов", "Более поздние исследования указывают на значительное влияние культурных норм выражения эмоций (display rules) и методологические ограничения оригинальных экспериментов, что ставит под вопрос строгую универсальность"], "correct": 3, "explain": "Критики теории Экмана указывают на 'правила отображения' (display rules) — культурно обусловленные нормы, регулирующие, какие эмоции и как принято проявлять — что осложняет строгую универсальность выводов, сделанных на основе ограниченных кросс-культурных выборок.", "usage": {"code": false, "without": "Считают, что базовые эмоции распознаются абсолютно одинаково во всех культурах.", "with": "Учитывают культурные правила отображения (display rules) и методологические оговорки оригинальных исследований.", "benefit": "осторожные, корректные кросс-культурные выводы"}}, {"q": "Почему при построении автоматической системы распознавания эмоций важно учитывать не только полож точных или смешанных эмоций.", "usage": {"code": true, "without": "loss = cross_entropy(logits, label)  # жёсткие категории теряют нюанс", "with": "loss = mse(pred_va, true_va)  # регрессия valence-arousal", "benefit": "смешанные эмоции не втискиваются в одну категорию"}}, {"q": "Как культурные 'правила отображения' (display rules) могут привести к расхождению между внутренне переживаемой эмоцией и наблюдаемым выражением лица?", "options": ["Display rules всегда точно совпадают с реальным внутренним состоянием без каких-либо расхождений", "Расхождение между внутренним состоянием и выражением лица невозможно в принципе", "Культурные нормы никогда не влияют на то, как люди проявляют эмоции внешне", "В некоторых культурах принято маскировать определённые эмоции (например, улыбкой скрывать смущение или дискомфорт), из-за чего наблюдаемая мимика может не отражать истинное внутреннее состояние человека напрямую"], "correct": 3, "explain": "Display rules — культурно специфичные нормы о том, когда и как уместно проявлять определённые эмоции, что может приводить к сознательной или полусознательной маскировке подлинного эмоционального состояния наблюдаемым выражением лица.", "usage": {"code": false, "without": "Принимают наблюдаемую мимику за прямое отражение внутреннего состояния.", "with": "Учитывают, что культурные нормы могут маскировать эмоцию (улыбкой скрывают смущение).", "benefit": "не путают показанное с реально переживаемым"}}, {"q": "Почему одновременная активация противоречивых Action Units (например, характерных и для радости, и для отвращения) может свидетельствовать о смешанной или маскируемой эмоции?", "options": ["Только одна Action Unit может быть активна в любой момент времени", "Активация нескольких AU одновременно всегда является ошибкой измерения, а не значимым сигналом", "Комбинации AU никогда не несут дополнительной информации помимо отдельных AU", "Комбинация AU, не соответствующая ни одному из 'чистых' прототипов базовых эмоций, часто указывает на то, что человек испытывает сложное, смешанное состояние или пытается подавить одно выражение, непроизвольно проявляя другое"], "correct": 3, "explain": "FACS-анализ конфликтующих или смешанных комбинаций AU (например, признаки истинной эмоции 'просачиваются' сквозь попытку изобразить другую) — один из инструментов, используемых для выявления потенциально скрываемых или сложных эмоциональных состояний.", "usage": {"code": true, "without": "emotion = argmax(prototype_match(au_set))  # только ближайший чистый прототип", "with": "if {'AU12'} & au_set and {'AU9','AU10'} & au_set:\n    flag = 'смешанная/маскируемая'", "benefit": "выявляет конфликтующие AU как признак скрытой эмоции"}}, {"q": "Почему автоматические системы распознавания эмоций, обученные преимущественно на данных одной культуры/этнической группы, могут показывать сниженную точность на людях из других групп?", "options": ["Модели распознавания эмоций никогда не зависят от состава обучающих данных", "Мимика и эмоциональные выражения абсолютно идентичны у всех людей независимо от происхождения, поэтому проблема не может возникнуть", "Обучающий датасет может недостаточно отражать вариативность выражения лиц (в том числе из-за физиогномических особенностей и культурных норм отображения) в других группах, что приводит к систематическому смещению модели", "Точность распознавания эмоций не может отличаться между разными демографическими группами"], "correct": 2, "explain": "Как и в других задачах компьютерного зрения, недостаточно репрезентативный обучающий датасет приводит к смещению (bias) модели, снижающему точность для недопредставленных групп — важная этическая и техническая проблема при разработке подобных систем.", "usage": {"code": true, "without": "model.fit(X_train, y)  # датасет из одной этнической группы", "with": "X_bal = balance_by_group(X_train, groups)\nmodel.fit(X_bal, y)", "benefit": "снижает систематическое смещение на других группах"}}, {"q": "Как соотносятся понятия 'распознавание выражения лица' (facial expression recognition) и 'распознавание истинной эмоции' (то, что человек на самом деле чувствует) — почему это не всегда одно и то же?", "options": ["Выражение лица и внутренняя эмоция всегда полностью совпадают без исключений", "Выражение лица — наблюдаемый физический сигнал, который может как отражать, так и маскировать/имитировать внутреннее эмоциональное состояние, поэтому распознавание выражения не гарантирует точное определение подлинного переживания", "Люди никогда не способны имитировать выражение лица, не испытывая соответствующей эмоции", "Распознавание выражения лица технически идентично прямому измерению эмоционального состояния мозга"], "correct": 1, "explain": "Это фундаментальное ограничение всех систем (человеческих и автоматических) анализа мимики: они измеряют наблюдаемый внешний сигнал (выражение), который лишь коррелирует, но не идентичен внутреннему субъективному переживанию, и может быть намеренно или ненамеренно искажён.", "usage": {"code": false, "without": "Приравнивают распознанное выражение к тому, что человек реально чувствует.", "with": "Различают наблюдаемый сигнал (выражение) и внутреннее переживание, с которым он лишь коррелирует.", "benefit": "реалистичные ожидания от любой системы анализа мимики"}}, {"q": "Как проектируется система автоматического распознавания эмоций на архитектурном уровне — какие этапы обычно предшествуют финальной классификации эмоции?", "options": ["Обычно сначала детектируется лицо на изображении, затем извлекаются ключевые точки (landmarks) или карты признаков, и только затем классификатор определяет эмоцию по этим признакам — это последовательный конвейер, а не единый монолитный шаг", "Классификация эмоции происходит напрямую по сырому изображению без каких-либо промежуточных этапов", "Детекция лица не является необходимым этапом для распознавания эмоций", "Финальная классификация эмоции всегда предшествует детекции лица"], "correct": 0, "explain": "Типичный пайплайн: детекция лица → выравнивание/нормализация → извлечение признаков (landmarks, карты признаков CNN) → классификация эмоции; каждый этап решает свою подзадачу, что упрощает отладку и улучшение системы.", "usage": {"code": true, "without": "emotion = net(raw_image)  # один монолитный шаг, не отладить", "with": "face = detect_face(img)\nface = align(face)\nfeats = extract(face)\nemotion = classify(feats)", "benefit": "модульный конвейер проще отлаживать и улучшать"}}, {"q": "Почему нормализация положения и масштаба лица (например, выравнивание по положению глаз) — важный предварительный шаг перед извлечением признаков для распознавания эмоций?", "options": ["Без нормализации вариации в повороте головы, расстоянии до камеры и ракурсе съёмки могут маскировать истинные различия в мимике, затрудняя сравнение признаков между разными изображениями", "Все лица на фотографиях всегда имеют идентичный масштаб и ориентацию без необходимости нормализации", "Нормализация изображения лица никогда не влияет на точность последующей классификации эмоций", "Нормализация нужна только для эстетического вида изображения, а не для точности анализа"], "correct": 0, "explain": "Приведение лиц к единому масштабу и ориентации устраняет посторонние источники вариации (поза, расстояние до камеры), позволяя модели фокусироваться именно на релевантных для эмоции изменениях геометрии лица.", "usage": {"code": true, "without": "feats = extract(face)  # разный наклон и масштаб мешают сравнению", "with": "face = align_by_eyes(face)\nface = resize(face, (112, 112))\nfeats = extract(face)", "benefit": "устраняет вариации позы/масштаба, остаётся сама мимика"}}, {"q": "Как взаимодействуют пространственные (что видно на конкретном кадре) и временные (как меняется мимика со временем) признаки в системах распознавания эмоций по видео?", "options": ["Современные архитектуры часто комбинируют пространственный анализ отдельных кадров (например, через CNN) с временным моделированием последовательности (например, через RNN или трансформер), чтобы учитывать и статичную форму выражения, и динамику его изменения", "Для видео используются исключительно пространственные признаки без учёта динамики", "Временные признаки никогда не улучшают точность распознавания эмоций по сравнению с анализом отдельных кадров", "Пространственные признаки полностью взаимозаменяемы с временными без потери информации"], "correct": 0, "explain": "Так как многие ключевые аспекты (например, скорость появления улыбки, наличие микровыражений) — временные по своей природе, современные системы часто комбинируют CNN (пространственные признаки кадра) с RNN/attention (временная динамика последовательности кадров).", "usage": {"code": true, "without": "feat = cnn(frame)  # только пространство одного кадра", "with": "feats = [cnn(f) for f in frames]\nemotion = rnn(feats)  # + временная динамика", "benefit": "учитывает и форму выражения, и его изменение во времени"}}, {"q": "Почему при проектировании системы распознавания эмоций важно явно решить, будет ли она использовать категориальную модель (список эмоций) или размерностную модель (valence-arousal), и как это влияет на выбор функции потерь при обучении?", "options": ["Выбор модели эмоций (категориальная vs размерностная) не влияет на архитектуру или обучение системы", "Обе модели эмоций всегда используют идентичную функцию потерь и архитектуру выходного слоя", "Размерностная модель эмоций несовместима с методами машинного обучения", "Категориальная модель обычно соответствует задаче классификации (кросс-энтропийная функция потерь), тогда как размерностная модель соответствует задаче регрессии непрерывных значений (например, среднеквадратичная ошибка) — выбор модели напрямую определяет архитектуру выходного слоя и функцию потерь"], "correct": 3, "explain": "Архитектурное решение (классификация дискретных категорий vs регрессия непрерывных координат valence/arousal) напрямую определяет тип выходного слоя модели (softmax для категорий vs линейный выход для регрессии) и соответствующую функцию потерь.", "usage": {"code": true, "without": "out = Linear(n, 7); loss = mse(out, y)  # регрессия для категорий — неверно", "with": "# категории: softmax + cross_entropy\n# valence-arousal: linear + mse", "benefit": "выходной слой и функция потерь соответствуют модели эмоций"}}, {"q": "Как компромисс между чувствительностью (recall) и специфичностью (precision) проявляется при проектировании системы обнаружения конкретной эмоции, например, 'дистресса' в системе мониторинга благополучия?", "options": ["Precision и recall всегда изменяются в одном и том же направлении без компромисса", "Для задачи обнаружения эмоций компромисс между precision и recall не имеет практического значения", "Специфичность и чувствительность — это одно и то же понятие в контексте распознавания эмоций", "Более чувствительная настройка (высокий recall) обнаружит больше реальных случаев дистресса, но также даст больше ложных срабатываний (низкий precision), и выбор порога зависит от того, что дороже — пропустить реальный случай или создать ложную тревогу"], "correct": 3, "explain": "Как и в других задачах бинарной классификации (например, медицинском скрининге), выбор порога чувствительности определяет баланс между пропущенными случаями и ложными тревогами — решение зависит от конкретного контекста применения и цены каждого типа ошибки.", "usage": {"code": true, "without": "pred = prob > 0.5  # фиксированный порог наугад", "with": "thr = tune_threshold(cost_miss=10, cost_fp=1)\npred = prob > thr", "benefit": "порог настроен под цену пропуска против ложной тревоги"}}, {"q": "Почему объединение (ensemble) нескольких модальностей — выражения лица, тона голоса и текста речи — часто даёт более надёжное распознавание эмоций, чем анализ одной лишь мимики?", "options": ["Голос и текст никогда не содержат информации об эмоциональном состоянии, только мимика значима", "Использование нескольких модальностей всегда снижает точность по сравнению с одной хорошей моделью", "Разные модальности несут частично независимую и взаимодополняющую информацию об эмоциональном состоянии, и их комбинация компенсирует ограничения и шум, присущие каждому отдельному каналу восприятия", "Мультимодальный анализ эмоций технически невозможен из-за несовместимости типов данных"], "correct": 2, "explain": "Как и в sensor fusion в других областях, комбинация мимики, интонации голоса и содержания речи (мультимодальный анализ) даёт более полную и устойчивую картину эмоционального состояния, компенсируя слабые места и неоднозначности каждого отдельного канала.", "usage": {"code": true, "without": "emotion = face_model(face)  # только мимика, шум одного канала", "with": "emotion = fuse(face_model(face), voice_model(audio), text_model(text))", "benefit": "каналы дополняют друг друга, устойчивее к шуму"}}, {"q": "Почему при архитектурном проектировании системы важно разделять этап 'обнаружения активации Action Units' и этап 'интерпретации эмоции по комбинации AU', а не обучать модель сразу предсказывать финальную эмоцию по сырому изображению?", "options": ["Разделение на этапы AU и финальной эмоции только усложняет систему без каких-либо преимуществ", "Action Units не могут использоваться как промежуточное представление в архитектуре системы", "Промежуточный слой AU даёт интерпретируемое, анатомически обоснованное представление, которое можно валидировать независимо и переиспользовать для разных целевых задач (не только базовых эмоций, но и, например, детекции боли или скрытых микровыражений)", "Прямое предсказание эмоции по сырому изображению всегда даёт более интерпретируемый и переиспользуемый результат, чем через AU"], "correct": 2, "explain": "Модульная архитектура (сначала общее, анатомически обоснованное представление через AU, затем специализированная интерпретация) даёт гибкость и интерпретируемость, аналогично тому, как в CV полезно разделять извлечение признаков и финальную классификацию.", "usage": {"code": true, "without": "emotion = net(raw_image)  # сразу эмоция, вывод не проверить", "with": "au = au_detector(image)  # интерпретируемый слой\nemotion = interpret(au)  # переиспользуем для боли, микровыражений", "benefit": "валидируемое анатомическое представление и переиспользование"}}, {"q": "Как выбор обучающего датасета (постановочные, наигранные эмоции в лаборатории vs 'дикие' (in-the-wild) эмоции из реальных видео) архитектурно влияет на обобщающую способность системы распознавания эмоций в реальных условиях?", "options": ["Естественные ('дикие') данные никогда не используются при обучении подобных систем", "Модели, обученные преимущественно на постановочных, преувеличенных выражениях, часто плохо обобщаются на более тонкие, естественные и смешанные эмоции реальной жизни, что требует включения в обучение данных 'in-the-wild'", "Постановочные датасеты всегда дают лучшее качество распознавания эмоций в реальной жизни, чем естественные видео", "Тип обучающих данных (постановочные vs естественные) не влияет на качество работы системы в реальных условиях"], "correct": 1, "explain": "Классическая проблема сдвига распределения: постановочные эмоции в лаборатории часто более выражены и однозначны, чем тонкие, смешанные проявления в реальной жизни, поэтому современные датасеты (например, AffectNet, FER-Wild) всё больше опираются на 'дикие' данные для лучшего обобщения.", "usage": {"code": false, "without": "Обучают модель на постановочных, преувеличенных лабораторных выражениях.", "with": "Добавляют 'дикие' (in-the-wild) данные из реальных видео с тонкими смешанными эмоциями.", "benefit": "лучшее обобщение на реальные условия эксплуатации"}}, {"q": "Почему интерпретируемость (объяснимость) результата важна при проектировании систем распознавания эмоций, применяемых в чувствительных контекстах (медицина, HR, право), а не только итоговая точность классификации?", "options": ["Возможность объяснить, на основе каких конкретных признаков (например, каких AU) модель сделала вывод, позволяет экспертам верифицировать решение, выявлять предвзятость и обоснованно доверять или не доверять результату в ответственных ситуациях", "Интерпретируемость не имеет значения, если итоговая точность модели достаточно высока", "Модели распознавания эмоций никогда не могут быть интерпретируемыми по своей природе", "В чувствительных контекстах точность классификации всегда важнее возможности объяснить решение"], "correct": 0, "explain": "В высокорисковых применениях (медицинская диагностика, юридические решения, найм) 'чёрный ящик' с высокой точностью, но без объяснения, недостаточен — важна возможность проверить, что решение основано на релевантных, а не случайных или предвзятых признаках.", "usage": {"code": false, "without": "Полагаются на чёрный ящик с высокой accuracy без объяснения решения.", "with": "Дают объяснение через конкретные признаки (какие AU сработали), доступное эксперту.", "benefit": "верификация и обоснованное доверие в медицине/HR/праве"}}, {"q": "HR-специалист хочет использовать систему автоматического анализа эмоций на видеоинтервью для оценки 'искренности' кандидатов. Какая существенная методологическая проблема здесь наиболее важна?", "options": ["Автоматический анализ эмоций всегда лучше человеческой оценки без каких-либо ограничений", "Такие системы дают стопроцентно точный и объективный результат, поэтому проблем не возникает", "Автоматическое распознавание эмоций по лицу имеет ограниченную точность и подвержено культурным/индивидуальным различиям, поэтому использование его как единственного и решающего критерия оценки кандидата этически и методологически сомнительно", "Использование подобных систем не имеет никаких этических последствий"], "correct": 2, "explain": "Помимо технических ограничений точности, использование анализа эмоций для принятия решений о найме поднимает серьёзные этические вопросы (предвзятость, недостаточная научная обоснованность связи 'выражение = внутреннее состояние'), из-за чего в ряде юрисдикций такие практики уже ограничиваются законодательно.", "usage": {"code": false, "without": "HR отсеивает кандидатов по авто-оценке 'искренности' с видеоинтервью как решающему критерию.", "with": "Понимают ограниченную точность и культурную/индивидуальную вариативность, не делают её единственным основанием.", "benefit": "этичность и юридическая защищённость решений о найме"}}, {"q": "Психолог замечает, что клиент во время описания травматичного события на короткое время демонстрирует выражение, похожее на едва заметную улыбку, а затем возвращается к грустному выражению. Как это можно интерпретировать с учётом теории микровыражений?", "options": ["Любая улыбка всегда означает искреннюю радость независимо от контекста", "Микровыражения никогда не появляются в разговоре о травматичных событиях", "Это может быть микровыражение, отражающее сложную или противоречивую внутреннюю реакцию (например, смущение или неловкость), а не обязательно радость — требуется осторожная интерпретация в общем контексте, а не поспешный вывод", "Это точно означает, что клиент лжёт о своих чувствах"], "correct": 2, "explain": "Интерпретация микровыражений требует осторожности: одно и то же движение мышц (например, лёгкое поднятие уголков губ) может быть связано с разными внутренними состояниями (смущение, неловкость, нервная реакция), а не только с однозначной радостью или обманом.", "usage": {"code": false, "without": "Мелькнувшую улыбку клиента сразу трактуют как радость или доказательство лжи.", "with": "Рассматривают её осторожно — как возможное смущение или неловкость — в общем контексте беседы.", "benefit": "избегает поспешных клинических выводов"}}, {"q": "Разработчик системы видеоконференций хочет добавить функцию 'индикатор вовлечённости' на основе анализа выражений лиц участников. Какая практическая и этическая проблема здесь наиболее значима?", "options": ["Помимо технических ограничений точности анализа эмоций, постоянный мониторинг мимики участников поднимает серьёзные вопросы приватности и может создавать давление, влияющее на естественное поведение людей", "Подобная функция технически тривиальна и не создаёт никаких сложностей или рисков", "Анализ вовлечённости по лицу гарантированно точен для всех участников без исключений", "Мониторинг выражений лица участников видеозвонков не связан с вопросами приватности"], "correct": 0, "explain": "Постоянный анализ мимики в реальном времени поднимает вопросы согласия, приватности данных и возможного психологического давления ('эффект слежки'), помимо базовых технических ограничений точности такого анализа.", "usage": {"code": false, "without": "Включают постоянный 'индикатор вовлечённости' по лицам всех участников звонка.", "with": "Учитывают приватность и согласие, понимая эффект слежки и ограничения точности анализа.", "benefit": "нет психологического давления и нарушения приватности"}}, {"q": "Маркетинговая компания тестирует рекламный ролик, анализируя выражения лиц зрителей камерой, и делает вывод о 'позитивной реакции' на основе увеличения активности мышц, поднимающих уголки губ. Какая интерпретационная ошибка здесь возможна?", "options": ["Активация одной мышечной группы (например, зигоматической, поднимающей уголки губ) может быть вызвана не только истинной радостью, но и социальной улыбкой, смущением или иными причинами — без учёта, например, активации мышц вокруг глаз, вывод о 'позитивной реакции' может быть поспешным", "Такой анализ гарантированно и точно измеряет истинное отношение зрителя к ролику", "Мышцы лица не связаны с выражением эмоционального отношения к контенту", "Активация любой лицевой мышцы всегда однозначно указывает на конкретную эмоцию без исключений"], "correct": 0, "explain": "Без дополнительных признаков (например, активации orbicularis oculi, как в 'улыбке Дюшена') одного лишь движения уголков губ недостаточно для надёжного вывода об искренней позитивной эмоции — это классическая ошибка чрезмерного упрощения при интерпретации мимики.", "usage": {"code": false, "without": "Фиксируют подъём уголков губ зрителя и делают вывод о 'позитивной реакции' на рекламу.", "with": "Проверяют и мышцы вокруг глаз (AU6): без них это может быть соц.улыбка или смущение.", "benefit": "не принимают вежливую улыбку за искреннюю симпатию"}}, {"q": "В ходе судебного разбирательства эксперт предлагает использовать анализ микровыражений подсудимого как доказательство лжи. Какое возражение с научной точки зрения наиболее обосновано?", "options": ["Анализ микровыражений является общепризнанным и стопроцентно надёжным методом детекции лжи в судебной практике", "Научная база, связывающая конкретные микровыражения с однозначным фактом лжи, недостаточно надёжна и общепринята для использования в качестве судебного доказательства — корреляция не равна строгому детектору лжи", "Любое эмоциональное выражение лица является прямым и однозначным доказательством в суде", "Микровыражения никогда не могут быть связаны с эмоциональным состоянием человека"], "correct": 1, "explain": "Несмотря на популярность идеи 'чтения лжи по лицу' в массовой культуре, научное сообщество в целом скептически относится к использованию анализа микровыражений как надёжного, юридически обоснованного детектора лжи из-за недостаточной доказательной базы для такого строгого вывода.", "usage": {"code": false, "without": "Подают анализ микровыражений подсудимого как доказательство лжи в суде.", "with": "Признают, что связь мимики с ложью научно не обоснована для строгого юридического вывода.", "benefit": "решение не строится на недоказанном 'детекторе лжи'"}}, {"q": "Разработчик системы безопасности аэропорта хочет использовать автоматическое распознавание 'подозрительных' эмоций (например, повышенной тревожности) по лицам пассажиров. Какая фундаментальная проблема ограничивает надёжность такого подхода?", "options": ["Системы распознавания эмоций гарантированно различают тревожность из-за угрозы и тревожность по бытовым причинам", "Повышенная тревожность может быть вызвана множеством безобидных причин (страх перед полётом, спешка, личный стресс), не связанных с реальной угрозой, что делает эмоциональное состояние ненадёжным индикатором злого умысла", "Тревожность всегда однозначно указывает на злонамеренные действия человека", "Эмоциональное состояние человека не может быть распознано автоматической системой в принципе"], "correct": 1, "explain": "Эмоциональное состояние — не прямой индикатор намерений; множество факторов, не связанных с угрозой, могут вызывать схожие внешние проявления тревожности, что делает подобные системы безопасности потенциально дискриминационными и ненадёжными без дополнительного контекста.", "usage": {"code": false, "without": "Считают повышенную тревожность пассажира признаком злого умысла.", "with": "Учитывают безобидные причины (страх полёта, спешка, стресс), не связанные с угрозой.", "benefit": "меньше ложных тревог и дискриминации на досмотре"}}, {"q": "Терапевт использует видеозапись сессии, чтобы позже проанализировать невербальные сигналы клиента, которые не были замечены в реальном времени. Какое преимущество это иллюстрирует по сравнению с анализом 'на лету'?", "options": ["Просмотр записи никогда не даёт дополнительной информации по сравнению с наблюдением в реальном времени", "Микровыражения одинаково легко заметить и в реальном времени, и на замедленном повторе", "Видеозапись сессии полезна только для юридических целей, а не для клинического анализа", "Повторный, замедленный просмотр записи позволяет заметить краткие микровыражения и тонкие изменения мимики, которые физически сложно уловить человеческим глазом в реальном времени разговора"], "correct": 3, "explain": "Из-за крайне малой длительности микровыражений (доли секунды) их гораздо легче выявить при замедленном повторном просмотре записи, чем в реальном времени живого разговора — этим же принципом пользуются и обучающие программы по распознаванию микровыражений (например, METT).", "usage": {"code": false, "without": "Терапевт пытается уловить все невербальные сигналы вживую и упускает мелькнувшие.", "with": "Пересматривает видеозапись сессии в замедленном темпе, отлавливая микровыражения.", "benefit": "заметны краткие сигналы, недоступные глазу в живом разговоре"}}, {"q": "Компания разрабатывает систему для водителей, определяющую усталость по анализу лица (моргание, зевота, положение головы). Почему для надёжности такой системы важно комбинировать несколько признаков, а не полагаться только на один (например, только частоту моргания)?", "options": ["Отдельные признаки (только моргание, только зевота) могут давать ложные срабатывания или пропуски из-за индивидуальных различий и посторонних факторов, тогда как комбинация нескольких независимых сигналов повышает надёжность обнаружения истинного состояния усталости", "Зевота и положение головы не связаны с состоянием усталости водителя", "Частота моргания — абсолютно надёжный и достаточный признак усталости сам по себе", "Комбинирование нескольких признаков всегда снижает точность системы по сравнению с одним признаком"], "correct": 0, "explain": "Как и в общем анализе эмоций, комбинация независимых индикаторов (мультимодальность) снижает вероятность ошибки по сравнению с одним сигналом, который может быть подвержен индивидуальным особенностям или посторонним помехам (например, обычное частое моргание у конкретного человека).", "usage": {"code": true, "without": "tired = blink_rate > k  # один признак -> ложные срабатывания", "with": "tired = vote(blink_rate, yawn_freq, head_pose)  # несколько сигналов", "benefit": "комбинация независимых признаков надёжнее одного"}}, {"q": "Учитель на онлайн-занятии использует программу, которая анализирует лица учеников и сообщает об уровне их 'вовлечённости' в реальном времени. Ученик с расстройством аутистического спектра, чья мимика менее выразительна, стабильно получает низкие оценки вовлечённости, хотя внимательно следит за уроком. Какой вывод наиболее уместен?", "options": ["Система всегда абсолютно точно определяет реальный уровень внимания независимо от индивидуальных особенностей мимики", "Такие системы не нужно подвергать сомнению, если они основаны на анализе лица", "Низкая оценка вовлечённости точно означает, что ученик не следит за уроком", "Система, вероятно, недостаточно учитывает индивидуальные и нейроразнообразные особенности мимики, и её выводы не стоит интерпретировать как объективную истину об уровне внимания конкретного ученика"], "correct": 3, "explain": "Системы анализа эмоций/вовлечённости калибруются на 'типичных' проявлениях мимики и могут систематически неверно интерпретировать поведение людей с иной, менее выразительной или атипичной мимикой (например, при расстройствах аутистического спектра), что подчёркивает риски слепого доверия таким метрикам.", "usage": {"code": false, "without": "Единая калибровка мимики выдаёт 'низкую вовлечённость' любому с маловыразительным лицом.", "with": "Учитывают нейроразнообразие и атипичную мимику (напр. РАС), не считая метрику истиной.", "benefit": "не наказывает внимательных, но менее выразительных учеников"}}, {"q": "Согласно системе FACS, комбинация AU6 (поднятие щёк) и AU12 (поднятие уголков губ) традиционно связывается с каким выражением?", "options": ["Гнев", "Искренняя улыбка (радость)", "Отвращение", "Страх"], "correct": 1, "explain": "Комбинация AU6 (напряжение мышцы вокруг глаз, поднимающей щёки) и AU12 (поднятие уголков губ) — классическое описание искренней ('дюшеновской') улыбки радости в системе FACS.", "usage": {"code": true, "without": "if 'AU12' in au: emotion = 'радость'  # только рот, не отличить вежливую", "with": "if {'AU6', 'AU12'} <= au: emotion = 'искренняя радость'", "benefit": "различает дюшеновскую улыбку по паре AU6+AU12"}}, {"q": "Если микровыражение длится в среднем 1/15 секунды, сколько кадров видео при частоте съёмки 30 кадров в секунду (fps) потребуется для его полного захвата?", "options": ["30 кадров", "2 кадра", "1 кадр", "15 кадров"], "correct": 1, "explain": "1/15 секунды при 30 кадрах в секунду соответствует 30×(1/15)=2 кадрам — именно поэтому для надёжного захвата микровыражений часто нужна повышенная частота съёмки.", "usage": {"code": true, "without": "frames = 1  # 'наверное, хватит одного кадра'", "with": "frames = round(30 * (1/15))  # = 2", "benefit": "точно: при 30 fps нужно 2 кадра"}}, {"q": "В исследовании из 200 испытуемых 150 правильно распознали эмоцию 'удивление' по фотографии. Какова доля правильных ответов (в процентах)?", "options": ["85%", "50%", "75%", "65%"], "correct": 2, "explain": "150/200=0.75=75%.", "usage": {"code": true, "without": "share = 50  # прикидка 'примерно половина'", "with": "share = 150/200 * 100  # = 75.0", "benefit": "точная доля правильных ответов: 75%"}}, {"q": "Система автоматического распознавания эмоций классифицирует 500 изображений, из которых верно определила эмоцию на 425. Какова точность (accuracy) системы?", "options": ["90%", "80%", "75%", "85%"], "correct": 3, "explain": "425/500=0.85=85%.", "usage": {"code": true, "without": "acc = 90  # округлил вверх на глаз", "with": "acc = 425/500 * 100  # = 85.0", "benefit": "точная accuracy системы: 85%"}}, {"q": "Если частота съёмки видео составляет 25 кадров в секунду, сколько миллисекунд длится один кадр?", "options": ["40 мс", "10 мс", "100 мс", "25 мс"], "correct": 0, "explain": "1000 мс / 25 кадров = 40 мс на кадр.", "usage": {"code": true, "without": "ms = 25  # спутал число кадров с миллисекундами", "with": "ms = 1000/25  # = 40.0", "benefit": "длительность одного кадра: 40 мс"}}, {"q": "В двумерной модели valence-arousal эмоция расположена в координатах (valence=+0.8, arousal=+0.7). Какой квадрант это соответствует, и какой эмоции это может примерно соответствовать?", "options": ["Высокая позитивная валентность и высокое возбуждение — например, восторг/радость", "Высокая валентность и низкое возбуждение — например, спокойствие", "Низкая валентность и низкое возбуждение — например, скука", "Низкая валентность и высокое возбуждение — например, гнев"], "correct": 0, "explain": "Положительные значения обеих координат (valence и arousal) соответствуют квадранту 'высокая позитивная валентность + высокая активация', типичному для таких эмоций, как восторг или радостное возбуждение.", "usage": {"code": true, "without": "quad = '?'  # угадываю квадрант по названию эмоции", "with": "v, a = 0.8, 0.7\nquad = 'позитив+возбуждение' if v > 0 and a > 0 else '...'", "benefit": "оба знака '+' -> восторг/радость"}}, {"q": "В базе данных из 1000 видео с выражениями лиц 40% помечены как 'нейтральные'. Сколько видео помечено другими эмоциями?", "options": ["400", "900", "600", "500"], "correct": 2, "explain": "Если 40% (400 видео) нейтральные, то оставшиеся 60% (600 видео) соответствуют другим эмоциям: 1000-400=600.", "usage": {"code": true, "without": "other = 400  # ошибочно взял долю нейтральных", "with": "other = 1000 - round(0.40 * 1000)  # = 600", "benefit": "600 видео помечены другими эмоциями"}}, {"q": "Эксперимент показал, что из 60 микровыражений, отмеченных экспертами при просмотре видео в реальном времени, было замечено только 12. Какова доля замеченных микровыражений?", "options": ["30%", "50%", "10%", "20%"], "correct": 3, "explain": "12/60=0.2=20% — иллюстрация того, насколько сложно улавливать микровыражения без замедленного повтора.", "usage": {"code": true, "without": "share = 50  # 'вроде около половины'", "with": "share = 12/60 * 100  # = 20.0", "benefit": "вживую замечено лишь 20% микровыражений"}}, {"q": "Обучающий датасет для системы распознавания эмоций содержит 10000 изображений, разделённых на 7 классов эмоций поровну. Сколько изображений приходится в среднем на один класс?", "options": ["1000", "1300", "700", "1429"], "correct": 3, "explain": "10000/7 ≈ 1428.57, округляя — примерно 1429 изображений на класс.", "usage": {"code": true, "without": "per = 1000  # округлил для ровного счёта", "with": "per = round(10000/7)  # ≈ 1429", "benefit": "≈1429 изображений в среднем на класс"}}, {"q": "Система распознавания эмоций имеет precision 0.8 и recall 0.6 для класса 'гнев'. Чему приблизительно равен F1-score (2·P·R/(P+R))?", "options": ["0.70", "0.69", "0.60", "0.80"], "correct": 1, "explain": "F1=2×0.8×0.6/(0.8+0.6)=0.96/1.4≈0.686≈0.69.", "usage": {"code": true, "without": "f1 = (0.8 + 0.6)/2  # среднее арифметическое — неверно", "with": "f1 = 2*0.8*0.6 / (0.8 + 0.6)  # ≈ 0.69", "benefit": "гармоническое среднее F1 ≈ 0.69"}}, {"q": "Из 50 испытуемых 10 продемонстрировали 'улыбку Дюшена' (искреннюю), а остальные — только вежливую улыбку. Какова доля искренних улыбок в процентах?", "options": ["50%", "40%", "10%", "20%"], "correct": 3, "explain": "10/50=0.2=20%.", "usage": {"code": true, "without": "share = 50  # прикидка на глаз", "with": "share = 10/50 * 100  # = 20.0", "benefit": "доля искренних улыбок: 20%"}}, {"q": "Датасет эмоций содержит 6 базовых классов и 1 нейтральный класс поровну распределённых на 3500 изображений. Сколько изображений приходится на класс 'гнев'?", "options": ["583", "400", "500", "350"], "correct": 2, "explain": "3500/7=500 изображений на класс.", "usage": {"code": true, "without": "per = 583  # поделил на 6, забыл нейтральный класс", "with": "per = 3500/7  # = 500 (6 базовых + нейтральный)", "benefit": "500 изображений на класс 'гнев'"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
