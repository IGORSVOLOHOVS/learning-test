<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Распознавание эмоций человека по лицу</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

<script>
(function () {
  const TEST_ID = "facial_emotion_recognition";
  const QUESTIONS = [{"q": "Что такое базовые (универсальные) эмоции согласно теории Пола Экмана?", "options": ["Влечение, доверие и предвкушение по классификации Плутчика", "Радость, грусть, гнев, страх, удивление и отвращение", "Сложные эмоции, возникающие только у взрослых людей", "Любые эмоции, у которых есть название в каком-либо языке"], "correct": 1, "explain": "Экман выделил набор базовых эмоций, которые, по его исследованиям, распознаются по мимике представителями разных культур схожим образом.", "usage": {"code": false, "without": "Каждый разметчик клеит эмоциям свои произвольные ярлыки ('тоска', 'интерес', 'кайф'), схемы у всех разные и несопоставимые.", "with": "Используют канонический набор базовых эмоций Экмана (радость, грусть, гнев, страх, удивление, отвращение, презрение) как фиксированные классы.", "benefit": "единая согласованная разметка, сравнимая между наборами данных"}}, {"q": "Что такое микровыражение лица (micro-expression)?", "options": ["Полностью осознанная и намеренно контролируемая гримаса лица", "Выражение, заметное лишь на фото, но не в живом кадре", "Мимика, свойственная исключительно грудным младенцам", "Краткое непроизвольное выражение, выдающее скрытую эмоцию"], "correct": 3, "explain": "Микровыражения — быстрые (обычно 1/25–1/5 секунды) непроизвольные сокращения лицевых мышц, которые сложно подделать или подавить полностью.", "usage": {"code": false, "without": "Смотрят только на явные длительные гримасы и считают их полной картиной чувств.", "with": "Целенаправленно ищут краткие (доли секунды) непроизвольные микровыражения, которые человек не успевает подавить.", "benefit": "видно скрываемую истинную реакцию, а не только показное"}}, {"q": "Что такое система кодирования лицевых движений FACS (Facial Action Coding System)?", "options": ["Метод измерения температуры тела по инфракрасному снимку лица", "Разбор мимики на комбинации 'единиц действия' лицевых мышц", "Алгоритм сжатия и кодирования видеозаписей с лицами людей", "Система классификации жестовых языков для перевода речи"], "correct": 1, "explain": "FACS (Экман и Фризен) разбивает мимику на отдельные, анатомически обоснованные 'единицы действия' (AU), комбинации которых соответствуют определённым эмоциональным выражениям.", "usage": {"code": false, "without": "Мимику описывают сразу целым ярлыком 'это гнев', полагаясь на субъективное впечатление.", "with": "Раскладывают выражение на комбинации анатомических единиц действия (AU) по системе FACS.", "benefit": "воспроизводимое анатомическое описание вместо догадки"}}, {"q": "Что такое 'единица действия' (Action Unit, AU) в системе FACS?", "options": ["Единица измерения расстояния между зрачками глаз человека", "Название одной из конкретных базовых эмоций по Экману", "Минимальное движение одной лицевой мышцы или группы мышц", "Полное эмоциональное выражение лица, взятое целиком"], "correct": 2, "explain": "AU — атомарная единица FACS, соответствующая сокращению конкретной мышцы (например, AU12 — поднятие уголков губ), комбинации AU формируют распознаваемые эмоциональные выражения.", "usage": {"code": false, "without": "Оперируют только целыми выражениями, не имея языка для отдельных движений мышц.", "with": "Описывают мимику атомарными единицами действия (напр. AU12 — подъём уголков губ), из которых собираются выражения.", "benefit": "точный разбор любого выражения на составные движения"}}, {"q": "Какую роль играют глаза и область вокруг них при распознавании искренности улыбки (например, 'улыбка Дюшена')?", "options": ["Область вокруг глаз никак не связана с искренностью улыбки человека", "Искренность улыбки целиком определяется шириной раскрытия рта человека", "У искренней улыбки работают и мышцы глаз, у вежливой — лишь рот", "Улыбка Дюшена — это улыбка, которая заведомо не бывает искренней"], "correct": 2, "explain": "'Улыбка Дюшена' названа по имени французского врача, впервые описавшего, что подлинная радость активирует круговую мышцу глаза (orbicularis oculi), которую трудно контролировать сознательно, в отличие от одной лишь улыбки ртом.", "usage": {"code": false, "without": "Судят об искренности улыбки по одной лишь ширине рта.", "with": "Проверяют сокращение мышц вокруг глаз (AU6, 'гусиные лапки') — маркер улыбки Дюшена.", "benefit": "отличают подлинную радость от вежливой улыбки"}}, {"q": "Что затрудняет распознавание эмоций исключительно по статичному изображению лица по сравнению с видео?", "options": ["Распознавание по фото и по видео одинаково точно абсолютно во всех случаях", "Видео не содержит никакой дополнительной информации помимо фото", "Статичные снимки всегда дают более точный результат, чем видео", "Статичный кадр не передаёт динамику выражения, важную для трактовки"], "correct": 3, "explain": "Динамика выражения (скорость появления, длительность, последовательность движений) несёт дополнительную информацию о подлинности и типе эмоции, которую невозможно получить из единственного статичного кадра.", "usage": {"code": true, "without": "emotion = classify(single_frame)  # только одна поза, динамика потеряна", "with": "clip = frames[t0:t1]\nspeed = onset_speed(clip)  # скорость появления улыбки\nemotion = classify_dynamic(clip, speed)", "benefit": "учитывает скорость и последовательность движений, а не одну позу"}}, {"q": "Что такое 'valence' (валентность) и 'arousal' (возбуждение) в размерностной (dimensional) модели эмоций?", "options": ["Возбуждение относится исключительно к физической нагрузке и спорту", "Валентность измеряет лишь продолжительность эмоции во времени", "Валентность и возбуждение — это синонимы одного и того же понятия", "Валентность — приятность эмоции, возбуждение — сила её активации"], "correct": 3, "explain": "Размерностные модели эмоций (например, круговая модель Рассела) описывают эмоцию через две независимые оси: валентность (приятно/неприятно) и возбуждение (спокойствие/высокая активация).", "usage": {"code": true, "without": "emotion = softmax(logits)  # только 7 дискретных категорий", "with": "valence, arousal = model(face)  # 2 непрерывные оси\n# (+0.8, +0.7) -> радостное возбуждение", "benefit": "описывает промежуточные и смешанные состояния"}}, {"q": "Какова роль контекста (ситуации, культуры, предыдущих взаимодействий) в интерпретации выражения лица человеком-наблюдателем?", "options": ["Контекст ситуации никогда не влияет на интерпретацию мимики человека", "Контекст важен только для устной речи, но совсем не для мимики", "Контекст заметно меняет трактовку одного и того же выражения лица", "Выражение лица трактуется одинаково при любой ситуации и культуре"], "correct": 2, "explain": "Многочисленные исследования показывают, что одно и то же выражение лица может интерпретироваться по-разному в зависимости от контекста ситуации, языка тела и культурных норм наблюдателя.", "usage": {"code": false, "without": "Трактуют выражение лица изолированно, вырвав его из ситуации.", "with": "Интерпретируют мимику вместе с контекстом ситуации, культурой и предысторией взаимодействия.", "benefit": "меньше грубых ошибок интерпретации одного и того же лица"}}, {"q": "Что такое алекситимия применительно к распознаванию эмоций?", "options": ["Синдром, вызывающий постоянную непроизвольную улыбку на лице человека", "Заболевание глаз, мешающее различать выражения чужих лиц", "Способность безошибочно распознавать абсолютно любые эмоции", "Трудность в осознании и словесном описании собственных эмоций"], "correct": 3, "explain": "Алекситимия — трудности в идентификации и вербализации собственных эмоциональных состояний, что в некоторых исследованиях связывают также с трудностями в распознавании эмоций других людей.", "usage": {"code": false, "without": "Предполагают, что любой человек одинаково легко осознаёт и называет свои эмоции.", "with": "Учитывают алекситимию — трудность в осознании и вербализации эмоций у части людей.", "benefit": "адекватная оценка и помощь тем, кому сложно называть чувства"}}, {"q": "Что такое 'эффект собственной расы' (own-race bias/effect) в распознавании лиц и эмоций?", "options": ["Полное отсутствие различий в распознавании лиц между любыми группами", "Способность распознавать эмоции лишь у людей той же профессии", "Метод, применяемый исключительно в судебной экспертизе лиц", "Люди в среднем точнее распознают лица и мимику своей этногруппы"], "correct": 3, "explain": "Own-race effect — задокументированный в психологии эффект, при котором из-за большего опыта взаимодействия с представителями своей группы люди в среднем точнее распознают лица и мимику 'своей' расы/этничности, что имеет значение и для оценки предвзятости автоматических систем.", "usage": {"code": true, "without": "acc = accuracy(y_true, y_pred)  # одна общая цифра скрывает провалы", "with": "for g in groups:\n    print(g, accuracy(y_true[g], y_pred[g]))  # точность по расам/группам", "benefit": "вскрывает падение точности на недопредставленных группах"}}, {"q": "Почему автоматическое распознавание эмоций по лицу (компьютерным зрением) обычно использует комбинацию признаков лица (например, положение ключевых точек — landmarks), а не просто сырые пиксели изображения?", "options": ["Ключевые точки лица вообще не применяются в системах анализа эмоций", "Ключевые точки (глаза, брови, рот) прямо кодируют геометрию мимики", "Распознавание эмоций невозможно без видео очень высокого разрешения", "Сырые пиксели всегда дают более точный результат, чем признаки лица"], "correct": 1, "explain": "Landmarks (ключевые точки контуров глаз, бровей, рта) дают компактное, интерпретируемое представление геометрии лица, изменение которой напрямую связано с активацией конкретных лицевых мышц (AU) и, соответственно, эмоций.", "usage": {"code": true, "without": "X = image.reshape(-1)  # сырые пиксели: шум фона, освещения", "with": "X = detect_landmarks(image)  # 68 точек: глаза, брови, рот", "benefit": "компактные интерпретируемые признаки геометрии мимики"}}, {"q": "Почему система FACS считается более объективным инструментом анализа мимики, чем прямая классификация 'на глаз' tions": ["Размерностные модели не способны описывать интенсивность переживания", "Valence и arousal — это просто другие названия для базовых эмоций", "Категориальная модель всегда точнее описывает любое состояние человека без потерь", "Пространство valence-arousal вмещает промежуточные, смешанные состояния"], "correct": 3, "explain": "Непрерывное пространство даёт возможность разместить любое эмоциональное состояние где-то на плоскости valence-arousal, тогда как жёсткая категоризация теряет нюансы промежуточных или смешанных эмоций.", "usage": {"code": true, "without": "loss = cross_entropy(logits, label)  # жёсткие категории теряют нюанс", "with": "loss = mse(pred_va, true_va)  # регрессия valence-arousal", "benefit": "смешанные эмоции не втискиваются в одну категорию"}}, {"q": "Как культурные 'правила отображения' (display rules) могут привести к расхождению между внутренне переживаемой эмоцией и наблюдаемым выражением лица?", "options": ["Display rules всегда точно совпадают с реальным внутренним состоянием человека", "Расхождение выражения и внутреннего состояния невозможно в принципе", "Культурные нормы никогда не влияют на внешнее проявление эмоций", "В части культур улыбкой маскируют смущение, скрывая истинное состояние"], "correct": 3, "explain": "Display rules — культурно специфичные нормы о том, когда и как уместно проявлять определённые эмоции, что может приводить к сознательной или полусознательной маскировке подлинного эмоционального состояния наблюдаемым выражением лица.", "usage": {"code": false, "without": "Принимают наблюдаемую мимику за прямое отражение внутреннего состояния.", "with": "Учитывают, что культурные нормы могут маскировать эмоцию (улыбкой скрывают смущение).", "benefit": "не путают показанное с реально переживаемым"}}, {"q": "Почему одновременная активация противоречивых Action Units (например, характерных и для радости, и для отвращения) может свидетельствовать о смешанной или маскируемой эмоции?", "options": ["Только одна Action Unit вания эмоций важно явно решить, будет ли она использовать категориальную модель (список эмоций) или размерностную модель (valence-arousal), и как это влияет на выбор функции потерь при обучении?", "options": ["Выбор модели эмоций вообще не влияет на архитектуру и обучение всей системы", "Обе модели всегда берут одинаковую функцию потерь и выходной слой сети", "Размерностная модель эмоций несовместима с методами машинного обучения", "Категории — классификация с кросс-энтропией, valence-arousal — регрессия"], "correct": 3, "explain": "Архитектурное решение (классификация дискретных категорий vs регрессия непрерывных координат valence/arousal) напрямую определяет тип выходного слоя модели (softmax для категорий vs линейный выход для регрессии) и соответствующую функцию потерь.", "usage": {"code": true, "without": "out = Linear(n, 7); loss = mse(out, y)  # регрессия для категорий — неверно", "with": "# категории: softmax + cross_entropy\n# valence-arousal: linear + mse", "benefit": "выходной слой и функция потерь соответствуют модели эмоций"}}, {"q": "Как компромисс между чувствительностью (recall) и специфичностью (precision) проявляется при проектировании системы обнаружения конкретной эмоции, например, 'дистресса' в системе мониторинга благополучия?", "options": ["Precision и recall всегда меняются в одном направлении без компромисса", "Компромисс между precision и recall не имеет практического значения", "Специфичность и чувствительность — это одно и то же самое понятие", "Высокий recall ловит больше случаев, но и больше ложных тревог"], "correct": 3, "explain": "Как и в других задачах бинарной классификации (например, медицинском скрининге), выбор порога чувствительности определяет баланс между пропущенными случаями и ложными тревогами — решение зависит от конкретного контекста применения и цены каждого типа ошибки.", "usage": {"code": true, "without": "pred = prob > 0.5  # фиксированный порог наугад", "with": "thr = tune_threshold(cost_miss=10, cost_fp=1)\npred = моция, вывод не проверить", "with": "au = au_detector(image)  # интерпретируемый слой\nemotion = interpret(au)  # переиспользуем для боли, микровыражений", "benefit": "валидируемое анатомическое представление и переиспользование"}}, {"q": "Как выбор обучающего датасета (постановочные, наигранные эмоции в лаборатории vs 'дикие' (in-the-wild) эмоции из реальных видео) архитектурно влияет на обобщающую способность системы распознавания эмоций в реальных условиях?", "options": ["Естественные ('дикие') данные вообще не используются при обучении систем", "Модели с постановочных данных плохо идут на тонкие реальные эмоции", "Постановочные датасеты всегда дают лучшее качество в реальной жизни", "Тип данных, постановочный или естественный, не влияет на качество"], "correct": 1, "explain": "Классическая проблема сдвига распределения: постановочные эмоции в лаборатории часто более выражены и однозначны, чем тонкие, смешанные проявления в реальной жизни, поэтому современные датасеты (например, AffectNet, FER-Wild) всё больше опираются на 'дикие' данные для лучшего обобщения.", "usage": {"code": false, "without": "Обучают модель на постановочных, преувеличенных лабораторных выражениях.", "with": "Добавляют 'дикие' (in-the-wild) данные из реальных видео с тонкими смешанными эмоциями.", "benefit": "лучшее обобщение на реальные условия эксплуатации"}}, {"q": "Почему интерпретируемость (объяснимость) результата важна при проектировании систем распознавания эмоций, применяемых в чувствительных контекстах (медицина, HR, право), а не только итоговая точность классификации?", "options": ["Объяснение через конкретные AU даёт эксперту проверить решение модели", "Интерпретируемость не важна, если итоговая точность модели высока", "Модели распознавания эмоций никогда не бывают интерпретируемыми в принципе", "В чувствительных сферах точность всегда важнее объяснимости решения"], "correct": 0, "explain": "В высокорисковых применениях (медицинская диагностика, юридические решения, найм) 'чёрный ящик' с высокой точностью, но без объяснения, недостаточен — важна возможность проверить, что решение основано на релевантных, а не случайных или предвзятых признаках.", "usage": {"code": false, "without": "Полагаются на чёрный ящик с высокой accuracy без объяснения решения.", "with": "Дают объяснение через конкретные признаки (какие AU сработали), доступное эксперту.", "benefit": "верификация и обоснованное доверие в медицине/HR/праве"}}, {"q": "HR-специалист хочет использовать систему автоматического анализа эмоций на видеоинтервью для оценки 'искренности' кандидатов. Какая существенная методологическая проблема здесь наиболее важна?", "options": ["Автоматический анализ эмоций всегда точнее любой человеческой оценки", "Такие системы дают стопроцентно точный и полностью объективный результат", "Точность анализа ограничена, делать его решающим критерием найма нельзя", "Использование подобных систем не несёт никаких этических последствий"], "correct": 2, "explain": "Помимо технических ограничений точности, использование анализа эмоций для принятия решений о найме поднимает серьёзные этические вопросы (предвзятость, недостаточная научная обоснованность связи 'выражение = внутреннее состояние'), из-за чего в ряде юрисдикций такие практики уже ограничиваются законодательно.", "usage": {"code": false, "without": "HR отсеивает кандидатов по авто-оценке 'искренности' с видеоинтервью как решающему критерию.", "with": "Понимают ограниченную точность и культурную/индивидуальную вариативность, не делают её единственным основанием.", "benefit": "этичность и юридическая защищённость решений о найме"}}, {"q": "Психолог замечает, что клиент во время описания травматичного события на короткое время демонстрирует выражение, похожее на едва заметную улыбку, а затем возвращается к грустному выражению. Как это можно интерпретировать с учётом теории микровыражений?", "options": ["Любая улыбка всегда означает искреннюю радость независимо от контекста", "Микровыражения вообще никогда не бка здесь возможна?", "options": ["Подъём уголков губ бывает и при вежливой улыбке — вывод пока поспешен", "Такой анализ гарантированно и точно измеряет отношение зрителя к ролику", "Мышцы лица никак не связаны с эмоциональным отношением к контенту", "Активация любой лицевой мышцы всегда однозначно указывает на эмоцию"], "correct": 0, "explain": "Без дополнительных признаков (например, активации orbicularis oculi, как в 'улыбке Дюшена') одного лишь движения уголков губ недостаточно для надёжного вывода об искренней позитивной эмоции — это классическая ошибка чрезмерного упрощения при интерпретации мимики.", "usage": {"code": false, "without": "Фиксируют подъём уголков губ зрителя и делают вывод о 'позитивной реакции' на рекламу.", "with": "Проверяют и мышцы вокруг глаз (AU6): без них это может быть соц.улыбка или смущение.", "benefit": "не принимают вежливую улыбку за искреннюю симпатию"}}, {"q": "В ходе судебного разбирательства эксперт предлагает использовать анализ микровыражений подсудимого как доказательство лжи. Какое возражение с научной точки зрения наиболее обосновано?", "options": ["Анализ микровыражений — признанный и надёжный судебный детектор лжи", "Связь микровыражений с ложью научно не доказана для суда строго", "Любое выражение лица служит прямым и весомым доказательством в суде", "Микровыражения вообще никогда не связаны с состоянием человека"], "correct": 1, "explain": "Несмотря на популярность идеи 'чтения лжи по лицу' в массовой культуре, научное сообщество в целом скептически относится к использованию анализа микровыражений как надёжного, юридически обоснованного детектора лжи из-за недостаточной доказательной базы для такого строгого вывода.", "usage": {"code": false, "without": "Подают анализ микровыражений подсудимого как доказательство лжи в суде.", "with": "Признают, что связь мимики с ложью научно не обоснована для строгого юридического вывода.", "benefit": "решение не строится на недоказанном 'детекторе лжи'"}}, {"q": "Разработчик системы фии. Какова доля правильных ответов (в процентах)?", "options": ["85%", "50%", "75%", "65%"], "correct": 2, "explain": "150/200=0.75=75%.", "usage": {"code": true, "without": "share = 50  # прикидка 'примерно половина'", "with": "share = 150/200 * 100  # = 75.0", "benefit": "точная доля правильных ответов: 75%"}}, {"q": "Система автоматического распознавания эмоций классифицирует 500 изображений, из которых верно определила эмоцию на 425. Какова точность (accuracy) системы?", "options": ["90%", "80%", "75%", "85%"], "correct": 3, "explain": "425/500=0.85=85%.", "usage": {"code": true, "without": "acc = 90  # округлил вверх на глаз", "with": "acc = 425/500 * 100  # = 85.0", "benefit": "точная accuracy системы: 85%"}}, {"q": "Если частота съёмки видео составляет 25 кадров в секунду, сколько миллисекунд длится один кадр?", "options": ["40 мс", "10 мс", "100 мс", "25 мс"], "correct": 0, "explain": "1000 мс / 25 кадров = 40 мс на кадр.", "usage": {"code": true, "without": "ms = 25  # спутал число кадров с миллисекундами", "with": "ms = 1000/25  # = 40.0", "benefit": "длительность одного кадра: 40 мс"}}, {"q": "В двумерной модели valence-arousal эмоция расположена в координатах (valence=+0.8, arousal=+0.7). Какой квадрант это соответствует, и какой эмоции это может примерно соответствовать?", "options": ["Высокая валентность и высокое возбуждение — восторг или радость", "Высокая валентность и низкое возбуждение — покой, умиротворение", "Низкая валентность и низкое возбуждение — скука или апатия", "Низкая валентность и высокое возбуждение — гнев или ярость"], "correct": 0, "explain": "Положительные значения обеих координат (valence и arousal) соответствуют квадранту 'высокая позитивная валентность + высокая активация', типичному для таких эмоций, как восторг или радостное возбуждение.", "usage": {"code": true, "without": "quad = '?'  # угадываю квадрант по названию эмоции", "with": "v, a = 0.8, 0.7\nquad = 'позитив+возбуждение' if v > 0 and a > 0 else '...'", "benefit": "оба знака '+' -> восторг/радость"}}, {"q": "В базе данных из 1000 видео с выражениями лиц 40% помечены как 'нейтральные'. Сколько видео помечено другими эмоциями?", "options": ["400", "900", "600", "500"], "correct": 2, "explain": "Если 40% (400 видео) нейтральные, то оставшиеся 60% (600 видео) соответствуют другим эмоциям: 1000-400=600.", "usage": {"code": true, "without": "other = 400  # ошибочно взял долю нейтральных", "with": "other = 1000 - round(0.40 * 1000)  # = 600", "benefit": "600 видео помечены другими эмоциями"}}, {"q": "Эксперимент показал, что из 60 микровыражений, отмеченных экспертами при просмотре видео в реальном времени, было замечено только 12. Какова доля замеченных микровыражений?", "options": ["30%", "50%", "10%", "20%"], "correct": 3, "explain": "12/60=0.2=20% — иллюстрация того, насколько сложно улавливать микровыражения без замедленного повтора.", "usage": {"code": true, "without": "share = 50  # 'вроде около половины'", "with": "share = 12/60 * 100  # = 20.0", "benefit": "вживую замечено лишь 20% микровыражений"}}, {"q": "Обучающий датасет для системы распознавания эмоций содержит 10000 изображений, разделённых на 7 классов эмоций поровну. Сколько изображений приходится в среднем на один класс?", "options": ["1000", "1300", "700", "1429"], "correct": 3, "explain": "10000/7 ≈ 1428.57, округляя — примерно 1429 изображений на класс.", "usage": {"code": true, "without": "per = 1000  # округлил для ровного счёта", "with": "per = round(10000/7)  # ≈ 1429", "benefit": "≈1429 изображений в среднем на класс"}}, {"q": "Система распознавания эмоций имеет precision 0.8 и recall 0.6 для класса 'гнев'. Чему приблизительно равен F1-score (2·P·R/(P+R))?", "options": ["0.70", "0.69", "0.60", "0.80"], "correct": 1, "explain": "F1=2×0.8×0.6/(0.8+0.6)=0.96/1.4≈0.686≈0.69.", "usage": {"code": true, "without": "f1 = (0.8 + 0.6)/2  # среднее арифметическое — неверно", "with": "f1 = 2*0.8*0.6 / (0.8 + 0.6)  # ≈ 0.69", "benefit": "гармоническое среднее F1 ≈ 0.69"}}       html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
