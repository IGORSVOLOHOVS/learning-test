<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Техники первого впечатления</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
    </div>
    <h1>Техники первого впечатления</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "first_impression";
  const QUESTIONS = [{"q": "Что такое 'эффект первичности' (primacy effect) применительно к первому впечатлению?", "options": ["Тенденция запоминать только последнюю информацию о человеке", "Тенденция придавать особое значение первой полученной информации о человеке, которая формирует последующее восприятие", "Полное отсутствие влияния первой информации на дальнейшее восприятие", "Способность мгновенно забывать первое впечатление"], "correct": 1, "explain": "Эффект первичности — психологическая закономерность, согласно которой информация, полученная первой, оказывает непропорционально сильное влияние на итоговое впечатление о человеке."}, {"q": "Сколько секунд, согласно распространённым исследованиям, обычно требуется человеку для формирования первого впечатления о новом собеседнике?", "options": ["Около 30 минут", "Около 5-7 секунд", "Около 1 часа", "Первое впечатление не формируется быстро в принципе"], "correct": 1, "explain": "Многочисленные исследования показывают, что базовая оценка (доверие, компетентность, привлекательность) формируется в течение нескольких секунд после первого визуального контакта."}, {"q": "Что такое 'гало-эффект' (halo effect) в контексте формирования впечатления о человеке?", "options": ["Тенденция считать физически привлекательных людей более компетентными, добрыми или умными без достаточных на то оснований", "Эффект полного отсутствия предвзятости при оценке других людей", "Способность точно оценивать компетентность человека по его словам", "Явление, применимое только к оценке произведений искусства"], "correct": 0, "explain": "Гало-эффект — когнитивное искажение, при котором одна заметная позитивная черта (например, привлекательность) неосознанно 'переносится' на оценку других, не связанных напрямую качеств человека."}, {"q": "Какую роль играет невербальная коммуникация (мимика, поза, жесты) в формировании первого впечатления?", "options": ["Невербальные сигналы не влияют на первое впечатление, важны только слова", "Невербальные сигналы оказывают значительное, часто даже большее влияние на первое впечатление, чем содержание речи", "Первое впечатление формируется исключительно на основе внешности без учёта поведения", "Невербальная коммуникация важна только при повторных встречах"], "correct": 1, "explain": "Многие исследования коммуникации подчёркивают значимую роль невербальных сигналов (поза, зрительный контакт, интонация) в формировании первого впечатления, зачастую наравне или сильнее вербального содержания."}, {"q": "Что такое зеркальное отражение (mirroring) в технике построения раппорта (доверительного контакта)?", "options": ["Буквальное копирование одежды собеседника", "Ненавязчивое, естественное отражение позы, темпа речи или жестов собеседника для создания ощущения взаимопонимания", "Повторение слов собеседника дословно в оскорбительной манере", "Техника, применимая только в психотерапии"], "correct": 1, "explain": "Mirroring — техника невербального построения раппорта, основанная на тонком, ненавязчивом отражении позы, темпа и манеры собеседника, что подсознательно воспринимается как сходство и располагает к доверию."}, {"q": "Что означает термин 'раппорт' в контексте межличностного общения?", "options": ["Формальный документ о встрече", "Ощущение взаимопонимания, доверия и комфортной связи между людьми в общении", "Техника критики собеседника", "Синоним конфликта в разговоре"], "correct": 1, "explain": "Раппорт — состояние взаимного доверия и лёгкости в общении, при котором собеседники чувствуют себя услышанными и понятыми друг другом."}, {"q": "Как расстояние между собеседниками (проксемика) может влиять на первое впечатление о комфортности общения?", "options": ["Слишком близкое расстояние может вызывать дискомфорт и восприниматься как навязчивость, тогда как комфортная дистанция способствует более позитивному впечатлению", "Физическое расстояние между людьми никогда не влияет на восприятие общения", "Чем ближе собеседники находятся друг к другу, тем лучше впечатление в любой культуре", "Проксемика относится только к архитектуре зданий, а не к общению людей"], "correct": 0, "explain": "Проксемика (изучение использования пространства в общении) показывает, что нарушение комфортной для человека и культуры дистанции может вызвать негативную реакцию, тогда как уместное расстояние способствует комфортному впечатлению."}, {"q": "Что такое активное слушание как техника формирования позитивного первого впечатления?", "options": ["Молчаливое ожидание своей очереди говорить, не обращая внимания на собеседника", "Практика полного, вовлечённого внимания к собеседнику, включая уточняющие вопросы и невербальные сигналы понимания", "Техника перебивания собеседника для демонстрации своей компетентности", "Метод, применяемый только в деловых переговорах"], "correct": 1, "explain": "Активное слушание включает полную вовлечённость в слова собеседника, невербальные подтверждения внимания (кивки, зрительный контакт) и уточняющие вопросы, что создаёт ощущение искреннего интереса."}, {"q": "Какова роль искреннего зрительного контакта в первом впечатлении в большинстве западных культур общения?", "options": ["Умеренный, естественный зрительный контакт обычно воспринимается как признак уверенности и заинтересованности", "Зрительный контакт всегда воспринимается негативно в любой культуре", "Отсутствие зрительного контакта всегда производит более благоприятное впечатление", "Зрительный контакт не имеет значения для формирования впечатления о человеке"], "correct": 0, "explain": "В большинстве западных культур умеренный зрительный контакт ассоциируется с уверенностью, честностью и заинтересованностью в разговоре, хотя чрезмерный пристальный взгляд может восприниматься как давящий."}, {"q": "Что такое 'эффект недавности' (recency effect) и чем он отличается от эффекта первичности?", "options": ["Recency effect — тенденция лучше запоминать последнюю по времени информацию о человеке, в отличие от primacy effect, где сильнее влияет самая первая информация", "Recency effect и primacy effect — это два названия одного и того же явления", "Recency effect относится только к запоминанию списков слов, но не людей", "Recency effect всегда полностью нейтрализует эффект первичности"], "correct": 0, "explain": "Recency effect и primacy effect — два разных, иногда конкурирующих психологических эффекта, влияющих на память и впечатление: первый акцентирует последнюю полученную информацию, второй — первую."}, {"q": "Почему эффект первичности в формировании впечатления особенно устойчив к последующей противоречащей информации (эффект 'якорения')?", "options": ["Первая информация формирует своего рода интерпретационную рамку ('якорь'), через которую последующая информация неосознанно фильтруется и интерпретируется в соответствии с уже сложившимся впечатлением", "Последующая информация всегда полностью перезаписывает первое впечатление без остатка", "Первое впечатление никогда не влияет на интерпретацию последующей информации", "Эффект первичности проявляется только в письменной, но не в устной коммуникации"], "correct": 0, "explain": "Психологический механизм 'якорения' объясняет устойчивость первого впечатления: оно создаёт когнитивную рамку, из-за которой неоднозначная последующая информация склонна интерпретироваться в духе уже сформированного мнения (эффект подтверждения)."}, {"q": "Почему техника mirroring (отражения позы/темпа речи) работает эффективнее, когда она выполняется тонко и с задержкой, а не мгновенно и буквально?", "options": ["Слишком точное и быстрое копирование может быть замечено собеседником и восприниматься как манипуляция или пародия, разрушая естественность и доверие, тогда как ненавязчивое отражение с небольшой задержкой воспринимается подсознательно", "Скорость и точность копирования не влияют на эффективность техники mirroring", "Мгновенное точное копирование всегда работает лучше отложенного и приблизительного", "Mirroring эффективен только при полном, буквальном повторении жестов собеседника"], "correct": 0, "explain": "Эффективный раппорт строится на подсознательном ощущении сходства; слишком явное, механическое копирование считывается сознательно и разрушает естественность взаимодействия, тогда как тонкое отражение с небольшой задержкой воспринимается органично."}, {"q": "Как гало-эффект может системно искажать оценку компетентности человека на собеседовании при найме?", "options": ["Интервьюер может неосознанно приписывать кандидату с привлекательной внешностью или уверенной речью более высокую профессиональную компетентность, чем это оправдано реальными навыками, что искажает объективность решения", "Гало-эффект не оказывает влияния на процесс собеседования при найме", "Интервьюеры полностью защищены от когнитивных искажений благодаря профессиональной подготовке", "Гало-эффект работает только в сторону занижения оценки компетентности кандидата"], "correct": 0, "explain": "Гало-эффект — одна из известных причин предвзятости при найме: заметные, но нерелевантные черты (внешность, уверенная манера речи) неосознанно 'переносятся' интервьюером на оценку профессиональных качеств, снижая объективность решения."}, {"q": "Почему согласованность (конгруэнтность) между вербальным сообщением и невербальными сигналами критически важна для формирования доверительного первого впечатления?", "options": ["Когда слова и невербальные сигналы противоречат друг другу (например, человек говорит 'всё отлично' с напряжённой мимикой), собеседники склонны больше доверять невербальным сигналам, что создаёт ощущение неискренности", "Слова всегда воспринимаются как более достоверный источник информации, чем невербальные сигналы", "Несоответствие между словами и невербаликой никогда не замечается собеседниками", "Конгруэнтность имеет значение только в письменной коммуникации"], "correct": 0, "explain": "Классическое наблюдение в психологии коммуникации: при противоречии между вербальным и невербальным каналом люди чаще доверяют невербальным сигналам как менее подконтрольным сознанию, что может подрывать воспринимаемую искренность."}, {"q": "Почему проксемика (комфортная дистанция общения) не универсальна, а зависит от культурного контекста собеседников?", "options": ["Разные культуры имеют разные нормы личного пространства (например, в некоторых культурах ближе расположение при разговоре считается нормой, в других — вторжением), и нарушение этих ожиданий может негативно повлиять на впечатление", "Комфортная дистанция общения абсолютно одинакова во всех культурах мира", "Проксемика не связана с культурными нормами, а определяется исключительно индивидуальными предпочтениями", "Культурные различия в проксемике не влияют на впечатление о собеседнике"], "correct": 0, "explain": "Антрополог Эдвард Холл, введший термин 'проксемика', показал, что нормы личного пространства существенно различаются между культурами, и несоблюдение ожидаемой дистанции может восприниматься как навязчивость или, наоборот, холодность."}, {"q": "Как активное слушание одновременно решает две задачи в первом впечатлении — получение информации и создание позитивного впечатления о слушающем?", "options": ["Активное слушание не только помогает лучше понять собеседника, но и невербально сигнализирует о заинтересованности и уважении, что само по себе формирует позитивное впечатление о слушающем как о внимательном и располагающем к себе человеке", "Активное слушание влияет только на понимание информации, но не на впечатление о самом слушающем", "Формирование хорошего впечатления о слушающем никак не связано с качеством его слушания", "Активное слушание — техника, значимая только для говорящего, а не для слушающего"], "correct": 0, "explain": "Активное слушание работает 'в две стороны': помогает лучше усвоить информацию от собеседника и одновременно транслирует внимание и уважение, что позитивно влияет на восприятие самого слушающего как приятного и располагающего собеседника."}, {"q": "Почему интонация и темп речи могут повлиять на первое впечатление о компетентности и уверенности говорящего сильнее, чем содержание сказанного?", "options": ["Паравербальные сигналы (интонация, темп, громкость) часто воспринимаются менее осознанно, но эмоционально сильнее, чем логическое содержание речи, особенно в первые секунды знакомства, когда слушатель ещё не успел глубоко обработать смысл слов", "Интонация и темп речи никогда не влияют на восприятие компетентности говорящего", "Содержание речи всегда важнее паравербальных сигналов для первого впечатления", "Паравербальные сигналы значимы только в письменной, но не в устной коммуникации"], "correct": 0, "explain": "В классических моделях коммуникации (например, исследования Мейерабиана) паравербальные и невербальные сигналы часто оказывают более быстрое и эмоционально сильное воздействие на восприятие, чем непосредственно смысловое содержание, особенно в первые моменты знакомства."}, {"q": "Почему улыбка, воспринимаемая как искренняя (с активацией мышц вокруг глаз), сильнее влияет на первое впечатление, чем формальная 'дежурная' улыбка?", "options": ["Искренняя улыбка активирует дополнительные признаки (например, задействование orbicularis oculi), которые люди подсознательно интерпретируют как маркер подлинного, а не наигранного расположения, повышая воспринимаемую доверительность", "Любая улыбка, независимо от вовлечённых мышц, воспринимается абсолютно одинаково", "Формальная улыбка всегда сильнее влияет на впечатление, чем искренняя", "Улыбка не оказывает влияния на формирование первого впечатления"], "correct": 0, "explain": "Как и в общем анализе мимики ('улыбка Дюшена'), люди подсознательно улавливают признаки подлинности выражения лица, и искренняя улыбка обычно вызывает более сильное позитивное впечатление, чем формальная, воспринимаемая как менее подлинная."}, {"q": "Как принцип взаимности (reciprocity) в социальной психологии связан с построением доверия при первой встрече?", "options": ["Проявление открытости, интереса или небольшой любезности со стороны одного собеседника часто вызывает у другого ответное желание проявить аналогичную открытость или доброжелательность, ускоряя формирование доверия", "Принцип взаимности не имеет отношения к формированию первого впечатления", "Люди никогда не отвечают взаимностью на проявленную к ним доброжелательность", "Взаимность работает только в долгосрочных отношениях, но не при первой встрече"], "correct": 0, "explain": "Принцип взаимности — фундаментальная социально-психологическая закономерность: небольшие проявления открытости или внимания со стороны одного человека часто побуждают собеседника отвечать тем же, что ускоряет формирование раппорта уже при первой встрече."}, {"q": "Почему чрезмерная демонстрация уверенности (например, доминирующая поза, излишне громкая речь) иногда производит противоположный эффект — воспринимается как высокомерие, а не компетентность?", "options": ["Восприятие уверенности нелинейно связано с её внешними проявлениями — избыточная демонстрация статуса может нарушать ожидаемый баланс между уверенностью и уважением к собеседнику, считываясь как доминирование, а не компетентность", "Чем сильнее демонстрируется уверенность, тем всегда более позитивным становится первое впечатление", "Уверенность и высокомерие воспринимаются собеседниками абсолютно одинаково", "Громкость речи не влияет на восприятие уверенности или высокомерия говорящего"], "correct": 0, "explain": "Существует оптимальный, но не безграничный уровень демонстрации уверенности; за определённым порогом сигналы статуса и доминирования начинают восприниматься как неуважение к собеседнику или чрезмерное самомнение, что портит первое впечатление."}, {"q": "Как взаимодействуют между собой невербальный, паравербальный (тон, темп) и вербальный (содержание слов) каналы коммуникации при формировании целостного первого впечатления?", "options": ["Все три канала работают одновременно и должны быть согласованы (конгруэнтны) друг с другом — впечатление формируется как совокупная интерпретация всех каналов, а не любого одного из них изолированно", "Только вербальный канал (слова) имеет значение, остальные каналы полностью игнорируются слушателем", "Каналы коммуникации всегда действуют независимо друг от друга без взаимного влияния", "Невербальный и паравербальный каналы работают только в письменной коммуникации"], "correct": 0, "explain": "Первое впечатление формируется как интегральная оценка сразу нескольких каналов коммуникации, и рассогласование между ними (например, уверенные слова при неуверенной позе) снижает целостность и достоверность воспринимаемого сообщения."}, {"q": "Почему построение раппорта часто описывают как процесс, требующий постепенного перехода от общих, безопасных тем к более личным, а не наоборот?", "options": ["Постепенное углубление раскрытия (self-disclosure) соответствует естественной динамике доверия — слишком быстрый переход к личным темам может восприниматься как нарушение социальных границ и вызывать настороженность", "Начинать разговор с очень личных тем всегда эффективнее для быстрого построения доверия", "Порядок тем разговора не влияет на скорость и качество построения раппорта", "Раппорт строится исключительно на невербальных сигналах, независимо от содержания тем разговора"], "correct": 0, "explain": "Теория постепенного социального раскрытия (social penetration theory) описывает, что доверие обычно строится поэтапно — от поверхностных тем к более личным, и нарушение этой последовательности может восприниматься как неуместное вторжение в личное пространство собеседника."}, {"q": "Как асимметрия информации между собеседниками (один знает о другом много благодаря соцсетям, другой — ничего) может повлиять на динамику первой личной встречи?", "options": ["Человек с большей информацией может неосознанно вести себя иначе (более фамильярно или с предвзятыми ожиданиями), что может создать асимметричное и потенциально дискомфортное для другой стороны первое впечатление", "Асимметрия информации никогда не влияет на поведение или впечатление во время личной встречи", "Наличие информации из соцсетей всегда одинаково известно обеим сторонам заранее", "Предварительная информация о собеседнике не может повлиять на формирование ожиданий"], "correct": 0, "explain": "Предварительное знание (например, из соцсетей) может формировать ожидания и предвзятости ещё до личной встречи, потенциально создавая асимметричную динамику, если одна сторона не осознаёт объём информации, доступной другой."}, {"q": "Почему тренеры по коммуникации часто советуют репетировать не только содержание, но и невербальную часть важного разговора (открытую позу, спокойные жесты)?", "options": ["Так как невербальные сигналы формируются во многом бессознательно и сильно влияют на впечатление, целенаправленная подготовка помогает сделать их более согласованными с намеченным сообщением, а не оставлять на волю случайной тревожности", "Невербальная часть общения не поддаётся сознательной подготовке или улучшению", "Репетиция невербального поведения никогда не влияет на итоговое впечатление слушателей", "Единственное, что стоит репетировать перед важным разговором — точные слова и фразы"], "correct": 0, "explain": "Поскольку невербальные сигналы (поза, жесты, мимика) сильно влияют на впечатление и могут непроизвольно выдавать тревожность, сознательная работа над ними (наравне с содержанием) помогает сформировать более цельное и уверенное впечатление."}, {"q": "Как понятие 'социального доказательства' (social proof) может влиять на первое впечатление о человеке ещё до личного знакомства (например, через рекомендации общих знакомых)?", "options": ["Положительные отзывы или рекомендации от людей, которым доверяет наблюдатель, создают благоприятный предварительный настрой, действующий аналогично эффекту первичности ещё до фактической личной встречи", "Мнение общих знакомых никогда не влияет на восприятие человека при первой личной встрече", "Социальное доказательство работает только в маркетинге товаров, но не применимо к восприятию людей", "Первое впечатление формируется исключительно в момент личной встречи без учёта предварительной информации"], "correct": 0, "explain": "Рекомендации и отзывы доверенных источников формируют своего рода 'предварительный якорь' восприятия, действующий похожим образом на эффект первичности, но ещё до фактического личного контакта."}, {"q": "Почему асимметрия власти/статуса между собеседниками (например, начальник и подчинённый на первой встрече) может системно искажать невербальную динамику общения?", "options": ["Более низкий статус часто ассоциируется с более сдержанной, менее экспансивной позой и меньшим зрительным контактом, что может ошибочно интерпретироваться как неуверенность или незаинтересованность, хотя это часто просто социально обусловленное поведение", "Статус собеседников никогда не влияет на невербальное поведение при первой встрече", "Люди с более высоким статусом всегда ведут себя идентично людям с более низким статусом", "Асимметрия статуса влияет только на содержание разговора, но не на невербальные сигналы"], "correct": 0, "explain": "Исследования невербального поведения показывают, что статусные различия систематически влияют на позу, зрительный контакт и использование пространства, и важно отличать социально обусловленную сдержанность от индивидуальных черт человека."}, {"q": "Как эффект 'ошибки атрибуции' (fundamental attribution error) может исказить интерпретацию поведения нового знакомого при первой встрече, если он выглядит рассеянным или нервным?", "options": ["Наблюдатель склонен объяснять поведение собеседника его личностными чертами (например, 'он нервный человек'), недооценивая ситуативные факторы (например, он опаздывал или плохо себя чувствует), что может привести к необоснованно негативному впечатлению", "Ошибка фундаментальной атрибуции не влияет на формирование первого впечатления о новых знакомых", "Люди всегда правильно учитывают ситуативные факторы при оценке поведения незнакомцев", "Рассеянное поведение всегда объясняется исключительно личностными чертами человека, а не ситуацией"], "correct": 0, "explain": "Фундаментальная ошибка атрибуции — известная когнитивная предвзятость, при которой наблюдатели переоценивают личностные причины поведения других людей и недооценивают ситуативный контекст, что особенно рискованно при формировании первого впечатления по единственной встрече."}, {"q": "Почему баланс между самораскрытием (рассказом о себе) и интересом к собеседнику считается ключевым архитектурным принципом успешного построения раппорта на новой встрече, а не просто 'больше слушать' или 'больше говорить о себе'?", "options": ["Односторонний разговор (либо только слушание, либо только рассказ о себе) не создаёт ощущения взаимного, двустороннего обмена, тогда как сбалансированное чередование внимания к собеседнику и уместного самораскрытия способствует ощущению настоящего диалога и связи", "Идеальная стратегия — говорить только о себе, полностью игнорируя интерес к собеседнику", "Идеальная стратегия — только слушать, никогда не делясь информацией о себе", "Баланс между слушанием и самораскрытием не влияет на качество формируемого раппорта"], "correct": 0, "explain": "Раппорт строится на ощущении взаимного, а не одностороннего обмена; крайности (только слушание без ответного раскрытия или монолог о себе без интереса к собеседнику) одинаково мешают формированию естественного двустороннего доверия."}, {"q": "Как понимание 'эффекта простого пребывания в поле зрения' (mere exposure effect) может architecturally объяснить, почему повторные короткие взаимодействия (например, случайные встречи в офисе) со временем улучшают первое (при более близком знакомстве) впечатление о малознакомом человеке?", "options": ["Согласно эффекту простого воздействия, повторяющееся, даже нейтральное знакомство с стимулом (в данном случае — с человеком) со временем повышает симпатию к нему при прочих равных условиях, постепенно смягчая или пересматривая первоначальное нейтральное или неопределённое впечатление", "Повторные встречи никогда не влияют на впечатление о малознакомом человеке", "Эффект простого пребывания в поле зрения применим только к рекламе товаров, а не к людям", "Первое впечатление всегда остаётся неизменным вне зависимости от последующих взаимодействий"], "correct": 0, "explain": "Mere exposure effect (эффект простого предъявления), изученный психологом Робертом Зайонцем, показывает, что повторяющееся, даже нейтральное знакомство со стимулом обычно увеличивает симпатию к нему — это объясняет, почему многократные короткие встречи могут постепенно улучшать первоначально нейтральное впечатление о человеке."}, {"q": "На собеседовании интервьюер за первые 10 секунд составил благоприятное мнение о кандидате из-за уверенного рукопожатия и улыбки, и в течение оставшейся беседы интерпретировал неоднозначные ответы кандидата в положительном ключе. Какой психологический эффект здесь иллюстрируется?", "options": ["Эффект первичности (и связанное с ним 'якорение') — первое благоприятное впечатление создало интерпретационную рамку для последующей неоднозначной информации", "Это иллюстрирует эффект недавности, а не первичности", "Такое поведение интервьюера противоречит всем известным психологическим закономерностям", "Эффект первичности проявляется только в письменных резюме, а не в личной беседе"], "correct": 0, "explain": "Классический пример эффекта первичности и якорения: сильное первое впечатление стало линзой, через которую интерпретировалась дальнейшая неоднозначная информация о кандидате."}, {"q": "На деловой встрече партнёр из другой культуры стоит существенно ближе, чем привычно для собеседника, что вызывает у него подсознательный дискомфорт и негативное первое впечатление, хотя партнёр не имел такого намерения. Как избежать подобных недоразумений в межкультурном общении?", "options": ["Заранее изучить и учитывать культурные нормы личного пространства (проксемики) собеседника, не интерпретируя автоматически чужое поведение через призму собственной культурной нормы", "Проксемические нормы одинаковы во всех культурах, поэтому такая проблема не может возникнуть", "Единственное решение — полностью избегать личного общения с представителями других культур", "Дискомфорт от нарушения личного пространства всегда означает недоброжелательность собеседника"], "correct": 0, "explain": "Осведомлённость о культурных различиях в проксемике и готовность интерпретировать поведение собеседника в контексте его культурных норм (а не автоматически через собственные ожидания) помогает избежать необоснованных негативных первых впечатлений."}, {"q": "Продавец на встрече с клиентом сознательно копирует позу и темп речи клиента (mirroring), но делает это слишком явно и быстро, из-за чего клиент чувствует себя некомфортно и подозревает манипуляцию. Что здесь было сделано неверно с точки зрения техники?", "options": ["Mirroring был выполнен слишком буквально и без естественной задержки, что сделало технику заметной и разрушило её эффект — правильное применение требует тонкости и небольшой временной задержки", "Mirroring никогда не работает в продажах независимо от способа исполнения", "Единственная ошибка — то, что продавец вообще пытался использовать эту технику", "Клиент отреагировал неправильно, техника была применена образцово"], "correct": 0, "explain": "Как и в общем описании техники mirroring, её эффективность держится на подсознательности восприятия — слишком явное и синхронное копирование считывается сознательно, вызывая обратный эффект (подозрение вместо доверия)."}, {"q": "Кандидат на собеседовании говорит уверенным тоном о своих достижениях, но при этом избегает зрительного контакта и постоянно скрещивает руки. Интервьюер формирует впечатление о недостаточной искренности кандидата. Какой принцип здесь применим?", "options": ["Несоответствие (неконгруэнтность) между вербальным содержанием (уверенные слова) и невербальными сигналами (избегание контакта, закрытая поза) часто интерпретируется слушателем как признак неискренности или дискомфорта", "Слова кандидата должны были полностью нейтрализовать влияние его невербального поведения", "Скрещенные руки и избегание взгляда никогда не влияют на восприятие искренности", "Интервьюер сделал ошибочный вывод, так как невербальные сигналы не имеют значения"], "correct": 0, "explain": "Классический случай конгруэнтности/неконгруэнтности сигналов: когда невербальные сигналы противоречат словам, слушатели склонны больше доверять первым, что и объясняет впечатление интервьюера о неискренности, даже если содержание слов было позитивным."}, {"q": "Специалист по нетворкингу советует на мероприятиях сначала внимательно слушать нового знакомого, а не сразу рассказывать о себе. Как это соотносится с принципом взаимности и построением раппорта?", "options": ["Проявление искреннего интереса к собеседнику (активное слушание) часто вызывает ответное расположение и желание собеседника также быть внимательным и открытым, ускоряя формирование доверия по принципу взаимности", "Слушание собеседника не имеет значения для установления раппорта на мероприятиях", "Начинать разговор всегда эффективнее с рассказа о себе, а не со слушания", "Принцип взаимности применим только в длительных отношениях, а не при коротком нетворкинге"], "correct": 0, "explain": "Это прямое применение принципа взаимности к нетворкингу: проявленное внимание и интерес к собеседнику часто побуждают его ответить взаимностью, что ускоряет формирование доверия и позитивного впечатления в короткой встрече."}, {"q": "На корпоративном тренинге сотрудника учат, что чрезмерно громкая и напористая манера речи на встречах с клиентами может восприниматься негативно, даже если содержание речи полезно и профессионально. Какой урок здесь наиболее уместен?", "options": ["Уверенность в подаче важна, но должна быть сбалансирована с уважением к собеседнику — избыточная демонстрация доминирования может испортить первое впечатление, несмотря на качественное содержание", "Чем громче и напористее манера речи, тем лучше первое впечатление в любой ситуации с клиентами", "Манера подачи никогда не влияет на восприятие клиентом содержания встречи", "Единственный способ произвести хорошее впечатление — говорить максимально тихо и неуверенно"], "correct": 0, "explain": "Это иллюстрация того, что оптимальный уровень демонстрации уверенности существует в определённом диапазоне — за пределами этого диапазона избыточная напористость считывается как неуважение или давление, портя впечатление вне зависимости от качества содержания."}, {"q": "На видеособеседовании кандидат забыл, что камера расположена ниже уровня глаз, из-за чего создаётся впечатление, будто он смотрит 'свысока' на интервьюера. Какое простое техническое решение помогло бы улучшить первое впечатление в данном случае?", "options": ["Поднять камеру на уровень глаз, чтобы визуальный контакт воспринимался как более естественный и равный, а не как взгляд 'сверху вниз'", "Расположение камеры не влияет на восприятие видеозвонка интервьюером", "Единственное решение — полностью отказаться от использования видео на собеседованиях", "Взгляд 'сверху вниз' на видео всегда воспринимается позитивно как признак уверенности"], "correct": 0, "explain": "На видеозвонках угол камеры влияет на воспринимаемый 'взгляд' говорящего; расположение камеры ниже уровня глаз создаёт эффект взгляда сверху вниз, который может подсознательно восприниматься как высокомерие, хотя это чисто техническая деталь, а не характеристика человека."}, {"q": "Консультант советует клиенту перед важной встречей не просто репетировать слова презентации, но и сознательно настроить своё эмоциональное состояние (снизить тревожность, найти спокойную уверенность). Почему это важно с точки зрения первого впечатления, помимо содержания самой презентации?", "options": ["Внутреннее эмоциональное состояние человека проявляется через множество трудноконтролируемых невербальных сигналов (микровыражения, тон голоса, поза), и подготовка одного лишь вербального содержания без учёта эмоционального состояния может дать неконгруэнтное, менее убедительное впечатление", "Эмоциональное состояние говорящего не влияет на восприятие его презентации слушателями", "Единственное, что имеет значение для первого впечатления — точность произнесённых слов", "Тревожность говорящего никогда не считывается собеседниками невербально"], "correct": 0, "explain": "Так как невербальные сигналы (во многом непроизвольные) сильно влияют на восприятие искренности и уверенности, простой подготовки текста презентации недостаточно — эмоциональное состояние говорящего 'просачивается' через микровыражения и паравербальные сигналы, влияя на итоговое впечатление."}, {"q": "Новый сотрудник за первую неделю произвёл впечатление замкнутого и незаинтересованного человека, так как избегал зрительного контакта и говорил тихо, хотя позже выяснилось, что он просто сильно нервничал в новом коллективе. Какой вывод наиболее уместен для коллег в подобных ситуациях?", "options": ["Стоит с осторожностью относиться к быстрым выводам о личности человека по ограниченному невербальному поведению в непривычной для него ситуации, учитывая возможное влияние ситуативных факторов (стресс, новизна обстановки), а не только устойчивых личностных черт", "Тихая речь и избегание взгляда всегда однозначно означают незаинтересованность и замкнутость характера", "Первое впечатление о новом сотруднике никогда не может быть пересмотрено впоследствии", "Нервозность в новой обстановке не может влиять на невербальное поведение человека"], "correct": 0, "explain": "Это практическое применение понимания ошибки фундаментальной атрибуции: разумно учитывать, что непривычная, стрессовая ситуация (новое место работы) сама по себе может временно влиять на невербальное поведение, не отражая устойчивых личностных черт."}, {"q": "Согласно распространённым исследованиям, первое впечатление формируется в среднем за 5-7 секунд. Сколько это примерно составляет в минутах?", "options": ["Около 0.1 минуты", "Около 1 минуты", "Около 5 минут", "Около 10 минут"], "correct": 0, "explain": "5-7 секунд / 60 секунд в минуте ≈ 0.08-0.12 минуты, то есть около 0.1 минуты."}, {"q": "Опрос 300 участников тренинга по коммуникации показал, что 240 из них признали важность невербальных сигналов в первом впечатлении. Какова доля признавших это в процентах?", "options": ["70%", "75%", "80%", "85%"], "correct": 2, "explain": "240/300=0.8=80%."}, {"q": "На встрече длительностью 60 минут первое впечатление, по исследованиям, формируется в первые 5-7 секунд. Какую примерно долю (в процентах) от всей встречи составляет этот промежуток?", "options": ["Менее 0.5%", "Около 5%", "Около 10%", "Около 20%"], "correct": 0, "explain": "7 секунд / 3600 секунд (60 минут) ≈ 0.19%, то есть менее 0.5% от всей длительности встречи."}, {"q": "В исследовании из 150 собеседований интервьюеры изменили итоговое мнение о кандидате после первых 5 минут разговора лишь в 15 случаях. Какова доля случаев, когда первое впечатление осталось неизменным?", "options": ["80%", "85%", "90%", "95%"], "correct": 2, "explain": "15/150=0.1=10% изменили мнение, значит 90% сохранили первоначальное впечатление неизменным."}, {"q": "Тренер по публичным выступлениям утверждает, что оптимальная частота зрительного контакта с аудиторией — удержание взгляда на одном человеке около 3-5 секунд, прежде чем переключиться. Если выступление длится 10 минут (600 секунд), сколько примерно 'переключений' взгляда произойдёт при среднем значении 4 секунды на человека?", "options": ["50", "100", "150", "200"], "correct": 2, "explain": "600 секунд / 4 секунды на одно удержание взгляда = 150 переключений."}, {"q": "В группе из 40 участников тренинга 25 сообщили, что осознанно применяли технику активного слушания в последней важной беседе. Какова доля применивших технику?", "options": ["50%", "62.5%", "70%", "75%"], "correct": 1, "explain": "25/40=0.625=62.5%."}, {"q": "Исследование показало, что кандидаты с искренней ('дюшеновской') улыбкой на видео-резюме получали приглашение на собеседование в 45 случаях из 120. Какова доля приглашённых?", "options": ["25%", "32.5%", "37.5%", "45%"], "correct": 2, "explain": "45/120=0.375=37.5%."}, {"q": "На деловой встрече дистанция между собеседниками сократилась с комфортных 1.2 метра до 0.5 метра. На сколько сантиметров уменьшилась дистанция?", "options": ["50 см", "60 см", "70 см", "120 см"], "correct": 2, "explain": "1.2 м = 120 см, 0.5 м = 50 см. Разница: 120-50=70 см."}, {"q": "На видеоинтервью средняя продолжительность удержания зрительного контакта с камерой у успешных кандидатов составила 65% времени разговора, а у менее успешных — 40%. На сколько процентных пунктов больше зрительного контакта было у успешных кандидатов?", "options": ["15 п.п.", "20 п.п.", "25 п.п.", "30 п.п."], "correct": 2, "explain": "65%-40%=25 процентных пунктов разницы."}, {"q": "В выборке из 80 деловых встреч в 60 случаях стороны, начавшие разговор с активного слушания, отметили более высокий уровень взаимного доверия по итогам встречи. Какова доля таких случаев?", "options": ["65%", "70%", "75%", "80%"], "correct": 2, "explain": "60/80=0.75=75%."}, {"q": "На тренинге по нетворкингу участники сообщили, что в среднем в первые 5 секунд знакомства формируют мнение по трём базовым признакам: внешность, поза и тон голоса. Если каждому признаку уделяется в среднем одинаковое время, сколько секунд приходится на один признак?", "options": ["1 секунда", "1.67 секунды", "2.5 секунды", "5 секунд"], "correct": 1, "explain": "5 секунд / 3 признака ≈ 1.67 секунды на признак."}, {"q": "Компания провела опрос 250 клиентов о первом впечатлении от менеджеров по продажам; 180 отметили важность зрительного контакта. Какова доля отметивших этот фактор?", "options": ["62%", "68%", "72%", "80%"], "correct": 2, "explain": "180/250=0.72=72%."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
