<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Библиотека diffusers (Python/ML)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/diffusers.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Библиотека diffusers (Python/ML)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "diffusers";
  const QUESTIONS = [{"q": "Что такое библиотека diffusers (Hugging Face)?", "options": ["Библиотека для работы с базами данных", "Библиотека Python для работы с диффузионными генеративными моделями (изображения, аудио и др.)", "Библиотека для веб-разработки на Python", "Инструмент для визуализации графиков"], "correct": 1, "explain": "diffusers — библиотека Hugging Face, предоставляющая готовые реализации диффузионных моделей, планировщиков (schedulers) и пайплайнов для генерации контента."}, {"q": "Что такое диффузионная модель (diffusion model) в общих чертах?", "options": ["Модель, которая последовательно удаляет шум из случайного шума, постепенно превращая его в осмысленное изображение", "Модель, которая только сжимает изображения без генерации", "Модель для классификации текста", "Алгоритм сортировки данных"], "correct": 0, "explain": "Диффузионные модели обучаются обращать процесс постепенного добавления шума, начиная с чистого шума и итеративно 'очищая' его до реалистичного изображения."}, {"q": "Что такое 'forward process' (прямой процесс) в диффузионных моделях?", "options": ["Процесс генерации итогового изображения из шума", "Процесс постепенного добавления гауссова шума к исходному изображению на протяжении многих шагов", "Процесс обучения текстового энкодера", "Процесс сохранения модели на диск"], "correct": 1, "explain": "Forward process — фиксированный (не обучаемый) процесс, постепенно превращающий реальные данные в чистый шум путём добавления гауссова шума на каждом шаге."}, {"q": "Что делает 'reverse process' (обратный процесс) в диффузионной модели?", "options": ["Добавляет шум к изображению", "Обучаемый процесс, предсказывающий, как убрать шум на каждом шаге, постепенно восстанавливая данные из шума", "Уменьшает разрешение изображения", "Сохраняет чекпоинт модели"], "correct": 1, "explain": "Обратный процесс — то, что обучается модель (обычно U-Net): предсказывать шум (или чистое изображение) на каждом шаге, чтобы обратить прямой процесс диффузии."}, {"q": "Какая архитектура нейросети чаще всего используется как основа для предсказания шума в диффузионных моделях изображений?", "options": ["U-Net", "Простой перцептрон", "Дерево решений", "Рекуррентная сеть без свёрток"], "correct": 0, "explain": "U-Net с энкодер-декодер структурой и skip-connections — стандартная архитектура для предсказания шума на каждом шаге диффузии благодаря хорошей работе с пространственной информацией."}, {"q": "Что такое 'scheduler' (планировщик) в библиотеке diffusers?", "options": ["Компонент, определяющий, как именно шум добавляется/убирается на каждом шаге, и сколько шагов используется при генерации", "Модуль для планирования обучения на нескольких GPU", "Список задач для выполнения после генерации", "Часть текстового энкодера"], "correct": 0, "explain": "Scheduler управляет расписанием шума (noise schedule) и алгоритмом шага денойзинга (например, DDPM, DDIM, Euler), влияя на качество и скорость генерации."}, {"q": "Что такое пайплайн (pipeline) в diffusers, например StableDiffusionPipeline?", "options": ["Отдельная функция потерь модели", "Высокоуровневый объект, объединяющий все компоненты (текстовый энкодер, U-Net, VAE, scheduler) для удобной генерации 'из коробки'", "Инструмент визуализации весов сети", "Формат хранения датасета"], "correct": 1, "explain": "Пайплайн инкапсулирует все шаги генерации (кодирование текста, денойзинг, декодирование) в единый удобный интерфейс, например pipeline(prompt) для генерации изображения."}, {"q": "Зачем в моделях вроде Stable Diffusion используется латентное пространство (latent diffusion), а не диффузия напрямую в пространстве пикселей?", "options": ["Работа в сжатом латентном пространстве (через VAE) значительно снижает вычислительные затраты по сравнению с диффузией на полном изображении в пикселях", "Латентное пространство используется только для ускорения загрузки модели", "Латентная диффузия даёт худшее качество, но большую скорость без других преимуществ", "Пиксельное пространство всегда быстрее латентного"], "correct": 0, "explain": "Latent Diffusion Models (LDM) выполняют процесс диффузии в сжатом латентном пространстве (например, в 8 раз меньше по каждой стороне), что резко снижает вычислительные требования при сохранении качества."}, {"q": "Какую роль играет текстовый энкодер (например, CLIP text encoder) в text-to-image диффузионных моделях?", "options": ["Он преобразует текстовый промпт в векторное представление (эмбеддинг), которое используется для управления процессом генерации изображения", "Он генерирует итоговое изображение напрямую из текста без диффузии", "Он сжимает изображение в латентный вектор", "Он используется только для проверки орфографии промпта"], "correct": 0, "explain": "Текстовый энкодер превращает промпт в эмбеддинги, которые внедряются в U-Net (обычно через cross-attention), направляя процесс денойзинга в сторону, соответствующую описанию."}, {"q": "Что такое guidance scale (или classifier-free guidance) при генерации изображений в diffusers?", "options": ["Параметр, определяющий, насколько сильно генерация должна следовать текстовому промпту, в противовес более 'свободной' генерации", "Параметр, определяющий разрешение итогового изображения", "Параметр, определяющий количество GPU для генерации", "Настройка формата сохраняемого файла"], "correct": 0, "explain": "Guidance scale усиливает влияние условного (текстового) сигнала на генерацию: более высокое значение — более точное следование промпту, но иногда с потерей разнообразия/естественности."}, {"q": "Почему увеличение числа шагов денойзинга (inference steps) обычно улучшает качество изображения, но с убывающей отдачей?", "options": ["Каждый дополнительный шаг даёт модели возможность точнее скорректировать предсказание, но после определённого момента дальнейшие шаги вносят всё меньшие улучшения при растущих вычислительных затратах", "Число шагов не влияет на качество генерации", "Больше шагов всегда линейно улучшает качество без ограничений", "Оптимальное число шагов всегда равно одному"], "correct": 0, "explain": "Процесс денойзинга постепенно сходится к финальному результату; после определённого числа шагов дополнительные итерации дают всё меньший прирост качества, что создаёт компромисс между скоростью и качеством."}, {"q": "В чём принципиальное отличие DDIM (Denoising Diffusion Implicit Models) от исходного DDPM с точки зрения процесса сэмплирования?", "options": ["DDIM использует детерминированный (не марковский по своей сути) процесс, позволяющий пропускать шаги и значительно ускорять генерацию при сохранении приемлемого качества", "DDIM всегда требует больше шагов, чем DDPM", "DDIM не может использовать предобученные веса DDPM-модели", "DDIM работает только для аудио, а не изображений"], "correct": 0, "explain": "DDIM переформулирует процесс сэмплирования так, что можно 'перепрыгивать' через шаги (не следуя строго последовательности обучения), что даёт значительное ускорение генерации по сравнению с классическим DDPM."}, {"q": "Почему модель в диффузионном процессе часто обучают предсказывать сам добавленный шум (ε), а не напрямую восстановленное чистое изображение?", "options": ["Предсказание шума даёт более простую, стабильную и хорошо обусловленную задачу обучения (близкую к предсказанию остатка), что эмпирически улучшает качество и стабильность обучения", "Предсказание шума технически невозможно в диффузионных моделях", "Предсказание чистого изображения всегда работает лучше и проще", "Выбор цели предсказания не влияет на результат обучения"], "correct": 0, "explain": "Параметризация через предсказание шума (ε-prediction) эмпирически даёт более стабильную оптимизацию по сравнению с прямым предсказанием x0, что стало стандартом со времён DDPM."}, {"q": "Как cross-attention между текстовыми эмбеддингами и картами признаков U-Net позволяет модели 'следовать' текстовому промпту при генерации изображения?", "options": ["На каждом слое U-Net визуальные признаки 'обращают внимание' на релевантные части текстового эмбеддинга, направляя генерацию конкретных визуальных деталей в соответствии с описанием", "Текстовый эмбеддинг используется только один раз в самом начале процесса без дальнейшего влияния", "Cross-attention заменяет собой весь процесс диффузии", "Текст и изображение обрабатываются полностью независимо без какого-либо взаимодействия"], "correct": 0, "explain": "Cross-attention слои внутри U-Net на каждом шаге денойзинга позволяют пространственным признакам изображения 'запрашивать' информацию из текстового эмбеддинга, обеспечивая тесную связь между промптом и генерируемым содержимым."}, {"q": "Почему классификатор-независимое управление (classifier-free guidance) стало более популярным, чем использование отдельного классификатора для направления генерации?", "options": ["Оно не требует обучения отдельной модели-классификатора и достигается простым сочетанием условной и безусловной генерации во время сэмплирования, упрощая пайплайн", "Classifier-free guidance требует значительно больше вычислительных ресурсов, чем классификатор", "Classifier guidance всегда даёт лучшее качество без недостатков", "Classifier-free guidance невозможно реализовать в diffusers"], "correct": 0, "explain": "Classifier-free guidance обучает одну модель как с текстовым условием, так и без него (с некоторой вероятностью 'выбрасывая' текст при обучении), а затем комбинирует оба предсказания на инференсе для усиления следования промпту."}, {"q": "Зачем в diffusers часто используют технику 'negative prompt' при генерации?", "options": ["Она позволяет явно указать, чего модель должна избегать в изображении, направляя денойзинг подальше от нежелательных концепций", "Negative prompt уменьшает разрешение итогового изображения", "Negative prompt используется только для ускорения генерации без влияния на содержание", "Она заменяет собой основной текстовый промпт"], "correct": 0, "explain": "Negative prompt используется совместно с classifier-free guidance: модель усиливает направление от эмбеддинга негативного промпта, эффективно 'отталкивая' генерацию от нежелательных артефактов или концепций."}, {"q": "Почему дообучение (fine-tuning) диффузионной модели с помощью LoRA (Low-Rank Adaptation) стало популярным подходом в экосистеме diffusers?", "options": ["LoRA обучает лишь небольшое количество дополнительных низкоранговых параметров поверх замороженной базовой модели, что резко снижает объём памяти и вычислений по сравнению с полным дообучением всех весов", "LoRA требует переобучения всей модели с нуля, что делает её самым медленным методом", "LoRA полностью заменяет собой архитектуру U-Net", "LoRA применяется только к текстовому энкодеру, но никогда к U-Net"], "correct": 0, "explain": "LoRA добавляет небольшие обучаемые матрицы низкого ранга к существующим весам, замораживая основную модель — это позволяет эффективно кастомизировать генерацию (стиль, персонажи) без дорогого полного дообучения."}, {"q": "В чём разница между img2img (изображение-в-изображение) и text2img генерацией в diffusers?", "options": ["img2img начинает процесс денойзинга не с чистого случайного шума, а с частично зашумлённого исходного изображения, сохраняя часть его структуры, тогда как text2img стартует с полного шума", "img2img и text2img технически идентичны без каких-либо различий", "img2img не использует диффузионный процесс вообще", "text2img всегда требует входного изображения, как и img2img"], "correct": 0, "explain": "В img2img исходное изображение частично зашумляется (не до конца) перед запуском обратного процесса, что позволяет сохранить общую композицию, применяя новый стиль/контент по текстовому промпту."}, {"q": "Почему VAE-декодер в latent diffusion моделях иногда становится узким местом для качества мелких деталей (например, текста или лиц на изображении)?", "options": ["VAE обучен на общей задаче реконструкции широкого класса изображений и может терять высокочастотные детали при сжатии/восстановлении, особенно для сложных структур вроде мелкого текста", "VAE не участвует в процессе генерации latent diffusion моделей", "Декодер VAE всегда идеально восстанавливает любые детали без потерь", "Проблема с мелкими деталями связана исключительно с текстовым энкодером"], "correct": 0, "explain": "Компрессия в латентное пространство неизбежно теряет часть информации; сложные высокочастотные структуры (мелкий текст, детали лиц) особенно чувствительны к этой потере при последующей реконструкции декодером VAE."}, {"q": "Почему увеличение размера обучающего датасета для диффузионной модели обычно улучшает разнообразие и качество генерации сильнее, чем простое увеличение числа параметров модели?", "options": ["Диффузионные модели учатся аппроксимировать распределение данных, и более разнообразный, представительный датасет напрямую расширяет диапазон паттернов, которые модель способна воспроизвести, тогда как рост параметров без данных может привести к переобучению", "Размер датасета не влияет на качество диффузионной модели", "Увеличение числа параметров всегда важнее размера датасета без исключений", "Диффузионные модели не зависят от статистики обучающих данных"], "correct": 0, "explain": "Так как диффузионная модель по сути аппроксимирует распределение p(data), разнообразие и объём обучающих примеров напрямую определяют, насколько богато и точно это распределение будет представлено."}, {"q": "Как компонент scheduler взаимодействует с обученной моделью U-Net на этапе инференса, определяя итоговую траекторию денойзинга?", "options": ["Scheduler определяет расписание уровней шума и формулу перехода между шагами, используя предсказание U-Net (шум или x0) на каждом шаге для вычисления следующего, менее зашумлённого состояния", "Scheduler полностью заменяет U-Net, не используя её предсказания", "U-Net и scheduler работают полностью независимо, не обмениваясь данными", "Scheduler используется только на этапе обучения, а не при генерации"], "correct": 0, "explain": "На каждом шаге инференса U-Net предсказывает шум/сигнал, а scheduler по своей формуле (DDPM, DDIM, DPM-Solver и т.д.) использует это предсказание, чтобы вычислить следующее, менее зашумлённое латентное состояние."}, {"q": "Почему выбор одной и той же обученной модели U-Net с разными scheduler'ами может давать заметно разные по стилю/качеству результаты генерации?", "options": ["Разные scheduler'ы по-разному интерпретируют и комбинируют предсказания модели на каждом шаге (разные формулы перехода и дискретизации), что влияет на итоговую траекторию денойзинга и визуальный результат", "Scheduler не оказывает никакого влияния на итоговое изображение", "Только веса U-Net определяют результат, scheduler используется чисто формально", "Смена scheduler требует переобучения модели с нуля"], "correct": 0, "explain": "Scheduler определяет численный алгоритм интегрирования диффузионного процесса; разные подходы (DDPM, DDIM, Euler, DPM-Solver) по-разному аппроксимируют этот процесс, что может влиять на детализацию и артефакты результата."}, {"q": "Почему архитектура U-Net с skip-connections особенно хорошо подходит именно для задачи предсказания шума на изображении?", "options": ["Skip-connections позволяют объединять низкоуровневую пространственную информацию (из ранних слоёв) с более абстрактными признаками (из глубоких слоёв), что важно для точного, детализированного предсказания шума по всему изображению", "Skip-connections используются только для ускорения обучения, не влияя на качество предсказания", "U-Net не использует skip-connections в диффузионных моделях", "Skip-connections нужны только для генерации текстовых эмбеддингов"], "correct": 0, "explain": "Как и в задачах сегментации, skip-connections в U-Net сохраняют детальную пространственную информацию, которая иначе терялась бы при сжатии в узком месте (bottleneck) сети — это критично для точного посегментного предсказания шума."}, {"q": "Как временной шаг (timestep) t передаётся в U-Net, и почему это важно для качества предсказания шума на разных стадиях денойзинга?", "options": ["Timestep обычно кодируется через позиционные эмбеддинги и подаётся в каждый блок U-Net, сообщая модели, на каком уровне шума она сейчас работает, что критично, так как задача предсказания шума различается на разных стадиях", "Timestep не передаётся в модель, она работает одинаково независимо от уровня шума", "U-Net всегда предсказывает шум одинаково, вне зависимости от временного шага", "Временной шаг используется только в scheduler, но никогда не подаётся в саму сеть"], "correct": 0, "explain": "Условная информация о шаге диффузии (обычно через синусоидальные эмбеддинги, аналогичные позиционным эмбеддингам трансформеров) внедряется в каждый блок U-Net, так как оптимальное поведение денойзинга существенно различается между ранними (сильный шум) и поздними (слабый шум) шагами."}, {"q": "Почему объединение diffusion + LoRA считается более модульным подходом к кастомизации генерации, чем создание отдельной полной модели под каждую задачу?", "options": ["LoRA-адаптеры маленькие по размеру и их можно независимо хранить, загружать и комбинировать поверх одной общей базовой модели, избегая дублирования тяжёлых базовых весов для каждой задачи", "LoRA требует хранения полной копии модели для каждой задачи, как и обычное дообучение", "Модульность не имеет значения при работе с диффузионными моделями", "LoRA-адаптеры несовместимы с архитектурой diffusion pipeline"], "correct": 0, "explain": "Так как базовая модель остаётся замороженной, а LoRA хранит лишь небольшую дельту весов, можно держать одну базовую модель и множество лёгких адаптеров для разных стилей/задач, экономя место и время загрузки."}, {"q": "Почему увеличение разрешения генерируемого изображения (например, с 512×512 до 1024×1024) при неизменной архитектуре часто требует либо переобучения, либо специальных техник (например, каскадных моделей или upscaling)?", "options": ["Модель обучена на определённом распределении масштабов признаков и латентных размеров, и прямое применение к существенно другому разрешению может нарушить согласованность рецептивных полей и качество генерации", "Диффузионные модели автоматически одинаково хорошо работают при любом разрешении без каких-либо изменений", "Увеличение разрешения не влияет на архитектурные предположения модели", "Проблема решается только увеличением guidance scale"], "correct": 0, "explain": "Архитектура и обучающие данные подразумевают определённый диапазон разрешений; для качественной генерации в существенно ином разрешении обычно нужны специальные подходы — дообучение, каскадные модели или отдельные upscaling-сети."}, {"q": "Как согласованность между текстовым энкодером (например, CLIP) и U-Net, обучаемых вместе или раздельно, влияет на итоговое качество text-to-image генерации?", "options": ["Если текстовый энкодер и U-Net не были совместно откалиброваны (например, при замене энкодера без дообучения U-Net), эмбеддинги могут плохо интерпретироваться моделью денойзинга, что снижает точность следования промпту", "Текстовый энкодер и U-Net всегда полностью независимы и совместимость не имеет значения", "Замена текстового энкодера никогда не влияет на качество генерации", "U-Net не использует информацию от текстового энкодера напрямую"], "correct": 0, "explain": "U-Net обучается интерпретировать эмбеддинги конкретного текстового энкодера через cross-attention; замена энкодера без соответствующей адаптации может нарушить это согласование и ухудшить качество следования тексту."}, {"q": "Почему архитектурное решение использовать 'residual' предсказание (модель предсказывает поправку/шум, а не абсолютное значение) типично не только для диффузии, но и для других глубоких сетей (например, ResNet)?", "options": ["Предсказание остатка (разницы) часто оказывается более простой, лучше обусловленной задачей оптимизации, чем предсказание абсолютного значения с нуля, что улучшает стабильность обучения глубоких сетей", "Остаточное предсказание всегда снижает точность модели по сравнению с прямым предсказанием", "Остаточные связи используются только в диффузионных моделях, а не в других архитектурах", "Выбор параметризации предсказания не влияет на сходимость обучения"], "correct": 0, "explain": "Общий принцип глубокого обучения: обучать сеть предсказывать разницу/остаток (как в ResNet или ε-parametrization диффузии) часто проще и стабильнее, чем предсказывать абсолютное значение целиком с нуля."}, {"q": "Разработчик хочет ускорить генерацию изображений в проде, не сильно жертвуя качеством. Какой подход из экосистемы diffusers наиболее уместен в первую очередь?", "options": ["Использовать более быстрый scheduler (например, DPM-Solver или DDIM) с меньшим числом шагов вместо стандартного DDPM с сотнями шагов", "Единственный способ ускорения — уменьшить размер изображения до минимума", "Нужно обязательно отказаться от использования GPU", "Ускорение возможно только за счёт полного переобучения модели с нуля"], "correct": 0, "explain": "Современные ускоренные scheduler'ы (DPM-Solver++, DDIM, Euler Ancestral) позволяют получать качественные изображения за 20-30 шагов вместо стандартных 1000, значительно ускоряя инференс без переобучения модели."}, {"q": "Команда заметила, что при высоком значении guidance scale изображения становятся перенасыщенными по цвету и контрасту, теряя естественность. Какой это иллюстрирует компромисс?", "options": ["Компромисс между точностью следования промпту и общим визуальным качеством/разнообразием — слишком сильное guidance 'пережимает' генерацию в сторону условия ценой естественности", "Guidance scale не влияет на визуальные артефакты изображения", "Проблема возникает только из-за неправильного текстового энкодера", "Высокий guidance scale всегда улучшает изображение без побочных эффектов"], "correct": 0, "explain": "Слишком высокий guidance scale чрезмерно усиливает условный сигнал, что может привести к артефактам перенасыщенности и потере естественного разнообразия — типичный компромисс, требующий подбора значения."}, {"q": "При генерации портретов модель постоянно создаёт искажённые руки и пальцы. Какое из объяснений наиболее правдоподобно с точки зрения обучения диффузионной модели?", "options": ["Руки и пальцы — сложные, вариативные, часто некорректно размеченные структуры в обучающих данных, и модель хуже выучивает их анатомически корректную генерацию, чем более простые и однородные объекты", "Диффузионные модели принципиально не способны генерировать руки ни при каких условиях", "Проблема решается только полным отказом от диффузионных моделей", "Искажения рук вызваны исключительно ошибкой в scheduler'е"], "correct": 0, "explain": "Известная слабость ранних диффузионных моделей — сложные, высоковариативные детали (руки, текст) хуже представлены и согласованы в обучающих данных, из-за чего модель чаще ошибается именно в них."}, {"q": "Компания хочет использовать diffusers для генерации изображений в узкой предметной области (например, дизайн интерьера в определённом стиле) с ограниченным датасетом в 200 изображений. Какой подход обучения наиболее практичен?", "options": ["Дообучение (fine-tuning) с помощью LoRA или DreamBooth поверх предобученной модели, а не обучение диффузионной модели с нуля", "Обязательно обучать модель с нуля на этих 200 изображениях без использования предобученных весов", "200 изображений категорически недостаточно для любого использования diffusers", "Нужно использовать только классификатор, а не диффузионную модель"], "correct": 0, "explain": "Обучение диффузионной модели с нуля требует огромных датасетов и вычислительных ресурсов; для узкой кастомизации на малых данных практичнее дообучать предобученную модель через LoRA/DreamBooth, требующие значительно меньше примеров."}, {"q": "При использовании img2img с высокой степенью 'strength' (силы изменения) итоговое изображение почти не сохраняет структуру исходного фото. Как это объясняется механикой диффузионного процесса?", "options": ["Высокая strength означает, что исходное изображение зашумляется почти до состояния чистого шума перед денойзингом, оставляя модели значительно больше св . Чем это лучше всего объясняется?", "options": ["DPM-Solver++ — более точный численный метод решения дифференциального уравнения диффузии, требующий меньше шагов для той же точности аппроксимации, чем базовый алгоритм DDPM", "Между scheduler'ами нет значимой разницы, результат — случайное совпадение", "DPM-Solver++ полностью меняет архитектуру U-Net", "Число шагов не влияет на итоговое качество генерации ни при каком scheduler'е"], "correct": 0, "explain": "DPM-Solver и подобные продвинутые solver'ы используют более точные численные методы (высокого порядка) для аппроксимации того же дифференциального уравнения, что позволяет получать сопоставимое или лучшее качество при существенно меньшем числе шагов."}, {"q": "Диффузионный процесс обучения использует 1000 шагов зашумления. Если scheduler на инференсе использует только 50 равномерно распределённых шагов, во сколько раз быстрее (по числу шагов) будет генерация по сравнению с полным использованием всех 1000 шагов?", "options": ["В 10 раз", "В 20 раз", "В 50 раз", "В 100 раз"], "correct": 1, "explain": "1000/50 = 20 — генерация задействует в 20 раз меньше шагов."}, {"q": "Изображение сжимается VAE в latent diffusion с коэффициентом сжатия 8 по каждой пространственной оси. Если исходное изображение 512×512, каков размер латентного представления по пространственным осям?", "options": ["64×64", "32×32", "128×128", "256×256"], "correct": 0, "explain": "512/8 = 64. Латентное представление имеет размер 64×64 (плюс каналы)."}, {"q": "Генерация одного изображения занимает 3 секунды при 50 шагах денойзинга. Сколько примерно секунд займёт генерация при 25 шагах, если время линейно зависит от числа шагов?", "options": ["1", "1.5", "2", "3"], "correct": 1, "explain": "При линейной зависимости: 3 секунды × (25/50) = 1.5 секунды."}, {"q": "Батч из 4 изображений генерируется параллельно на GPU за 6 секунд. Сколько времени в среднем занимает генерация одного изображения при таком параллельном выполнении?", "options": ["6 секунд", "1.5 секунды", "24 секунды", "4 секунды"], "correct": 1, "explain": "6 секунд / 4 изображения = 1.5 секунды на изображение (при полном параллелизме)."}, {"q": "LoRA-адаптер добавляет матрицы низкого ранга r=4 к слою с весами размером 1024×1024 (вместо полного дообучения всех ~1 млн параметров). Сколько параметров добавляют две матрицы низкого ранга размером 1024×4 и 4×1024?", "options": ["4096", "8192", "1048576", "16384"], "correct": 1, "explain": "Матрица A (1024×4) = 4096 параметров, матрица B (4×1024) = 4096 параметров. Итого: 4096+4096=8192 — значительно меньше, чем 1024×1024=1048576 у полного слоя."}, {"q": "Пайплайн генерирует изображения с guidance scale 7.5 по умолчанию. Если увеличить guidance scale до 15, качественно это означает какое изменение в поведении генерации?", "options": ["Удвоенное усиление влияния текстового условия на процесс денойзинга по сравнению с базовым значением", "Уменьшение числа шагов денойзинга вдвое", "Удвоение разрешения итогового изображения", "Отключение текстового промпта полностью"], "correct": 0, "explain": "Guidance scale линейно масштабирует вклад разницы между условным и безусловным предсказанием; увеличение с 7.5 до 15 удваивает это усиление, делая следование промпту более выраженным (иногда ценой естественности)."}, {"q": "Модель обучается предсказывать шум на изображениях размером 64×64×3 в латентном пространстве. Сколько всего числовых значений содержит один такой латентный тензор?", "options": ["4096", "12288", "64", "192"], "correct": 1, "explain": "64×64×3 = 12288 значений."}, {"q": "Время дообучения (fine-tuning) LoRA-адаптера на 100 изображениях занимает 20 минут на одном GPU. Если использовать 4 GPU с идеальным линейным ускорением, сколько времени займёт то же дообучение?", "options": ["20 минут", "10 минут", "5 минут", "80 минут"], "correct": 2, "explain": "При идеальном линейном ускорении: 20 минут / 4 = 5 минут."}, {"q": "Пайплайн генерации использует batch size 8 и генерирует 800 изображений. Сколько батчей потребуется выполнить последовательно?", "options": ["8", "80", "100", "800"], "correct": 2, "explain": "800 / 8 = 100 батчей."}, {"q": "Diffusers-пайплайн со scheduler DPM-Solver++ достигает приемлемого качества за 20 шагов вместо 1000 шагов DDPM. Во сколько раз это сокращает число шагов денойзинга?", "options": ["В 5 раз", "В 20 раз", "В 50 раз", "В 100 раз"], "correct": 2, "explain": "1000/20 = 50 — сокращение числа шагов в 50 раз."}, {"q": "Текстовый эмбеддинг CLIP имеет размерность 768 и максимальную длину последовательности токенов 77. Сколько всего чисел содержит полное представление одного промпта до агрегации?", "options": ["768", "77", "59136", "845"], "correct": 2, "explain": "77 токенов × 768 признаков на токен = 59136 чисел."}, {"q": "Обучение LoRA-адаптера потребляет 6 ГБ видеопамяти, тогда как полное дообучение той же модели — 24 ГБ. Во сколько раз LoRA экономит видеопамять в этом случае?", "options": ["В 2 раза", "В 4 раза", "В 6 раз", "В 24 раза"], "correct": 1, "explain": "24/6 = 4 — LoRA экономит видеопамять в 4 раза по сравнению с полным дообучением."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
