<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Библиотека diffusers (Python/ML)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/diffusers.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Библиотека diffusers (Python/ML)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "diffusers";
  const QUESTIONS = [{"q": "Что такое библиотека diffusers (Hugging Face)?", "options": ["Библиотека для веб-разработки на Python", "Библиотека Python для работы с диффузионными генеративными моделями (изображения, аудио и др.)", "Инструмент для визуализации графиков", "Библиотека для работы с базами данных"], "correct": 1, "explain": "diffusers — библиотека Hugging Face, предоставляющая готовые реализации диффузионных моделей, планировщиков (schedulers) и пайплайнов для генерации контента.", "usage": {"code": false, "without": "Диффузионную модель, планировщики и пайплайны генерации пришлось бы реализовывать с нуля на голом PyTorch и вручную искать/грузить веса.", "with": "Библиотека diffusers даёт готовые реализации диффузионных моделей, schedulers и пайплайнов для генерации изображений/аудио.", "benefit": "Генерация из коробки без ручной реализации моделей."}}, {"q": "Что такое диффузионная модель (diffusion model) в общих чертах?", "options": ["Алгоритм сортировки данных", "Модель, которая только сжимает изображения без генерации", "Модель, которая последовательно удаляет шум из случайного шума, постепенно превращая его в осмысленное изображение", "Модель для классификации текста"], "correct": 2, "explain": "Диффузионные модели обучаются обращать процесс постепенного добавления шума, начиная с чистого шума и итеративно 'очищая' его до реалистичного изображения.", "usage": {"code": false, "without": "Пытаясь получить картинку одним проходом сети из шума, получаешь мутный неструктурированный результат.", "with": "Диффузионная модель итеративно удаляет шум из случайного шума, шаг за шагом превращая его в осмысленное изображение.", "benefit": "Стабильная генерация реалистичных изображений."}}, {"q": "Что такое 'forward process' (прямой процесс) в диффузионных моделях?", "options": ["Процесс постепенного добавления гауссова шума к исходному изображению на протяжении многих шагов", "Процесс сохранения модели на диск", "Процесс генерации итогового изображения из шума", "Процесс обучения текстового энкодера"], "correct": 0, "explain": "Forward process — фиксированный (не обучаемый) процесс, постепенно превращающий реальные данные в чистый шум путём добавления гауссова шума на каждом шаге.", "usage": {"code": true, "without": "Чтобы получить пары 'шумное/чистое', вручную писали бы формулы зашумления по каждому timestep и легко ошибиться в коэффициентах.", "with": "Forward process (постепенное добавление гауссова шума) реализован в scheduler:\nnoisy = scheduler.add_noise(x0, noise, timesteps)", "benefit": "Корректное зашумление без ручных формул."}}, {"q": "Что делает 'reverse process' (обратный процесс) в диффузионной модели?", "options": ["Добавляет шум к изображению", "Обучаемый процесс, предсказывающий, как убрать шум на каждом шаге, постепенно восстанавливая данные из шума", "Уменьшает разрешение изображения", "Сохраняет чекпоинт модели"], "correct": 1, "explain": "Обратный процесс — то, что обучается модель (обычно U-Net): предсказывать шум (или чистое изображение) на каждом шаге, чтобы обратить прямой процесс диффузии.", "usage": {"code": false, "without": "Без обучаемого обратного процесса нет способа восстановить данные из шума — модели нечего предсказывать.", "with": "Reverse process — обучаемая часть (U-Net), предсказывающая шум на каждом шаге, чтобы обратить диффузию и восстановить данные.", "benefit": "Управляемое восстановление изображения из шума."}}, {"q": "Какая архитектура нейросети чаще всего используется как основа для предсказания шума в диффузионных моделях изображений?", "options": ["Простой перцептрон", "Рекуррентная сеть без свёрток", "U-Net", "Дерево решений"], "correct": 2, "explain": "U-Net с энкодер-декодер структурой и skip-connections — стандартная архитектура для предсказания шума на каждом шаге диффузии благодаря хорошей работе с пространственной информацией.", "usage": {"code": true, "without": "Собирая предсказатель шума из обычных Conv/Linear слоёв, теряешь пространственные детали и качество падает.", "with": "UNet2DModel из diffusers — энкодер-декодер со skip-connections:\nfrom diffusers import UNet2DModel\nmodel = UNet2DModel(sample_size=64, in_channels=3, out_channels=3)", "benefit": "Готовая архитектура, сохраняющая детали."}}, {"q": "Что такое 'scheduler' (планировщик) в библиотеке diffusers?", "options": ["Компонент, определяющий, как именно шум добавляется/убирается на каждом шаге, и сколько шагов используется при генерации", "Часть текстового энкодера", "Список задач для выполнения после генерации", "Модуль для планирования обучения на нескольких GPU"], "correct": 0, "explain": "Scheduler управляет расписанием шума (noise schedule) и алгоритмом шага денойзинга (например, DDPM, DDIM, Euler), влияя на качество и скорость генерации.", "usage": {"code": true, "without": "Расписание шума и формулу шага денойзинга (DDPM/DDIM/Euler) писали бы руками, рискуя ошибиться в математике сэмплирования.", "with": "Scheduler инкапсулирует noise schedule и алгоритм шага; меняется одной строкой:\nfrom diffusers import DDIMScheduler\npipe.scheduler = DDIMScheduler.from_config(pipe.scheduler.config)", "benefit": "Смена алгоритма сэмплинга без переписывания кода."}}, {"q": "Что такое пайплайн (pipeline) в diffusers, например StableDiffusionPipeline?", "options": ["Высокоуровневый объект, объединяющий все компоненты (текстовый энкодер, U-Net, VAE, scheduler) для удобной генерации 'из коробки'", "Отдельная функция потерь модели", "Инструмент визуализации весов сети", "Формат хранения датасета"], "correct": 0, "explain": "Пайплайн инкапсулирует все шаги генерации (кодирование текста, денойзинг, декодирование) в единый удобный интерфейс, например pipeline(prompt) для генерации изображения.", "usage": {"code": true, "without": "Пришлось бы вручную связывать текстовый энкодер, U-Net, VAE и scheduler и правильно прогонять все шаги.", "with": "StableDiffusionPipeline объединяет все компоненты:\nfrom diffusers import StableDiffusionPipeline\npipe = StableDiffusionPipeline.from_pretrained('runwayml/stable-diffusion-v1-5')\nimg = pipe('a cat').images[0]", "benefit": "Генерация 'из коробки' одним вызовом."}}, {"q": "Зачем в моделях вроде Stable Diffusion используется латентное пространство (latent diffusion), а не диффузия напрямую в пространстве пикселей?", "options": ["Работа в сжатом латентном пространстве (через VAE) значительно снижает вычислительные затраты по сравнению с диффузией на полном изображении в пикселях", "Латентная диффузия даёт худшее качество, но большую скорость без других преимуществ", "Пиксельное пространство всегда быстрее латентного", "Латентное пространство используется только для ускорения загрузки модели"], "correct": 0, "explain": "Latent Diffusion Models (LDM) выполняют процесс диффузии в сжатом латентном пространстве (например, в 8 раз меньше по каждой стороне), что резко снижает вычислительные требования при сохранении качества.", "usage": {"code": false, "without": "Диффузия напрямую в пикселях 512x512 требует огромной памяти и вычислений на каждом шаге.", "with": "Latent diffusion выполняет процесс в сжатом латентном пространстве VAE (в ~8 раз меньше по стороне).", "benefit": "Резкое снижение вычислений при сохранении качества."}}, {"q": "Какую роль играет текстовый энкодер (например, CLIP text encoder) в text-to-image диффузионных моделях?", "options": ["Он сжимает изображение в латентный вектор", "Он генерирует итоговое изображение напрямую из текста без диффузии", "Он используется только для проверки орфографии промпта", "Он преобразует текстовый промпт в векторное представление (эмбеддинг), которое используется для управления процессом генерации изображения"], "correct": 3, "explain": "Текстовый энкодер превращает промпт в эмбеддинги, которые внедряются в U-Net (обычно через cross-attention), направляя процесс денойзинга в сторону, соответствующую описанию.", "usage": {"code": false, "without": "Без кодирования текста модель денойзинга не знает, что рисовать, и генерирует случайный контент.", "with": "Текстовый энкодер (CLIP) превращает промпт в эмбеддинги, управляющие генерацией через cross-attention в U-Net.", "benefit": "Генерация, соответствующая текстовому описанию."}}, {"q": "Что такое guidance scale (или classifier-free guidance) при генерации изображений в diffusers?", "options": ["Параметр, определяющий количество GPU для генерации", "Параметр, определяющий разрешение итогового изображения", "Настройка формата сохраняемого файла", "Параметр, определяющий, насколько сильно генерация должна следовать текстовому промпту, в противовес более 'свободной' генерации"], "correct": 3, "explain": "Guidance scale усиливает влияние условного (текстового) сигнала на генерацию: более высокое значение — более точное следование промпту, но иногда с потерей разнообразия/естественности.", "usage": {"code": true, "without": "Без управления силой условия генерация слабо следует промпту либо теряет разнообразие — баланс подбирать нечем.", "with": "guidance_scale (classifier-free guidance) регулирует строгость следования промпту:\npipe(prompt, guidance_scale=7.5)", "benefit": "Один параметр для баланса точность/разнообразие."}}, {"q": "Почему увеличение числа шагов денойзинга (inference steps) обычно улучшает качество изображения, но с убывающей отдачей?", "options": ["Больше шагов всегда линейно улучшает качество без ограничений", "Каждый дополнительный шаг даёт модели возможность точнее скорректировать предсказание, но после определённого момента дальнейшие шаги вносят всё меньшие улучшения при растущих вычислительных затратах", "Оптимальное число шагов всегда равно одному", "Число шагов не влияет на качество генерации"], "correct": 1, "explain": "Процесс денойзинга постепенно сходится к финальному результату; после определённого числа шагов дополнительные итерации дают всё меньший прирост качества, что создаёт компромисс между скоростью и качеством.", "usage": {"code": true, "without": "Ставя фиксированное большое число шагов, зря тратишь время, или при малом — получаешь грубый результат.", "with": "num_inference_steps задаёт компромисс скорость/качество:\npipe(prompt, num_inference_steps=30)", "benefit": "Контроль отдачи качества за шаги."}}, {"q": "В чём принципиальное отличие DDIM (Denoising Diffusion Implicit Models) от исходного DDPM с точки зрения процесса сэмплирования?", "options": ["DDIM работает только для аудио, а не изображений", "DDIM всегда требует больше шагов, чем DDPM", "DDIM использует детерминированный (не марковский по своей сути) процесс, позволяющий пропускать шаги и значительно ускорять генерацию при сохранении приемлемого качества", "DDIM не может использовать предобученные веса DDPM-модели"], "correct": 2, "explain": "DDIM переформулирует процесс сэмплирования так, что можно 'перепрыгивать' через шаги (не следуя строго последовательности обучения), что даёт значительное ускорение генерации по сравнению с классическим DDPM.", "usage": {"code": true, "without": "С DDPM нужно ~1000 последовательных шагов — генерация медленная.", "with": "DDIMScheduler даёт детерминированный процесс с пропуском шагов:\npipe.scheduler = DDIMScheduler.from_config(pipe.scheduler.config)\npipe(prompt, num_inference_steps=25)", "benefit": "Кратно быстрее при том же качестве."}}, {"q": "Почему модель в диффузионном процессе часто обучают предсказывать сам добавленный шум (ε), а не напрямую восстановленное чистое изображение?", "options": ["Предсказание чистого изображения всегда работает лучше и проще", "Выбор цели предсказания не влияет на результат обучения", "Предсказание шума даёт более простую, стабильную и хорошо обусловленную задачу обучения (близкую к предсказанию остатка), что эмпирически улучшает качество и стабильность обучения", "Предсказание шума технически невозможно в диффузионных моделях"], "correct": 2, "explain": "Параметризация через предсказание шума (ε-prediction) эмпирически даёт более стабильную оптимизацию по сравнению с прямым предсказанием x0, что стало стандартом со времён DDPM.", "usage": {"code": false, "without": "Обучая сеть предсказывать сразу чистое изображение x0, получаешь плохо обусловленную нестабильную оптимизацию.", "with": "Модель предсказывает добавленный шум (ε-параметризация) — более простая и стабильная задача.", "benefit": "Стабильнее обучение и выше качество."}}, {"q": "Как cross-attention между текстовыми эмбеддингами и картами признаков U-Net позволяет модели 'следовать' текстовому промпту при генерации изображения?", "options": ["Cross-attention заменяет собой весь процесс диффузии", "На каждом слое U-Net визуальные признаки 'обращают внимание' на релевантные части текстового эмбеддинга, направляя генерацию конкретных визуальных деталей в соответствии с описанием", "Текст и изображение обрабатываются полностью независимо без какого-либо взаимодействия", "Текстовый эмбеддинг используется только один раз в самом начале процесса без дальнейшего влияния"], "correct": 1, "explain": "Cross-attention слои внутри U-Net на каждом шаге денойзинга позволяют пространственным признакам изображения 'запрашивать' информацию из текстового эмбеддинга, обеспечивая тесную связь между промптом и генерируемым содержимым.", "usage": {"code": false, "without": "Если текст и картинку обрабатывать независимо, детали изображения не соответствуют словам промпта.", "with": "Cross-attention на каждом слое U-Net связывает визуальные признаки с релевантными частями текстового эмбеддинга.", "benefit": "Тесное соответствие деталей промпту."}}, {"q": "Почему классификатор-независимое управление (classifier-free guidance) стало более популярным, чем использование отдельного классификатора для направления генерации?", "options": ["Classifier-free guidance невозможно реализовать в diffusers", "Classifier guidance всегда даёт лучшее качество без недостатков", "Оно не требует обучения отдельной модели-классификатора и достигается простым сочетанием условной и безусловной генерации во время сэмплирования, упрощая пайплайн", "Classifier-free guidance требует значительно больше вычислительных ресурсов, чем классификатор"], "correct": 2, "explain": "Classifier-free guidance обучает одну модель как с текстовым условием, так и без него (с некоторой вероятностью 'выбрасывая' текст при обучении), а затем комбинирует оба предсказания на инференсе для усиления следования промпту.", "usage": {"code": false, "without": "Отдельный классификатор для направления генерации нужно обучать дополнительно и поддерживать.", "with": "Classifier-free guidance комбинирует условное и безусловное предсказания одной модели на инференсе.", "benefit": "Управление промптом без отдельного классификатора."}}, {"q": "Зачем в diffusers часто используют технику 'negative prompt' при генерации?", "options": ["Она позволяет явно указать, чего модель должна избегать в изображении, направляя денойзинг подальше от нежелательных концепций", "Negative prompt уменьшает разрешение итогового изображения", "Она заменяет собой основной текстовый промпт", "Negative prompt используется только для ускорения генерации без влияния на содержание"], "correct": 0, "explain": "Negative prompt используется совместно с classifier-free guidance: модель усиливает направление от эмбеддинга негативного промпта, эффективно 'отталкивая' генерацию от нежелательных артефактов или концепций.", "usage": {"code": true, "without": "Чтобы убрать нежелательные артефакты, вручную переписываешь промпт, и они всё равно проскакивают.", "with": "negative_prompt явно указывает, чего избегать:\npipe(prompt='portrait', negative_prompt='blurry, extra fingers')", "benefit": "Прямой контроль нежелательного содержимого."}}, {"q": "Почему дообучение (fine-tuning) диффузионной модели с помощью LoRA (Low-Rank Adaptation) стало популярным подходом в экосистеме diffusers?", "options": ["LoRA обучает лишь небольшое количество дополнительных низкоранговых параметров поверх замороженной базовой модели, что резко снижает объём памяти и вычислений по сравнению с полным дообучением всех весов", "LoRA применяется только к текстовому энкодеру, но никогда к U-Net", "LoRA требует переобучения всей модели с нуля, что делает её самым медленным методом", "LoRA полностью заменяет собой архитектуру U-Net"], "correct": 0, "explain": "LoRA добавляет небольшие обучаемые матрицы низкого ранга к существующим весам, замораживая основную модель — это позволяет эффективно кастомизировать генерацию (стиль, персонажи) без дорогого полного дообучения.", "usage": {"code": true, "without": "Полное дообучение всех весов U-Net требует много памяти и часов на GPU.", "with": "LoRA обучает малые низкоранговые матрицы поверх замороженной модели:\npipe.load_lora_weights('my-style-lora')", "benefit": "Кастомизация с малой памятью и быстро."}}, {"q": "В чём разница между img2img (изображение-в-изображение) и text2img генерацией в diffusers?", "options": ["img2img не использует диффузионный процесс вообще", "img2img и text2img технически идентичны без каких-либо различий", "img2img начинает процесс денойзинга не с чистого случайного шума, а с частично зашумлённого исходного изображения, сохраняя часть его структуры, тогда как text2img стартует с полного шума", "text2img всегда требует входного изображения, как и img2img"], "correct": 2, "explain": "В img2img исходное изображение частично зашумляется (не до конца) перед запуском обратного процесса, что позволяет сохранить общую композицию, применяя новый стиль/контент по текстовому промпту.", "usage": {"code": true, "without": "Text2img стартует с полного шума и не сохраняет структуру исходного фото.", "with": "Img2img начинает с частично зашумлённого изображения, сохраняя композицию:\nfrom diffusers import StableDiffusionImg2ImgPipeline\npipe(prompt, image=init_img, strength=0.6)", "benefit": "Перерисовка с сохранением структуры оригинала."}}, {"q": "Почему VAE-декодер в latent diffusion моделях иногда становится узким местом для качества мелких деталей (например, текста или лиц на изображении)?", "options": ["VAE обучен на общей задаче реконструкции широкого класса изображений и может терять высокочастотные детали при сжатии/восстановлении, особенно для сложных структур вроде мелкого текста", "VAE не участвует в процессе генерации latent diffusion моделей", "Декодер VAE всегда идеально восстанавливает любые детали без потерь", "Проблема с мелкими деталями связана исключительно с текстовым энкодером"], "correct": 0, "explain": "Компрессия в латентное пространство неизбежно теряет часть информации; сложные высокочастотные структуры (мелкий текст, детали лиц) особенно чувствительны к этой потере при последующей реконструкции декодером VAE.", "usage": {"code": false, "without": "Ожидая идеального восстановления мелких деталей от VAE, получаешь замыленный текст и лица.", "with": "Понимая, что VAE теряет высокочастотные детали при сжатии, используешь upscaling или спец-модели для таких структур.", "benefit": "Реалистичные ожидания и обход слабого места."}}, {"q": "Почему увеличение размера обучающего датасета для диффузионной модели обычно улучшает разнообразие и качество генерации сильнее, чем простое увеличение числа параметров модели?", "options": ["Диффузионные модели учатся аппроксимировать распределение данных, и более разнообразный, представительный датасет напрямую расширяет диапазон паттернов, которые модель способна воспроизвести, тогда как рост параметров без данных может привести к переобучению", "Размер датасета не влияет на качество диффузионной модели", "Диффузионные модели не зависят от статистики обучающих данных", "Увеличение числа параметров всегда важнее размера датасета без исключений"], "correct": 0, "explain": "Так как диффузионная модель по сути аппроксимирует распределение p(data), разнообразие и объём обучающих примеров напрямую определяют, насколько богато и точно это распределение будет представлено.", "usage": {"code": false, "without": "Наращивая только параметры модели на бедном датасете, получаешь переобучение без роста разнообразия.", "with": "Больший и разнообразный датасет напрямую расширяет распределение, которое модель способна воспроизвести.", "benefit": "Богаче и точнее разнообразие генерации."}}, {"q": "Как компонент scheduler взаимодействует с обученной моделью U-Net на этапе инференса, определяя итоговую траекторию денойзинга?", "options": ["Scheduler полностью заменяет U-Net, не используя её предсказания", "Scheduler используется только на этапе обучения, а не при генерации", "Scheduler определяет расписание уровней шума и формулу перехода между шагами, используя предсказание U-Net (шум или x0) на каждом шаге для вычисления следующего, менее зашумлённого состояния", "U-Net и scheduler работают полностью независимо, не обмениваясь данными"], "correct": 2, "explain": "На каждом шаге инференса U-Net предсказывает шум/сигнал, а scheduler по своей формуле (DDPM, DDIM, DPM-Solver и т.д.) использует это предсказание, чтобы вычислить следующее, менее зашумлённое латентное состояние.", "usage": {"code": false, "without": "Если считать U-Net и scheduler независимыми, не понимаешь, как формируется траектория денойзинга.", "with": "Scheduler на каждом шаге берёт предсказание U-Net и по своей формуле вычисляет следующее, менее зашумлённое состояние.", "benefit": "Ясная модель взаимодействия компонентов."}}, {"q": "Почему выбор одной и той же обученной модели U-Net с разными scheduler'ами может давать заметно разные по стилю/качеству результаты генерации?", "options": ["Разные scheduler'ы по-разному интерпретируют и комбинируют предсказания модели на каждом шаге (разные формулы перехода и дискретизации), что влияет на итоговую траекторию денойзинга и визуальный результат", "Scheduler не оказывает никакого влияния на итоговое изображение", "Смена scheduler требует переобучения модели с нуля", "Только веса U-Net определяют результат, scheduler используется чисто формально"], "correct": 0, "explain": "Scheduler определяет численный алгоритм интегрирования диффузионного процесса; разные подходы (DDPM, DDIM, Euler, DPM-Solver) по-разному аппроксимируют этот процесс, что может влиять на детализацию и артефакты результата.", "usage": {"code": true, "without": "Ожидая одинакового результата при любом scheduler, удивляешься разнице в стиле и качестве.", "with": "Разные schedulers по-разному дискретизируют процесс; смена меняет результат той же U-Net:\nfrom diffusers import EulerDiscreteScheduler\npipe.scheduler = EulerDiscreteScheduler.from_config(pipe.scheduler.config)", "benefit": "Подбор стиля/качества сменой scheduler."}}, {"q": "Почему архитектура U-Net с skip-connections особенно хорошо подходит именно для задачи предсказания шума на изображении?", "options": ["Skip-connections нужны только для генерации текстовых эмбеддингов", "Skip-connections используются только для ускорения обучения, не влияя на качество предсказания", "U-Net не использует skip-connections в диффузионных моделях", "Skip-connections позволяют объединять низкоуровневую пространственную информацию (из ранних слоёв) с более абстрактными признаками (из глубоких слоёв), что важно для точного, детализированного предсказания шума по всему изображению"], "correct": 3, "explain": "Как и в задачах сегментации, skip-connections в U-Net сохраняют детальную пространственную информацию, которая иначе терялась бы при сжатии в узком месте (bottleneck) сети — это критично для точного посегментного предсказания шума.", "usage": {"code": false, "without": "В сети без skip-connections пространственные детали теряются в bottleneck, и предсказание шума грубое.", "with": "Skip-connections U-Net объединяют низкоуровневую пространственную информацию с абстрактными признаками.", "benefit": "Точное детализированное предсказание шума."}}, {"q": "Как временной шаг (timestep) t передаётся в U-Net, и почему это важно для качества предсказания шума на разных стадиях денойзинга?", "options": ["Timestep не передаётся в модель, она работает одинаково независимо от уровня шума", "Временной шаг используется только в scheduler, но никогда не подаётся в саму сеть", "Timestep обычно кодируется через позиционные эмбеддинги и подаётся в каждый блок U-Net, сообщая модели, на каком уровне шума она сейчас работает, что критично, так как задача предсказания шума различается на разных стадиях", "U-Net всегда предсказывает шум одинаково, вне зависимости от временного шага"], "correct": 2, "explain": "Условная информация о шаге диффузии (обычно через синусоидальные эмбеддинги, аналогичные позиционным эмбеддингам трансформеров) внедряется в каждый блок U-Net, так как оптимальное поведение денойзинга существенно различается между ранними (сильный шум) и поздними (слабый шум) шагами.", "usage": {"code": false, "without": "Если не сообщать сети уровень шума, она денойзит одинаково и плохо на разных стадиях.", "with": "Timestep кодируется позиционными эмбеддингами и подаётся в каждый блок U-Net, задавая поведение под уровень шума.", "benefit": "Корректный денойзинг на всех стадиях."}}, {"q": "Почему объединение diffusion + LoRA считается более модульным подходом к кастомизации генерации, чем создание отдельной полной модели под каждую задачу?", "options": ["LoRA-адаптеры маленькие по размеру и их можно независимо хранить, загружать и комбинировать поверх одной общей базовой модели, избегая дублирования тяжёлых базовых весов для каждой задачи", "Модульность не имеет значения при работе с диффузионными моделями", "LoRA-адаптеры несовместимы с архитектурой diffusion pipeline", "LoRA требует хранения полной копии модели для каждой задачи, как и обычное дообучение"], "correct": 0, "explain": "Так как базовая модель остаётся замороженной, а LoRA хранит лишь небольшую дельту весов, можно держать одну базовую модель и множество лёгких адаптеров для разных стилей/задач, экономя место и время загрузки.", "usage": {"code": true, "without": "Полная модель под каждый стиль дублирует тяжёлые базовые веса и раздувает хранилище.", "with": "Лёгкие LoRA-адаптеры грузятся поверх одной базовой модели:\npipe.load_lora_weights('style-a')\n# позже: pipe.load_lora_weights('style-b')", "benefit": "Одна база + много маленьких адаптеров."}}, {"q": "Почему увеличение разрешения генерируемого изображения (например, с 512×512 до 1024×1024) при неизменной архитектуре часто требует либо переобучения, либо специальных техник (например, каскадных моделей или upscaling)?", "options": ["Увеличение разрешения не влияет на архитектурные предположения модели", "Диффузионные модели автоматически одинаково хорошо работают при любом разрешении без каких-либо изменений", "Проблема решается только увеличением guidance scale", "Модель обучена на определённом распределении масштабов признаков и латентных размеров, и прямое применение к существенно другому разрешению может нарушить согласованность рецептивных полей и качество генерации"], "correct": 3, "explain": "Архитектура и обучающие данные подразумевают определённый диапазон разрешений; для качественной генерации в существенно ином разрешении обычно нужны специальные подходы — дообучение, каскадные модели или отдельные upscaling-сети.", "usage": {"code": false, "without": "Прогоняя 512-модель на 1024 без изменений, ловишь рассогласование рецептивных полей и артефакты.", "with": "Понимая привязку к масштабу обучения, применяешь дообучение, каскадные модели или upscaling.", "benefit": "Качественная генерация в новом разрешении."}}, {"q": "Как согласованность между текстовым энкодером (например, CLIP) и U-Net, обучаемых вместе или раздельно, влияет на итоговое качество text-to-image генерации?", "options": ["Замена текстового энкодера никогда не влияет на качество генерации", "Если текстовый энкодер и U-Net не были совместно откалиброваны (например, при замене энкодера без дообучения U-Net), эмбеддинги могут плохо интерпретироваться моделью денойзинга, что снижает точность следования промпту", "U-Net не использует информацию от текстового энкодера напрямую", "Текстовый энкодер и U-Net всегда полностью независимы и совместимость не имеет значения"], "correct": 1, "explain": "U-Net обучается интерпретировать эмбеддинги конкретного текстового энкодера через cross-attention; замена энкодера без соответствующей адаптации может нарушить это согласование и ухудшить качество следования тексту.", "usage": {"code": false, "without": "Заменив текстовый энкодер без адаптации U-Net, получаешь эмбеддинги, которые модель не умеет интерпретировать.", "with": "Согласованные (совместно откалиброванные) энкодер и U-Net дают точное следование промпту через cross-attention.", "benefit": "Сохранение точности следования тексту."}}, {"q": "Почему архитектурное решение использовать 'residual' предсказание (модель предсказывает поправку/шум, а не абсолютное значение) типично не только для диффузии, но и для других глубоких сетей (например, ResNet)?", "options": ["Остаточное предсказание всегда снижает точность модели по сравнению с прямым предсказанием", "Остаточные связи используются только в диффузионных моделях, а не в других архитектурах", "Выбор параметризации предсказания не влияет на сходимость обучения", "Предсказание остатка (разницы) часто оказывается более простой, лучше обусловленной задачей оптимизации, чем предсказание абсолютного значения с нуля, что улучшает стабильность обучения глубоких сетей"], "correct": 3, "explain": "Общий принцип глубокого обучения: обучать сеть предсказывать разницу/остаток (как в ResNet или ε-parametrization диффузии) часто проще и стабильнее, чем предсказывать абсолютное значение целиком с нуля.", "usage": {"code": false, "without": "Обучая сеть предсказывать абсолютное значение с нуля, получаешь хуже обусловленную задачу.", "with": "Предсказание остатка/шума (как ε в диффузии и residual в ResNet) — более простая и стабильная оптимизация.", "benefit": "Стабильнее обучение глубоких сетей."}}, {"q": "Разработчик хочет ускорить генерацию изображений в проде, не сильно жертвуя качеством. Какой подход из экосистемы diffusers наиболее уместен в первую очередь?", "options": ["Единственный способ ускорения — уменьшить размер изображения до минимума", "Нужно обязательно отказаться от использования GPU", "Ускорение возможно только за счёт полного переобучения модели с нуля", "Использовать более быстрый scheduler (например, DPM-Solver или DDIM) с меньшим числом шагов вместо стандартного DDPM с сотнями шагов"], "correct": 3, "explain": "Современные ускоренные scheduler'ы (DPM-Solver++, DDIM, Euler Ancestral) позволяют получать качественные изображения за 20-30 шагов вместо стандартных 1000, значительно ускоряя инференс без переобучения модели.", "usage": {"code": true, "without": "Стандартный DDPM с сотнями шагов делает инференс в проде медленным.", "with": "Быстрый scheduler даёт качество за 20-30 шагов без переобучения:\nfrom diffusers import DPMSolverMultistepScheduler\npipe.scheduler = DPMSolverMultistepScheduler.from_config(pipe.scheduler.config)\npipe(prompt, num_inference_steps=25)", "benefit": "Ускорение инференса почти без потери качества."}}, {"q": "Команда заметила, что при высоком значении guidance scale изображения становятся перенасыщенными по цвету и контрасту, теряя естественность. Какой это иллюстрирует компромисс?", "options": ["Высокий guidance scale всегда улучшает изображение без побочных эффектов", "Проблема возникает только из-за неправильного текстового энкодера", "Компромисс между точностью следования промпту и общим визуальным качеством/разнообразием — слишком сильное guidance 'пережимает' генерацию в сторону условия ценой естественности", "Guidance scale не влияет на визуальные артефакты изображения"], "correct": 2, "explain": "Слишком высокий guidance scale чрезмерно усиливает условный сигнал, что может привести к артефактам перенасыщенности и потере естественного разнообразия — типичный компромисс, требующий подбора значения.", "usage": {"code": true, "without": "При guidance_scale=15 изображения перенасыщены и неестественны, а причина неочевидна.", "with": "Снижение guidance_scale к ~7 балансирует следование промпту и естественность:\npipe(prompt, guidance_scale=7.0)", "benefit": "Естественные изображения без пережатия."}}, {"q": "При генерации портретов модель постоянно создаёт искажённые руки и пальцы. Какое из объяснений наиболее правдоподобно с точки зрения обучения диффузионной модели?", "options": ["Руки и пальцы — сложные, вариативные, часто некорректно размеченные структуры в обучающих данных, и модель хуже выучивает их анатомически корректную генерацию, чем более простые и однородные объекты", "Проблема решается только полным отказом от диффузионных моделей", "Искажения рук вызваны исключительно ошибкой в scheduler'е", "Диффузионные модели принципиально не способны генерировать руки ни при каких условиях"], "correct": 0, "explain": "Известная слабость ранних диффузионных моделей — сложные, высоковариативные детали (руки, текст) хуже представлены и согласованы в обучающих данных, из-за чего модель чаще ошибается именно в них.", "usage": {"code": false, "without": "Ожидая идеальных рук и обвиняя scheduler, тратишь время не на ту причину.", "with": "Понимая, что руки/пальцы вариативны и плохо размечены в данных, применяешь спец-модели, inpainting или отбор.", "benefit": "Верная диагностика и обход слабого места."}}, {"q": "Компания хочет использовать diffusers для генерации изображений в узкой предметной области (например, дизайн интерьера в определённом стиле) с ограниченным датасетом в 200 изображений. Какой подход обучения наиболее практичен?", "options": ["200 изображений категорически недостаточно для любого использования diffusers", "Нужно использовать только классификатор, а не диффузионную модель", "Обязательно обучать модель с нуля на этих 200 изображениях без использования предобученных весов", "Дообучение (fine-tuning) с помощью LoRA или DreamBooth поверх предобученной модели, а не обучение диффузионной модели с нуля"], "correct": 3, "explain": "Обучение диффузионной модели с нуля требует огромных датасетов и вычислительных ресурсов; для узкой кастомизации на малых данных практичнее дообучать предобученную модель через LoRA/DreamBooth, требующие значительно меньше примеров.", "usage": {"code": true, "without": "Обучение диффузионной модели с нуля на 200 изображениях приведёт к переобучению и провалу.", "with": "Дообучение LoRA/DreamBooth поверх предобученной модели работает на малых данных:\n# train_dreambooth_lora.py на ~200 изображениях поверх SD", "benefit": "Кастомизация под нишу на малом датасете."}}, {"q": "При использовании img2img с высокой степенью 'strength' (силы изменения) итоговое изображение почти не сохраняет структуру исходного фото. Как это объясняется механикой диффузионного процесса?", "options": ["Проблема связана только с выбором текстового промпта, а не с параметром strength", "Высокая strength означает, что исходное изображение зашумляется почти до состояния чистого шума перед денойзингом, оставляя модели значительно больше свободы для генерации нового содержимого", "Img2img всегда полностью игнорирует входное изображение независимо от параметров", "Strength не влияет на степень сохранения исходной структуры"], "correct": 1, "explain": "Параметр strength определяет, на каком шаге прямого процесса (насколько зашумлённым) начинается обратный денойзинг — чем ближе к полному шуму, тем меньше исходной структуры сохраняется в результате.", "usage": {"code": true, "without": "При высокой strength результат почти не сохраняет исходное фото, и непонятно почему.", "with": "strength задаёт степень зашумления старта; снижаешь его для сохранения структуры:\npipe(prompt, image=init_img, strength=0.4)", "benefit": "Контроль сохранения оригинала в img2img."}}, {"q": "Инженер заметил, что при попытке сгенерировать текст на изображении (например, вывеску с надписью) результат почти всегда нечитаем. Какая архитектурная причина наиболее вероятна?", "options": ["Проблема решается только увеличением guidance scale до максимума", "Латентное сжатие через VAE и природа диффузионного процесса плохо сохраняют мелкие, точные структуры символов, если модель специально не была дообучена или расширена для генерации текста", "Диффузионные модели никогда физически не способны генерировать никакой текст", "Нечитаемость текста связана исключительно с выбором scheduler'а"], "correct": 1, "explain": "Компактное латентное представление и общая природа денойзинг-процесса плохо приспособлены к точному воспроизведению мелких, чётко структурированных символов без специальной архитектурной поддержки (что решают некоторые новые модели, например, с явными текстовыми рендерами).", "usage": {"code": false, "without": "Ожидая читаемых вывесок от обычной SD, стабильно получаешь искажённый текст.", "with": "Понимая, что VAE-сжатие теряет мелкие символы, берёшь модели со спец-поддержкой рендера текста.", "benefit": "Читаемый текст на изображении."}}, {"q": "Разработчик заметил сильную вариативность результатов при одном и том же промпте и seed на разных версиях библиотеки diffusers. Какое объяснение наиболее вероятно?", "options": ["Проблема возникает только при использовании GPU, но не CPU", "Изменения в реализации scheduler'ов, порядке операций или версии зависимостей между релизами библиотеки могут менять точный численный путь денойзинга, даже при фиксированном seed", "Seed никогда не влияет на воспроизводимость генерации в diffusers", "Библиотека всегда гарантирует абсолютно идентичный результат независимо от версии"], "correct": 1, "explain": "Разные версии библиотек, scheduler'ов, аппаратного обеспечения (GPU-архитектуры) могут вносить небольшие численные различия в вычисления, влияя на итоговый результат даже при одинаковом seed.", "usage": {"code": true, "without": "Полагаясь на seed, ждёшь идентичного результата на разных версиях/GPU и не получаешь его.", "with": "Фиксируешь generator и версии, понимая зависимость численного пути от окружения:\ng = torch.Generator('cuda').manual_seed(42)\npipe(prompt, generator=g)", "benefit": "Максимально воспроизводимая генерация."}}, {"q": "При деплое диффузионной модели в производственном сервисе важно учитывать генерацию потенциально нежелательного контента. Какой практический механизм часто используется в пайплайнах для смягчения этого риска?", "options": ["Встроенный safety checker (классификатор NSFW-контента), фильтрующий или блокирующий генерацию нежелательных изображений после денойзинга", "Полный отказ от использования готовых пайплайнов diffusers как единственное решение", "Безопасность контента не имеет отношения к архитектуре пайплайна генерации", "Проблема решается только увеличением guidance scale"], "correct": 0, "explain": "Многие готовые пайплайны (например, StableDiffusionPipeline) включают safety checker — отдельный классификатор, проверяющий сгенерированный контент на соответствие политике использования, прежде чем вернуть результат пользователю.", "usage": {"code": true, "without": "Без фильтрации сервис может вернуть пользователю нежелательный контент.", "with": "Встроенный safety_checker классифицирует и блокирует NSFW-результаты после денойзинга:\npipe = StableDiffusionPipeline.from_pretrained(model_id)  # включает safety_checker", "benefit": "Снижение риска нежелательного контента."}}, {"q": "Стартап хочет объединить несколько LoRA-адаптеров (например, для разных стилей) в одном пайплайне generation. Какой подход концептуально верен?", "options": ["Комбинирование LoRA требует полного переобучения базовой модели с нуля", "LoRA-адаптеры принципиально невозможно комбинировать между собой", "LoRA-адаптеры можно комбинировать, взвешенно суммируя их вклад в веса базовой модели, что позволяет смешивать несколько выученных стилей/концепций одновременно", "Использование более одного LoRA-адаптера всегда полностью ломает базовую модель"], "correct": 2, "explain": "Так как LoRA добавляет низкоранговые обновления к весам, несколько адаптеров можно комбинировать с разными весовыми коэффициентами, позволяя гибко смешивать несколько выученных стилей или концепций.", "usage": {"code": true, "without": "Под каждую комбинацию стилей пришлось бы обучать отдельную полную модель.", "with": "Несколько LoRA-адаптеров комбинируются с весами:\npipe.set_adapters(['style_a','style_b'], adapter_weights=[0.7,0.5])", "benefit": "Смешивание стилей без переобучения."}}, {"q": "При переходе с версии scheduler DDPM на DPM-Solver++ команда заметила, что при том же малом числе шагов (например, 10) качество заметно выросло. Чем это лучше всего объясняется?", "options": ["DPM-Solver++ — более точный численный метод решения дифференциального уравнения диффузии, требующий меньше шагов для той же точности аппроксимации, чем базовый алгоритм DDPM", "Между scheduler'ами нет значимой разницы, результат — случайное совпадение", "Число шагов не влияет на итоговое качество генерации ни при каком scheduler'е", "DPM-Solver++ полностью меняет архитектуру U-Net"], "correct": 0, "explain": "DPM-Solver и подобные продвинутые solver'ы используют более точные численные методы (высокого порядка) для аппроксимации того же дифференциального уравнения, что позволяет получать сопоставимое или лучшее качество при существенно меньшем числе шагов.", "usage": {"code": true, "without": "DDPM за 10 шагов даёт грубый результат — численная аппроксимация слишком неточна.", "with": "DPM-Solver++ — метод высокого порядка, дающий качество за меньшее число шагов:\npipe.scheduler = DPMSolverMultistepScheduler.from_config(pipe.scheduler.config)\npipe(prompt, num_inference_steps=10)", "benefit": "Высокое качество при малом числе шагов."}}, {"q": "Диффузионный процесс обучения использует 1000 шагов зашумления. Если scheduler на инференсе использует только 50 равномерно распределённых шагов, во сколько раз быстрее (по числу шагов) будет генерация по сравнению с полным использованием всех 1000 шагов?", "options": ["В 100 раз", "В 50 раз", "В 10 раз", "В 20 раз"], "correct": 3, "explain": "1000/50 = 20 — генерация задействует в 20 раз меньше шагов.", "usage": {"code": true, "without": "Гоняя все 1000 шагов обучения на инференсе, тратишь время впустую.", "with": "Задаёшь 50 шагов — 1000/50 = в 20 раз меньше:\npipe(prompt, num_inference_steps=50)  # вместо 1000", "benefit": "Генерация в 20 раз быстрее по числу шагов."}}, {"q": "Изображение сжимается VAE в latent diffusion с коэффициентом сжатия 8 по каждой пространственной оси. Если исходное изображение 512×512, каков размер латентного представления по пространственным осям?", "options": ["256×256", "128×128", "32×32", "64×64"], "correct": 3, "explain": "512/8 = 64. Латентное представление имеет размер 64×64 (плюс каналы).", "usage": {"code": false, "without": "Ожидая, что латент совпадёт с размером пикселей, ошибаешься с формой тензора.", "with": "При коэффициенте сжатия 8 латент от 512x512 имеет размер 64x64 (512/8) по пространственным осям.", "benefit": "Верный расчёт формы латента."}}, {"q": "Генерация одного изображения занимает 3 секунды при 50 шагах денойзинга. Сколько примерно секунд займёт генерация при 25 шагах, если время линейно зависит от числа шагов?", "options": ["2", "1.5", "1", "3"], "correct": 1, "explain": "При линейной зависимости: 3 секунды × (25/50) = 1.5 секунды.", "usage": {"code": true, "without": "Оставив 50 шагов, тратишь 3 секунды на изображение там, где хватило бы меньше.", "with": "При 25 шагах время ~линейно: 3 * (25/50) = 1.5 секунды:\npipe(prompt, num_inference_steps=25)", "benefit": "Вдвое быстрее при снижении шагов."}}, {"q": "Батч из 4 изображений генерируется параллельно на GPU за 6 секунд. Сколько времени в среднем занимает генерация одного изображения при таком параллельном выполнении?", "options": ["6 секунд", "1.5 секунды", "24 секунды", "4 секунды"], "correct": 1, "explain": "6 секунд / 4 изображения = 1.5 секунды на изображение (при полном параллелизме).", "usage": {"code": true, "without": "Генерируя 4 изображения по одному, тратишь время последовательно.", "with": "Батч из 4 промптов на GPU за 6 c даёт 6/4 = 1.5 c на изображение:\npipe([prompt]*4)", "benefit": "Параллелизм снижает время на картинку."}}, {"q": "LoRA-адаптер добавляет матрицы низкого ранга r=4 к слою с весами размером 1024×1024 (вместо полного дообучения всех ~1 млн параметров). Сколько параметров добавляют две матрицы низкого ранга размером 1024×4 и 4×1024?", "options": ["4096", "8192", "1048576", "16384"], "correct": 1, "explain": "Матрица A (1024×4) = 4096 параметров, матрица B (4×1024) = 4096 параметров. Итого: 4096+4096=8192 — значительно меньше, чем 1024×1024=1048576 у полного слоя.", "usage": {"code": true, "without": "Полное дообучение слоя 1024x1024 меняет ~1 048 576 параметров.", "with": "LoRA r=4 добавляет 1024*4 + 4*1024 = 8192 параметра:\nfrom peft import LoraConfig\nLoraConfig(r=4, target_modules=['to_q','to_v'])", "benefit": "На два порядка меньше обучаемых параметров."}}, {"q": "Пайплайн генерирует изображения с guidance scale 7.5 по умолчанию. Если увеличить guidance scale до 15, качественно это означает какое изменение в поведении генерации?", "options": ["Удвоенное усиление влияния текстового условия на процесс денойзинга по сравнению с базовым значением", "Отключение текстового промпта полностью", "Удвоение разрешения итогового изображения", "Уменьшение числа шагов денойзинга вдвое"], "correct": 0, "explain": "Guidance scale линейно масштабирует вклад разницы между условным и безусловным предсказанием; увеличение с 7.5 до 15 удваивает это усиление, делая следование промпту более выраженным (иногда ценой естественности).", "usage": {"code": true, "without": "Не понимая шкалы guidance, наугад крутишь значение и ловишь артефакты.", "with": "guidance_scale линейно масштабирует вклад условия: 15 против 7.5 — удвоенное усиление:\npipe(prompt, guidance_scale=15)", "benefit": "Предсказуемое усиление следования промпту."}}, {"q": "Модель обучается предсказывать шум на изображениях размером 64×64×3 в латентном пространстве. Сколько всего числовых значений содержит один такой латентный тензор?", "options": ["4096", "192", "12288", "64"], "correct": 2, "explain": "64×64×3 = 12288 значений.", "usage": {"code": false, "without": "Прикидывая размер тензора на глаз, легко ошибиться в числе значений.", "with": "Латент 64x64x3 содержит 64*64*3 = 12288 значений.", "benefit": "Точный расчёт объёма тензора."}}, {"q": "Время дообучения (fine-tuning) LoRA-адаптера на 100 изображениях занимает 20 минут на одном GPU. Если использовать 4 GPU с идеальным линейным ускорением, сколько времени займёт то же дообучение?", "options": ["5 минут", "20 минут", "80 минут", "10 минут"], "correct": 0, "explain": "При идеальном линейном ускорении: 20 минут / 4 = 5 минут.", "usage": {"code": false, "without": "На одном GPU дообучение LoRA на 100 изображениях идёт 20 минут.", "with": "На 4 GPU с линейным ускорением 20/4 = 5 минут.", "benefit": "Кратное сокращение времени обучения."}}, {"q": "Пайплайн генерации использует batch size 8 и генерирует 800 изображений. Сколько батчей потребуется выполнить последовательно?", "options": ["800", "80", "8", "100"], "correct": 3, "explain": "800 / 8 = 100 батчей.", "usage": {"code": true, "without": "Генерируя 800 изображений по одному, теряешь время на накладные расходы.", "with": "При batch size 8 нужно 800/8 = 100 последовательных батчей:\n# 800 изображений батчами по 8 -> 100 батчей", "benefit": "Меньше итераций за счёт батчинга."}}, {"q": "Diffusers-пайплайн со scheduler DPM-Solver++ достигает приемлемого качества за 20 шагов вместо 1000 шагов DDPM. Во сколько раз это сокращает число шагов денойзинга?", "options": ["В 5 раз", "В 50 раз", "В 20 раз", "В 100 раз"], "correct": 1, "explain": "1000/20 = 50 — сокращение числа шагов в 50 раз.", "usage": {"code": true, "without": "DDPM тратит 1000 шагов денойзинга на изображение.", "with": "DPM-Solver++ достигает приемлемого качества за 20 шагов: 1000/20 = в 50 раз меньше:\npipe.scheduler = DPMSolverMultistepScheduler.from_config(pipe.scheduler.config)\npipe(prompt, num_inference_steps=20)", "benefit": "Сокращение числа шагов в 50 раз."}}, {"q": "Текстовый эмбеддинг CLIP имеет размерность 768 и максимальную длину последовательности токенов 77. Сколько всего чисел содержит полное представление одного промпта до агрегации?", "options": ["768", "59136", "77", "845"], "correct": 1, "explain": "77 токенов × 768 признаков на токен = 59136 чисел.", "usage": {"code": false, "without": "Не зная формы эмбеддинга, неверно прикидываешь память под текстовое представление.", "with": "CLIP-эмбеддинг промпта: 77 токенов * 768 = 59136 чисел до агрегации.", "benefit": "Точная оценка размера текстового представления."}}, {"q": "Обучение LoRA-адаптера потребляет 6 ГБ видеопамяти, тогда как полное дообучение той же модели — 24 ГБ. Во сколько раз LoRA экономит видеопамять в этом случае?", "options": ["В 24 раза", "В 4 раза", "В 2 раза", "В 6 раз"], "correct": 1, "explain": "24/6 = 4 — LoRA экономит видеопамять в 4 раза по сравнению с полным дообучением.", "usage": {"code": false, "without": "Полное дообучение той же модели требует 24 ГБ видеопамяти — нужна дорогая карта.", "with": "LoRA тратит 6 ГБ, то есть 24/6 = в 4 раза меньше видеопамяти.", "benefit": "Дообучение помещается на скромный GPU."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
