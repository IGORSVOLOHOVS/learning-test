<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>

(function () {
  const TEST_ID = "physical_chemistry";
  const QUESTIONS = [{"q": "Что изучает физическая химия?", "options": ["Физические принципы и закономерности, лежащие в основе химических явлений (энергетика, скорости реакций, строение вещества)", "Исключительно биохимические процессы в клетке", "Только историю химических открытий", "Только органический синтез веществ"], "correct": 0, "explain": "Физическая химия применяет законы физики (термодинамику, квантовую механику, статистическую физику) для объяснения и предсказания химических явлений.", "usage": {"code": false, "without": "Пытаешься предсказать, пойдёт ли реакция и как быстро, на глаз или заучивая факты по отдельности, без общей рамки.", "with": "Применяешь законы физики (термодинамику, кинетику, квантовую механику) как единую основу, объясняющую и энергетику, и скорость, и строение вещества.", "benefit": "Единая рамка вместо разрозненных фактов."}}, {"q": "Что такое энтальпия (H) в термодинамике?", "options": ["Функция состояния, связанная с теплотой, выделяемой или поглощаемой при постоянном давлении", "Концентрация раствора", "Скорость химической реакции", "Мера беспорядка системы"], "correct": 0, "explain": "Энтальпия H = U + PV — термодинамическая функция состояния, изменение которой (ΔH) равно теплоте реакции при постоянном давлении.", "usage": {"code": false, "without": "Хочешь узнать, сколько тепла даст реакция при постоянном давлении, но меряешь что попало и не связываешь это с функцией состояния.", "with": "Считаешь ΔH — теплоту реакции при P=const; знак ΔH сразу говорит, экзо- или эндотермична реакция.", "benefit": "Тепловой эффект реакции одним числом."}}, {"q": "Что такое энтропия (S) с точки зрения термодинамики?", "options": ["Синоним энергии Гиббса", "Мера степени беспорядка (числа микросостояний) системы", "Скорость протекания реакции", "Единица измерения давления"], "correct": 1, "explain": "Энтропия — термодинамическая величина, характеризующая степень неупорядоченности системы; согласно второму закону термодинамики, энтропия изолированной системы стремится к возрастанию.", "usage": {"code": false, "without": "Оцениваешь «беспорядок» системы интуитивно и не можешь сказать, куда самопроизвольно пойдёт изолированный процесс.", "with": "Через энтропию S (число микросостояний) применяешь второй закон: в изолированной системе S растёт — это задаёт направление.", "benefit": "Направление самопроизвольного процесса."}}, {"q": "Что показывает энергия Гиббса (G) и почему она важна для определения самопроизвольности процесса?", "options": ["Энергия Гиббса не связана с самопроизвольностью процессов", "ΔG < 0 указывает на самопроизвольность процесса при постоянных температуре и давлении", "Энергия Гиббса всегда положительна для любых реакций", "G измеряет только объём системы"], "correct": 1, "explain": "G = H - TS; при постоянных T и P самопроизвольные процессы идут в сторону уменьшения энергии Гиббса (ΔG<0).", "usage": {"code": false, "without": "Гадаешь, пойдёт ли реакция при данных T и P, ориентируясь только на тепловой эффект.", "with": "Считаешь ΔG=ΔH-TΔS; ΔG<0 — процесс самопроизволен, ΔG>0 — нет.", "benefit": "Критерий самопроизвольности при T,P=const."}}, {"q": "Что такое скорость химической реакции?", "options": ["Температура, при которой реакция начинается", "Количество молей вещества, изначально взятого для реакции", "Энергия связи в молекуле реагента", "Изменение концентрации реагентов или продуктов реакции в единицу времени"], "correct": 3, "explain": "Скорость реакции определяется как изменение концентрации реагента или продукта за единицу времени, обычно выражается в моль/(л·с).", "usage": {"code": false, "without": "Говоришь «реакция быстрая» или «медленная» без числа — нечего сравнивать и контролировать.", "with": "Определяешь скорость как Δc/Δt в моль/(л·с) — конкретная измеримая величина.", "benefit": "Количественная мера быстроты реакции."}}, {"q": "Что такое энергия активации (Ea) реакции?", "options": ["Полная энергия, выделяемая в ходе реакции", "Энергия связи в исходных молекулах", "Температура плавления реагентов", "Минимальная энергия, необходимая для того, чтобы реагенты могли перейти в продукты реакции"], "correct": 3, "explain": "Энергия активации — энергетический барьер, который должны преодолеть реагирующие частицы, чтобы образовать переходное состояние и превратиться в продукты.", "usage": {"code": false, "without": "Не понимаешь, почему термодинамически выгодная реакция не идёт сама при комнатной температуре.", "with": "Через энергию активации Ea видишь энергетический барьер: частицам нужно набрать минимум Ea, чтобы прореагировать.", "benefit": "Объясняет барьер и медленность реакций."}}, {"q": "Что такое катализатор с точки зрения химической кинетики?", "options": ["Побочный продукт реакции", "Вещество, ускоряющее реакцию за счёт снижения энергии активации, не расходуясь в итоговом процессе", "Вещество, полностью останавливающее реакцию", "Вещество, увеличивающее энергию активации реакции"], "correct": 1, "explain": "Катализатор предоставляет альтернативный путь реакции с более низкой энергией активации, ускоряя достижение равновесия, но сам не расходуется в стехиометрическом смысле.", "usage": {"code": false, "without": "Пытаешься ускорить реакцию только нагревом, рискуя побочными процессами и разложением.", "with": "Добавляешь катализатор — он даёт путь с меньшей Ea и ускоряет реакцию, сам не расходуясь.", "benefit": "Ускорение без нагрева и расхода."}}, {"q": "Что описывает уравнение состояния идеального газа PV=nRT?", "options": ["Связь между давлением, объёмом, количеством вещества и температурой идеального газа", "Растворимость газа в жидкости", "Скорость химической реакции в газовой фазе", "Энергию связи в молекуле газа"], "correct": 0, "explain": "Уравнение состояния идеального газа связывает давление P, объём V, количество вещества n и температуру T через универсальную газовую постоянную R.", "usage": {"code": false, "without": "Не можешь связать давление, объём и температуру газа, подбираешь значения наугад.", "with": "Через PV=nRT из трёх известных величин находишь четвёртую (например n=PV/RT).", "benefit": "Любой параметр газа из остальных."}}, {"q": "Что такое химическое равновесие?", "options": ["Состояние, при котором все реагенты полностью превратились в продукты", "Момент начала реакции", "Динамическое состояние, при котором скорости прямой и обратной реакций равны, и концентрации веществ не меняются со временем", "Состояние, при котором реакция полностью прекращается"], "correct": 2, "explain": "Химическое равновесие — не статичное, а динамическое состояние: реакции продолжают идти в обе стороны, но с одинаковой скоростью, поэтому наблюдаемые концентрации не меняются.", "usage": {"code": false, "without": "Думаешь, что при равновесии реакция остановилась и реагенты полностью превратились в продукты.", "with": "Понимаешь равновесие как динамическое: скорости прямой и обратной равны, концентрации постоянны, но реакция продолжается.", "benefit": "Верная картина: постоянство ≠ остановка."}}, {"q": "Что такое константа равновесия (K) реакции?", "options": ["Энергия активации обратной реакции", "Молярная масса продукта реакции", "Скорость реакции в момент времени t=0", "Отношение произведения концентраций продуктов к произведению концентраций реагентов (в степенях стехиометрических коэффициентов) при равновесии"], "correct": 3, "explain": "Константа равновесия K = [продукты]/[реагенты] (с учётом стехиометрических коэффициентов как степеней) характеризует положение равновесия при данной температуре.", "usage": {"code": false, "without": "Не можешь сказать, насколько глубоко пройдёт реакция при данной температуре.", "with": "Через K=[продукты]/[реагенты] (в степенях коэффициентов) оцениваешь положение равновесия.", "benefit": "Насколько реакция смещена к продуктам."}}, {"q": "Почему энтальпия и энтропия иногда действуют в противоположных направлениях при определении самопроизвольности реакции, и как энергия Гиббса разрешает этот конфликт?", "options": ["Температура не влияет на баланс между энтальпийным и энтропийным вкладами", "Экзотермическая реакция (ΔH<0) способствует самопроизвольности, а уменьшение энтропии (ΔS<0) — препятствует ей; G=H-TS количественно взвешивает оба фактора с учётом температуры, определяя итоговый знак ΔG", "Энергия Гиббса игнорирует вклад энтропии в самопроизвольность процесса", "Энтальпия и энтропия всегда действуют в одном направлении без исключений"], "correct": 1, "explain": "ΔG=ΔH-TΔS явно показывает, что при высоких температурах энтропийный член (TΔS) может доминировать, меняя знак ΔG даже для эндотермических реакций, если ΔS>0.", "usage": {"code": false, "without": "Видишь экзотермичность (ΔH<0) и падение энтропии (ΔS<0) и не знаешь, какой фактор победит.", "with": "ΔG=ΔH-TΔS взвешивает оба вклада с учётом T; знак ΔG даёт однозначный ответ.", "benefit": "Разрешает конфликт H и S числом."}}, {"q": "Почему согласно теории столкновений скорость реакции экспоненциально (а не линейно) зависит от температуры (уравнение Аррениуса)?", "options": ["Скорость реакции линейно пропорциональна температуре по определению", "Уравнение Аррениуса описывает зависимость скорости от концентрации, а не от температуры", "Температура влияет только на давление газа, но не на скорость реакции", "Доля молекул с энергией, достаточной для преодоления энергетического барьера (энергии активации), задаётся распределением Больцмана, которое экспоненциально растёт с температурой"], "correct": 3, "explain": "Уравнение Аррениуса k=A·e^(-Ea/RT) отражает экспоненциальную зависимость доли молекул с достаточной для реакции энергией от температуры, согласно статистике Больцмана.", "usage": {"code": false, "without": "Ожидаешь, что нагрев на 10° лишь чуть-чуть ускорит реакцию (линейно).", "with": "Через k=A·e^(-Ea/RT) понимаешь: доля молекул с энергией выше барьера растёт экспоненциально, поэтому небольшой нагрев сильно ускоряет реакцию.", "benefit": "Объясняет резкий рост скорости с температурой."}}, {"q": "Как принцип Ле Шателье объясняет реакцию системы на внешнее возмущение (изменение концентрации, давления, температуры) в состоянии равновесия?", "options": ["Равновесие смещается случайным образом независимо от природы возмущения", "Система всегда полностью игнорирует внешние возмущения, сохраняя исходное состояние равновесия", "Принцип Ле Шателье применим только к газовым реакциям", "Система смещает равновесие в направлении, компенсирующем внешнее воздействие, чтобы частично нейтрализовать возмущение и вновь достичь равновесия"], "correct": 3, "explain": "Принцип Ле Шателье формализует интуицию 'система сопротивляется изменению': при увеличении концентрации реагента равновесие смещается в сторону продуктов, компенсируя возмущение, и аналогично для давления/температуры.", "usage": {"code": false, "without": "Не можешь предсказать, куда сместится равновесие при добавлении реагента или сжатии системы.", "with": "По принципу Ле Шателье система смещается так, чтобы компенсировать воздействие: добавил реагент — равновесие ушло к продуктам.", "benefit": "Предсказание сдвига равновесия."}}, {"q": "Почему катализатор ускоряет и прямую, и обратную реакцию в равной степени, не смещая положение равновесия?", "options": ["Катализатор ускоряет только прямую реакцию, всегда смещая равновесие в сторону продуктов", "Катализатор снижает энергию активации симметрично для обоих направлений реакции, ускоряя достижение равновесия, но не меняя термодинамическую константу равновесия K, которая определяется только разницей энергий состояний", "Положение равновесия определяется исключительно катализатором, а не термодинамикой", "Катализаторы не влияют на скорость обратной реакции вообще"], "correct": 1, "explain": "Катализатор влияет на кинетику (снижая барьер активации для обоих направлений одинаково), но не на термодинамику — константа равновесия K определяется разностью энергий Гиббса реагентов и продуктов, независимо от пути реакции.", "usage": {"code": false, "without": "Ждёшь роста выхода после добавления катализатора и удивляешься, что его нет.", "with": "Знаешь: катализатор снижает Ea симметрично для обоих направлений, ускоряет достижение равновесия, но K и выход не меняет.", "benefit": "Не путаешь скорость с выходом."}}, {"q": "Почему порядок реакции по определённому реагенту не всегда совпадает со стехиометрическим коэффициентом этого реагента в уравнении реакции?", "options": ["Порядок реакции определяется только температурой, а не механизмом", "Порядок реакции всегда точно равен стехиометрическому коэффициенту по определению", "Стехиометрия и кинетика — синонимичные понятия в химии", "Порядок реакции определяется экспериментально и отражает механизм реакции (часто многостадийный), тогда как стехиометрический коэффициент — лишь баланс атомов в суммарном уравнении, не обязательно совпадающий с кинетикой лимитирующей стадии"], "correct": 3, "explain": "Скорость реакции определяется самой медленной (лимитирующей) стадией сложного, часто многостадийного механизма, и порядок по конкретному веществу отражает именно эту кинетику, а не просто итоговую стехиометрию суммарного уравнения.", "usage": {"code": false, "without": "Списываешь порядок реакции прямо со стехиометрических коэффициентов и получаешь неверный кинетический закон.", "with": "Определяешь порядок экспериментально — он отражает лимитирующую стадию механизма, а не суммарное уравнение.", "benefit": "Правильный кинетический закон."}}, {"q": "Как энтропийный вклад объясняет, почему растворение большинства твёрдых солей в воде является самопроизвольным процессом, даже если оно часто эндотермично (поглощает тепло)?", "options": ["Растворение резко увеличивает энтропию системы (переход от упорядоченной кристаллической решётки к более разупорядоченным сольватированным ионам в растворе), и это увеличение энтропии (TΔS) может перевешивать положительный ΔH", "Энтропия уменьшается при растворении, что должно препятствовать процессу", "Самопроизвольность растворения не зависит от термодинамических факторов", "Растворение солей всегда экзотермично, и энтропия здесь не имеет значения"], "correct": 0, "explain": "Даже при ΔH>0 (эндотермический процесс) реакция может быть самопроизвольной, если рост энтропии (ΔS>0) достаточно велик, чтобы TΔS превысило ΔH, делая ΔG отрицательным.", "usage": {"code": false, "without": "Считаешь, что раз растворение соли поглощает тепло (ΔH>0), оно идти не должно.", "with": "Учитываешь рост энтропии: кристалл → разупорядоченные сольватированные ионы; TΔS перевешивает ΔH, ΔG<0.", "benefit": "Объясняет самопроизвольность эндотермичного растворения."}}, {"q": "Почему уравнение Вант-Гоффа связывает изменение константы равновесия с температурой через энтальпию реакции (ΔH)?", "options": ["Уравнение Вант-Гоффа применимо только к газовым реакциям при постоянном объёме", "Оно количественно показывает, что для экзотермических реакций (ΔH<0) повышение температуры сдвигает равновесие в сторону реагентов (K уменьшается), а для эндотермических — наоборот, что согласуется с принципом Ле Шателье", "Константа равновесия не зависит от температуры ни для одной реакции", "Температура влияет на константу равновесия только через изменение давления"], "correct": 1, "explain": "Уравнение Вант-Гоффа d(lnK)/dT = ΔH/(RT²) формализует качественное предсказание принципа Ле Шателье количественно, связывая знак ΔH с направлением сдвига равновесия при изменении температуры.", "usage": {"code": false, "without": "Знаешь качественно (по Ле Шателье), что нагрев сдвигает равновесие, но не можешь оценить, насколько.", "with": "Через d(lnK)/dT=ΔH/RT² количественно связываешь знак ΔH с изменением K при нагреве.", "benefit": "Числовая оценка сдвига K с температурой."}}, {"q": "Почему скорость реакции для многостадийного механизма определяется самой медленной ('лимитирующей') стадией, а не суммарной кинетикой всех стадий вместе?", "options": ["Все стадии многостадийного механизма всегда протекают с одинаковой скоростью", "Скорость определяется исключительно самой первой стадией механизма", "Понятие лимитирующей стадии применимо только к одностадийным реакциям", "Как и в любой последовательной цепочке процессов, общая скорость не может превышать скорость самого медленного звена — быстрые стадии просто ждут, пока лимитирующая стадия произведёт промежуточный продукт"], "correct": 3, "explain": "Аналогия с последовательным производственным процессом: как конвейер работает со скоростью самого медленного этапа, так и многостадийная реакция в целом лимитируется своей самой медленной элементарной стадией.", "usage": {"code": false, "without": "Пытаешься ускорить процесс, оптимизируя быстрые стадии, а общая скорость не растёт.", "with": "Находишь самую медленную (лимитирующую) стадию — именно она задаёт общую скорость; ускорять надо её.", "benefit": "Бьёшь в узкое место механизма."}}, {"q": "Как понятие 'фазовой диаграммы' (например, для воды) связывает термодинамические переменные (давление, температура) с устойчивыми состояниями вещества?", "options": ["Фазовые диаграммы не связаны с термодинамическим равновесием", "Все вещества имеют идентичные фазовые диаграммы независимо от их природы", "Фазовая диаграмма показывает только химический состав вещества, а не его физическое состояние", "Фазовая диаграмма показывает области давления и температуры, в которых термодинамически устойчива определённая фаза (твёрдая, жидкая, газообразная), а линии на диаграмме соответствуют условиям сосуществования двух фаз в равновесии"], "correct": 3, "explain": "Фазовая диаграмма — графическое представление термодинамически устойчивых фаз вещества в координатах давление-температура, где линии равновесия отражают условия, при которых энергии Гиббса разных фаз равны.", "usage": {"code": false, "without": "Гадаешь, в каком состоянии окажется вещество при данных P и T.", "with": "По фазовой диаграмме читаешь устойчивую фазу для точки (P,T), а линии — условия сосуществования фаз.", "benefit": "Состояние вещества по P и T."}}, {"q": "Почему буферные растворы (например, ацетатный буфер) способны поддерживать относительно постоянный pH при добавлении небольших количеств кислоты или щёлочи?", "options": ["Буферные растворы полностью инертны к любым добавляемым веществам", "pH буфера не зависит от его химического состава", "Буфер содержит сопряжённую кислотно-основную пару, способную связывать добавленные ионы H+ или OH-, смещая равновесие диссоциации так, чтобы компенсировать изменение концентрации свободных ионов водорода", "Буферный эффект объясняется исключительно физическим разбавлением добавленного вещества"], "correct": 2, "explain": "Согласно принципу Ле Шателье, равновесие слабой кислоты и её сопряжённого основания смещается при добавлении H+ или OH-, поглощая большую часть добавленных ионов и минимизируя изменение pH.", "usage": {"code": false, "without": "Добавляешь немного кислоты в раствор — pH резко скачет, и эксперимент испорчен.", "with": "Используешь буфер (сопряжённую кислотно-основную пару): он связывает добавленные H+/OH- и держит pH почти постоянным.", "benefit": "Стабильный pH при небольших добавках."}}, {"q": "Как связаны понятия энергии активации и энергии Гиббса реакции — почему термодинамически выгодная (ΔG<0) реакция может протекать крайне медленно?", "options": ["Энергия активации всегда равна ΔG для любой реакции", "Если ΔG<0, энергия активации всегда равна нулю, и реакция должна идти мгновенно", "ΔG определяет только разницу энергий начального и конечного состояний (термодинамику), тогда как энергия активации определяет высоту барьера на пути между ними (кинетику) — эти два аспекта независимы друг от друга", "Кинетика реакции полностью определяется знаком ΔG"], "correct": 2, "explain": "Термодинамика (ΔG) говорит, возможна ли реакция в принципе и в каком направлении, но не говорит ничего о скорости — это епархия кинетики (энергии активации); реакция может быть очень выгодна термодинамически, но кинетически заблокирована высоким барьером.", "usage": {"code": false, "without": "Видишь ΔG<0 и ждёшь, что реакция пойдёт быстро, а она стоит на месте.", "with": "Различаешь: ΔG говорит, возможна ли реакция, а Ea — как быстро; выгодная реакция может быть заблокирована высоким барьером.", "benefit": "Не путаешь возможность со скоростью."}}, {"q": "Как взаимодействуют концентрация, температура и катализатор как три независимых способа влияния на скорость реакции, и почему их эффекты в общем случае мультипликативны, а не аддитивны в кинетическом уравнении?", "options": ["Концентрация реагентов не входит в кинетическое уравнение скорости реакции", "Скорость реакции обычно выражается как произведение факторов v=k(T)·[A]^m·[B]^n, где k(T) зависит от температуры и катализатора (через энергию активации), а концентрационные члены — от количества реагентов, поэтому одновременное изменение нескольких факторов даёт мультипликативный, а не аддитивный эффект", "Катализатор и температура влияют на скорость абсолютно одинаковым образом", "Все факторы (температура, концентрация, катализатор) влияют на скорость аддитивно, складываясь друг с другом"], "correct": 1, "explain": "Классическое кинетическое уравнение v=k·[A]^m[B]^n показывает, что константа скорости k (зависящая от температуры и катализатора через энергию активации) умножается на концентрационные члены — отсюда мультипликативный характер связи факторов.", "usage": {"code": false, "without": "Считаешь, что удвоение концентрации и нагрев просто складываются в приросте скорости.", "with": "По v=k(T)·[A]^m·[B]^n факторы перемножаются: эффекты температуры/катализатора и концентраций мультипликативны.", "benefit": "Верно оцениваешь совместный эффект факторов."}}, {"q": "Почему при проектировании промышленного химического реактора инженеры должны одновременно учитывать термодинамику (максимально достижимый выход) и кинетику (скорость достижения этого выхода), а не оптимизировать только один из этих аспектов?", "options": ["Кинетика полностью определяет равновесный выход, поэтому термодинамику можно игнорировать", "Термодинамика и кинетика реакции — это одно и то же понятие в химической инженерии", "Термодинамика полностью определяет скорость процесса, поэтому кинетику можно игнорировать при проектировании", "Термодинамически идеальные условия (например, для смещения равновесия) могут кинетически приводить к неприемлемо медленной реакции, и наоборот — оптимальный процесс требует компромисса между теоретическим выходом и практической скоростью его достижения"], "correct": 3, "explain": "Классический пример — процесс Габера для синтеза аммиака: термодинамически низкая температура выгоднее для выхода, но кинетически при низкой температуре реакция идёт слишком медленно, поэтому используется компромиссная температура с катализатором.", "usage": {"code": false, "without": "Оптимизируешь только теоретический выход и получаешь неприемлемо медленный процесс.", "with": "Ищешь компромисс термодинамики (выход) и кинетики (скорость) — как в процессе Габера для аммиака.", "benefit": "Рабочий процесс, а не только идеальный на бумаге."}}, {"q": "Как молекулярная структура (например, наличие объёмных заместителей рядом с реакционным центром) влияет на энергию активации реакции через понятие стерического затруднения?", "options": ["Стерическое затруднение всегда снижает энергию активации, ускоряя реакцию", "Молекулярная структура реагентов никогда не влияет на энергию активации реакции", "Объёмные заместители могут физически препятствовать сближению реагирующих частиц до состояния, необходимого для образования переходного состояния, эффективно повышая энергию активации и замедляя реакцию", "Энергия активации определяется исключительно температурой, а не структурой молекул"], "correct": 2, "explain": "Стерические эффекты — классический пример того, как трёхмерная структура молекулы (а не только её химический состав) влияет на кинетику: объёмные группы могут 'экранировать' реакционный центр, повышая эффективный барьер реакции.", "usage": {"code": false, "without": "Ждёшь одинаковой скорости для похожих по составу молекул и промахиваешься.", "with": "Учитываешь стерическое затруднение: объёмные заместители экранируют реакционный центр, повышают Ea и замедляют реакцию.", "benefit": "3D-структура объясняет разницу в скорости."}}, {"q": "Почему выбор растворителя может существенно изменить скорость и даже механизм реакции (например, полярный протонный vs апротонный растворитель)?", "options": ["Растворитель может стабилизировать (или дестабилизировать) переходное состояние или промежуточные ионные частицы за счёт сольватации, что напрямую влияет на эффективную энергию активации и предпочтительный путь реакции", "Полярность растворителя влияет только на температуру кипения смеси, но не на кинетику", "Растворитель служит исключительно средой для перемешивания и никогда не участвует в определении кинетики реакции", "Механизм реакции никогда не зависит от природы растворителя"], "correct": 0, "explain": "Растворитель может стабилизировать заряженные или полярные переходные состояния через сольватацию, тем самым понижая или повышая энергетический барьер конкретного пути реакции и даже переключая предпочтительный механизм.", "usage": {"code": false, "without": "Меняешь растворитель как «просто среду» и неожиданно получаешь другую скорость или даже другой продукт.", "with": "Подбираешь растворитель осознанно: сольватация стабилизирует переходное состояние/ионы, меняя барьер и предпочтительный путь.", "benefit": "Растворитель как инструмент управления реакцией."}}, {"q": "Как принцип микроскопической обратимости (при равновесии путь прямой и обратной реакции проходит через одно и то же переходное состояние) связывает кинетику и термодинамику на молекулярном уровне?", "options": ["Кинетика прямой реакции не связана со скоростью обратной реакции при равновесии", "Принцип микроскопической обратимости не связан с константой равновесия", "Он утверждает, что при равновесии скорость прямой реакции через определённый путь равна скорости обратной реакции через тот же путь, что связывает наблюдаемую макроскопическую константу равновесия с микроскопическими константами скоростей прямой и обратной реакции (K=k_прямая/k_обратная)", "Прямая и обратная реакции всегда идут через принципиально разные переходные состояния"], "correct": 2, "explain": "Именно из микроскопической обратимости следует широко используемое соотношение K=k_прямая/k_обратная, связывающее термодинамическую константу равновесия с кинетическими константами скорости обеих реакций.", "usage": {"code": false, "without": "Считаешь кинетику и термодинамику несвязанными — K и константы скорости живут по отдельности.", "with": "Через микроскопическую обратимость связываешь их: K=k_прямая/k_обратная.", "benefit": "Мост между скоростями и равновесием."}}, {"q": "Почему для гетерогенного катализа (катализатор в другой фазе, чем реагенты, например твёрдый катализатор для газовой реакции) площадь поверхности катализатора критически важна для эффективности процесса?", "options": ["Площадь поверхности катализатора не влияет на скорость гетерогенной реакции", "Реакция происходит на активных центрах поверхности катализатора, и большая площадь поверхности (например, за счёт пористой структуры) даёт больше доступных активных центров для взаимодействия с молекулами реагента, ускоряя общий процесс", "Увеличение площади поверхности катализатора всегда замедляет реакцию", "Гетерогенный катализ никогда не зависит от структуры поверхности материала"], "correct": 1, "explain": "В гетерогенном катализе реакция локализована на поверхности, поэтому число доступных активных центров (и, соответственно, скорость всего процесса) напрямую связано с эффективной площадью поверхности катализатора.", "usage": {"code": false, "without": "Берёшь плотный монолитный катализатор и получаешь слабое ускорение реакции.", "with": "Используешь пористый/дисперсный катализатор: больше активных центров на поверхности — выше скорость.", "benefit": "Больше поверхность — быстрее процесс."}}, {"q": "Как связаны понятия энтропии активации (ΔS‡) и энтальпии активации (ΔH‡) в теории переходного состояния с наблюдаемой энергией активации Аррениуса?", "options": ["Только энтальпия активации влияет на скорость реакции, энтропийный вклад отсутствует", "ΔH‡ и ΔS‡ являются синонимами энергии активации Аррениуса", "Энтропия активации не имеет физического смысла и не используется в кинетике", "Теория переходного состояния разбивает энергетический барьер реакции на энтальпийную (энергетическую) и энтропийную (связанную с изменением упорядоченности при образовании переходного состояния) составляющие, обе из которых влияют на итоговую наблюдаемую скорость реакции"], "correct": 3, "explain": "Теория переходного состояния (уравнение Эйринга) даёт более детализированную картину энергетического барьера, разделяя его на энтальпийный и энтропийный вклады, что позволяет объяснить, например, почему бимолекулярные реакции с высокой упорядоченностью переходного состояния имеют дополнительный кинетический штраф (отрицательное ΔS‡).", "usage": {"code": false, "without": "Сводишь барьер к одной энергии Аррениуса и не можешь объяснить «штраф» бимолекулярных реакций.", "with": "По теории переходного состояния делишь барьер на ΔH‡ и ΔS‡; отрицательное ΔS‡ объясняет замедление упорядоченных переходных состояний.", "benefit": "Детальнее видишь природу барьера."}}, {"q": "Почему уравнение состояния реального газа (например, уравнение Ван-дер-Ваальса) вводит поправки на объём молекул и межмолекулярное притяжение по сравнению с моделью идеального газа?", "options": ["Реальные газы всегда ведут себя идентично идеальному газу при любых условиях", "При высоких давлениях и низких температурах собственный объём молекул и силы притяжения между ними становятся значимыми и нарушают допущения идеального газа (точечные частицы без взаимодействия), поэтому нужны поправочные члены для точного описания поведения", "Поправки Ван-дер-Ваальса нужны только для жидкостей, а не для газов", "Уравнение состояния идеального газа точно описывает поведение любого газа при любых условиях"], "correct": 1, "explain": "Модель идеального газа игнорирует объём молекул и межмолекулярные силы, что становится существенным приближением при высоких давлениях/низких температурах — уравнение Ван-дер-Ваальса вводит поправочные члены (a и b), учитывающие эти эффекты.", "usage": {"code": false, "without": "Применяешь PV=nRT при высоком давлении и низкой температуре и получаешь заметную ошибку.", "with": "Берёшь уравнение Ван-дер-Ваальса с поправками a (притяжение) и b (объём молекул) — точнее описывает реальный газ.", "benefit": "Точность там, где идеальный газ врёт."}}, {"q": "Химик наблюдает, что повышение температуры реакции ускоряет как прямую, так и обратную реакцию, но выход целевого продукта при равновесии снижается. Что это говорит о термодинамике реакции?", "options": ["Такое поведение невозможно с точки зрения термодинамики", "Снижение выхода означает ошибку в эксперименте, а не термодинамическую закономерность", "Скорость реакции и положение равновесия всегда меняются в одном направлении", "Реакция, вероятно, экзотермична (ΔH<0) — согласно принципу Ле Шателье и уравнению Вант-Гоффа, повышение температуры смещает равновесие в сторону реагентов, уменьшая равновесный выход продукта, даже если скорость установления равновесия выросла"], "correct": 3, "explain": "Важно различать кинетику (скорость достижения равновесия, растёт с температурой всегда) и термодинамику (положение равновесия): для экзотермической реакции более высокая температура ускоряет процесс, но смещает равновесие в невыгодную для продукта сторону.", "usage": {"code": false, "without": "Видишь падение выхода при нагреве и списываешь это на ошибку опыта.", "with": "По Вант-Гоффу/Ле Шателье заключаешь: реакция экзотермична (ΔH<0), нагрев сдвигает равновесие к реагентам.", "benefit": "Из наблюдения выводишь знак ΔH."}}, {"q": "На производстве добавили катализатор для ускорения реакции синтеза продукта, но выход продукта при равновесии остался неизменным. Как это объяснить студенту, ожидавшему увеличения выхода?", "options": ["Отсутствие изменения выхода означает, что катализатор не сработал", "Катализаторы не влияют на скорость реакций вообще", "Катализатор ускоряет достижение равновесия (кинетический эффект), но не смещает само положение равновесия (термодинамическую константу K), поэтому равновесный выход продукта остаётся прежним", "Катализатор всегда должен увеличивать равновесный выход продукта, и наблюдение указывает на ошибку в эксперименте"], "correct": 2, "explain": "Классическое разграничение: катализатор влияет на кинетику (скорость), но термодинамика (равновесная константа K, определяемая ΔG реакции) остаётся неизменной — быстрее достигается то же самое равновесие.", "usage": {"code": false, "without": "Объясняешь студенту, что катализатор «не сработал», раз выход остался прежним.", "with": "Объясняешь: катализатор ускоряет достижение того же равновесия, а K и выход определяются ΔG, а не катализатором.", "benefit": "Верное объяснение неизменного выхода."}}, {"q": "Инженер разрабатывает процесс, где реакция синтеза аммиака (экзотермическая, с уменьшением числа молей газа) должна дать максимальный выход продукта. Какие условия температуры и давления стоит выбрать, руководствуясь принципом Ле Шателье?", "options": ["Температура и давление не влияют на выход реакции синтеза аммиака", "Более низкая температура (сдвигает равновесие в сторону экзотермического направления — продуктов) и более высокое давление (сдвигает равновесие в сторону меньшего числа молей газа — тоже продуктов)", "Нужно минимизировать и температуру, и давление одновременно для любого процесса", "Более высокая температура и низкое давление максимизируют выход в любой экзотермической реакции с уменьшением объёма"], "correct": 1, "explain": "Это классический пример процесса Габера: низкая температура благоприятствует экзотермическому направлению, а высокое давление благоприятствует направлению с меньшим числом молей газа (в данном случае — оба фактора благоприятствуют продукту), хотя на практике температуру повышают для приемлемой скорости, находя компромисс.", "usage": {"code": false, "without": "Выбираешь температуру и давление синтеза аммиака наугад.", "with": "По Ле Шателье: низкая T (экзо-направление) и высокое P (меньше молей газа) смещают к продукту; на практике T поднимают ради скорости.", "benefit": "Осознанный выбор условий процесса."}}, {"q": "Лаборант смешал два раствора и заметил, что реакция протекает практически мгновенно при комнатной температуре, хотя расчётная энергия активации кажется высокой. Какое объяснение наиболее вероятно с точки зрения кинетики?", "options": ["Реакция, вероятно, протекает по другому, более быстрому механизму (возможно, каталитическому или ионному) с меньшей эффективной энергией активации, чем предполагалось в расчёте для другого возможного пути", "Высокая энергия активации всегда гарантирует крайне медленную реакцию независимо от механизма", "Скорость реакции никогда не зависит от энергии активации", "Наблюдаемая скорость реакции противоречит законам термодинамики"], "correct": 0, "explain": "Расхождение между ожидаемой и наблюдаемой скоростью часто означает, что реальный механизм реакции отличается от предполагаемого (например, идёт через более выгодный путь с меньшим барьером), что подчёркивает важность экспериментального определения кинетики, а не только теоретических оценок.", "usage": {"code": false, "without": "Списываешь неожиданно быструю реакцию на ошибку, доверяя расчётному высокому Ea.", "with": "Предполагаешь другой, более выгодный механизм (ионный или каталитический) с меньшей эффективной Ea.", "benefit": "Расхождение — сигнал о другом пути реакции."}}, {"q": "Компания хранит продукт, который медленно разлагается при комнатной температуре с выделением тепла (экзотермическая реакция разложения). Почему хранение при пониженной температуре критично важно с точки зрения кинетики, даже если реакция термодинамически всё равно самопроизвольна?", "options": ["Понижение температуры делает реакцию разложения термодинамически невозможной", "Согласно уравнению Аррениуса, снижение температуры экспоненциально уменьшает скорость реакции разложения, хотя термодинамическая возможность реакции (ΔG<0) сохраняется — снижается именно кинетика, а не термодинамика процесса", "Реакция разложения останавливается полностью при любой положительной температуре", "Скорость реакции не зависит от температуры хранения"], "correct": 1, "explain": "Термодинамическая самопроизвольность (ΔG<0) не говорит о том, как быстро процесс произойдёт — именно кинетика (сильно зависящая от температуры через уравнение Аррениуса) определяет практическую стабильность вещества при хранении.", "usage": {"code": false, "without": "Хранишь разлагающийся продукт в тепле, полагая, что раз ΔG<0, изменить ничего нельзя.", "with": "Понижаешь температуру: по Аррениусу скорость разложения падает экспоненциально, продукт хранится дольше.", "benefit": "Кинетика продлевает срок хранения."}}, {"q": "При титровании слабой кислоты сильным основанием исследователь наблюдает область на кривой титрования, где pH меняется очень слабо при добавлении титранта. Какое явление это иллюстрирует?", "options": ["Это указывает на ошибку в эксперименте титрования", "pH раствора никогда не может оставаться постоянным при добавлении титранта", "Буферный эффект возможен только для сильных кислот и оснований", "Буферную область — в этом диапазоне присутствует значимое количество и слабой кислоты, и её сопряжённого основания, которые совместно противостоят изменению pH"], "correct": 3, "explain": "Плато на кривой титрования соответствует буферной области, где соотношение слабой кислоты и её сопряжённого основания близко к оптимальному для сопротивления изменению pH (вблизи pKa кислоты).", "usage": {"code": false, "without": "Видишь плато pH на кривой титрования и считаешь его артефактом.", "with": "Узнаёшь буферную область: рядом присутствуют и слабая кислота, и её сопряжённое основание, вместе удерживающие pH (около pKa).", "benefit": "Правильная трактовка плато кривой титрования."}}, {"q": "Технолог заметил, что увеличение концентрации одного из реагентов вдвое привело к четырёхкратному увеличению начальной скорости реакции. Что это говорит о порядке реакции по этому реагенту?", "options": ["Реакция первого порядка по этому реагенту", "Реакция второго порядка по этому реагенту (скорость пропорциональна квадрату концентрации)", "Данных недостаточно, чтобы сделать вывод о порядке реакции", "Реакция нулевого порядка по этому реагенту"], "correct": 1, "explain": "Если скорость v ~ [A]^n, и увеличение [A] в 2 раза даёт рост скорости в 4 раза (2^n=4), то n=2 — реакция второго порядка по этому реагенту.", "usage": {"code": false, "without": "Не можешь по данным опыта определить порядок реакции по реагенту.", "with": "Из v~[A]^n: удвоение [A] дало рост скорости в 4 раза, значит 2^n=4, n=2 — второй порядок.", "benefit": "Порядок реакции прямо из эксперимента."}}, {"q": "При проведении реакции в закрытом сосуде давление газообразных продуктов постепенно растёт, а затем стабилизируется на постоянном значении. Как это интерпретировать с точки зрения химического равновесия?", "options": ["Система достигла состояния динамического равновесия, где скорости прямой и обратной реакции сравнялись, и наблюдаемое давление (концентрации) перестало изменяться со временем", "Стабилизация давления не связана с понятием химического равновесия", "Стабилизация давления означает, что реакция полностью прекратилась и больше не происходит", "Постоянное давление означает, что все реагенты уже полностью израсходованы"], "correct": 0, "explain": "Стабильное давление/концентрация продукта при продолжающейся микроскопической активности (реакция всё ещё идёт в обе стороны) — классический признак достижения динамического химического равновесия.", "usage": {"code": false, "without": "Видишь, что давление перестало расти, и думаешь, что реакция прекратилась или реагенты кончились.", "with": "Трактуешь это как динамическое равновесие: скорости прямой и обратной сравнялись, концентрации постоянны, реакция идёт.", "benefit": "Постоянство давления = равновесие."}}, {"q": "Исследователь хочет ускорить медленную реакцию в промышленном процессе, не меняя температуру (из-за риска побочных реакций при нагреве). Какой подход наиболее целесообразен согласно принципам химической кинетики?", "options": ["Единственный способ ускорить реакцию — обязательно повысить температуру", "Подобрать подходящий катализатор, снижающий энергию активации без изменения температуры процесса", "Увеличение концентрации реагентов никогда не влияет на скорость реакции", "Скорость реакции невозможно изменить без изменения температуры"], "correct": 1, "explain": "Катализатор — способ ускорить реакцию, снижая энергетический барьер, без изменения температуры системы, что особенно ценно, когда повышение температуры нежелательно (например, из-за побочных реакций или разложения).", "usage": {"code": false, "without": "Единственный способ ускорения видишь в нагреве и рискуешь побочными реакциями.", "with": "Подбираешь катализатор — он снижает Ea и ускоряет реакцию без повышения температуры.", "benefit": "Ускорение без риска перегрева."}}, {"q": "Компания разрабатывает процесс кристаллизации соли из раствора и хочет получить крупные, качественные кристаллы, а не мелкий осадок. Какое кинетическое соображение здесь важно учитывать?", "options": ["Слишком быстрое пересыщение и охлаждение приводит к образованию множества мелких центров кристаллизации одновременно, тогда как медленное, контролируемое охлаждение способствует росту немногих крупных кристаллов", "Кристаллизация — процесс, полностью не зависящий от кинетики", "Скорость охлаждения не влияет на размер образующихся кристаллов", "Крупные кристаллы образуются только при максимально быстром охлаждении раствора"], "correct": 0, "explain": "Кинетика зарождения (нуклеации) кристаллов чувствительна к скорости изменения условий: быстрое пересыщение создаёт множество центров нуклеации (мелкие кристаллы), тогда как медленный контролируемый процесс благоприятствует росту меньшего числа, но более крупных кристаллов.", "usage": {"code": false, "without": "Быстро охлаждаешь раствор и получаешь мелкий бесполезный осадок.", "with": "Медленно, контролируемо охлаждаешь: мало центров нуклеации — растут немногие крупные кристаллы.", "benefit": "Крупные качественные кристаллы вместо пыли."}}, {"q": "Реакция имеет ΔH = -50 кДж/моль и ΔS = -100 Дж/(моль·К) при температуре 300 К. Чему равно ΔG (в кДж/моль)?", "options": ["+30", "-20", "-50.03", "-80"], "correct": 1, "explain": "ΔG = ΔH - TΔS = -50000 Дж - 300×(-100) Дж = -50000+30000 = -20000 Дж = -20 кДж/моль.", "usage": {"code": true, "without": "Знаешь ΔH, ΔS и T, но «на глаз» не скажешь, самопроизвольна ли реакция.", "with": "Считаешь ΔG=ΔH-TΔS = -50 - 300·(-0.1) = -20 кДж/моль, ΔG<0 — самопроизвольна. python: dG = -50 - 300*(-0.1)", "benefit": "Точный ΔG и вывод о направлении."}}, {"q": "Скорость реакции при увеличении концентрации реагента A в 3 раза выросла в 9 раз (при постоянной концентрации остальных реагентов). Каков порядок реакции по веществу A?", "options": ["Третий (3)", "Нулевой (0)", "Второй (2)", "Первый (1)"], "correct": 2, "explain": "Если v~[A]^n и 3^n=9, то n=2 — реакция второго порядка по A.", "usage": {"code": true, "without": "Видишь рост скорости при увеличении концентрации, но порядок реакции определить не можешь.", "with": "Из 3^n=9 находишь n=2. python: import math; n = math.log(9)/math.log(3)  # 2.0", "benefit": "Порядок реакции из отношения скоростей."}}, {"q": "Для реакции A→B константа равновесия K=4 при данной температуре. Если в равновесии [A]=2 моль/л, чему равна [B]?", "options": ["4", "8", "2", "0.5"], "correct": 1, "explain": "K=[B]/[A], значит [B]=K×[A]=4×2=8.", "usage": {"code": true, "without": "Знаешь K и равновесную [A], но [B] подбираешь наугад.", "with": "K=[B]/[A] ⇒ [B]=K·[A]=4·2=8 моль/л. python: B = 4 * 2", "benefit": "Равновесная концентрация продукта из K."}}, {"q": "Объём идеального газа при постоянной температуре и количестве вещества увеличивается вдвое. Как изменится давление согласно закону Бойля-Мариотта (PV=const при T=const)?", "options": ["Увеличится вдвое", "Уменьшится вдвое", "Останется неизменным", "Увеличится в 4 раза"], "correct": 1, "explain": "При постоянной температуре PV=const, значит при увеличении V вдвое P уменьшается вдвое.", "usage": {"code": false, "without": "Не знаешь, как изменится давление при увеличении объёма при постоянной температуре.", "with": "По закону Бойля-Мариотта PV=const: объём вырос вдвое ⇒ давление упало вдвое.", "benefit": "Давление напрямую из закона Бойля-Мариотта."}}, {"q": "Реакция имеет энергию активации Ea=50 кДж/моль. Согласно уравнению Аррениуса, при повышении температуры скорость реакции должна:", "options": ["Уменьшаться экспоненциально", "Оставаться неизменной", "Увеличиваться экспоненциально", "Линейно уменьшаться"], "correct": 2, "explain": "k=A·e^(-Ea/RT): при увеличении T показатель степени -Ea/RT растёт (приближается к нулю), значит e^(...) и, соответственно, k растут экспоненциально.", "usage": {"code": false, "without": "Ждёшь, что нагрев лишь чуть-чуть ускорит реакцию (линейно).", "with": "По k=A·e^(-Ea/RT) при росте T показатель -Ea/RT растёт к нулю, поэтому k растёт экспоненциально.", "benefit": "Верно предсказываешь резкий рост скорости."}}, {"q": "1 моль идеального газа занимает объём 22.4 л при нормальных условиях (0°C, 1 атм). Какой объём займут 2 моль газа при тех же условиях?", "options": ["22.4 л", "67.2 л", "11.2 л", "44.8 л"], "correct": 3, "explain": "Объём пропорционален количеству вещества при постоянных условиях: 2×22.4 = 44.8 л.", "usage": {"code": true, "without": "Путаешься, как масштабируется объём газа с количеством вещества при тех же условиях.", "with": "Объём пропорционален n: 2·22.4=44.8 л. python: V = 2 * 22.4", "benefit": "Объём газа для любого числа молей."}}, {"q": "pH раствора равен 3. Какова концентрация ионов водорода [H+] в этом растворе (в моль/л)?", "options": ["1000", "3", "0.03", "0.001 (10⁻³)"], "correct": 3, "explain": "pH = -log[H+], значит [H+] = 10^(-pH) = 10⁻³ = 0.001 моль/л.", "usage": {"code": true, "without": "Знаешь pH, но концентрацию ионов водорода назвать не можешь.", "with": "[H+]=10^(-pH)=10^-3=0.001 моль/л. python: h = 10**-3", "benefit": "Концентрация H+ из pH."}}, {"q": "Раствор с pH=3 разбавили в 100 раз чистой водой. Каким приблизительно станет новый pH (без учёта эффектов при очень сильном разбавлении)?", "options": ["3", "1", "7", "5"], "correct": 3, "explain": "Разбавление в 100 раз уменьшает [H+] в 100 раз, что соответствует увеличению pH на log(100)=2 единицы: pH становится примерно 3+2=5.", "usage": {"code": true, "without": "Разбавил кислоту и не знаешь, на сколько вырастет pH.", "with": "Разбавление ×100 ⇒ [H+] уменьшается в 100 раз ⇒ pH+log10(100)=+2 ⇒ pH≈5. python: import math; ph = 3 + math.log10(100)", "benefit": "Новый pH после разбавления."}}, {"q": "Теплота реакции ΔH = -200 кДж выделяется при образовании 2 моль продукта. Сколько теплоты выделится при образовании 5 моль того же продукта (при тех же условиях)?", "options": ["-400 кДж", "-500 кДж", "-200 кДж", "-100 кДж"], "correct": 1, "explain": "Теплота пропорциональна количеству вещества: (-200 кДж/2 моль)×5 моль = -500 кДж.", "usage": {"code": true, "without": "Знаешь тепло на 2 моль продукта, но для 5 моль считаешь неверно.", "with": "Тепло пропорционально количеству: (-200/2)·5=-500 кДж. python: q = -200/2 * 5", "benefit": "Тепловой эффект для нужного числа молей."}}, {"q": "При температуре 500 К реакция имеет константу скорости k, а при увеличении температуры до 600 К скорость реакции существенно возрастает (типично в разы или на порядок для органических реакций при таком росте T). Какое эмпирическое правило (грубое приближение) часто используют для оценки роста скорости при увеличении температуры на каждые 10°C?", "options": ["Скорость реакции не зависит от изменения температуры на 10°C", "Скорость реакции линейно уменьшается при повышении температуры на 10°C", "Правило Вант-Гоффа: скорость реакции увеличивается в 2-4 раза при повышении температуры на каждые 10°C", "Скорость реакции всегда удваивается при повышении температуры на 100°C"], "correct": 2, "explain": "Эмпирическое правило Вант-Гоффа (грубое приближение, справедливое для многих реакций в определённом диапазоне температур) утверждает, что скорость реакции возрастает в 2-4 раза при повышении температуры на каждые 10°C.", "usage": {"code": false, "without": "Не можешь быстро прикинуть, во сколько раз ускорится реакция при нагреве на 10°.", "with": "По правилу Вант-Гоффа скорость растёт в 2-4 раза на каждые 10°C — грубая, но удобная оценка.", "benefit": "Быстрая прикидка ускорения от нагрева."}}, {"q": "Реакция первого порядка имеет период полураспада 10 минут. Через сколько минут останется примерно 25% от начального количества вещества?", "options": ["40 минут", "10 минут", "15 минут", "20 минут"], "correct": 3, "explain": "За один период полураспада (10 мин) остаётся 50%, за два периода (20 мин) — 25%: два последовательных уменьшения вдвое.", "usage": {"code": true, "without": "Знаешь период полураспада, но время до 25% вещества берёшь наугад.", "with": "Путь 50%→25% — это два полупериода: 2·10=20 мин. python: t = 2 * 10", "benefit": "Время до нужной доли для реакции 1-го порядка."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
