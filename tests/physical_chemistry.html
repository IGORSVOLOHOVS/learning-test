<title>Физическая химия</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }

  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }

  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }

  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }

  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {

    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }

  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }

  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);

  }

  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }

    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>

rrect": 3, "explain": "Константа равновесия K = [продукты]/[реагенты] (с учётом стехиометрических коэффициентов как степеней) характеризует положение равновесия при данной температуре.", "usage": {"code": false, "without": "Не можешь сказать, насколько глубоко пройдёт реакция при данной температуре.", "with": "Через K=[продукты]/[реагенты] (в степенях коэффициентов) оцениваешь положение равновесия.", "benefit": "Насколько реакция смещена к продуктам."}}, {"q": "Почему энтальпия и энтропия иногда действуют в противоположных направлениях при определении самопроизвольности реакции, и как энергия Гиббса разрешает этот конфликт?", "options": ["Температура (T) вообще не влияет на баланс энтальпийного и энтропийного вкладов", "Экзотермичность (ΔH<0) помогает, падение энтропии (ΔS<0) мешает; G=H−TS взвешивает оба", "Энергия Гиббса полностью игнорирует энтропийный вклад в самопроизвольность", "Энтальпия и энтропия всегда действуют строго в одном и том же направлении, без исключений"], "correct": 1, "explain": "ΔG=ΔH-TΔS явно показывает, что при высоких температурах энтропийный член (TΔS) может доминировать, меняя знак ΔG даже для эндотермических реакций, если ΔS>0.", "usage": {"code": false, "without": "Видишь экзотермичность (ΔH<0) и падение энтропии (ΔS<0) и не знаешь, какой фактор победит.", "with": "ΔG=ΔH-TΔS взвешивает оба вклада с учётом T; знак ΔG даёт однозначный ответ.", "benefit": "Разрешает конфликт H и S числом."}}, {"q": "Почему согласно теории столкновений скорость реакции экспоненциально (а не линейно) зависит от температуры (уравнение Аррениуса)?", "options": ["Скорость реакции линейно пропорциональна температуре (v ∝ T) по определению", "Уравнение Аррениуса описывает зависимость скорости реакции лишь от концентрации", "Температура влияет только на давление газа, но не на скорость реакции", "Доля молекул с энергией выше барьера растёт с T экспоненциально (Больцман)"], "correct": 3, "explain": "Уравнение Аррениуса k=A·e^(-Ea/RT) отражает экспоненциальную зависимость доли молекул с достаточной для реакции энергией от температуры, согласно статистике Больцмана.", "usage": {"code": false, "without": "Ожидаешь, что нагрев на 10° лишь чуть-чуть ускорит реакцию (линейно).", "with": "Через k=A·e^(-Ea/RT) понимаешь: доля молекул с энергией выше барьера растёт экспоненциально, поэтому небольшой нагрев сильно ускоряет реакцию.", "benefit": "Объясняет резкий рост скорости с температурой."}}, {"q": "Как принцип Ле Шателье объясняет реакцию системы на внешнее возмущение (изменение концентрации, давления, температуры) в состоянии равновесия?", "options": ["Равновесие смещается совершенно случайным образом, независимо от природы воздействия", "Система полностью игнорирует внешние воздействия, сохраняя своё состояние", "Принцип Ле Шателье применим исключительно к реакциям в газовой фазе", "Система смещает равновесие так, чтобы частично скомпенсировать воздействие"], "correct": 3, "explain": "Принцип Ле Шателье формализует интуицию 'система сопротивляется изменению': при увеличении концентрации реагента равновесие смещается в сторону продуктов, компенсируя возмущение, и аналогично для давления/температуры.", "usage": {"code": false, "without": "Не можешь предсказать, куда сместится равновесие при добавлении реагента или сжатии системы.", "with": "По принципу Ле Шателье система смещается так, чтобы компенсировать воздействие: добавил реагент — равновесие ушло к продуктам.", "benefit": "Предсказание сдвига равновесия."}}, {"q": "Почему катализатор ускоряет и прямую, и обратную реакцию в равной степени, не смещая положение равновесия?", "options": ["Катализатор ускоряет только прямую реакцию, заметно смещая равновесие к продуктам", "Он снижает энергию активации симметрично для обоих направлений, не меняя K", "Положение равновесия определяет только катализатор, а не термодинамика", "Катализаторы вообще никак не влияют на скорость обратной реакции"], "correct": 1, "explain": "Катализатор влияет на кинетику (снижая барьер активации для обоих направлений одинаково), но не на термодинамику — константа равновесия K определяется разностью энергий Гиббса реагентов и продуктов, независимо от пути реакции.", "usage": {"code": false, "without": "Ждёшь роста выхода после добавления катализатора и удивляешься, что его нет.", "with": "Знаешь: катализатор снижает Ea симметрично для обоих направлений, ускоряет достижение равновесия, но K и выход не меняет.", "benefit": "Не путаешь скорость с выходом."}}, {"q": "Почему порядок реакции по определённому реагенту не всегда совпадает со стехиометрическим коэффициентом этого реагента в уравнении реакции?", "options": ["Порядок реакции определяется только температурой, а не её механизмом", "Порядок реакции всегда точно равен стехиометрическому коэффициенту", "Стехиометрия и кинетика — это полностью синонимичные и взаимозаменяемые понятия", "Порядок определяют опытно; он отражает механизм, а не суммарное уравнение"], "correct": 3, "explain": "Скорость реакции определяется самой медленной (лимитирующей) стадией сложного, часто многостадийного механизма, и порядок по конкретному веществу отражает именно эту кинетику, а не просто итоговую стехиометрию суммарного уравнения.", "usage": {"code": false, "without": "Списываешь порядок реакции прямо со стехиометрических коэффициентов и получаешь неверный кинетический закон.", "with": "Определяешь порядок экспериментально — он отражает лимитирующую стадию механизма, а не суммарное уравнение.", "benefit": "Правильный кинетический закон."}}, {"q": "Как энтропийный вклад объясняет, почему растворение большинства твёрдых солей в воде является самопроизвольным процессом, даже если оно часто эндотермично (поглощает тепло)?", "options": ["Растворение резко повышает энтропию (кристалл → сольватированные ионы), TΔS>ΔH", "Энтропия при растворении уменьшается (ΔS<0), что должно бы препятствовать процессу", "Самопроизвольность растворения совсем не зависит от термодинамических факторов", "Растворение солей всегда экзотермично, и энтропия тут не играет никакой роли"], "correct": 0, "explain": "Даже при ΔH>0 (эндотермический процесс) реакция может быть самопроизвольной, если рост энтропии (ΔS>0) достаточно велик, чтобы TΔS превысило ΔH, делая ΔG отрицательным.", "usage": {"code": false, "without": "Считаешь, что раз растворение соли поглощает тепло (ΔH>0), оно идти не должно.", "with": "Учитываешь рост энтропии: кристалл → разупорядоченные сольватированные ионы; TΔS перевешивает ΔH, ΔG<0.", "benefit": "Объясняет самопроизвольность эндотермичного растворения."}}, {"q": "Почему уравнение Вант-Гоффа связывает изменение константы равновесия с температурой через энтальпию реакции (ΔH)?", "options": ["Уравнение Вант-Гоффа применимо лишь к идеальным газам при постоянном объёме сосуда", "Для экзотермических реакций (ΔH<0) нагрев уменьшает K, для эндо — увеличивает", "Константа равновесия (K) не зависит от температуры ни для одной реакции", "Температура влияет на константу равновесия только через рост давления"], "correct": 1, "explain": "Уравнение Вант-Гоффа d(lnK)/dT = ΔH/(RT²) формализует качественное предсказание принципа Ле Шателье количественно, связывая знак ΔH с направлением сдвига равновесия при изменении температуры.", "usage": {"code": false, "without": "Знаешь качественно (по Ле Шателье), что нагрев сдвигает равновесие, но не можешь оценить, насколько.", "with": "Через d(lnK)/dT=ΔH/RT² количественно связываешь знак ΔH с изменением K при нагреве.", "benefit": "Числовая оценка сдвига K с температурой."}}, {"q": "Почему скорость реакции для многостадийного механизма определяется самой медленной ('лимитирующей') стадией, а не суммарной кинетикой всех стадий вместе?", "options": ["Все стадии многостадийного механизма всегда идут с одинаковой скоростью", "Скорость определяется исключительно самой первой стадией механизма", "Понятие лимитирующей стадии применимо только к одностадийным реакциям", "Общая скорость цепочки не выше скорости самого медленного её звена"], "correct": 3, "explain": "Аналогия с последовательным производственным процессом: как конвейер работает со скоростью самого медленного этапа, так и многостадийная реакция в целом лимитируется своей самой медленной элементарной стадией.", "usage": {"code": false, "without": "Пытаешься ускорить процесс, оптимизируя быстрые стадии, а общая скорость не растёт.", "with": "Находишь самую медленную (лимитирующую) стадию — именно она задаёт общую скорость; ускорять надо её.", "benefit": "Бьёшь в узкое место механизма."}}, {"q": "Как понятие 'фазовой диаграммы' (например, для воды) связывает термодинамические переменные (давление, температура) с устойчивыми состояниями вещества?", "options": ["Фазовые диаграммы вообще никак не связаны с термодинамическим равновесием фаз", "Все вещества имеют одинаковые фазовые диаграммы, независимо от природы", "Фазовая диаграмма показывает только химический состав (массовые доли), а не состояние", "Области (P,T) устойчивых фаз, а линии — условия сосуществования двух фаз"], "correct": 3, "explain": "Фазовая диаграмма — графическое представление термодинамически устойчивых фаз вещества в координатах давление-температура, где линии равновесия отражают условия, при которых энергии Гиббса разных фаз равны.", "usage": {"code": false, "without": "Гадаешь, в каком состоянии окажется вещество при данных P и T.", "with": "По фазовой диаграмме читаешь устойчивую фазу для точки (P,T), а линии — условия сосуществования фаз.", "benefit": "Состояние вещества по P и T."}}, {"q": "Почему буферные растворы (например, ацетатный буфер) способны поддерживать относительно постоянный pH при добавлении небольших количеств кислоты или щёлочи?", "options": ["Буферные растворы полностью инертны к любым добавляемым в них посторонним веществам", "Величина pH буфера совсем не зависит от его химического состава", "Сопряжённая пара связывает добавленные H⁺/OH⁻, смещая равновесие диссоциации", "Буферный эффект объясняется только физическим разбавлением добавки"], "correct": 2, "explain": "Согласно принципу Ле Шателье, равновесие слабой кислоты и её сопряжённого основания смещается при добавлении H+ или OH-, поглощая большую часть добавленных ионов и минимизируя изменение pH.", "usage": {"code": false, "without": "Добавляешь немного кислоты в раствор — pH резко скачет, и эксперимент испорчен.", "with": "Используешь буфер (сопряжённую кислотно-основную пару): он связывает добавленные H+/OH- и держит pH почти постоянным.", "benefit": "Стабильный pH при небольших добавках."}}, {"q": "Как связаны понятия энергии активации и энергии Гиббса реакции — почему термодинамически выгодная (ΔG<0) реакция может протекать крайне медленно?", "options": ["Энергия активации всегда в точности равна ΔG для любой реакции", "Если ΔG<0, то энергия активации равна нулю и реакция всегда идёт практически мгновенно", "ΔG задаёт разницу энергий начала и конца, а Ea — высоту барьера между ними", "Кинетика реакции целиком определяется знаком её энергии Гиббса ΔG"], "correct": 2, "explain": "Термодинамика (ΔG) говорит, возможна ли реакция в принципе и в каком направлении, но не говорит ничего о скорости — это епархия кинетики (энергии активации); реакция может быть очень выгодна термодинамически, но кинетически заблокирована высоким барьером.", "usage": {"code": false, "without": "Видишь ΔG<0 и ждёшь, что реакция пойдёт быстро, а она стоит на месте.", "with": "Различаешь: ΔG говорит, возможна ли реакция, а Ea — как быстро; выгодная реакция может быть заблокирована высоким барьером.", "benefit": "Не путаешь возможность со скоростью."}}, {"q": "Как взаимодействуют концентрация, температура и катализатор как три независимых способа влияния на скорость реакции, и почему их эффекты в общем случае мультипликативны, а не аддитивны в кинетическом уравнении?", "options": ["Концентрация реагентов ([A], [B]) вообще не входит в кинетическое уравнение скорости", "Скорость v=k(T)·[A]^m·[B]^n; факторы перемножаются, а не складываются", "Катализатор и температура влияют на скорость абсолютно одинаковым образом", "Все факторы влияют на скорость аддитивно, просто складываясь друг с другом"], "correct": 1, "explain": "Классическое кинетическое уравнение v=k·[A]^m[B]^n показывает, что константа скорости k (зависящая от температуры и катализатора через энергию активации) умножается на концентрационные члены — отсюда мультипликативный характер связи факторов.", "usage": {"code": false, "without": "Считаешь, что удвоение концентрации и нагрев просто складываются в приросте скорости.", "with": "По v=k(T)·[A]^m·[B]^n факторы перемножаются: эффекты температуры/катализатора и концентраций мультипликативны.", "benefit": "Верно оцениваешь совместный эффект факторов."}}, {"q": "Почему при проектировании промышленного химического реактора инженеры должны одновременно учитывать термодинамику (максимально достижимый выход) и кинетику (скорость достижения этого выхода), а не оптимизировать только один из этих аспектов?", "options": ["Кинетика полностью задаёт равновесный выход, так что термодинамику опускают", "Термодинамика и кинетика реакции — это одно и то же в инженерии процессов", "Термодинамика полностью задаёт скорость процесса, так что кинетику можно игнорировать", "Идеальные для равновесия условия дают слишком медленную реакцию — нужен компромисс"], "correct": 3, "explain": "Классический пример — процесс Габера для синтеза аммиака: термодинамически низкая температура выгоднее для выхода, но кинетически при низкой температуре реакция идёт слишком медленно, поэтому используется компромиссная температура с катализатором.", "usage": {"code": false, "without": "Оптимизируешь только теоретический выход и получаешь неприемлемо медленный процесс.", "with": "Ищешь компромисс термодинамики (выход) и кинетики (скорость) — как в процессе Габера для аммиака.", "benefit": "Рабочий процесс, а не только идеальный на бумаге."}}, {"q": "Как молекулярная структура (например, наличие объёмных заместителей рядом с реакционным центром) влияет на энергию активации реакции через понятие стерического затруднения?", "options": ["Стерическое затруднение всегда снижает энергию активации, ускоряя реакцию", "Молекулярная структура реагентов никогда не влияет на энергию активации", "Объёмные группы мешают сближению частиц, повышая Ea и замедляя реакцию", "Энергия активации задаётся только температурой, а не структурой молекул"], "correct": 2, "explain": "Стерические эффекты — классический пример того, как трёхмерная структура молекулы (а не только её химический состав) влияет на кинетику: объёмные группы могут 'экранировать' реакционный центр, повышая эффективный барьер реакции.", "usage": {"code": false, "without": "Ждёшь одинаковой скорости для похожих по составу молекул и промахиваешься.", "with": "Учитываешь стерическое затруднение: объёмные заместители экранируют реакционный центр, повышают Ea и замедляют реакцию.", "benefit": "3D-структура объясняет разницу в скорости."}}, {"q": "Почему выбор растворителя может существенно изменить скорость и даже механизм реакции (например, полярный протонный vs апротонный растворитель)?", "options": ["Сольватация стабилизирует переходное состояние и ионы, меняя барьер и путь", "Полярность растворителя влияет только на температуру кипения смеси", "Растворитель служит лишь средой для перемешивания и в кинетике не участвует", "Механизм реакции вообще никогда не зависит от природы растворителя"], "correct": 0, "explain": "Растворитель может стабилизировать заряженные или полярные переходные состояния через сольватацию, тем самым понижая или повышая энергетический барьер конкретного пути реакции и даже переключая предпочтительный механизм.", "usage": {"code": false, "without": "Меняешь растворитель как «просто среду» и неожиданно получаешь другую скорость или даже другой продукт.", "with": "Подбираешь растворитель осознанно: сольватация стабилизирует переходное состояние/ионы, меняя барьер и предпочтительный путь.", "benefit": "Растворитель как инструмент управления реакцией."}}, {"q": "Как принцип микроскопической обратимости (при равновесии путь прямой и обратной реакции проходит через одно и то же переходное состояние) связывает кинетику и термодинамику на молекулярном уровне?", "options": ["Кинетика прямой реакции не связана со скоростью обратной при равновесии", "Принцип микроскопической обратимости не связан с константой равновесия", "При равновесии прямой и обратный путь совпадают, отсюда K=k_пр/k_обр", "Прямая и обратная реакции всегда идут через разные переходные состояния"], "correct": 2, "explain": "Именно из микроскопической обратимости следует широко используемое соотношение K=k_прямая/k_обратная, связывающее термодинамическую константу равновесия с кинетическими константами скорости обеих реакций.", "usage": {"code": false, "without": "Считаешь кинетику и термодинамику несвязанными — K и константы скорости живут по отдельности.", "with": "Через микроскопическую обратимость связываешь их: K=k_прямая/k_обратная.", "benefit": "Мост между скоростями и равновесием."}}, {"q": "Почему для гетерогенного катализа (катализатор в другой фазе, чем реагенты, например твёрдый катализатор для газовой реакции) площадь поверхности катализатора критически важна для эффективности процесса?", "options": ["Площадь поверхности катализатора совсем не влияет на скорость гетерогенной реакции", "Реакция идёт на активных центрах поверхности; больше площадь — больше центров", "Увеличение площади поверхности катализатора всегда замедляет реакцию", "Гетерогенный катализ никогда не зависит от структуры поверхности материала"], "correct": 1, "explain": "В гетерогенном катализе реакция локализована на поверхности, поэтому число доступных активных центров (и, соответственно, скорость всего процесса) напрямую связано с эффективной площадью поверхности катализатора.", "usage": {"code": false, "without": "Берёшь плотный монолитный катализатор и получаешь слабое ускорение реакции.", "with": "Используешь пористый/дисперсный катализатор: больше активных центров на поверхности — выше скорость.", "benefit": "Больше поверхность — быстрее процесс."}}, {"q": "Как связаны понятия энтропии активации (ΔS‡) и энтальпии активации (ΔH‡) в теории переходного состояния с наблюдаемой энергией активации Аррениуса?", "options": ["На скорость влияет только энтальпия активации (ΔH‡), а энтропийного вклада вовсе нет", "ΔH‡ и ΔS‡ — это просто синонимы энергии активации по Аррениусу", "Энтропия активации лишена физического смысла и в кинетике не нужна", "Барьер делится на энтальпийную (ΔH‡) и энтропийную (ΔS‡) части — обе важны"], "correct": 3, "explain": "Теория переходного состояния (уравнение Эйринга) даёт более детализированную картину энергетического барьера, разделяя его на энтальпийный и энтропийный вклады, что позволяет объяснить, например, почему бимолекулярные реакции с высокой упорядоченностью переходного состояния имеют дополнительный кинетический штраф (отрицательное ΔS‡).", "usage": {"code": false, "without": "Сводишь барьер к одной энергии Аррениуса и не можешь объяснить «штраф» бимолекулярных реакций.", "with": "По теории переходного состояния делишь барьер на ΔH‡ и ΔS‡; отрицательное ΔS‡ объясняет замедление упорядоченных переходных состояний.", "benefit": "Детальнее видишь природу барьера."}}, {"q": "Почему уравнение состояния реального газа (например, уравнение Ван-дер-Ваальса) вводит поправки на объём молекул и межмолекулярное притяжение по сравнению с моделью идеального газа?", "options": ["Реальные газы всегда ведут себя точно как идеальный газ при любых условиях", "При высоком P и низкой T объём молекул и притяжение нарушают идеальность", "Поправки Ван-дер-Ваальса нужны только для жидкостей, но не для газов", "Уравнение идеального газа точно описывает любой газ при любых условиях"], "correct": 1, "explain": "Модель идеального газа игнорирует объём молекул и межмолекулярные силы, что становится существенным приближением при высоких давлениях/низких температурах — уравнение Ван-дер-Ваальса вводит поправочные члены (a и b), учитывающие эти эффекты.", "usage": {"code": false, "without": "Применяешь PV=nRT при высоком давлении и низкой температуре и получаешь заметную ошибку.", "with": "Берёшь уравнение Ван-дер-Ваальса с поправками a (притяжение) и b (объём молекул) — точнее описывает реальный газ.", "benefit": "Точность там, где идеальный газ врёт."}}, {"q": "Химик наблюдает, что повышение температуры реакции ускоряет как прямую, так и обратную реакцию, но выход целевого продукта при равновесии снижается. Что это говорит о термодинамике реакции?", "options": ["Такое поведение вообще невозможно с точки зрения классической химической термодинамики", "Снижение выхода — это ошибка эксперимента, а не термодинамика реакции", "Скорость реакции и положение равновесия (K) всегда меняются в одну сторону", "Реакция экзотермична (ΔH<0): нагрев смещает равновесие к реагентам, выход падает"], "correct": 3, "explain": "Важно различать кинетику (скорость достижения равновесия, растёт с температурой всегда) и термодинамику (положение равновесия): для экзотермической реакции более высокая температура ускоряет процесс, но смещает равновесие в невыгодную для продукта сторону.", "usage": {"code": false, "without": "Видишь падение выхода при нагреве и списываешь это на ошибку опыта.", "with": "По Вант-Гоффу/Ле Шателье заключаешь: реакция экзотермична (ΔH<0), нагрев сдвигает равновесие к реагентам.", "benefit": "Из наблюдения выводишь знак ΔH."}}, {"q": "На производстве добавили катализатор для ускорения реакции синтеза продукта, но выход продукта при равновесии остался неизменным. Как это объяснить студенту, ожидавшему увеличения выхода?", "options": ["Отсутствие изменения выхода означает, что добавленный катализатор просто не сработал", "Катализаторы вообще никак не влияют на скорость химических реакций", "Он ускоряет достижение равновесия, но не смещает его; выход и K остаются те же", "Катализатор обязан повышать выход, так что налицо ошибка эксперимента"], "correct": 2, "explain": "Классическое разграничение: катализатор влияет на кинетику (скорость), но термодинамика (равновесная константа K, определяемая ΔG реакции) остаётся неизменной — быстрее достигается то же самое равновесие.", "usage": {"code": false, "without": "Объясняешь студенту, что катализатор «не сработал», раз выход остался прежним.", "with": "Объясняешь: катализатор ускоряет достижение того же равновесия, а K и выход определяются ΔG, а не катализатором.", "benefit": "Верное объяснение неизменного выхода."}}, {"q": "Инженер разрабатывает процесс, где реакция синтеза аммиака (экзотермическая, с уменьшением числа молей газа) должна дать максимальный выход продукта. Какие условия температуры и давления стоит выбрать, руководствуясь принципом Ле Шателье?", "options": ["Температура и давление совсем не влияют на итоговый выход реакции синтеза аммиака", "Ниже температура (сдвиг к экзо-продуктам) и выше давление (меньше молей газа)", "Нужно одновременно минимизировать и температуру, и давление процесса", "Выше температура и ниже давление (вакуум) максимизируют выход любой такой реакции"], "correct": 1, "explain": "Это классический пример процесса Габера: низкая температура благоприятствует экзотермическому направлению, а высокое давление благоприятствует направлению с меньшим числом молей газа (в данном случае — оба фактора благоприятствуют продукту), хотя на практике температуру повышают для приемлемой скорости, находя компромисс.", "usage": {"code": false, "without": "Выбираешь температуру и давление синтеза аммиака наугад.", "with": "По Ле Шателье: низкая T (экзо-направление) и высокое P (меньше молей газа) смещают к продукту; на практике T поднимают ради скорости.", "benefit": "Осознанный выбор условий процесса."}}, {"q": "Лаборант смешал два раствора и заметил, что реакция протекает практически мгновенно при комнатной температуре, хотя расчётная энергия активации кажется высокой. Какое объяснение наиболее вероятно с точки зрения кинетики?", "options": ["Реакция, вероятно, идёт другим путём с меньшей эффективной энергией активации", "Высокая энергия активации всегда гарантирует крайне медленную и вялую реакцию", "Скорость реакции вообще никак не зависит от её энергии активации", "Наблюдаемая скорость реакции прямо противоречит законам термодинамики"], "correct": 0, "explain": "Расхождение между ожидаемой и наблюдаемой скоростью часто означает, что реальный механизм реакции отличается от предполагаемого (например, идёт через более выгодный путь с меньшим барьером), что подчёркивает важность экспериментального определения кинетики, а не только теоретических оценок.", "usage": {"code": false, "without": "Списываешь неожиданно быструю реакцию на ошибку, доверяя расчётному высокому Ea.", "with": "Предполагаешь другой, более выгодный механизм (ионный или каталитический) с меньшей эффективной Ea.", "benefit": "Расхождение — сигнал о другом пути реакции."}}, {"q": "Компания хранит продукт, который медленно разлагается при комнатной температуре с выделением тепла (экзотермическая реакция разложения). Почему хранение при пониженной температуре критично важно с точки зрения кинетики, даже если реакция термодинамически всё равно самопроизвольна?", "options": ["Понижение температуры делает реакцию разложения термодинамически невозможной", "По Аррениусу холод экспоненциально снижает скорость, хотя ΔG<0 сохраняется", "Реакция разложения полностью останавливается при любой плюсовой температуре", "Скорость реакции разложения совсем не зависит от температуры хранения"], "correct": 1, "explain": "Термодинамическая самопроизвольность (ΔG<0) не говорит о том, как быстро процесс произойдёт — именно кинетика (сильно зависящая от температуры через уравнение Аррениуса) определяет практическую стабильность вещества при хранении.", "usage": {"code": false, "without": "Хранишь разлагающийся продукт в тепле, полагая, что раз ΔG<0, изменить ничего нельзя.", "with": "Понижаешь температуру: по Аррениусу скорость разложения падает экспоненциально, продукт хранится дольше.", "benefit": "Кинетика продлевает срок хранения."}}, {"q": "При титровании слабой кислоты сильным основанием исследователь наблюдает область на кривой титрования, где pH меняется очень слабо при добавлении титранта. Какое явление это иллюстрирует?", "options": ["Это прямо указывает на грубую ошибку в ходе эксперимента титрования", "Величина pH раствора вообще не может оставаться постоянной при титровании", "Буферный эффект возможен лишь для сильных кислот и сильных оснований", "Буферную область: рядом есть и слабая кислота, и её сопряжённое основание"], "correct": 3, "explain": "Плато на кривой титрования соответствует буферной области, где соотношение слабой кислоты и её сопряжённого основания близко к оптимальному для сопротивления изменению pH (вблизи pKa кислоты).", "usage": {"code": false, "without": "Видишь плато pH на кривой титрования и считаешь его артефактом.", "with": "Узнаёшь буферную область: рядом присутствуют и слабая кислота, и её сопряжённое основание, вместе удерживающие pH (около pKa).", "benefit": "Правильная трактовка плато кривой титрования."}}, {"q": "Технолог заметил, что увеличение концентрации одного из реагентов вдвое привело к четырёхкратному увеличению начальной скорости реакции. Что это говорит о порядке реакции по этому реагенту?", "options": ["Реакция первого порядка по данному реагенту: скорость пропорциональна [A]", "Реакция второго порядка: скорость пропорциональна квадрату концентрации A", "Данных пока недостаточно, чтобы сделать вывод о порядке этой реакции", "Реакция нулевого порядка по A: скорость от его концентрации не зависит"], "correct": 1, "explain": "Если скорость v ~ [A]^n, и увеличение [A] в 2 раза даёт рост скорости в 4 раза (2^n=4), то n=2 — реакция второго порядка по этому реагенту.", "usage": {"code": false, "without": "Не можешь по данным опыта определить порядок реакции по реагенту.", "with": "Из v~[A]^n: удвоение [A] дало рост скорости в 4 раза, значит 2^n=4, n=2 — второй порядок.", "benefit": "Порядок реакции прямо из эксперимента."}}, {"q": "При проведении реакции в закрытом сосуде давление газообразных продуктов постепенно растёт, а затем стабилизируется на постоянном значении. Как это интерпретировать с точки зрения химического равновесия?", "options": ["Достигнуто динамическое равновесие: скорости сравнялись, давление постоянно", "Стабилизация давления никак не связана с понятием химического равновесия", "Стабилизация давления означает, что реакция полностью и навсегда прекратилась", "Постоянное давление значит, что все реагенты уже полностью израсходованы"], "correct": 0, "explain": "Стабильное давление/концентрация продукта при продолжающейся микроскопической активности (реакция всё ещё идёт в обе стороны) — классический признак достижения динамического химического равновесия.", "usage": {"code": false, "without": "Видишь, что давление перестало расти, и думаешь, что реакция прекратилась или реагенты кончились.", "with": "Трактуешь это как динамическое равновесие: скорости прямой и обратной сравнялись, концентрации постоянны, реакция идёт.", "benefit": "Постоянство давления = равновесие."}}, {"q": "Исследователь хочет ускорить медленную реакцию в промышленном процессе, не меняя температуру (из-за риска побочных реакций при нагреве). Какой подход наиболее целесообразен согласно принципам химической кинетики?", "options": ["Единственный способ ускорить реакцию — это обязательно повысить температуру", "Подобрать катализатор, снижающий энергию активации без нагрева процесса", "Рост концентрации реагентов вообще никак не влияет на скорость реакции", "Скорость реакции невозможно изменить, не меняя температуру самой системы"], "correct": 1, "explain": "Катализатор — способ ускорить реакцию, снижая энергетический барьер, без изменения температуры системы, что особенно ценно, когда повышение температуры нежелательно (например, из-за побочных реакций или разложения).", "usage": {"code": false, "without": "Единственный способ ускорения видишь в нагреве и рискуешь побочными реакциями.", "with": "Подбираешь катализатор — он снижает Ea и ускоряет реакцию без повышения температуры.", "benefit": "Ускорение без риска перегрева."}}, {"q": "Компания разрабатывает процесс кристаллизации соли из раствора и хочет получить крупные, качественные кристаллы, а не мелкий осадок. Какое кинетическое соображение здесь важно учитывать?", "options": ["Быстрое охлаждение даёт много мелких центров, медленное — рост крупных", "Кристаллизация — процесс, совершенно не зависящий от кинетики роста", "Скорость охлаждения раствора никак не влияет на размер кристаллов", "Крупные кристаллы образуются только при максимально быстром охлаждении"], "correct": 0, "explain": "Кинетика зарождения (нуклеации) кристаллов чувствительна к скорости изменения условий: быстрое пересыщение создаёт множество центров нуклеации (мелкие кристаллы), тогда как медленный контролируемый процесс благоприятствует росту меньшего числа, но более крупных кристаллов.", "usage": {"code": false, "without": "Быстро охлаждаешь раствор и получаешь мелкий бесполезный осадок.", "with": "Медленно, контролируемо охлаждаешь: мало центров нуклеации — растут немногие крупные кристаллы.", "benefit": "Крупные качественные кристаллы вместо пыли."}}, {"q": "Реакция имеет ΔH = -50 кДж/моль и ΔS = -100 Дж/(моль·К) при температуре 300 К. Чему равно ΔG (в кДж/моль)?", "options": ["+30", "-20", "-50.03", "-80"], "correct": 1, "explain": "ΔG = ΔH - TΔS = -50000 Дж - 300×(-100) Дж = -50000+30000 = -20000 Дж = -20 кДж/моль.", "usage": {"code": true, "without": "Знаешь ΔH, ΔS и T, но «на глаз» не скажешь, самопроизвольна ли реакция.", "with": "Считаешь ΔG=ΔH-TΔS = -50 - 300·(-0.1) = -20 кДж/моль, ΔG<0 — самопроизвольна. python: dG = -50 - 300*(-0.1)", "benefit": "Точный ΔG и вывод о направлении."}}, {"q": "Реакция имеет ΔH=+40 кДж/моль и ΔS=+150 Дж/(моль·К) при T=400 К. Чему равно ΔG и самопроизвольна ли реакция?", "options": ["ΔG=−20 кДж/моль, реакция самопроизвольна", "ΔG=+100 кДж/моль, реакция несамопроизвольна", "ΔG=+20 кДж/моль, реакция несамопроизвольна", "ΔG=−60 кДж/моль, реакция самопроизвольна"], "correct": 0, "explain": "Шаг 1: перевод TΔS = 400·150 = 60000 Дж = 60 кДж/моль. Шаг 2: формула ΔG = ΔH − TΔS = 40 − 60 = −20 кДж/моль. Шаг 3: вывод ΔG<0, значит реакция самопроизвольна.", "usage": {"code": true, "without": "Знаешь ΔH, ΔS и T, но «на глаз» не скажешь, самопроизвольна ли реакция.", "with": "Считаешь ΔG=ΔH−TΔS = 40 − 400·0.15 = −20 кДж/моль, ΔG<0 — самопроизвольна. python: dG = 40 - 400*0.15", "benefit": "Точный ΔG и однозначный вывод о направлении."}}, {"q": "В растворе концентрация ионов водорода [H+]=10⁻⁴ моль/л. Чему равны pH и pOH этого раствора?", "options": ["pH=10, pOH=4", "pH=4, pOH=10", "pH=4, pOH=4", "pH=−4, pOH=18"], "correct": 1, "explain": "Шаг 1: формула pH = −log[H+] = −log(10⁻⁴) = 4. Шаг 2: связь pH + pOH = 14. Шаг 3: pOH = 14 − 4 = 10.", "usage": {"code": true, "without": "Знаешь концентрацию H+, но pH и тем более pOH назвать не можешь.", "with": "pH=−log10(1e-4)=4, затем pOH=14−pH=10. python: import math; pH=-math.log10(1e-4); pOH=14-pH", "benefit": "Сразу pH и pOH из концентрации ионов."}}, {"q": "Для реакции A⇌B в равновесии [A]=0.5 моль/л и [B]=2 моль/л. Чему равна K и куда сместится равновесие при добавлении A?", "options": ["K=0.25, равновесие сместится влево к реагентам", "K=1, положение равновесия совсем не изменится", "K=4, равновесие сместится вправо к продуктам", "K=4, равновесие сместится влево к реагентам"], "correct": 2, "explain": "Шаг 1: формула K = [B]/[A] = 2/0.5 = 4. Шаг 2: по принципу Ле Шателье добавление реагента A смещает равновесие в сторону продуктов. Шаг 3: вывод — вправо, к B.", "usage": {"code": true, "without": "Считаешь K неверно и не знаешь, как отзовётся равновесие на добавку реагента.", "with": "K=[B]/[A]=4; добавили A — по Ле Шателье сдвиг вправо. python: K = 2/0.5  # 4", "benefit": "Значение K и направление сдвига за один шаг."}}, {"q": "При увеличении концентрации реагента A в 2 раза начальная скорость реакции выросла в 8 раз (остальные концентрации постоянны). Каков порядок реакции по A?", "options": ["Первый порядок, скорость ∝ [A]", "Второй порядок, скорость ∝ [A]²", "Нулевой порядок, скорость от [A] не зависит", "Третий порядок, скорость ∝ [A]³"], "correct": 3, "explain": "Шаг 1: зависимость v ∝ [A]ⁿ. Шаг 2: подстановка 2ⁿ = 8. Шаг 3: решение n = 3 — третий порядок по A.", "usage": {"code": true, "without": "Видишь рост скорости при увеличении концентрации, но порядок определить не можешь.", "with": "Из 2ⁿ=8 находишь n=3. python: import math; n = math.log(8)/math.log(2)  # 3.0", "benefit": "Порядок реакции прямо из отношения скоростей."}}, {"q": "Две реакции идут при одной T и с одинаковым предэкспонентой A, но Ea₁=50 кДж/моль и Ea₂=100 кДж/моль. Какая реакция быстрее по уравнению Аррениуса?", "options": ["Реакция с Ea=50: ниже барьер, больше k, значит быстрее", "Реакция с Ea=100: выше барьер, больше k, значит быстрее", "Скорости равны: энергия активации на константу k не влияет", "Реакция с Ea=100 быстрее: k растёт при росте энергии активации"], "correct": 0, "explain": "Шаг 1: формула k = A·e^(−Ea/RT). Шаг 2: чем меньше Ea, тем больше показатель −Ea/RT и тем больше k. Шаг 3: у Ea=50 барьер ниже, поэтому она быстрее.", "usage": {"code": true, "without": "Думаешь, что при равной температуре реакции идут одинаково, игнорируя барьер.", "with": "По k=A·e^(−Ea/RT) меньшая Ea даёт большее k. python: import math; ratio = math.exp(-(50-100)*1000/(8.314*300))", "benefit": "Сразу видно, какой барьер даёт большую скорость."}}, {"q": "Раствор сильной кислоты с pH=2 разбавили чистой водой в 1000 раз. Каким приблизительно станет новый pH?", "options": ["pH=2, разбавление на кислоту не влияет", "pH≈5, вырос на 3 единицы", "pH≈7, раствор стал нейтральным", "pH≈8, раствор стал щелочным"], "correct": 1, "explain": "Шаг 1: разбавление в 1000 раз уменьшает [H+] в 1000 раз. Шаг 2: pH растёт на log10(1000) = 3. Шаг 3: новый pH = 2 + 3 = 5.", "usage": {"code": true, "without": "Разбавил кислоту и не знаешь, на сколько вырастет pH.", "with": "pH сдвигается на log10 кратности: 2 + log10(1000) = 5. python: import math; ph = 2 + math.log10(1000)", "benefit": "Новый pH после разбавления без гадания."}}, {"q": "При образовании 4 моль продукта выделяется ΔH=−100 кДж. Сколько теплоты выделится при образовании 10 моль того же продукта в тех же условиях?", "options": ["−100 кДж, теплота от количества вещества не зависит", "−40 кДж, теплота обратно пропорциональна числу молей", "−250 кДж, теплота пропорциональна числу молей", "−400 кДж, теплоту умножили на число молей"], "correct": 2, "explain": "Шаг 1: удельная теплота = −100/4 = −25 кДж на моль. Шаг 2: умножение на 10 моль: −25·10 = −250 кДж. Шаг 3: вывод — выделится −250 кДж.", "usage": {"code": true, "without": "Знаешь тепло на 4 моль продукта, но для 10 моль считаешь неверно.", "with": "Тепло пропорционально количеству: (−100/4)·10 = −250 кДж. python: q = -100/4 * 10", "benefit": "Тепловой эффект для нужного числа молей."}}, {"q": "Реакция первого порядка имеет период полураспада 20 минут. Через сколько времени останется примерно 12.5% исходного вещества?", "options": ["20 минут, это ровно один период полураспада", "40 минут, это два периода полураспада", "80 минут, это четыре периода полураспада", "60 минут, это три периода полураспада"], "correct": 3, "explain": "Шаг 1: 12.5% = 1/8 = (1/2)³, то есть три полупериода. Шаг 2: время = 3·20 = 60 минут. Шаг 3: вывод — через 60 минут.", "usage": {"code": true, "without": "Знаешь период полураспада, но время до 12.5% вещества берёшь наугад.", "with": "1/8 — это три полупериода: 3·20 = 60 мин. python: import math; t = 20 * math.log2(1/0.125)", "benefit": "Время до нужной доли для реакции 1-го порядка."}}, {"q": "Реакция имеет ΔH=+30 кДж/моль и ΔS=+100 Дж/(моль·К). Выше какой температуры она станет самопроизвольной?", "options": ["Выше 300 К, когда член TΔS превысит ΔH", "Выше 30 К, когда член TΔS превысит ΔH", "Ниже 300 К, самопроизвольность идёт при охлаждении", "При любой температуре, реакция всегда самопроизвольна"], "correct": 0, "explain": "Шаг 1: условие самопроизвольности ΔG = ΔH − TΔS < 0. Шаг 2: отсюда T > ΔH/ΔS. Шаг 3: T > 30000/100 = 300 К.", "usage": {"code": true, "without": "Знаешь ΔH>0 и ΔS>0, но не понимаешь, при какой T реакция пойдёт.", "with": "Порог T = ΔH/ΔS = 30000/100 = 300 К; выше него ΔG<0. python: T = 30000/100  # 300", "benefit": "Температура перехода к самопроизвольности."}}, {"q": "Реакцию нагрели с 20°C до 50°C. Температурный коэффициент Вант-Гоффа γ=2. Во сколько раз возрастёт скорость реакции?", "options": ["В 3 раза, по числу десятиградусных шагов нагрева", "В 8 раз, γ в степени числа десятков градусов", "В 2 раза, коэффициент γ равен двум", "В 6 раз, γ умножают на число шагов нагрева"], "correct": 1, "explain": "Шаг 1: изменение температуры ΔT = 50 − 20 = 30°C. Шаг 2: формула ускорения = γ^(ΔT/10) = 2^(30/10). Шаг 3: 2³ = 8 раз.", "usage": {"code": true, "without": "Знаешь γ и нагрев, но во сколько раз ускорится реакция — не считаешь.", "with": "Ускорение = γ^(ΔT/10) = 2^3 = 8 раз. python: factor = 2 ** ((50-20)/10)", "benefit": "Быстрая оценка ускорения по правилу Вант-Гоффа."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
