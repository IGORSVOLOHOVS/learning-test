<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Физическая химия</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/physical_chemistry.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Физическая химия</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "physical_chemistry";
  const QUESTIONS = [{"q": "Что изучает физическая химия?", "options": ["Только органический синтез веществ", "Физические принципы и закономерности, лежащие в основе химических явлений (энергетика, скорости реакций, строение вещества)", "Только историю химических открытий", "Исключительно биохимические процессы в клетке"], "correct": 1, "explain": "Физическая химия применяет законы физики (термодинамику, квантовую механику, статистическую физику) для объяснения и предсказания химических явлений."}, {"q": "Что такое энтальпия (H) в термодинамике?", "options": ["Мера беспорядка системы", "Функция состояния, связанная с теплотой, выделяемой или поглощаемой при постоянном давлении", "Скорость химической реакции", "Концентрация раствора"], "correct": 1, "explain": "Энтальпия H = U + PV — термодинамическая функция состояния, изменение которой (ΔH) равно теплоте реакции при постоянном давлении."}, {"q": "Что такое энтропия (S) с точки зрения термодинамики?", "options": ["Мера степени беспорядка (числа микросостояний) системы", "Единица измерения давления", "Скорость протекания реакции", "Синоним энергии Гиббса"], "correct": 0, "explain": "Энтропия — термодинамическая величина, характеризующая степень неупорядоченности системы; согласно второму закону термодинамики, энтропия изолированной системы стремится к возрастанию."}, {"q": "Что показывает энергия Гиббса (G) и почему она важна для определения самопроизвольности процесса?", "options": ["ΔG < 0 указывает на самопроизвольность процесса при постоянных температуре и давлении", "Энергия Гиббса всегда положительна для любых реакций", "G измеряет только объём системы", "Энергия Гиббса не связана с самопроизвольностью процессов"], "correct": 0, "explain": "G = H - TS; при постоянных T и P самопроизвольные процессы идут в сторону уменьшения энергии Гиббса (ΔG<0)."}, {"q": "Что такое скорость химической реакции?", "options": ["Количество молей вещества, изначально взятого для реакции", "Изменение концентрации реагентов или продуктов реакции в единицу времени", "Температура, при которой реакция начинается", "Энергия связи в молекуле реагента"], "correct": 1, "explain": "Скорость реакции определяется как изменение концентрации реагента или продукта за единицу времени, обычно выражается в моль/(л·с)."}, {"q": "Что такое энергия активации (Ea) реакции?", "options": ["Минимальная энергия, необходимая для того, чтобы реагенты могли перейти в продукты реакции", "Полная энергия, выделяемая в ходе реакции", "Энергия связи в исходных молекулах", "Температура плавления реагентов"], "correct": 0, "explain": "Энергия активации — энергетический барьер, который должны преодолеть реагирующие частицы, чтобы образовать переходное состояние и превратиться в продукты."}, {"q": "Что такое катализатор с точки зрения химической кинетики?", "options": ["Вещество, увеличивающее энергию активации реакции", "Вещество, ускоряющее реакцию за счёт снижения энергии активации, не расходуясь в итоговом процессе", "Вещество, полностью останавливающее реакцию", "Побочный продукт реакции"], "correct": 1, "explain": "Катализатор предоставляет альтернативный путь реакции с более низкой энергией активации, ускоряя достижение равновесия, но сам не расходуется в стехиометрическом смысле."}, {"q": "Что описывает уравнение состояния идеального газа PV=nRT?", "options": ["Связь между давлением, объёмом, количеством вещества и температурой идеального газа", "Скорость химической реакции в газовой фазе", "Энергию связи в молекуле газа", "Растворимость газа в жидкости"], "correct": 0, "explain": "Уравнение состояния идеального газа связывает давление P, объём V, количество вещества n и температуру T через универсальную газовую постоянную R."}, {"q": "Что такое химическое равновесие?", "options": ["Состояние, при котором реакция полностью прекращается", "Динамическое состояние, при котором скорости прямой и обратной реакций равны, и концентрации веществ не меняются со временем", "Состояние, при котором все реагенты полностью превратились в продукты", "Момент начала реакции"], "correct": 1, "explain": "Химическое равновесие — не статичное, а динамическое состояние: реакции продолжают идти в обе стороны, но с одинаковой скоростью, поэтому наблюдаемые концентрации не меняются."}, {"q": "Что такое константа равновесия (K) реакции?", "options": ["Скорость реакции в момент времени t=0", "Отношение произведения концентраций продуктов к произведению концентраций реагентов (в степенях стехиометрических коэффициентов) при равновесии", "Энергия активации обратной реакции", "Молярная масса продукта реакции"], "correct": 1, "explain": "Константа равновесия K = [продукты]/[реагенты] (с учётом стехиометрических коэффициентов как степеней) характеризует положение равновесия при данной температуре."}, {"q": "Почему энтальпия и энтропия иногда действуют в противоположных направлениях при определении самопроизвольности реакции, и как энергия Гиббса разрешает этот конфликт?", "options": ["Экзотермическая реакция (ΔH<0) способствует самопроизвольности, а уменьшение энтропии (ΔS<0) — препятствует ей; G=H-TS количественно взвешивает оба фактора с учётом температуры, определяя итоговый знак ΔG", "Энтальпия и энтропия всегда действуют в одном направлении без исключений", "Энергия Гиббса игнорирует вклад энтропии в самопроизвольность процесса", "Температура не влияет на баланс между энтальпийным и энтропийным вкладами"], "correct": 0, "explain": "ΔG=ΔH-TΔS явно показывает, что при высоких температурах энтропийный член (TΔS) может доминировать, меняя знак ΔG даже для эндотермических реакций, если ΔS>0."}, {"q": "Почему согласно теории столкновений скорость реакции экспоненциально (а не линейно) зависит от температуры (уравнение Аррениуса)?", "options": ["Доля молекул с энергией, достаточной для преодоления энергетического барьера (энергии активации), задаётся распределением Больцмана, которое экспоненциально растёт с температурой", "Скорость реакции линейно пропорциональна температуре по определению", "Температура влияет только на давление газа, но не на скорость реакции", "Уравнение Аррениуса описывает зависимость скорости от концентрации, а не от температуры"], "correct": 0, "explain": "Уравнение Аррениуса k=A·e^(-Ea/RT) отражает экспоненциальную зависимость доли молекул с достаточной для реакции энергией от температуры, согласно статистике Больцмана."}, {"q": "Как принцип Ле Шателье объясняет реакцию системы на внешнее возмущение (изменение концентрации, давления, температуры) в состоянии равновесия?", "options": ["Система смещает равновесие в направлении, компенсирующем внешнее воздействие, чтобы частично нейтрализовать возмущение и вновь достичь равновесия", "Система всегда полностью игнорирует внешние возмущения, сохраняя исходное состояние равновесия", "Равновесие смещается случайным образом независимо от природы возмущения", "Принцип Ле Шателье применим только к газовым реакциям"], "correct": 0, "explain": "Принцип Ле Шателье формализует интуицию 'система сопротивляется изменению': при увеличении концентрации реагента равновесие смещается в сторону продуктов, компенсируя возмущение, и аналогично для давления/температуры."}, {"q": "Почему катализатор ускоряет и прямую, и обратную реакцию в равной степени, не смещая положение равновесия?", "options": ["Катализатор снижает энергию активации симметрично для обоих направлений реакции, ускоряя достижение равновесия, но не меняя термодинамическую константу равновесия K, которая определяется только разницей энергий состояний", "Катализатор ускоряет только прямую реакцию, всегда смещая равновесие в сторону продуктов", "Катализаторы не влияют на скорость обратной реакции вообще", "Положение равновесия определяется исключительно катализатором, а не термодинамикой"], "correct": 0, "explain": "Катализатор влияет на кинетику (снижая барьер активации для обоих направлений одинаково), но не на термодинамику — константа равновесия K определяется разностью энергий Гиббса реагентов и продуктов, независимо от пути реакции."}, {"q": "Почему порядок реакции по определённому реагенту не всегда совпадает со стехиометрическим коэффициентом этого реагента в уравнении реакции?", "options": ["Порядок реакции определяется экспериментально и отражает механизм реакции (часто многостадийный), тогда как стехиометрический коэффициент — лишь баланс атомов в суммарном уравнении, не обязательно совпадающий с кинетикой лимитирующей стадии", "Порядок реакции всегда точно равен стехиометрическому коэффициенту по определению", "Стехиометрия и кинетика — синонимичные понятия в химии", "Порядок реакции определяется только температурой, а не механизмом"], "correct": 0, "explain": "Скорость реакции определяется самой медленной (лимитирующей) стадией сложного, часто многостадийного механизма, и порядок по конкретному веществу отражает именно эту кинетику, а не просто итоговую стехиометрию суммарного уравнения."}, {"q": "Как энтропийный вклад объясняет, почему растворение большинства твёрдых солей в воде является самопроизвольным процессом, даже если оно часто эндотермично (поглощает тепло)?", "options": ["Растворение резко увеличивает энтропию системы (переход от упорядоченной кристаллической решётки к более разупорядоченным сольватированным ионам в растворе), и это увеличение энтропии (TΔS) может перевешивать положительный ΔH", "Растворение солей всегда экзотермично, и энтропия здесь не имеет значения", "Энтропия уменьшается при растворении, что должно препятствовать процессу", "Самопроизвольность растворения не зависит от термодинамических факторов"], "correct": 0, "explain": "Даже при ΔH>0 (эндотермический процесс) реакция может быть самопроизвольной, если рост энтропии (ΔS>0) достаточно велик, чтобы TΔS превысило ΔH, делая ΔG отрицательным."}, {"q": "Почему уравнение Вант-Гоффа связывает изменение константы равновесия с температурой через энтальпию реакции (ΔH)?", "options": ["Оно количественно показывает, что для экзотермических реакций (ΔH<0) повышение температуры сдвигает равновесие в сторону реагентов (K уменьшается), а для эндотермических — наоборот, что согласуется с принципом Ле Шателье", "Константа равновесия не зависит от температуры ни для одной реакции", "Уравнение Вант-Гоффа применимо только к газовым реакциям при постоянном объёме", "Температура влияет на константу равновесия только через изменение давления"], "correct": 0, "explain": "Уравнение Вант-Гоффа d(lnK)/dT = ΔH/(RT²) формализует качественное предсказание принципа Ле Шателье количественно, связывая знак ΔH с направлением сдвига равновесия при изменении температуры."}, {"q": "Почему скорость реакции для многостадийного механизма определяется самой медленной ('лимитирующей') стадией, а не суммарной кинетикой всех стадий вместе?", "options": ["Как и в любой последовательной цепочке процессов, общая скорость не может превышать скорость самого медленного звена — быстрые стадии просто ждут, пока лимитирующая стадия произведёт промежуточный продукт", "Скорость определяется исключительно самой первой стадией механизма", "Все стадии многостадийного механизма всегда протекают с одинаковой скоростью", "Понятие лимитирующей стадии применимо только к одностадийным реакциям"], "correct": 0, "explain": "Аналогия с последовательным производственным процессом: как конвейер работает со скоростью самого медленного этапа, так и многостадийная реакция в целом лимитируется своей самой медленной элементарной стадией."}, {"q": "Как понятие 'фазовой диаграммы' (например, для воды) связывает термодинамические переменные (давление, температура) с устойчивыми состояниями вещества?", "options": ["Фазовая диаграмма показывает области давления и температуры, в которых термодинамически устойчива определённая фаза (твёрдая, жидкая, газообразная), а линии на диаграмме соответствуют условиям сосуществования двух фаз в равновесии", "Фазовая диаграмма показывает только химический состав вещества, а не его физическое состояние", "Все вещества имеют идентичные фазовые диаграммы независимо от их природы", "Фазовые диаграммы не связаны с термодинамическим равновесием"], "correct": 0, "explain": "Фазовая диаграмма — графическое представление термодинамически устойчивых фаз вещества в координатах давление-температура, где линии равновесия отражают условия, при которых энергии Гиббса разных фаз равны."}, {"q": "Почему буферные растворы (например, ацетатный буфер) способны поддерживать относительно постоянный pH при добавлении небольших количеств кислоты или щёлочи?", "options": ["Буфер содержит сопряжённую кислотно-основную пару, способную связывать добавленные ионы H+ или OH-, смещая равновесие диссоциации так, чтобы компенсировать изменение концентрации свободных ионов водорода", "Буферные растворы полностью инертны к любым добавляемым веществам", "pH буфера не зависит от его химического состава", "Буферный эффект объясняется исключительно физическим разбавлением добавленного вещества"], "correct": 0, "explain": "Согласно принципу Ле Шателье, равновесие слабой кислоты и её сопряжённого основания смещается при добавлении H+ или OH-, поглощая большую часть добавленных ионов и минимизируя изменение pH."}, {"q": "Как связаны понятия энергии активации и энергии Гиббса реакции — почему термодинамически выгодная (ΔG<0) реакция может протекать крайне медленно?", "options": ["ΔG определяет только разницу энергий начального и конечного состояний (термодинамику), тогда как энергия активации определяет высоту барьера на пути между ними (кинетику) — эти два аспекта независимы друг от друга", "Если ΔG<0, энергия активации всегда равна нулю, и реакция должна идти мгновенно", "Энергия активации всегда равна ΔG для любой реакции", "Кинетика реакции полностью определяется знаком ΔG"], "correct": 0, "explain": "Термодинамика (ΔG) говорит, возможна ли реакция в принципе и в каком направлении, но не говорит ничего о скорости — это епархия кинетики (энергии активации); реакция может быть очень выгодна термодинамически, но кинетически заблокирована высоким барьером."}, {"q": "Как взаимодействуют концентрация, температура и катализатор как три независимых способа влияния на скорость реакции, и почему их эффекты в общем случае мультипликативны, а не аддитивны в кинетическом уравнении?", "options": ["Скорость реакции обычно выражается как произведение факторов v=k(T)·[A]^m·[B]^n, где k(T) зависит от температуры и катализатора (через энергию активации), а концентрационные члены — от количества реагентов, поэтому одновременное изменение нескольких факторов даёт мультипликативный, а не аддитивный эффект", "Все факторы (температура, концентрация, катализатор) влияют на скорость аддитивно, складываясь друг с другом", "Катализатор и температура влияют на скорость абсолютно одинаковым образом", "Концентрация реагентов не входит в кинетическое уравнение скорости реакции"], "correct": 0, "explain": "Классическое кинетическое уравнение v=k·[A]^m[B]^n показывает, что константа скорости k (зависящая от температуры и катализатора через энергию активации) умножается на концентрационные члены — отсюда мультипликативный характер связи факторов."}, {"q": "Почему при проектировании промышленного химического реактора инженеры должны одновременно учитывать термодинамику (максимально достижимый выход) и кинетику (скорость достижения этого выхода), а не оптимизировать только один из этих аспектов?", "options": ["Термодинамически идеальные условия (например, для смещения равновесия) могут кинетически приводить к неприемлемо медленной реакции, и наоборот — оптимальный процесс требует компромисса между теоретическим выходом и практической скоростью его достижения", "Термодинамика полностью определяет скорость процесса, поэтому кинетику можно игнорировать при проектировании", "Кинетика полностью определяет равновесный выход, поэтому термодинамику можно игнорировать", "Термодинамика и кинетика реакции — это одно и то же понятие в химической инженерии"], "correct": 0, "explain": "Классический пример — процесс Габера для синтеза аммиака: термодинамически низкая температура выгоднее для выхода, но кинетически при низкой температуре реакция идёт слишком медленно, поэтому используется компромиссная температура с катализатором."}, {"q": "Как молекулярная структура (например, наличие объёмных заместителей рядом с реакционным центром) влияет на энергию активации реакции через понятие стерического затруднения?", "options": ["Объёмные заместители могут физически препятствовать сближению реагирующих частиц до состояния, необходимого для образования переходного состояния, эффективно повышая энергию активации и замедляя реакцию", "Молекулярная структура реагентов никогда не влияет на энергию активации реакции", "Стерическое затруднение всегда снижает энергию активации, ускоряя реакцию", "Энергия активации определяется исключительно температурой, а не структурой молекул"], "correct": 0, "explain": "Стерические эффекты — классический пример того, как трёхмерная структура молекулы (а не только её химический состав) влияет на кинетику: объёмные группы могут 'экранировать' реакционный центр, повышая эффективный барьер реакции."}, {"q": "Почему выбор растворителя может существенно изменить скорость и даже механизм реакции (например, полярный протонный vs апротонный растворитель)?", "options": ["Растворитель может стабилизировать (или дестабилизировать) переходное состояние или промежуточные ионные частицы за счёт сольватации, что напрямую влияет на эффективную энергию активации и предпочтительный путь реакции", "Растворитель служит исключительно средой для перемешивания и никогда не участвует в определении кинетики реакции", "Полярность растворителя влияет только на температуру кипения смеси, но не на кинетику", "Механизм реакции никогда не зависит от природы растворителя"], "correct": 0, "explain": "Растворитель может стабилизировать заряженные или полярные переходные состояния через сольватацию, тем самым понижая или повышая энергетический барьер конкретного пути реакции и даже переключая предпочтительный механизм."}, {"q": "Как принцип микроскопической обратимости (при равновесии путь прямой и обратной реакции проходит через одно и то же переходное состояние) связывает кинетику и термодинамику на молекулярном уровне?", "options": ["Он утверждает, что при равновесии скорость прямой реакции через определённый путь равна скорости обратной реакции через тот же путь, что связывает наблюдаемую макроскопическую константу равновесия с микроскопическими константами скоростей прямой и обратной реакции (K=k_прямая/k_обратная)", "Принцип микроскопической обратимости не связан с константой равновесия", "Прямая и обратная реакции всегда идут через принципиально разные переходные состояния", "Кинетика прямой реакции не связана со скоростью обратной реакции при равновесии"], "correct": 0, "explain": "Именно из микроскопической обратимости следует широко используемое соотношение K=k_прямая/k_обратная, связывающее термодинамическую константу равновесия с кинетическими константами скорости обеих реакций."}, {"q": "Почему для гетерогенного катализа (катализатор в другой фазе, чем реагенты, например твёрдый катализатор для газовой реакции) площадь поверхности катализатора критически важна для эффективности процесса?", "options": ["Реакция происходит на активных центрах поверхности катализатора, и большая площадь поверхности (например, за счёт пористой структуры) даёт больше доступных активных центров для взаимодействия с молекулами реагента, ускоряя общий процесс", "Площадь поверхности катализатора не влияет на скорость гетерогенной реакции", "Гетерогенный катализ никогда не зависит от структуры поверхности материала", "Увеличение площади поверхности катализатора всегда замедляет реакцию"], "correct": 0, "explain": "В гетерогенном катализе реакция локализована на поверхности, поэтому число доступных активных центров (и, соответственно, скорость всего процесса) напрямую связано с эффективной площадью поверхности катализатора."}, {"q": "Как связаны понятия энтропии активации (ΔS‡) и энтальпии активации (ΔH‡) в теории переходного состояния с наблюдаемой энергией активации Аррениуса?", "options": ["Теория переходного состояния разбивает энергетический барьер реакции на энтальпийную (энергетическую) и энтропийную (связанную с изменением упорядоченности при образовании переходного состояния) составляющие, обе из которых влияют на итоговую наблюдаемую скорость реакции", "Энтропия активации не имеет физического смысла и не используется в кинетике", "Только энтальпия активации влияет на скорость реакции, энтропийный вклад отсутствует", "ΔH‡ и ΔS‡ являются синонимами энергии активации Аррениуса"], "correct": 0, "explain": "Теория переходного состояния (уравнение Эйринга) даёт более детализированную картину энергетического барьера, разделяя его на энтальпийный и энтропийный вклады, что позволяет объяснить, например, почему бимолекулярные реакции с высокой упорядоченностью переходного состояния имеют дополнительный кинетический штраф (отрицательное ΔS‡)."}, {"q": "Почему уравнение состояния реального газа (например, уравнение Ван-дер-Ваальса) вводит поправки на объём молекул и межмолекулярное притяжение по сравнению с моделью идеального газа?", "options": ["При высоких давлениях и низких температурах собственный объём молекул и силы притяжения между ними становятся значимыми и нарушают допущения идеального газа (точечные частицы без взаимодействия), поэтому нужны поправочные члены для точного описания поведения", "Реальные газы всегда ведут себя идентично идеальному газу при любых условиях", "Поправки Ван-дер-Ваальса нужны только для жидкостей, а не для газов", "Уравнение состояния идеального газа точно описывает поведение любого газа при любых условиях"], "correct": 0, "explain": "Модель идеального газа игнорирует объём молекул и межмолекулярные силы, что становится существенным приближением при высоких давлениях/низких температурах — уравнение Ван-дер-Ваальса вводит поправочные члены (a и b), учитывающие эти эффекты."}, {"q": "Химик наблюдает, что повышение температуры реакции ускоряет как прямую, так и обратную реакцию, но выход целевого продукта при равновесии снижается. Что это говорит о термодинамике реакции?", "options": ["Реакция, вероятно, экзотермична (ΔH<0) — согласно принципу Ле Шателье и уравнению Вант-Гоффа, повышение температуры смещает равновесие в сторону реагентов, уменьшая равновесный выход продукта, даже если скорость установления равновесия выросла", "Такое поведение невозможно с точки зрения термодинамики", "Снижение выхода означает ошибку в эксперименте, а не термодинамическую закономерность", "Скорость реакции и положение равновесия всегда меняются в одном направлении"], "correct": 0, "explain": "Важно различать кинетику (скорость достижения равновесия, растёт с температурой всегда) и термодинамику (положение равновесия): для экзотермической реакции более высокая температура ускоряет процесс, но смещает равновесие в невыгодную для продукта сторону."}, {"q": "На производстве добавили катализатор для ускорения реакции синтеза продукта, но выход продукта при равновесии остался неизменным. Как это объяснить студенту, ожидавшему увеличения выхода?", "options": ["Катализатор ускоряет достижение равновесия (кинетический эффект), но не смещает само положение равновесия (термодинамическую константу K), поэтому равновесный выход продукта остаётся прежним", "Катализатор всегда должен увеличивать равновесный выход продукта, и наблюдение указывает на ошибку в эксперименте", "Катализаторы не влияют на скорость реакций вообще", "Отсутствие изменения выхода означает, что катализатор не сработал"], "correct": 0, "explain": "Классическое разграничение: катализатор влияет на кинетику (скорость), но термодинамика (равновесная константа K, определяемая ΔG реакции) остаётся неизменной — быстрее достигается то же самое равновесие."}, {"q": "Инженер разрабатывает процесс, где реакция синтеза аммиака (экзотермическая, с уменьшением числа молей газа) должна дать максимальный выход продукта. Какие условия температуры и давления стоит выбрать, руководствуясь принципом Ле Шателье?", "options": ["Более низкая температура (сдвигает равновесие в сторону экзотермического направления — продуктов) и более высокое давление (сдвигает равновесие в сторону меньшего числа молей газа — тоже продуктов)", "Более высокая температура и низкое давление максимизируют выход в любой экзотермической реакции с уменьшением объёма", "Температура и давление не влияют на выход реакции синтеза аммиака", "Нужно минимизировать и температуру, и давление одновременно для любого процесса"], "correct": 0, "explain": "Это классический пример процесса Габера: низкая температура благоприятствует экзотермическому направлению, а высокое давление благоприятствует направлению с меньшим числом молей газа (в данном случае — оба фактора благоприятствуют продукту), хотя на практике температуру повышают для приемлемой скорости, находя компромисс."}, {"q": "Лаборант смешал два раствора и заметил, что реакция протекает практически мгновенно при комнатной температуре, хотя расчётная энергия активации кажется высокой. Какое объяснение наиболее вероятно с точки зрения кинетики?", "options": ["Реакция, вероятно, протекает по другому, более быстрому механизму (возможно, каталитическому или ионному) с меньшей эффективной энергией активации, чем предполагалось в расчёте для другого возможного пути", "Высокая энергия активации всегда гарантирует крайне медленную реакцию независимо от механизма", "Скорость реакции никогда не зависит от энергии активации", "Наблюдаемая скорость реакции противоречит законам термодинамики"], "correct": 0, "explain": "Расхождение между ожидаемой и наблюдаемой скоростью часто означает, что реальный механизм реакции отличается от предполагаемого (например, идёт через более выгодный путь с меньшим барьером), что подчёркивает важность экспериментального определения кинетики, а не только теоретических оценок."}, {"q": "Компания хранит продукт, который медленно разлагается при комнатной температуре с выделением тепла (экзотермическая реакция разложения). Почему хранение при пониженной температуре критично важно с точки зрения кинетики, даже если реакция термодинамически всё равно самопроизвольна?", "options": ["Согласно уравнению Аррениуса, снижение температуры экспоненциально уменьшает скорость реакции разложения, хотя термодинамическая возможность реакции (ΔG<0) сохраняется — снижается именно кинетика, а не термодинамика процесса", "Понижение температуры делает реакцию разложения термодинамически невозможной", "Скорость реакции не зависит от температуры хранения", "Реакция разложения останавливается полностью при любой положительной температуре"], "correct": 0, "explain": "Термодинамическая самопроизвольность (ΔG<0) не говорит о том, как быстро процесс произойдёт — именно кинетика (сильно зависящая от температуры через уравнение Аррениуса) определяет практическую стабильность вещества при хранении."}, {"q": "При титровании слабой кислоты сильным основанием исследователь наблюдает область на кривой титрования, где pH меняется очень слабо при добавлении титранта. Какое явление это иллюстрирует?", "options": ["Буферную область — в этом диапазоне присутствует значимое количество и слабой кислоты, и её сопряжённого основания, которые совместно противостоят изменению pH", "pH раствора никогда не может оставаться постоянным при добавлении титранта", "Это указывает на ошибку в эксперименте титрования", "Буферный эффект возможен только для сильных кислот и оснований"], "correct": 0, "explain": "Плато на кривой титрования соответствует буферной области, где соотношение слабой кислоты и её сопряжённого основания близко к оптимальному для сопротивления изменению pH (вблизи pKa кислоты)."}, {"q": "Технолог заметил, что увеличение концентрации одного из реагентов вдвое привело к четырёхкратному увеличению начальной скорости реакции. Что это говорит о порядке реакции по этому реагенту?", "options": ["Реакция второго порядка по этому реагенту (скорость пропорциональна квадрату концентрации)", "Реакция нулевого порядка по этому реагенту", "Реакция первого порядка по этому реагенту", "Данных недостаточно, чтобы сделать вывод о порядке реакции"], "correct": 0, "explain": "Если скорость v ~ [A]^n, и увеличение [A] в 2 раза даёт рост скорости в 4 раза (2^n=4), то n=2 — реакция второго порядка по этому реагенту."}, {"q": "При проведении реакции в закрытом сосуде давление газообразных продуктов постепенно растёт, а затем стабилизируется на постоянном значении. Как это интерпретировать с точки зрения химического равновесия?", "options": ["Система достигла состояния динамического равновесия, где скорости прямой и обратной реакции сравнялись, и наблюдаемое давление (концентрации) перестало изменяться со временем", "Стабилизация давления означает, что реакция полностью прекратилась и больше не происходит", "Постоянное давление означает, что все реагенты уже полностью израсходованы", "Стабилизация давления не связана с понятием химического равновесия"], "correct": 0, "explain": "Стабильное давление/концентрация продукта при продолжающейся микроскопической активности (реакция всё ещё идёт в обе стороны) — классический признак достижения динамического химического равновесия."}, {"q": "Исследователь хочет ускорить медленную реакцию в промышленном процессе, не меняя температуру (из-за риска побочных реакций при нагреве). Какой подход наиболее целесообразен согласно принципам химической кинетики?", "options": ["Подобрать подходящий катализатор, снижающий энергию активации без изменения температуры процесса", "Единственный способ ускорить реакцию — обязательно повысить температуру", "Увеличение концентрации реагентов никогда не влияет на скорость реакции", "Скорость реакции невозможно изменить без изменения температуры"], "correct": 0, "explain": "Катализатор — способ ускорить реакцию, снижая энергетический барьер, без изменения температуры системы, что особенно ценно, когда повышение температуры нежелательно (например, из-за побочных реакций или разложения)."}, {"q": "Компания разрабатывает процесс кристаллизации соли из раствора и хочет получить крупные, качественные кристаллы, а не мелкий осадок. Какое кинетическое соображение здесь важно учитывать?", "options": ["Слишком быстрое пересыщение и охлаждение приводит к образованию множества мелких центров кристаллизации одновременно, тогда как медленное, контролируемое охлаждение способствует росту немногих крупных кристаллов", "Скорость охлаждения не влияет на размер образующихся кристаллов", "Крупные кристаллы образуются только при максимально быстром охлаждении раствора", "Кристаллизация — процесс, полностью не зависящий от кинетики"], "correct": 0, "explain": "Кинетика зарождения (нуклеации) кристаллов чувствительна к скорости изменения условий: быстрое пересыщение создаёт множество центров нуклеации (мелкие кристаллы), тогда как медленный контролируемый процесс благоприятствует росту меньшего числа, но более крупных кристаллов."}, {"q": "Реакция имеет ΔH = -50 кДж/моль и ΔS = -100 Дж/(моль·К) при температуре 300 К. Чему равно ΔG (в кДж/моль)?", "options": ["-80", "-20", "+30", "-50.03"], "correct": 1, "explain": "ΔG = ΔH - TΔS = -50000 Дж - 300×(-100) Дж = -50000+30000 = -20000 Дж = -20 кДж/моль."}, {"q": "Скорость реакции при увеличении концентрации реагента A в 3 раза выросла в 9 раз (при постоянной концентрации остальных реагентов). Каков порядок реакции по веществу A?", "options": ["Нулевой (0)", "Первый (1)", "Второй (2)", "Третий (3)"], "correct": 2, "explain": "Если v~[A]^n и 3^n=9, то n=2 — реакция второго порядка по A."}, {"q": "Для реакции A→B константа равновесия K=4 при данной температуре. Если в равновесии [A]=2 моль/л, чему равна [B]?", "options": ["2", "4", "8", "0.5"], "correct": 2, "explain": "K=[B]/[A], значит [B]=K×[A]=4×2=8."}, {"q": "Объём идеального газа при постоянной температуре и количестве вещества увеличивается вдвое. Как изменится давление согласно закону Бойля-Мариотта (PV=const при T=const)?", "options": ["Увеличится вдвое", "Уменьшится вдвое", "Останется неизменным", "Увеличится в 4 раза"], "correct": 1, "explain": "При постоянной температуре PV=const, значит при увеличении V вдвое P уменьшается вдвое."}, {"q": "Реакция имеет энергию активации Ea=50 кДж/моль. Согласно уравнению Аррениуса, при повышении температуры скорость реакции должна:", "options": ["Уменьшаться экспоненциально", "Увеличиваться экспоненциально", "Оставаться неизменной", "Линейно уменьшаться"], "correct": 1, "explain": "k=A·e^(-Ea/RT): при увеличении T показатель степени -Ea/RT растёт (приближается к нулю), значит e^(...) и, соответственно, k растут экспоненциально."}, {"q": "1 моль идеального газа занимает объём 22.4 л при нормальных условиях (0°C, 1 атм). Какой объём займут 2 моль газа при тех же условиях?", "options": ["11.2 л", "22.4 л", "44.8 л", "67.2 л"], "correct": 2, "explain": "Объём пропорционален количеству вещества при постоянных условиях: 2×22.4 = 44.8 л."}, {"q": "pH раствора равен 3. Какова концентрация ионов водорода [H+] в этом растворе (в моль/л)?", "options": ["3", "0.001 (10⁻³)", "0.03", "1000"], "correct": 1, "explain": "pH = -log[H+], значит [H+] = 10^(-pH) = 10⁻³ = 0.001 моль/л."}, {"q": "Раствор с pH=3 разбавили в 100 раз чистой водой. Каким приблизительно станет новый pH (без учёта эффектов при очень сильном разбавлении)?", "options": ["1", "3", "5", "7"], "correct": 2, "explain": "Разбавление в 100 раз уменьшает [H+] в 100 раз, что соответствует увеличению pH на log(100)=2 единицы: pH становится примерно 3+2=5."}, {"q": "Теплота реакции ΔH = -200 кДж выделяется при образовании 2 моль продукта. Сколько теплоты выделится при образовании 5 моль того же продукта (при тех же условиях)?", "options": ["-200 кДж", "-400 кДж", "-500 кДж", "-100 кДж"], "correct": 2, "explain": "Теплота пропорциональна количеству вещества: (-200 кДж/2 моль)×5 моль = -500 кДж."}, {"q": "При температуре 500 К реакция имеет константу скорости k, а при увеличении температуры до 600 К скорость реакции существенно возрастает (типично в разы или на порядок для органических реакций при таком росте T). Какое эмпирическое правило (грубое приближение) часто используют для оценки роста скорости при увеличении температуры на каждые 10°C?", "options": ["Правило Вант-Гоффа: скорость реакции увеличивается в 2-4 раза при повышении температуры на каждые 10°C", "Скорость реакции всегда удваивается при повышении температуры на 100°C", "Скорость реакции не зависит от изменения температуры на 10°C", "Скорость реакции линейно уменьшается при повышении температуры на 10°C"], "correct": 0, "explain": "Эмпирическое правило Вант-Гоффа (грубое приближение, справедливое для многих реакций в определённом диапазоне температур) утверждает, что скорость реакции возрастает в 2-4 раза при повышении температуры на каждые 10°C."}, {"q": "Реакция первого порядка имеет период полураспада 10 минут. Через сколько минут останется примерно 25% от начального количества вещества?", "options": ["10 минут", "15 минут", "20 минут", "40 минут"], "correct": 2, "explain": "За один период полураспада (10 мин) остаётся 50%, за два периода (20 мин) — 25%: два последовательных уменьшения вдвое."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
