<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Двухэтапная модель прагматика</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Двухэтапная модель прагматика</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "pragmatics_model";
  const QUESTIONS = [{"q": "Как называется описываемая в заметке модель коммуникации фактов?", "options": ["Трёхэтапная модель убеждения", "Двухэтапная модель прагматика (ментальный фильтр)", "Модель активного слушания", "Пятиэтапная модель переговоров"], "correct": 1, "explain": "Согласно заметке, модель называется 'Двухэтапная модель прагматика (Ментальный фильтр)' — инструмент для сухой, точной передачи фактов."}, {"q": "Что происходит на Этапе 1 модели, если факт уже известен?", "options": ["Нужно высказать предположение с эмоциональной окраской", "Нужно говорить сухо, без прилагательных и оценок — только цифры, сроки, физические параметры", "Нужно промолчать и не сообщать факт вообще", "Нужно попросить собеседника самому угадать факт"], "correct": 1, "explain": "Согласно заметке: 'Этап 1: Факт известен — Говорим сухо, без прилагательных и оценок (только цифры, сроки, физические параметры)'."}, {"q": "Какой пример приведён в заметке для Этапа 1 (факт известен)?", "options": ["«Мне кажется, задача довольно сложная»", "«Задача требует 4 этапа обработки и 20 часов тестов»", "«Я думаю, это займёт примерно неделю»", "«Задача почти готова, осталось немного»"], "correct": 1, "explain": "Пример из заметки: «Задача требует 4 этапа обработки и 20 часов тестов» — сухая констатация цифр без оценочных слов."}, {"q": "Что предписывает модель делать на Этапе 2, если факт ещё НЕ известен?", "options": ["Гадать и давать примерную оценку 'на глаз'", "Не гадать и не злиться, а констатировать процесс получения этого факта через условие", "Немедленно извиниться за отсутствие информации", "Сменить тему разговора"], "correct": 1, "explain": "Согласно заметке: 'Этап 2: Факт НЕ известен — Не гадаем и не злимся. Констатируем процесс получения этого факта через условие'."}, {"q": "Какова точная формула, предложенная в заметке для Этапа 2?", "options": ["«Я не знаю и не буду знать»", "«Я смогу назвать [Данные], когда/если выполню [Условие]»", "«Спросите у кого-нибудь другого»", "«Это невозможно предсказать в принципе»"], "correct": 1, "explain": "Формула из заметки: «Я смогу назвать [Данные], когда/если выполню [Условие]» — связывает недостающий факт с конкретным условием его получения."}, {"q": "Какой пример приведён в заметке для формулы Этапа 2?", "options": ["«Я назову время решения, когда закончу сбор требований и оценю объем работы»", "«Я не могу сказать, когда это будет готово»", "«Наверное, где-то через месяц, я думаю»", "«Спросите меня об этом позже»"], "correct": 0, "explain": "Пример из заметки: «Я назову время решения, когда закончу сбор требований и оценю объем работы» — прямое применение формулы [Данные]/[Условие]."}, {"q": "Как в модели называется механизм, стоящий за этими двумя этапами сообщения фактов?", "options": ["Эмоциональный интеллект", "Ментальный фильтр", "Активное слушание", "Зеркальное отражение"], "correct": 1, "explain": "Заметка озаглавлена именно как 'Ментальный фильтр' — осознанная фильтрация речи перед тем, как сообщить факт или его отсутствие."}, {"q": "Какие элементы явно исключаются из речи на Этапе 1 согласно заметке?", "options": ["Цифры и сроки", "Прилагательные и оценки", "Физические параметры", "Условия получения данных"], "correct": 1, "explain": "Заметка прямо указывает: на Этапе 1 нужно говорить 'без прилагательных и оценок', оставляя только цифры, сроки, физические параметры."}, {"q": "Какие два эмоциональных/когнитивных импульса модель явно советует избегать на Этапе 2?", "options": ["Радость и удивление", "Гадание (домысливание) и злость", "Спокойствие и терпение", "Любопытство и интерес"], "correct": 1, "explain": "Заметка прямо формулирует: 'Не гадаем и не злимся' — то есть модель советует не додумывать неизвестный факт и не реагировать раздражением на его отсутствие."}, {"q": "Что из перечисленного лучше всего описывает общую цель обеих ступеней модели?", "options": ["Сделать общение максимально эмоциональным и выразительным", "Сообщать точную, проверяемую информацию о статусе факта — либо сам факт, либо чёткое условие его получения", "Избегать любого общения о статусе задач", "Заставить собеседника чувствовать себя виноватым за вопрос"], "correct": 1, "explain": "Обе ступени модели направлены на замену расплывчатых, эмоционально окрашенных или неточных ответов чёткой, проверяемой информацией — либо сухим фактом, либо конкретным условием его появления."}, {"q": "Почему модель настаивает на отказе от прилагательных и оценок именно на Этапе 1 (когда факт уже известен)?", "options": ["Оценочные слова (например, 'сложная', 'долгая') субъективны и зависят от интерпретации слушателя, тогда как цифры и сроки дают однозначную, проверяемую информацию", "Прилагательные технически невозможно произнести при обсуждении рабочих задач", "Оценки всегда более точны, чем конкретные цифры", "Модель запрещает использование прилагательных только в письменной, но не устной речи"], "correct": 0, "explain": "Оценочные слова вроде 'сложно' или 'долго' у разных людей означают разное; замена их конкретными цифрами и сроками убирает эту неоднозначность и делает сообщение проверяемым."}, {"q": "Почему модель явно советует не 'гадать' на Этапе 2, если факт ещё не известен, вместо того чтобы дать примерную оценку 'на глаз'?", "options": ["Гадание может создать ложное ощущение определённости у собеседника, а при расхождении с реальностью — подорвать доверие, тогда как честное указание условия получения факта управляет ожиданиями точнее", "Гадание всегда даёт более точный результат, чем ожидание уточнения деталей", "Оценка 'на глаз' технически совпадает с использованием формулы модели", "Собеседники никогда не запоминают ранее озвученные предположения"], "correct": 0, "explain": "Непроверенное предположение, поданное как факт, рискует оказаться неверным и подорвать доверие к говорящему в будущем; модель предпочитает прозрачно указать условие получения точных данных, а не выдавать догадку за факт."}, {"q": "Почему в модели фраза строится именно как «Я смогу назвать [Данные], КОГДА/ЕСЛИ выполню [Условие]», а не просто «Я не знаю»?", "options": ["Формула переводит неопределённость из пассивного 'нет ответа' в активный, управляемый процесс с понятным условием получения ответа, что даёт собеседнику ясность и ощущение прогресса", "Фраза «Я не знаю» технически более информативна, чем формула с условием", "Формула с условием всегда дольше по времени произнесения, что и является её преимуществом", "Использование слова 'когда' или 'если' не влияет на восприятие фразы собеседником"], "correct": 0, "explain": "Простое «я не знаю» оставляет ситуацию неопределённой и может восприниматься как отказ отвечать, тогда как формула с явным условием показывает путь к получению ответа, снижая тревожность и создавая ощущение управляемости процесса."}, {"q": "Как связаны понятия 'ментальный фильтр' из заметки и общая идея разделения фактов и интерпретаций в коммуникации?", "options": ["Ментальный фильтр — это сознательная практика отделения объективных, проверяемых данных (фактов) от субъективных интерпретаций и эмоциональных реакций перед тем, как их озвучить", "Ментальный фильтр предполагает полное подавление любых эмоций в любой ситуации", "Понятие ментального фильтра не связано с различием факта и интерпретации", "Ментальный фильтр применяется только к письменной коммуникации"], "correct": 0, "explain": "Оба этапа модели — форма практики разделения факта и интерпретации: на Этапе 1 факт сообщается без эмоциональной 'надстройки', а на Этапе 2 отсутствие факта не подменяется домыслом или эмоциональной реакцией."}, {"q": "Почему явное указание условия («когда/если выполню X») на Этапе 2 может снижать конфликтность разговора по сравнению с расплывчатым ответом?", "options": ["Конкретное условие смещает фокус разговора с эмоциональной оценки ('почему до сих пор неизвестно') на конкретный, нейтральный процесс получения информации, что снижает почву для взаимных обвинений", "Указание условия всегда увеличивает раздражение собеседника", "Расплывчатые ответы снижают конфликтность эффективнее, чем чёткие условия", "Конфликтность разговора не зависит от формулировки ответа о неизвестном факте"], "correct": 0, "explain": "Когда ответ фокусируется на конкретном, проверяемом условии ('когда закончу сбор требований'), а не на абстрактном признании незнания, разговор смещается от потенциально эмоциональной оценки к нейтральному обсуждению процесса."}, {"q": "Как модель соотносится с более широким принципом 'радикальной прямоты' или 'ненасильственного общения' (без излишней оценочности и обвинений)?", "options": ["Оба этапа модели избегают оценочных и эмоционально окрашенных формулировок, заменяя их констатацией наблюдаемых фактов и процессов — это перекликается с принципом сообщения наблюдений вместо оценок в ненасильственном общении", "Модель прагматика полностью противоречит идеям ненасильственного общения", "Радикальная прямота требует максимального использования оценочных прилагательных", "Ненасильственное общение не имеет отношения к разделению фактов и предположений"], "correct": 0, "explain": "Как и модель ненасильственного общения (Маршалл Розенберг), различающая 'наблюдение' и 'оценку', двухэтапная модель прагматика стремится заменить субъективные оценки объективными, проверяемыми утверждениями."}, {"q": "Почему формулировка модели явно разделяет 'Данные' и 'Условие' в формуле Этапа 2 как два разных элемента, а не объединяет их в одну общую фразу?", "options": ["Явное разделение делает структуру ответа предсказуемой и легко воспроизводимой в разных ситуациях, снижая когнитивную нагрузку на говорящего при формулировке ответа под давлением или в стрессовой ситуации", "Разделение на 'Данные' и 'Условие' не даёт никакого практического преимущества по сравнению с одной общей фразой", "Формула работает только если 'Данные' и 'Условие' физически являются разными предложениями", "Структура формулы не влияет на то, насколько легко её применить в реальном разговоре"], "correct": 0, "explain": "Чёткий шаблон с двумя ясно определёнными частями (что будет ежду несколькими людьми?", "options": ["Конкретные, измеримые данные меньше подвержены искажению при пересказе от человека к человеку, чем субъективные оценочные формулировки, смысл которых может смещаться на каждом шаге передачи", "Числовые данные искажаются при пересказе точно так же, как и оценочные суждения", "Эффект испорченного телефона относится только к устной, но не письменной передаче информации", "Формулировка Этапа 1 не влияет на точность передачи информации между людьми"], "correct": 0, "explain": "Однозначные, измеримые данные ('4 этапа', '20 часов') значительно устойчивее к искажению при пересказе, чем субъективные формулировки ('довольно долго', 'довольно сложно'), смысл которых может смещаться при каждой передаче."}, {"q": "Как два этапа модели соотносятся друг с другом архитектурно — почему важно сначала определить, известен ли факт, прежде чем выбирать формулировку ответа?", "options": ["Выбор между Этапом 1 и Этапом 2 — это развилка, определяющая всю дальнейшую структуру ответа: попытка применить сухую констатацию к ещё неизвестному факту (или формулу условия к уже известному) была бы логически неуместна", "Оба этапа всегда применяются одновременно к любому высказыванию независимо от того, известен факт или нет", "Порядок определения известности факта не влияет на выбор формулировки ответа", "Этап 2 всегда должен предшествовать Этапу 1 при любом разговоре"], "correct": 0, "explain": "Модель по своей структуре — это условное разветвление (if-else): сначала нужно определить статус факта (известен/неизвестен), и только затем применить соответствующую (и только соответствующую) формулировку."}, {"q": "Почему модель может быть полезна как инструмент саморефлексии перед разговором, а не только как готовая фраза для использования в моменте?", "options": ["Осознанное применение фильтра требует сначала мысленно проверить, действительно ли что-то является фактом или уже оценкой/предположением, что тренирует более общую привычку различать наблюдение и интерпретацию", "Модель работает только как заученный скрипт, не требующий предварительного анализа ситуации", "Саморефлексия не связана с применением модели прагматика", "Модель применима только в момент самого разговора, без какой-либо подготовки"], "correct": 0, "explain": "Прежде чем произнести фразу по одной из формул, говорящему нужно сначала мысленно классифицировать информацию (факт или домысел, известно или нет) — сам этот процесс тренирует общую привычку разделять наблюдения и интерпретации."}, {"q": "Как модель взаимодействует с ожиданиями слушателя — почему четкая структура ответа (факт или условие) может снижать общую тревожность в разговоре даже при плохих новостях?", "options": ["Предсказуемая структура ответа (либо конкретные данные, либо ясное условие их появления) снижает неопределённость самого процесса общения, даже если содержание новости неприятно, так как слушатель понимает, чего ожидать дальше", "Тревожность слушателя никогда не связана со структурой получаемого ответа", "Чёткая структура ответа всегда усиливает тревожность независимо от содержания", "Плохие новости невозможно сообщить структурированно по формуле модели"], "correct": 0, "explain": "Определённость самой формы общения (я либо получу факт, либо ясное условие его появления) снижает метатревожность 'что вообще происходит', даже если содержание ответа само по себе не радостное."}, {"q": "Почему навык применения модели особенно важен именно в ситуациях с давлением времени или эмоциональным напряжением (а не в спокойном разговоре)?", "options": ["Под давлением люди более склонны непроизвольно скатываться к оценочным, эмоциональным или неточным формулировкам, и заранее усвоенная простая структура (формула) снижает когнитивную нагрузку в момент стресса", "В спокойном разговоре формула модели работает значительно эффективнее, чем в напряжённой ситуации", "Эмоциональное напряжение не влияет на выбор формулировок в разговоре", "Модель разрабатывалась исключительно для использования в письменной переписке, а не в напряжённом устном разговоре"], "correct": 0, "explain": "Именно в стрессовых условиях автоматизированные, заранее продуманные шаблоны формулировок наиболее полезны — они снижают риск скатиться в эмоциональную или неточную реакцию, когда для творческого подбора слов нет времени."}, {"q": "Как модель концептуально связана с идеей 'управления ожиданиями' (expectation management) в проектной работе?", "options": ["Обе ступени модели дают собеседнику чёткую, реалистичную картину происходящего — либо точные данные, либо понятный путь к их получению, — что и есть суть управления ожиданиями, в отличие от расплывчатых или чрезмерно оптимистичных обещаний", "Управление ожиданиями предполагает всегда обещать самые оптимистичные сроки независимо от реальной ситуации", "Модель прагматика не связана с понятием управления ожиданиями", "Управление ожиданиями достигается исключительно путём полного отказа от общения о статусе задач"], "correct": 0, "explain": "Управление ожиданиями — это именно предоставление реалистичной, проверяемой информации вместо оптимистичных обещаний или уклончивости, что напрямую соответствует духу обеих формул модели."}, {"q": "Почему явная структура модели (два чётких сценария применения) может облегчать обучение этому навыку новых сотрудников по сравнению с общим советом 'общайся честно и по делу'?", "options": ["Конкретный, воспроизводимый шаблон с явными условиями применения (известен факт / не известен) легче освоить и проверить на практике, чем абстрактный совет, не дающий чёткого алгоритма действия", "Общий абстрактный совет всегда легче внедрить в практику, чем конкретный алгоритм", "Структурированность модели не влияет на скорость её освоения новыми сотрудниками", "Обучение коммуникативным навыкам не может опираться на конкретные шаблоны фраз"], "correct": 0, "explain": "Конкретные, пошаговые инструкции с примерами (как в заметке) обычно легче усваиваются и тренируются, чем общие абстрактные принципы, так как дают ясный критерий 'сделал правильно / сделал неправильно'."}, {"q": "Как соотносятся между собой понятия 'сухая констатация факта' (Этап 1) и 'констатация процесса' (Этап 2) с точки зрения общего принципа модели — не давать оценок ни в одном из случаев?", "options": ["Обе формулировки объединяет общий принцип — сообщать наблюдаемое (либо конечный факт, либо текущий процесс/условие) без эмоциональной или оценочной интерпретации, различаясь лишь тем, что именно наблюдаемо в данный момент", "Этап 1 требует оценок, а Этап 2 их полностью исключает", "Только Этап 2 избегает оценочных суждений, тогда как Этап 1 их приветствует", "Между двумя этапами нет ничего общего с точки зрения структуры высказывания"], "correct": 0, "explain": "Оба этапа — частные случаи одного общего принципа: сообщать проверяемую, наблюдаемую информацию (факт или процесс получения факта) без добавления субъективной эмоциональной окраски."}, {"q": "Почему регулярная практика модели может со временем снижать общий уровень конфликтности в команде, а не только улучшать отдельные разговоры о сроках?", "options": ["Систематическое разделение фактов и предположений во всех типах общения постепенно формирует культуру доверия, где ожидания реалистичны, а недопонимания из-за неточных или эмоционально окрашенных формулировок случаются реже", "Модель влияет только на один конкретный разговор и не оказывает накопительного эффекта на культуру команды", "Конфликтность команды никогда не связана со стилем повседневного общения о статусах задач", "Регулярное применение модели неизбежно увеличивает число конфликтов из-за излишней прямолинейности"], "correct": 0, "explain": "Как и любая коммуникативная привычка, систематическое применение модели постепенно меняет общую культуру команды — реалистичные ожидания и меньше недопониманий из-за неточных или эмоциональных формулировок снижают почву для конфликтов в долгосрочной перспективе."}, {"q": "Как модель помогает разграничить ответственность говорящего за передачу информации и ответственность за сам факт (например, задержку проекта)?", "options": ["Сообщая процесс/условие получения данных вместо эмоциональной реакции или оправданий, говорящий фокусируется на своей роли передатчика достоверной информации, а не берёт на себя излишнюю эмоциональную ответственность за сам факт задержки", "Модель требует, чтобы говорящий всегда брал на себя личную вину за любую задержку или неизвестность", "Ответственность за информацию и ответственность за сам факт неразличимы в рамках модели", "Модель не имеет отношения к разграничению разных видов ответственности в общении"], "correct": 0, "explain": "Формула модели фокусируется на передаче достоверной информации о статусе (факт или процесс), что помогает отделить профессиональную роль информатора от излишнего эмоционального переживания за причины самой задержки."}, {"q": "Руководитель спрашивает сотрудника: «Когда будет готова функция?» Сотрудник ещё не оценивал объём работы. Какой ответ лучше всего соответствует модели прагматика?", "options": ["«Наверное, скоро, я постараюсь успеть побыстрее»", "«Я назову срок, когда закончу оценку объёма работы и распланирую этапы»", "«Не знаю, отстаньте, я занят»", "«Точно через неделю, обещаю»"], "correct": 1, "explain": "Это прямое применение формулы Этапа 2: вместо гадания или эмоциональной реакции сотрудник называет конкретное условие, при выполнении которого появится точный срок."}, {"q": "Коллега спрашивает о статусе задачи, которая уже полностью проанализирована и распланирована. Какой ответ лучше всего соответствует Этапу 1 модели?", "options": ["«Задача довольно объёмная, но, думаю, всё будет хорошо»", "«Задача включает 5 этапов, общий объём — примерно 15 часов работы»", "«Ну как сказать... сложно однозначно ответить»", "«Это займёт целую вечность, если честно»"], "correct": 1, "explain": "Ответ на Этапе 1 должен содержать сухие, проверяемые данные (количество этапов, часы), без оценочных слов вроде 'объёмная' или эмоциональных комментариев."}, {"q": "Клиент раздражённо спрашивает поставщика услуг: «Почему до сих пор нет даты доставки?!» Какой ответ по модели прагматика будет наиболее уместным, не поддаваясь эмоциональному напряжению ситуации?", "options": ["«Простите, я сам не знаю, как так вышло, это ужасно»", "«Мы сможем назвать точную дату доставки, когда завершим согласование с таможней, ожидаемо на этой неделе»", "«Вы слишком нетерпеливы, доставка придёт, когда придёт»", "«Дата доставки, скорее всего, будет примерно как обычно»"], "correct": 1, "explain": "Несмотря на эмоциональное давление со стороны клиента, ответ строится по формуле модели: не поддаётся раздражению и не гадает, а называет конкретное условие (согласование с таможней) для получения точной даты."}, {"q": "Разработчик оценивает задачу и говорит команде: «Это очень муторная и неприятная задача, я не уверен, сколько времени это займёт». Как переформулировать это высказывание в соответствии с моделью прагматика?", "options": ["«Задача требует интеграции с 3 внешними API; точный срок назову после оценки сложности каждой интеграции»", "«Задача действительно муторная, приготовьтесь ждать долго»", "«Я расстроен из-за этой задачи и не хочу её делать»", "«Задача, наверное, займёт вечность, честно говоря»"], "correct": 0, "explain": "Переформулировка убирает оценочные слова ('муторная', 'неприятная') и вместо этого называет либо конкретные параметры (если известны), либо явное условие получения точного срока — в точности по структуре модели."}, {"q": "Менеджер по продукту хочет сообщить команде статус задержки релиза, не вызывая паники и обвинений. Какой из вариантов ответа лучше всего соответствует принципам модели прагматика?", "options": ["«Релиз задерживается из-за 2 критических багов; дату нового релиза назовём, когда закончим их исправление и тестирование»", "«Релиз безнадёжно задержан, это катастрофа для всей команды»", "«Не переживайте, всё будет в порядке, я уверен»", "«Дата релиза больше не имеет значения, разберёмся как-нибудь»"], "correct": 0, "explain" дачи минус 20 часов тестов = 40 часов на 4 этапа обработки."}, {"q": "Если каждый из 4 этапов обработки (см. предыдущий вопрос, 40 часов суммарно) занимает одинаковое время, сколько часов занимает один этап?", "options": ["4 часа", "10 часов", "15 часов", "20 часов"], "correct": 1, "explain": "40 часов / 4 этапа = 10 часов на этап."}, {"q": "Сотрудник применяет формулу Этапа 2 пять раз в течение недели при разных запросах о сроках. Если на формулирование каждого такого ответа уходит в среднем 15 секунд (вместо 2 минут на придумывание оправданий без модели), сколько секунд суммарно экономится за неделю на этих 5 ответах?", "options": ["425 секунд", "525 секунд", "600 секунд", "675 секунд"], "correct": 1, "explain": "2 минуты = 120 секунд. Экономия на одном ответе = 120-15=105 секунд. За 5 ответов: 105×5=525 секунд."}, {"q": "В команде из 8 человек 6 сотрудников начали использовать модель прагматика в ежедневных стендапах. Какая доля команды применяет модель (в процентах)?", "options": ["60%", "70%", "75%", "80%"], "correct": 2, "explain": "6/8=0.75=75%."}, {"q": "Менеджер собрал обратную связь от 40 сотрудников о пользе модели прагматика в общении; 34 сотрудника отметили снижение количества конфликтов из-за неясных сроков. Какова доля отметивших улучшение?", "options": ["78%", "82%", "85%", "90%"], "correct": 2, "explain": "34/40=0.85=85%."}, {"q": "Если применение Этапа 2 формулы в среднем сокращает количество последующих уточняющих вопросов с 4 до 1 на один запрос о статусе, на сколько вопросов в среднем сокращается диалог?", "options": ["1", "2", "3", "4"], "correct": 2, "explain": "4-1=3 вопроса в среднем сокращается."}, {"q": "Отдел из 12 человек проводит в среднем 5 обсуждений сроков в неделю. Если каждое обсуждение без модели занимает 10 минут, а с моделью — 4 минуты, сколько минут экономится за одну неделю на всех обсуждениях отдела?", "options": ["6 минут", "30 минут", "60 минут", "120 минут"], "correct": 1, "explain": "Экономия на одном обсуждении = 10-4=6 минут. За 5 обсуждений: 6×5=30 минут."}, {"q": "Если из 100 наблюдаемых рабочих диалогов о сроках в 65 использовалась чёткая формулировка по модели (факт или условие), а в остальных — расплывчатые ответы, сколько диалогов содержали расплывчатые ответы?", "options": ["25", "35", "45", "65"], "correct": 1, "explain": "100-65=35 диалогов с расплывчатыми ответами."}, {"q": "Сотрудник экономит 105 секунд на каждом применении формулы Этапа 2 (см. предыдущий расчёт). Если он использует формулу 3 раза в день, 5 рабочих дней в неделю, сколько секунд экономии это даёт за неделю?", "options": ["525 секунд", "1050 секунд", "1575 секунд", "2100 секунд"], "correct": 2, "explain": "105 секунд × 3 раза в день × 5 дней = 105×15=1575 секунд."}, {"q": "В опросе среди 50 руководителей проектов 38 подтвердили, что чёткое разделение 'известный факт / условие получения факта' снижает число эскалаций конфликтов. Какова доля подтвердивших это (округлённо до целых процентов)?", "options": ["70%", "76%", "80%", "84%"], "correct": 1, "explain": "38/50=0.76=76%."}, {"q": "Сотрудник применял расплывчатые формулировки в 20 из 25 разговоров о сроках до тренинга по модели, и только в 3 из 25 после тренинга. На сколько разговоров сократилось число расплывчатых ответов?", "options": ["15", "17", "20", "22"], "correct": 1, "explain": "20-3=17 разговоров — на столько сократилось число расплывчатых ответов после тренинга."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
