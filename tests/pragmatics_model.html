<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Двухэтапная модель прагматика</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/pragmatics_model.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Двухэтапная модель прагматика</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "pragmatics_model";
  const QUESTIONS = [{"q": "Как называется описываемая в заметке модель коммуникации фактов?", "options": ["Двухэтапная модель прагматика (ментальный фильтр)", "Трёхэтапная рефлексивная модель убеждения (с обязательной обратной связью аудитории)", "Модель эмпатического активного слушания", "Пятиэтапная модель деловых переговоров и торга сторон"], "correct": 0, "explain": "Согласно заметке, модель называется 'Двухэтапная модель прагматика (Ментальный фильтр)' — инструмент для сухой, точной передачи фактов.", "usage": {"code": false, "without": "Коллега спрашивает про подход к сообщению фактов, а вы отвечаете размыто: «Ну, надо просто нормально общаться». Собеседник не понимает, что конкретно делать.", "with": "Вы называете инструмент точно: «Это двухэтапная модель прагматика, ментальный фильтр: если факт известен — говорю сухо, если нет — называю условие его получения».", "benefit": "У приёма есть имя — его можно применять осознанно."}}, {"q": "Что происходит на Этапе 1 модели, если факт уже известен?", "options": ["Сухо, без прилагательных и оценок — только цифры, сроки, параметры", "Попросить собеседника самому угадать факт по косвенным намёкам и контексту", "Промолчать и не сообщать факт, пока не переспросят несколько раз", "Высказать предположение с эмоциональной окраской и личной оценкой ситуации"], "correct": 0, "explain": "Согласно заметке: 'Этап 1: Факт известен — Говорим сухо, без прилагательных и оценок (только цифры, сроки, физические параметры)'.", "usage": {"code": false, "without": "На вопрос о статусе вы отвечаете: «Задача тяжёлая и муторная, провозимся долго». Слушатель слышит только вашу оценку.", "with": "Тот же статус без прилагательных: «Задача — 4 этапа обработки и 20 часов тестов». Только цифры и сроки.", "benefit": "Оценка заменена проверяемыми данными."}}, {"q": "Какой пример приведён в заметке для Этапа 1 (факт известен)?", "options": ["«Задача требует 4 этапа обработки и 20 часов тестов»", "«Я думаю, это займёт около недели, плюс-минус пара дней»", "«Мне кажется, задача довольно сложная и утомительная»", "«Задача почти готова, осталось буквально совсем немного»"], "correct": 0, "explain": "Пример из заметки: «Задача требует 4 этапа обработки и 20 часов тестов» — сухая констатация цифр без оценочных слов.", "usage": {"code": false, "without": "«Работы там прилично, задача серьёзная» — фраза звучит тревожно и ничего не измеряет.", "with": "«Задача требует 4 этапа обработки и 20 часов тестов» — сухая констатация вместо эмоции.", "benefit": "Слушатель получает факт, а не настроение."}}, {"q": "Что предписывает модель делать на Этапе 2, если факт ещё НЕ известен?", "options": ["Не гадать и не злиться, а назвать условие получения этого факта", "Немедленно извиниться за отсутствие информации и пообещать всё исправить", "Прикинуть примерную оценку «на глаз» и озвучить её как готовый ответ", "Аккуратно сменить тему разговора, чтобы не показывать неосведомлённость"], "correct": 0, "explain": "Согласно заметке: 'Этап 2: Факт НЕ известен — Не гадаем и не злимся. Констатируем процесс получения этого факта через условие'.", "usage": {"code": false, "without": "Срок неизвестен, а вы раздражённо гадаете: «Да откуда я знаю, ну недели две, наверное». Обещание повисает в воздухе.", "with": "Вы не гадаете и не злитесь: «Срок назову, когда пройду сбор требований — это и есть условие получения оценки».", "benefit": "Неизвестность превращается в понятный процесс."}}, {"q": "Какова точная формула, предложенная в заметке для Этапа 2?", "options": ["«Я смогу назвать [Данные], когда/если выполню [Условие]»", "«Это в принципе невозможно предсказать заранее хоть как-то»", "«Спросите об этом у кого-нибудь другого, я не в курсе дела»", "«Я не знаю ответа и вряд ли когда-нибудь буду его знать»"], "correct": 0, "explain": "Формула из заметки: «Я смогу назвать [Данные], когда/если выполню [Условие]» — связывает недостающий факт с конкретным условием его получения.", "usage": {"code": false, "without": "«Я не знаю, когда будет готово» — ых и оценок', оставляя только цифры, сроки, физические параметры.", "usage": {"code": false, "without": "«Это ужасно сложная и неприятная штука, если честно» — три прилагательных и ни одного факта.", "with": "Убираем оценки, оставляем измеримое: «Здесь три интеграции и два внешних согласования».", "benefit": "Меньше слов — больше информации."}}, {"q": "Какие два эмоциональных/когнитивных импульса модель явно советует избегать на Этапе 2?", "options": ["Спокойствие и терпение", "Домысливание и злость", "Радость и удивление", "Любопытство и интерес"], "correct": 1, "explain": "Заметка прямо формулирует: 'Не гадаем и не злимся' — то есть модель советует не додумывать неизвестный факт и не реагировать раздражением на его отсутствие.", "usage": {"code": false, "without": "Данных нет, и вы срываетесь: «Ну сколько можно спрашивать, само собой не готово!» Гадание плюс злость.", "with": "Спокойно и без домысла: «Точных данных пока нет; назову их, когда завершу проверку».", "benefit": "Ни выдумки, ни раздражения в ответе."}}, {"q": "Что из перечисленного лучше всего описывает общую цель обеих ступеней модели?", "options": ["Передавать проверяемую информацию: либо сам факт, либо условие его получения", "Сделать любое общение максимально эмоциональным, живым и выразительным для всех", "Полностью избегать любого общения о статусе текущих задач и сроков", "Заставить собеседника почувствовать вину за сам заданный вопрос"], "correct": 0, "explain": "Обе ступени модели направлены на замену расплывчатых, эмоционально окрашенных или неточных ответов чёткой, проверяемой информацией — либо сухим фактом, либо конкретным условием его появления.", "usage": {"code": false, "without": "«Как-нибудь разберёмся, скоро всё будет» — расплывчато и непроверяемо.", "with": "Точно и проверяемо: либо сам факт с цифрами, либо чёткое условие его появления.", "benefit": "Собеседник опирается на факты, а не на надежду."}}, {"q": "Почему модель настаивает на отказе от прилагательных и оценок именно на Этапе 1 (когда факт уже известен)?", "options": ["Оценки субъективны и зависят от слушателя, а цифры и сроки проверяемы", "Оценочные слова почти всегда точнее и информативнее любых конкретных цифр", "Запрет на прилагательные действует только в письменной, но не в устной речи", "Прилагательные технически невозможно произнести при обсуждении рабочих задач"], "correct": 0, "explain": "Оценочные слова вроде 'сложно' или 'долго' у разных людей означают разное; замена их конкретными цифрами и сроками убирает эту неоднозначность и делает сообщение проверяемым.", "usage": {"code": false, "without": "«Это долго» — для вас неделя, для собеседника час; слово каждый понял по-своему.", "with": "«Это займёт 20 часов работы» — цифра означает одно и то же для всех.", "benefit": "Убрана двусмысленность оценки."}}, {"q": "Почему модель явно советует не 'гадать' на Этапе 2, если факт ещё не известен, вместо того чтобы дать примерную оценку 'на глаз'?", "options": ["Оценка «на глаз» технически полностью совпадает с самой формулой модели", "Догадка даёт ложную определённость и рискует подорвать доверие", "Собеседники никогда не запоминают ранее озвученные предположения", "Гадание всегда даёт более точный результат, чем ожидание деталей"], "correct": 1, "explain": "Непроверенное предположение, поданное как факт, рискует оказаться неверным и подорвать доверие к говорящему в будущем; модель предпочитает прозрачно указать условие получения точных данных, а не выдавать догадку за факт.", "usage": {"code": false, "without": "Вы гадаете «дней пять» и подаёте это как факт; через неделю оценка не совпала — доверие просело.", "with": "«Точный срок назову после оценки задачи» — не выдаёте догадку за факт.", "benefit": "Доверие не страдает от несбывшихся догадок."}}, {"q": "Почему в модели фраза строится именно как «Я смогу назвать [Данные], КОГДА/ЕСЛИ выполню [Условие]», а не просто «Я не знаю»?", "options": ["Фраза «я не знаю» технически заметно информативнее любой формулы с условием", "Формула превращает неопределённость в управляемый процесс с условием", "Формула с условием всегда дольше звучит, и именно в этом её преимущество", "Слова «когда» и «если» никак не влияют на восприятие фразы собеседником"], "correct": 1, "explain": "Простое «я не знаю» оставляет ситуацию неопределённой и может восприниматься как отказ отвечать, тогда как формула с явным условием показывает путь к получению ответа, снижая тревожность и создавая ощущение управляемости процесса.", "usage": {"code": false, "without": "«Я не знаю» — звучит как захлопнутая дверь, разговор упирается в тупик.", "with": "«Я смогу ответить, когда получу данные из лаборатории» — та же неизвестность, но как процесс с выходом.", "benefit": "Виден прогресс, а не отказ."}}, {"q": "Как связаны понятия 'ментальный фильтр' из заметки и общая идея разделения фактов и интерпретаций в коммуникации?", "options": ["Осознанное отделение фактов от субъективных оценок перед тем, как их озвучить", "Понятие ментального фильтра никак не связано с различием факта и интерпретации", "Ментальный фильтр применяется исключительно к письменной коммуникации", "Ментальный фильтр предполагает полное подавление любых эмоций всегда"], "correct": 0, "explain": "Оба этапа модели — форма практики разделения факта и интерпретации: на Этапе 1 факт сообщается без эмоциональной 'надстройки', а на Этапе 2 отсутствие факта не подменяется домыслом или эмоциональной реакцией.", "usage": {"code": false, "without": "«Мне кажется, это провальная идея» — вы выдаёте интерпретацию за реальность.", "with": "Через ментальный фильтр: «Факт — сроки сдвинулись на 3 дня; моя оценка рисков отдельно».", "benefit": "Факт отделён от вашего мнения."}}, {"q": "Почему явное указание условия («когда/если выполню X») на Этапе 2 может снижать конфликтность разговора по сравнению с расплывчатым ответом?", "options": ["Конфликтность разговора совсем не зависит от того, как сформулирован ответ", "Указание конкретного условия всегда только усиливает раздражение собеседника ля личного общения, но не для рабочих сроков"], "correct": 0, "explain": "В управлении проектами вопрос 'когда будет готово?' часто создаёт напряжение при отсутствии точного ответа; формула модели даёт честный, структурированный способ сообщить, при каком условии появится точный срок, не давая необоснованных обещаний.", "usage": {"code": false, "without": "На «когда будет готово?» вы либо обещаете лишнего, либо уходите от ответа. Оба варианта бьют по доверию.", "with": "«Точный срок назову, когда оценю объём» — честно и структурно, без пустых обещаний.", "benefit": "Ожидания по срокам под контролем."}}, {"q": "Как формулировка Этапа 1 (только цифры, сроки, физические параметры) помогает избежать эффекта 'испорченного телефона' при передаче информации между несколькими людьми?", "options": ["Числовые данные искажаются при пересказе точно так же, как и оценки", "Измеримые данные меньше искажаются при пересказе, чем субъективные оценки", "Эффект испорченного телефона касается только устной, но не письменной речи", "Формулировка Этапа 1 совсем не влияет на точность передачи информации"], "correct": 1, "explain": "Однозначные, измеримые данные ('4 этапа', '20 часов') значительно устойчивее к искажению при пересказе, чем субъективные формулировки ('довольно долго', 'довольно сложно'), смысл которых может смещаться при каждой передаче.", "usage": {"code": false, "without": "«Довольно долго» передаётся по цепочке и на третьем пересказе становится «почти невыполнимо».", "with": "«20 часов» пересказывается без искажений — цифра не плывёт.", "benefit": "Смысл не теряется при передаче."}}, {"q": "Как два этапа модели соотносятся друг с другом архитектурно — почему важно сначала определить, известен ли факт, прежде чем выбирать формулировку ответа?", "options": ["Оба этапа всегда применяются одновременно к любому высказыванию без разбора", "Этап 2 всегда должен предшествовать Этапу 1 в любом разговоре", "Это развилка: сначала статус факта, затем подходящая формулировка", "Порядок определения известности факта не влияет на выбор ответа"], "correct": 2, "explain": "Модель по своей структуре — это условное разветвление (if-else): сначала нужно определить статус факта (известен/неизвестен), и только затем применить соответствующую (и только соответствующую) формулировку.", "usage": {"code": false, "without": "Вы отвечаете, не проверив, известен ли факт, и мешаете догадку с констатацией.", "with": "Сначала развилка: факт известен — говорю цифрами; не известен — называю условие. Потом ответ.", "benefit": "Формулировка соответствует реальному статусу."}}, {"q": "Почему модель может быть полезна как инструмент саморефлексии перед разговором, а не только как готовая фраза для использования в моменте?", "options": ["Модель применима только в сам момент разговора и без всякой подготовки", "Сначала проверяешь: факт это или оценка — и это тренирует различение", "Саморефлексия никак не связана с применением модели прагматика", "Модель работает только как заученный скрипт без анализа ситуации"], "correct": 1, "explain": "Прежде чем произнести фразу по одной из формул, говорящему нужно сначала мысленно классифицировать информацию (факт или домысел, известно или нет) — сам этот процесс тренирует общую привычку разделять наблюдения и интерпретации.", "usage": {"code": false, "without": "Вы бросаете фразу не думая: «наверное, сложно» — не различая, факт это или домысел.", "with": "Перед ответом мысленно проверяете: это наблюдение или интерпретация, известно или нет — и лишь потом говорите.", "benefit": "Тренируется привычка отделять факт от домысла."}}, {"q": "Как модель взаимодействует с ожиданиями слушателя — почему четкая структура ответа (факт или условие) может снижать общую тревожность в разговоре даже при плохих новостях?", "options": ["Предсказуемая форма ответа снижает неопределённость даже при плохих новостях", "Чёткая структура ответа всегда усиливает тревожность вне зависимости от содержания", "Плохие новости невозможно сообщить структурированно по формуле модели", "Тревожность слушателя никогда не связана со структурой получаемого ответа"], "correct": 0, "explain": "Определённость самой формы общения (я либо получу факт, либо ясное условие его появления) снижает метатревожность 'что вообще происходит', даже если содержание ответа само по себе не радостное.", "usage": {"code": false, "without": "«Пока непонятно, что вообще происходит» — неопределённость самой формы общения тревожит слушателя.", "with": "Всегда либо факт, либо ясное условие его появления — форма ответа предсказуема даже при плохих новостях.", "benefit": "Ниже тревога «что вообще будет»."}}, {"q": "Почему навык применения модели особенно важен именно в ситуациях с давлением времени или эмоциональным напряжением (а не в спокойном разговоре)?", "options": ["В спокойном разговоре формула работает заметно эффективнее, чем в стрессе", "Под давлением люди срываются на оценки, и готовая структура помогает", "Эмоциональное напряжение совсем не влияет на выбор формулировок в разговоре", "Модель создавалась только для письменной переписки, а не для устной речи"], "correct": 1, "explain": "Именно в стрессовых условиях автоматизированные, заранее продуманные шаблоны формулировок наиболее полезны — они снижают риск скатиться в эмоциональную или неточную реакцию, когда для творческого подбора слов нет времени.", "usage": {"code": false, "without": "В спешке вы срываетесь на оценочное «это катастрофа, всё горит».", "with": "Заранее усвоенная формула держит вас в русле: «Два бага; дату назову после их исправления».", "benefit": "Под стрессом не скатываетесь в эмоции."}}, {"q": "Как модель концептуально связана с идеей 'управления ожиданиями' (expectation management) в проектной работе?", "options": ["Управление ожиданиями достигается только полным отказом от общения о статусе", "Управление ожиданиями — это всегда обещать самые оптимистичные сроки подряд", "Модель прагматика вообще не связана с понятием управления ожиданиями", "Обе ступени дают реалистичную картину: точные данные или путь к ним"], "correct": 3, "explain": "Управление ожиданиями — это именно предоставление реалистичной, проверяемой информации вместо оптимистичных обещаний или уклончивости, что напрямую соответствует духу обеих формул модели.", "usage": {"code": false, "without": "«Успеем, скорее всего» — оптимистичное обещание, которое потом трудно сдержать.", "with": "Реалистично: «Дату дам, когда закроем оптимизацию и получим данные квартала».", "benefit": "Ожидания совпадают с реальностью."}}, {"q": "Почему явная структура модели (два чётких сценария применения) может облегчать обучение этому навыку новых сотрудников по сравнению с общим советом 'общайся честно и по делу'?", "options": ["Обучение коммуникации не может опираться на конкретные шаблоны фраз", "Чёткий шаблон с ясными условиями освоить легче, чем абстрактный совет", "Структурированность модели совсем не влияет на скорость её освоения новичками", "Общий абстрактный совет всегда легче внедрить, чем конкретный алгоритм"], "correct": 1, "explain": "Конкретные, пошаговые инструкции с примерами (как в заметке) обычно легче усваиваются и тренируются, чем общие абстрактные принципы, так как дают ясный критерий 'сделал правильно / сделал неправильно'.", "usage": {"code": false, "without": "Новичку говорят «общайся честно и по делу» — совет абстрактный, применять непонятно.", "with": "Дают шаблон с двумя случаями: факт известен → цифры; не известен → условие. Есть чёткий алгоритм.", "benefit": "Навык легко освоить и проверить."}}, {"q": "Как соотносятся между собой понятия 'сухая констатация факта' (Этап 1) и 'констатация процесса' (Этап 2) с точки зрения общего принципа модели — не давать оценок ни в одном из случаев?", "options": ["Только Этап 2 избегает оценок, тогда как Этап 1 их вполне приветствует всегда", "Оба сообщают наблюдаемое без оценки, разница лишь в предмете", "Этап 1 требует оценок, а Этап 2 их полностью и строго исключает", "Между двумя этапами нет ничего общего в структуре высказывания"], "correct": 1, "explain": "Оба этапа — частные случаи одного общего принципа: сообщать проверяемую, наблюдаемую информацию (факт или процесс получения факта) без добавления субъективной эмоциональной окраски.", "usage": {"code": false, "without": "«Это плохо, а это ещё хуже» — оценки и на известном, и на неизвестном факте.", "with": "И там и там наблюдаемое без оценки: факт цифрами, либо процесс через условие.", "benefit": "Единый принцип для обоих случаев."}}, {"q": "Почему регулярная практика модели может со временем снижать общий уровень конфликтности в команде, а не только улучшать отдельные разговоры о сроках?", "options": ["Конфликтность команды никогда не связана со стилем общения о статусах", "Модель влияет только на один разговор и не даёт накопительного эффекта", "Разделение фактов и догадок постепенно формирует культуру доверия", "Регулярное применение модели неизбежно увеличивает число конфликтов"], "correct": 2, "explain": "Как и любая коммуникативная привычка, систематическое применение модели постепенно меняет общую культуру команды — реалистичные ожидания и меньше недопониманий из-за неточных или эмоциональных формулировок снижают почву для конфликтов в долгосрочной перспективе.", "usage": {"code": false, "without": "В команде привыкли к «примерно», «где-то», «наверное» — недопонимания копятся, вспыхивают ссоры.", "with": "Все переходят на факт-или-условие; ожидания реалистичны, поводов для стычек меньше.", "benefit": "Со временем в команде меньше конфликтов."}}, {"q": "Как модель помогает разграничить ответственность говорящего за передачу информации и ответственность за сам факт (например, задержку проекта)?", "options": ["Называя условие, говорящий остаётся информатором, а не виноватым", "Модель совсем не имеет отношения к разграничению видов ответственности", "Ответственность за информацию и за сам факт в модели неразличимы совсем", "Модель требует всегда брать личную вину за любую задержку и незнание"], "correct": 0, "explain": "Формула модели фокусируется на передаче достоверной информации о статусе (факт или процесс), что помогает отделить профессиональную роль информатора от излишнего эмоционального переживания за причины самой задержки.", "usage": {"code": false, "without": "«Это я во всём виноват, это кошмар» — вы берёте на себя лишнюю эмоциональную вину за задержку.", "with": "«Релиз сдвинулся на 3 дня; новую дату назову после теста» — вы информатор, а не виноватый.", "benefit": "Роль передатчика фактов отделена от вины."}}, {"q": "Руководитель спрашивает сотрудника: «Когда будет готова функция?» Сотрудник ещё не оценивал объём работы. Какой ответ лучше всего соответствует модели прагматика?", "options": ["«Наверное, скоро, я постараюсь успеть побыстрее, если получится»", "«Я назову срок, когда закончу оценку объёма и распланирую этапы»", "«Точно ровно через неделю, я обещаю и точно не подведу вас»", "«Не знаю, отстаньте, пожалуйста, я сейчас очень сильно занят»"], "correct": 1, "explain": "Это прямое применение формулы Этапа 2: вместо гадания или эмоциональной реакции сотрудник называет конкретное условие, при выполнении которого появится точный срок.", "usage": {"code": false, "without": "Руководителю на «когда готово?» вы отвечаете «постараюсь побыстрее» — обещание без опоры.", "with": "«Срок назову, когда закончу оценку объёма и распланирую этапы» — условие вместо гадания.", "benefit": "Честный ответ без ложных обещаний."}}, {"q": "Коллега спрашивает о статусе задачи, которая уже полностью проанализирована и распланирована. Какой ответ лучше всего соответствует Этапу 1 модели?", "options": ["«Это займёт целую вечность, если уж совсем честно говорить»", "«Ну как сказать... тут довольно сложно однозначно ответить»", "«Задача включает 5 этапов, общий объём — около 15 часов работы»", "«Задача довольно объёмная, но, думаю, в итоге всё будет неплохо»"], "correct": 2, "explain": "Ответ на Этапе 1 должен содержать сухие, проверяемые данные (количество этапов, часы), без оценочных слов вроде 'объёмная' или эмоциональных комментариев.", "usage": {"code": false, "without": "О готовой задаче: «объёмная, но думаю всё будет хорошо» — оценка и утешение вместо данных.", "with": "«Задача — 5 этапов, около 15 часов работы» — сухие проверяемые цифры.", "benefit": "Коллега получает конкретику, а не успокоение."}}, {"q": "Клиент раздражённо спрашивает поставщика услуг: «Почему до сих пор нет даты доставки?!» Какой ответ по модели прагматика будет наиболее уместным, не поддаваясь эмоциональному напряжению ситуации?", "options": ["«Точную дату назовём, когда завершим согласование с таможней»", "«Дата доставки, скорее всего, будет примерно такой же, как всегда»", "«Простите, я и сам не знаю, как так вышло, это просто ужасно»", "«Вы слишком нетерпеливы, доставка придёт тогда, когда придёт»"], "correct": 0, "explain": "Несмотря на эмоциональное давление со стороны клиента, ответ строится по формуле модели: не поддаётся раздражению и не гадает, а называет конкретное условие (согласование с таможней) для получения точной даты.", "usage": {"code": false, "without": "Клиент злится: «Почему нет даты?!», а вы оправдываетесь: «сам не знаю, как так вышло».", "with": "«Точную дату назовём, когда завершим согласование с таможней, ожидаемо на неделе» — условие, а не паника.", "benefit": "Держите тон даже под давлением клиента."}}, {"q": "Разработчик оценивает задачу и говорит команде: «Это очень муторная и неприятная задача, я не уверен, сколько времени это займёт». Как переформулировать это высказывание в соответствии с моделью прагматика?", "options": ["«Я расстроен из-за этой задачи и совершенно не хочу за неё браться»", "«Задача, наверное, займёт целую вечность, честно говоря»", "«Задача правда муторная, приготовьтесь ждать её очень долго»", "«Нужна интеграция с 3 API; срок назову после оценки каждой из них»"], "correct": 3, "explain": "Переформулировка убирает оценочные слова ('муторная', 'неприятная') и вместо этого называет либо конкретные параметры (если известны), либо явное условие получения точного срока — в точности по структуре модели.", "usage": {"code": false, "without": "«Задача муторная и неприятная, не знаю сколько займёт» — эмоция плюс неопределённость.", "with": "«Нужна интеграция с 3 API; точный срок назову после оценки каждой» — параметры и условие.", "benefit": "Оценочные слова заменены структурой."}}, {"q": "Менеджер по продукту хочет сообщить команде статус задержки релиза, не вызывая паники и обвинений. Какой из вариантов ответа лучше всего соответствует принципам модели прагматика?", "options": ["«Дата релиза больше не важна, как-нибудь потом со всем разберёмся»", "«Релиз безнадёжно задержан, это настоящая катастрофа для команды»", "«Не переживайте, всё точно будет в полном порядке, я в этом уверен»", "«Задержка из-за 2 багов; дату назовём после их исправления»"], "correct": 3, "explain": "Ответ сочетает сухую констатацию известного факта (2 критических бага) на Этапе 1 с формулой Этапа 2 для ещё неизвестной точной даты (условие: исправление и тестирование багов).", "usage": {"code": false, "without": "«Релиз безнадёжно задержан, это катастрофа» — паника, провоцирующая обвинения.", "with": "«Задержка из-за 2 критических багов; новую дату назовём после их исправления и теста».", "benefit": "Статус без паники и поиска виноватых."}}, {"q": "На встрече с инвесторами основатель стартапа не может точно назвать дату выхода на самоокупаемость. Какой ответ наиболее соответствует духу модели, избегая как пустых обещаний, так и уклончивости?", "options": ["«Мы точно выйдем на самоокупаемость ровно через полгода, обещаю»", "«Это в принципе невозможно предсказать, и мы даже не будем и пытаться»", "«Наверное, довольно скоро, если только всё пойдёт совсем хорошо»", "«Дату назовём, когда завершим оптимизацию и получим данные квартала»"], "correct": 3, "explain": "Ответ следует формуле Этапа 2: не даёт необоснованного точного обещания и не уклоняется полностью от ответа, а указывает конкретное условие, при выполнении которого появится точная дата.", "usage": {"code": false, "without": "Инвесторам: «выйдем на самоокупаемость через полгода, обещаю» — необоснованное обещание.", "with": "«Точную дату назовём, когда завершим оптимизацию затрат и получим данные квартала».", "benefit": "Ни пустых обещаний, ни уклончивости."}}, {"q": "Сотрудник службы поддержки клиентов должен сообщить об известном сроке устранения технической проблемы. Какая формулировка лучше всего соответствует Этапу 1 модели?", "options": ["«Проблема довольно серьёзная, но мы очень стараемся изо всех сил»", "«Проблема будет устранена в течение 2 часов, начиная с 14:00»", "«Всё будет исправлено очень-очень скоро, вы только не переживайте»", "«Проблема неприятная, но вполне терпимая, просто немного подождите»"], "correct": 1, "explain": "Формулировка содержит только конкретные, проверяемые данные (2 часа, время начала) без оценочных или успокаивающих, но неинформативных фраз.", "usage": {"code": false, "without": "«Всё исправим очень скоро, не переживайте» — успокаивает, но не информирует.", "with": "«Проблема будет устранена в течение 2 часов, начиная с 14:00» — точный срок.", "benefit": "Клиент знает конкретное время."}}, {"q": "Тимлид спрашивает разработчика об оценке времени на рефакторинг модуля, который тот ещё не изучал детально. Какой ответ будет наиболее корректным с точки зрения модели?", "options": ["«Оценку дам, когда изучу структуру кода и определю объём изменений»", "«А зачем вообще нужен этот рефакторинг? Давайте лучше не будем его делать»", "«Наверное, дня три, но я не уверен, может, и целую неделю»", "«Рефакторинг — это всегда долго и болезненно, точно не скажу вам»"], "correct": 0, "explain": "Ответ следует формуле Этапа 2, называя конкретное условие (изучение структуры кода и определение объёма изменений), необходимое для получения точной оценки, вместо приблизительной догадки.", "usage": {"code": false, "without": "О незнакомом модуле: «наверное, дня три, может неделю» — догадка вместо оценки.", "with": "«Оценку дам, в стали покороче» — субъективное впечатление.", "with": "«6 минут экономии на обсуждение, за 5 в неделю — 30 минут» — считанная экономия.", "benefit": "Экономия отдела посчитана."}}, {"q": "Если из 100 наблюдаемых рабочих диалогов о сроках в 65 использовалась чёткая формулировка по модели (факт или условие), а в остальных — расплывчатые ответы, сколько диалогов содержали расплывчатые ответы?", "options": ["45 диалогов", "25 диалогов", "35 диалогов", "65 диалогов"], "correct": 2, "explain": "100-65=35 диалогов с расплывчатыми ответами.", "usage": {"code": false, "without": "«Во многих разговорах ответы всё ещё мутные» — без числа.", "with": "«Из 100 диалогов чётких 65, значит расплывчатых 35» — точный остаток.", "benefit": "Доля размытых ответов измерена."}}, {"q": "Сотрудник экономит 105 секунд на каждом применении формулы Этапа 2 (см. предыдущий расчёт). Если он использует формулу 3 раза в день, 5 рабочих дней в неделю, сколько секунд экономии это даёт за неделю?", "options": ["2100 секунд", "1050 секунд", "1575 секунд", "525 секунд"], "correct": 2, "explain": "105 секунд × 3 раза в день × 5 дней = 105×15=1575 секунд.", "usage": {"code": false, "without": "«За неделю экономится вроде бы прилично» — приблизительно.", "with": "«105 секунд × 3 раза в день × 5 дней = 1575 секунд за неделю» — точный расчёт.", "benefit": "Недельная экономия названа точно."}}, {"q": "В опросе среди 50 руководителей проектов 38 подтвердили, что чёткое разделение 'известный факт / условие получения факта' снижает число эскалаций конфликтов. Какова доля подтвердивших это (округлённо до целых процентов)?", "options": ["80%", "70%", "76%", "84%"], "correct": 2, "explain": "38/50=0.76=76%.", "usage": {"code": false, "without": "«Почти все руководители это подтвердили» — оценка вместо факта.", "with": "«38 из 50 руководителей подтвердили — это 76%» — точная доля.", "benefit": "Мнение выборки измерено."}}, {"q": "Сотрудник применял расплывчатые формулировки в 20 из 25 разговоров о сроках до тренинга по модели, и только в 3 из 25 после тренинга. На сколько разговоров сократилось число расплывчатых ответов?", "options": ["22 разговора", "20 разговоров", "15 разговоров", "17 разговоров"], "correct": 3, "explain": "20-3=17 разговоров — на столько сократилось число расплывчатых ответов после тренинга.", "usage": {"code": false, "without": "«После тренинга мутных ответов стало сильно меньше» — впечатление.", "with": "«С 20 из 25 расплывчатых до 3 — сокращение на 17 разговоров» — точная разница.", "benefit": "Эффект тренинга выражен числом."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
