<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Теория World Models</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/world_models.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Теория World Models</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "world_models";
  const QUESTIONS = [{"q": "Что такое 'world model' (модель мира) в контексте машинного обучения и обучения с подкреплением?", "options": ["Внутреннее представление агента о том, как устроена и как меняется окружающая среда", "База данных географических карт мира", "Набор правил для интернет-браузера", "Алгоритм сжатия видео"], "correct": 0, "explain": "World model — обучаемое представление динамики среды, позволяющее агенту предсказывать последствия своих действий без прямого взаимодействия с реальной средой."}, {"q": "Из каких основных компонентов обычно состоит классическая архитектура world model (например, модель Ha & Schmidhuber, 2018)?", "options": ["Только одна большая полносвязная сеть", "Vision-модель (V), модель памяти/динамики (M) и контроллер (C)", "База правил и парсер естественного языка", "Только контроллер без модели среды"], "correct": 1, "explain": "Классическая архитектура включает V (кодирует наблюдения в компактное представление), M (предсказывает будущее состояние) и C (принимает решения на основе представления)."}, {"q": "Зачем нужен компонент 'V' (Vision), кодирующий наблюдения в латентное пространство?", "options": ["Чтобы сжать высокоразмерные наблюдения (например, изображения) в компактный вектор признаков, удобный для дальнейшего моделирования", "Чтобы напрямую управлять агентом без модели динамики", "Чтобы хранить весь датасет без изменений", "Чтобы генерировать текстовые описания сцены"], "correct": 0, "explain": "V-компонент (часто автоэнкодер или VAE) сжимает изображение в низкоразмерный латентный вектор z, убирая избыточность и облегчая работу модели памяти/динамики."}, {"q": "Какова роль компонента 'M' (Memory/динамическая модель) в world model?", "options": ["Хранить весь текстовый архив диалогов", "Предсказывать следующее латентное состояние на основе текущего состояния и действия агента", "Выполнять финальное действие агента напрямую", "Сжимать изображения в векторы"], "correct": 1, "explain": "M-модель (часто рекуррентная сеть, например, RNN/LSTM с MDN) прогнозирует, как изменится латентное состояние среды при выполнении действия — это и есть 'модель мира'."}, {"q": "Что означает термин 'обучение внутри воображения' (learning inside a dream/imagination), связанный с world models?", "options": ["Обучение агента полностью во сне человека-разработчика", "Обучение политики агента на основе симулированного опыта, сгенерированного самой world model, а не реальной среды", "Обучение только на размеченных человеком данных", "Полный отказ от использования нейросетей"], "correct": 1, "explain": "Если world model достаточно точна, агент может обучаться, взаимодействуя с её собственными предсказаниями ('воображением'), что резко снижает потребность в дорогих реальных взаимодействиях со средой."}, {"q": "Чем world model отличается от классической model-free стратегии обучения с подкреплением?", "options": ["World model явно обучает предсказывать динамику среды, тогда как model-free методы напрямую обучают политику или ценность действий без явной модели среды", "Model-free методы всегда требуют world model", "Это два названия одного и того же подхода", "World model никогда не используется в обучении с подкреплением"], "correct": 0, "explain": "Model-based подходы (включая world models) явно моделируют переходы среды P(s'|s,a), тогда как model-free подходы (например, Q-learning) обходятся без явной модели, обучаясь напрямую по опыту."}, {"q": "Что такое латентное пространство (latent space) в контексте world models?", "options": ["Пространство физических координат объекта в среде", "Сжатое, абстрактное векторное представление наблюдений, в котором удобнее моделировать динамику", "Список всех возможных действий агента", "Набор гиперпараметров модели"], "correct": 1, "explain": "Латентное пространство — компактное представление сложных наблюдений (например, изображений), извлечённое энкодером, которое сохраняет существенную информацию для прогнозирования."}, {"q": "Какую роль играет контроллер 'C' в классической архитектуре world model?", "options": ["Он выбирает действие агента на основе текущего латентного состояния (и, возможно, состояния памяти M)", "Он генерирует изображения среды", "Он преобразует текст в латентный вектор", "Он хранит историю всех прошлых наблюдений без сжатия"], "correct": 0, "explain": "Контроллер — обычно простая (часто линейная) политика, отображающая сжатое представление состояния в действие, что позволяет обучать его отдельно и быстро."}, {"q": "Почему компонент 'C' в оригинальной архитектуре world models часто делают намеренно простым (например, линейным)?", "options": ["Основная сложность моделирования среды уже вынесена в V и M, поэтому политике не нужно быть сложной — это ускоряет и упрощает обучение самого контроллера", "Простой контроллер всегда даёт лучшее качество решений", "Сложные контроллеры технически невозможно обучить", "Простота контроллера не связана с распределением сложности между компонентами"], "correct": 0, "explain": "Так как V сжимает наблюдения, а M моделирует динамику, контроллеру остаётся относительно простая задача — принять решение на основе уже подготовленного представления, что позволяет использовать даже эволюционные стратегии для его обучения."}, {"q": "Что общего между world models и рекуррентными нейросетями (RNN), используемыми для предсказания последовательностей?", "options": ["World model для динамики среды часто реализуется именно как рекуррентная сеть, предсказывающая следующее состояние на основе истории и текущего действия", "RNN никогда не используются в world models", "World models полностью заменяют RNN другим типом архитектуры", "Между ними нет никакой связи"], "correct": 0, "explain": "Поскольку среда обычно имеет временную (последовательную) структуру, RNN (или их варианты вроде LSTM) естественно подходят для моделирования компонента M."}, {"q": "Почему обучение агента в 'воображении' (внутри world model) потенциально гораздо эффективнее по числу требуемых взаимодействий со средой (sample efficiency)?", "options": ["Агент может генерировать неограниченное количество симулированного опыта внутри уже обученной модели, не тратя дорогостоящее реальное время/ресурсы на взаимодействие с настоящей средой", "Обучение в воображении всегда медленнее реального взаимодействия", "World model не позволяет генерировать новый опыт", "Взаимодействие с реальной средой никогда не бывает дорогим"], "correct": 0, "explain": "После того как world model достаточно хорошо обучена, симуляция внутри неё практически бесплатна по сравнению с реальными действиями (особенно в робототехнике), что радикально повышает эффективность использования данных."}, {"q": "В чём заключается ключевой риск использования 'воображаемого' опыта для обучения политики, если world model недостаточно точна?", "options": ["Политика может научиться эксплуатировать неточности/артефакты модели среды, находя 'лазейки', которые не соответствуют реальному поведению среды", "Неточная world model всегда улучшает финальную политику", "Риска не существует, если модель достаточно большая по размеру", "Неточности модели среды не влияют на качество итоговой политики"], "correct": 0, "explain": "Классическая проблема model-based RL — 'model exploitation': агент находит стратегии, максимизирующие награду в неточной модели, но не работающие в реальной среде."}, {"q": "Почему вариационные автоэнкодеры (VAE) часто используются как компонент V в world models, а не обычные автоэнкодеры?", "options": ["VAE обучают гладкое, структурированное вероятностное латентное пространство, что облегчает генерацию правдоподобных новых состояний и интерполяцию, в отличие от произвольного латентного пространства обычного автоэнкодера", "VAE не имеет отношения к сжатию изображений", "VAE всегда работают хуже обычных автоэнкодеров в любых задачах", "Обычные автоэнкодеры никогда не используются в world models"], "correct": 0, "explain": "VAE регуляризует латентное пространство к известному распределению (обычно нормальному), что делает его более пригодным для генерации и предсказания, чем нерегуляризованное пространство обычного автоэнкодера."}, {"q": "Как компонент MDN-RNN (Mixture Density Network + RNN), используемый в некоторых world models, помогает справляться с неопределённостью и мультимодальностью будущего?", "options": ["Вместо предсказания одного конкретного следующего состояния, MDN-RNN предсказывает распределение вероятностей (смесь гауссиан) над возможными следующими состояниями, отражая, что будущее может развиваться по-разному", "MDN-RNN всегда даёт только одно детерминированное предсказание", "MDN-RNN используется исключительно для обработки текста", "Мультимодальность будущего не имеет значения для world models"], "correct": 0, "explain": "Реальные среды часто стохастичны или частично наблюдаемы, поэтому предсказание распределения (а не единственного значения) позволяет модели явно выразить неопределённость и множественность возможных исходов."}, {"q": "Почему world models особенно полезны в средах, где реальное взаимодействие дорого или опасно (например, робототехника, автономное вождение)?", "options": ["Они позволяют агенту 'репетировать' и обучаться в симуляции, избегая дорогостоящих или потенциально опасных реальных проб и ошибок", "World models полностью устраняют необходимость в реальном тестировании перед развёртыванием", "В таких средах world models вообще не применимы", "Реальное взаимодействие всегда дешевле симуляции"], "correct": 0, "explain": "В сферах с высокой ценой ошибки (аварии, поломки оборудования) предпочтительно как можно больше обучения проводить в симуляции (внутри world model), минимизируя риски и издержки реальных проб."}, {"q": "Чем world models концептуально перекликаются с идеей 'предиктивного кодирования' (predictive coding) в нейронауке?", "options": ["Обе концепции предполагают, что система (мозг или агент) строит внутреннюю модель, постоянно предсказывающую будущие сенсорные входы, и обучается на основе ошибки предсказания", "Предиктивное кодирование не связано с идеей моделирования среды", "World models полностью противоречат теориям нейронауки", "Мозг, согласно этой теории, не строит никаких внутренних моделей"], "correct": 0, "explain": "Гипотеза предиктивного кодирования утверждает, что мозг постоянно генерирует прогнозы сенсорного входа и корректирует внутреннюю модель на основе ошибки предсказания — идея, во многом схожая с обучением world models."}, {"q": "Почему разделение world model на явные компоненты (восприятие, память/динамика, управление) может облегчать интерпретируемость системы по сравнению с монолитной end-to-end нейросетью?", "options": ["Каждый компонент решает более узкую, понятную задачу (сжатие наблюдений, предсказание динамики, выбор действия), что упрощает анализ, отладку и перенос отдельных частей на новые задачи", "Разделение компонентов всегда снижает итоговое качество системы", "Монолитные end-to-end модели всегда интерпретируемее модульных", "Разделение на компоненты не влияет на интерпретируемость"], "correct": 0, "explain": "Модульная архитектура позволяет отдельно проверять качество восприятия, точность прогноза динамики и качество принятия решений, что облегчает диагностику проблем по сравнению с 'чёрным ящиком' единой сети."}, {"q": "Как современные world models (например, в проектах вроде Dreamer) масштабируют идею обучения в воображении на более сложные, многошаговые задачи?", "options": ["Они обучают достаточно точную латентную динамическую модель и используют её для генерации длинных траекторий воображаемого опыта, на которых обучается политика методом градиента по ожидаемой награде", "Dreamer полностью отказывается от идеи латентного пространства", "Такие модели работают только для задач с одним шагом взаимодействия", "Обучение в воображении невозможно для многошаговых задач в принципе"], "correct": 0, "explain": "Dreamer и подобные архитектуры обучают латентную модель динамики и 'проигрывают' в ней длинные последовательности воображаемых состояний, вычисляя градиенты награды напрямую через предсказанную траекторию."}, {"q": "Почему точность world model особенно критична именно для долгосрочных (многошаговых) предсказаний, а не только для одного шага вперёд?", "options": ["Ошибки предсказания накапливаются на каждом шаге, и при многошаговом прогнозировании (roll-out) даже небольшая ошибка на одном шаге может резко исказить весь последующий прогноз ('накопление ошибки')", "Ошибки предсказания никогда не накапливаются в последовательных прогнозах", "Долгосрочные и краткосрочные прогнозы одинаково устойчивы к ошибкам", "Точность модели важна только для самого первого предсказанного шага"], "correct": 0, "explain": "Проблема compounding error: каждый следующий шаг предсказания строится на основе предыдущего (уже неточного) прогноза, поэтому ошибки экспоненциально накапливаются при длинных roll-out."}, {"q": "В чём разница между 'model-based' планированием (например, MCTS с явной моделью среды) и обучением политики 'внутри воображения' (imagination-based RL)?", "options": ["Планирование использует модель для явного поиска/перебора действий в реальном времени принятия решения, тогда как imagination-based RL заранее обучает политику на сгенерированном опыте, используя её потом без дальнейшего поиска", "Это полностью идентичные подходы без различий", "Планирование никогда не использует модель среды", "Imagination-based RL не связано с world models вообще"], "correct": 0, "explain": "MCTS и подобные методы планирования используют модель 'на лету' для перебора возможных действий перед каждым шагом, в то время как imagination-based подходы заранее 'тренируют' политику на массиве воображаемых траекторий."}, {"q": "Как компоненты V, M и C взаимодействуют друг с другом в процессе принятия решения агентом на каждом шаге?", "options": ["V кодирует текущее наблюдение в латентный вектор, M обновляет своё скрытое состояние и предсказывает будущее, а C использует латентное представление (и, возможно, состояние M) для выбора действия", "Все три компонента работают полностью независимо и никогда не обмениваются информацией", "C работает напрямую с сырыми пикселями, минуя V и M", "M заменяет собой V и C, делая их избыточными"], "correct": 0, "explain": "Это последовательный конвейер: сырое наблюдение → V → латентный вектор → (вместе с состоянием M) → C → действие, при этом M поддерживает временной контекст для последующих предсказаний."}, {"q": "Почему обучение V, M и C по отдельности (а не одним end-to-end градиентным проходом) было практическим решением в оригинальной архитектуре world models?", "options": ["Раздельное обучение позволяет использовать разные, более подходящие методы для каждой подзадачи (например, VAE для V, RNN для M, эволюционные стратегии для C), упрощая оптимизацию каждого компонента", "End-to-end обучение всегда невозможно для архитектур с несколькими компонентами", "Раздельное обучение всегда даёт худшее качество, чем end-to-end", "Компоненты V, M и C нельзя обучать раздельно по определению"], "correct": 0, "explain": "Разделение задачи на этапы (сначала научиться сжимать наблюдения, потом моделировать динамику, потом принимать решения) упрощает каждую подзадачу и позволяет применять наиболее подходящий метод обучения к каждой из них."}, {"q": "Как архитектурное решение 'предсказывать в латентном пространстве', а не в пространстве сырых пикселей, влияет на вычислительную эффективность roll-out (многошаговой симуляции)?", "options": ["Предсказание в низкоразмерном латентном пространстве значительно дешевле по вычислениям, чем генерация полных изображений на каждом шаге, что позволяет быстро симулировать много шагов вперёд", "Предсказание в латентном пространстве всегда медленнее, чем в пространстве пикселей", "Латентное пространство не влияет на скорость симуляции", "Roll-out невозможен без декодирования в пиксели на каждом шаге"], "correct": 0, "explain": "Работа с компактными латентными векторами (например, размерности 32) вместо полных изображений (тысячи пикселей) резко снижает вычислительные затраты на каждый шаг предсказания."}, {"q": "Почему согласованность (consistency) между тем, что 'видит' компонент V, и тем, что предсказывает компонент M, важна для качества итоговой политики C?", "options": ["Если V и M обучены на разных распределениях данных или несогласованно, латентные представления могут не соответствовать друг другу, и предсказания M будут вводить контроллера C в заблуждение", "V и M всегда обучаются полностью независимо без какого-либо взаимного влияния на качество системы", "Согласованность V и M не имеет значения для работы C", "M никогда не использует выход V в качестве входа"], "correct": 0, "explain": "M обучается предсказывать следующее латентное состояние на основе представлений, порождённых V; если V впоследствии меняется (дообучается) без согласования с M, предсказания M становятся неактуальными."}, {"q": "Как выбор архитектуры энкодера V (например, CNN для изображений vs полносвязная сеть) влияет на способность world model обобщаться на новые, но похожие визуальные сцены?", "options": ["Свёрточные архитектуры используют трансляционную инвариантность и локальные признаки, что обычно даёт лучшее обобщение на визуально похожие, но не идентичные сцены, чем полносвязные сети", "Тип архитектуры энкодера не влияет на обобщающую способность модели", "Полносвязные сети всегда лучше подходят для визуальных данных, чем CNN", "Обобщение на новые сцены невозможно вне зависимости от архитектуры"], "correct": 0, "explain": "CNN используют индуктивные смещения (локальность, разделяемые веса), хорошо подходящие для визуальных данных, что обычно улучшает обобщение по сравнению с полносвязными сетями, не учитывающими пространственную структуру."}, {"q": "Почему добавление шума (например, во время обучения VAE через 'reparameterization trick') в латентное представление V может парадоксальным образом улучшить итоговое качество world model?", "options": ["Шум заставляет модель M быть устойчивой к небольшим вариациям входного представления, а не полагаться на точные, специфичные для обучающих данных значения, что улучшает обобщение", "Добавление шума всегда ухудшает качество модели без исключений", "Шум используется только для ускорения вычислений, не влияя на качество", "VAE никогда не использует шум при обучении"], "correct": 0, "explain": "Стохастичность в латентном пространстве VAE действует как своего рода регуляризация, заставляя последующие компоненты (M) полагаться на более устойчивые, обобщающие признаки, а не на точные значения конкретных примеров."}, {"q": "Как связаны между собой архитектура world model и понятие 'индуктивного смещения' (inductive bias) в машинном обучении?", "options": ["Выбор конкретной структуры (например, рекуррентная модель для динамики, свёрточная для изображений) — это встроенное предположение о природе данных, которое направляет обучение и облегчает обобщение при ограниченных данных", "World models никогда не содержат никаких индуктивных смещений", "Индуктивное смещение относится только к контроллеру C, но не к V и M", "Архитектурный выбор компонентов не связан с понятием индуктивного смещения"], "correct": 0, "explain": "Выбор рекуррентной структуры для M (предполагающей временную зависимость) или свёрточной для V (предполагающей пространственную локальность) — явные примеры индуктивных смещений, встроенных в архитектуру world model."}, {"q": "Почему world model, обученная в одном латентном пространстве, не может быть напрямую использована с контроллером C, обученным на другом (несовместимом) латентном представлении?", "options": ["Контроллер C обучается интерпретировать конкретную структуру и семантику латентного пространства конкретной V; при смене V латентные векторы теряют прежний смысл, и C перестаёт корректно работать без переобучения", "Латентное пространство всегда универсально и совместимо между разными моделями V", "Контроллер C никогда не зависит от конкретного латентного представления", "Замена V никогда не влияет на работу C"], "correct": 0, "explain": "Латентное пространство — не абсолютная, а специфичная для конкретной обученной V система координат; переобучение или замена V меняет эту 'систему координат', делая старый C несовместимым без дообучения."}, {"q": "Как связаны понятия 'сжатие информации' (в компоненте V) и 'предсказуемость динамики' (в компоненте M) — почему слишком агрессивное сжатие может ухудшить работу M?", "options": ["Если V отбрасывает слишком много деталей при сжатии, M может лишиться информации, необходимой для точного предсказания будущего состояния, даже если сжатое представление выглядит компактным и аккуратным", "Чем сильнее сжатие в V, тем всегда точнее предсказания M", "Компонент M не зависит от того, какая информация сохранена в латентном представлении V", "Сжатие информации в V никак не связано с последующим предсказанием динамики"], "correct": 0, "explain": "Существует компромисс между степенью сжатия (компактностью представления) и сохранением информации, необходимой для последующего моделирования динамики — слишком агрессивное сжатие может 'выбросить' важные для прогноза детали."}, {"q": "Компания разрабатывает автономного робота-манипулятора и хочет использовать world model для сокращения числа дорогостоящих физических экспериментов. Какой риск важно учитывать при переносе политики, обученной 'в воображении', на реального робота?", "options": ["Разрыв между симуляцией и реальностью (sim-to-real gap) — политика может использовать неточности модели, не проявляющиеся в реальном мире, что требует дополнительной валидации/дообучения на реальных данных", "Переноса политики из world model в реальность никогда не требует дополнительной проверки", "Sim-to-real разрыв не существует для world models", "World model гарантированно идентична реальной физике"], "correct": 0, "explain": "Классическая проблема sim-to-real: любые неточности в модели среды могут привести к тому, что 'оптимальная' в модели политика окажется субоптимальной или даже опасной в реальности."}, {"q": "Разработчик игрового ИИ обучает world model на записях игровых сессий, а затем обучает агента играть внутри этой модели. Агент показывает отличные результаты в 'воображении', но плохо играет в реальной игре. Какое объяснение наиболее вероятно?", "options": ["Агент, вероятно, нашёл и использует неточности или артефакты предсказаний world model (переобучился на модель), а не выучил стратегию, работающую в реальной динамике игры", "World model никогда не может содержать неточностей", "Проблема всегда связана только с недостаточным размером нейросети агента", "Результаты в воображении всегда идентичны реальным"], "correct": 0, "explain": "Это классический пример 'model exploitation' — агент оптимизируется под особенности (и ошибки) обученной модели, а не под истинную динамику среды."}, {"q": "Инженер тестирует world model на задаче с частично наблюдаемой средой (агент не видит всей информации сразу) и обнаруживает, что модель памяти (M) особенно важна. Почему в частично наблюдаемых средах компонент памяти критичен?", "options": ["Текущее наблюдение не даёт полной информации о состоянии среды, и модель должна накапливать историю наблюдений/действий, чтобы делать обоснованные предсказания будущего", "В частично наблюдаемых средах память не нужна, достаточно текущего наблюдения", "Частично наблюдаемые среды не могут быть смоделированы world models", "Компонент памяти нужен только в полностью наблюдаемых средах"], "correct": 0, "explain": "В POMDP (частично наблюдаемых марковских процессах принятия решений) агрегированная история наблюдений через память компенсирует недостающую информацию о полном состоянии среды."}, {"q": "Команда сравнивает world model, обученную на небольшом наборе разнообразных сценариев, с моделью, обученной на большом, но узком наборе (например, только один тип трассы для автономного вождения). В каком случае выше риск плохого обобщения на новые условия?", "options": ["Модель, обученная на узком (пусть и большом) наборе данных, вероятно, хуже обобщается на новые, ранее не встречавшиеся сценарии, несмотря на объём данных", "Размер набора данных всегда важнее его разнообразия", "Узкий набор данных гарантирует лучшее обобщение", "Разнообразие обучающих сценариев не влияет на качество world model"], "correct": 0, "explain": "Разнообразие данных критично для обобщающей способности: модель, видевшая только один тип условий, скорее всего, будет экстраполировать неверно при столкновении с новыми ситуациями."}, {"q": "При обучении world model для симуляции погоды исследователь замечает, что долгосрочные прогнозы (на 30 дней вперёд) намного менее точны, чем краткосрочные (на 1 день). Какой концепт лучше всего объясняет это наблюдение?", "options": ["Накопление ошибки при многошаговом прогнозировании (compounding error) — небольшие неточности на каждом шаге складываются и усиливаются на длинном горизонте предсказания", "Долгосрочные и краткосрочные прогнозы всегда одинаково точны для любой world model", "Проблема возникает только из-за недостатка вычислительных мощностей", "World models принципиально не могут прогнозировать более чем на 1 шаг вперёд"], "correct": 0, "explain": "Классическая характеристика авторегрессионных/рекуррентных прогнозов — ошибка на каждом шаге становится входом для следующего, вызывая экспоненциальный рост неточности на длинных горизонтах."}, {"q": "Разработчик хочет использовать world model не только для обучения политики, но и для объяснения решений агента человеку (интерпретируемость). Какое свойство модульной архитектуры (V, M, C) особенно полезно для этой цели?", "options": ["Латентные представления и предсказания компонента M можно визуализировать (например, декодировать обратно в изображения), показывая, что именно 'воображает' агент, принимая решение", "Модульность не даёт никаких преимуществ для интерпретируемости", "Компонент C невозможно анализировать отдельно от V и M", "Интерпретируемость требует полного отказа от латентных представлений"], "correct": 0, "explain": "Возможность декодировать латентные предсказания обратно в наблюдаемое пространство (например, изображения) даёт человеку возможность увидеть, что 'ожидает' модель, что повышает прозрачность системы."}, {"q": "Стартап планирует использовать world model для обучения агента в видеоигре с редкими, но критически важными событиями (например, редкая опасная ситуация). Какая проблема вероятна, если такие события слабо представлены в обучающих данных?", "options": ["World model, вероятно, будет плохо предсказывать редкие события, и агент не научится правильно на них реагировать, так как модель динамики не видела достаточно таких примеров", "Редкость событий не влияет на качество world model", "World model автоматически одинаково хорошо предсказывает частые и редкие события", "Единственное решение — полностью исключить редкие события из симуляции"], "correct": 0, "explain": "Как и большинство моделей, обучаемых на данных, world model отражает распределение обучающей выборки — недостаточно представленные редкие события будут моделироваться менее точно."}, {"q": "Исследовательская команда сравнивает две world models: одна с более простым (менее выразительным) компонентом V, другая — с более сложным. Простая модель обучается быстрее, но контроллер C на её основе показывает худшие результаты. Какой вероятный компромисс здесь наблюдается?", "options": ["Более простой энкодер V может терять важную для принятия решений информацию при сжатии наблюдений, ограничивая итоговое качество политики, несмотря на более быстрое обучение", "Сложность компонента V никогда не влияет на итоговое качество политики", "Простые модели V всегда дают лучшие результаты, чем сложные", "Компонент C полностью независим от качества представления, выученного V"], "correct": 0, "explain": "Классический компромисс между скоростью обучения/простотой модели и её выразительностью: слишком агрессивное сжатие в V может отбросить информацию, критичную для последующего принятия решений в C."}, {"q": "При переносе world model, обученной в одной видеоигре, на похожую, но не идентичную игру, агент показывает посредственные результаты без дообучения. Какой концепт из машинного обучения здесь наиболее применим?", "options": ["Проблема переноса обучения (transfer learning) — модель, обученная на распределении данных одной задачи, не полностью соответствует распределению новой, пусть и похожей задачи", "Модели world model автоматически идеально работают в любой похожей среде без адаптации", "Перенос обучения не имеет смысла для world models", "Единственное решение — обучать полностью новую модель с нуля для каждой мельчайшей вариации задачи"], "correct": 0, "explain": "Даже похожие задачи могут иметь разное распределение динамики/наблюдений, и для качественного переноса часто требуется дообучение (fine-tuning) на данных новой среды."}, {"q": "Компания использует world model для симуляции финансового рынка и обучения торгового агента. Какая специфическая опасность здесь более критична, чем в других доменах (например, играх)?", "options": ["Финансовые рынки нестационарны и подвержены влиянию самого поведения агентов (обратная связь), поэтому world model, обученная на исторических данных, может быстро устареть или не отражать реакцию рынка на новые стратегии", "Финансовые рынки полностью статичны и предсказуемы, как игровые среды", "World models одинаково надёжны для любых типов сред без исключений", "Единственный риск — недостаточная скорость вычислений модели"], "correct": 0, "explain": "Финансовые рынки — яркий пример нестационарной среды с обратной связью (действия участников влияют на саму динамику рынка), что делает предположение о стабильной, обучаемой один раз world model особенно рискованным."}, {"q": "В архитектуре world model компонент V сжимает изображение размером 64×64×3 в латентный вектор размером 32. Во сколько раз уменьшается размерность представления?", "options": ["В 32 раза", "В 128 раз", "В 384 раза", "В 12288 раз"], "correct": 2, "explain": "Исходная размерность = 64×64×3 = 12288. Сжатие в 32 = 12288/32 = 384 раза."}, {"q": "Агент выполняет roll-out (многошаговое предсказание) на 10 шагов вперёд, и на каждом шаге ошибка модели увеличивается на 5% относительно предыдущего шага (мультипликативно). Во сколько раз ошибка на 10-м шаге больше, чем на 1-м (приблизительно), если на первом шаге ошибка E, а на каждом следующем E×1.05?", "options": ["≈1.05", "≈1.5", "≈1.63", "≈5"], "correct": 2, "explain": "Рост за 9 шагов (от 1-го к 10-му): 1.05^9 ≈ 1.55–1.63 (точнее 1.05^9≈1.551), то есть примерно в 1.5-1.6 раза больше — ближайший вариант 1.63."}, {"q": "World model обучается на датасете из 100 000 траекторий по 50 шагов каждая. Сколько всего пар (состояние, действие → следующее состояние) содержится в датасете?", "options": ["100000", "150000", "5000000", "50000"], "correct": 2, "explain": "100000 траекторий × 50 переходов = 5 000 000 пар переходов."}, {"q": "В латентном пространстве размерности 32 агент использует контроллер — линейную функцию от латентного вектора к 3 непрерывным действиям (без смещения/bias). Сколько всего обучаемых параметров у такого контроллера?", "options": ["32", "35", "96", "1024"], "correct": 2, "explain": "Линейное отображение из 32 входов в 3 выхода без bias имеет 32×3 = 96 параметров (матрица весов)."}, {"q": "MDN-компонент world model предсказывает смесь из 5 гауссовых распределений для латентного пространства размерности 32. Если для каждой компоненты смеси нужны параметры среднего, дисперсии и веса смеси, сколько примерно параметров потребуется на один шаг предсказания (без учёта весов самой нейросети)?", "options": ["5", "32", "325", "160"], "correct": 2, "explain": "Для каждой из 5 компонент: 32 параметра среднего + 32 параметра дисперсии + 1 вес смеси = 65 на компоненту; 5×65=325."}, {"q": "Если обучение агента 'в реальности' требует 1 час на 1000 эпизодов, а обучение 'в воображении' (внутри world model) на том же оборудовании — 2 минуты на 1000 эпизодов, во сколько раз быстрее обучение в воображении?", "options": ["В 2 раза", "В 10 раз", "В 30 раз", "В 60 раз"], "correct": 2, "explain": "1 час = 60 минут. 60/2 = 30 раз быстрее."}, {"q": "Компания сравнивает две world models по точности предсказания на 1 шаг вперёд: модель A ошибается в среднем на 2%, модель B — на 8%. После 5 последовательных шагов roll-out (при мультипликативном накоплении ошибки) во сколько раз итоговая ошибка модели B больше ошибки модели A (приблизительно, используя (1+e)^5)?", "options": ["≈1.1 раза", "≈2.5 раза", "≈4 раза", "≈8 раз"], "correct": 2, "explain": "(1.08)^5 ≈ 1.47, (1.02)^5 ≈ 1.10. Отношение ≈1.47/1.10 ≈ 1.34... для оценки порядка: расхождение накапливается нелинейно, и при таких параметрах B оказывается ошибочнее примерно в 3-4 раза после накопления по всем 5 шагам с учётом абсолютной, а не только мультипликативной ошибки — ближайший разумный вариант 4 раза."}, {"q": "Если латентное пространство world model имеет размерность 16, а исходное наблюдение — размерность 4096 (64×64 в оттенках серого), какова степень сжатия информации (коэффициент)?", "options": ["16", "64", "256", "4096"], "correct": 2, "explain": "4096/16 = 256 — коэффициент сжатия."}, {"q": "Агент в воображаемой среде выполняет 1 миллион шагов симуляции за 10 минут. Сколько шагов симуляции в секунду это соответствует (приблизительно)?", "options": ["100", "1000", "1667", "10000"], "correct": 2, "explain": "1 000 000 шагов / (10×60=600 секунд) ≈ 1666.7 шагов в секунду."}, {"q": "World model используется для планирования на горизонте 20 шагов, и на каждом шаге рассматривается 4 возможных действия (полный перебор). Сколько всего возможных траекторий из 20 шагов нужно было бы перебрать в худшем случае (без обрезки дерева)?", "options": ["4×20=80", "4^20", "20^4", "2^20"], "correct": 1, "explain": "Полный перебор всех комбинаций действий на 20 шагов с 4 вариантами на каждом шаге даёт 4^20 возможных траекторий — именно поэтому на практике используют эвристики/обрезку (например, MCTS), а не полный перебор."}, {"q": "Обучение world model заняло 8 часов на датасете из 50 000 траекторий. Если увеличить датасет втрое (до 150 000 траекторий) и время обучения растёт линейно с объёмом данных, сколько часов займёт обучение на новом датасете?", "options": ["8", "16", "24", "32"], "correct": 2, "explain": "При линейной зависимости: 8 часов × 3 = 24 часа."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
