<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Теория World Models</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

<div class="wrap">
  <header>
    <div class="topbar">

      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/world_models.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">

    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script>
(function () {
  const TEST_ID = "world_models";
  const QUESTIONS = [{"q": "Что такое 'world model' (модель мира) в контексте машинного обучения и обучения с подкреплением?", "options": ["Внутреннее представление агента о том, как устроена и как меняется окружающая среда", "Алгоритм сжатия видео", "Набор правил для интернет-браузера", "База данных географических карт мира"], "correct": 0, "explain": "World model — обучаемое представление динамики среды, позволяющее агенту предсказывать последствия своих действий без прямого взаимодействия с реальной средой.", "usage": {"code": false, "without": "Инженер строит агента, который на каждый вход выдаёт действие, но не имеет никакого понятия о том, к чему это действие приведёт — он реагирует вслепую, как рефлекс.", "with": "Агент держит внутреннюю модель мира: он оценивает, как среда изменится после действия, и выбирает шаг, предвидя последствия.", "benefit": "Решения с предвидением последствий, а не вслепую."}}, {"q": "Из каких основных компонентов обычно состоит классическая архитектура world model (например, модель Ha & Schmidhuber, 2018)?", "options": ["Vision-модель (V), модель памяти/динамики (M) и контроллер (C)", "База правил и парсер естественного языка", "Только одна большая полносвязная сеть", "Только контроллер без модели среды"], "correct": 0, "explain": "Классическая архитектура включает V (кодирует наблюдения в компактное представление), M (предсказывает будущее состояние) и C (принимает решения на основе представления).", "usage": {"code": false, "without": "Команда сваливает восприятие, память и управление в одну огромную сеть — когда что-то ломается, непонятно, где именно, и всё приходится переучивать целиком.", "with": "Систему делят на V (сжатие наблюдений), M (динамика) и C (решения) — каждый блок отвечает за свою задачу.", "benefit": "Модульность: чинишь и улучшаешь части по отдельности."}}, {"q": "Зачем нужен компонент 'V' (Vision), кодирующий наблюдения в латентное пространство?", "options": ["Чтобы хранить весь датасет без изменений", "Чтобы сжать высокоразмерные наблюдения (например, изображения) в компактный вектор признаков, удобный для дальнейшего моделирования", "Чтобы напрямую управлять агентом без модели динамики", "Чтобы генерировать текстовые описания сцены"], "correct": 1, "explain": "V-компонент (часто автоэнкодер или VAE) сжимает изображение в низкоразмерный латентный вектор z, убирая избыточность и облегчая работу модели памяти/динамики.", "usage": {"code": false, "without": "Разработчик кормит модель динамики сырыми кадрами 64x64x3 — обучение тонет в избыточных пикселях и идёт мучительно медленно.", "with": "Компонент V сжимает кадр в компактный вектор признаков, и дальше вся работа идёт с ним.", "benefit": "Дешёвая и быстрая работа вместо тонн пикселей."}}, {"q": "Какова роль компонента 'M' (Memory/динамическая модель) в world model?", "options": ["Хранить весь текстовый архив диалогов", "Выполнять финальное действие агента напрямую", "Предсказывать следующее латентное состояние на основе текущего состояния и действия агента", "Сжимать изображения в векторы"], "correct": 2, "explain": "M-модель (часто рекуррентная сеть, например, RNN/LSTM с MDN) прогнозирует, как изменится латентное состояние среды при выполнении действия — это и есть 'модель мира'.", "usage": {"code": false, "without": "Агент хочет понять 'что будет, если нажать газ', но у него нет ничего, что связывало бы текущее состояние и действие с будущим.", "with": "Компонент M по текущему латентному состоянию и действию предсказывает следующее состояние — это ядро 'модели мира'.", "benefit": "Можно прогнозировать будущее до реального шага."}}, {"q": "Что означает термин 'обучение внутри воображения' (learning inside a dream/imagination), связанный с world models?", "options": ["Полный отказ от использования нейросетей", "Обучение только на размеченных человеком данных", "Обучение политики агента на основе симулированного опыта, сгенерированного самой world model, а не реальной среды", "Обучение агента полностью во сне человека-разработчика"], "correct": 2, "explain": "Если world model достаточно точна, агент может обучаться, взаимодействуя с её собственными предсказаниями ('воображением'), что резко снижает потребность в дорогих реальных взаимодействиях со средой.", "usage": {"code": false, "without": "Чтобы обучить робота, инженер гоняет его тысячи раз по-настоящему — дорого, медленно, изнашивается железо.", "with": "Агент тренируется 'в воображении': проигрывает опыт внутри обученной world model вместо реальной среды.", "benefit": "Тысячи репетиций почти бесплатно, без реального железа."}}, {"q": "Чем world model отличается от классической model-free стратегии обучения с подкреплением?", "options": ["World model явно обучает предсказывать динамику среды, тогда как model-free методы напрямую обучают политику или ценность действий без явной модели среды", "World model никогда не используется в обучении с подкреплением", "Это два названия одного и того же подхода", "Model-free методы всегда требуют world model"], "correct": 0, "explain": "Model-based подходы (включая world models) явно моделируют переходы среды P(s'|s,a), тогда как model-free подходы (например, Q-learning) обходятся без явной модели, обучаясь напрямую по опыту.", "usage": {"code": false, "without": "Разработчик берёт model-free метод и учит политику напрямую по наградам — данных нужно огромное количество, а 'почему' среда так себя ведёт остаётся чёрным ящиком.", "with": "Model-based подход явно моделирует переходы среды P(s'|s,a), и агент опирается на это понимание динамики.", "benefit": "Меньше проб и явное понимание динамики."}}, {"q": "Что такое латентное пространство (latent space) в контексте world models?", "options": ["Список всех возможных действий агента", "Набор гиперпараметров модели", "Сжатое, абстрактное векторное представление наблюдений, в котором удобнее моделировать динамику", "Пространство физических координат объекта в среде"], "correct": 2, "explain": "Латентное пространство — компактное представление сложных наблюдений (например, изображений), извлечённое энкодером, которое сохраняет существенную информацию для прогнозирования.", "usage": {"code": false, "without": "Аналитик пытается моделировать динамику прямо на пикселях изображения — размерность огромна, всё шумит и не сходится.", "with": "Наблюдения сжимаются в латентное пространство — абстрактный компактный вектор, где динамику моделировать удобно.", "benefit": "Моделирование в компактном, осмысленном пространстве."}}, {"q": "Какую роль играет контроллер 'C' в классической архитектуре world model?", "options": ["Он преобразует текст в латентный вектор", "Он генерирует изображения среды", "Он выбирает действие агента на основе текущего латентного состояния (и, возможно, состояния памяти M)", "Он хранит историю всех прошлых наблюдений без сжатия"], "correct": 2, "explain": "Контроллер — обычно простая (часто линейная) политика, отображающая сжатое представление состояния в действие, что позволяет обучать его отдельно и быстро.", "usage": {"code": false, "without": "Система построила отличное представление состояния, но никто не решает, что с ним делать — агент стоит и не действует.", "with": "Контроллер C берёт латентное состояние (и память M) и превращает его в конкретное действие.", "benefit": "Замыкание петли: от представления к действию."}}, {"q": "Почему компонент 'C' в оригинальной архитектуре world models часто делают намеренно простым (например, линейным)?", "options": ["Основная сложность моделирования среды уже вынесена в V и M, поэтому политике не нужно быть сложной — это ускоряет и упрощает обучение самого контроллера", "Простота контроллера не связана с распределением сложности между компонентами", "Простой контроллер всегда даёт лучшее качество решений", "Сложные контроллеры технически невозможно обучить"], "correct": 0, "explain": "Так как V сжимает наблюдения, а M моделирует динамику, контроллеру остаётся относительно простая задача — принять решение на основе уже подготовленного представления, что позволяет использовать даже эволюционные стратегии для его обучения.", "usage": {"code": false, "without": "Инженер пытается впихнуть всю сложность задачи в гигантский контроллер и месяцами не может его обучить.", "with": "Так как V сжал наблюдения, а M смоделировал динамику, C делают простым (даже линейным) — его легко обучить хоть эволюционной стратегией.", "benefit": "Простой контроллер обучается быстро и надёжно."}}, {"q": "Что общего между world models и рекуррентными нейросетями (RNN), используемыми для предсказания последовательностей?", "options": ["RNN никогда не используются в world models", "World models полностью заменяют RNN другим типом архитектуры", "Между ними нет никакой связи", "World model для динамики среды часто реализуется именно как рекуррентная сеть, предсказывающая следующее состояние на основе истории и текущего действия"], "correct": 3, "explain": "Поскольку среда обычно имеет временную (последовательную) структуру, RNN (или их варианты вроде LSTM) естественно подходят для моделирования компонента M.", "usage": {"code": false, "without": "Разработчик моделирует динамику среды сетью без памяти — каждый прогноз игнорирует предысторию, и временные зависимости теряются.", "with": "Компонент M реализуют рекуррентной сетью (RNN/LSTM), которая помнит историю и предсказывает следующий шаг с учётом контекста.", "benefit": "Учёт временного контекста в прогнозе."}}, {"q": "Почему обучение агента в 'воображении' (внутри world model) потенциально гораздо эффективнее по числу требуемых взаимодействий со средой (sample efficiency)?", "options": ["Взаимодействие с реальной средой никогда не бывает дорогим", "Агент может генерировать неограниченное количество симулированного опыта внутри уже обученной модели, не тратя дорогостоящее реальное время/ресурсы на взаимодействие с настоящей средой", "World model не позволяет генерировать новый опыт", "Обучение в воображении всегда медленнее реального взаимодействия"], "correct": 1, "explain": "После того как world model достаточно хорошо обучена, симуляция внутри неё практически бесплатна по сравнению с реальными действиями (особенно в робототехнике), что радикально повышает эффективность использования данных.", "usage": {"code": false, "without": "Стартап обучает дрон только в реальных полётах — каждый эпизод стоит времени, батареи и риска аварии, данных катастрофически мало.", "with": "После обучения world model агент генерирует неограниченный симулированный опыт внутри неё почти бесплатно.", "benefit": "Резкий рост sample efficiency."}}, {"q": "В чём заключается ключевой риск использования 'воображаемого' опыта для обучения политики, если world model недостаточно точна?", "options": ["Неточности модели среды не влияют на качество итоговой политики", "Риска не существует, если модель достаточно большая по размеру", "Политика может научиться эксплуатировать неточности/артефакты модели среды, находя 'лазейки', которые не соответствуют реальному поведению среды", "Неточная world model всегда улучшает финальную политику"], "correct": 2, "explain": "Классическая проблема model-based RL — 'model exploitation': агент находит стратегии, максимизирующие награду в неточной модели, но не работающие в реальной среде.", "usage": {"code": false, "without": "Агент блестяще играет 'в воображении', его выкатывают в реальную игру — и он проваливается: он выучил лазейки модели, а не игру.", "with": "Помня про риск model exploitation, команда валидирует политику на реальной среде и не доверяет 'идеальным' результатам в модели.", "benefit": "Не путать эксплуатацию модели с реальным навыком."}}, {"q": "Почему вариационные автоэнкодеры (VAE) часто используются как компонент V в world models, а не обычные автоэнкодеры?", "options": ["VAE обучают гладкое, структурированное вероятностное латентное пространство, что облегчает генерацию правдоподобных новых состояний и интерполяцию, в отличие от произвольного латентного пространства обычного автоэнкодера", "VAE всегда работают хуже обычных автоэнкодеров в любых задачах", "Обычные автоэнкодеры никогда не используются в world models", "VAE не имеет отношения к сжатию изображений"], "correct": 0, "explain": "VAE регуляризует латентное пространство к известному распределению (обычно нормальному), что делает его более пригодным для генерации и предсказания, чем нерегуляризованное пространство обычного автоэнкодера.", "usage": {"code": false, "without": "Инженер использует обычный автоэнкодер: латентное пространство рваное, интерполяция и генерация новых состояний дают бессмыслицу.", "with": "VAE регуляризует латент к нормальному распределению — пространство гладкое, генерация правдоподобных состояний работает.", "benefit": "Гладкий латент, пригодный для генерации."}}, {"q": "Как компонент MDN-RNN (Mixture Density Network + RNN), используемый в некоторых world models, помогает справляться с неопределённостью и мультимодальностью будущего?", "options": ["Вместо предсказания одного конкретного следующего состояния, MDN-RNN предсказывает распределение вероятностей (смесь гауссиан) над возможными следующими состояниями, отражая, что будущее может развиваться по-разному", "MDN-RNN всегда даёт только одно детерминированное предсказание", "Мультимодальность будущего не имеет значения для world models", "MDN-RNN используется исключительно для обработки текста"], "correct": 0, "explain": "Реальные среды часто стохастичны или частично наблюдаемы, поэтому предсказание распределения (а не единственного значения) позволяет модели явно выразить неопределённость и множественность возможных исходов.", "usage": {"code": false, "without": "Модель предсказывает одно детерминированное будущее, хотя среда стохастична — на развилке она усредняет варианты в размытую кашу.", "with": "MDN-RNN предсказывает распределение (смесь гауссиан) над возможными будущими, честно отражая неопределённость.", "benefit": "Явный учёт множественности исходов."}}, {"q": "Почему world models особенно полезны в средах, где реальное взаимодействие дорого или опасно (например, робототехника, автономное вождение)?", "options": ["В таких средах world models вообще не применимы", "Они позволяют агенту 'репетировать' и обучаться в симуляции, избегая дорогостоящих или потенциально опасных реальных проб и ошибок", "Реальное взаимодействие всегда дешевле симуляции", "World models полностью устраняют необходимость в реальном тестировании перед развёртыванием"], "correct": 1, "explain": "В сферах с высокой ценой ошибки (аварии, поломки оборудования) предпочтительно как можно больше обучения проводить в симуляции (внутри world model), минимизируя риски и издержки реальных проб.", "usage": {"code": false, "without": "Команда автономного авто отлаживает поведение только на реальной дороге — каждая ошибка это риск аварии и порча оборудования.", "with": "Опасные и дорогие сценарии агент 'репетирует' в world model, а на реальную среду выходит подготовленным.", "benefit": "Обучение без реальных аварий и затрат."}}, {"q": "Чем world models концептуально перекликаются с идеей 'предиктивного кодирования' (predictive coding) в нейронауке?", "options": ["Предиктивное кодирование не связано с идеей моделирования среды", "Мозг, согласно этой теории, не строит никаких внутренних моделей", "Обе концепции предполагают, что система (мозг или агент) строит внутреннюю модель, постоянно предсказывающую будущие сенсорные входы, и обучается на основе ошибки предсказания", "World models полностью противоречат теориям нейронауки"], "correct": 2, "explain": "Гипотеза предиктивного кодирования утверждает, что мозг постоянно генерирует прогнозы сенсорного входа и корректирует внутреннюю модель на основе ошибки предсказания — идея, во многом схожая с обучением world models.", "usage": {"code": false, "without": "Разработчик воспринимает мозг как чистый распознаватель, реагирующий на вход, и не видит связи с обучением агента.", "with": "Через призму предиктивного кодирования и мозг, и агент строят внутреннюю модель, предсказывают вход и учатся на ошибке прогноза.", "benefit": "Единый взгляд на мозг и world model."}}, {"q": "Почему разделение world model на явные компоненты (восприятие, память/динамика, управление) может облегчать интерпретируемость системы по сравнению с монолитной end-to-end нейросетью?", "options": ["Разделение на компоненты не влияет на интерпретируемость", "Разделение компонентов всегда снижает итоговое качество системы", "Монолитные end-to-end модели всегда интерпретируемее модульных", "Каждый компонент решает более узкую, понятную задачу (сжатие наблюдений, предсказание динамики, выбор действия), что упрощает анализ, отладку и перенос отдельных частей на новые задачи"], "correct": 3, "explain": "Модульная архитектура позволяет отдельно проверять качество восприятия, точность прогноза динамики и качество принятия решений, что облегчает диагностику проблем по сравнению с 'чёрным ящиком' единой сети.", "usage": {"code": false, "without": "В монолитной end-to-end сети непонятно, почему агент принял решение — отладка сводится к тыканью в чёрный ящик.", "with": "Модульность V/M/C позволяет проверять восприятие, точность динамики и качество решений по отдельности.", "benefit": "Прозрачная диагностика по компонентам."}}, {"q": "Как современные world models (например, в проектах вроде Dreamer) масштабируют идею обучения в воображении на более сложные, многошаговые задачи?", "options": ["Обучение в воображении невозможно для многошаговых задач в принципе", "Dreamer полностью отказывается от идеи латентного пространства", "Они обучают достаточно точную латентную динамическую модель и используют её для генерации длинных траекторий воображаемого опыта, на которых обучается политика методом градиента по ожидаемой награде", "Такие модели работают только для задач с одним шагом взаимодействия"], "correct": 2, "explain": "Dreamer и подобные архитектуры обучают латентную модель динамики и 'проигрывают' в ней длинные последовательности воображаемых состояний, вычисляя градиенты награды напрямую через предсказанную траекторию.", "usage": {"code": false, "without": "Инженер считает, что обучение в воображении годится лишь на один шаг вперёд, и для сложных задач возвращается к дорогому реальному RL.", "with": "Dreamer обучает точную латентную динамику и проигрывает длинные воображаемые траектории, считая градиент награды прямо через них.", "benefit": "Многошаговое обучение в воображении масштабируется."}}, {"q": "Почему точность world model особенно критична именно для долгосрочных (многошаговых) предсказаний, а не только для одного шага вперёд?", "options": ["Ошибки предсказания никогда не накапливаются в последовательных прогнозах", "Ошибки предсказания накапливаются на каждом шаге, и при многошаговом прогнозировании (roll-out) даже небольшая ошибка на одном шаге может резко исказить весь последующий прогноз ('накопление ошибки')", "Долгосрочные и краткосрочные прогнозы одинаково устойчивы к ошибкам", "Точность модели важна только для самого первого предсказанного шага"], "correct": 1, "explain": "Проблема compounding error: каждый следующий шаг предсказания строится на основе предыдущего (уже неточного) прогноза, поэтому ошибки экспоненциально накапливаются при длинных roll-out.", "usage": {"code": true, "without": "s = s0\nfor t in range(30):\n    s = model.step(s)  # ошибку шага считаем незначительной\n# доверяем прогнозу на шаге 30 как шагу 1", "with": "# помним: ошибка входит в следующий вход и накапливается\nerr = e0\nfor t in range(30):\n    s = model.step(s)\n    err *= (1 + rate)   # compounding error\n# горизонту не доверяем слепо", "benefit": "Понимание, почему дальний прогноз ненадёжен."}}, {"q": "В чём разница между 'model-based' планированием (например, MCTS с явной моделью среды) и обучением политики 'внутри воображения' (imagination-based RL)?", "options": ["Это полностью идентичные подходы без различий", "Imagination-based RL не связано с world models вообще", "Планирование использует модель для явного поиска/перебора действий в реальном времени принятия решения, тогда как imagination-based RL заранее обучает политику на сгенерированном опыте, используя её потом без дальнейшего поиска", "Планирование никогда не использует модель среды"], "correct": 2, "explain": "MCTS и подобные методы планирования используют модель 'на лету' для перебора возможных действий перед каждым шагом, в то время как imagination-based подходы заранее 'тренируют' политику на массиве воображаемых траекторий.", "usage": {"code": false, "without": "Разработчик перед каждым шагом гоняет дорогой перебор (MCTS) по модели в реальном времени — принятие решения тормозит.", "with": "Imagination-based RL заранее обучает политику на массиве воображаемых траекторий, и в реальном времени она действует без поиска.", "benefit": "Быстрые решения без поиска на лету."}}, {"q": "Как компоненты V, M и C взаимодействуют друг с другом в процессе принятия решения агентом на каждом шаге?", "options": ["V кодирует текущее наблюдение в латентный вектор, M обновляет своё скрытое состояние и предсказывает будущее, а C использует латентное представление (и, возможно, состояние M) для выбора действия", "C работает напрямую с сырыми пикселями, минуя V и M", "M заменяет собой V и C, делая их избыточными", "Все три компонента работают полностью независимо и никогда не обмениваются информацией"], "correct": 0, "explain": "Это последовательный конвейер: сырое наблюдение → V → латентный вектор → (вместе с состоянием M) → C → действие, при этом M поддерживает временной контекст для последующих предсказаний.", "usage": {"code": false, "without": "Инженер думает, что три компонента работают сами по себе, и не выстраивает поток данных между ними — система рассыпается.", "with": "Наблюдение идёт V -> латент -> (с состоянием M) -> C -> действие; M хранит контекст для следующих шагов.", "benefit": "Согласованный конвейер восприятие-память-действие."}}, {"q": "Почему обучение V, M и C по отдельности (а не одним end-to-end градиентным проходом) было практическим решением в оригинальной архитектуре world models?", "options": ["Раздельное обучение позволяет использовать разные, более подходящие методы для каждой подзадачи (например, VAE для V, RNN для M, эволюционные стратегии для C), упрощая оптимизацию каждого компонента", "Компоненты V, M и C нельзя обучать раздельно по определению", "End-to-end обучение всегда невозможно для архитектур с несколькими компонентами", "Раздельное обучение всегда даёт худшее качество, чем end-to-end"], "correct": 0, "explain": "Разделение задачи на этапы (сначала научиться сжимать наблюдения, потом моделировать динамику, потом принимать решения) упрощает каждую подзадачу и позволяет применять наиболее подходящий метод обучения к каждой из них.", "usage": {"code": false, "without": "Команда пытается обучить V, M и C одним end-to-end проходом и застревает: градиенты нестабильны, ничего не сходится.", "with": "Каждый компонент учат своим лучшим методом: VAE для V, RNN для M, эволюционные стратегии для C.", "benefit": "Каждой подзадаче — подходящий инструмент."}}, {"q": "Как архитектурное решение 'предсказывать в латентном пространстве', а не в пространстве сырых пикселей, влияет на вычислительную эффективность roll-out (многошаговой симуляции)?", "options": ["Предсказание в низкоразмерном латентном пространстве значительно дешевле по вычислениям, чем генерация полных изображений на каждом шаге, что позволяет быстро симулировать много шагов вперёд", "Roll-out невозможен без декодирования в пиксели на каждом шаге", "Предсказание в латентном пространстве всегда медленнее, чем в пространстве пикселей", "Латентное пространство не влияет на скорость симуляции"], "correct": 0, "explain": "Работа с компактными латентными векторами (например, размерности 32) вместо полных изображений (тысячи пикселей) резко снижает вычислительные затраты на каждый шаг предсказания.", "usage": {"code": false, "without": "Для симуляции каждого шага модель декодирует полную картинку в пикселях — roll-out на много шагов становится неподъёмным.", "with": "Прогноз идёт прямо в латентном пространстве (вектор ~32), без генерации кадров на каждом шаге.", "benefit": "Быстрая симуляция многих шагов вперёд."}}, {"q": "Почему согласованность (consistency) между тем, что 'видит' компонент V, и тем, что предсказывает компонент M, важна для качества итоговой политики C?", "options": ["Согласованность V и M не имеет значения для работы C", "V и M всегда обучаются полностью независимо без какого-либо взаимного влияния на качество системы", "Если V и M обучены на разных распределениях данных или несогласованно, латентные представления могут не соответствовать друг другу, и предсказания M будут вводить контроллера C в заблуждение", "M никогда не использует выход V в качестве входа"], "correct": 2, "explain": "M обучается предсказывать следующее латентное состояние на основе представлений, порождённых V; если V впоследствии меняется (дообучается) без согласования с M, предсказания M становятся неактуальными.", "usage": {"code": false, "without": "V дообучают отдельно от M, латентные координаты 'плывут', и M начинает предсказывать по представлениям, которых уже нет.", "with": "Согласованность V и M поддерживают: M учится на тех же представлениях, что даёт V, и они не расходятся.", "benefit": "Прогнозы M не вводят контроллер в заблуждение."}}, {"q": "Как выбор архитектуры энкодера V (например, CNN для изображений vs полносвязная сеть) влияет на способность world model обобщаться на новые, но похожие визуальные сцены?", "options": ["Свёрточные архитектуры используют трансляционную инвариантность и локальные признаки, что обычно даёт лучшее обобщение на визуально похожие, но не идентичные сцены, чем полносвязные сети", "Обобщение на новые сцены невозможно вне зависимости от архитектуры", "Полносвязные сети всегда лучше подходят для визуальных данных, чем CNN", "Тип архитектуры энкодера не влияет на обобщающую способность модели"], "correct": 0, "explain": "CNN используют индуктивные смещения (локальность, разделяемые веса), хорошо подходящие для визуальных данных, что обычно улучшает обобщение по сравнению с полносвязными сетями, не учитывающими пространственную структуру.", "usage": {"code": false, "without": "Для картинок берут полносвязный энкодер — он не видит пространственной структуры и разваливается на чуть смещённой сцене.", "with": "CNN использует локальность и разделяемые веса, поэтому обобщается на визуально похожие, но не идентичные сцены.", "benefit": "Обобщение на новые похожие сцены."}}, {"q": "Почему добавление шума (например, во время обучения VAE через 'reparameterization trick') в латентное представление V может парадоксальным образом улучшить итоговое качество world model?", "options": ["Добавление шума всегда ухудшает качество модели без исключений", "Шум используется только для ускорения вычислений, не влияя на качество", "Шум заставляет модель M быть устойчивой к небольшим вариациям входного представления, а не полагаться на точные, специфичные для обучающих данных значения, что улучшает обобщение", "VAE никогда не использует шум при обучении"], "correct": 2, "explain": "Стохастичность в латентном пространстве VAE действует как своего рода регуляризация, заставляя последующие компоненты (M) полагаться на более устойчивые, обобщающие признаки, а не на точные значения конкретных примеров.", "usage": {"code": false, "without": "Инженер убирает всякий шум из латента ради 'точности', и M цепляется за конкретные значения обучающих примеров, переобучаясь.", "with": "Reparameterization trick добавляет шум — M вынуждена опираться на устойчивые признаки, а не на точные значения примеров.", "benefit": "Регуляризация улучшает обобщение."}}, {"q": "Как связаны между собой архитектура world model и понятие 'индуктивного смещения' (inductive bias) в машинном обучении?", "options": ["Выбор конкретной структуры (например, рекуррентная модель для динамики, свёрточная для изображений) — это встроенное предположение о природе данных, которое направляет обучение и облегчает обобщение при ограниченных данных", "Архитектурный выбор компонентов не связан с понятием индуктивного смещения", "World models никогда не содержат никаких индуктивных смещений", "Индуктивное смещение относится только к контроллеру C, но не к V и M"], "correct": 0, "explain": "Выбор рекуррентной структуры для M (предполагающей временную зависимость) или свёрточной для V (предполагающей пространственную локальность) — явные примеры индуктивных смещений, встроенных в архитектуру world model.", "usage": {"code": false, "without": "Архитектуру выбирают наугад, игнорируя природу данных, и при малой выборке модель не обобщается.", "with": "Осознанный выбор (RNN для времени, CNN для пространства) — это индуктивное смещение, направляющее обучение.", "benefit": "Обобщение при ограниченных данных."}}, {"q": "Почему world model, обученная в одном латентном пространстве, не может быть напрямую использована с контроллером C, обученным на другом (несовместимом) латентном представлении?", "options": ["Контроллер C никогда не зависит от конкретного латентного представления", "Латентное пространство всегда универсально и совместимо между разными моделями V", "Замена V никогда не влияет на работу C", "Контроллер C обучается интерпретировать конкретную структуру и семантику латентного пространства конкретной V; при смене V латентные векторы теряют прежний смысл, и C перестаёт корректно работать без переобучения"], "correct": 3, "explain": "Латентное пространство — не абсолютная, а специфичная для конкретной обученной V система координат; переобучение или замена V меняет эту 'систему координат', делая старый C несовместимым без дообучения.", "usage": {"code": false, "without": "Инженер переобучил V, но оставил старый контроллер C — тот получает латент в новой 'системе координат' и творит ерунду.", "with": "Понимая, что латент специфичен для конкретной V, C дообучают вместе со сменой V.", "benefit": "Совместимость представления и политики."}}, {"q": "Как связаны понятия 'сжатие информации' (в компоненте V) и 'предсказуемость динамики' (в компоненте M) — почему слишком агрессивное сжатие может ухудшить работу M?", "options": ["Если V отбрасывает слишком много деталей при сжатии, M может лишиться информации, необходимой для точного предсказания будущего состояния, даже если сжатое представление выглядит компактным и аккуратным", "Чем сильнее сжатие в V, тем всегда точнее предсказания M", "Сжатие информации в V никак не связано с последующим предсказанием динамики", "Компонент M не зависит от того, какая информация сохранена в латентном представлении V"], "correct": 0, "explain": "Существует компромисс между степенью сжатия (компактностью представления) и сохранением информации, необходимой для последующего моделирования динамики — слишком агрессивное сжатие может 'выбросить' важные для прогноза детали.", "usage": {"code": false, "without": "Команда сжимает наблюдение максимально агрессивно ради компактности, и M лишается деталей, нужных для прогноза.", "with": "Держат баланс сжатия и информативности: V выкидывает избыточность, но сохраняет существенное для динамики.", "benefit": "Компактность без потери прогнозной информации."}}, {"q": "Компания разрабатывает автономного робота-манипулятора и хочет использовать world model для сокращения числа дорогостоящих физических экспериментов. Какой риск важно учитывать при переносе политики, обученной 'в воображении', на реального робота?", "options": ["Sim-to-real разрыв не существует для world models", "Переноса политики из world model в реальность никогда не требует дополнительной проверки", "World model гарантированно идентична реальной физике", "Разрыв между симуляцией и реальностью (sim-to-real gap) — политика может использовать неточности модели, не проявляющиеся в реальном мире, что требует дополнительной валидации/дообучения на реальных данных"], "correct": 3, "explain": "Классическая проблема sim-to-real: любые неточности в модели среды могут привести к тому, что 'оптимальная' в модели политика окажется субоптимальной или даже опасной в реальности.", "usage": {"code": false, "without": "Робота-манипулятора обучают в world model и сразу переносят на железо, считая модель равной реальной физике.", "with": "Учитывая sim-to-real gap, политику дополнительно валидируют и дообучают на реальных данных.", "benefit": "Безопасный перенос из симуляции в реальность."}}, {"q": "Разработчик игрового ИИ обучает world model на записях игровых сессий, а затем обучает агента играть внутри этой модели. Агент показывает отличные результаты в 'воображении', но плохо играет в реальной игре. Какое объяснение наиболее вероятно?", "options": ["Агент, вероятно, нашёл и использует неточности или артефакты предсказаний world model (переобучился на модель), а не выучил стратегию, работающую в реальной динамике игры", "Результаты в воображении всегда идентичны реальным", "World model никогда не может содержать неточностей", "Проблема всегда связана только с недостаточным размером нейросети агента"], "correct": 0, "explain": "Это классический пример 'model exploitation' — агент оптимизируется под особенности (и ошибки) обученной модели, а не под истинную динамику среды.", "usage": {"code": false, "without": "Игровой агент отлично играет в 'воображении', и разработчик считает это доказательством навыка, выкатывая его как есть.", "with": "Понимая model exploitation, он видит: агент нашёл артефакты модели, и проверяет его на реальной игре.", "benefit": "Отличить реальную стратегию от эксплойта модели."}}, {"q": "Инженер тестирует world model на задаче с частично наблюдаемой средой (агент не видит всей информации сразу) и обнаруживает, что модель памяти (M) особенно важна. Почему в частично наблюдаемых средах компонент памяти критичен?", "options": ["Текущее наблюдение не даёт полной информации о состоянии среды, и модель должна накапливать историю наблюдений/действий, чтобы делать обоснованные предсказания будущего", "В частично наблюдаемых средах память не нужна, достаточно текущего наблюдения", "Компонент памяти нужен только в полностью наблюдаемых средах", "Частично наблюдаемые среды не могут быть смоделированы world models"], "correct": 0, "explain": "В POMDP (частично наблюдаемых марковских процессах принятия решений) агрегированная история наблюдений через память компенсирует недостающую информацию о полном состоянии среды.", "usage": {"code": false, "without": "В частично наблюдаемой среде инженер строит прогноз только по текущему кадру — информации не хватает, решения случайны.", "with": "Компонент памяти M агрегирует историю наблюдений и действий, компенсируя невидимую часть состояния (POMDP).", "benefit": "Обоснованные решения при неполном наблюдении."}}, {"q": "Команда сравнивает world model, обученную на небольшом наборе разнообразных сценариев, с моделью, обученной на большом, но узком наборе (например, только один тип трассы для автономного вождения). В каком случае выше риск плохого обобщения на новые условия?", "options": ["Размер набора данных всегда важнее его разнообразия", "Узкий набор данных гарантирует лучшее обобщение", "Разнообразие обучающих сценариев не влияет на качество world model", "Модель, обученная на узком (пусть и большом) наборе данных, вероятно, хуже обобщается на новые, ранее не встречавшиеся сценарии, несмотря на объём данных"], "correct": 3, "explain": "Разнообразие данных критично для обобщающей способности: модель, видевшая только один тип условий, скорее всего, будет экстраполировать неверно при столкновении с новыми ситуациями.", "usage": {"code": false, "without": "Для автопилота берут большой, но однотипный датасет (одна трасса) и радуются объёму — на новой дороге модель врёт.", "with": "Ставят на разнообразие сценариев, и модель обобщается на ранее не встречавшиеся условия.", "benefit": "Разнообразие данных важнее голого объёма."}}, {"q": "При обучении world model для симуляции погоды исследователь замечает, что долгосрочные прогнозы (на 30 дней вперёд) намного менее точны, чем краткосрочные (на 1 день). Какой концепт лучше всего объясняет это наблюдение?", "options": ["Долгосрочные и краткосрочные прогнозы всегда одинаково точны для любой world model", "World models принципиально не могут прогнозировать более чем на 1 шаг вперёд", "Накопление ошибки при многошаговом прогнозировании (compounding error) — небольшие неточности на каждом шаге складываются и усиливаются на длинном горизонте предсказания", "Проблема возникает только из-за недостатка вычислительных мощностей"], "correct": 2, "explain": "Классическая характеристика авторегрессионных/рекуррентных прогнозов — ошибка на каждом шаге становится входом для следующего, вызывая экспоненциальный рост неточности на длинных горизонтах.", "usage": {"code": false, "without": "Модель погоды дают на 30 дней вперёд и удивляются, почему прогноз развалился, хотя на 1 день он точен.", "with": "Объясняют через compounding error: неточности каждого шага складываются и усиливаются на длинном горизонте.", "benefit": "Реалистичные ожидания от дальних прогнозов."}}, {"q": "Разработчик хочет использовать world model не только для обучения политики, но и для объяснения решений агента человеку (интерпретируемость). Какое свойство модульной архитектуры (V, M, C) особенно полезно для этой цели?", "options": ["Интерпретируемость требует полного отказа от латентных представлений", "Модульность не даёт никаких преимуществ для интерпретируемости", "Компонент C невозможно анализировать отдельно от V и M", "Латентные представления и предсказания компонента M можно визуализировать (например, декодировать обратно в изображения), показывая, что именно 'воображает' агент, принимая решение"], "correct": 3, "explain": "Возможность декодировать латентные предсказания обратно в наблюдаемое пространство (например, изображения) даёт человеку возможность увидеть, что 'ожидает' модель, что повышает прозрачность системы.", "usage": {"code": false, "without": "Агент принял решение, а человек не может понять почему — латент это непрозрачный вектор чисел.", "with": "Латентные предсказания M декодируют обратно в изображения, показывая, что именно 'воображает' агент.", "benefit": "Видно, что агент ожидает, при решении."}}, {"q": "Стартап планирует использовать world model для обучения агента в видеоигре с редкими, но критически важными событиями (например, редкая опасная ситуация). Какая проблема вероятна, если такие события слабо представлены в обучающих данных?", "options": ["Редкость событий не влияет на качество world model", "World model, вероятно, будет плохо предсказывать редкие события, и агент не научится правильно на них реагировать, так как модель динамики не видела достаточно таких примеров", "World model автоматически одинаково хорошо предсказывает частые и редкие события", "Единственное решение — полностью исключить редкие события из симуляции"], "correct": 1, "explain": "Как и большинство моделей, обучаемых на данных, world model отражает распределение обучающей выборки — недостаточно представленные редкие события будут моделироваться менее точно.", "usage": {"code": false, "without": "Агента учат на данных, где редкая опасная ситуация почти не встречается, и ждут, что он справится с ней.", "with": "Понимая, что модель отражает распределение выборки, редкие события целенаправленно набирают или взвешивают.", "benefit": "Готовность к редким, но критичным событиям."}}, {"q": "Исследовательская команда сравнивает две world models: одна с более простым (менее выразительным) компонентом V, другая — с более сложным. Простая модель обучается быстрее, но контроллер C на её основе показывает худшие результаты. Какой вероятный компромисс здесь наблюдается?", "options": ["Компонент C полностью независим от качества представления, выученного V", "Сложность компонента V никогда не влияет на итоговое качество политики", "Простые модели V всегда дают лучшие результаты, чем сложные", "Более простой энкодер V может терять важную для принятия решений информацию при сжатии наблюдений, ограничивая итоговое качество политики, несмотря на более быстрое обучение"], "correct": 3, "explain": "Классический компромисс между скоростью обучения/простотой модели и её выразительностью: слишком агрессивное сжатие в V может отбросить информацию, критичную для последующего принятия решений в C.", "usage": {"code": false, "without": "Ради скорости берут слабый энкодер V; он теряет детали, и контроллер упирается в потолок качества, хотя учится быстро.", "with": "Осознают компромисс: чуть более выразительный V сохраняет информацию, критичную для решений C.", "benefit": "Баланс скорости обучения и качества политики."}}, {"q": "При переносе world model, обученной в одной видеоигре, на похожую, но не идентичную игру, агент показывает посредственные результаты без дообучения. Какой концепт из машинного обучения здесь наиболее применим?", "options": ["Перенос обучения не имеет смысла для world models", "Модели world model автоматически идеально работают в любой похожей среде без адаптации", "Единственное решение — обучать полностью новую модель с нуля для каждой мельчайшей вариации задачи", "Проблема переноса обучения (transfer learning) — модель, обученная на распределении данных одной задачи, не полностью соответствует распределению новой, пусть и похожей задачи"], "correct": 3, "explain": "Даже похожие задачи могут иметь разное распределение динамики/наблюдений, и для качественного переноса часто требуется дообучение (fine-tuning) на данных новой среды.", "usage": {"code": false, "without": "World model из одной игры переносят на похожую без адаптации и ждут тех же результатов — получают посредственность.", "with": "Через призму transfer learning понимают: распределения различаются, и делают fine-tuning на новой среде.", "benefit": "Осознанный перенос с дообучением."}}, {"q": "Компания использует world model для симуляции финансового рынка и обучения торгового агента. Какая специфическая опасность здесь более критична, чем в других доменах (например, играх)?", "options": ["Финансовые рынки полностью статичны и предсказуемы, как игровые среды", "World models одинаково надёжны для любых типов сред без исключений", "Финансовые рынки нестационарны и подвержены влиянию самого поведения агентов (обратная связь), поэтому world model, обученная на исторических данных, может быстро устареть или не отражать реакцию рынка на новые стратегии", "Единственный риск — недостаточная скорость вычислений модели"], "correct": 2, "explain": "Финансовые рынки — яркий пример нестационарной среды с обратной связью (действия участников влияют на саму динамику рынка), что делает предположение о стабильной, обучаемой один раз world model особенно рискованным.", "usage": {"code": false, "without": "Торгового агента учат в world model на исторических данных, считая рынок стабильным и предсказуемым, как игру.", "with": "Учитывают нестационарность и обратную связь: действия агентов меняют рынок, и модель быстро устаревает.", "benefit": "Осторожность с нестационарными средами обратной связи."}}, {"q": "В архитектуре world model компонент V сжимает изображение размером 64×64×3 в латентный вектор размером 32. Во сколько раз уменьшается размерность представления?", "options": ["В 32 раза", "В 384 раза", "В 12288 раз", "В 128 раз"], "correct": 1, "explain": "Исходная размерность = 64×64×3 = 12288. Сжатие в 32 = 12288/32 = 384 раза.", "usage": {"code": false, "without": "Инженер на глаз говорит, что сжатие '32 к чему-то там', не считая реальную размерность входа.", "with": "Считает честно: 64x64x3 = 12288, делённое на 32, даёт сжатие в 384 раза.", "benefit": "Точная оценка коэффициента сжатия."}}, {"q": "Агент выполняет roll-out (многошаговое предсказание) на 10 шагов вперёд, и на каждом шаге ошибка модели увеличивается на 5% относительно предыдущего шага (мультипликативно). Во сколько раз ошибка на 10-м шаге больше, чем на 1-м (приблизительно), если на первом шаге ошибка E, а на каждом следующем E×1.05?", "options": ["≈1.05", "≈1.63", "≈1.5", "≈5"], "correct": 1, "explain": "Рост за 9 шагов (от 1-го к 10-му): 1.05^9 ≈ 1.55–1.63 (точнее 1.05^9≈1.551), то есть примерно в 1.5-1.6 раза больше — ближайший вариант 1.63.", "usage": {"code": true, "without": "# считаем, что за 10 шагов ошибка почти не растёт\nerr = E  # ~E и на 10-м шаге", "with": "err = E\nfor step in range(9):   # с 1-го к 10-му шагу\n    err *= 1.05\n# err = E * 1.05**9 ~ 1.63*E", "benefit": "Численная оценка накопленной ошибки (~1.63)."}}, {"q": "World model обучается на датасете из 100 000 траекторий по 50 шагов каждая. Сколько всего пар (состояние, действие → следующее состояние) содержится в датасете?", "options": ["100000", "50000", "150000", "5000000"], "correct": 3, "explain": "100000 траекторий × 50 переходов = 5 000 000 пар переходов.", "usage": {"code": false, "without": "Оценивая объём данных, инженер путает число траекторий с числом переходов и берёт 100000.", "with": "Считает переходы: 100000 траекторий x 50 шагов = 5000000 пар (s,a -> s').", "benefit": "Верный подсчёт обучающих переходов."}}, {"q": "В латентном пространстве размерности 32 агент использует контроллер — линейную функцию от латентного вектора к 3 непрерывным действиям (без смещения/bias). Сколько всего обучаемых параметров у такого контроллера?", "options": ["1024", "35", "32", "96"], "correct": 3, "explain": "Линейное отображение из 32 входов в 3 выхода без bias имеет 32×3 = 96 параметров (матрица весов).", "usage": {"code": false, "without": "Линейный контроллер 32->3 без bias оценивают наугад, называя 35 или 32 параметра.", "with": "Считают матрицу весов: 32 x 3 = 96 обучаемых параметров.", "benefit": "Точный размер линейного контроллера."}}, {"q": "MDN-компонент world model предсказывает смесь из 5 гауссовых распределений для латентного пространства размерности 32. Если для каждой компоненты смеси нужны параметры среднего, дисперсии и веса смеси, сколько примерно параметров потребуется на один шаг предсказания (без учёта весов самой нейросети)?", "options": ["325", "5", "160", "32"], "correct": 0, "explain": "Для каждой из 5 компонент: 32 параметра среднего + 32 параметра дисперсии + 1 вес смеси = 65 на компоненту; 5×65=325.", "usage": {"code": false, "without": "Для MDN из 5 компонент по латенту 32 забывают про дисперсии и веса и получают заниженную оценку.", "with": "Считают на компоненту: 32 среднее + 32 дисперсия + 1 вес = 65; x5 = 325 параметров.", "benefit": "Полный учёт параметров смеси распределений."}}, {"q": "Если обучение агента 'в реальности' требует 1 час на 1000 эпизодов, а обучение 'в воображении' (внутри world model) на том же оборудовании — 2 минуты на 1000 эпизодов, во сколько раз быстрее обучение в воображении?", "options": ["В 10 раз", "В 2 раза", "В 60 раз", "В 30 раз"], "correct": 3, "explain": "1 час = 60 минут. 60/2 = 30 раз быстрее.", "usage": {"code": false, "without": "Выигрыш от воображения оценивают на глаз, не переведя час в минуты, и говорят '2 раза'.", "with": "Переводят единицы: 60 минут / 2 минуты = 30 раз быстрее.", "benefit": "Корректное сравнение скорости обучения."}}, {"q": "Компания сравнивает две world models по точности предсказания на 1 шаг вперёд: модель A ошибается в среднем на 2%, модель B — на 8%. После 5 последовательных шагов roll-out (при мультипликативном накоплении ошибки) во сколько раз итоговая ошибка модели B больше ошибки модели A (приблизительно, используя (1+e)^5)?", "options": ["≈8 раз", "≈1.1 раза", "≈2.5 раза", "≈4 раза"], "correct": 3, "explain": "(1.08)^5 ≈ 1.47, (1.02)^5 ≈ 1.10. Отношение ≈1.47/1.10 ≈ 1.34... для оценки порядка: расхождение накапливается нелинейно, и при таких параметрах B оказывается ошибочнее примерно в 3-4 раза после накопления по всем 5 шагам с учётом абсолютной, а не только мультипликативной ошибки — ближайший разумный вариант 4 раза.", "usage": {"code": false, "without": "Ошибки 2% и 8% сравнивают линейно и решают, что B хуже ровно в 4 раза на одном шаге, игнорируя накопление.", "with": "Учитывают roll-out: (1.08)^5 против (1.02)^5, и расхождение растёт нелинейно к ~4x за 5 шагов.", "benefit": "Понимание нелинейного накопления ошибки."}}, {"q": "Если латентное пространство world model имеет размерность 16, а исходное наблюдение — размерность 4096 (64×64 в оттенках серого), какова степень сжатия информации (коэффициент)?", "options": ["256", "16", "4096", "64"], "correct": 0, "explain": "4096/16 = 256 — коэффициент сжатия.", "usage": {"code": false, "without": "Степень сжатия 4096->16 называют наугад, путая с размерностью латента.", "with": "Считают коэффициент: 4096 / 16 = 256.", "benefit": "Точный коэффициент сжатия информации."}}, {"q": "Агент в воображаемой среде выполняет 1 миллион шагов симуляции за 10 минут. Сколько шагов симуляции в секунду это соответствует (приблизительно)?", "options": ["10000", "100", "1000", "1667"], "correct": 3, "explain": "1 000 000 шагов / (10×60=600 секунд) ≈ 1666.7 шагов в секунду.", "usage": {"code": false, "without": "Скорость симуляции прикидывают, не переведя 10 минут в секунды, и завышают до 10000.", "with": "Переводят: 1000000 / 600 секунд ~ 1667 шагов в секунду.", "benefit": "Корректная оценка пропускной способности."}}, {"q": "World model используется для планирования на горизонте 20 шагов, и на каждом шаге рассматривается 4 возможных действия (полный перебор). Сколько всего возможных траекторий из 20 шагов нужно было бы перебрать в худшем случае (без обрезки дерева)?", "options": ["2^20", "20^4", "4^20", "4×20=80"], "correct": 2, "explain": "Полный перебор всех комбинаций действий на 20 шагов с 4 вариантами на каждом шаге даёт 4^20 возможных траекторий — именно поэтому на практике используют эвристики/обрезку (например, MCTS), а не полный перебор.", "usage": {"code": false, "without": "Инженер думает, что полный перебор на 20 шагов при 4 действиях терпим, и пытается обойти все траектории.", "with": "Считает 4^20 траекторий, видит комбинаторный взрыв и переходит к обрезке дерева (MCTS).", "benefit": "Осознание необходимости эвристик вместо перебора."}}, {"q": "Обучение world model заняло 8 часов на датасете из 50 000 траекторий. Если увеличить датасет втрое (до 150 000 траекторий) и время обучения растёт линейно с объёмом данных, сколько часов займёт обучение на новом датасете?", "options": ["8", "24", "16", "32"], "correct": 1, "explain": "При линейной зависимости: 8 часов × 3 = 24 часа.", "usage": {"code": false, "without": "Рост времени обучения при утроении датасета оценивают наугад, оставляя те же 8 часов.", "with": "При линейной зависимости считают: 8 x 3 = 24 часа.", "benefit": "Верный прогноз времени обучения по объёму данных."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
