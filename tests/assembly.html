<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ассемблер</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/assembly.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Ассемблер</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "assembly";
  const QUESTIONS = [{"q": "Что такое язык ассемблера в общем смысле?", "options": ["Высокоуровневый язык с автоматическим управлением памятью и сборкой мусора", "Язык разметки для описания структуры и стиля веб-страниц в браузере", "Интерпретируемый скриптовый язык для автоматизации рутинных задач ОС", "Символьная запись машинных команд процессора, близкая к машинному коду"], "correct": 3, "explain": "Ассемблер — низкоуровневый язык, где каждая инструкция обычно соответствует одной машинной команде процессора, в отличие от высокоуровневых языков с абстракциями.", "usage": {"code": false, "without": "Слышишь «ассемблер» и думаешь, что это ещё один язык вроде C или скрипта с переменными и функциями, ждёшь от него абстракций и автоуправления памятью.", "with": "Понимаешь, что это символьная запись машинных команд процессора: одна мнемоника обычно = одна инструкция, которую железо исполняет напрямую.", "benefit": "Правильно оцениваешь уровень абстракции и что каждая строка — реальная команда CPU."}}, {"q": "Что такое регистр процессора?", "options": ["Файл на жёстком диске для хранения пользовательских настроек программы", "Специальная область памяти для графических флагов стран и иконок ОС", "Малая сверхбыстрая память внутри процессора для операндов и вычислений", "Выделенный участок оперативной памяти (RAM) под временные данные ядра"], "correct": 2, "explain": "Регистры — сверхбыстрая память, встроенная непосредственно в процессор, используемая для хранения операндов, результатов вычислений и служебной информации во время выполнения инструкций.", "usage": {"code": false, "without": "Считаешь, что переменные во время вычислений лежат где-то в RAM, и не понимаешь, откуда берётся разница в скорости доступа.", "with": "Знаешь, что операнды держат в регистрах — сверхбыстрой памяти внутри ядра CPU, а не в оперативке.", "benefit": "Понимаешь, почему код старается держать горячие значения в регистрах."}}, {"q": "Что делает инструкция MOV в ассемблере (например, x86)?", "options": ["Выполняет целочисленное деление с получением частного и остатка", "Копирует значение из источника (регистр или память) в приёмник", "Складывает два числа из регистров и записывает сумму в приёмник", "Останавливает выполнение программы и передаёт управление ядру ОС"], "correct": 1, "explain": "MOV — одна из базовых инструкций, копирующая значение из источника в приёмник (регистр или ячейку памяти), несмотря на название 'move' исходное значение не удаляется.", "usage": {"code": true, "without": "Видишь `MOV RAX, RBX` и думаешь, что значение из RBX «переехало» и в RBX теперь пусто.", "with": "; C: a = b;\nMOV RAX, RBX   ; копия RBX в RAX, сам RBX не меняется", "benefit": "Не теряешь значение источника — MOV копирует, а не удаляет."}}, {"q": "Что такое указатель стека (stack pointer, SP/RSP)?", "options": ["Числовой идентификатор процесса (PID) в операционной системе", "Фиксированный адрес начала физической оперативной памяти системы", "Регистр, хранящий адрес вершины стека вызовов текущей программы", "Регистр для хранения текущего астрономического времени программы"], "correct": 2, "explain": "Указатель стека — специальный регистр, хранящий адрес 'вершины' стека — области памяти, используемой для локальных переменных, адресов возврата и временного хранения данных.", "usage": {"code": true, "without": "Не понимаешь, куда деваются локальные переменные и адрес возврата при вызове, путаешь RSP с обычным регистром данных.", "with": "; выделить 16 байт под локальные\nSUB RSP, 16    ; RSP — адрес вершины стека\n; ...\nADD RSP, 16    ; вернуть", "benefit": "Осознанно управляешь кадром стека через RSP."}}, {"q": "Что такое счётчик команд (program counter / instruction pointer)?", "options": ["Постоянный указатель на самый первый байт оперативной памяти", "Регистр, куда процессор накапливает коды всех ошибок программы", "Счётчик количества уже выполненных инструкций, ведётся для статистики", "Регистр, хранящий адрес следующей выполняемой процессором инструкции"], "correct": 3, "explain": "Instruction pointer (IP/RIP) хранит адрес следующей команды в памяти, которую процессор должен выполнить, и автоматически обновляется после выполнения каждой инструкции.", "usage": {"code": false, "without": "Думаешь, что процессор как-то «сам знает» порядок команд, и не понимаешь, что задаёт следующую инструкцию.", "with": "Знаешь, что RIP хранит адрес следующей инструкции и обновляется после каждой; переходы просто меняют RIP.", "benefit": "Понимаешь механику последовательного исполнения и переходов."}}, {"q": "Что такое инструкция условного перехода (conditional jump) в ассемблере?", "options": ["Инструкция, которая безусловно и навсегда останавливает работу процессора", "Инструкция прямого вызова сервиса операционной системы через прерывание", "Передаёт управление на другой адрес, только если выполнено условие (флаг)", "Инструкция, всегда выполняющая переход на адрес независимо от условий"], "correct": 2, "explain": "Условные переходы (например, JE, JNE, JG в x86) проверяют состояние флагов процессора (установленных предыдущей операцией) и передают управление на нужный адрес только при выполнении условия.", "usage": {"code": true, "without": "Пишешь `JE label` наугад и удивляешься, что переход то срабатывает, то нет без видимой логики.", "with": "CMP RAX, RBX   ; выставляет флаги\nJE  equal      ; переход только если ZF=1 (равны)", "benefit": "Переход зависит от результата предыдущего сравнения — контролируешь ветвление."}}, {"q": "Что такое регистры флагов (flags register) процессора?", "options": ["Регистр с битами состояния (нуль, перенос), выставляемыми арифметикой", "Специальная область памяти для графических флагов стран и иконок рабочего стола", "Регистр, который задаёт тактовую частоту и общую скорость процессора", "Регистр, хранящий текстовое название текущей запущенной программы"], "correct": 0, "explain": "Регистр флагов содержит отдельные биты (ZF — флаг нуля, CF — флаг переноса, SF — флаг знака и др.), которые устанавливаются автоматически после арифметических и логических операций и используются условными переходами.", "usage": {"code": false, "without": "Не понимаешь, откуда условный переход «узнаёт» результат сравнения, если сравнение — отдельная инструкция.", "with": "Знаешь, что арифметика/сравнение выставляют биты в регистре флагов (ZF, CF, SF, OF), а переходы их читают.", "benefit": "Связываешь CMP/TEST и Jxx через явное состояние флагов."}}, {"q": "Что такое инструкция CALL в ассемблере?", "options": ["Сохраняет адрес возврата в стеке и передаёт управление на процедуру", "Инструкция сложения двух регистров с записью суммы в первый из них", "Инструкция полной остановки программы и выхода в операционную систему", "Инструкция отправки уведомления системному администратору о сбое"], "correct": 0, "explain": "CALL сохраняет в стеке адрес следующей инструкции (адрес возврата) и передаёт управление на начало вызываемой процедуры; парная инструкция RET возвращает управление обратно.", "usage": {"code": true, "without": "Видишь одинокий `CALL func` и думаешь, что процессор просто «прыгает» и потом магически возвращается.", "with": "CALL func      ; push адрес_возврата в стек, затем переход\n; ... тело func ...\nRET            ; pop адреса и возврат", "benefit": "Понимаешь, что возврат работает благодаря сохранённому в стеке адресу."}}, {"q": "Что такое непосредственный операнд (immediate value) в инструкции ассемблера?", "options": ["Адрес функции обратного вызова, передаваемый в неё через регистр", "Значение, полученное от другого процесса в реальном времени по шине", "Константа, закодированная прямо в теле инструкции (MOV AX, 5)", "Значение в оперативной памяти по вычисляемому динамическому адресу"], "correct": 2, "explain": "Непосредственный операнд — это литеральное значение, встроенное непосредственно в код инструкции, в отличие от значений, находящихся в регистрах или ячейках памяти.", "usage": {"code": true, "without": "Не отличаешь константу в коде от значения из памяти, думаешь, что 5 где-то хранится и загружается.", "with": "MOV AX, 5      ; 5 — immediate, вшит прямо в машинный код инструкции", "benefit": "Различаешь immediate, регистровые и memory-операнды."}}, {"q": "Что такое машинный код по отношению к ассемблерному коду?", "options": ["Более высокоуровневое представление, компилируемое из ассемблера", "Отдельный язык для написания драйверов устройств, это не ассемблер", "Полный синоним понятия «ассемблер», без каких-либо отличий вовсе", "Двоичные коды инструкций, в которые ассемблируется текст программы"], "correct": 3, "explain": "Машинный код — последовательность двоичных кодов операций (opcodes), которые непосредственно исполняет процессор; ассемблер — человекочитаемое мнемоническое представление этих же инструкций, транслируемое ассемблером 1-в-1 (обычно) в машинный код.", "usage": {"code": false, "without": "Считаешь ассемблер и машинный код синонимами или, наоборот, думаешь, что asm компилируется как высокоуровневый язык.", "with": "Знаешь, что машинный код — двоичные опкоды, а asm — их мнемоническая запись, транслируемая ассемблером почти 1-в-1.", "benefit": "Понимаешь, что между asm и байтами почти нет «магии компилятора»."}}, {"q": "Почему ассемблер часто называют языком, дающим представление 'один к одному' (или близкое к этому) с машинным кодом, в отличие от компилируемых высокоуровневых языков?", "options": ["Соответствие между ассемблером и машинным кодом устанавливается динамически во время выполнения программы", "Высокоуровневые языки всегда компилируются ровно в такое же число машинных инструкций, как и эквивалентный ассемблер", "Ассемблер и машинный код — совершенно разные, ничем не связанные между собой представления программы", "Одна строка ассемблера обычно даёт ровно одну машинную инструкцию, тогда как строка C++ или Python — множество"], "correct": 3, "explain": "Прямое соответствие мнемоник инструкций и опкодов процессора — определяющая черта ассемблера, дающая программисту точный контроль над каждой выполняемой маш нтирует возврат в обратном порядке вызовов."}}, {"q": "Почему компиляторы высокоуровневых языков (C, C++) при генерации ассемблерного/машинного кода часто используют соглашения о вызовах (calling conventions), определяющие, как передаются параметры и возвращаемое значение функции?", "options": ["Каждая функция вправе использовать произвольный, уникальный способ передачи параметров без проблем совместимости", "Стандартный протокол: какие регистры и стек идут под параметры и кто чистит стек — отсюда совместимость модулей", "Соглашения о вызовах — чисто эстетическое требование, не влияющее на корректность выполнения программы вовсе", "Соглашения о вызовах применимы лишь к написанному вручную ассемблеру, но не к коду от компилятора"], "correct": 1, "explain": "Без единого соглашения (например, cdecl, stdcall, System V AMD64 ABI) вызывающая и вызываемая функции могли бы по-разному интерпретировать, где искать параметры и куда положить результат, что сделало бы совместное использование кода из разных источников (библиотек, модулей) невозможным.", "usage": {"code": false, "without": "Считаешь, что компилятор кладёт аргументы куда попало, и не понимаешь, как код из разных модулей стыкуется.", "with": "Знаешь про calling convention (System V AMD64: первые аргументы в RDI, RSI, RDX...), общий для всех модулей протокол.", "benefit": "Понимаешь, почему независимо скомпилированный код совместим."}}, {"q": "Почему ассемблерный код, оптимизированный вручную для конкретного процессора, может быть значительно быстрее кода, сгенерированного компилятором из высокоуровневого языка, хотя это требует значительно больше усилий разработчика?", "options": ["Разработчик применяет спецкоманды и точное управление регистрами и кэшем, что упускает универсальный компилятор", "Ручная оптимизация ассемблера никогда не даёт прироста скорости в сравнении с кодом любого компилятора", "Скорость выполнения программы совершенно никак не связана с качеством генерируемого компилятором машинного кода", "Компилятор всегда порождает заведомо более оптимальный машинный код, чем любой написанный человеком ассемблер"], "correct": 0, "explain": "Компиляторы должны балансировать между переносимостью, поддержкой множества архитектур и общими эвристиками оптимизации, тогда как ручная ассемблерная оптимизация может использовать точное знание конкретного процессора (набор инструкций, особенности конвейера, размер кэш-линий) для достижения предельной производительности в узкоспециализированных случаях.", "usage": {"code": false, "without": "Веришь, что компилятор всегда генерирует оптимальный код и ручной asm бессмысленен.", "with": "Знаешь, что вручную можно применить спецкоманды и точное управление регистрами/кэшем, которые компилятор избегает ради переносимости.", "benefit": "Понимаешь, где ручная оптимизация реально даёт выигрыш."}}, {"q": "Как понимание конвейеризации инструкций (instruction pipelining) в современных процессорах связано с проблемой условных переходов в ассемблерном коде (branch misprediction)?", "options": ["Конвейеризация инструкций совершенно никак не связана с условными переходами в исполняемом коде", "Штраф за неверное предсказание ветвления одинаков при любой глубине конвейера процессора вообще", "Процессор всегда заранее точно знает исход любого условного перехода без всяких предположений и догадок", "Конвейер заранее выполняет предсказанную ветку; при ошибке предсказания его сбрасывают со штрафом"], "correct": 3, "explain": "Современные процессоры используют branch prediction для заполнения конвейера до вычисления реального результата условия; ошибка предсказания требует сброса (flush) уже частично обработанных в конвейере инструкций, что создаёт заметную потерю производительности — отсюда важность предсказуемости ветвлений в высокопроизводительном коде.", "usage": {"code": false, "without": "Не понимаешь, почему непредсказуемые if в цикле тормозят, если арифметики столько же.", "with": "Знаешь про конвейер: CPU заранее выполняет предсказанную ветку, а промах требует сброса конвейера и штрафа.", "benefit": "Пишешь предсказуемые ветвления в горячем коде."}}, {"q": "Почему разные архитектуры процессоров (например, x86 и ARM) используют принципиально разные наборы инструкций (ISA), и как это влияет на переносимость написанного вручную ассемблерного кода?", "options": ["Все архитектуры процессоров используют абсолютно идентичный набор ассемблерных инструкций и регистров", "Различия между ISA есть лишь в теории и совсем не влияют на практическое написание любого ассемблерного кода", "Каждая ISA задаёт свой набор инструкций, регистров и соглашений (CISC vs RISC), поэтому код непереносим", "Ассемблерный код всегда автоматически переносим между любыми архитектурами процессоров без изменений"], "correct": 2, "explain": "ISA (Instruction Set Architecture) — фундаментальный контракт между железом и программным обеспечением; принципиально разные архитектуры (CISC-ориентированный x86 vs RISC-ориентированный ARM) имеют разные наборы инструкций, регистров и соглашений, что делает низкоуровневый ассемблерный код архитектурно-специфичным и непереносимым напрямую.", "usage": {"code": false, "without": "Думаешь, что asm-код одинаков для любого процессора и переносится как C.", "with": "Знаешь, что каждая ISA (x86 CISC vs ARM RISC) — свой набор инструкций и регистров, код непереносим.", "benefit": "Планируешь переработку низкоуровневого кода при смене архитектуры."}}, {"q": "Как работа с указателями на уровне ассемблера (прямая адресная арифметика с регистрами) концептуально связана с указателями в языках вроде C, изучаемых на более высоком уровне абстракции?", "options": ["Ассемблер вообще никогда не использует адреса памяти, аналогичные указателям в языке C и его диалектах", "Указатель в C — абстракция той же идеи: регистр хранит адрес данных, а операции дают адресацию памяти", "Указатели языка C и адресация памяти в ассемблере — принципиально разные, никак не связанные концепции", "Указатели высокоуровневых языков полностью независимы от того, как процессор физически лезет в память"], "correct": 1, "explain": "Указатель в C — это высокоуровневая абстракция ровно того же механизма, что используется в ассемблере на аппаратном уровне: числовое значение адреса, используемое для косвенной адресации памяти при чтении/записи данных.", "usage": {"code": true, "without": "Считаешь указатель C особой сущностью, не связанной с тем, как CPU лезет в память.", "with": "; C: int x = *p;\nMOV RAX, [RSI]   ; RSI хранит адрес, [RSI] — данные по нему", "benefit": "Видишь, что указатель — это просто адрес в регистре и косвенная адресация."}}, {"q": "Почему при написании критичных по производительности участков кода (например, во встраиваемых системах) иногда используются ассемблерные вставки (inline assembly) внутри программ на C/C++, а не пишется весь модуль полностью на ассемблере?", "options": ["Написать весь модуль целиком на ассемблере всегда проще и быстрее, чем применять точечные вставки в код", "Ассемблерные вставки в C/C++ никогда не дают прироста скорости против обычного кода на этих языках", "Ассемблерные вставки полностью запрещены стандартом внутри любых программ на языках C и C++ вообще", "Вставки точечно оптимизируют критичные участки, а основной код остаётся на высокоуровневом языке"], "correct": 3, "explain": "Inline assembly — прагматичный компромисс: подавляющая часть кода (логика, структуры данных) остаётся на высокоуровневом языке для удобства разработки, тогда как отдельные, критически важные по скорости фрагменты оптимизируются вручную на ассемблере, где это действительно необходимо и оправдано.", "usage": {"code": true, "without": "Думаешь, что оптимизировать критичный участок можно только переписав весь модуль на asm.", "with": "// C с точечной вставкой\n__asm__(\"rdtsc\" : \"=a\"(lo), \"=d\"(hi)); // остальное на C", "benefit": "Оптимизируешь узкое место, оставляя основной код высокоуровневым."}}, {"q": "Как архитектурно связаны между собой регистры общего назначения, регистр флагов in": "Важное архитектурное разграничение: статический код (фиксированная последовательность инструкций) и динамическое поведение (фактический путь исполнения, определяемый данными во время выполнения через условные переходы) — это разные аспекты одной программы.", "usage": {"code": false, "without": "Удивляешься, что один и тот же .exe ведёт себя по-разному, думаешь, что код меняется под данные.", "with": "Понимаешь: инструкции фиксированы после компиляции, а путь исполнения выбирают условные переходы по данным.", "benefit": "Разделяешь статический код и динамическое поведение."}}, {"q": "Как соглашения о вызовах (calling conventions) архитектурно решают проблему совместимости между модулями, скомпилированными независимо (например, библиотека и вызывающая программа)?", "options": ["Соглашения о вызовах актуальны лишь для написанного вручную ассемблера, но не для скомпилированных программ", "Стандартный протокол параметров, возврата и очистки стека даёт стыковку модулей без знания их внутренностей", "Каждый модуль обязан точно знать внутреннюю реализацию всех вызываемых функций, чтобы работать корректно", "Независимо скомпилированные модули никогда не могут корректно взаимодействовать между собой на уровне ассемблера"], "correct": 1, "explain": "Именно фиксированный, стандартизированный интерфейс вызова (соглашение) позволяет обеспечить модульность и переиспользование скомпилированного кода (библиотек) без необходимости перекомпилировать всё вместе или знать внутренние детали реализации вызываемых функций.", "usage": {"code": false, "without": "Считаешь, что библиотеку и твою программу надо всегда компилировать вместе, чтобы вызовы работали.", "with": "Знаешь, что стандартный calling convention/ABI позволяет модулям стыковаться без знания внутренностей друг друга.", "benefit": "Понимаешь основу модульности и линковки библиотек."}}, {"q": "Почему знание архитектуры памяти (иерархия регистры → кэш → RAM) важно при проектировании алгоритмов на низком уровне, даже если сам алгоритм логически идентичен для разных архитектур?", "options": ["Иерархия памяти процессора совсем не влияет на производительность алгоритма, если его логика верна и корректна", "Проектирование эффективных низкоуровневых алгоритмов совсем не требует знания архитектуры памяти CPU", "При равной логике скорость сильно зависит от согласия порядка доступа к данным с иерархией памяти и кэшем", "Все уровни памяти — регистры, кэш и RAM — имеют одинаковую скорость доступа на современных процессорах"], "correct": 2, "explain": "Классический пример — порядок обхода многомерного массива: логически идентичный алгоритм может работать в разы быстрее или медленнее в зависимости от того, насколько последовательность обращений к памяти соответствует организации кэш-линий и иерархии памяти конкретного процессора.", "usage": {"code": false, "without": "Думаешь, что при верной логике алгоритм всегда быстр, независимо от порядка обращений к памяти.", "with": "Знаешь про иерархию регистры→кэш→RAM: порядок доступа сильно влияет на попадания в кэш и скорость.", "benefit": "Проектируешь cache-friendly обход данных."}}, {"q": "Как понимание работы стека вызовов помогает объяснить архитектурные ограничения на глубину рекурсии в программах?", "options": ["Каждый рекурсивный вызов кладёт кадр в стек ограниченного размера, и глубокая рекурсия ведёт к переполнению", "Стек вызовов вообще не имеет совсем никаких ограничений по размеру ни в одной реальной вычислительной системе", "Глубина рекурсии совершенно никак не связана с объёмом используемой памяти стека вызовов программы", "Переполнение стека случается лишь при использовании длинных циклов, но никогда не бывает при рекурсии"], "correct": 0, "explain": "Рекурсия на уровне ассемблера реализуется именно как последовательность вложенных CALL, каждый из которых занимает место в ограниченном по размеру стеке — отсюда прямая связь между глубиной рекурсии и риском исчерпания памяти стека (stack overflow).", "usage": {"code": true, "without": "Не C-архитектуры всегда применяют заметно более сложные инструкции, чем архитектуры семейства CISC вообще", "Разница CISC и RISC влияет лишь на маркетинговое имя процессора, но не на реальный ассемблерный код его"], "correct": 1, "explain": "Исторический архитектурный компромисс: CISC (например, x86) стремится минимизировать количество инструкций за счёт их сложности и многофункциональности, тогда как RISC (ARM, RISC-V) выбирает простые, единообразные инструкции, что обычно упрощает конвейеризацию и оптимизацию оборудования ценой большего числа инструкций для эквивалентной задачи.", "usage": {"code": false, "without": "Считаешь, что все процессоры кодят одинаково, и не понимаешь, почему x86 и ARM так по-разному выглядят.", "with": "Знаешь: CISC (x86) — сложные многофункциональные инструкции, RISC (ARM) — простые единообразные, отсюда стиль кода.", "benefit": "Понимаешь философию ISA и число инструкций на задачу."}}, {"q": "Почему архитектурное понятие 'адресного пространства' процесса важно для понимания того, как ассемблерный код обращается к памяти, не зная физических адресов оперативной памяти?", "options": ["Каждый процесс в современной ОС имеет полный эксклюзивный доступ ко всей физической памяти компьютера сразу", "ОС даёт процессу иллюзию своего адресного пространства; код идёт по виртуальным адресам, их транслирует MMU", "Понятие виртуальной памяти совсем не относится к тому, как ассемблерные инструкции обращаются к данным", "Ассемблерный код всегда обращается прямо к физическим адресам памяти без посредничества операционной системы"], "correct": 1, "explain": "Механизм виртуальной памяти (реализуемый совместно ОС и аппаратным блоком MMU) абстрагирует физическое расположение данных, позволяя ассемблерному коду процесса работать с виртуальными адресами так, будто у него есть собственное независимое адресное пространство, изолированное от других процессов.", "usage": {"code": false, "without": "Думаешь, что asm-код обращается прямо к физическим адресам RAM и знает их заранее.", "with": "Знаешь про виртуальную память: инструкции работают с виртуальными адресами, MMU транслирует их в физические.", "benefit": "Понимаешь изоляцию процессов и абстракцию адресного пространства."}}, {"q": "Как понимание работы кэш-памяти процессора объясняет архитектурный принцип 'локальности ссылок' (locality of reference) и его значение для оптимизации низкоуровневого кода?", "options": ["Оптимизация под локальность ссылок совсем не влияет на реальную производительность любых программ", "Локальность ссылок означает, что программа вообще никогда не обращается повторно к одним и тем же данным дважды", "Программы часто трогают близкие и недавние данные, а кэш держит их ближе к процессору для быстрого доступа", "Кэш-память процессора совсем никак не связана с закономерностями доступа программы к памяти данных"], "correct": 2, "explain": "Принцип локальности (временной — повторное обращение к тем же данным, и пространственной — обращение к соседним данным) лежит в основе эффективности кэш-памяти; низкоуровневый код, спроектированный с учётом этого принципа (например, последовательный обход памяти), значительно выигрывает в производительности.", "usage": {"code": false, "without": "Не понимаешь, почему последовательный обход массива быстрее хаотичного при тех же операциях.", "with": "Знаешь про локальность: кэш подтягивает соседние и недавние данные, последовательный доступ бьёт в кэш.", "benefit": "Оптимизируешь паттерн доступа под кэш."}}, {"q": "Разработчик пишет драйвер устройства и должен максимально быстро обработать прерывание от аппаратуры. Почему разработчики низкоуровневого системного кода иногда предпочитают писать обработчики прерываний на ассемблере или с минимальным использованием высокоуровневых абстракций?", "options": ["Использование ассемблера для обработчиков прерываний — устаревшая и уже нигде не применяемая практика", "Точный контроль над инструкциями и регистрами убирает скрытые расходы компилятора — важно для латентности", "Высокоуровневые языки физически неспособны обрабатывать аппаратные прерывания ни при каких условиях вообще", "Ассемблер всегда выполняется одинаково быстро независимо от задачи, поэтому выбор не имеет значения тут"], "correct": 1, "explain": "В критичных по времени контекстах (обработчики прерываний, загрузчики) минимальный, точно контролируемый ассемблерный код устраняет непредсказуемые накладные расходы, которые может незаметно внести компилятор высокоуровневого языка (например, скрытые проверки, вызовы функций инициализации).", "usage": {"code": false, "without": "Считаешь, что обработчик прерывания на C ничем не хуже и разницы во времени реакции нет.", "with": "Знаешь, что asm убирает скрытые накладные расходы компилятора (прологи, скрытые вызовы), минимизируя латентность.", "benefit": "Достигаешь предсказуемо низкого времени реакции на прерывание."}}, {"q": "При отладке программы разработчик заметил, что цикл со сложным, труднопредсказуемым условием ветвления выполняется заметно медленнее, чем аналогичный цикл с простым, предсказуемым условием, хотя количество арифметических операций одинаково. Какое объяснение наиболее вероятно с точки зрения архитектуры процессора?", "options": ["Непредсказуемые ветвления чаще дают промахи предсказания и сброс конвейера, а предсказуемые идут легко", "Скорость выполнения цикла никогда не зависит от предсказуемости условных переходов внутри его тела", "Разница в скорости объясняется лишь различием тактовой частоты процессора, а вовсе не структурой кода", "Все условные переходы в процессоре выполняются за абсолютно одинаковое время вне зависимости от предсказуемости"], "correct": 0, "explain": "Классический эффект влияния предсказания ветвлений на производительность: труднопредсказуемые условия (например, зависящие от случайных данных) чаще приводят к неверным предположениям процессора и, соответственно, к дорогостоящим сбросам конвейера.", "usage": {"code": false, "without": "Думаешь, что скорость цикла зависит только от частоты CPU, а не от структуры ветвлений.", "with": "Знаешь, что труднопредсказуемое условие даёт частые branch misprediction и сбросы конвейера.", "benefit": "Диагностируешь просадки из-за непредсказуемых ветвлений."}}, {"q": "Команда разрабатывает функцию на языке C, вызываемую из модуля, написанного на ассемблере другим разработчиком, и сталкивается с повреждением данных в стеке при каждом вызове. Какая наиболее вероятная причина этой проблемы?", "options": ["Несовпадение соглашения о вызовах C и ассемблера: кто чистит стек и в каком порядке идут параметры", "Стек вообще никогда не используется при вызовах функций, написанных на разных языках программирования", "Повреждение стека при межъязыковом вызове неизбежно и в принципе не может быть исправлено программно", "Проблема гарантированно вызвана исключительно аппаратной неисправностью самого процессора и его шин"], "correct": 0, "explain": "Несовпадение соглашений о вызовах между кодом, скомпилированным из разных источников (например, разные ожидания насчёт очистки стека или порядка аргументов), — классическая причина повреждения данных стека при межъязыковом взаимодействии, требующая явного согласования ABI/calling convention.", "usage": {"code": false, "without": "При порче стека на стыке C и asm грешишь на аппаратный сбой и не знаешь, где искать.", "with": "Проверяешь совпадение calling convention: порядок аргументов и кто чистит стек (caller vs callee).", "benefit": "Находишь настоящую причину — рассогласование ABI."}}, {"q": "Инженер, оптимизирующий низкоуровневый числовой алгоритм для конкретного процессора, заменяет универсальный цикл с общими инструкциями на код, использующий специализированные векторные инструкции процессора (SIMD). Какой выигрыш это обычно даёт и какой ценой?", "options": ["Использование специализированных векторных инструкций совсем не влияет на переносимость кода между процессорами", "Код берёт несколько элементов одной инструкцией и ускоряется, но теряет переносимость без поддержки этих команд", "SIMD-инструкции всегда работают заметно медленнее обычных скалярных инструкций, независимо от типа задачи", "Векторные инструкции применимы исключительно к обработке текста и строк, но никак не к числовым данным"], "correct": 1, "explain": "SIMD (Single Instruction, Multiple Data) инструкции параллельно обрабатывают несколько элементов данных за одну инструкцию, значительно ускоряя, например, обработку массивов чисел, но привязывают код к конкретному набору инструкций процессора, снижая переносимость на другие архитектуры/старые модели без такой поддержки.", "usage": {"code": true, "without": "Обрабатываешь массив по одному числу и не знаешь, что можно параллельно.", "with": "; сложить 4 float за раз (SSE)\nADDPS XMM0, XMM1   ; SIMD: несколько данных одной инструкцией", "benefit": "Ускоряешь обработку массивов, помня о потере переносимости."}}, {"q": "При анализе производительности низкоуровневого кода профилировщик показывает, что значительная часть времени тратится на постоянную загрузку/выгрузку данных между регистрами и памятью, хотя логически данные могли бы дольше оставаться в регистрах. Какая оптимизация здесь наиболее уместна?", "options": ["Проблема решается только повышением тактовой частоты процессора без всякого изменения самого кода программы", "Частые обращения к памяти вместо регистров совсем никогда не влияют на производительность программы", "Пересмотреть распределение регистров, дольше держа горячие значения в них и реже обращаясь к памяти", "Единственное решение — заменить регистры процессора на дополнительную внешнюю оперативную память RAM"], "correct": 2, "explain": "Эффективное распределение регистров (register allocation) — одна из ключевых оптимизаций как ручного ассемблерного кода, так и компиляторов: минимизация обращений к памяти в пользу удержания активно используемых значений в быстрых регистрах напрямую повышает производительность.", "usage": {"code": true, "without": "Гоняешь значение туда-сюда между регистром и памятью, не замечая лишних load/store.", "with": "; плохо: MOV [x],RAX ... MOV RAX,[x]\n; хорошо: держать сумму в RAX весь цикл", "benefit": "Меньше обращений к памяти — быстрее счёт (register allocation)."}}, {"q": "Разработчик встраиваемой системы должен реализовать критичный по времени участок кода на микроконтроллере с очень ограниченными ресурсами (мало памяти, медленный процессор). Почему в этом случае ассемблер иногда предпочтительнее даже оптимизированного компилятором кода на C?", "options": ["Компилятор C всегда гарантированно превосходит любой написанный вручную ассемблер на абсолютно любом оборудовании", "Ассемблер полностью неприменим для программирования микроконтроллеров с ограниченными ресурсами памяти", "Ограниченность ресурсов микроконтроллера никак не влияет на выбор между ассемблером и языком C вообще", "При дефиците памяти и тактов ручной контроль каждого байта и инструкции даёт критичную экономию ресурсов"], "correct": 3, "explain": "В экстремально ограниченных средах (минимальная память, простой процессор без сложного конвейера) ручная ассемблерная оптимизация иногда позволяет выжать критически важную дополнительную экономию памяти и времени выполнения, которую сложно гарантировать через универсальные эвристики компилятора.", "usage": {"code": false, "without": "Думаешь, что на слабом микроконтроллере C всегда не хуже ручного asm.", "with": "Знаешь, что при жёстком дефиците памяти/тактов ручной контроль каждого байта и инструкции даёт критичную экономию.", "benefit": "Укладываешься в ресурсы там, где компилятор не гарантирует минимум."}}, {"q": "При реверс-инжиниринге скомпилированной программы аналитик видит повторяющийся паттерн ассемблерных инструкций CALL сразу после серии PUSH инструкций. Что это, скорее всего, иллюстрирует с точки зрения соглашений о вызовах?", "options": ["Подготовку параметров через стек (PUSH аргументов) перед вызовом функции (CALL) по соглашению о вызовах", "PUSH и CALL никогда не встречаются вместе в реальном скомпилированном коде любых программ вообще", "Это указывает исключительно на грубую ошибку самого компилятора при генерации машинного кода этой программы", "Инструкции PUSH служат лишь для сохранения регистров и никогда не связаны с параметрами функций вовсе"], "correct": 0, "explain": "Классический паттерн многих соглашений о вызовах (особенно старых, например cdecl на x86): аргументы функции помещаются в стек серией PUSH-инструкций непосредственно перед CALL, который передаёт управление на саму функцию.", "usage": {"code": true, "without": "Видишь серию PUSH перед CALL и не понимаешь, зачем они и связаны ли с вызовом.", "with": "PUSH arg2\nPUSH arg1\nCALL func   ; аргументы переданы через стек (cdecl)", "benefit": "Узнаёшь передачу параметров через стек при реверсе."}}, {"q": "Компания разрабатывает загрузчик (bootloader) для устройства, который должен работать до инициализации операционной системы и стандартных библиотек. Почему такой код часто пишется полностью или частично на ассемблере?", "options": ["На этом этапе ещё нет среды рантайма высокоуровневого языка и библиотек, нужен код поверх голого железа", "Ассемблер применяют в загрузчиках лишь по историческим причинам, без реальной технической необходимости", "Загрузчики всегда могут опираться на полностью инициализированную ОС и её стандартные библиотеки функций", "Написание загрузчика на высокоуровневом языке практически никогда не создаёт технических сложностей нигде"], "correct": 0, "explain": "Код, выполняющийся до инициализации ОС (загрузчики, некоторые части BIOS/UEFI), не может полагаться на удобства рантайма высокоуровневых языков (управление кучей, стандартные библиотеки), поэтому традиционно частично или полностью пишется на ассемблере, работающем напрямую с минимальным аппаратным контекстом.", "usage": {"code": false, "without": "Думаешь, что загрузчик можно спокойно писать на C со стандартной библиотекой.", "with": "Знаешь, что до старта ОС нет инициализированного рантайма и библиотек, нужен asm поверх голого железа.", "benefit": "Понимаешь, почему ранний код пишут на ассемблере."}}, {"q": "Специалист по безопасности анализирует эксплойт, использующий переполнение буфера в стеке (stack buffer overflow) для перезаписи адреса возврата функции. Как это напрямую связано с механизмом работы инструкций CALL/RET и организацией стека?", "options": ["Инструкция RET всегда полностью безопасно игнорирует любые сторонние изменения содержимого стека вызовов программы", "Переполнив буфер рядом с адресом возврата, атакующий перезаписывает его — RET прыгает по адресу атакующего", "Переполнение буфера в стеке совершенно никак не связано с сохранённым адресом возврата функции в памяти", "Адрес возврата функции физически невозможно перезаписать никаким переполнением буфера данных в стеке"], "correct": 1, "explain": "Классическая атака stack buffer overflow эксплуатирует именно то, что адрес возврата хранится в том же стеке, что и локальные буферы данных — при отсутствии защит (canary, ASLR, DEP) переполнение буфера может перезаписать этот адрес, перенаправив выполнение программы по указанию атакующего.", "usage": {"code": true, "without": "Не понимаешь, как переполнение буфера может «угнать» выполнение программы.", "with": "; локальный буфер и retaddr в одном стеке\n; переполнение buf перезаписывает адрес возврата -> RET прыгает куда надо атакующему", "benefit": "Понимаешь механику stack buffer overflow и роль защит."}}, {"q": "При портировании низкоуровневого кода с процессора x86 на архитектуру ARM разработчик обнаруживает, что весь ассемблерный код нужно переписывать практически с нуля, хотя высокоуровневая логика алгоритма остаётся неизменной. Какой вывод это иллюстрирует о природе ассемблерного программирования?", "options": ["Ассемблер привязан к ISA процессора, и порт между разными архитектурами требует полной переработки кода", "Ассемблерный код всегда автоматически переносим между любыми архитектурами процессоров без изменений вообще", "Высокоуровневую логику алгоритма никак нельзя отделить зврата."}}, {"q": "SIMD-инструкция обрабатывает 8 чисел одновременно за одну инструкцию, тогда как скалярный код тратит одну инструкцию на каждое число. Для массива из 6400 чисел сколько SIMD-инструкций потребуется вместо 6400 скалярных?", "options": ["1600", "100", "6400", "800"], "correct": 3, "explain": "6400 чисел / 8 чисел за одну SIMD-инструкцию = 800 инструкций вместо 6400 скалярных.", "usage": {"code": false, "without": "Не понимаешь, во сколько раз SIMD сокращает число инструкций для массива.", "with": "8 чисел за инструкцию: 6400 / 8 = 800 SIMD-инструкций вместо 6400.", "benefit": "Оцениваешь выигрыш векторизации: 800 инструкций."}}, {"q": "Из-за неверного предсказания ветвления процессор сбрасывает конвейер длиной 20 стадий, теряя эквивалент 20 тактов на каждый промах. Если промахи случаются в 5% из 1 000 000 переходов, сколько тактов суммарно потеряно на промахах предсказания?", "options": ["20000000", "1000000", "200000", "50000"], "correct": 1, "explain": "Число промахов = 1000000×0.05=50000. Потерянные такты = 50000×20=1000000 тактов.", "usage": {"code": false, "without": "Не умеешь оценить суммарный штраф от промахов предсказания.", "with": "Промахи: 1_000_000 * 0.05 = 50_000; такты: 50_000 * 20 = 1_000_000.", "benefit": "Считаешь цену misprediction: 1 000 000 тактов."}}, {"q": "Регистр процессора хранит 64-битное значение. Сколько байт это соответствует?", "options": ["16 байт", "4 байта", "8 байт", "64 байта"], "correct": 2, "explain": "64 бита / 8 бит в байте = 8 байт.", "usage": {"code": false, "without": "Путаешь биты и байты при разговоре о разрядности регистра.", "with": "64 бита / 8 бит в байте = 8 байт.", "benefit": "Верно переводишь разрядность: 64-битный регистр = 8 байт."}}, {"q": "Программа выполняет 10 000 вызовов функций (CALL/RET), каждый добавляющий и затем удаляющий 8 байт (адрес возврата) из стека. Сколько байт суммарно было временно использовано в стеке только под адреса возврата за все вызовы (не одновременно, а суммарно за всю и "Не понимаешь, как разворот цикла сокращает число проверок условия.", "with": "По 4 итерации в блок: 4000 / 4 = 1000 блоков с одной проверкой каждый.", "benefit": "Оцениваешь эффект unrolling: 1000 проверок вместо 4000."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  }

  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
