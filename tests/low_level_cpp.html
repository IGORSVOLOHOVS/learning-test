<!DOCTYPE html>
<html lang="ru">
<head>

<title>Низкоуровневый C++</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

<script>
(function () {
  const TEST_ID = "low_level_cpp";
  const QUESTIONS = [{"q": "Что такое указатель (pointer) в C++?", "options": ["Переменная, которая хранит адрес другой переменной в памяти", "Тип данных для хранения текстовых строк переменной длины", "Библиотечная функция для динамического выделения памяти", "Полный синоним ссылки без каких-либо отличий в работе"], "correct": 0, "explain": "Указатель — переменная, значением которой является адрес в памяти, где хранится другой объект или значение.", "usage": {"code": true, "without": "int a = 5;\nvoid f(int x); // работаем с копией значения", "with": "int a = 5;\nint* p = &a; // p хранит адрес a, доступ без копии", "benefit": "доступ к объекту по адресу без копирования"}}, {"q": "Чем ссылка (reference) в C++ принципиально отличается от указателя?", "options": ["Ссылка, как и указатель, может свободно хранить nullptr", "Ссылка и указатель взаимозаменяемы абсолютно во всех случаях", "Ссылка инициализируется сразу и потом не переназначается", "Ссылка всегда занимает заметно больше памяти, чем указатель"], "correct": 2, "explain": "Ссылка — это 'псевдоним' для существующего объекта: она обязательно инициализируется сразу и не может быть переназначена на другой объект в течение своего существования.", "usage": {"code": true, "without": "int* p;\np = nullptr; // может 'висеть' или быть переназначен", "with": "int a = 5;\nint& r = a; // обязана быть инициализирована, не переназначается", "benefit": "нельзя забыть инициализировать или обнулить"}}, {"q": "Что делает оператор new в C++?", "options": ["Освобождает ранее выделенную в куче динамическую память", "Выделяет память в куче и вызывает конструктор объекта", "Создаёт локальную переменную с автоматическим временем жизни", "Побайтово копирует значение одной переменной в другую"], "correct": 1, "explain": "Оператор new выделяет память в динамической области (куче) и, при необходимости, вызывает конструктор для инициализации объекта в этой памяти.", "usage": {"code": true, "without": "T* p = (T*)malloc(sizeof(T)); // память есть, но конструктор НЕ вызван", "with": "T* p = new T(); // выделяет память и вызывает конструктор", "benefit": "объект сразу корректно проинициализирован"}}, {"q": "Что делает оператор delete в C++?", "options": ["Заново компилирует и оптимизирует исходный код программы", "Удаляет имя переменной из текущей области видимости кода", "Освобождает память из new, вызвав деструктор объекта", "Выделяет новый блок динамической памяти под объект"], "correct": 2, "explain": "delete освобождает память, выделенную new, предварительно вызывая деструктор объекта для корректной очистки ресурсов.", "usage": {"code": true, "without": "T* p = new T();\n// забыли delete -> утечка", "with": "T* p = new T();\ndelete p; // освобождает память и вызывает деструктор", "benefit": "память освобождается, ресурсы очищаются"}}, {"q": "Что такое утечка памяти (memory leak)?", "options": ["Выделенная динамическая память не освобождается и теряется", "Ошибка компиляции, связанная с несовместимостью типов данных", "Ситуация, когда программа использует слишком мало памяти", "Автоматическая очистка памяти встроенным сборщиком мусора"], "correct": 0, "explain": "Утечка памяти происходит, когда программа теряет последнюю ссылку/указатель на выделенный в куче блок памяти, не освободив его — эта память остаётся занятой до завершения процесса.", "usage": {"code": true, "without": "void f(){ int* p = new int[100]; } // p потерян -> утечка", "with": "void f(){ int* p = new int[100]; delete[] p; } // освобождено", "benefit": "память не теряется при выходе из функции"}}, {"q": "Что такое 'умный указатель' (smart pointer), например std::unique_ptr?", "options": ["Указатель, сам управляющий временем жизни своего объекта", "Обычный указатель с ускоренным доступом к памяти в куче", "Указатель, который запрещено разыменовывать оператором *", "Синтаксический синоним обычного указателя без отличий"], "correct": 0, "explain": "Умные указатели (unique_ptr, shared_ptr) оборачивают сырой указатель и автоматически вызывают delete при выходе объекта из области видимости, следуя принципу RAII.", "usage": {"code": true, "without": "T* p = new T();\n// ... delete p; легко забыть", "with": "auto p = std::make_unique<T>(); // delete вызовется автоматически", "benefit": "автоматическое освобождение, без утечек"}}, {"q": "Что означает термин RAII (Resource Acquisition Is Initialization) в C++?", "options": ["Метод агрессивной оптимизации вложенных циклов компилятором", "Захват ресурса в конструкторе, освобождение в деструкторе", "Другое название механизма умных указателей стандарта C++", "Способ существенного ускорения компиляции больших проектов"], "correct": 1, "explain": "RAII — фундаментальный идиоматический принцип C++, привязывающий время жизни ресурса к времени жизни объекта: ресурс захватывается в конструкторе и освобождается в деструкторе.", "usage": {"code": true, "without": "FILE* f = fopen(\"a\",\"r\");\n// при исключении fclose не вызовется", "with": "std::ifstream f(\"a\"); // деструктор закроет файл сам", "benefit": "ресурс освобождается даже при исключении"}}, {"q": "Что такое разыменование указателя (dereferencing)?", "options": ["Присваивание указателю специального значения nullptr", "Доступ к значению по хранимому адресу через оператор *", "Удаление указателя и освобождение занятой им памяти", "Преобразование адреса указателя в целое число"], "correct": 1, "explain": "Оператор * применительно к указателю ('разыменование') даёт доступ к значению объекта, расположенного по адресу, хранящемуся в указателе.", "usage": {"code": true, "without": "int* p = &a;\n// есть адрес, но нужно значение", "with": "int v = *p; // разыменование даёт значение по адресу", "benefit": "доступ к значению объекта по его адресу"}}, {"q": "Что такое стек (stack) и куча (heap) применительно к управлению памятью в C++?", "options": ["Стек и куча — два равнозначных названия одной области", "Стек — локальные переменные автоматически, куча — вручную", "Куча всегда быстрее стека по скорости доступа к данным", "Стек предназначен только для хранения глобальных переменных"], "correct": 1, "explain": "Стек автоматически управляет памятью локальных переменных функций (выделение/освобождение при входе/выходе из области видимости), тогда как куча — область для динамической памяти с ручным (или через RAII) управлением временем жизни.", "usage": {"code": true, "without": "T* p = new T(); // куча: нужно вручную delete", "with": "T t; // стек: освободится сам при выходе из области", "benefit": "автоматическое время жизни локальных переменных"}}, {"q": "Что такое nullptr в современном C++?", "options": ["Значение указателя, не ссылающегося на объект", "Специальный тип данных для хранения текстовых строк", "Функция для проверки корректности переданного указателя", "Полный синоним числа 0 без отличий в типизации кода"], "correct": 0, "explain": "nullptr — типобезопасное литеральное значение, введённое в C++11 для явного обозначения указателя, не указывающего ни на один объект, в отличие от менее безопасного использования литерала 0 или макроса NULL.", "usage": {"code": true, "without": "void f(int);\nvoid f(char*);\nf(NULL); // NULL==0 -> может вызвать f(int)", "with": "f(nullptr); // однозначно вызовет f(char*)", "benefit": "типобезопасность, нет путаницы с целым 0"}}, {"q": "Почему разыменование 'висячего указателя' (dangling pointer, указывающего на уже освобождённую память) приводит к неопределённому поведению (undefined behavior), а не к предсказуемой ошибке?", "options": ["Адрес остаётся, но содержимое по нему непредсказуемо, проверок нет", "Разыменование висячего указателя всегда даёт ошибку компиляции", "Неопределённое поведение гарантирует предупреждение перед крахом", "Висячие указатели среда автоматически обнуляет сразу после delete"], "correct": 0, "explain": "C++ как язык с ручным управлением памятью не гарантирует автоматическую проверку валидности указателей во время выполнения; после delete указатель продолжает хранить прежний числовой адрес, а фактическое содержимое памяти по этому адресу становится непредсказуемым.", "usage": {"code": true, "without": "delete p;\nint x = *p; // use-after-free -> UB", "with": "delete p;\np = nullptr;\nif(p) x = *p; // безопасная проверка", "benefit": "нет обращения к освобождённой памяти"}}, {"q": "Почему std::unique_ptr не допускает копирования (только перемещение, move), в отличие от std::shared_ptr?", "options": ["Запрет копирования unique_ptr — произвольное ограничение без смысла", "unique_ptr технически не способен хранить адрес, копия невозможна", "Копирование unique_ptr работает точно так же, как у shared_ptr", "Единоличное владение: копия дала бы двух владельцев и double free"], "correct": 3, "explain": "unique_ptr моделирует единоличное владение: разрешение копирования привело бы к двум указателям, полагающим себя единственным владельцем, что вызвало бы двойное освобождение памяти (double free) — поэтому копирование запрещено, разрешено только перемещение (move), передающее владение.", "usage": {"code": true, "without": "T* p = new T();\nT* q = p;\ndelete p; delete q; // double free!", "with": "auto p = std::make_unique<T>();\nauto q = std::move(p); // владение передано, p пуст", "benefit": "исключено двойное освобождение"}}, {"q": "Почему std::shared_ptr использует подсчёт ссылок (reference counting), и какой ценой это достигается по сравнению с unique_ptr?", "options": ["shared_ptr всегда быстрее unique_ptr за счёт дополнительного функционала", "Подсчёт ссылок в shared_ptr не несёт вообще никаких накладных расходов", "shared_ptr не считает ссылки — этим занимается только unique_ptr", "Считает владельцев, чистит у последнего — ценой счётчика и атомарности"], "correct": 3, "explain": "Механизм совместного владения shared_ptr требует хранения и атомарного обновления счётчика ссылок (чтобы корректно работать в многопоточной среде), что даёт дополнительные накладные расходы по памяти и по времени выполнения по сравнению с более лёгким unique_ptr.", "usage": {"code": true, "withou ется даже при исключении"}}, {"q": "Почему указатели на функции (function pointers) и позже std::function/лямбда-выражения архитектурно важны для реализации полиморфного поведения без использования наследования классов?", "options": ["std::function и лямбды были в C++ с первых версий без изменений", "Указатели на функции нельзя передавать параметрами другим функциям", "Позволяют передавать поведение как значение без иерархии классов", "Полиморфизм в C++ возможен только через наследование и vtable"], "correct": 2, "explain": "Указатели на функции и их современные развития (std::function, лямбды) реализуют форму 'полиморфизма поведения' на уровне функций, а не объектов — это более лёгкий, часто более эффективный механизм по сравнению с виртуальными функциями и наследованием там, где не нужна полноценная иерархия классов.", "usage": {"code": true, "without": "struct Op{ virtual int f(int)=0; }; // ради поведения — иерархия классов", "with": "std::function<int(int)> op = [](int x){ return x*2; };", "benefit": "гибкая передача поведения без наследования"}}, {"q": "Как компромисс между безопасностью типов (type safety) и низкоуровневым контролем проявляется в использовании reinterpret_cast и других явных приведений типов в C++?", "options": ["reinterpret_cast равен static_cast по безопасности и проверкам", "reinterpret_cast всегда безопасен и проверяется при компиляции", "Явные приведения типов в C++ никогда не приводят к ошибкам", "Даёт контроль над битами, но обходит проверки типов компилятора"], "correct": 3, "explain": "В отличие от более безопасного static_cast, reinterpret_cast — инструмент 'обхода' системы типов компилятора для низкоуровневых задач (сериализация, работа с сырой памятью), и его использование требует, чтобы сам программист гарантировал корректность, так как компилятор не может проверить безопасность такого приведения.", "usage": {"code": true, "without": "float f=1.5f;\n// нужно увидеть биты, но static_cast скопирует значение", "with": "auto bits = * ", "usage": {"code": true, "without": "int& r = getValue(); // ошибка: ссылка на временный объект", "with": "const int& r = getValue(); // (или int&&) время жизни продлевается", "benefit": "нет ссылки на уже уничтоженный временный объект"}}, {"q": "Почему в системах с жёсткими требованиями к предсказуемости времени выполнения (real-time системы) часто избегают динамической аллокации памяти (new/malloc) во время основного цикла работы программы?", "options": ["Аллокация в куче всегда идёт за строго постоянное время", "Системы реального времени не знают ограничений по времени", "Единственная причина отказа от new — экономия памяти, не время", "Время аллокатора кучи непостоянно из-за фрагментации"], "correct": 3, "explain": "Классический аллокатор кучи общего назначения не даёт строгих гарантий времени выполнения (worst-case execution time) из-за возможной фрагментации и внутренней сложности поиска свободного блока — поэтому системы реального времени часто предпочитают заранее выделенные статические буферы или специализированные пулы с предсказуемым поведением.", "usage": {"code": true, "without": "while(running){ auto* b = new int[N]; delete[] b; } // непредсказуемо", "with": "int buf[N];\nwhile(running){ /* ... */ } // предвыделено, без аллокаций в цикле", "benefit": "предсказуемое, ограниченное время реакции"}}, {"q": "Как принцип инкапсуляции доступа к памяти через классы-обёртки (wrapper classes, например для сырых массивов) помогает предотвратить типичные низкоуровневые ошибки, такие как выход за границы массива?", "options": ["Выход за границы массива в C++ невозможен любым способом доступа", "Обёртка хранит указатель и размер и проверяет границы доступа", "Инкапсуляция доступа к памяти не связана с выходом за границы", "Обёртки над массивами не дают гарантий сверх сырых указателей"], "correct": 1, "explain": "Классы-контейнеры (например, std::vector или собственные обёртки) объединяют указатель на данные с информацией о размере и часто предоставляют дополнитель чение: атомарность операций с самим счётчиком ссылок shared_ptr не означает автоматической потокобезопасности операций с содержимым объекта — для защиты данных внутри объекта при многопоточном доступе всё равно требуется явная синхронизация (мьютексы и т.п.).", "usage": {"code": true, "without": "// счётчик атомарен, но пишем в *sp из 2 потоков без мьютекса -> гонка", "with": "std::lock_guard<std::mutex> g(m);\nsp->data = x; // защищаем сами данные", "benefit": "нет состояния гонки при доступе к объекту"}}, {"q": "Инженер оптимизирует высоконагруженный сервис и обнаруживает, что функция часто возвращает большой объект по значению, и профилировщик показывает неожиданно малые затраты на копирование, вопреки ожиданиям. Какая оптимизация компилятора, вероятно, объясняет это наблюдение?", "options": ["Возврат по значению в C++ всегда требует полной копии объекта", "Компилятор в этом случае гарантированно ошибся в оптимизации", "RVO/NRVO: объект строится прямо в памяти вызывающей стороны", "RVO — устаревшая оптимизация, которой нет в новых компиляторах"], "correct": 2, "explain": "RVO/NRVO — широко поддерживаемая оптимизация компиляторов (а с C++17 частично гарантированная стандартом для некоторых случаев), позволяющая избежать лишнего копирования/перемещения при возврате объекта из функции по значению.", "usage": {"code": true, "without": "Big make(){ Big b; return b; }\nBig x = make(); // ожидаем лишнюю копию", "with": "// RVO/NRVO: b конструируется прямо в x, копии нет", "benefit": "исключается лишнее копирование при возврате"}}, {"q": "Встраиваемая (embedded) система с жёстким ограничением по времени реакции периодически 'подвисает' на непредсказуемо долгое время, и профилирование указывает на вызовы malloc/free внутри основного управляющего цикла. Какое архитектурное изменение наиболее уместно?", "options": ["Перенести аллокацию в init, в цикле — статика или пул памяти", "Увеличить частоту malloc/free, чтобы усреднить время ожидания", "Проблема не в памяти, поможет лишь замена процессора на быстрый", "Единственный выход — переписать всё с C++ на чистый ассемблер"], "correct": 0, "explain": "Это классическая рекомендация для систем реального времени: перенести всю динамическую аллокацию на этап инициализации (вне горячего пути), используя статические буферы или пулы памяти с предсказуемым, ограниченным временем выполнения в самом критичном цикле.", "usage": {"code": true, "without": "while(1){ void* p=malloc(64); free(p); } // подвисания в цикле", "with": "static char buf[64]; // malloc только в init, в цикле — статика/пул", "benefit": "предсказуемое время в основном цикле"}}, {"q": "Структура содержит поля: int (4 байта), char (1 байт), int (4 байта). Без учёта выравнивания сумма размеров полей была бы 9 байт. С учётом типичного выравнивания по 4 байта итоговый размер структуры обычно составляет:", "options": ["12 байт", "16 байт", "10 байт", "9 байт"], "correct": 0, "explain": "Из-за выравнивания по 4 байта после char добавляется 3 байта заполнения, чтобы второй int начинался с адреса, кратного 4: 4+1+3(padding)+4=12 байт.", "usage": {"code": true, "without": "struct S{ int a; char b; int c; }; // сумма полей 9 байт", "with": "// sizeof(S)==12: 3 байта padding после b, чтобы c был кратен 4", "benefit": "правильный расчёт размера: 12, а не 9"}}, {"q": "Программа выделяет в цикле 1000 объектов по 64 байта каждый через new, но забывает вызывать delete для каждого. Сколько байт памяти в итоге 'утечёт' за один проход цикла?", "options": ["около 1000 байт", "около 64 байт", "около 32000 байт", "около 64000 байт"], "correct": 3, "explain": "1000 объектов × 64 байта = 64000 байт утечки за один проход цикла.", "usage": {"code": true, "without": "for(int i=0;i<1000;++i) new char[64]; // утечка 64000 байт за проход", "with": "for(int i=0;i<1000;++i){ auto p=std::make_unique<char[]>(64); } // 0 утечки", "benefit": "64000 байт не теряются"}}, {"q": "Функция вызывается 10000 раз и передаёт объект размером 200 байт по значению вместо ссылки, "void f(Obj o); // 2000 вызовов × 500 байт = 1000000 байт копий", "with": "void f(const Obj& o); // копирования нет", "benefit": "устранён ~1 МБ копирования"}}, {"q": "Пул памяти (memory pool) заранее выделяет один блок в 1 МБ для повторного использования вместо частых мелких аллокаций по 1 КБ. Сколько объектов по 1 КБ теоретически помещается в этот пул?", "options": ["около 500 объектов", "около 10000 объектов", "около 100 объектов", "около 1000 объектов"], "correct": 3, "explain": "1 МБ = 1024 КБ ≈ 1000 КБ (округлённо для простоты расчёта); 1000/1=1000 объектов по 1 КБ.", "usage": {"code": true, "without": "for(int i=0;i<1000;++i) new char[1024]; // 1000 мелких аллокаций", "with": "char pool[1024*1000]; // один блок 1 МБ на 1000 объектов по 1 КБ", "benefit": "1000 аллокаций заменены одной"}}, {"q": "Циклическая структура из 3 объектов (A→B→C→A) использует shared_ptr для каждой связи. Если все внешние ссылки на эту группу объектов удалены, сколько объектов будет освобождено автоматически (без вмешательства программиста, используя только shared_ptr без weak_ptr)?", "options": ["0 объектов", "1 объект", "2 объекта", "3 объекта"], "correct": 0, "explain": "Из-за циклической зависимости счётчик ссылок каждого объекта никогда не достигает нуля (каждый поддерживается следующим в цикле), поэтому 0 объектов будет освобождено — классическая утечка памяти при использовании только shared_ptr в цикле.", "usage": {"code": true, "without": "// A->B->C->A через shared_ptr: 0 объектов освобождено (утечка)", "with": "// одну связь сделать weak_ptr -> все 3 объекта освобождаются", "benefit": "цикл разрывается, память возвращается"}}, {"q": "Функция аллоцирует и корректно освобождает память 1 миллион раз за время работы программы, каждый раз выделяя и освобождая 128 байт. Если бы каждая аллокация не освобождалась (утечка), сколько байт было бы потеряно суммарно?", "options": ["около 1280000000 байт", "около 128 байт", "около 128000 байт", "около 128000000 байт"], "correct": 3, "explain": "1000000×128=128000000 байт (около 128 МБ) суммарной утечки при отсутствии освобождения.", "usage": {"code": true, "without": "for(int i=0;i<1000000;++i) new char[128]; // без free утечка 128000000 байт", "with": "for(int i=0;i<1000000;++i){ std::vector<char> b(128); } // авто-освобождение", "benefit": "~128 МБ не теряются"}}, {"q": "unique_ptr перемещается (move) между 4 функциями последовательно (A передаёт B, B передаёт C, C передаёт D). Сколько объектов реально существует в памяти на протяжении всей этой цепочки перемещений (без учёта копирования)?", "options": ["3 объекта", "4 объекта", "1 объект", "2 объекта"], "correct": 2, "explain": "Move semantics не создают новых копий объекта — на протяжении всей цепочки передач существует ровно 1 физический объект, чьё владение просто передаётся от функции к функции.", "usage": {"code": true, "without": "// копирование через 4 функции создало бы лишние копии объекта", "with": "auto p=std::make_unique<T>();\nb(std::move(p)); // 1 объект, владение передаётся", "benefit": "по цепочке живёт ровно 1 объект, без копий"}}, {"q": "Структура выравнивается по границе 8 байт и содержит поля: char (1 байт) и double (8 байт). Сколько байт padding компилятор, скорее всего, добавит после char, чтобы double начинался с адреса, кратного 8?", "options": ["8 байт", "0 байт", "7 байт", "3 байта"], "correct": 2, "explain": "После char (1 байт) нужно добавить 7 байт padding, чтобы double начинался с позиции 8 (кратной 8), так как выравнивание double обычно равно 8 байтам.", "usage": {"code": true, "without": "struct S{ char c; double d; }; // ждём 9 байт", "with": "// 7 байт padding после c, чтобы d был кратен 8 -> sizeof(S)==16", "benefit": "корректный учёт выравнивания: 7 байт padding"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
