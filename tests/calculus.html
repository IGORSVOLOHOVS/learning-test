<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Математический анализ (производные, цепное правило)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

</div>

<script>
(function () {
  const TEST_ID = "calculus";
  const QUESTIONS = [{"q": "Что такое производная функции в точке?", "options": ["Значение самой функции, вычисленное в этой точке", "Наибольшее значение функции на всей области", "Мгновенная скорость изменения функции в этой точке", "Площадь фигуры под графиком функции слева от точки"], "correct": 2, "explain": "Производная f'(x) = lim(h→0) [f(x+h)-f(x)]/h — скорость изменения функции в точке x.", "usage": {"code": true, "without": "Оцениваем скорость как среднюю на большом интервале: (f(2)-f(0))/2 — грубо и мимо реального наклона в точке.", "with": "Берём предел приращений при малом h:\nh=1e-6\nf=lambda x:x**2\nslope=(f(x+h)-f(x))/h  # ~ f'(x)", "benefit": "Точный наклон именно в точке, а не усреднённый."}}, {"q": "Чему равна производная константы?", "options": ["Бесконечности при любой заданной константе", "Единице независимо от самой константы", "Значению именно этой самой заданной константы", "Нулю — ведь константа вовсе не меняется"], "correct": 3, "explain": "Производная константы всегда равна 0, так как константа не меняется.", "usage": {"code": false, "without": "Пытаемся искать 'скорость изменения' у постоянной величины, ожидая ненулевое число, и путаемся.", "with": "Сразу знаем: производная константы равна 0 — постоянная величина не меняется, скорости изменения нет.", "benefit": "Мгновенный ответ без вычислений."}}, {"q": "Чему равна производная функции f(x) = xⁿ?", "options": ["n·x, степень понижается сразу до единицы", "n·x^(n-1) по степенному правилу", "x^(n-1) без множителя-степени впереди", "x^n / n, как при интегрировании"], "correct": 1, "explain": "Степенное правило: d/dx[xⁿ] = n·x^(n-1).", "usage": {"code": true, "without": "Дифференцируем x**5 через предел (f(x+h)-f(x))/h вручную, раскрывая бином — долго и с риском ошибки.", "with": "Степенное правило n*x**(n-1):\nn=5\nderiv=lambda x:n*x**(n-1)", "benefit": "Производная степени за одну строку."}}, {"q": "Что такое предел функции?", "options": ["Производная функции, вычисленная в данной точке", "Определённый интеграл функции на всём отрезке", "Значение, к которому стремится функция у точки", "Наибольшее значение функции на всей её области"], "correct": 2, "explain": "Предел lim(x→a) f(x) описывает поведение функции вблизи точки a, даже если f(a) не определено.", "usage": {"code": false, "without": "Судим о поведении функции у точки только по f(a); если f(a) не определено — делаем вывод, что сказать нечего.", "with": "Смотрим предел lim(x→a) f(x): он описывает, к чему стремится функция вблизи a, даже когда сама точка выколота.", "benefit": "Понимаем поведение там, где значение не задано."}}, {"q": "Что такое интеграл функции (неопределённый)?", "options": ["Мгновенная скорость изменения данной функции в точке", "Первообразная: её производная даёт исходную функцию", "Наибольшее значение функции на всей области", "Значение исходной функции, взятое в точке ноль"], "correct": 1, "explain": "Неопределённый интеграл ∫f(x)dx = F(x)+C, где F'(x)=f(x) — обратная операция к дифференцированию.", "usage": {"code": false, "without": "Ищем функцию, скорость которой равна данной, методом угадывания без системы.", "with": "Берём неопределённый интеграл ∫f dx = F+C — первообразную, чью производную возвращает исходную f.", "benefit": "Систематически обращаем дифференцирование."}}, {"q": "Что вычисляет определённый интеграл ∫[a,b] f(x)dx геометрически?", "options": ["Площадь под графиком между a и b (со знаком)", "Периметр криволинейной фигуры под графиком", "Наклон касательной к графику функции в точке a", "Значение первой производной функции в точке b"], "correct": 0, "explain": "Определённый интеграл равен алгебраической (со знаком) площади между графиком функции и осью x на отрезке [a,b].", "usage": {"code": true, "without": "Считаем площадь под кривой, разбивая на пару прямоугольников на глаз — грубая оценка.", "with": "Определённый интеграл как площадь со знаком:\nimport numpy as np\nx=np.linspace(0,2,1000)\narea=np.trapz(x**2,x)", "benefit": "Точная знаковая площадь под графиком."}}, {"q": "Что такое точка перегиба функции?", "options": ["Точка локального максимума самой функции", "Точка, где первая производная не существует", "Точка, где функция обращается в ноль", "Точка, где вторая производная меняет знак"], "correct": 3, "explain": "В точке перегиба f''(x) меняет знак — график переходит от выпуклости к вогнутости (или наоборот).", "usage": {"code": false, "without": "Ищем смену выпуклости, глядя на график глазами, и легко пропускаем перегиб.", "with": "Находим точку перегиба там, где f''(x) меняет знак — формальный критерий смены выпуклости на вогнутость.", "benefit": "Точное расположение перегиба без догадок."}}, {"q": "Что означает, что функция непрерывна в точке?", "options": ["Функция определена только в этой единственной точке", "Функция имеет конечную производную в этой точке", "Функция обращается в ноль именно в этой точке", "Предел в точке существует и равен значению функции"], "correct": 3, "explain": "Непрерывность требует: f(a) определено, существует lim(x→a) f(x), и этот предел равен f(a).", "usage": {"code": false, "without": "Считаем функцию 'нормальной' в точке, лишь бы f(a) существовало, игнорируя разрывы и скачки.", "with": "Проверяем три условия непрерывности: f(a) определено, предел в a существует и равен f(a), совпадая слева и справа.", "benefit": "Ловим разрывы, которые проверка по одному значению пропускает."}}, {"q": "Что такое частная производная функции нескольких переменных?", "options": ["Интеграл функции сразу по всем её переменным", "Сумма частных производных по всем переменным", "Производная функции исключительно по времени процесса", "Производная по одной переменной, прочие фиксированы"], "correct": 3, "explain": "Частная производная ∂f/∂x показывает скорость изменения f по x, считая остальные переменные константами.", "usage": {"code": true, "without": "Меняем сразу все переменные и не можем понять вклад именно x в изменение f.", "with": "Частная производная по x при фиксированном y:\nh=1e-6\nf=lambda x,y:x**2*y\ndfdx=(f(x+h,y)-f(x,y))/h", "benefit": "Изолируем влияние одной переменной."}}, {"q": "Что такое градиент функции нескольких переменных?", "options": ["Значение функции, вычисленное в начале координат", "Квадратная матрица всех вторых частных производных", "Среднее арифметическое значений функции на области", "Вектор частных производных — направление роста"], "correct": 3, "explain": "Градиент ∇f = (∂f/∂x1,...,∂f/∂xn) — вектор, указывающий направление наибольшего возрастания функции в данной точке.", "usage": {"code": true, "without": "Ищем направление роста функции, пробуя случайные шаги во все стороны и сравнивая.", "with": "Собираем градиент из частных производных — вектор наискорейшего роста:\ngrad=np.array([df_dx, df_dy])", "benefit": "Сразу знаем направление максимального возрастания."}}, {"q": "В чём смысл цепного правила (chain rule) дифференцирования?", "options": ["Правило применимо только к тригонометрическим функциям", "Производная сложной функции равна f'(g(x))·g'(x)", "Производная суммы функций равна сумме их производных", "Производная любой сложной функции всегда равна нулю"], "correct": 1, "explain": "Цепное правило (df/dx = df/dg · dg/dx) позволяет дифференцировать композиции функций, разбивая задачу на более простые шаги.", "usage": {"code": true, "without": "Дифференцируем sin(x**2) как sin, забывая про внутреннюю функцию, — получаем неверное cos(x**2).", "with": "Цепное правило: внешняя по внутренней на производную внутренней:\n# d/dx sin(x^2) = cos(x^2)*2x", "benefit": "Корректная производная композиции функций."}}, {"q": "Почему цепное правило является основой алгоритма обратного распространения ошибки (backpropagation) в нейросетях?", "options": ["Нейросети вычисляют исключительно интегралы, но не производные", "Backpropagation вообще не опирается на понятие производной", "Сеть — композиция слоёв, градиент — произведение производных", "Цепное правило действует лишь для одного слоя нейросети"], "correct": 2, "explain": "Backprop последовательно применяет цепное правило слой за слоем от выхода к входу, эффективно вычисляя градиенты сложной композитной функции.", "usage": {"code": true, "without": "Пытаемся найти градиент потерь по весам первого слоя одной формулой для всей сети — нереально.", "with": "Backprop применяет цепное правило слой за слоем от выхода к входу:\ngrad=upstream_grad*local_grad  # на каждом слое", "benefit": "Градиенты глубокой сети считаются эффективно и по частям."}}, {"q": "В чём разница между локальным и глобальным экстремумом функции?", "options": ["Для любых функций это по сути одно и то же понятие", "Глобальный экстремум всегда лежит в точке ноль", "Локальный — лучший в окрестности, глобальный — на области", "Локальный экстремум встречается только у линейных функций"], "correct": 2, "explain": "Функция может иметь несколько локальных максимумов/минимумов, но только один (или несколько равных) глобальный максимум/минимум на всей области.", "usage": {"code": false, "without": "Найдя один минимум, объявляем его наилучшим на всей области, рискуя ошибиться.", "with": "Различаем локальный (лучший в окрестности) и глобальный (лучший на всей области) экстремум и проверяем все кандидаты.", "benefit": "Не принимаем локальный оптимум за глобальный."}}, {"q": "Почему условие f'(x)=0 необходимо, но не достаточно для того, чтобы точка была экстремумом?", "options": ["Это условие всегда достаточно само по себе для экстремума", "Для гладкой функции равенство f'(x)=0 попросту невозможно", "Может быть перегиб с касательной: f'=0, но экстремума нет", "Равенство f'(x)=0 всегда гарантирует именно максимум"], "correct": 2, "explain": "Классический пример: f(x)=x³ имеет f'(0)=0, но x=0 — не экстремум, а точка перегиба.", "usage": {"code": true, "without": "Найдя f'(x)=0, сразу объявляем точку экстремумом — и ошибаемся на x**3 в нуле.", "with": "Проверяем знак вокруг точки или f'':\nf=lambda x:x**3\n# f'(0)=0, но это перегиб, не экстремум", "benefit": "Отсеиваем ложные экстремумы."}}, но равен функции на всей её области", "Ряд по производным в точке приближает лишь вблизи неё", "Многочлен Тейлора при любой функции всегда линеен"], "correct": 2, "explain": "Тейлоровское разложение основано на локальной информации (значениях производных в точке) и по построению теряет точность по мере удаления от этой точки, если функция не полином.", "usage": {"code": true, "without": "Заменяем сложную функцию одним полиномом и ждём точности везде — вдали от точки ошибка взрывается.", "with": "Ряд Тейлора вокруг точки a приближает локально:\n# f(x)≈f(a)+f'(a)(x-a)+f''(a)(x-a)^2/2\n# точно лишь вблизи a", "benefit": "Знаем зону, где приближение надёжно."}}, {"q": "Почему седловые точки представляют особую проблему для градиентного спуска в многомерной оптимизации нейросетей?", "options": ["Градиентный спуск вовсе никогда не встречает седловых точек", "Седловые точки существуют только у одномерных функций", "У седла градиент мал по части направлений, обучение вязнет", "Седловые точки всегда суть глобальные минимумы, и это хорошо"], "correct": 2, "explain": "В высокоразмерных пространствах седловые точки встречаются значительно чаще локальных минимумов, и малый градиент рядом с ними может резко замедлить обучение.", "usage": {"code": false, "without": "Ожидаем, что при нулевом градиенте обучение всегда стоит в минимуме, и не понимаем замедлений.", "with": "Учитываем седловые точки: рядом с ними градиент мал по части направлений, обучение вязнет, хотя это не минимум.", "benefit": "Объясняем и предвидим застревание оптимизатора."}}, {"q": "Почему для функции нескольких переменных условие ∇f=0 (градиент равен нулю) — необходимое, но не достаточное условие экстремума, аналогично одномерному случаю?", "options": ["В многомерном случае нулевой градиент всегда означает минимум", "Нулевой градиент может быть седлом — нужен анализ гессиана", "Условие ∇f=0 всегда достаточно само по себе для экстремума", "Многомерные функции вообще не имеют критических точек"], "correct": 1, "explain": "Это прямое обобщение одномерного случая: необходимо дополнительно исследовать вторые производные (гессиан) для классификации типа критической точки.", "usage": {"code": false, "without": "В многомерии, увидев ∇f=0, сразу считаем точку минимумом или максимумом.", "with": "Как и в 1D, проверяем гессиан: нулевой градиент может быть седлом, а не экстремумом.", "benefit": "Корректная классификация многомерных критических точек."}}, {"q": "Как понятие интеграла помогает вычислить среднее значение непрерывной функции на интервале?", "options": ["Среднее равно (1/(b-a)) на интеграл f(x) по [a,b]", "Среднее значение всегда равно значению функции в точке a", "Интеграл вообще не связан со средним значением функции", "Среднее равно производной функции в середине интервала"], "correct": 0, "explain": "Формула среднего значения функции через интеграл обобщает понятие среднего арифметического на случай непрерывного (бесконечного) множества значений.", "usage": {"code": true, "without": "Усредняем функцию, взяв несколько значений и поделив, — грубо для непрерывной функции.", "with": "Среднее через интеграл:\nmean=np.trapz(f(x),x)/(b-a)", "benefit": "Точное среднее по бесконечному множеству значений."}}, {"q": "Почему при оптимизации с ограничениями (constrained optimization) используют метод множителей Лагранжа, опирающийся на градиенты функции и ограничения?", "options": ["В оптимуме градиент цели коллинеарен градиенту ограничения", "Метод работает исключительно при полном отсутствии ограничений", "Множители Лагранжа применимы только к линейным функциям", "Метод Лагранжа совсем не использует понятие градиента"], "correct": 0, "explain": "Условие ∇f = λ∇g в точке условного оптимума — геометрическая интерпретация того, что нельзя улучшить f, оставаясь на поверхности ограничения g=0, без изменения λ.", "usage": {"code": false, "without": "Решаем задачу с ограничением, вручную выражая одну переменную через другую — громоздко и не всегда возможно.", "with": "Метод Лагранжа: в оптимуме ∇f=λ∇g, что даёт систему уравнений без явного исключения переменных.", "benefit": "Условный экстремум находится без подстановок."}}, {"q": "Почему в методах оптимизации второго порядка (например, метод Ньютона) используется не только градиент, но и гессиан (матрица вторых производных)?", "options": ["Гессиан задаёт кривизну и даёт более точный шаг к минимуму", "Метод Ньютона вообще не использует никаких производных функции", "Гессиан не влияет на скорость сходимости методов оптимизации", "Гессиан всегда обращается в ноль в точках экстремума функции"], "correct": 0, "explain": "Метод Ньютона использует обратный гессиан для масштабирования шага, что позволяет учитывать локальную кривизну и часто сходиться быстрее, чем обычный градиентный спуск.", "usage": {"code": true, "without": "Двигаемся только по градиенту фиксированным шагом, игнорируя кривизну, и медленно сходимся в оврагах.", "with": "Метод Ньютона учитывает гессиан:\nstep=np.linalg.solve(H, grad)\nw=w-step", "benefit": "Учёт кривизны ускоряет сходимость."}}, {"q": "Почему при анализе устойчивости динамической системы (например, в теории управления) важно знать знак производной функции состояния вблизи точки равновесия?", "options": ["Знак производной говорит, вернётся ли система к равновесию", "Устойчивость задаётся исключительно начальными условиями системы", "Знак производной никак не связан с устойчивостью системы", "Все системы устойчивы вне зависимости от знака производной"], "correct": 0, "explain": "Линеаризация вблизи точки равновесия и анализ знака производной (или собственных значений в многомерном случае) — стандартный инструмент анализа устойчивости в теории управления.", "usage": {"code": false, "without": "Судим об устойчивости равновесия по одним начальным условиям, не глядя на динамику отклонений.", "with": "Анализируем знак производной у равновесия: отрицательный возвращает систему назад (устойчивость), положительный уводит.", "benefit": "Предсказываем устойчивость до запуска системы."}}, {"q": "Инженер заметил, что функция потерь модели перестала уменьшаться, хотя градиент не равен строго нулю, а очень мал. Какое объяснение наиболее вероятно с точки зрения анализа?", "options": ["Такая ситуация с математической точки зрения невозможна", "Малый градиент всегда означает достигнутый глобальный минимум", "Модель на плато или у седла, а не обязательно в минимуме", "Нужно срочно остановить обучение — модель полностью сломана"], "correct": 2, "explain": "Плато и седловые точки в сложных ландшафтах функции потерь часто дают маленький, но ненулевой градиент, замедляя, но не останавливая обучение полностью.", "usage": {"code": false, "without": "Увидев малый ненулевой градиент, заключаем, что достигнут глобальный минимум, и останавливаем обучение.", "with": "Понимаем, что это скорее плато или окрестность седла: градиент мал, но минимум не гарантирован.", "benefit": "Не путаем плато с настоящим оптимумом."}}, {"q": "При анализе функции прибыли компании P(x) (x — количество единиц товара) обнаружено, что P'(x)=0 при x=100 и P''(100)<0. Что это означает для бизнеса?", "options": ["x=100 — локальный максимум прибыли, близкий к оптимуму", "Эти данные вовсе ничего не говорят о поведении прибыли", "Прибыль полностью обращается в ноль при объёме x=100", "Значение x=100 оказывается точкой минимума прибыли"], "correct": 0, "explain": "P'(100)=0 и P''(100)<0 — классические условия локального максимума (выпуклость вниз в этой точке), что для функции прибыли означает оптимальный объём выпуска.", "usage": {"code": false, "without": "Видя P'(100)=0, не можем сказать, максимум это или минимум прибыли.", "with": "P'(100)=0 и P''(100)<0 — условия локального максимума, значит объём 100 близок к оптимальному.", "benefit": "Обоснованный вывод об оптимальном выпуске."}}, {"q": "Разработчик использует численное дифференцирование (приближённую производную через конечные разности) вместо аналитической формулы и замечает нестабильные результаты при очень малом шаге h. В чём вероятная причина?", "options": ["При малом h ошибки округления доминируют, результат неточен", "Численное дифференцирование не подвержено ошибкам округления", "Проблема возникает исключительно при слишком большом h", "Слишком малый h всегда даёт наиболее точный результат"], "correct": 0, "explain": "Классическая проблема численного дифференцирования: баланс между ошибкой аппроксимации (растёт с h) и ошибкой округления (растёт при уменьшении h) — оптимальный h не бесконечно мал.", "usage": {"code": true, "without": "Уменьшаем шаг h до 1e-15 ради точности — ошибки округления убивают результат.", "with": "Берём умеренный h около sqrt(eps):\nh=1e-6\nd=(f(x+h)-f(x))/h", "benefit": "Баланс ошибки аппроксимации и округления."}}, {"q": "Финансовый аналитик моделирует стоимость опциона и использует частные производные ('греки': дельта, гамма) по цене базового актива. Зачем нужна именно вторая производная (гамма)?", "options": ["Для полного анализа риска достаточно лишь первой производной", "Вторая производная полностью лишена смысла в финансах", "Гамма показывает, как быстро меняется сама дельта", "Гамма и дельта — по сути совершенно одно и то же понятие"], "correct": 2, "explain": "В финансовой математике 'греки' — это именно частные производные разных порядков, где гамма (вторая производная) отражает выпуклость/нелинейность зависимости цены опциона от актива.", "usage": {"code": false, "without": "Оцениваем риск опциона лишь дельтой (первой производной) и упускаем нелинейность.", "with": "Добавляем гамму — вторую производную цены по активу: показывает, как быстро меняется сама дельта.", "benefit": "Учитываем нелинейный риск при движении цены."}}, {"q": "При анализе временного ряда (например, температуры) исследователь вычисляет производную (скорость изменения) и видит резкий выброс значения. Какая интерпретация наиболее осторожна?", "options": ["Скачок производной бывает и реальным, и шумом — проверьте", "Это следует сразу счесть аномалией процесса без проверки", "Производная всегда точно отражает процесс без всякого шума", "Выброс в производной математически совершенно невозможен"], "correct": 0, "explain": "Производная усиливает шум в данных (дифференцирование — операция, чувствительная к высокочастотным флуктуациям), поэтому резкие пики часто являются артефактом шума, а не реального процесса.", "usage": {"code": true, "without": "Дифференцируем сырой сигнал и принимаем каждый резкий пик производной за реальное событие.", "with": "Помним, что дифференцирование усиливает шум, и проверяем данные:\nd=np.diff(y)/np.diff(t)  # пики могут быть шумом", "benefit": "Не путаем артефакт шума с реальным процессом."}}, {"q": "Оптимизатор нейросети 'застрял' — потери почти не меняются несколько сотен итераций, а затем внезапно резко падают. Какое из объяснений лучше всего согласуется с ландшафтом функции потерь?", "options": ["Обучение шло через плато или седло, затем нашло крутой спуск", "Это значит, что модель сломана и её надо переобучать с нуля", "Функция потерь не имеет плато, значит в коде точно ошибка", "Резкое падение потерь неизменно означает переобучение модели"], "correct": 0, "explain": "Плато и седловые точки — обычное явление в многомерных ландшафтах потерь; оптимизатор может долго 'блуждать' по почти плоской области, прежде чем найти направление быстрого спуска.", "usage": {"code": false, "without": "Долгое почти-плоское поведение потерь трактуем как поломку и переобучаем с нуля.", "with": "Распознаём плато/седло: оптимизатор блуждает по плоской области, затем находит крутой спуск.", "benefit": "Не бросаем рабочее обучение раньше времени."}}, {"q": "При планировании производства функция затрат C(x) имеет положительную вторую производную на всём диапазоне x. Что это говорит о предельных затратах при увеличении объёма?", "options": ["Предельные затраты C'(x) растут — каждая единица дороже", "Общие затраты уменьшаются с ростом объёма производства", "Вторая производная никак не связана с предельными затратами", "Предельные затраты постоянны при любом объёме выпуска товара"], "correct": 0, "explain": "C''(x)>0 означает, что C'(x) (предельные затраты) возрастает — это классический случай убывающей отдачи от масштаба.", "usage": {"code": false, "without": "Считаем затраты на единицу постоянными и недооцениваем рост расходов при масштабировании.", "with": "C''(x)>0 означает, что предельные затраты C'(x) растут — каждая следующая единица дороже.", "benefit": "Верный прогноз затрат при убывающей отдаче."}}, {"q": "Специалист по данным сглаживает зашумлённый сигнал перед вычислением производной, чтобы получить более стабильную оценку скорости изменения. Почему этот шаг оправдан?", "options": ["Сглаживание нужно лишь для целочисленных, а не вещественных данных", "Дифференцирование усиливает шум, поэтому сглаживание помогает", "Сглаживание никак не влияет на последующее дифференцирование", "Дифференцирование всегда само по себе уменьшает шум в данных"], "correct": 1, "explain": "Так как производная чувствительна к резким колебаниям, сглаживание сигнала (например, скользящим средним) перед дифференцированием — стандартная практика для получения устойчивой оценки.", "usage": {"code": true, "without": "Дифференцируем зашумлённый сигнал напрямую — оценка скорости пляшет от шума.", "with": "Сначала сглаживаем, потом дифференцируем:\nys=np.convolve(y,np.ones(5)/5,'same')\nd=np.gradient(ys)", "benefit": "Устойчивая оценка производной по шумным данным."}}, {"q": "Проектировщик системы автопилота использует ПИД-регулятор, где D-компонента (дифференциальная) реагирует на скорость изменения ошибки. Зачем нужна именно эта компонента, а не только пропорциональная (P)?", "options": ["D-член по скорости ошибки гасит колебания и перерегулирование", "Дифференциальная составляющая нужна лишь для статической ошибки", "ПИД-регуляторы вообще не используют понятие производной", "D-компонента лишь дублирует P-компоненту без всякой пользы"], "correct": 0, "explain": "D-член в ПИД-регуляторе основан на производной ошибки по времени и служит для демпфирования резких изменений, предотвращая колебания и перерегулирование системы.", "usage": {"code": false, "without": "Регулируем систему только пропорционально ошибке (P) — получаем колебания и перерегулирование.", "with": "Добавляем D-член на производную ошибки: он предугадывает по скорости изменения и гасит колебания.", "benefit": "Демпфирование и меньше перерегулирования."}}, {"q": "Метеоролог строит модель температуры и обнаруживает, что вторая производная функции температуры по времени положительна в течение дня. Что это означает?", "options": ["Вторая производная не связана с динамикой температуры вовсе", "Скорость роста температуры растёт — нагрев ускоряется", "Температура при этом обязательно только падает со временем", "Температура при этом остаётся строго постоянной во времени"], "correct": 1, "explain": "Положительная вторая производная означает, что первая производная (скорость изменения температуры) возрастает — то есть процесс нагрева ускоряется, а не просто продолжается с постоянной скоростью.", "usage": {"code": false, "without": "Замечаем лишь, что температура растёт, не различая ускоряется нагрев или замедляется.", "with": "Положительная вторая производная означает, что скорость роста температуры сама увеличивается — нагрев ускоряется.", "benefit": "Различаем рост и ускорение роста."}}, {"q": "Найдите производную функции f(x) = 3x² + 2x - 5.", "options": ["6x + 2, почленно по степенному правилу", "3x + 2, коэффициент при квадрате не удвоен", "x² + 2x, степени ошибочно повышены на единицу", "6x - 5, свободный член ошибочно сохранён"], "correct": 0, "explain": "d/dx[3x²] = 6x, d/dx[2x] = 2, d/dx[-5] = 0. Итого: 6x+2.", "usage": {"code": true, "without": "Дифференцируем 3x²+2x-5 наугад, путая правила для слагаемых.", "with": "Почленно по степенному правилу:\n# (3x^2)'=6x, (2x)'=2, (-5)'=0 -> 6x+2", "benefit": "Верная производная многочлена по шагам."}}, {"q": "Найдите производную функции f(x) = sin(x²) по цепному правилу.", "options": ["cos(2x), аргумент функции ошибочно удвоен", "2x·sin(x), синус ошибочно оставлен вместо косинуса", "2x·cos(x²) — множитель 2x по цепному правилу", "cos(x²), потерян внутренний множитель 2x при цепи"], "correct": 2, "explain": "По цепному правилу: d/dx[sin(x²)] = cos(x²)·(x²)' = cos(x²)·2x = 2x·cos(x²).", "usage": {"code": true, "without": "Пишем производную sin(x²) как cos(x²), забыв про внутреннюю функцию.", "with": "Цепное правило даёт множитель 2x:\n# d/dx sin(x^2)=cos(x^2)*2x", "benefit": "Не теряем производную внутренней функции."}}, {"q": "Вычислите определённый интеграл ∫[0,2] x dx.", "options": ["2 — первообразная x²/2, взятая в границах", "4 — потерян делитель 2 у первообразной x²/2", "8 — интеграл ошибочно спутан с кубом границы", "1 — площадь под прямой занижена вдвое зря"], "correct": 0, "explain": "∫x dx = x²/2. При подстановке границ: 2²/2 - 0²/2 = 4/2 - 0 = 2.", "usage": {"code": true, "without": "Пытаемся угадать площадь под y=x на [0,2] на глаз.", "with": "Первообразная x²/2 и подстановка границ:\n# 2^2/2 - 0 = 2", "benefit": "Точное значение определённого интеграла."}}, {"q": "Найдите производную функции f(x) = eˣ · x.", "options": ["eˣ·x, потеряно второе слагаемое правила", "x·eˣ⁻¹, степень экспоненты ошибочно понижена", "eˣ, производная множителя x полностью потеряна", "eˣ·(x+1) — по правилу произведения функций"], "correct": 3, "explain": "По правилу произведения: (eˣ·x)' = eˣ·x + eˣ·1 = eˣ(x+1).", "usage": {"code": true, "without": "Дифференцируем eˣ·x как eˣ, игнорируя правило произведения.", "with": "Правило произведения:\n# (e^x*x)' = e^x*x + e^x = e^x*(x+1)", "benefit": "Корректная производная произведения."}}, {"q": "Функция f(x) = x³ - 3x. Найдите критические точки (где f'(x)=0).", "options": ["x=3 и x=-3 — корни определены неверно", "x=1 и x=-1 — корни уравнения 3x²-3=0", "x=0 — единственный, но ошибочный корень", "только x=1, а второй корень потерян"], "correct": 1, "explain": "f'(x) = 3x²-3 = 0 → x²=1 → x=1 или x=-1.", "usage": {"code": true, "without": "Ищем критические точки x³-3x перебором значений — неточно.", "with": "Решаем f'(x)=0:\n# 3x^2-3=0 -> x=1, x=-1", "benefit": "Точные критические точки из уравнения."}}, {"q": "Вычислите предел lim(x→0) sin(x)/x.", "options": ["Не существует — предел якобы расходится", "1 — классический замечательный предел", "0 — числитель ошибочно приравнен к нулю", "∞ — из-за малого знаменателя ответ завышен"], "correct": 1, "explain": "Это классический замечательный предел: lim(x→0) sin(x)/x = 1.", "usage": {"code": true, "without": "Подставляем x=0 в sin(x)/x и получаем неопределённость 0/0, застревая.", "with": "Знаем замечательный предел:\n# lim(x->0) sin(x)/x = 1", "benefit": "Мгновенный ответ вместо тупика 0/0."}}, {"q": "Найдите вторую производную функции f(x) = x⁴.", "options": ["12x² — дважды по степенному правилу", "24x — функция продифференцирована трижды", "x² — степени понижены слишком сильно зря", "4x³ — взята только первая производная"], "correct": 0, "explain": "f'(x)=4x³, f''(x) = 12x².", "usage": {"code": true, "without": "Дифференцируем x⁴ один раз и на этом останавливаемся, забыв про второй порядок.", "with": "Дважды применяем степенное правило:\n# f'=4x^3, f''=12x^2", "benefit": "Верная вторая производная."}}, {"q": "Вычислите неопределённый интеграл ∫ (2x + 3) dx.", "options": ["x² + C, потеряно слагаемое от тройки", "2x² + 3x + C, коэффициент ошибочно удвоен", "x² + 3x + C — почленное интегрирование", "2x + C, интеграл спутан с производной"], "correct": 2, "explain": "∫2x dx = x², ∫3 dx = 3x. Итого: x²+3x+C.", "usage": {"code": true, "without": "Интегрируем 2x+3 наугад, теряя слагаемое или константу C.", "with": "Почленно интегрируем и добавляем C:\n# ∫(2x+3)dx = x^2+3x+C", "benefit": "Полная первообразная без потери C."}}, {"q": "Функция f(x,y) = x²y + y³. Чему равна частная производная ∂f/∂x?", "options": ["2xy + 3y², лишнее слагаемое взято от y³", "2xy — здесь y считается константой", "x²y — множитель 2x ошибочно потерян", "x²+3y², спутано с производной по y"], "correct": 1, "explain": "При дифференцировании по x переменная y считается константой: ∂f/∂x = 2xy (второе слагаемое y³ не зависит от x, его производная 0).", "usage": {"code": true, "without": "Дифференцируем x²y+y³ по x, ошибочно трогая y как переменную.", "with": "y считаем константой:\n# ∂/∂x (x^2*y + y^3) = 2xy", "benefit": "Корректная частная производная."}}, {"q": "Функция f(x) = 1/x при x>0. Какая у неё вторая производная и что это говорит о выпуклости?", "options": ["Вторая производная здесь попросту не существует", "f''(x)=-1/x²<0, поэтому функция вогнута", "f''(x)=2/x³>0, функция выпукла при x>0", "f''(x)=0, значит функция полностью линейна"], "correct": 2, "explain": "f'(x) = -1/x², f''(x) = 2/x³, что положительно при x>0 — функция выпукла (график изгибается вверх, как парабола).", "usage": {"code": true, "without": "Судим о выпуклости 1/x по внешнему виду графика и путаемся в знаке.", "with": "Считаем f'' и смотрим знак:\n# f'=-1/x^2, f''=2/x^3>0 при x>0 -> выпукла", "benefit": "Выпуклость определена по знаку f''."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
