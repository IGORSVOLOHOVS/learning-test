<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Математический анализ (производные, цепное правило)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
    </div>
    <h1>Математический анализ (производные, цепное правило)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "calculus";
  const QUESTIONS = [{"q": "Что такое производная функции в точке?", "options": ["Площадь под графиком функции", "Мгновенная скорость изменения функции в этой точке (предел отношения приращений)", "Значение функции в этой точке", "Максимальное значение функции"], "correct": 1, "explain": "Производная f'(x) = lim(h→0) [f(x+h)-f(x)]/h — скорость изменения функции в точке x."}, {"q": "Чему равна производная константы?", "options": ["1", "0", "Самой константе", "Бесконечности"], "correct": 1, "explain": "Производная константы всегда равна 0, так как константа не меняется."}, {"q": "Чему равна производная функции f(x) = xⁿ?", "options": ["n·x", "n·x^(n-1)", "x^(n-1)", "x^n / n"], "correct": 1, "explain": "Степенное правило: d/dx[xⁿ] = n·x^(n-1)."}, {"q": "Что такое предел функции?", "options": ["Значение, к которому стремится функция при приближении аргумента к некоторой точке", "Максимум функции на всей области определения", "Производная функции", "Интеграл функции"], "correct": 0, "explain": "Предел lim(x→a) f(x) описывает поведение функции вблизи точки a, даже если f(a) не определено."}, {"q": "Что такое интеграл функции (неопределённый)?", "options": ["Функция, производная которой равна исходной функции (первообразная)", "Скорость изменения функции", "Значение функции в нуле", "Максимум функции"], "correct": 0, "explain": "Неопределённый интеграл ∫f(x)dx = F(x)+C, где F'(x)=f(x) — обратная операция к дифференцированию."}, {"q": "Что вычисляет определённый интеграл ∫[a,b] f(x)dx геометрически?", "options": ["Площадь под графиком функции между x=a и x=b (с учётом знака)", "Наклон касательной в точке a", "Значение производной в точке b", "Периметр фигуры под графиком"], "correct": 0, "explain": "Определённый интеграл равен алгебраической (со знаком) площади между графиком функции и осью x на отрезке [a,b]."}, {"q": "Что такое точка перегиба функции?", "options": ["Точка, где функция равна нулю", "Точка, где вторая производная меняет знак (меняется направление выпуклости)", "Точка максимума функции", "Точка, где производная не существует"], "correct": 1, "explain": "В точке перегиба f''(x) меняет знак — график переходит от выпуклости к вогнутости (или наоборот)."}, {"q": "Что означает, что функция непрерывна в точке?", "options": ["Функция определена только в этой точке", "Предел функции в этой точке существует, равен значению функции и совпадает слева и справа", "Функция имеет производную в этой точке", "Функция равна нулю в этой точке"], "correct": 1, "explain": "Непрерывность требует: f(a) определено, существует lim(x→a) f(x), и этот предел равен f(a)."}, {"q": "Что такое частная производная функции нескольких переменных?", "options": ["Производная по одной переменной при фиксированных остальных", "Сумма всех производных функции", "Производная функции только по времени", "Интеграл функции по всем переменным"], "correct": 0, "explain": "Частная производная ∂f/∂x показывает скорость изменения f по x, считая остальные переменные константами."}, {"q": "Что такое градиент функции нескольких переменных?", "options": ["Вектор из всех частных производных, указывающий направление наискорейшего роста функции", "Значение функции в начале координат", "Матрица вторых производных", "Среднее значение функции"], "correct": 0, "explain": "Градиент ∇f = (∂f/∂x1,...,∂f/∂xn) — вектор, указывающий направление наибольшего возрастания функции в данной точке."}, {"q": "В чём смысл цепного правила (chain rule) дифференцирования?", "options": ["Производная сложной функции f(g(x)) равна произведению производной внешней функции по g и производной внутренней функции по x: f'(g(x))·g'(x)", "Производная суммы функций равна сумме производных", "Цепное правило применяется только к тригонометрическим функциям", "Производная сложной функции всегда равна нулю"], "correct": 0, "explain": "Цепное правило (df/dx = df/dg · dg/dx) позволяет дифференцировать композиции функций, разбивая задачу на более простые шаги."}, {"q": "Почему цепное правило является основой алгоритма обратного распространения ошибки (backpropagation) в нейросетях?", "options": ["Нейросеть — это композиция функций (слоёв), и градиент функции потерь по весам ранних слоёв вычисляется как произведение производных через все промежуточные слои", "Backpropagation не использует производные", "Цепное правило работает только для одного слоя нейросети", "Нейросети вычисляют интегралы, а не производные"], "correct": 0, "explain": "Backprop последовательно применяет цепное правило слой за слоем от выхода к входу, эффективно вычисляя градиенты сложной композитной функции."}, {"q": "В чём разница между локальным и глобальным экстремумом функции?", "options": ["Локальный экстремум — наибольшее/наименьшее значение в окрестности точки, глобальный — на всей области определения", "Это одно и то же для любых функций", "Локальный экстремум существует только у линейных функций", "Глобальный экстремум всегда находится в нуле"], "correct": 0, "explain": "Функция может иметь несколько локальных максимумов/минимумов, но только один (или несколько равных) глобальный максимум/минимум на всей области."}, {"q": "Почему условие f'(x)=0 необходимо, но не достаточно для того, чтобы точка была экстремумом?", "options": ["Точка может быть седловой (точкой перегиба с горизонтальной касательной), где производная равна нулю, но экстремума нет — нужно проверять вторую производную или знак вокруг точки", "f'(x)=0 всегда гарантирует максимум", "f'(x)=0 невозможно для гладких функций", "Условие достаточно само по себе всегда"], "correct": 0, "explain": "Классический пример: f(x)=x³ имеет f'(0)=0, но x=0 — не экстремум, а точка перегиба."}, {"q": "Как знак второй производной помогает классифицировать критическую точку (где f'(x)=0)?", "options": ["Если f''(x)>0 — локальный минимум (выпуклость вверх), если f''(x)<0 — локальный максимум (выпуклость вниз), если f''(x)=0 — нужен дополнительный анализ", "Вторая производная не связана с классификацией экстремумов", "f''(x)>0 всегда означает максимум", "Знак второй производной определяет только точки перегиба"], "correct": 0, "explain": "Тест второй производной: положительная вторая производная означает локальную выпуклость (минимум), отрицательная — вогнутость (максимум)."}, {"q": "Почему интеграл и производная считаются взаимно обратными операциями (основная теорема анализа)?", "options": ["Дифференцирование первообразной функции возвращает исходную функцию: d/dx[∫f(x)dx] = f(x), связывая понятия площади и скорости изменения", "Интеграл и производная не связаны между собой", "Это верно только для полиномов", "Производная всегда равна интегралу той же функции"], "correct": 0, "explain": "Основная теорема анализа формально связывает накопленную площадь (интеграл) со скоростью изменения (производной), делая их взаимно обратными операциями."}, {"q": "Зачем в оптимизации используется понятие выпуклой функции, и как это связано со второй производной?", "options": ["У выпуклой функции (f''(x)≥0 всюду) любой локальный минимум автоматически является глобальным, что сильно упрощает поиск оптимума", "Выпуклость функции не влияет на оптимизацию", "Выпуклые функции никогда не имеют минимума", "Вторая производная не связана с выпуклостью"], "correct": 0, "explain": "Для выпуклых функций градиентные методы гарантированно сходятся к глобальному минимуму, так как локальных ловушек (седловых точек с ложным минимумом) не существует."}, {"q": "Почему при вычислении градиента функции потерь в машинном обучении важно уметь дифференцировать сложные композиции функций (например, функцию активации внутри слоя внутри функции потерь)?", "options": ["Функция потерь — это глубоко вложенная композиция операций, и без цепного правила невозможно эффективно вычислить, как изменение каждого веса влияет на итоговую ошибку", "Достаточно вычислить производную только последнего слоя", "Композиции функций не дифференцируемы", "Функции активации никогда не входят в вычисление градиента"], "correct": 0, "explain": "Именно многоуровневая композиция (слои, активации, потери) требует систематического применения цепного правила — это и есть суть backpropagation."}, {"q": "Чем отличается частная производная от полного дифференциала функции нескольких переменных?", "options": ["Частная производная — скорость изменения по одной переменной при фиксированных остальных, полный дифференциал учитывает одновременное изменение всех переменных: df = Σ (∂f/∂xᵢ)dxᵢ", "Это одно и то же понятие", "Полный дифференциал существует только для функций одной переменной", "Частная производная всегда больше полного дифференциала"], "correct": 0, "explain": "Полный дифференциал суммирует вклад изменения каждой переменной через соответствующую частную производную, давая линейное приближение полного изменения функции."}, {"q": "Почему точки, где градиент функции равен нулевому вектору, называют 'критическими', и почему в многомерном случае они могут быть седловыми, а не только минимумами/максимумами?", "options": ["В многомерном случае матрица вторых производных (гессиан) может иметь собственные значения разных знаков, что означает рост по одним направлениям и убывание по другим — это и есть седловая точка", "В многомерных функциях седловых точек не существует", "Критические точки всегда являются глобальными минимумами", "Градиент никогда не равен нулю в многомерных функциях"], "correct": 0, "explain": "Знаки собственных значений гессиана в критической точке определяют её тип: все положительные — минимум, все отрицательные — максимум, смешанные — седловая точка."}, {"q": "Почему при обучении нейросети градиентным спуском важно правильно подобрать скорость обучения (learning rate), учитывая идею производной как локального наклона?", "options": ["Слишком большой шаг может 'перепрыгнуть' через минимум (используя лишь локальный наклон, а не глобальную форму функции), а слишком маленький — сделает обучение крайне медленным", "Скорость обучения не связана с производной функции потерь", "Производная гарантирует нахождение глобального минимума при любом есколько сотен итераций, а затем внезапно резко падают. Какое из объяснений лучше всего согласуется с ландшафтом функции потерь?", "options": ["Обучение, вероятно, проходило через плато или область с малым градиентом (возможно, вблизи седловой точки), а затем нашло направление с более крутым спуском", "Функция потерь не может иметь плато, значит, в коде есть ошибка", "Такое поведение означает, что модель полностью сломана и её нужно переобучать с нуля", "Резкое падение потерь всегда означает переобучение"], "correct": 0, "explain": "Плато и седловые точки — обычное явление в многомерных ландшафтах потерь; оптимизатор может долго 'блуждать' по почти плоской области, прежде чем найти направление быстрого спуска."}, {"q": "При планировании производства функция затрат C(x) имеет положительную вторую производную на всём диапазоне x. Что это говорит о предельных затратах при увеличении объёма?", "options": ["Предельные затраты (C'(x)) растут с увеличением x — производство становится всё дороже на единицу товара (типично при ограниченных ресурсах)", "Предельные затраты постоянны независимо от объёма", "Затраты уменьшаются с ростом объёма производства", "Вторая производная не связана с предельными затратами"], "correct": 0, "explain": "C''(x)>0 означает, что C'(x) (предельные затраты) возрастает — это классический случай убывающей отдачи от масштаба."}, {"q": "Специалист по данным сглаживает зашумлённый сигнал перед вычислением производной, чтобы получить более стабильную оценку скорости изменения. Почему этот шаг оправдан?", "options": ["Дифференцирование усиливает высокочастотный шум, поэтому предварительное сглаживание уменьшает искажение итоговой оценки производной", "Сглаживание не влияет на последующее дифференцирование", "Дифференцирование всегда уменьшает шум само по себе", "Сглаживание нужно только для целых, а не вещественных данных"], "correct": 0, "explain": "Так как производная чувствительна к резким колебаниям, сглаживание сигнала (например, скользящим средним) перед дифференцированием — стандартная практика для получения устойчивой оценки."}, {"q": "Проектировщик системы автопилота использует ПИД-регулятор, где D-компонента (дифференциальная) реагирует на скорость изменения ошибки. Зачем нужна именно эта компонента, а не только пропорциональная (P)?", "options": ["D-компонента предугадывает будущее поведение ошибки по её текущей скорости изменения, помогая гасить колебания и избегать перерегулирования, чего одна лишь пропорциональная составляющая не обеспечивает", "D-компонента дублирует функцию P-компоненты без дополнительной пользы", "Дифференциальная составляющая нужна только для устранения статической ошибки", "ПИД-регуляторы не используют понятие производной"], "correct": 0, "explain": "D-член в ПИД-регуляторе основан на производной ошибки по времени и служит для демпфирования резких изменений, предотвращая колебания и перерегулирование системы."}, {"q": "Метеоролог строит модель температуры и обнаруживает, что вторая производная функции температуры по времени положительна в течение дня. Что это означает?", "options": ["Скорость роста температуры увеличивается (нагрев ускоряется), а не просто температура растёт", "Температура обязательно падает", "Температура постоянна", "Вторая производная не имеет отношения к динамике температуры"], "correct": 0, "explain": "Положительная вторая производная означает, что первая производная (скорость изменения температуры) возрастает — то есть процесс нагрева ускоряется, а не просто продолжается с постоянной скоростью."}, {"q": "Найдите производную функции f(x) = 3x² + 2x - 5.", "options": ["6x + 2", "3x + 2", "6x - 5", "x² + 2x"], "correct": 0, "explain": "d/dx[3x²] = 6x, d/dx[2x] = 2, d/dx[-5] = 0. Итого: 6x+2."}, {"q": "Найдите производную функции f(x) = sin(x²) по цепному правилу.", "options": ["cos(x²)", "2x·cos(x²)", "2x·sin(x)", "cos(2x)"], "correct": 1, "explain": "По цепному правилу: d/dx[sin(x²)] = cos(x²)·(x²)' = cos(x²)·2x = 2x·cos(x²)."}, {"q": "Вычислите определённый интеграл ∫[0,2] x dx.", "options": ["1", "2", "4", "8"], "correct": 1, "explain": "∫x dx = x²/2. При подстановке границ: 2²/2 - 0²/2 = 4/2 - 0 = 2."}, {"q": "Найдите производную функции f(x) = eˣ · x.", "options": ["eˣ", "eˣ·(x+1)", "eˣ·x", "x·eˣ⁻¹"], "correct": 1, "explain": "По правилу произведения: (eˣ·x)' = eˣ·x + eˣ·1 = eˣ(x+1)."}, {"q": "Функция f(x) = x³ - 3x. Найдите критические точки (где f'(x)=0).", "options": ["x=0", "x=1 и x=-1", "x=3 и x=-3", "x=1 только"], "correct": 1, "explain": "f'(x) = 3x²-3 = 0 → x²=1 → x=1 или x=-1."}, {"q": "Вычислите предел lim(x→0) sin(x)/x.", "options": ["0", "1", "∞", "Не существует"], "correct": 1, "explain": "Это классический замечательный предел: lim(x→0) sin(x)/x = 1."}, {"q": "Найдите вторую производную функции f(x) = x⁴.", "options": ["4x³", "12x²", "x²", "24x"], "correct": 1, "explain": "f'(x)=4x³, f''(x) = 12x²."}, {"q": "Вычислите неопределённый интеграл ∫ (2x + 3) dx.", "options": ["x² + 3x + C", "2x² + 3x + C", "x² + C", "2x + C"], "correct": 0, "explain": "∫2x dx = x², ∫3 dx = 3x. Итого: x²+3x+C."}, {"q": "Функция f(x,y) = x²y + y³. Чему равна частная производная ∂f/∂x?", "options": ["2xy", "x²+3y²", "2xy + 3y²", "x²y"], "correct": 0, "explain": "При дифференцировании по x переменная y считается константой: ∂f/∂x = 2xy (второе слагаемое y³ не зависит от x, его производная 0)."}, {"q": "Функция f(x) = 1/x при x>0. Какая у неё вторая производная и что это говорит о выпуклости?", "options": ["f''(x) = 2/x³ > 0, функция выпукла вниз (график вогнут вверх)", "f''(x) = -1/x², функция вогнута", "f''(x) = 0, функция линейна", "Вторая производная не существует"], "correct": 0, "explain": "f'(x) = -1/x², f''(x) = 2/x³, что положительно при x>0 — функция выпукла (график изгибается вверх, как парабола)."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
