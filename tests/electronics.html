<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Основы электроники</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/electronics.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Основы электроники</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "electronics";
  const QUESTIONS = [{"q": "Что такое электрический ток?", "options": ["Сопротивление материала протеканию электрического заряда", "Упорядоченное движение заряженных частиц в проводнике", "Разность потенциалов между двумя точками проводника", "Энергия, запасённая в электрическом поле конденсатора"], "correct": 1, "explain": "Ток I — это направленное движение заряженных частиц, измеряется в амперах (А), равен количеству заряда, проходящего через сечение проводника за единицу времени.", "usage": {"code": false, "without": "Смотришь на провод и не понимаешь, что вообще измеряешь: путаешь заряд, напряжение и «поток». Не знаешь, что считать в амперах.", "with": "Понимаешь, что ток — это упорядоченное движение заряда через сечение за секунду (I=q/t), и меришь его амперметром в разрыве цепи.", "benefit": "Правильно измеряешь ток в амперах, а не гадаешь."}}, {"q": "Что такое напряжение (разность потенциалов)?", "options": ["Сопротивление проводника протеканию заряда", "Работа по переносу единичного заряда между точками", "Скорость упорядоченного движения электронов в цепи", "Частота колебаний переменного тока в сети"], "correct": 1, "explain": "Напряжение U измеряется в вольтах и представляет собой работу по перемещению единичного положительного заряда между двумя точками электрической цепи.", "usage": {"code": false, "without": "Пытаешься «толкнуть» ток, не понимая, что его гонит. Считаешь напряжение свойством самого провода.", "with": "Знаешь: напряжение — работа на перемещение единичного заряда между точками (В). Разность потенциалов и создаёт ток.", "benefit": "Осознанно выбираешь источник нужного напряжения."}}, {"q": "Что утверждает закон Ома для участка цепи?", "options": ["I = U / R", "R = U + I", "I = U × R", "U = I − R"], "correct": 0, "explain": "Закон Ома: сила тока I прямо пропорциональна напряжению U и обратно пропорциональна сопротивлению R: I=U/R.", "usage": {"code": false, "without": "Подбираешь ток и резистор наугад, схема либо не работает, либо горит.", "with": "Применяешь закон Ома I=U/R: при 12В и 4 Ом сразу получаешь I=3А.", "benefit": "Точный расчёт тока за одну формулу."}}, {"q": "Что такое сопротивление (R) проводника?", "options": ["Скорость распространения электромагнитной волны", "Единица измерения электрической ёмкости в фарадах", "Мера противодействия проводника протеканию тока", "Мощность, рассеиваемая проводником в виде тепла"], "correct": 2, "explain": "Сопротивление (измеряется в омах) характеризует, насколько материал препятствует протеканию тока, преобразуя часть электрической энергии в тепло.", "usage": {"code": false, "without": "Не понимаешь, почему провод греется, и считаешь сопротивление лишней помехой.", "with": "Знаешь: R (Ом) — мера противодействия току, часть энергии уходит в тепло. Учитываешь это при выборе номинала.", "benefit": "Прогнозируешь нагрев и падение напряжения."}}, {"q": "Что такое конденсатор?", "options": ["Элемент, накапливающий энергию в постоянном магнитном поле катушки", "Элемент, увеличивающий напряжение источника питания", "Элемент, преобразующий переменный ток в постоянный", "Элемент, копящий энергию в электрическом поле обкладок"], "correct": 3, "explain": "Конденсатор состоит из двух проводящих пластин, разделённых диэлектриком, и накапливает электрическую энергию в виде электрического поля между ними.", "usage": {"code": false, "without": "Ждёшь, что элемент «поднимет» напряжение или запасёт ток, и удивляешься, что через него не течёт постоянный ток.", "with": "Понимаешь: конденсатор копит энергию в электрическом поле между обкладками, заряжается и разряжается.", "benefit": "Верно применяешь конденсатор для фильтрации и буфера."}}, {"q": "Что такое индуктивность (катушка индуктивности)?", "options": ["Элемент, полностью блокирующий постоянный ток в цепи", "Устройство для измерения напряжения в вольтах", "Элемент, копящий энергию в магнитном поле тока", "Другое название обычного постоянного резистора"], "correct": 2, "explain": "Катушка индуктивности накапливает энергию в магнитном поле, создаваемом протекающим через неё током, и противодействует изменению этого тока.", "usage": {"code": false, "without": "Считаешь катушку просто куском провода и не ждёшь скачков напряжения при коммутации.", "with": "Знаешь: индуктивность копит энергию в магнитном поле и противится изменению тока (U=-L·dI/dt).", "benefit": "Предвидишь выбросы при выключении индуктивной нагрузки."}}, {"q": "Что такое диод и его основное свойство?", "options": ["Элемент, накапливающий электрический заряд как конденсатор", "Элемент, пропускающий ток одинаково в обе стороны", "Полупроводник, пропускающий ток в одном направлении", "Резистор с плавно изменяемым сопротивлением"], "correct": 2, "explain": "Диод обладает односторонней проводимостью: в прямом направлении сопротивление мало (ток течёт), в обратном — велико (ток практически не течёт).", "usage": {"code": false, "without": "Ставишь диод как попало — цепь либо не работает, либо ток идёт не в ту сторону.", "with": "Учитываешь одностороннюю проводимость: в прямом направлении ток течёт, в обратном — нет.", "benefit": "Правильно ориентируешь диод в выпрямителе/защите."}}, {"q": "Что такое транзистор в самом общем смысле?", "options": ["Устройство для длительного накопления заряда", "Полупроводник, усиливающий или переключающий сигнал", "Пассивный элемент, лишь рассеивающий энергию в тепло", "Тип резистора с жёстко фиксированным сопротивлением"], "correct": 1, "explain": "Транзистор — активный полупроводниковый элемент, который может усиливать электрический сигнал или переключаться между проводящим и непроводящим состоянием, управляемый током или напряжением.", "usage": {"code": false, "without": "Пытаешься усилить сигнал пассивными деталями — амплитуда только падает.", "with": "Ставишь транзистор как активный элемент: усиливаешь сигнал или переключаешь нагрузку по управляющему входу.", "benefit": "Получаешь усиление и ключевой режим одним элементом."}}, {"q": "Что означает последовательное соединение резисторов с точки зрения общего сопротивления?", "options": ["Общее сопротивление меньше наименьшего из сопротивлений", "Общее сопротивление равно среднему из сопротивлений", "Общее сопротивление всегда равно нулю в такой цепи", "Общее сопротивление равно сумме отдельных сопротивлений"], "correct": 3, "explain": "При последовательном соединении общее сопротивление R_общ = R1+R2+...+Rn — сопротивления складываются.", "usage": {"code": false, "without": "Складываешь сопротивления как попало и получаешь неверное R цепи.", "with": "При последовательном соединении складываешь: R=R1+R2+…; 100+200=300 Ом.", "benefit": "Мгновенно считаешь суммарное сопротивление цепочки."}}, {"q": "Что такое переменный ток (AC) в отличие от постоянного (DC)?", "options": ["Ток, остающийся равным нулю в любой момент времени", "Ток, текущий строго в одном направлении без изменений", "Ток, существующий только внутри конденсаторов цепи", "Ток, периодически меняющий направление и амплитуду"], "correct": 3, "explain": "Переменный ток периодически меняет направление и амплитуду (обычно по синусоидальному закону), в отличие от постоянного тока, текущего в одном направлении с неизменной величиной.", "usage": {"code": false, "without": "Проектируешь под DC, а схема получает AC и ведёт себя непредсказуемо.", "with": "Понимаешь: AC периодически меняет направление и амплитуду (синус), DC — постоянен. Учитываешь тип тока.", "benefit": "Выбираешь компоненты под нужный род тока."}}, {"q": "Почему при параллельном соединении резисторов общее сопротивление всегда меньше наименьшего из отдельных сопротивлений?", "options": ["Число параллельных резисторов не влияет на общее сопротивление", "Сопротивления при параллельном соединении складываются напрямую", "Параллельные пути повышают проводимость, снижая сопротивление", "Параллельное соединение всегда увеличивает сопротивление цепи"], "correct": 2, "explain": "Проводимости (величины, обратные сопротивлению) складываются при параллельном соединении, а не сопротивления — добавление любого дополнительного параллельного пути только увеличивает общую проводимость, то есть уменьшает общее сопротивление.", "usage": {"code": false, "without": "Ждёшь, что параллельные резисторы дадут больше сопротивления, и завышаешь R.", "with": "Складываешь проводимости: 1/R=1/R1+1/R2. Два по 100 Ом дают 50 Ом — меньше наименьшего.", "benefit": "Не ошибаешься в знаке эффекта параллельного соединения."}}, {"q": "Почему конденсатор блокирует постоянный ток в установившемся режиме, но пропускает переменный ток?", "options": ["Конденсатор в принципе неспособен взаимодействовать с переменным током", "Постоянный ток свободно течёт через заряженный конденсатор", "На DC заряженный конденсатор ток не пропускает, на AC перезаряжается", "Конденсатор одинаково хорошо пропускает постоянный и переменный ток"], "correct": 2, "explain": "После полной зарядки конденсатора в цепи постоянного тока ток через него прекращается (реактивное сопротивление становится бесконечным на постоянном токе); при переменном токе конденсатор постоянно циклически заряжается и разряжается, пропуская ток.", "usage": {"code": false, "without": "Ставишь конденсатор в цепь DC как «пропускающий» элемент и удивляешься, что ток пропал.", "with": "Знаешь: на установившемся DC заряженный конденсатор ток не пропускает, а на AC постоянно перезаряжается и ток идёт.", "benefit": "Используешь конденсатор как развязку DC/AC осознанно."}}, {"q": "Почему катушка индуктивности ведёт себя противоположно конденсатору по отношению к постоянному и переменному току?", "options": ["Индуктивность не взаимодействует с изменяющимся во времени током", "Катушка пропускает постоянный ток, но сопротивляется переменному", "Катушка ведёт себя точно так же, как конденсатор, для любого тока", "Катушка блокирует любой ток независимо от его характера"], "correct": 1, "explain": "Согласно закону электромагнитной индукции, катушка противодействует изменению тока (ЭДС самоиндукции), поэтому для установившегося постоянного тока (без бя как замкнутый/разомкнутый переключатель.", "usage": {"code": false, "without": "Настраиваешь один режим и ждёшь, что транзистор всегда усиливает или всегда переключает.", "with": "Смещением задаёшь рабочую точку: активная область — усиление, насыщение/отсечка — ключ.", "benefit": "Осознанно выбираешь усилитель или логический ключ."}}, {"q": "Почему в цепях переменного тока используют понятие импеданса (комплексного сопротивления), а не просто активного сопротивления, как в цепях постоянного тока?", "options": ["Реактивные элементы не влияют на поведение цепи переменного тока", "Понятие импеданса применимо исключительно к цепям постоянного тока", "Импеданс — это лишь другое название активного сопротивления цепи", "Импеданс включает активное, реактивное сопротивление и фазу"], "correct": 3, "explain": "В отличие от чисто активного сопротивления, импеданс — комплексная величина, отражающая как амплитудное отношение напряжения к току, так и фазовый сдвиг, вносимый реактивными элементами, который зависит от частоты сигнала.", "usage": {"code": false, "without": "Считаешь AC-цепь по обычному R и получаешь неверные ток и фазу.", "with": "Считаешь импеданс Z: учитываешь реактивность C и L и фазовый сдвиг, зависящий от частоты.", "benefit": "Корректный расчёт AC-цепи с реактивными элементами."}}, {"q": "Почему заземление (общий провод/земля) важно для корректной работы и безопасности электронной схемы?", "options": ["Заземление никак не влияет на измерение напряжения в схеме", "Заземление применяется только в цепях переменного тока", "Заземление нужно лишь для повышения мощности источника питания", "Земля задаёт общую точку отсчёта и путь отвода тока при аварии"], "correct": 3, "explain": "Без общей точки отсчёта (земли) абсолютные значения напряжения были бы не определены (напряжение всегда измеряется как разность потенциалов); заземление также обеспечивает путь для тока утечки, защищая пользователя от поражения электрическим током при неисправности.", "usage": {"code": false, "without": "Меришь напряжения «от разных точек», без общей опоры — цифры не сходятся, есть риск удара током.", "with": "Задаёшь общую землю как точку отсчёта и путь отвода тока при аварии.", "benefit": "Согласованные измерения и электробезопасность."}}, {"q": "Почему при проектировании схемы важно учитывать не только напряжение и ток, но и мощность, рассеиваемую на компонентах (P=I²R)?", "options": ["Учёт мощности важен только для источников, но не для компонентов", "Превышение допустимой мощности вызывает перегрев компонента", "Рассеиваемая мощность не связана с надёжностью и сроком службы", "Рассеиваемая мощность одинакова при любых токе и сопротивлении"], "correct": 1, "explain": "Формула P=I²R показывает, что при заданном токе большее сопротивление рассеивает больше мощности в виде тепла; превышение номинальной мощности резистора (например, указанной как 0.25 Вт) приводит к его перегреву и повреждению.", "usage": {"code": false, "without": "Выбираешь резистор только по сопротивлению — он греется и перегорает.", "with": "Считаешь рассеиваемую мощность P=I²R и берёшь номинал с запасом по ваттам.", "benefit": "Компонент не перегревается под нагрузкой."}}, {"q": "Почему операционные усилители (ОУ) с обратной связью широко используются для построения точных аналоговых схем (например, стабильных усилителей с заданным коэффициентом усиления)?", "options": ["Усиление схемы определяется самим ОУ, а не внешними компонентами", "Обратная связь всегда увеличивает нестабильность и погрешность", "Отрицательная ОС задаёт усиление отношением внешних резисторов", "ОУ никогда не используют обратную связь в практических схемах"], "correct": 2, "explain": "Благодаря очень большому собственному коэффициенту усиления ОУ и отрицательной обратной связи, итоговый коэффициент усиления схемы определяется точным соотношением внешних резисторов (например, R2/R1), а не менее предсказуемыми параметрами самого чипа.", "usage": {"code": false, "without": "Строишь усилитель на голом транзисторе — коэффициент плывёт от температуры и разброса деталей.", "with": "Охватываешь ОУ отрицательной обратной связью: усиление задаёт отношение резисторов R2/R1.", "benefit": "Стабильный, предсказуемый коэффициент усиления."}}, {"q": "Почему цифровые логические схемы строятся преимущественно на транзисторах, работающих в режиме переключения (насыщение/отсечка), а не в линейном (усилительном) режиме?", "options": ["Линейный режим даёт более надёжную логику, чем режим переключения", "Ключевой режим даёт два чётких уровня 0 и 1, устойчивых к шуму", "Транзисторы физически неспособны работать в режиме переключения", "Режим работы транзистора не влияет на устойчивость логики к помехам"], "correct": 1, "explain": "Дискретные, хорошо разделённые уровни напряжения (соответствующие включённому/выключенному транзистору) обеспечивают устойчивость к шуму и помехам, что критично для надёжной работы цифровой логики, в отличие от чувствительного к малейшим отклонениям линейного усиления.", "usage": {"code": false, "without": "Строишь логику на транзисторах в линейном режиме — уровни плывут, шум ломает биты.", "with": "Работаешь в насыщении/отсечке: два чётких уровня 0 и 1, устойчивых к шуму.", "benefit": "Надёжная цифровая логика с помехозащищённостью."}}, {"q": "Как взаимодействуют источник напряжения, внутреннее сопротивление источника и внешняя нагрузка, определяя реальное напряжение на нагрузке (в отличие от идеального источника без потерь)?", "options": ["Идеальный и реальный источники ведут себя одинаково при нагрузке", "Внутреннее сопротивление даёт просадку U при росте тока нагрузки", "Внутреннее сопротивление источника не влияет на напряжение нагрузки", "Напряжение на нагрузке совсем не зависит от протекающего тока"], "correct": 1, "explain": "Реальный источник моделируется как идеальный источник ЭДС с последовательным внутренним сопротивлением; ток нагрузки создаёт падение напряжения на этом внутреннем сопротивлении, уменьшая напряжение, фактически доступное нагрузке (эффект 'просадки' напряжения под нагрузкой).", "usage": {"code": false, "without": "Считаешь источник идеальным — под нагрузкой реальное напряжение неожиданно проседает.", "with": "Учитываешь внутреннее сопротивление: оно с нагрузкой образует делитель, U на нагрузке падает при росте тока.", "benefit": "Предсказываешь просадку напряжения под нагрузкой."}}, {"q": "Как выбор топологии схемы (последовательное vs параллельное соединение элементов) влияет на надёжность системы при отказе одного из компонентов?", "options": ["Параллельное соединение всегда менее надёжно, чем последовательное", "Топология соединения не влияет на надёжность при отказе элемента", "Отказ элемента одинаково влияет на цепь независимо от топологии", "Обрыв в последовательной цепи гасит всё, параллельные — нет"], "correct": 3, "explain": "Это фундаментальное архитектурное соображение в электронике и инженерии надёжности: последовательные системы имеют единую точку отказа, тогда как параллельная избыточность (redundancy) может сохранить работоспособность при отказе части компонентов.", "usage": {"code": false, "without": "Соединяешь критичные узлы последовательно — обрыв одного гасит всю систему.", "with": "Ставишь параллельную избыточность: отказ одной ветви не рушит остальные пути.", "benefit": "Убираешь единую точку отказа."}}, {"q": "Почему при проектировании усилительного каскада важно установить правильную рабочую точку транзистора (bias point) перед подачей переменного сигнала?", "options": ["Смещение транзистора нужно только для цифровых, но не аналоговых схем", "Любая рабочая точка одинаково подходит для линейного усиления", "Рабочая точка транзистора не влияет на качество усиления сигнала", "Неверное смещение срезает часть сигнала, вызывая искажения"], "correct": 3, "explain": "Правильное смещение (bias) размещает рабочую точку в середине линейного участка характеристики транзистора, обеспечивая максимальный неискажённый размах усиливаемого переменного сигнала в обе стороны от этой точки.", "usage": {"code": false, "without": "Подаёшь сигнал без настройки смещения — часть волны срезается (отсечка/насыщение), звук искажён.", "with": "Ставишь рабочую точку в середину линейного участка для максимального неискажённого размаха.", "benefit": "Усиление без искажений сигнала."}}, {"q": "Как понятие обратной связи (feedback) в целом (не только в операционных усилителях) применяется для стабилизации характеристик электронных схем при разбросе параметров компонентов?", "options": ["Обратная связь всегда лишь усиливает нестабильность и разброс схемы", "Стабильность схемы никогда не зависит от наличия обратной связи", "Обратная связь сравнивает выход со входом и компенсирует уход параметров", "Обратная связь применима только к операционным усилителям, и нигде более"], "correct": 2, "explain": "Общий инженерный принцип: отрицательная обратная связь делает итоговое поведение системы менее чувствительным к неточностям и вариациям отдельных компонентов, так как ошибка автоматически корректируется через сравнение выхода со входом.", "usage": {"code": false, "without": "Собираешь схему из «плавающих» деталей — параметры дрейфуют от температуры и партии.", "with": "Вводишь отрицательную обратную связь: часть выхода сравнивается со входом и корректирует ошибку.", "benefit": "Поведение схемы не зависит от разброса деталей."}}, {"q": "Почему при проектировании источника питания важно учитывать пульсации (ripple) выходного напряжения после выпрямления переменного тока, и как конденсатор фильтра влияет на этот параметр?", "options": ["Конденсатор фильтра увеличивает пульсации выходного напряжения", "Выпрямленное напряжение после моста никогда не содержит пульсаций", "Пульсации выходного напряжения не влияют на подключаемые устройства", "Конденсатор сглаживает пульсации, заряжаясь на пиках сигнала"], "correct": 3, "explain": "Сглаживающий конденсатор большой ёмкости после выпрямителя действует как буфер энергии, поддерживая относительно стабильное напряжение между пиками выпрямленного сигнала, уменьшая амплитуду пульсаций, которые иначе могли бы нарушить работу чувствительной электроники.", "usage": {"code": false, "without": "Ставишь после выпрямителя нагрузку без фильтра — на выходе большие пульсации, электроника сбоит.", "with": "Добавляешь сглаживающий конденсатор: он заряжается на пиках и питает нагрузку между ними.", "benefit": "Снижаешь пульсации выпрямленного напряжения."}}, {"q": "Как взаимно связаны выбор частоты переключения импульсного (switching) источника питания и размер требуемых индуктивных/ёмкостных компонентов фильтра?", "options": ["Выше частота — меньше L и C фильтра, но растут потери на переключение", "Размер компонентов фильтра задаёт только выходное напряжение", "Более низкая частота переключения всегда уменьшает размер компонентов", "Частота переключения не влияет на размер компонентов фильтра"], "correct": 0, "explain": "Классический компромисс при проектировании импульсных источников питания: увеличение частоты переключения уменьшает необходимый размер реактивных компонентов (что выгодно для миниатюризации), но увеличивает потери на переключение в силовых ключах, требуя более быстрых и качественных транзисторов.", "usage": {"code": false, "without": "Берёшь низкую частоту переключения — фильтрующие L и C выходят громоздкими.", "with": "Повышаешь частоту переключения: период короче, L и C меньше (ценой потерь на ключах).", "benefit": "Миниатюризация фильтра при осознанном компромиссе."}}, {"q": "Почему при последовательном соединении нескольких аккумуляторных элементов (батарея из нескольких ячеек) важна балансировка напряжения между отдельными ячейками?", "options": ["Последовательное соединение само гарантирует равномерный заряд ячеек", "Балансировка ячеек не влияет на срок службы и безопасность батареи", "Разброс ячеек ведёт к их перезаряду и переразряду, снижая ресурс", "Все ячейки последовательной батареи всегда абсолютно идентичны"], "correct": 2, "explain": "В реальности ячейки батареи никогда не бывают абсолютно идентичны; без балансировки (специальных схем выравнивания заряда) наиболее слабая ячейка может выйти за пределы безопасного диапазона напряжения раньше остальных, снижая общий срок службы и создавая риск повреждения.", "usage": {"code": false, "without": "Соединяешь ячейки последовательно и считаешь их одинаковыми — слабейшая перезаряжается/переразряжается.", "with": "Добавляешь балансировку: выравниваешь напряжения ячеек по разбросу ёмкости и внутреннего R.", "benefit": "Дольше живёт батарея и безопаснее заряд."}}, {"q": "Как экранирование (shielding) чувствительных сигнальных линий помогает бороться с электромагнитными помехами (EMI) в электронных устройствах?", "options": ["Экранирование никак не влияет на уровень электромагнитных помех в цепи", "Заземлённый экран ловит внешние поля и отводит наводки на землю", "Электромагнитные помехи устраняются только программными методами кода", "Экранирование кабеля влияет лишь на его механическую прочность корпуса"], "correct": 1, "explain": "Экран действует как проводящий барьер, перехватывающий внешние электромагнитные поля и отводящий наведённые токи на землю, прежде чем они успеют исказить полезный сигнал внутри защищаемого проводника.", "usage": {"code": false, "without": "Тянешь сигнальный провод голым рядом с помехами — наводки искажают сигнал.", "with": "Экранируешь линию заземлённой оплёткой: она перехватывает поля и отводит наводки на землю.", "benefit": "Чистый сигнал при внешних EMI."}}, {"q": "Почему при разработке многослойных печатных плат отдельный слой часто выделяют под сплошную 'землю' (ground plane), а не разводят провод земли обычной дорожкой?", "options": ["Тонкая дорожка земли всегда эквивалентна сплошному слою по свойствам", "Отдельный слой земли нужен только для механической прочности платы", "Сплошной слой земли даёт низкоимпедансную опору, снижая помехи", "Слой земли не влияет на электромагнитную совместимость платы"], "correct": 2, "explain": "Сплошной ground plane имеет значительно меньшее сопротивление и индуктивность по сравнению с узкой дорожкой, обеспечивая более стабильный опорный потенциал и снижая уровень электромагнитных помех и падений напряжения на высоких частотах переключения.", "usage": {"code": false, "without": "Разводишь землю тонкой дорожкой — на высокой частоте растут падения напряжения и помехи.", "with": "Выделяешь сплошной ground plane: низкий импеданс, стабильная опора по всей плате.", "benefit": "Меньше EMI и просадок опорного потенциала."}}, {"q": "Инженер собрал схему, где резистор явно перегревается и через некоторое время перегорает, хотя ток в цепи в пределах расчёта. Какая наиболее вероятная причина, связанная с параметрами компонента?", "options": ["Перегрев резистора никак не связан с протекающим через него током", "Мощность P=I²R превышает номинал резистора — нужен больший ваттаж", "Резисторы вообще не могут перегреваться независимо от параметров", "Причина всегда только в неверном номинале сопротивления, не мощности"], "correct": 1, "explain": "Даже при 'нормальном' токе резистор может перегреваться, если его номинальная мощность (например, 0.25 Вт) меньше фактически рассеиваемой мощности P=I²R — решение обычно заключается в выборе резистора с большей допустимой мощностью или пересмотре схемы для снижения тока/сопротивления.", "usage": {"code": false, "without": "Резистор греется и перегорает, а ты меняешь только номинал сопротивления — не помогает.", "with": "Проверяешь P=I²R против допустимой мощности и ставишь резистор с большим ваттажом.", "benefit": "Устраняешь перегрев подбором мощности, а не только R."}}, {"q": "При тестировании усилителя на операционном усилителе инженер заметил, что при отключении резистора обратной связи выходной сигнал 'зашкаливает' (насыщается на максимум/минимум питания). Как это объяснить с точки зрения роли обратной связи?", "options": ["Без ОС огромное собственное усиление гонит выход в насыщение", "ОУ физически неспособны работать без обратной связи в схеме", "Насыщение выхода указывает на неисправность самого усилителя", "Отсутствие обратной связи никогда не влияет на поведение ОУ"], "correct": 0, "explain": "Собственный коэффициент усиления ОУ без обратной связи (open-loop gain) огромен (часто >100000), поэтому даже микроскопический входной сигнал приводит к насыщению выхода на одном из пределов напряжения питания — именно обратная связь 'приручает' это усиление до контролируемого уровня.", "usage": {"code": false, "without": "Снимаешь обратную связь у ОУ — выход мгновенно упирается в питание, «зашкаливает».", "with": "Держишь обратную связь: огромное собственное усиление приручается до нужного уровня.", "benefit": "Контролируемый выход вместо насыщения."}}, {"q": "Разработчик проектирует делитель напряжения для понижения 12В до 5В для питания микроконтроллера, но подключение реальной нагрузки резко меняет выходное напряжение по сравнению с расчётным. В чём вероятная причина?", "options": ["Проблема возникает только при переменном, а не постоянном токе", "Делители напряжения не могут питать микроконтроллеры в принципе", "Резистивный делитель сам держит стабильное напряжение при любой нагрузке", "Ток нагрузки смещает выход делителя — нужен стабилизатор напряжения"], "correct": 3, "explain": "Простой резистивный делитель не предназначен для питания нагрузок с заметным током — ток нагрузки, протекающий параллельно нижнему резистору, меняет эффективное сопротивление и смещает выходное напряжение; для стабильного питания используют линейные или импульсные стабилизаторы напряжения.", "usage": {"code": false, "without": "Питаешь микроконтроллер резистивным делителем — под нагрузкой 5В превращаются в что-то другое.", "with": "Ставишь стабилизатор напряжения: выход держится независимо от тока нагрузки.", "benefit": "Стабильное питание под реальной нагрузкой."}}, {"q": "При включении индуктивной нагрузки (например, реле или электромотора) через транзисторный ключ инженер наблюдает выход из строя транзистора в момент выключения нагрузки. Какое явлени "0.02 Ом", "100 Ом", "200 Ом", "50 Ом"], "correct": 3, "explain": "Для двух одинаковых параллельных резисторов: R_общ=R/2=100/2=50 Ом.", "usage": {"code": true, "without": "Складываешь параллельные сопротивления как последовательные и получаешь 200 Ом.", "with": "Для двух равных: R=R1/2=100/2 → 50 Ом.", "benefit": "Быстрый расчёт параллельной пары."}}, {"q": "Резистор сопротивлением 10 Ом, через который течёт ток 2А. Какая мощность рассеивается на резисторе (P=I²R)?", "options": ["20 Вт", "40 Вт", "10 Вт", "5 Вт"], "correct": 1, "explain": "P=I²R=2²×10=4×10=40 Вт.", "usage": {"code": true, "without": "Путаешь формулу мощности и берёшь P=IR или UR — цифра неверна.", "with": "P=I²R=2²·10 → 40 Вт.", "benefit": "Верная рассеиваемая мощность для выбора номинала."}}, {"q": "Делитель напряжения из резисторов R1=1кОм (верхнее плечо) и R2=3кОм (нижнее плечо), подключён к источнику 8В. Чему равно выходное напряжение на R2?", "options": ["6В", "4В", "2В", "8В"], "correct": 0, "explain": "Uout=Uin×R2/(R1+R2)=8×3000/(1000+3000)=8×0.75=6В.", "usage": {"code": true, "without": "Берёшь долю напряжения на глаз — получаешь не то Uout.", "with": "Uout=Uin·R2/(R1+R2)=8·3/(1+3) → 6В.", "benefit": "Точное выходное напряжение делителя."}}, {"q": "Конденсатор ёмкостью 100 мкФ заряжен до напряжения 10В. Какая энергия запасена в конденсаторе (E=CU²/2)?", "options": ["5 Дж", "0.5 Дж", "1000 Дж", "0.005 Дж"], "correct": 3, "explain": "E=CU²/2=100×10⁻⁶×10²/2=100×10⁻⁶×100/2=0.01/2=0.005 Дж.", "usage": {"code": true, "without": "Забываешь про 1/2 или квадрат и завышаешь энергию.", "with": "E=CU²/2=100e-6·10²/2 → 0.005 Дж.", "benefit": "Верная запасённая энергия конденсатора."}}, {"q": "Источник напряжения 12В подключён к резистору 4 Ом. Чему равен ток в цепи по закону Ома?", "options": ["3 А", "48 А", "16 А", "0.33 А"], "correct": 0, "explain": "I=U/R=12/4=3 А.", "usage": {"code": true, "without": "Умножаешь U на R вместо деления — ток абсурдно велик.", "with": "I=U/R=12/4 → 3 А по закону Ома.", "benefit": "Мгновенный ток через резистор."}}, {"q": "Три резистора по 6 Ом каждый соединены параллельно. Чему равно общее сопротивление?", "options": ["3 Ом", "2 Ом", "6 Ом", "18 Ом"], "correct": 1, "explain": "1/R_общ=1/6+1/6+1/6=3/6=1/2, значит R_общ=2 Ом.", "usage": {"code": true, "without": "Делишь 6 на что попало и получаешь неверное R трёх параллельных.", "with": "1/R=3·(1/6)=1/2 → R=2 Ом.", "benefit": "Правильное R для N равных параллельных резисторов."}}, {"q": "В цепи переменного тока частотой 50 Гц конденсатор имеет реактивное сопротивление Xc=1/(2πfC). Если C=100 мкФ, чему приблизительно равно Xc (округлённо)?", "options": ["≈0.318 Ом", "≈318 Ом", "≈3.2 Ом", "≈31.8 Ом"], "correct": 3, "explain": "Xc=1/(2π×50×100×10⁻⁶)=1/(2π×0.005)=1/0.0314≈31.8 Ом.", "usage": {"code": true, "without": "Подставляешь единицы неверно (мкФ как Ф) — Xc уходит на порядки.", "with": "Xc=1/(2π·50·100e-6) → ≈31.8 Ом.", "benefit": "Корректное реактивное сопротивление на частоте."}}, {"q": "Батарея с ЭДС 6В и внутренним сопротивлением 1 Ом подключена к внешнему резистору 5 Ом. Чему равен ток в цепи?", "options": ["6 А", "1.2 А", "0.83 А", "1 А"], "correct": 3, "explain": "Общее сопротивление = внутреннее + внешнее = 1+5=6 Ом. I=ЭДС/R_общ=6/6=1 А.", "usage": {"code": true, "without": "Забываешь про внутреннее сопротивление и делишь ЭДС только на внешнее R.", "with": "R=1+5=6 Ом; I=ЭДС/R=6/6 → 1 А.", "benefit": "Верный ток с учётом внутреннего сопротивления."}}, {"q": "Транзисторный каскад имеет коэффициент усиления по напряжению 20. Если входной сигнал имеет амплитуду 0.1В, какова амплитуда выходного сигнала (без учёта ограничений насыщения)?", "options": ["0.1В", "2В", "200В", "20В"], "correct": 1, "explain": "Выходной сигнал = входной × коэффициент усиления = 0.1×20=2В.", "usage": {"code": true, "without": "Прибавляешь коэффициент вместо умножения — амплитуда неверна.", "with": "Uвых=Uвх·K=0.1·20 → 2В.", "benefit": "Точная амплитуда на выходе каскада."}}, {"q": "Два одинаковых конденсатора по 10 мкФ соединены последовательно. Чему равна общая ёмкость (по формуле, аналогичной параллельным резисторам)?", "options": ["10 мкФ", "5 мкФ", "0.1 мкФ", "20 мкФ"], "correct": 1, "explain": "Для последовательных конденсаторов 1/C_общ=1/C1+1/C2=1/10+1/10=2/10, C_общ=10/2=5 мкФ (формула аналогична параллельным резисторам).", "usage": {"code": true, "without": "Считаешь последовательные конденсаторы как складываемые и получаешь 20 мкФ.", "with": "1/C=1/10+1/10=2/10 → C=5 мкФ (как параллельные резисторы).", "benefit": "Верная ёмкость последовательной пары."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
