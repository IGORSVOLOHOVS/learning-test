<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Основы электроники</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/electronics.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Основы электроники</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "electronics";
  const QUESTIONS = [{"q": "Что такое электрический ток?", "options": ["Сопротивление материала протеканию заряда", "Упорядоченное движение заряженных частиц (обычно электронов) в проводнике", "Разность потенциалов между двумя точками", "Количество энергии, запасённой в конденсаторе"], "correct": 1, "explain": "Ток I — это направленное движение заряженных частиц, измеряется в амперах (А), равен количеству заряда, проходящего через сечение проводника за единицу времени."}, {"q": "Что такое напряжение (разность потенциалов)?", "options": ["Сопротивление проводника", "Работа, совершаемая для перемещения единичного заряда между двумя точками", "Скорость движения электронов", "Частота переменного тока"], "correct": 1, "explain": "Напряжение U измеряется в вольтах и представляет собой работу по перемещению единичного положительного заряда между двумя точками электрической цепи."}, {"q": "Что утверждает закон Ома для участка цепи?", "options": ["I = U/R", "R = U + I", "I = U × R × 2", "U = I + R"], "correct": 0, "explain": "Закон Ома: сила тока I прямо пропорциональна напряжению U и обратно пропорциональна сопротивлению R: I=U/R."}, {"q": "Что такое сопротивление (R) проводника?", "options": ["Скорость распространения электромагнитной волны", "Единица измерения ёмкости", "Величина, характеризующая противодействие проводника протеканию электрического тока", "Мощность, рассеиваемая в виде тепла"], "correct": 2, "explain": "Сопротивление (измеряется в омах) характеризует, насколько материал препятствует протеканию тока, преобразуя часть электрической энергии в тепло."}, {"q": "Что такое конденсатор?", "options": ["Элемент, накапливающий энергию в виде магнитного поля", "Элемент, увеличивающий напряжение источника питания", "Элемент, преобразующий переменный ток в постоянный без потерь", "Элемент, накапливающий энергию в виде электрического поля между двумя проводящими обкладками"], "correct": 3, "explain": "Конденсатор состоит из двух проводящих пластин, разделённых диэлектриком, и накапливает электрическую энергию в виде электрического поля между ними."}, {"q": "Что такое индуктивность (катушка индуктивности)?", "options": ["Элемент, который блокирует постоянный ток и не пропускает переменный", "Устройство для измерения напряжения", "Элемент, накапливающий энергию в виде магнитного поля при протекании через него тока", "Синоним резистора"], "correct": 2, "explain": "Катушка индуктивности накапливает энергию в магнитном поле, создаваемом протекающим через неё током, и противодействует изменению этого тока."}, {"q": "Что такое диод и его основное свойство?", "options": ["Элемент, накапливающий заряд как конденсатор", "Элемент, пропускающий ток одинаково в обоих направлениях", "Полупроводниковый элемент, пропускающий ток преимущественно в одном направлении", "Резистор с переменным сопротивлением"], "correct": 2, "explain": "Диод обладает односторонней проводимостью: в прямом направлении сопротивление мало (ток течёт), в обратном — велико (ток практически не течёт)."}, {"q": "Что такое транзистор в самом общем смысле?", "options": ["Устройство для накопления электрического заряда", "Полупроводниковый элемент, способный усиливать сигнал или работать как электронный переключатель", "Пассивный элемент, только рассеивающий энергию в виде тепла", "Тип резистора с фиксированным сопротивлением"], "correct": 1, "explain": "Транзистор — активный полупроводниковый элемент, который может усиливать электрический сигнал или переключаться между проводящим и непроводящим состоянием, управляемый током или напряжением."}, {"q": "Что означает последовательное соединение резисторов с точки зрения общего сопротивления?", "options": ["Общее сопротивление меньше наименьшего из отдельных сопротивлений", "Общее сопротивление равно среднему значению сопротивлений", "Общее сопротивление всегда равно нулю", "Общее сопротивление равно сумме отдельных сопротивлений"], "correct": 3, "explain": "При последовательном соединении общее сопротивление R_общ = R1+R2+...+Rn — сопротивления складываются."}, {"q": "Что такое переменный ток (AC) в отличие от постоянного (DC)?", "options": ["Ток, равный нулю в любой момент времени", "Ток, который течёт только в одном направлении без изменений", "Ток, который существует только в конденсаторах", "Ток, направление и величина которого периодически меняются со временем"], "correct": 3, "explain": "Переменный ток периодически меняет направление и амплитуду (обычно по синусоидальному закону), в отличие от постоянного тока, текущего в одном направлении с неизменной величиной."}, {"q": "Почему при параллельном соединении резисторов общее сопротивление всегда меньше наименьшего из отдельных сопротивлений?", "options": ["Число параллельных резисторов не влияет на итоговое сопротивление", "Общее сопротивление при параллельном соединении равно сумме отдельных сопротивлений, как и при последовательном", "Параллельное соединение создаёт дополнительные пути для протекания тока, увеличивая суммарную проводимость (1/R_общ = 1/R1+1/R2+...), что соответствует уменьшению общего сопротивления", "Параллельное соединение всегда увеличивает общее сопротивление цепи"], "correct": 2, "explain": "Проводимости (величины, обратные сопротивлению) складываются при параллельном соединении, а не сопротивления — добавление любого дополнительного параллельного пути только увеличивает общую проводимость, то есть уменьшает общее сопротивление."}, {"q": "Почему конденсатор блокирует постоянный ток в установившемся режиме, но пропускает переменный ток?", "options": ["Конденсатор физически не может взаимодействовать с переменным током", "Постоянный ток всегда свободно проходит через полностью заряженный конденсатор", "В установившемся режиме постоянного тока конденсатор полностью заряжается и ток через него прекращается, тогда как постоянно меняющееся напряжение переменного тока непрерывно перезаряжает конденсатор, поддерживая протекание тока через цепь", "Конденсатор всегда одинаково хорошо пропускает и постоянный, и переменный ток"], "correct": 2, "explain": "После полной зарядки конденсатора в цепи постоянного тока ток через него прекращается (реактивное сопротивление становится бесконечным на постоянном токе); при переменном токе конденсатор постоянно циклически заряжается и разряжается, пропуская ток."}, {"q": "Почему катушка индуктивности ведёт себя противоположно конденсатору по отношению к постоянному и переменному току?", "options": ["Индуктивность не взаимодействует с изменяющимся во времени током", "Индуктивность противодействует изменению тока через неё, поэтому она свободно пропускает постоянный ток в установившемся режиме (нет изменения), но создаёт значительное реактивное сопротивление переменному току (постоянно меняющемуся)", "Катушка индуктивности ведёт себя абсолютно идентично конденсатору для любого типа тока", "Катушка индуктивности блокирует любой ток независимо от его характера"], "correct": 1, "explain": "Согласно закону электромагнитной индукции, катушка противодействует изменению тока (ЭДС самоиндукции), поэтому для установившегося постоянного тока (без изменений) она ведёт себя как обычный проводник, а для переменного тока создаёт значительное индуктивное сопротивление."}, {"q": "Как работает делитель напряжения на двух последовательно соединённых резисторах, и почему соотношение сопротивлений определяет выходное напряжение?", "options": ["Напряжение делится поровну между резисторами независимо от их сопротивлений", "Делитель напряжения работает только с одинаковыми по номиналу резисторами", "Выходное напряжение делителя не зависит от соотношения сопротивлений", "Ток через оба последовательных резистора одинаков, поэтому падение напряжения на каждом резисторе пропорционально его сопротивлению относительно общего сопротивления цепи (по закону Ома), что позволяет получить долю входного напряжения на выходе"], "correct": 3, "explain": "Так как ток в последовательной цепи одинаков через оба резистора, падения напряжения U1=I·R1 и U2=I·R2 пропорциональны соответствующим сопротивлениям — отсюда формула делителя Uout=Uin·R2/(R1+R2)."}, {"q": "Почему транзистор может использоваться и как усилитель, и как цифровой переключатель, в зависимости от режима работы?", "options": ["Транзистор всегда работает исключительно как переключатель без возможности усиления", "Режим работы транзистора не зависит от рабочей точки на его характеристике", "В линейной (активной) области транзистор пропорционально усиливает входной сигнал, а в области насыщения/отсечки он резко переключается между полностью открытым и полностью закрытым состояниями, что используется в цифровой логике", "Транзистор всегда работает исключительно как усилитель без возможности переключения"], "correct": 2, "explain": "Рабочая точка транзистора (задаваемая смещением) определяет режим: в активной области малые изменения входа дают пропорциональные (усиленные) изменения выхода, а в насыщении/отсечке транзистор ведёт себя как замкнутый/разомкнутый переключатель."}, {"q": "Почему в цепях переменного тока используют понятие импеданса (комплексного сопротивления), а не просто активного сопротивления, как в цепях постоянного тока?", "options": ["Реактивные элементы (конденсаторы, катушки) не влияют на поведение цепи переменного тока", "Понятие импеданса применимо только к цепям постоянного тока", "Импеданс — это просто другое название активного сопротивления без дополнительного смысла", "Импеданс учитывает не только активное сопротивление, но и реактивные составляющие (от конденсаторов и катушек индуктивности), которые вносят фазовый сдвиг между током и напряжением, зависящий от частоты сигнала"], "correct": 3, "explain": "В отличие от чисто активного сопротивления, импеданс — комплексная величина, отражающая как амплитудное отношение напряжения к току, так и фазовый сдвиг, вносимый реактивными элементами, который зависит от частоты сигнала."}, {"q": "Почему заземление (общий провод/земля) важно для корректной работы и безопасности электронной схемы?", "options": ["Заземление не влияет дение напряжения на внутреннем сопротивлении растёт пропорционально току)", "Внутреннее сопротивление источника никогда не влияет на напряжение на нагрузке", "Напряжение на нагрузке не зависит от протекающего через цепь тока"], "correct": 1, "explain": "Реальный источник моделируется как идеальный источник ЭДС с последовательным внутренним сопротивлением; ток нагрузки создаёт падение напряжения на этом внутреннем сопротивлении, уменьшая напряжение, фактически доступное нагрузке (эффект 'просадки' напряжения под нагрузкой)."}, {"q": "Как выбор топологии схемы (последовательное vs параллельное соединение элементов) влияет на надёжность системы при отказе одного из компонентов?", "options": ["Параллельное соединение всегда менее надёжно, чем последовательное", "Топология соединения не влияет на надёжность системы при отказе компонента", "Отказ любого элемента одинаково влияет на всю цепь независимо от топологии", "В последовательной цепи отказ (обрыв) одного элемента прерывает ток во всей цепи, тогда как в параллельной цепи отказ одной ветви обычно не влияет на работу остальных параллельных путей"], "correct": 3, "explain": "Это фундаментальное архитектурное соображение в электронике и инженерии надёжности: последовательные системы имеют единую точку отказа, тогда как параллельная избыточность (redundancy) может сохранить работоспособность при отказе части компонентов."}, {"q": "Почему при проектировании усилительного каскада важно установить правильную рабочую точку транзистора (bias point) перед подачей переменного сигнала?", "options": ["Смещение транзистора нужно только для цифровых, а не аналоговых схем", "Любая рабочая точка одинаково хорошо подходит для линейного усиления", "Рабочая точка транзистора не влияет на качество усиления сигнала", "Рабочая точка определяет, где на нелинейной характеристике транзистора будет 'колебаться' сигнал — неправильное смещение может привести к отсечке или насыщению части сигнала, вызывая искажения"], "correct": 3, "explain": "Пр е напряжение между пиками выпрямленного сигнала, уменьшая амплитуду пульсаций, которые иначе могли бы нарушить работу чувствительной электроники."}, {"q": "Как взаимно связаны выбор частоты переключения импульсного (switching) источника питания и размер требуемых индуктивных/ёмкостных компонентов фильтра?", "options": ["Более высокая частота переключения позволяет использовать меньшие по размеру и ёмкости индуктивности и конденсаторы для сглаживания, так как период между переключениями короче, но это увеличивает потери на переключение и требования к быстродействию силовых транзисторов", "Размер компонентов фильтра определяется исключительно выходным напряжением, а не частотой", "Более низкая частота переключения всегда позволяет уменьшить размер компонентов фильтра", "Частота переключения не влияет на требуемый размер компонентов фильтра"], "correct": 0, "explain": "Классический компромисс при проектировании импульсных источников питания: увеличение частоты переключения уменьшает необходимый размер реактивных компонентов (что выгодно для миниатюризации), но увеличивает потери на переключение в силовых ключах, требуя более быстрых и качественных транзисторов."}, {"q": "Почему при последовательном соединении нескольких аккумуляторных элементов (батарея из нескольких ячеек) важна балансировка напряжения между отдельными ячейками?", "options": ["Последовательное соединение ячеек автоматически гарантирует равномерный заряд без дополнительных мер", "Балансировка напряжения ячеек не влияет на срок службы или безопасность батареи", "Небольшие различия в ёмкости или внутреннем сопротивлении ячеек могут привести к неравномерному заряду/разряду, из-за чего одна ячейка может перезарядиться или переразрядиться раньше других, что снижает срок службы и может быть небезопасно", "Все ячейки в последовательной батарее всегда абсолютно идентичны по своим характеристикам"], "correct": 2, "explain": "В реальности ячейки батареи никогда не бывают абсолютно идентичны; без балансировки (специальных схем выравнивания заряда) наиболее слабая ячейка может выйти за пределы безопасного диапазона напряжения раньше остальных, снижая общий срок службы и создавая риск повреждения."}, {"q": "Как экранирование (shielding) чувствительных сигнальных линий помогает бороться с электромагнитными помехами (EMI) в электронных устройствах?", "options": ["Экранирование не оказывает влияния на уровень электромагнитных помех в цепи", "Проводящий экран (например, оплётка кабеля), соединённый с землёй, перехватывает и отводит наведённые внешние электромагнитные поля, не давая им индуцировать паразитные токи и напряжения во внутреннем сигнальном проводнике", "Электромагнитные помехи можно устранить исключительно программными методами без аппаратных мер", "Экранирование кабеля влияет только на его механическую прочность, а не на электрические свойства"], "correct": 1, "explain": "Экран действует как проводящий барьер, перехватывающий внешние электромагнитные поля и отводящий наведённые токи на землю, прежде чем они успеют исказить полезный сигнал внутри защищаемого проводника."}, {"q": "Почему при разработке многослойных печатных плат отдельный слой часто выделяют под сплошную 'землю' (ground plane), а не разводят провод земли обычной дорожкой?", "options": ["Дорожка земли обычной ширины всегда эквивалентна по электрическим свойствам сплошному слою", "Отдельный слой земли используется только для механической прочности платы", "Сплошной слой земли обеспечивает низкоимпедансный, стабильный опорный потенциал по всей плате, уменьшая падения напряжения и электромагнитные помехи по сравнению с тонкими дорожками земли, которые могут вносить заметное собственное сопротивление и индуктивность", "Слой земли не влияет на электромагнитную совместимость устройства"], "correct": 2, "explain": "Сплошной ground plane имеет значительно меньшее сопротивление и индуктивность по сравнению с узкой дорожкой, обеспечивая более стабильный опорный потенциал и снижая уровень электромагнитных помех и падений напряжения на высоких частотах переключения."}, {"q": "Инженер собрал схему, где резистор явно перегревается и через некоторое время перегорает, хотя ток в цепи в пределах расчёта. Какая наиболее вероятная причина, связанная с параметрами компонента?", "options": ["Перегрев резистора не связан с протекающим через него током", "Номинальная допустимая мощность резистора, вероятно, была выбрана слишком низкой для реального рассеиваемого тепла (P=I²R превышает номинал компонента) — нужно выбрать резистор с более высокой номинальной мощностью", "Резисторы никогда не могут перегреваться независимо от параметров цепи", "Причина всегда только в неправильном номинале сопротивления, а не мощности"], "correct": 1, "explain": "Даже при 'нормальном' токе резистор может перегреваться, если его номинальная мощность (например, 0.25 Вт) меньше фактически рассеиваемой мощности P=I²R — решение обычно заключается в выборе резистора с большей допустимой мощностью или пересмотре схемы для снижения тока/сопротивления."}, {"q": "При тестировании усилителя на операционном усилителе инженер заметил, что при отключении резистора обратной связи выходной сигнал 'зашкаливает' (насыщается на максимум/минимум питания). Как это объяснить с точки зрения роли обратной связи?", "options": ["Без обратной связи операционный усилитель работает с очень большим собственным (открытым) коэффициентом усиления, и даже минимальный входной сигнал/шум усиливается настолько сильно, что выход мгновенно упирается в пределы напряжения питания", "Операционные усилители физически не могут работать без обратной связи ни при каких условиях", "Насыщение выхода указывает на неисправность самого усилителя, а не на отсутствие обратной связи", "Отсутствие обратной связи никогда не влияет на поведение операционного усилителя"], "correct": 0, "explain": "Собственный коэффициент усиления ОУ без обратной связи (open-loop gain) огромен (часто >100000), поэтому даже микроскопический входной сигнал приводит к насыщению выхода на одном из пределов напряжения питания — именно обратная связь 'приручает' это усиление до контролируемого уровня."}, {"q": "Разработчик проектирует делитель напряжения для понижения 12В до 5В для питания микроконтроллера, но подключение реальной нагрузки резко меняет выходное напряжение по сравнению с расчётным. В чём вероятная причина?", "options": ["Проблема возникает только при использовании переменного, а не постоянного тока", "Делители напряжения физически не могут использоваться для питания микроконтроллеров", "Резистивные делители напряжения всегда дают идеально стабильное напряжение независимо от нагрузки", "Простой резистивный делитель напряжения сильно зависит от тока нагрузки — подключение нагрузки с низким сопротивлением меняет эквивалентное сопротивление нижнего плеча делителя, искажая выходное напряжение; для стабильного питания нужен стабилизатор напряжения, а не просто делитель"], "correct": 3, "explain": "Простой резистивный делитель не предназначен для питания нагрузок с заметным током — ток нагрузки, протекающий параллельно нижнему резистору, меняет эффективное сопротивление и смещает выходное напряжение; для стабильного питания используют линейные или импульсные стабилизаторы напряжения."}, {"q": "При включении индуктивной нагрузки (например, реле или электромотора) через транзисторный ключ инженер наблюдает выход из строя транзистора в момент выключения нагрузки. Какое явление, вероятно, происходит, и как его предотвратить?", "options": ["Индуктивные нагрузки никогда не создают выбросов напряжения при выключении", "При резком отключении тока через индуктивность возникает высоковольтный выброс напряжения самоиндукции, который может повредить транзистор — стандартное решение: добавить защитный диод (flyback diode) параллельно индуктивной нагрузке", "Проблема связана исключительно с недостаточной мощностью источника питания", "Выход транзистора из строя в этом случае не связан с индуктивной природой нагрузки"], "correct": 1, "explain": "Резкое прерывание тока через индуктивность вызывает большой скачок напряжения (согласно U=-L·dI/dt), способный превысить допустимое напряжение транзистора — защитный диод (flyback diode) обеспечивает путь для этого тока, предотвращая повреждение."}, {"q": "Инженер измеряет напряжение мультиметром на высокоомном участке схемы и получает заметно иное значение, чем ожидалось по расчёту, хотя схема собрана верно. Какое объяснение наиболее вероятно, связанное со свойствами измерительного прибора?", "options": ["Расхождение всегда означает, что сама схема собрана неправильно", "Внутреннее сопротивление вольтметра (даже большое, но конечное) образует делитель напряжения совместно с высокоомным участком схемы, искажая измеряемое значение — это называется эффектом нагрузки измерительного прибора", "Мультиметры никогда не влияют на измеряемую цепь независимо от её сопротивления", "Внутреннее сопротивление вольтметра не может повлиять на результат измерения"], "correct": 1, "explain": "Реальный вольтметр имеет конечное (хоть и большое) входное сопротивление, которое при измерении высокоомных участков цепи может заметно 'нагружать' цепь, действуя как ещё один параллельный резистор и искажая измеряемое напряжение."}, {"q": "При проектировании фильтра на основе конденсатора и резистора (RC-фильтр) разработчик хочет пропускать низкие частоты и подавлять высокие. Какая конфигурация и рассуждение здесь корректны?", "options": ["RC-цепь физически не может выполнять функцию частотного фильтра", "Фильтр нижних частот: конденсатор включается параллельно выходу, так как на высоких частотах его реактивное сопротивление мало (закорачивает высокочастотный сигнал на землю), а на низких — велико (сигнал проходит на выход)", "Для подавления высоких частот конденсатор всегда должен быть включён последовательно с нагрузкой", "Тип фильтра (низких/высоких частот) не зависит от расположения конденсатора в схеме"], "correct": 1, "explain": "Реактивное сопротивление конденсатора Xc=1/(2πfC) уменьшается с ростом частоты; включённый параллельно выходу, конденсатор эффективно 'закорачивает' высокочастотные составляющие сигнала на землю, пропуская низкочастотные — классическая топология RC-фильтра нижних частот."}, {"q": "Команда тестирует прототип устройства и обнаруживает нестабильную работу цифровой логики при удлинении соединительных проводов между платами. Какая причина наиболее вероятна с точки зрения электроники высоких частот?", "options": ["Длинные провода вносят дополнительную индуктивность и ёмкость (паразитные параметры), которые на высоких частотах переключения могут вызывать отражения сигнала, звон и искажение фронтов цифровых импульсов", "Проблема возникает только при использовании переменного тока промышленной частоты", "Длина проводов никогда не влияет на работу цифровых схем при любой скорости переключения", "Удлинение проводов всегда улучшает стабильность цифровых сигналов"], "correct": 0, "explain": "На высоких частотах переключения (быстрые фронты цифровых сигналов) даже небольшая паразитная индуктивность/ёмкость длинных проводников может существенно исказить форму сигнала, вызывая ошибки в цифровой логике — отсюда важность коротких трасс и согласования линий в быстрой цифровой электронике."}, {"q": "При замере тока в цепи амперметром инженер случайно подключил его параллельно нагрузке вместо последовательного включения. Какой вероятный результат этого действия?", "options": ["Амперметр в этом случае просто покажет ноль без каких-либо рисков", "Амперметр покажет корректное значение тока независимо от способа подключения", "Неправильное подключение амперметра никогда не приводит к каким-либо последствиям", "Амперметр (обладающий очень малым внутренним сопротивлением) создаст короткое замыкание участка цепи, что может привести к чрезмерному току и повреждению прибора или источника питания"], "correct": 3, "explain": "Амперметры спроектированы с очень малым внутренним сопротивлением для измерения тока при последовательном включении; при параллельном подключении к источнику напряжения это фактически создаёт короткое замыкание, что опасно и для прибора, и для схемы."}, {"q": "Компания разрабатывает зарядное устройство и должна выбрать между линейным и импульсным (switching) стабилизатором напряжения для понижения напряжения с большим перепадом (например, с 24В до 5В) при значительном токе нагрузки. Какой вариант обычно предпочтительнее и почему?", "options": ["Тип стабилизатора не влияет на тепловыделение и эффективность устройства", "Импульсный стабилизатор обычно предпочтительнее при большом перепаде напряжения и токе, так как линейный стабилизатор рассеивает разницу напряжений в виде тепла (низкий КПД), тогда как импульсный работает значительно эффективнее", "Импульсные стабилизаторы неприменимы для зарядных устройств", "Линейный стабилизатор всегда эффективнее и предпочтительнее импульсного при любых условиях"], "correct": 1, "explain": "Линейный стабилизатор рассеивает избыточную мощность (Uвх-Uвых)×I в виде тепла, что при большом перепаде напряжения и значительном токе даёт низкий КПД и требует радиатора; импульсные преобразователи достигают гораздо более высокого КПД за счёт периодического переключения, а не постоянного рассеивания разницы."}, {"q": "Разработчик заметил, что цифровая схема работает нестабильно именно при переключении соседнего мощного силового транзистора, хотя питание в остальном стабильно. Какая наиболее вероятная причина и типичное решение?", "options": ["Резкие броски тока при переключении силового транзистора создают помехи по цепям питания и земли (di/dt), наводящие паразитные сигналы на чувствительную логику — решение обычно включает развязывающие конденсаторы (decoupling) и разделение земляных полигонов силовой и цифровой части", "Нестабильность цифровой логики в этом случае не связана с силовым каскадом", "Проблема решается только полным физическим разделением устройств на разные корпуса", "Соседство силового и цифрового каскадов никогда не создаёт взаимных помех"], "correct": 0, "explain": "Быстрые изменения тока (di/dt) в силовых цепях создают импульсные помехи по общим шинам питания/земли; развязывающие конденсаторы вблизи чувствительных микросхем и разделение (при должном объединении в одной точке) силовой и сигнальной земли — стандартные меры борьбы с этим эффектом."}, {"q": "В цепи с последовательными резисторами R1=100 Ом и R2=200 Ом при напряжении источника 9В. Чему равен общий ток в цепи?", "options": ["300 А", "0.03 А", "0.09 А", "0.3 А"], "correct": 1, "explain": "R_общ=100+200=300 Ом. По закону Ома I=U/R=9/300=0.03 А."}, {"q": "Два резистора по 100 Ом каждый соединены параллельно. Чему равно общее сопротивление?", "options": ["0.02 Ом", "100 Ом", "200 Ом", "50 Ом"], "correct": 3, "explain": "Для двух одинаковых параллельных резисторов: R_общ=R/2=100/2=50 Ом."}, {"q": "Резистор сопротивлением 10 Ом, через который течёт ток 2А. Какая мощность рассеивается на резисторе (P=I²R)?", "options": ["20 Вт", "40 Вт", "10 Вт", "5 Вт"], "correct": 1, "explain": "P=I²R=2²×10=4×10=40 Вт."}, {"q": "Делитель напряжения из резисторов R1=1кОм (верхнее плечо) и R2=3кОм (нижнее плечо), подключён к источнику 8В. Чему равно выходное напряжение на R2?", "options": ["6В", "4В", "2В", "8В"], "correct": 0, "explain": "Uout=Uin×R2/(R1+R2)=8×3000/(1000+3000)=8×0.75=6В."}, {"q": "Конденсатор ёмкостью 100 мкФ заряжен до напряжения 10В. Какая энергия запасена в конденсаторе (E=CU²/2)?", "options": ["5 Дж", "0.5 Дж", "1000 Дж", "0.005 Дж"], "correct": 3, "explain": "E=CU²/2=100×10⁻⁶×10²/2=100×10⁻⁶×100/2=0.01/2=0.005 Дж."}, {"q": "Источник напряжения 12В подключён к резистору 4 Ом. Чему равен ток в цепи по закону Ома?", "options": ["3 А", "48 А", "16 А", "0.33 А"], "correct": 0, "explain": "I=U/R=12/4=3 А."}, {"q": "Три резистора по 6 Ом каждый соединены параллельно. Чему равно общее сопротивление?", "options": ["3 Ом", "2 Ом", "6 Ом", "18 Ом"], "correct": 1, "explain": "1/R_общ=1/6+1/6+1/6=3/6=1/2, значит R_общ=2 Ом."}, {"q": "В цепи переменного тока частотой 50 Гц конденсатор имеет реактивное сопротивление Xc=1/(2πfC). Если C=100 мкФ, чему приблизительно равно Xc (округлённо)?", "options": ["≈0.318 Ом", "≈318 Ом", "≈3.2 Ом", "≈31.8 Ом"], "correct": 3, "explain": "Xc=1/(2π×50×100×10⁻⁶)=1/(2π×0.005)=1/0.0314≈31.8 Ом."}, {"q": "Батарея с ЭДС 6В и внутренним сопротивлением 1 Ом подключена к внешнему резистору 5 Ом. Чему равен ток в цепи?", "options": ["6 А", "1.2 А", "0.83 А", "1 А"], "correct": 3, "explain": "Общее сопротивление = внутреннее + внешнее = 1+5=6 Ом. I=ЭДС/R_общ=6/6=1 А."}, {"q": "Транзисторный каскад имеет коэффициент усиления по напряжению 20. Если входной сигнал имеет амплитуду 0.1В, какова амплитуда выходного сигнала (без учёта ограничений насыщения)?", "options": ["0.1В", "2В", "200В", "20В"], "correct": 1, "explain": "Выходной сигнал = входной × коэффициент усиления = 0.1×20=2В."}, {"q": "Два одинаковых конденсатора по 10 мкФ соединены последовательно. Чему равна общая ёмкость (по формуле, аналогичной параллельным резисторам)?", "options": ["10 мкФ", "5 мкФ", "0.1 мкФ", "20 мкФ"], "correct": 1, "explain": "Для последовательных конденсаторов 1/C_общ=1/C1+1/C2=1/10+1/10=2/10, C_общ=10/2=5 мкФ (формула аналогична параллельным резисторам)."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
