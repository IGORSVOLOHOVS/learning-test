<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISO стандарты (менеджмент и ИТ)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>ISO стандарты (менеджмент и ИТ)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "iso_standards";
  const QUESTIONS = [{"q": "Что такое ISO (International Organization for Standardization)?", "options": ["Государственное агентство США по сертификации ПО", "Международная организация по стандартизации, разрабатывающая добровольные стандарты в разных отраслях", "Коммерческая компания, продающая программное обеспечение", "Название протокола передачи данных в интернете"], "correct": 1, "explain": "ISO — независимая неправительственная международная организация, объединяющая национальные органы по стандартизации и разрабатывающая добровольные стандарты для широкого круга отраслей."}, {"q": "Что регламентирует стандарт ISO 9001?", "options": ["Информационную безопасность организации", "Систему менеджмента качества (Quality Management System)", "Стандарты веб-разработки", "Протоколы сетевой передачи данных"], "correct": 1, "explain": "ISO 9001 — самый известный стандарт серии ISO 9000, устанавливающий требования к системе менеджмента качества организации независимо от отрасли."}, {"q": "Что регламентирует стандарт ISO/IEC 27001?", "options": ["Систему менеджмента информационной безопасности (Information Security Management System)", "Экологический менеджмент организации", "Управление проектами", "Стандарты качества пищевой продукции"], "correct": 0, "explain": "ISO/IEC 27001 — международный стандарт, определяющий требования к системе менеджмента информационной безопасности (СМИБ/ISMS)."}, {"q": "Что регламентирует стандарт ISO 21502 (ранее связанный с ISO 21500)?", "options": ["Управление проектами (Project Management)", "Кибербезопасность IoT-устройств", "Разработку программного обеспечения по методологии Agile", "Стандарты качества воздуха в офисах"], "correct": 0, "explain": "ISO 21502 (обновление концепций ISO 21500) даёт руководство по управлению проектами, описывая общие процессы и практики независимо от отрасли."}, {"q": "Что означает аббревиатура ISMS в контексте ISO/IEC 27001?", "options": ["Information Security Management System — система менеджмента информационной безопасности", "International Software Management Standard", "Internal Security Monitoring Service", "Information System Maintenance Schedule"], "correct": 0, "explain": "ISMS — систематический подход к управлению конфиденциальной информацией компании, чтобы она оставалась защищённой, включающий людей, процессы и ИТ-системы."}, {"q": "Что регламентирует стандарт ISO/IEC 20000?", "options": ["Управление ИТ-услугами (IT Service Management)", "Финансовую отчётность компании", "Промышленную безопасность на производстве", "Управление автопарком компании"], "correct": 0, "explain": "ISO/IEC 20000 — международный стандарт, определяющий требования к системе управления ИТ-услугами (IT Service Management), схожий по духу с практиками ITIL."}, {"q": "Что такое сертификация по стандарту ISO для организации?", "options": ["Автоматический процесс, не требующий проверки", "Формальное подтверждение независимым органом (аудитором), что процессы организации соответствуют требованиям конкретного стандарта", "Регистрация товарного знака компании", "Обязательное требование для регистрации любого юридического лица"], "correct": 1, "explain": "Сертификация по ISO — добровольный процесс, при котором независимый аккредитованный орган сертификации проверяет (аудирует) соответствие процессов организации требованиям конкретного стандарта."}, {"q": "Что регламентирует стандарт ISO/IEC 12207?", "options": ["Процессы жизненного цикла программного обеспечения (Software Life Cycle Processes)", "Требования к электробезопасности бытовых приборов", "Управление персоналом в ИТ-компаниях", "Стандарты упаковки товаров"], "correct": 0, "explain": "ISO/IEC 12207 определяет общую схему процессов жизненного цикла программного обеспечения — от концепции и разработки до сопровождения и вывода из эксплуатации."}, {"q": "Что означает термин 'непрерывное улучшение' (continual improvement), являющийся общим принципом многих стандартов ISO (например, ISO 9001)?", "options": ["Однократное внедрение процессов без дальнейших изменений", "Циклический процесс регулярного анализа и улучшения процессов организации (например, через цикл PDCA: Plan-Do-Check-Act)", "Ежедневное обновление программного обеспечения компании", "Постоянное расширение штата сотрудников"], "correct": 1, "explain": "Многие стандарты ISO (в первую очередь серии менеджмента) построены вокруг цикла PDCA (Plan-Do-Check-Act), предполагающего постоянный, повторяющийся процесс анализа и улучшения, а не разовое внедрение."}, {"q": "Что из перечисленного отличает стандарт ISO от закона (обязательного правового акта)?", "options": ["Стандарты ISO обычно добровольны для применения, если только не сделаны обязательными через регуляторные требования или контракты", "ISO — это государственный законодательный орган, а не организация по стандартизации", "Стандарты ISO автоматически имеют силу закона во всех странах мира", "Соответствие стандартам ISO юридически идентично уплате налогов"], "correct": 0, "explain": "В отличие от законов, стандарты ISO по своей природе добровольны — организации выбирают их соблюдение для повышения качества, доверия клиентов или доступа к определённым рынкам, если только конкретный регулятор или контракт не делает соответствие обязательным."}, {"q": "Почему многие стандарты серии ISO (9001, 27001, 20000) построены на общей структуре высокого уровня (High Level Structure, HLS), несмотря на различие предметных областей?", "options": ["Общая структура упрощает интеграцию нескольких систем менеджмента в одной организации (например, одновременно качества и информационной безопасности), так как основные разделы (контекст организации, лидерство, планирование, поддержка, оценка и улучшение) унифицированы между стандартами", "Каждый стандарт ISO использует полностью уникальную, несовместимую структуру документа без каких-либо общих элементов", "Единая структура высокого уровня применяется только к стандартам качества, но не к стандартам безопасности", "Общая структура ISO стандартов существует исключительно по эстетическим причинам без практической пользы"], "correct": 0, "explain": "Annex SL (High Level Structure) — общий 'скелет' для стандартов систем менеджмента ISO, введённый для упрощения совместного внедрения нескольких стандартов в одной организации без дублирования пересекающихся требований."}, {"q": "Почему цикл PDCA (Plan-Do-Check-Act), лежащий в основе многих стандартов ISO, считается циклическим, а не линейным процессом с чётким завершением?", "options": ["Улучшение процессов рассматривается как непрерывная деятельность: после этапа 'Act' (внедрение улучшений) цикл начинается заново с планирования следующей итерации, отражая философию постоянного совершенствования, а не разового 'финального' состояния", "PDCA выполняется организацией только один раз при первом внедрении стандарта и никогда не повторяется", "Цикл PDCA применим только к производственным процессам, но не к системам менеджмента качества или безопасности", "После завершения цикла PDCA процессы организации считаются идеальными и не требуют дальнейшего анализа"], "correct": 0, "explain": "Философия непрерывного улучшения (continual improvement), заложенная в стандарты менеджмента ISO, принципиально не предполагает 'конечного' идеального состояния — PDCA явно спроектирован как повторяющийся цикл совершенствования."}, {"q": "Почему сертификация ISO 27001 фокусируется не только на технических мерах защиты (файрволы, шифрование), но и на организационных процессах (управление рисками, обучение персонала, политики)?", "options": ["Информационная безопасность — это комплексная задача, где человеческий фактор и организационные процессы (например, обработка инцидентов, управление доступом) часто представляют не меньший риск, чем чисто технические уязвимости, поэтому стандарт требует целостного, а не только технического подхода", "Организационные процессы не имеют отношения к информационной безопасности организации", "ISO 27001 регулирует исключительно закупку и настройку технических средств защиты", "Человеческий фактор полностью исключён из рассмотрения в стандартах информационной безопасности"], "correct": 0, "explain": "ISO 27001 явно требует управления рисками, охватывающего людей, процессы и технологии совместно, признавая, что даже самая совершенная техническая защита неэффективна без соответствующих организационных практик (обучение, политики доступа, реагирование на инциденты)."}, {"q": "Как соотносятся между собой ISO 21502 (управление проектами) и специфичные отраслевые методологии (например, Agile, Scrum, PRINCE2)?", "options": ["ISO 21502 задаёт общий, универсальный набор принципов и терминологии управления проектами, применимый к любой отрасли, тогда как конкретные методологии (Agile, PRINCE2) предлагают более детальные, специфические практики и инструменты в рамках этих общих принципов", "ISO 21502 полностью заменяет собой любые методологии управления проектами, делая их использование излишним", "Agile и Scrum технически несовместимы с общими принципами ISO 21502", "Стандарт ISO 21502 применим только к каскадным (waterfall), но не к гибким (Agile) проектам"], "correct": 0, "explain": "ISO 21502 позиционируется как высокоуровневое, методологически нейтральное руководство, описывающее универсальные процессы управления проектами, тогда как конкретные фреймворки (Scrum, PRINCE2) предоставляют детализированные практические инструменты, совместимые с этими общими принципами."}, {"q": "Почему стандарт ISO/IEC 20000 (управление ИТ-услугами) часто внедряют совместно с практиками ITIL, хотя это формально разные документы?", "options": ["ITIL предоставляет детальный практический набор рекомендаций и лучших практик по управлению ИТ-услугами, тогда как ISO/IEC 20000 — формальный сертифицируемый стандарт, задающий требования, которым можно соответствовать, во многом опираясь именно на практики, описанные в ITIL", "ITIL и ISO/IEC 20000 — это два совершенно несвязанных, противоречащих друг другу документа", "ISO/IEC 20000 полностью заменяет собой необходимость в изучении ITIL", "ITIL является юридически обязательным международным законом, а ISO/IEC 20000 — нет"], "correct": 0, "explain": "ITIL (свод лучших практик по управлению ИТ-услугами) и ISO/IEC 20000 (формальный сертифицируемый стандарт) взаимно дополняют друг друга: организации часто используют ITIL как практическое руководство для достижения соответствия требованиям ISO/IEC 20000."}, {"q": "Почему процесс сертификации по стандартам ISO обычно включает регулярные повторные (надзорные) аудиты, а не единовременную проверку с бессрочным сертификатом?", "options": ["Соответствие стандарту — это не статичное состояние, а поддерживаемая практика; регулярные надзорные аудиты подтверждают, что организация продолжает следовать требованиям стандарта, а не просто выполнила их разово ради получения сертификата", "Повторные аудиты нужны исключительно для дополнительного заработка органов сертификации без реальной практической пользы", "Сертификат ISO, будучи однажды выданным, никогда не может быть отозван или не подтверждён повторно", "Регулярные надзорные аудиты применяются только к стандартам качества, но не к стандартам информационной безопасности"], "correct": 0, "explain": "Философия непрерывного улучшения, заложенная в стандарты менеджмента ISO, логически требует постоянного подтверждения соответствия через периодические надзорные аудиты, а не разовой проверки — это гарантирует, что сертификация отражает реальную текущую практику, а не разовое достижение."}, {"q": "Как взаимосвязаны между собой управление рисками (risk management) в ISO 27001 и общий процесс принятия решений в управлении проектами по ISO 21502?", "options": ["Оба стандарта опираются на схожий принцип — систематическую идентификацию, оценку и обработку рисков как основу для принятия обоснованных решений, хотя предметная область рисков различается (информационная безопасность vs успех проекта)", "Управление рисками применимо исключительно к информационной безопасности и не имеет отношения к управлению проектами", "ISO 21502 и ISO 27001 используют полностью противоречащие друг другу подходы к оценке рисков", "Понятие риска в стандартах ISO относится только к финансовым потерям компании"], "correct": 0, "explain": "Управление рисками — сквозная тема многих стандартов ISO систем менеджмента: и в информационной безопасности, и в управлении проектами системный подход к идентификации, оценке и снижению рисков лежит в основе многих требований, хотя конкретные риски специфичны для каждой области."}, {"q": "Почему организации иногда выбирают частичное соответствие практикам стандарта ISO без формальной сертификации, а не всегда стремятся к полной официальной сертификации?", "options": ["Формальная сертификация требует значительных затрат времени, ресурсов и регулярных аудитов, и если организации не нужен формальный сертификат для клиентов/контрактов, она может внедрить полезные практики стандарта без затрат на официальную сертификацию", "Соответствие стандарту ISO без формальной сертификации технически невозможно ни в каком виде", "Все компании обязаны проходить формальную сертификацию по закону во всех странах", "Частичное внедрение практик стандарта без сертификации не даёт организации никакой практической пользы"], "correct": 0, "explain": "Формальная сертификация — это дополнительная инвестиция (аудиты, документация, поддержание соответствия), оправданная в первую очередь коммерческой или регуляторной необходимостью (доверие клиентов, требования тендеров); многие организации внедряют полезные практики стандарта внутренне, без формальной сертификации, если внешнее подтверждение не требуется."}, {"q": "Как принцип 'документированной информации' (documented information), общий для стандартов серии ISO систем менеджмента, помогает обеспечивать воспроизводимость и передачу знаний в организации?", "options": ["Обязательное документирование ключевых процессов, политик и записей снижает зависимость от отдельных сотрудников ('знание в чужой голове'), обеспечивая, что процессы можно воспроизвести, проверить и передать новым сотрудникам согласованным образом", "Документированная информация нужна исключительно для прохождения аудита и не имеет иной практической пользы", "Стандарты ISO не предъявляют требований к документированию процессов организации", "Документирование процессов согласно ISO стандартам полностью заменяет необходимость в обучении сотрудников"], "correct": 0, "explain": "Требование к документированной информации — не бюрократическая формальность, а практический механизм снижения зависимости от индивидуальных сотрудников и обеспечения устойчивой, воспроизводимой работы процессов организации независимо от смены кадров."}, {"q": "Почему многие тендеры и контракты (особенно государственные или международные) требуют от подрядчиков сертификации по определённым стандартам ISO (например, 9001 или 27001) в качестве условия участия?", "options": ["Сертификация независимым аудитором даёт заказчику объективное, проверенное третьей стороной подтверждение того, что у подрядчика есть работающие процессы качества/безопасности, снижая риск заказчика при выборе поставщика без необходимости самостоятельно глубоко аудировать каждого потенциального подрядчика", "Требование сертификации ISO в тендерах — чисто формальная традиция без реальной практической функции", "Сертификация ISO гарантирует юридическую неприкосновенность подрядчика при любых спорах с заказчиком", "Государственные тендеры никогда не учитывают наличие сертификатов ISO при выборе подрядчика"], "correct": 0, "explain": "Независимая сертификация служит своего рода 'сигналом доверия' для заказчика — она перекладывает часть работы по due diligence на аккредитованный орган сертификации, снижая асимметрию информации между заказчиком и потенциальным подрядчиком."}, {"q": "Как архитектурно соотносятся между собой понятия 'политика' (policy), 'процесс' (process) и 'запись' (record) в типичной документационной структуре систем менеджмента ISO?", "options": ["Политика задаёт общее намерение и принципы верхнего уровня ('что и зачем'), процесс описывает конкретные шаги для реализации этих принципов ('как именно'), а запись фиксирует фактическое выполнение процесса как доказательство соответствия", "Политика, процесс и запись — это три взаимозаменяемых синонима одного и того же понятия в документации ISO", "Записи создаются раньше политик и процессов и определяют их содержание", "Процессы в системах менеджмента ISO никогда не должны фиксироваться в виде записей"], "correct": 0, "explain": "Типичная иерархия документации систем менеджмента: политика ('что и зачем') → процессы/процедуры ('как именно') → записи ('подтверждение, что это было сделано') — от намерения к доказуемому исполнению."}, {"q": "Почему при проектировании интегрированной системы менеджмента (например, качество + безопасность + ИТ-услуги) важно заранее определить, какие процессы являются общими (например, управление документами, внутренний аудит), а какие — специфичными для конкретного стандарта?", "options": ["Чёткое разделение на общие и специфичные процессы позволяет избежать дублирования работы и путаницы в ответственности, одновременно гарантируя, что уникальные требования каждого отдельного стандарта (например, специфика оценки рисков ИБ) не будут упущены при использовании общего шаблона", "Все процессы системы менеджмента должны быть либо полностью общими, либо полностью уникальными для одного стандарта без каких-либо промежуточных вариантов", "Специфичные для отдельного стандарта процессы никогда не могут сосуществовать с общими процессами в одной системе менеджмента", "Разделение процессов на общие и специфичные не имеет практического значения при внедрении нескольких стандартов"], "correct": 0, "explain": "Продуманное архитектурное разделение общих (переиспользуемых между стандартами) и специфичных (уникальных для конкретной предметной области) процессов — ключевой практический аспект успешного внедрения интегрированных систем менеджмента без потери специфики требований каждого отдельного стандарта."}, {"q": "Как принцип 'основанного на рисках мышления' (risk-based thinking), заложенный в современные версии стандартов ISO (например, ISO 9001:2015), меняет подход к соответствию по сравнению с более ранними, преимущественно процедурными версиями стандартов?", "options": ["Вместо просто следования фиксированному набору обязательных процедур, организация должна сама идентифицировать значимые для неё риски и возможности и выстраивать процессы управления именно вокруг них, что делает систему более адаптивной к специфике конкретной организации", "Risk-based thinking означает полный отказ от любых процедур и документации в пользу интуитивных решений", "Более ранние версии стандартов ISO уже полностью включали идентичный принцип риск-ориентированного мышления без изменений", "Идентификация рисков в стандартах ISO применяется исключительно к финансовым, а не операционным аспектам деятельности"], "correct": 0, "explain": "Эволюция стандартов ISO (например, переход ISO 9001 к версии 2015 года) в сторону risk-based thinking сместила акцент с жёстких обязательных процедур на осознанную идентификацию рисков и возможностей, специфичных для контекста конкретной организации, что делает систему менеджмента более гибкой и осмысленной."}, {"q": "Почему понятие 'контекст организации' (context of the organization), присутствующее в современной структуре стандартов ISO систем менеджмента, логически предшествует определению конкретных целей и процессов?", "options": ["Прежде чем определять цели и процессы, организация должна понять внешние и внутренние факторы, влияющие на неё (рынок, законодательство, заинтересованные стороны), чтобы система менеджмента была релевантна её реальной ситуации, а не абстрактным универсальным требованиям", "Понятие контекста организации не имеет практического значения и включено в стандарт только для увеличения объёма документации", "Контекст организации определяется после того, как уже полностью выстроены все процессы и цели системы менеджмента", "Внешние факторы (законодательство, рынок) никогда не должны влиять на систему менеджмента качества или безопасности организации"], "correct": 0, "explain": "Логика современной структуры стандартов такова, что понимание контекста (внутренних и внешних факторов, ожиданий заинтересованных сторон) — это фундамент, на основе которого затем строятся релевантные, а не универсально-абстрактные цели, процессы и меры управления рисками."}, {"q": "Как соотносятся между собой роль внутреннего аудита и роль внешнего (сертификационного) аудита в системе менеджмента ISO с точки зрения их различных функций?", "options": ["Внутренний аудит — это самопроверка организации для выявления и исправления проблем до того, как их увидит кто-то извне, тогда как внешний (сертификационный) аудит — независимая проверка третьей стороной для официального подтверждения соответствия стандарту", "Внутренний и внешний аудит выполняют абсолютно идентичную функцию и дублируют друг друга без какой-либо разницы", "Внешний аудит выполняется исключительно сотрудниками самой организации, а внутренний — независимыми сторонними аудиторами", "Внутренний аудит проводится только один раз перед первой сертификацией и никогда не повторяется впоследствии"], "correct": 0, "explain": "Внутренний аудит — механизм самоконтроля и раннего выявления проблем изнутри организации, а внешний сертификационный аудит — независимая, объективная проверка третьей стороной для официального признания соответствия стандарту; оба дополняют друг друга в общей системе непрерывного улучшения."}, {"q": "Почему стандарты ISO обычно формулируют требования в терминах 'что должно быть достигнуто' (например, 'организация должна управлять рисками'), а не 'как именно это нужно делать' в деталях?", "options": ["Такой подход, ориентированный на результат, а не на жёсткую предписанную процедуру, позволяет стандарту оставаться применимым к организациям самых разных размеров, отраслей и уровней зрелости, каждая из которых может выбрать наиболее подходящий для себя способ достижения требуемого результата", "Стандарты ISO всегда предписывают единственно правильный, детальный способ выполнения каждого требования без права выбора у организации", "Формулировка требований в терминах результата, а не процедуры, делает стандарты ISO юридически необязательными и бесполезными", "Гибкость формулировок стандартов ISO существует исключительно из-за небрежности при их разработке"], "correct": 0, "explain": "Ориентация на 'что должно быть достигнуто', а не жёсткая регламентация 'как именно', — осознанный архитектурный выбор, делающий стандарты ISO универсально применимыми к организациям любого масштаба и отрасли, при этом сохраняя требовательность к содержательному результату."}, {"q": "Как соотносятся между собой понятия 'соответствия' (conformity) и 'эффективности' (effectiveness) системы менеджмента — почему формальное соответствие всем пунктам стандарта не гарантирует автоматически реальной эффективности процессов?", "options": ["Соответствие означает, что формальные требования стандарта выполнены (документы существуют, процессы описаны), тогда как эффективность означает, что эти процессы реально достигают намеченных целей (например, действительно повышают качество или снижают риски) — теоретически возможно формальное соответствие при слабой практической эффективности", "Соответствие и эффективность — это полностью синонимичные понятия, не имеющие содержательных различий", "Эффективность процессов всегда автоматически следует из формального соответствия требованиям стандарта без исключений", "Стандарты ISO вообще не различают понятия соответствия и эффективности процессов"], "correct": 0, "explain": "Это важное концептуальное разграничение: можно формально задокументировать и выполнить все требования стандарта (соответствие), но при этом процессы могут работать неэффективно на практике — именно поэтому стандарты требуют не только документации, но и оценки результативности (эффективности) процессов."}, {"q": "Почему определение 'заинтересованных сторон' (interested parties/stakeholders) — важный начальный шаг при построении системы менеджмента по стандартам ISO, влияющий на все последующие решения?", "options": ["Разные заинтересованные стороны (клиенты, регуляторы, сотрудники, акционеры) имеют разные ожидания и требования, и понимание этих ожиданий на раннем этапе определяет, какие цели, риски и процессы будут наиболее релевантны и приоритетны для системы менеджмента организации", "Заинтересованные стороны организации всегда имеют абсолютно идентичные ожидания и требования друг к другу", "Понятие заинтересованных сторон применимо только к финансовым инвесторам компании, а не к клиентам или регуляторам", "Определение заинтересованных сторон не влияет на дальнейшее построение целей и процессов системы менеджмента"], "correct": 0, "explain": "Идентификация и понимание ожиданий различных заинтересованных сторон (клиенты, регуляторы, сотрудники и т.д.) на раннем этапе построения системы менеджмента задаёт контекст, влияющий на приоритизацию целей, рисков и последующих процессов организации."}, {"q": "Как понимание различия между 'обязательными' элементами стандарта (must/shall требования) и 'рекомендательными' указаниями (should/may) влияет на подход организации к внедрению стандарта ISO?", "options": ["Организация обязана выполнить все элементы, сформулированные как обязательные требования ('должна'), чтобы претендовать на сертификацию, тогда как рекомендательные указания ('следует', 'может') дают более гибкое пространство для собственных решений организации, не влияя напрямую на факт соответствия", "Все формулировки в стандартах ISO имеют абсолютно одинаковую обязательную юридическую силу без каких-либо различий", "Рекомендательные указания стандарта важнее обязательных требований при прохождении сертификационного аудита", "Организация может полностью проигнорировать обязательные требования стандарта при условии выполнения рекомендательных"], "correct": 0, "explain": "Разграничение между строго обязательными формулировками ('shall'/'должна') и более мягкими рекомендациями ('should'/'может') в тексте стандартов ISO определяет, что именно аудитор будет строго проверять на соответствие, а что остаётся на усмотрение организации как лучшая практика."}, {"q": "Стартап, разрабатывающий SaaS-продукт для финансового сектора, хочет продемонстрировать клиентам серьёзное отношение к защите данных. Какой стандарт ISO наиболее релевантен для сертификации в первую очередь?", "options": ["ISO/IEC 27001 (система менеджмента информационной безопасности)", "ISO 9001 (менеджмент качества, без специфики безопасности)", "ISO 21502 (управление проектами)", "Ни один из перечисленных стандартов ISO не имеет отношения к защите данных"], "correct": 0, "explain": "ISO/IEC 27001 — стандарт, напрямую посвящённый информационной безопасности, наиболее релевантен именно для демонстрации клиентам серьёзного подхода к защите конфиденциальных данных."}, {"q": "Производственная компания хочет систематизировать процессы контроля качества продукции и получить формальное международное признание своей системы качества. Какой стандарт ISO для этого наиболее подходит?", "options": ["ISO 9001 (система менеджмента качества)", "ISO/IEC 27001 (информационная безопасность)", "ISO/IEC 20000 (управление ИТ-услугами)", "ISO/IEC 12207 (процессы жизненного цикла ПО)"], "correct": 0, "explain": "ISO 9001 — наиболее подходящий и широко признанный стандарт именно для систематизации и сертификации системы менеджмента качества производственных и иных процессов."}, {"q": "ИТ-компания, предоставляющая услуги технической поддержки внешним клиентам, хочет формализовать и улучшить процессы управления инцидентами и изменениями в предоставлении ИТ-услуг. Какой стандарт наиболее уместен?", "options": ["ISO/IEC 20000 (управление ИТ-услугами)", "ISO 9001 (общий менеджмент качества без специфики ИТ-услуг)", "ISO/IEC 27001 (информационная безопасность)", "ISO 21502 (управление проектами)"], "correct": 0, "explain": "ISO/IEC 20000 напрямую посвящён управлению ИТ-услугами, включая процессы управления инцидентами, изменениями и уровнем обслуживания, что делает его наиболее уместным для описанной ситуации."}, {"q": "Компания-разработчик программного обеспечения хочет формализовать этапы жизненного цикла разработки — от анализа требований до сопровождения — в соответствии с международно признанной моделью. Какой стандарт наиболее уместен?", "options": ["ISO/IEC 12207 (процессы жизненного цикла программного обеспечения)", "ISO 9001 (общий менеджмент качества)", "ISO/IEC 27001 (информационная безопасность)", "ISO/IEC 20000 (управление ИТ-услугами)"], "correct": 0, "explain": "ISO/IEC 12207 напрямую посвящён процессам жизненного цикла программного обеспечения, что делает его наиболее подходящим для формализации этапов разработки ПО."}, {"q": "Компания успешно прошла сертификацию по ISO 9001, но через два года после этого качество продукции заметно снизилось, а процессы, описанные в документации, перестали реально соблюдаться на практике. Какой вывод наиболее уместен с точки зрения философии стандартов ISO?", "options": ["Сертификат ISO 9001 подтверждает соответствие требованиям на момент аудита, но не гарантирует автоматического поддержания качества навсегда — необходимы регулярные внутренние проверки и надзорные аудиты для подтверждения реального, а не только формального соответствия", "Полученный однажды сертификат ISO 9001 гарантирует неизменно высокое качество продукции навсегда без дальнейших усилий", "Снижение качества продукции невозможно у компании, прошедшей сертификацию ISO 9001", "Сертификация ISO 9001 не имеет никакого отношения к реальному качеству продукции компании"], "correct": 0, "explain": "Эта ситуация иллюстрирует разрыв между формальной сертификацией и реальной практикой — именно для предотвращения такого разрыва стандарты ISO предполагают регулярные надзорные аудиты и философию непрерывного улучшения, а не разовое достижение сертификата."}, {"q": "Международная компания одновременно внедряет ISO 9001 (качество) и ISO/IEC 27001 (безопасность) и хочет минимизировать дублирование документации и процессов аудита. Какой подход наиболее уместен?", "options": ["Воспользоваться общей структурой высокого уровня (High Level Structure), которую разделяют оба стандарта, чтобы интегрировать пересекающиеся элементы (например, управление документацией, внутренний аудит, анализ со стороны руководства) в единую систему менеджмента", "Внедрять оба стандарта абсолютно независимо друг от друга, дублируя всю документацию и процессы аудита без какой-либо интеграции", "Отказаться от одного из двух стандартов, так как их одновременное внедрение технически невозможно", "Дублирование документации между разными стандартами ISO неизбежно и не может быть уменьшено никаким способом"], "correct": 0, "explain": "Именно ради упрощения таких сценариев была введена общая структура высокого уровня (Annex SL/HLS) — она позволяет организациям, внедряющим несколько стандартов менеджмента одновременно, интегрировать пересекающиеся требования в единую систему, минимизируя дублирование."}, {"q": "Компания готовится к тендеру на государственный контракт, требующий сертификации ISO/IEC 27001, но текущие процессы информационной безопасности неформальны и не задокументированы. Какой первый практический шаг наиболее уместен перед обращением к органу сертификации?", "options": ["Провести внутренний анализ рисков информационной безопасности, задокументировать политики и процессы, привести их в соответствие требованиям стандарта, и только затем инициировать формальный сертификационный аудит", "Немедленно записаться на сертификационный аудит без предварительной подготовки процессов и документации", "Сертификация ISO/IEC 27001 невозможна для компаний с неформальными текущими процессами ни при каких условиях", "Достаточно просто заявить о соответствии стандарту без прохождения формального аудита третьей стороной"], "correct": 0, "explain": "Стандартная практика подготовки к сертификации — сначала провести внутреннюю оценку и привести реальные процессы (управление рисками, политики) в соответствие требованиям стандарта, и только затем проходить формальный внешний аудит, а не наоборот."}, {"q": "Руководитель проекта использует принципы ISO 21502 как общую основу, но команда разработки работает по Scrum с двухнедельными спринтами. Возникает ли здесь противоречие, и как его лучше разрешить?", "options": ["Противоречия нет: ISO 21502 задаёт общие принципы управления проектом (например, управление заинтересованными сторонами, рисками, изменениями) на верхнем уровне, а Scrum предоставляет конкретный, гибкий операционный ритм работы команды в рамках этих принципов", "ISO 21502 и Scrum технически несовместимы, и использовать их вместе невозможно", "Нужно полностью отказаться от Scrum в пользу исключительно каскадного (waterfall) подхода, предписываемого ISO 21502", "ISO 21502 требует полного отказа от каких-либо итеративных или гибких методологий разработки"], "correct": 0, "explain": "ISO 21502 методологически нейтрален и описывает общие процессы управления проектом верхнего уровня, вполне совместимые с конкретными операционными фреймворками вроде Scrum, работающими на более детальном, тактическом уровне внутри этих общих принципов."}, {"q": "Аудитор в ходе надзорной проверки компании, сертифицированной по ISO 9001, обнаружил, что часть сотрудников не знает о существовании задокументированных процедур контроля качества. Какой вывод и рекомендация наиболее уместны?", "options": ["Формальное наличие документации недостаточно — необходимо улучшить внутреннюю коммуникацию и обучение сотрудников, чтобы задокументированные процессы реально соблюдались на практике, а не существовали только на бумаге", "Это не является проблемой, если сама документация формально существует и хранится в архиве компании", "Сертификат должен быть немедленно и без возможности исправления отозван без предоставления компании шанса устранить несоответствие", "Осведомлённость сотрудников о задокументированных процедурах не имеет значения для системы менеджмента качества"], "correct": 0, "explain": "Разрыв между формальным существованием документации и реальной осведомлённостью/соблюдением сотрудниками — типичное несоответствие (non-conformity), выявляемое при аудитах; стандарт требует не просто наличия документов, но и их реального применения в повседневной практике."}, {"q": "Компания проходит сертификационный аудит ISO 9001, который включает 3 этапа проверки по 5 рабочих дней каждый. Сколько всего рабочих дней займёт полный аудит?", "options": ["5", "10", "15", "20"], "correct": 2, "explain": "3 этапа × 5 дней = 15 рабочих дней."}, {"q": "Надзорные аудиты по стандарту ISO/IEC 27001 проводятся раз в год, а полная ресертификация — раз в 3 года. Сколько всего аудитов (надзорных + ресертификация) пройдёт компания за 9 лет непрерывной сертификации, если ресертификационный аудит не считается надзорным в тот же год?", "options": ["6 надзорных + 3 ресертификации = 9", "9 надзорных + 3 ресертификации = 12", "3 надзорных + 3 ресертификации = 6", "9 надзорных + 0 ресертификаций = 9"], "correct": 0, "explain": "За 9 лет: ресертификация происходит на 3-й, 6-й и 9-й год (всего 3 раза), а в остальные 6 лет (1,2,4,5,7,8) — надзорные аудиты. Итого: 6 надзорных + 3 ресертификации = 9 аудитов."}, {"q": "Компания внедряет интегрированную систему менеджмента (ISO 9001 + ISO 27001), сокращая объём дублирующейся документации с 400 страниц до 250 страниц за счёт общей структуры (HLS). На сколько процентов сократился объём документации?", "options": ["25%", "37.5%", "50%", "62.5%"], "correct": 1, "explain": "(400-250)/400=150/400=0.375=37.5% сокращения объёма документации."}, {"q": "В организации из 200 сотрудников только 140 прошли обучение по политике информационной безопасности согласно требованиям ISO/IEC 27001. Какова доля обученных сотрудников?", "options": ["60%", "70%", "75%", "80%"], "correct": 1, "explain": "140/200=0.7=70%."}, {"q": "Аудит выявил 8 несоответствий (non-conformities) требованиям стандарта, из которых 2 являются критическими (major), а остальные — незначительными (minor). Какова доля критических несоответствий от общего числа?", "options": ["15%", "20%", "25%", "30%"], "correct": 2, "explain": "2/8=0.25=25%."}, {"q": "Компания тратит 120 часов ежегодно на поддержание документации и внутренние аудиты по ISO 9001. Если за 5 лет сертификации это время сократилось на 20% благодаря автоматизации, сколько часов в год компания тратит теперь?", "options": ["24 часа", "96 часов", "100 часов", "144 часа"], "correct": 1, "explain": "120×0.20=24 часа сокращения. 120-24=96 часов в год."}, {"q": "Из 50 государственных тендеров, в которых участвовала ИТ-компания за год, в 35 требовалась сертификация ISO 27001 как обязательное условие. В какой доле тендеров сертификация была обязательным требованием?", "options": ["60%", "65%", "70%", "75%"], "correct": 2, "explain": "35/50=0.7=70%."}, {"q": "Компания внедряет процессы согласно ISO/IEC 12207, разделяя жизненный цикл ПО на 5 этапов одинаковой продолжительности в рамках 20-месячного проекта. Сколько месяцев длится каждый этап?", "options": ["2 месяца", "4 месяца", "5 месяцев", "10 месяцев"], "correct": 1, "explain": "20 месяцев / 5 этапов = 4 месяца на этап."}, {"q": "Организация сократила среднее время реагирования на ИТ-инциденты с 8 часов до 2 часов после внедрения процессов по ISO/IEC 20000. Во сколько раз ускорилось реагирование?", "options": ["В 2 раза", "В 4 раза", "В 6 раз", "В 8 раз"], "correct": 1, "explain": "8/2=4 — реагирование ускорилось в 4 раза."}, {"q": "Компания планирует закончить подготовку к сертификации ISO 9001 за 6 месяцев, из которых 2 месяца отведены на разработку документации, а оставшееся время — на внедрение и внутренний аудит. Сколько месяцев отведено на внедрение и внутренний аудит?", "options": ["2 месяца", "3 месяца", "4 месяца", "6 месяцев"], "correct": 2, "explain": "6-2=4 месяца на внедрение и внутренний аудит."}, {"q": "Из 12 обязательных документированных процедур, требуемых стандартом, компания уже имела 9 до начала подготовки к сертификации. Сколько новых процедур нужно разработать?", "options": ["1", "3", "4", "9"], "correct": 1, "explain": "12-9=3 новые процедуры нужно разработать."}, {"q": "Компания интегрирует 3 стандарта ISO (9001, 27001, 20000), и по оценке 40% требований каждого стандарта пересекаются с требованиями общей структуры (HLS), а остальные специфичны. Если общий объём требований всех трёх стандартов — 300 пунктов, сколько пунктов уникальны (специфичны) для отдельных стандартов?", "options": ["120", "150", "180", "240"], "correct": 2, "explain": "40% из 300 пересекаются (300×0.4=120 общих), значит специфичных: 300-120=180 пунктов."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
