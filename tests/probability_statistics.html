<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Вероятность и статистика</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/probability_statistics.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Вероятность и статистика</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "probability_statistics";
  const QUESTIONS = [{"q": "Что такое вероятность события в классическом определении?", "options": ["Отношение числа благоприятных исходов к общему числу исходов", "Сумма всех исходов эксперимента", "Разность между максимумом и минимумом выборки", "Количество повторений эксперимента"], "correct": 0, "explain": "Классическое определение: P(A) = m/n, где m — число благоприятных исходов, n — общее число равновозможных исходов."}, {"q": "Чему равна сумма вероятностей всех элементарных исходов пространства событий?", "options": ["Зависит от эксперимента", "1", "0.5", "0"], "correct": 1, "explain": "Аксиома нормировки: сумма вероятностей всех элементарных исходов всегда равна 1."}, {"q": "Что называется случайной величиной?", "options": ["Среднее значение выборки", "Ошибка измерения", "Любое число от 0 до 1", "Функция, ставящая в соответствие каждому исходу эксперимента число"], "correct": 3, "explain": "Случайная величина — функция, определённая на пространстве элементарных событий, принимающая числовые значения."}, {"q": "Чем отличается дискретная случайная величина от непрерывной?", "options": ["Дискретная принимает счётное число значений, непрерывная — любое значение из интервала", "Между ними нет разницы", "Дискретная не имеет распределения", "Дискретная всегда положительна, непрерывная — нет"], "correct": 0, "explain": "Дискретная СВ принимает отдельные (счётные) значения, непрерывная — любое значение на интервале действительных чисел."}, {"q": "Что такое математическое ожидание случайной величины?", "options": ["Разброс значений вокруг среднего", "Наиболее вероятное значение", "Максимальное значение выборки", "Среднее взвешенное значение с учётом вероятностей"], "correct": 3, "explain": "Математическое ожидание E[X] — это среднее значение случайной величины, взвешенное по вероятностям исходов."}, {"q": "Что измеряет дисперсия случайной величины?", "options": ["Количество исходов", "Среднее значение", "Разброс значений вокруг математического ожидания", "Вероятность успеха"], "correct": 2, "explain": "Дисперсия D(X) = E[(X-E[X])^2] показывает степень разброса значений случайной величины относительно среднего."}, {"q": "Как называется квадратный корень из дисперсии?", "options": ["Стандартное отклонение", "Медиана", "Мода", "Ковариация"], "correct": 0, "explain": "Стандартное (среднеквадратическое) отклонение σ = √D(X), измеряется в тех же единицах, что и сама величина."}, {"q": "Что такое независимые события A и B?", "options": ["P(A∩B) = 0", "P(A∩B) = P(A)·P(B)", "P(A∩B) = P(A)+P(B)", "P(A|B) = 0"], "correct": 1, "explain": "События независимы, если наступление одного не влияет на вероятность другого: P(A∩B)=P(A)·P(B)."}, {"q": "Что описывает нормальное (гауссово) распределение?", "options": ["Симметричное колоколообразное распределение непрерывной величины вокруг среднего", "Только целочисленные значения", "Распределение только положительных чисел от 0 до 1", "Распределение количества успехов в конечной серии испытаний"], "correct": 0, "explain": "Нормальное распределение — симметричная колоколообразная кривая, полностью задаётся средним μ и дисперсией σ²."}, {"q": "Что такое медиана выборки?", "options": ["Разница между максимумом и минимумом", "Среднее арифметическое всех значений", "Значение, которое встречается чаще всего", "Значение, делящее упорядоченную выборку пополам"], "correct": 3, "explain": "Медиана — значение, относительно которого ровно половина наблюдений меньше, а половина больше (для упорядоченного ряда)."}, {"q": "В чём разница между условной вероятностью P(A|B) и совместной вероятностью P(A∩B)?", "options": ["P(A∩B) применяется только для независимых событий", "P(A|B) всегда больше P(A∩B)", "Это одно и то же", "P(A|B) — вероятность A при известном B, а P(A∩B) — вероятность одновременного наступления A и B"], "correct": 3, "explain": "P(A|B) = P(A∩B)/P(B) — условная вероятность нормирует совместную вероятность на вероятность условия B."}, {"q": "В чём смысл формулы Байеса?", "options": ["Она вычисляет дисперсию суммы величин", "Она определяет независимость событий", "Она позволяет пересчитать вероятность гипотезы с учётом новых данных", "Она находит медиану распределения"], "correct": 2, "explain": "Формула Байеса P(H|D) = P(D|H)P(H)/P(D) обновляет априорную вероятность гипотезы H после получения данных D."}, {"q": "Почему для суммы независимых случайных величин дисперсии складываются, а для зависимых — нет?", "options": ["Потому что зависимые величины не имеют дисперсии", "Потому что независимые величины всегда имеют одинаковую дисперсию", "Потому что в общем случае D(X+Y) = D(X)+D(Y)+2Cov(X,Y), и ковариация зависимых величин не равна нулю", "Потому что это математическая условность без причины"], "correct": 2, "explain": "Общая формула включает ковариацию; у независимых величин Cov(X,Y)=0, поэтому дисперсии просто складываются."}, {"q": "В чём разница между выборочным и генеральным распределением?", "options": ["Выборочное распределение не имеет среднего", "Генеральное распределение всегда нормальное", "Это синонимы", "Выборочное строится по ограниченному набору наблюдений, генеральное описывает всю совокупность"], "correct": 3, "explain": "Выборка — это подмножество наблюдений из генеральной совокупности; статистики выборки оценивают параметры генеральной совокупности."}, {"q": "Почему центральная предельная теорема (ЦПТ) важна на практике?", "options": ["Она утверждает, что сумма (среднее) большого числа независимых случайных величин стремится к нормальному распределению независимо от исходного распределения", "Она говорит, что дисперсия всегда равна нулю", "Она доказывает, что все величины распределены равномерно", "Она применяется только к дискретным величинам"], "correct": 0, "explain": "ЦПТ объясняет, почему нормальное распределение так часто встречается на практике — суммы/средние независимых величин сходятся к нему."}, {"q": "Чем корреляция отличается от ковариации?", "options": ["Корреляция измеряется только для нормальных распределений", "Корреляция — это нормированная ковариация, безразмерная величина от -1 до 1", "Ковариация всегда положительна, корреляция — нет", "Это одно и то же"], "correct": 1, "explain": "Corr(X,Y) = Cov(X,Y)/(σX·σY) — нормировка убирает влияние единиц измерения и ограничивает величину диапазоном [-1,1]."}, {"q": "Почему корреляция не означает причинно-следственную связь?", "options": ["Потому что корреляция может быть вызвана третьим фактором или совпадением, а не прямым влиянием одной переменной на другую", "Потому что причинность можно установить только экспериментом с эмоциями", "Потому что корреляция определена только для независимых величин", "Потому что корреляция всегда равна нулю"], "correct": 0, "explain": "Классический пример: скрытая переменная (confounder) может создавать корреляцию между X и Y без прямой причинности между ними."}, {"q": "Что такое p-значение в проверке статистических гипотез?", "options": ["Вероятность того, что нулевая гипотеза верна", "Уровень значимости, выбираемый исследователем заранее", "Мощность статистического теста", "Вероятность получить наблюдаемый или более экстремальный результат при условии, что нулевая гипотеза верна"], "correct": 3, "explain": "p-значение — вероятность наблюдаемых данных (или более экстремальных) при истинности H0, а не вероятность самой гипотезы."}, {"q": "В чём разница между ошибкой первого и второго рода?", "options": ["Ошибка I рода всегда хуже ошибки II рода", "Ошибка I рода — отклонить верную H0, ошибка II рода — не отклонить неверную H0", "Это одно и то же", "Ошибки рода применимы только к нормальному распределению"], "correct": 1, "explain": "Ошибка I рода (α) — ложное срабатывание, ошибка II рода (β) — пропуск реального эффекта."}, {"q": "Почему доверительный интервал 95% не означает '95% вероятность, что истинное значение внутри интервала'?", "options": ["Потому что 95% — это условная вероятность события A|B", "Потому что параметр меняется случайно при каждом эксперименте", "Потому что доверительные интервалы всегда неверны", "Потому что в частотном подходе истинный параметр фиксирован, а случайным является сам интервал — 95% относится к доле интервалов, которые накрыли бы параметр при повторении процедуры"], "correct": 3, "explain": "Частотная интерпретация: при многократном повторении эксперимента 95% построенных интервалов накроют истинное (фиксированное) значение параметра."}, {"q": "Зачем в машинном обучении используют байесовский вывод вместо точечной оценки параметров?", "options": ["Точечные оценки запрещены в статистике", "Байесовский вывод всегда быстрее вычисляется", "Байесовский подход не требует данных", "Байесовский подход даёт распределение возможных значений параметра, отражая неопределённость, а не одно число"], "correct": 3, "explain": "Байесовский вывод возвращает апостериорное распределение, что позволяет количественно оценить неопределённость оценки параметра."}, {"q": "Почему при A/B-тестировании важно заранее фиксировать размер выборки, а не останавливать тест по мере появления значимого результата?", "options": ["Потому что тест обязан длиться минимум месяц по закону", "Потому что размер выборки не влияет на результат теста", "Потому что постоянная проверка p-значения (peeking) искусственно завышает вероятность ложного срабатывания (проблема множественных сравнений)", "Потому что p-значение перестаёт существовать при повторных проверках"], "correct": 2, "explain": "Многократная проверка результатов по ходу эксперимента увеличивает шанс случайно наткнуться на 'значимый' результат — это известная ловушка 'optional stopping'."}, {"q": "Почему при сравнении двух групп с разными дисперсиями лучше использовать t-тест Уэлча, а не классический t-тест Стьюдента?", "options": ["Тест Уэлча всегда даёт меньшее p-значение", "Тест Уэлча применим только к категориальным данным", "Классический t-тест не работает с непрерывными данными", "Тест Уэлча не предполагает равенства дисперсий групп, что делает его устойчивее при их различии"], "correct": 3, "explain": "Тест Стьюдента предполагает равные дисперсии (гомоскедастичность); при её нарушении тест Уэлча даёт более корректные результаты."}, {"q": "Почему выборочное среднее является несмещённой оценкой генерального среднего, а выборочная дисперсия требует поправки Бесселя (деление на n-1)?", "options": ["Потому что выборочное среднее всегда завышено", "Потому что дисперсия не может быть оценена по выборке", "Потому что n-1 — произвольное соглашение без математического обоснования", "Потому что использование выборочного среднего в формуле дисперсии уменьшает степени свободы, и деление на n систематически занижает дисперсию"], "correct": 3, "explain": "Поправка Бесселя (n-1 вместо n) компенсирует то, что выборочное среднее ближе к точкам выборки, чем истинное среднее, что занижает сумму квадратов отклонений."}, {"q": "Как взаимодействуют смещение (bias) и разброс (variance) оценки, и почему это важно при выборе статистической модели?", "options": ["Смещение и разброс независимы и не влияют друг на друга", "Смещение всегда предпочтительнее разброса", "Разброс оценки не зависит от размера выборки", "Уменьшение смещения часто увеличивает разброс оценки и наоборот — нужно искать баланс (bias-variance tradeoff)"], "correct": 3, "explain": "Классический компромисс bias-variance: более гибкие модели снижают смещение, но увеличивают чувствительность к шуму (разброс), и наоборот."}, {"q": "Почему при работе с сильно скошенным (skewed) распределением медиана — более надёжная мера центра, чем среднее?", "options": ["Медиану невозможно вычислить для скошенных данных", "Медиана учитывает больше информации, чем среднее", "Среднее чувствительно к выбросам и экстремальным значениям, а медиана — устойчива (робастна) к ним", "Среднее всегда равно медиане в скошенных распределениях"], "correct": 2, "explain": "Выбросы сильно смещают среднее арифметическое, тогда как медиана зависит только от порядка значений, а не от их величины."}, {"q": "В чём смысл принципа максимального правдоподобия (Maximum Likelihood Estimation) при подборе параметров распределения?", "options": ["Выбираются параметры, которые максимизируют вероятность (плотность) наблюдения именно тех данных, что были собраны", "Метод не связан с вероятностью данных", "Выбираются параметры, минимизирующие количество данных", "Метод применим только к нормальному распределению"], "correct": 0, "explain": "MLE ищет такие параметры θ, при которых функция правдоподобия L(θ|data) максимальна — то есть наблюдаемые данные наиболее вероятны."}, {"q": "Почему мультиколлинеарность предикторов является проблемой в регрессионном анализе?", "options": ["Она не влияет на результаты регрессии", "Она делает оценки коэффициентов нестабильными и затрудняет интерпретацию индивидуального вклада каждого предиктора", "Она устраняет необходимость в статистической значимости", "Она увеличивает точность каждого коэффициента"], "correct": 1, "explain": "При сильной корреляции между предикторами модель не может однозначно 'разделить' их эффект, что приводит к большим стандартным ошибкам коэффициентов."}, {"q": "Зачем при построении модели данные разделяют на обучающую и тестовую выборки, если задача — статистический анализ, а не только ML?", "options": ["Разделение данных не влияет на статистические выводы", "Тестовая выборка нужна только для визуализации", "Чтобы оценить обобщающую способность модели/вывода на новых, ранее не виденных данных, избегая переобучения на конкретной выборке", "Обучающая выборка должна быть меньше тестовой всегда"], "correct": 2, "explain": "Оценка на тех же данных, на которых строилась модель, завышает качество (оптимистичное смещение) — независимая тестовая выборка даёт честную оценку."}, {"q": "Почему при множественном тестировании гипотез (например, 20 независимых тестов при α=0.05) нужно вводить поправку (например, Бонферрони)?", "options": ["Потому что каждый отдельный тест становится менее точным", "Потому что вероятность получить хотя бы одно ложноположительное срабатывание среди множества тестов растёт даже при верных нулевых гипотезах", "Поправка Бонферрони увеличивает мощность теста", "Поправка нужна только для выборок больше 1000"], "correct": 1, "explain": "При 20 независимых тестах с α=0.05 вероятность хотя бы одной ложной находки существенно выше 5% — поправка Бонферрони (α/m) контролирует общий уровень ошибок."}, {"q": "У вас есть монета, подозреваемая в нечестности. Вы подбросили её 10 раз и получили 9 орлов. Какой вывод наиболее корректен?", "options": ["Монета точно нечестная", "Вероятность орла точно равна 0.9", "Результат ничего не говорит о монете", "Есть основания подозревать смещённость монеты, но нужно больше данных и формальный тест гипотезы, а не окончательный вывод"], "correct": 3, "explain": "10 бросков — маленькая выборка; хотя результат необычен для честной монеты (p≈0.02 для 9+ орлов по биномиальному распределению), для строгого вывода нужен формальный тест и больше данных."}, {"q": "Специалист по данным заметил высокую корреляцию (r=0.9) между продажами мороженого и числом утоплений за месяц. Какой вывод корректен?", "options": ["Оба показателя, вероятно, зависят от скрытой переменной — например, летней жары", "Мороженое вызывает утопления", "Утопления вызывают рост продаж мороженого", "Корреляция 0.9 доказывает прямую причинность"], "correct": 0, "explain": "Классический пример скрытой переменной (confounder): жаркая погода одновременно увеличивает продажи мороженого и число купающихся людей."}, {"q": "В эксперименте A/B-тестирования конверсия группы A составила 5.0% (n=100), группы B — 7.0% (n=100). Какой вывод наиболее осторожен и корректен?", "options": ["При таком маленьком размере выборки разница может быть статистически незначимой — нужно проверить тест значимости и увеличить выборку", "Вариант B точно лучше, нужно немедленно его внедрить", "Разница в 2 процентных пункта всегда значима", "Тест A/B не нужен, если разница видна на глаз"], "correct": 0, "explain": "При n=100 разница в 2 п.п. часто попадает в пределы случайного шума; корректный подход — расчёт p-значения/доверительного интервала перед выводами."}, {"q": "Исследователь получил p=0.049 в одном тесте гипотезы и объявил результат 'статистически значимым' и 'практически важным'. В чём потенциальная ошибка рассуждения?", "options": ["p-значение показывает размер эффекта напрямую", "Статистическая значимость (p<0.05) не равна практической значимости — эффект может быть статистически значим, но пренебрежимо мал по величине", "p=0.049 всегда означает большой эффект", "Ошибки в рассуждении нет"], "correct": 1, "explain": "При больших выборках даже крошечные, неважные на практике эффекты могут дать маленькое p-значение — размер эффекта нужно оценивать отдельно."}, {"q": "Компания использует модель, предсказывающую отток клиентов, обученную на данных за 2023 год, и не проверяет её на новых данных 2026 года. В чём главный риск?", "options": ["Нужно просто увеличить количество признаков", "Модели ML не подвержены устареванию", "Риска нет, если модель показала хорошую точность в 2023 году", "Возможен 'дрейф данных' (data drift) — распределение признаков могло измениться, и модель перестала быть репрезентативной"], "correct": 3, "explain": "Со временем статистические свойства данных (поведение клиентов, рынок) могут измениться, из-за чего старая модель теряет точность на новых данных."}, {"q": "При анализе опроса 60% людей ответили 'да' на вопрос без указания погрешности и размера выборки. Что здесь упущено?", "options": ["Проценты нельзя использовать в отчётах", "Опросы не требуют статистического анализа", "Не указан размер выборки и доверительный интервал — без них 60% может означать как 6 из 10, так и 6000 из 10000 с разной надёжностью", "Ничего, процент — это уже достаточная информация"], "correct": 2, "explain": "Без размера выборки и погрешности процент не позволяет оценить надёжность вывода; 6/10 и 6000/10000 дают совершенно разную статистическую уверенность."}, {"q": "В медицинском исследовании тест на редкое заболевание (распространённость 1%) имеет чувствительность 99% и специфичность 95%. Пациент получил положительный результат. Какой вывод самый корректный без дополнительных вычислений?", "options": ["Пациент точно болен, т.к. чувствительность теста 99%", "Точность теста определяется только чувствительностью", "Специфичность не имеет значения при интерпретации результата", "Несмотря на высокую чувствительность, из-за низкой распространённости заболевания истинная вероятность болезни при положительном тесте может быть намного ниже 99% — нужно применить формулу Байеса"], "correct": 3, "explain": "Классический парадокс редких болезней: при низкой базовой частоте даже точный тест даёт много ложноположительных результатов относительно истинно положительных — нужен байесовский пересчёт."}, {"q": "Аналитик сравнивает средний доход в двух городах, но в выборке города A случайно оказались в основном менеджеры, а в городе B — в основном стажёры. Какая ошибка допущена?", "options": ["Нужно просто увеличить размер каждой выборки", "Ошибки нет, средние можно сравнивать напрямую", "Средние всегда сопоставимы независимо от состава", "Выборки не сопоставимы (систематическая ошибка отбора) — сравнение искажено составом групп, а не реальной разницей между городами"], "correct": 3, "explain": "Смещение выборки (selection bias) означает, что сравниваемые группы различаются не только по интересующему признаку (город), но и по другим важным факторам (должность)."}, {"q": "Компания решает, какой из двух алгоритмов рекомендаций лучше, глядя только на среднюю оценку пользователей (без учёта дисперсии и размера выборки). Почему этого недостаточно?", "options": ["Дисперсия не может быть вычислена для оценок пользователей", "Оценки пользователей никогда не имеют дисперсии", "Одинаковое среднее может скрывать очень разный разброс мнений и разное количество отзывов, что влияет на надёжность вывода", "Средняя оценка — исчерпывающая метрика, дисперсия не важна"], "correct": 2, "explain": "Два алгоритма с одинаковым средним рейтингом 4.0 могут кардинально различаться по консистентности оценок и по надёжности (числу голосов) — нужен более полный анализ."}, {"q": "При построении прогностической модели специалист включил в обучающую выборку данные, которые физически становятся известны только после события, которое модель должна предсказать. Как называется эта ошибка и чем она опасна?", "options": ["Это называется bias-variance tradeoff", "Ошибки здесь нет, если данные корректно размечены", "Это нормальная практика, увеличивающая точность модели", "Это 'утечка данных' (data leakage) — модель показывает нереалистично высокую точность на обучении/тесте, но не работает в реальном времени"], "correct": 3, "explain": "Data leakage происходит, когда информация из 'будущего' (недоступная в момент реального предсказания) попадает в признаки — модель обучается на несуществующем преимуществе."}, {"q": "В урне 5 красных и 3 синих шара. Какова вероятность вытащить красный шар?", "options": ["3/8", "5/8", "1/2", "5/3"], "correct": 1, "explain": "P(красный) = 5/(5+3) = 5/8."}, {"q": "Подбрасывают две честные монеты. Какова вероятность выпадения хотя бы одного орла?", "options": ["1/2", "3/4", "1", "1/4"], "correct": 1, "explain": "P(ни одного орла) = 1/4 (решка-решка). P(хотя бы один орёл) = 1 - 1/4 = 3/4."}, {"q": "Дана выборка: 2, 4, 4, 6, 10. Чему равно среднее арифметическое?", "options": ["5", "6", "4", "5.2"], "correct": 3, "explain": "(2+4+4+6+10)/5 = 26/5 = 5.2."}, {"q": "Дана выборка: 2, 4, 4, 6, 10. Чему равна мода?", "options": ["10", "6", "2", "4"], "correct": 3, "explain": "Мода — наиболее часто встречающееся значение; 4 встречается дважды, остальные — по разу."}, {"q": "Случайная величина X принимает значения 1, 2, 3 с вероятностями 0.2, 0.5, 0.3 соответственно. Чему равно E[X]?", "options": ["1.9", "2.5", "2.0", "2.1"], "correct": 3, "explain": "E[X] = 1·0.2 + 2·0.5 + 3·0.3 = 0.2+1.0+0.9 = 2.1."}, {"q": "События A и B независимы, P(A)=0.4, P(B)=0.5. Чему равно P(A∩B)?", "options": ["0.1", "0.9", "0.2", "0.45"], "correct": 2, "explain": "Для независимых событий P(A∩B)=P(A)·P(B)=0.4·0.5=0.2."}, {"q": "В группе 30 студентов, дисперсия оценок по тесту равна 9. Чему равно стандартное отклонение?", "options": ["4.5", "3", "9", "81"], "correct": 1, "explain": "Стандартное отклонение = √дисперсии = √9 = 3."}, {"q": "Бросают игральный кубик. Какова вероятность выпадения числа больше 4?", "options": ["2/3", "1/6", "1/3", "1/2"], "correct": 2, "explain": "Благоприятные исходы: 5, 6 → 2 из 6 → 2/6 = 1/3."}, {"q": "В коробке 10 деталей, из которых 2 бракованные. Наугад берут одну деталь. Какова вероятность, что она не бракованная?", "options": ["0.8", "0.1", "0.2", "0.9"], "correct": 0, "explain": "P(не брак) = 1 - 2/10 = 0.8."}, {"q": "По формуле Байеса: P(H)=0.01, P(D|H)=0.9, P(D|¬H)=0.05. Чему приблизительно равно P(H|D)? (P(D) = P(D|H)P(H)+P(D|¬H)P(¬H))", "options": ["≈0.5", "≈0.15", "≈0.09", "≈0.9"], "correct": 1, "explain": "P(D) = 0.9·0.01 + 0.05·0.99 = 0.009+0.0495=0.0585. P(H|D)=0.009/0.0585≈0.154."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
