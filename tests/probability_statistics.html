<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Вероятность и статистика</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>

  <header>
    <div class="topbar">

      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/probability_statistics.html">🔬 Лаборатория</a>

    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>

</div>

ловые значения.", "usage": {"code": false, "without": "Пытаешься работать с исходами эксперимента ('орёл', 'брак', 'дождь') напрямую, но их нельзя усреднить, сложить или посчитать дисперсию.", "with": "Вводишь случайную величину — функцию, которая каждому исходу ставит число (орёл=1, решка=0). Теперь к исходам применима вся арифметика статистики.", "benefit": "Качественные исходы превращаются в числа, пригодные для расчётов"}}, {"q": "Чем отличается дискретная случайная величина от непрерывной?", "options": ["Дискретная принимает счётные значения, непрерывная — любые из интервала", "Между ними нет разницы, кроме названия и области применения", "Дискретная величина не имеет функции распределения в отличие от непрерывной", "Дискретная всегда положительна, а непрерывная может быть отрицательной"], "correct": 0, "explain": "Дискретная СВ принимает отдельные (счётные) значения, непрерывная — любое значение на интервале действительных чисел.", "usage": {"code": true, "without": "Пишешь один код и для подсчёта конкретных значений (число бракованных), и для интегрирования по интервалу (рост человека) — путаешь суммы и интегралы.", "with": "Различаешь тип величины: дискретную суммируешь, непрерывную интегрируешь.\n# дискретная: sum(p_i) по точкам\n# непрерывная: интеграл плотности по интервалу", "benefit": "Выбираешь правильный метод расчёта и не путаешь суммы с интегралами"}}, {"q": "Что такое математическое ожидание случайной величины?", "options": ["Разброс значений случайной величины вокруг её центра", "Наиболее вероятное из всех значений величины", "Максимальное значение среди наблюдений выборки", "Среднее значений, взвешенное по их вероятностям"], "correct": 3, "explain": "Математическое ожидание E[X] — это среднее значение случайной величины, взвешенное по вероятностям исходов.", "usage": {"code": true, "without": "Оцениваешь 'типичный' выигрыш в игре, просто взяв среднее возможных призов и игнорируя, что крупный приз крайне маловероятен.", "with": "Считаешь E[X] как еское, тогда как медиана зависит только от порядка значений, а не от их величины.", "usage": {"code": true, "without": "Описываешь центр дохода средним, и один миллионер в выборке делает 'типичного' жителя богачом.", "with": "Для скошенных данных берёшь медиану — она устойчива к выбросам.\nimport numpy as np\nnp.median(incomes)  # не тянется за хвостом", "benefit": "Мера центра не искажается тяжёлым хвостом распределения"}}, {"q": "В чём смысл принципа максимального правдоподобия (Maximum Likelihood Estimation) при подборе параметров распределения?", "options": ["Берутся параметры, максимизирующие вероятность данных", "Метод вообще не связан с вероятностью наблюдаемых данных", "Выбираются параметры, минимизирующие объём собранных данных", "Метод применим исключительно к нормальному распределению"], "correct": 0, "explain": "MLE ищет такие параметры θ, при которых функция правдоподобия L(θ|data) максимальна — то есть наблюдаемые данные наиболее вероятны.", "usage": {"code": true, "without": "Подбираешь параметры распределения на глаз, двигая μ и σ, пока кривая 'похоже' не ляжет на гистограмму.", "with": "Применяешь метод максимального правдоподобия — он сам находит параметры, максимизирующие вероятность данных.\nfrom scipy import stats\nmu, sigma = stats.norm.fit(data)  # MLE", "benefit": "Оптимальные параметры находятся автоматически, а не подгонкой"}}, {"q": "Почему мультиколлинеарность предикторов является проблемой в регрессионном анализе?", "options": ["Она в принципе никак не влияет на итоговые результаты регрессии", "Делает оценки коэффициентов нестабильными и трудными в трактовке", "Она полностью устраняет необходимость проверять статистическую значимость", "Она заметно повышает точность каждого отдельного коэффициента"], "correct": 1, "explain": "При сильной корреляции между предикторами модель не может однозначно 'разделить' их эффект, что приводит к большим стандартным ошибкам коэффициентов.", "usage": {"code": true, "without": "Строишь регрессию на двух почти одинаковых признаках (рост в см и в дюймах) и удивляешься огромным, неустойчивым коэффициентам.", "with": "Выявляешь мультиколлинеарность через VIF и убираешь дублирующий признак.\nfrom statsmodels.stats.outliers_influence import variance_inflation_factor\n# VIF>10 сигнализирует о проблеме", "benefit": "Коэффициенты становятся стабильными и интерпретируемыми"}}, {"q": "Зачем при построении модели данные разделяют на обучающую и тестовую выборки, если задача — статистический анализ, а не только ML?", "options": ["Разделение данных совсем не влияет на статистические выводы", "Тестовая выборка требуется исключительно для визуализации", "Чтобы честно оценить модель на новых, не виденных данных", "Обучающая выборка обязана всегда быть меньше тестовой"], "correct": 2, "explain": "Оценка на тех же данных, на которых строилась модель, завышает качество (оптимистичное смещение) — независимая тестовая выборка даёт честную оценку.", "usage": {"code": true, "without": "Оцениваешь качество модели на тех же данных, где её обучал, и радуешься завышенной точности.", "with": "Разбиваешь данные на train/test и проверяешь на невиданных примерах.\nfrom sklearn.model_selection import train_test_split\nX_tr,X_te,y_tr,y_te = train_test_split(X,y,test_size=0.3)", "benefit": "Честная оценка обобщающей способности без переобучения"}}, {"q": "Почему при множественном тестировании гипотез (например, 20 независимых тестов при α=0.05) нужно вводить поправку (например, Бонферрони)?", "options": ["Потому что каждый отдельный тест становится существенно менее точным", "Шанс хотя бы одного ложного срабатывания растёт с числом тестов", "Поправка Бонферрони заметно увеличивает мощность каждого теста", "Поправка требуется только для выборок объёмом более 1000"], "correct": 1, "explain": "При 20 независимых тестах с α=0.05 вероятность хотя бы одной ложной находки существенно выше 5% — поправка Бонферрони (α/m) контролирует общий уровень ошибок.", "usage": {"code": true, "without": "Проводишь 20 тестов при α=0.05, находишь один 'значимый' и радуешься, не замечая, что он почти наверняка ложный.", "with": "Применяешь поправку Бонферрони: делишь порог на число тестов.\nm = 20\nalpha_corrected = 0.05 / m  # 0.0025", "benefit": "Контролируешь суммарный риск ложных находок при множестве тестов"}}, {"q": "У вас есть монета, подозреваемая в нечестности. Вы подбросили её 10 раз и получили 9 орлов. Какой вывод наиболее корректен?", "options": ["Монета абсолютно точно является нечестной, судя по этим броскам", "Вероятность выпадения орла у этой монеты в точности равна 0.9", "Такой результат совершенно ничего не сообщает о монете", "Есть повод подозревать смещённость, но нужен формальный тест"], "correct": 3, "explain": "10 бросков — маленькая выборка; хотя результат необычен для честной монеты (p≈0.02 для 9+ орлов по биномиальному распределению), для строгого вывода нужен формальный тест и больше данных.", "usage": {"code": true, "without": "Получив 9 орлов из 10, сразу объявляешь монету нечестной, не оценив, насколько такое возможно и у честной.", "with": "Считаешь вероятность 9+ орлов у честной монеты и понимаешь, что нужен формальный тест и больше данных.\nfrom scipy.stats import binomtest\nbinomtest(9, 10, 0.5).pvalue  # ~0.021, но n мало", "benefit": "Не делаешь поспешный вывод из маленькой выборки"}}, {"q": "Специалист по данным заметил высокую корреляцию (r=0.9) между продажами мороженого и числом утоплений за месяц. Какой вывод корректен?", "options": ["Оба показателя зависят от скрытого фактора — летней жары", "Продажи мороженого напрямую вызывают рост числа утоплений", "Рост числа утоплений напрямую повышает продажи мороженого", "Корреляция 0.9 сама по себе доказывает прямую причинность"], "correct": 0, "explain": "Классический пример скрытой переменной (confounder): жаркая погода одновременно увеличивает продажи мороженого и число купающихся людей.", "usage": {"code": false, "without": "Видишь r=0.9 между продажами мороженого и утоплениями и предлагаешь запретить мороженое ради спасения людей.", "with": "Ищешь скрытую переменную — летнюю жару, — которая поднимает и продажи, и число купающихся; причинности между самими показателями нет.", "benefit": "Не принимаешь абсурдное решение из-за confounder"}}, {"q": "В эксперименте A/B-тестирования конверсия группы A составила 5.0% (n=100), группы B — 7.0% (n=100). Какой вывод наиболее осторожен и корректен?", "options": ["При n=100 разница может оказаться незначимой, нужен тест", "Вариант B однозначно лучше, и его следует немедленно внедрить всем", "Разница в два процентных пункта значима при любом объёме", "A/B-тест не нужен, если разница уже заметна на глаз"], "correct": 0, "explain": "При n=100 разница в 2 п.п. часто попадает в пределы случайного шума; корректный подход — расчёт p-значения/доверительного интервала перед выводами.", "usage": {"code": true, "without": "Видишь 7% против 5% при n=100 и немедленно раскатываешь вариант B на всех пользователей.", "with": "Проверяешь значимость разницы долей перед выводом.\nfrom statsmodels.stats.proportion import proportions_ztest\nstat,p = proportions_ztest([7,5],[100,100])  # p велико", "benefit": "Не внедряешь изменение, которое может быть просто шумом"}}, {"q": "Исследователь получил p=0.049 в одном тесте гипотезы и объявил результат 'статистически значимым' и 'практически важным'. В чём потенциальная ошибка рассуждения?", "options": ["p-значение напрямую показывает и величину наблюдаемого эффекта", "Значимость не равна практической: эффект может быть ничтожным", "Значение p=0.049 всегда означает большой практический эффект", "Никакой ошибки в подобном рассуждении на самом деле нет"], "correct": 1, "explain": "При больших выборках даже крошечные, неважные на практике эффекты могут дать маленькое p-значение — размер эффекта нужно оценивать отдельно.", "usage": {"code": false, "without": "Получив p=0.049, докладываешь руководству о 'важном прорыве', хотя реальный эффект — рост конверсии на 0.01%.", "with": "Отдельно оцениваешь размер эффекта: статистическая значимость не равна практической важности.", "benefit": "Отличаешь реально значимый эффект от статистически значимого, но ничтожного"}}, {"q": "Компания использует модель, предсказывающую отток клиентов, обученную на данных за 2023 год, и не проверяет её на новых данных 2026 года. В чём главный риск?", "options": ["Нужно просто заметно увеличить количество используемых признаков", "Модели машинного обучения в принципе не подвержены устареванию", "Риска нет, раз модель показала хорошую точность ещё в 2023 году", "Возможен дрейф данных: распределение признаков сдвинулось"], "correct": 3, "explain": "Со временем статистические свойства данных (поведение клиентов, рынок) могут измениться, из-за чего старая модель теряет точность на новых данных.", "usage": {"code": false, "without": "Продолжаешь крутить модель оттока 2023 года в 2026-м, доверяя её старой точности, и теряешь клиентов на неверных прогнозах.", "with": "Мониторишь дрейф данных: сравниваешь распределения признаков со свежими и переобучаешь модель при расхождении.", "benefit": "Ловишь устаревание модели до того, как оно ударит по бизнесу"}}, {"q": "При анализе опроса 60% людей ответили 'да' на вопрос без указания погрешности и размера выборки. Что здесь упущено?", "options": ["Проценты в принципе нельзя использовать в аналитических отчётах", "Социологические опросы в принципе не требуют статистического анализа", "Нет размера выборки и доверительного интервала для оценки надёжности", "Ничего, ведь процент — это уже вполне достаточная информация"], "correct": 2, "explain": "Без размера выборки и погрешности процент не позволяет оценить надёжность вывода; 6/10 и 6000/10000 дают совершенно разную статистическую уверенность.", "usage": {"code": true, "without": "Пишешь в отчёте '60% за', не указав, что это 6 из 10 человек — вывод выглядит надёжнее, чем есть.", "with": "Приводишь долю с размером выборки и доверительным интервалом.\nfrom statsmodels.stats.proportion import proportion_confint\nproportion_confint(6, 10)  # широкий CI выдаёт ненадёжность", "benefit": "Читатель видит реальную надёжность цифры, а не голый процент"}}, {"q": "В медицинском исследовании тест на редкое заболевание (распространённость 1%) имеет чувствительность 99% и специфичность 95%. Пациент получил положительный результат. Какой вывод самый корректный без дополнительных вычислений?", "options": ["Пациент почти точно болен, ведь чувствительность теста равна 99%", "Точность теста определяется одной лишь его чувствительностью", "Специфичность вообще не важна при интерпретации результата", "Из-за редкости болезни вероятность при плюсе гораздо ниже 99%"], "correct": 3, "explain": "Классический парадокс редких болезней: при низкой базовой частоте даже точный тест даёт много ложноположительных результатов относительно истинно положительных — нужен байесовский пересчёт.", "usage": {"code": true, "without": "При положительном тесте на болезнь с распространённостью 1% пугаешь пациента диагнозом 'с вероятностью 99%'.", "with": "Пересчитываешь по Байесу с учётом базовой частоты и специфичности.\nprev,sens,spec = 0.01,0.99,0.95\npost = sens*prev/(sens*prev+(1-spec)*(1-prev))  # ~0.167", "benefit": "Истинная вероятность болезни оказывается в разы ниже чувствительности теста"}}, {"q": "Аналитик сравнивает средний доход в двух городах, но в выборке города A случайно оказались в основном менеджеры, а в городе B — в основном стажёры. Какая ошибка допущена?", "options": ["Нужно просто заметно увеличить размер каждой из этих двух выборок", "Никакой ошибки нет, средние можно сравнивать напрямую", "Средние всегда сопоставимы независимо от состава выборок", "Выборки несопоставимы из-за ошибки отбора: различен состав групп"], "correct": 3, "explain": "Смещение выборки (selection bias) означает, что сравниваемые группы различаются не только по интересующему признаку (город), но и по другим важным факторам (должность).", "usage": {"code": false, "without": "Сравниваешь средний доход двух городов напрямую, не заметив, что в одной выборке менеджеры, а в другой стажёры.", "with": "Проверяешь сопоставимость выборок по составу (должность, возраст) и учитываешь selection bias перед сравнением.", "benefit": "Сравниваешь города, а не случайные различия в составе групп"}}, {"q": "Компания решает, какой из двух алгоритмов рекомендаций лучше, глядя только на среднюю оценку пользователей (без учёта дисперсии и размера выборки). Почему этого недостаточно?", "options": ["Дисперсию нельзя вычислить для пользовательских оценок вообще", "Пользовательские оценки в принципе никогда не имеют дисперсии", "Равное среднее скрывает разный разброс мнений и число отзывов", "Средняя оценка исчерпывающа, а дисперсия совершенно не важна"], "correct": 2, "explain": "Два алгоритма с одинаковым средним рейтингом 4.0 могут кардинально различаться по консистентности оценок и по надёжности (числу голосов) — нужен более полный анализ.", "usage": {"code": true, "without": "Выбираешь алгоритм рекомендаций только по среднему рейтингу 4.0, не глядя на разброс и число отзывов.", "with": "Смотришь на среднее вместе с дисперсией и размером выборки.\nimport numpy as np\nnp.mean(r), np.std(r), len(r)  # полная картина", "benefit": "Не выбираешь нестабильный алгоритм с малым числом голосов"}}, {"q": "При построении прогностической модели специалист включил в обучающую выборку данные, которые физически становятся известны только после события, которое модель должна предсказать. Как называется эта ошибка и чем она опасна?", "options": ["Это классический компромисс между смещением и разбросом оценки модели", "Никакой ошибки здесь нет, если все данные были корректно размечены заранее", "Это нормальная практика, заметно увеличивающая точность модели", "Это утечка данных: точность на тесте завышена, в бою модель не работает"], "correct": 3, "explain": "Data leakage происходит, когда информация из 'будущего' (недоступная в момент реального предсказания) попадает в признаки — модель обучается на несуществующем преимуществе.", "usage": {"code": false, "without": "Включаешь в признаки модели данные, известные лишь после предсказываемого события, и радуешься точности 99% — а в бою модель проваливается.", "with": "Исключаешь утечку данных (data leakage): в признаках оставляешь только то, что доступно на момент реального прогноза.", "benefit": "Точность на тесте отражает реальную работу модели, а не подсмотренное будущее"}}, {"q": "В урне 5 красных и 3 синих шара. Какова вероятность вытащить красный шар?", "options": ["3/8", "5/8", "1/2", "5/3"], "correct": 1, "explain": "P(красный) = 5/(5+3) = 5/8.", "usage": {"code": true, "without": "Вручную выписываешь шары и на глаз прикидываешь шанс вытащить красный.", "with": "Считаешь по классической формуле долю красных.\nred, blue = 5, 3\np = red / (red + blue)  # 5/8", "benefit": "Точный ответ 5/8 одной строкой"}}, {"q": "Подбрасывают две честные монеты. Какова вероятность выпадения хотя бы одного орла?", "options": ["1/2", "3/4", "1", "1/4"], "correct": 1, "explain": "P(ни одного орла) = 1/4 (решка-решка). P(хотя бы один орёл) = 1 - 1/4 = 3/4.", "usage": {"code": true, "without": "Перечисляешь все исходы двух монет и вручную считаешь, где есть хотя бы один орёл.", "with": "Идёшь через дополнение: 1 минус вероятность 'ни одного орла'.\np_none = 0.5 * 0.5\np_at_least_one = 1 - p_none  # 0.75", "benefit": "Через дополнение — одна строка вместо перебора исходов"}}, {"q": "Дана выборка: 2, 4, 4, 6, 10. Чему равно среднее арифметическое?", "options": ["5.0", "6.0", "4.0", "5.2"], "correct": 3, "explain": "(2+4+4+6+10)/5 = 26/5 = 5.2.", "usage": {"code": true, "without": "Складываешь пять чисел в уме и делишь, рискуя ошибиться в арифметике.", "with": "Считаешь среднее функцией.\nimport numpy as np\nnp.mean([2,4,4,6,10])  # 5.2", "benefit": "Быстро и без арифметических ошибок"}}, {"q": "Дана выборка: 2, 4, 4, 6, 10. Чему равна мода?", "options": ["10", "6", "2", "4"], "correct": 3, "explain": "Мода — наиболее часто встречающееся значение; 4 встречается дважды, остальные — по разу.", "usage": {"code": true, "without": "Глазами ищешь в ряду чисел самое частое значение, на длинных выборках легко промахнуться.", "with": "Находишь моду встроенной функцией.\nfrom statistics import mode\nmode([2,4,4,6,10])  # 4", "benefit": "Самое частое значение находится надёжно, без ручного подсчёта"}}, {"q": "Случайная величина X принимает значения 1, 2, 3 с вероятностями 0.2, 0.5, 0.3 соответственно. Чему равно E[X]?", "options": ["1.9", "2.5", "2.0", "2.1"], "correct": 3, "explain": "E[X] = 1·0.2 + 2·0.5 + 3·0.3 = 0.2+1.0+0.9 = 2.1.", "usage": {"code": true, "without": "Умножаешь значения на вероятности и складываешь в уме, путаясь в дробях.", "with": "Считаешь E[X] через скалярное произведение.\nimport numpy as np\nnp.dot([1,2,3],[0.2,0.5,0.3])  # 2.1", "benefit": "Мат. ожидание считается одной операцией без ошибок"}}, {"q": "События A и B независимы, P(A)=0.4, P(B)=0.5. Чему равно P(A∩B)?", "options": ["0.1", "0.9", "0.2", "0.45"], "correct": 2, "explain": "Для независимых событий P(A∩B)=P(A)·P(B)=0.4·0.5=0.2.", "usage": {"code": true, "without": "Не уверен, складывать вероятности или умножать, и берёшь 0.4+0.5=0.9 — неверно.", "with": "Для независимых событий перемножаешь вероятности.\np = 0.4 * 0.5  # 0.2", "benefit": "Правильная операция даёт 0.2 вместо ошибочного сложения"}}, {"q": "В группе 30 студентов, дисперсия оценок по тесту равна 9. Чему равно стандартное отклонение?", "options": ["4.5", "3", "9", "81"], "correct": 1, "explain": "Стандартное отклонение = √дисперсии = √9 = 3.", "usage": {"code": true, "without": "Пытаешься извлечь стандартное отклонение прямо из данных, забыв, что дисперсия уже дана.", "with": "Берёшь корень из дисперсии.\nimport math\nmath.sqrt(9)  # 3", "benefit": "Ответ 3 сразу из готовой дисперсии"}}, {"q": "Бросают игральный кубик. Какова вероятность выпадения числа больше 4?", "options": ["2/3", "1/6", "1/3", "1/2"], "correct": 2, "explain": "Благоприятные исходы: 5, 6 → 2 из 6 → 2/6 = 1/3.", "usage": {"code": true, "without": "Считаешь 'больше 4' и по ошибке включаешь 4, получая 3/6.", "with": "Чётко берёшь исходы 5 и 6 из шести равновозможных.\nfavorable = 2  # {5,6}\np = favorable / 6  # 1/3", "benefit": "Не включаешь граничное значение — верный ответ 1/3"}}, {"q": "В коробке 10 деталей, из которых 2 бракованные. Наугад берут одну деталь. Какова вероятность, что она не бракованная?", "options": ["0.8", "0.1", "0.2", "0.9"], "correct": 0, "explain": "P(не брак) = 1 - 2/10 = 0.8.", "usage": {"code": true, "without": "Считаешь вероятность брака и забываешь, что спрашивали про НЕ бракованную деталь.", "with": "Берёшь дополнение к вероятности брака.\np_good = 1 - 2/10  # 0.8", "benefit": "Через дополнение сразу получаешь искомые 0.8"}}, {"q": "По формуле Байеса: P(H)=0.01, P(D|H)=0.9, P(D|¬H)=0.05. Чему приблизительно равно P(H|D)? (P(D) = P(D|H)P(H)+P(D|¬H)P(¬H))", "options": ["≈0.5", "≈0.15", "≈0.09", "≈0.9"], "correct": 1, "explain": "P(D) = 0.9·0.01 + 0.05·0.99 = 0.009+0.0495=0.0585. P(H|D)=0.009/0.0585≈0.154.", "usage": {"code": true, "without": "Пытаешься 'на глаз' оценить вероятность болезни после теста и завышаешь её в разы.", "with": "Подставляешь всё в формулу Байеса пошагово.\np_h, p_d_h, p_d_nh = 0.01, 0.9, 0.05\np_d = p_d_h*p_h + p_d_nh*(1-p_h)\np_post = p_d_h*p_h / p_d  # ~0.154", "benefit": "Точное апостериорное значение 0.154 вместо завышенной интуиции"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
