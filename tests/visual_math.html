<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Визуальное объяснение математических концепций</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>

  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/visual_math.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>

    <h1>Визуальное объяснение математических концепций</h1>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script>
(function () {
  const TEST_ID = "visual_math";
  const QUESTIONS = [{"q": "Что такое геометрическая интерпретация производной функции в точке?", "options": ["Ордината точки, в которой график функции пересекает ось Y", "Наклон касательной прямой к графику функции именно в этой точке", "Расстояние от рассматриваемой точки графика до начала координат", "Площадь криволинейной фигуры под всем графиком данной функции"], "correct": 1, "explain": "Производная функции в точке визуально соответствует наклону касательной прямой к графику функции именно в этой точке.", "usage": {"code": true, "without": "Считаем f'(3) по правилу (x^2)'=2x и получаем число 6, не понимая, что оно значит на графике — просто 'результат формулы'.", "with": "plt.plot(x, x**2); строим касательную y=6*(x-3)+9 в точке — видно, что наклон прямой и есть производная.\nimport numpy as np, matplotlib.pyplot as plt\nx=np.linspace(0,6,100)\nplt.plot(x,x**2); plt.plot(x,6*(x-3)+9)", "benefit": "производная перестаёт быть абстрактной формулой"}}, {"q": "Как можно визуально интерпретировать определённый интеграл функции на отрезке?", "options": ["Площадь фигуры между графиком и осью X на отрезке, взятая со знаком", "Угол наклона касательной к графику в левом конце заданного отрезка", "Полная длина кривой графика функции, измеренная вдоль этого отрезка", "Наибольшее значение, которое функция принимает на данном отрезке"], "correct": 0, "explain": "Определённый интеграл геометрически представляет собой алгебраическую (со знаком) площадь между графиком функции и осью абсцисс на заданном промежутке.", "usage": {"code": true, "without": "Считаем интеграл по таблице первообразных, получаем число и не связываем его ни с какой геометрией.", "with": "Закрашиваем область под графиком — интеграл это её площадь со знаком.\nimport numpy as np, matplotlib.pyplot as plt\nx=np.linspace(0,3,200)\nplt.fill_between(x, np.sin(x), alpha=.3)", "benefit": "интеграл становится наглядной площадью"}}, {"q": "Как визуально можно представить умножение матрицы на вектор?", "options": ["Поэлементное сложение всех чисел, стоящих внутри данной матрицы", "Сдвиг вектора в новую точку без изменения его длины и направления", "Линейное преобразование вектора: поворот, сжатие или отражение", "Перекраска стрелки-вектора в другой цвет без сдвига её положения"], "correct": 2, "explain": "Умножение матрицы на вектор можно визуально представить как применение линейного преобразования — вектор поворачивается, растягивается или отражается в соответствии с геометрическим смыслом матрицы.", "usage": {"code": false, "without": "Матрицу на вектор умножаем построчно по формуле сумм произведений, воспринимая это как механический пересчёт чисел.", "with": "Представляем, что матрица берёт стрелку-вектор и поворачивает/растягивает её в пространстве — результат это новое положение той же стрелки после преобразования.", "benefit": "видно геометрический смысл действия матрицы"}}, {"q": "Что визуально показывают собственные векторы (eigenvectors) линейного преобразования?", "options": ["Направления, которые преобразование сохраняет, лишь меняя их длину", "Направления, которые преобразование всегда поворачивает ровно на 90°", "Точки, которые преобразование полностью удаляет из пространства", "Единственные векторы, которые преобразование обращает строго в ноль"], "correct": 0, "explain": "Визуально собственные векторы — это особые направления, вдоль которых линейное преобразование действует как простое растяжение/сжатие, не меняя саму ориентацию вектора.", "usage": {"code": false, "without": "Решаем det(A-λI)=0, находим λ и векторы формально, не понимая, чем эти направления особенные.", "with": "Смотрим на преобразование: почти все стрелки поворачиваются, но собственные векторы остаются на своей прямой — их только растягивает в λ раз.", "benefit": "видно, почему эти направления выделены"}}, {"q": "Как можно визуально интерпретировать нормальное распределение на графике?", "options": ["Строго горизонтальная прямая линия на одном постоянном уровне высоты", "Симметричная колоколообразная кривая с пиком у среднего значения", "Ступенчатая кусочно-постоянная функция с резкими скачками уровней", "Кривая с несколькими одинаковыми по высоте пиками через равные шаги"], "correct": 1, "explain": "График плотности нормального распределения — характерная симметричная 'колоколообразная' кривая, наиболее плотно сконцентрированная вокруг среднего значения.", "usage": {"code": true, "without": "Помним формулу плотности с exp и корнем из 2π, но не представляем, как она выглядит.", "with": "Строим кривую — симметричный колокол с пиком у среднего.\nimport numpy as np, matplotlib.pyplot as plt\nx=np.linspace(-4,4,200)\nplt.plot(x, np.exp(-x**2/2))", "benefit": "форму 'колокола' запомнить проще формулы"}}, {"q": "Что визуально показывает диаграмма рассеяния (scatter plot) с высокой положительной корреляцией между двумя переменными?", "options": ["Точки, выстроенные в идеально ровную замкнутую окружность", "Точки, образующие чёткий восходящий тренд слева направо", "Точки, беспорядочно разбросанные по области без всякой связи", "Все точки, слившиеся в одну-единственную точку в центре"], "correct": 1, "explain": "Высокая положительная корреляция визуально проявляется как чёткая тенденция: с ростом значения одной переменной по оси X значение другой переменной по оси Y тоже растёт, образуя восходящий тренд точек.", "usage": {"code": true, "without": "Смотрим на коэффициент r=0.9 как на голое число и не чувствуем, что оно означает.", "with": "Рисуем scatter: точки выстраиваются в явный восходящий поток слева направо.\nimport numpy as np, matplotlib.pyplot as plt\nx=np.random.rand(100); y=x+0.1*np.random.rand(100)\nplt.scatter(x,y)", "benefit": "силу связи видно глазами"}}, {"q": "Как визуально можно представить понятие предела функции при приближении x к некоторому значению?", "options": ["Длина отрезка, отсекаемого графиком функции на этом участке", "Точка, в которой график функции пересекает горизонтальную ось X", "Наибольшее значение функции на всей её области опре  и простым словесным пояснением связи", "Только таблица с числовым значением коэффициента корреляции без графика", "Исключительно сложная развёрнутая формула коэффициента корреляции Пирсона без графика", "График, вообще не связанный напрямую с двумя обсуждаемыми метриками"], "correct": 0, "explain": "Для нетехнической аудитории диаграмма рассеяния с наглядно видимым трендом — гораздо более доступный способ передать интуицию о корреляции, чем формула или голые числа коэффициента корреляции.", "usage": {"code": false, "without": "Показываем нетехнической аудитории коэффициент Пирсона и формулу — люди не считывают смысла.", "with": "Рисуем scatter двух метрик с явным трендом и парой слов о направлении связи — интуиция доходит без формул.", "benefit": "донести связь без математического аппарата"}}, {"q": "Разработчик образовательного контента создаёт визуализацию, где пользователь может 'перетаскивать' точку данных в наборе и видеть, как это влияет на линию регрессии в реальном времени. Какую образовательную цель это преследует?", "options": ["Дать интуицию чувствительности метода наименьших квадратов к выбросам", "Перетаскивание точек данных никак не связано с методом наименьших квадратов", "Такая визуализация показывает лишь кластеризацию данных, а не регрессию", "Единственная цель — развлекательный интерактив без образовательной ценности"], "correct": 0, "explain": "Интерактивное перетаскивание точки с немедленным откликом линии регрессии наглядно демонстрирует, насколько чувствителен метод наименьших квадратов к отдельным (особенно выбивающимся) точкам данных — важная интуиция, которую сложно передать только формулой.", "usage": {"code": false, "without": "Обсуждаем устойчивость МНК к выбросам на словах, не показывая эффекта.", "with": "Перетаскиваем одну точку и видим, как линия регрессии мгновенно кренится вслед за выбросом.", "benefit": "чувствительность к выбросам видно вживую"}}, {"q": "Специалист по данным готовит инфографику для объяснения понятия 'переобучение' (overfitting) модели нетехническим стейкхолдерам. Какая визуализация наиболее уместна?", "options": ["Три кривые: недообученную, хорошо обученную по тренду и переобученную под шум", "Только одну финальную обученную модель без сравнения с другими вариантами", "График, вообще никак не связанный со сравнением разных степеней сложности модели", "Исключительно текстовое описание без каких-либо графиков и кривых обучения"], "correct": 0, "explain": "Классическая визуализация трёх кривых (недообучение, хорошее обучение, переобучение) на одном графике с одинаковыми данными — один из самых эффективных способов интуитивно, без формул, показать суть проблемы переобучения даже нетехнической аудитории.", "usage": {"code": false, "without": "Объясняем переобучение только словами про 'модель запомнила шум' без наглядной картинки.", "with": "На одних данных рисуем три кривые: слишком простую, плавно попадающую в тренд, и переобученную, петляющую за каждой точкой.", "benefit": "суть переобучения видно на одном графике"}}, {"q": "Учитель математики хочет объяснить школьникам понятие асимптоты графика функции. Какой визуальный подход наиболее эффективен для интуитивного понимания?", "options": ["График, который резко обрывается, ни к какой прямой не приближаясь", "График функции, полностью совпадающий с асимптотой на некотором участке", "График, всё ближе жмущийся к прямой, но никогда её не касающийся", "Только словесное определение асимптоты без всякого визуального образа"], "correct": 2, "explain": "Визуальная демонстрация постепенного, но никогда полного приближения графика к прямой линии — наиболее интуитивный способ передать суть понятия асимптоты, гораздо нагляднее формального определения через предел.", "usage": {"code": true, "without": "Определяем асимптоту через предел на бесконечности — формально, без образа.", "with": "Строим график: кривая всё ближе жмётся к прямой, но никогда её не касается.\nimport numpy as np, matplotlib.pyplot as plt\nx=np.linspace(0.2,10,200)\nplt.plot(x, 1/x); plt.axhline(0)", "benefit": "асимптота = линия, к которой график крадётся"}}, {"q": "Компания разрабатывает дашборд для мониторинга серверной инфраструктуры и должна визуально показать команде поддержки, когда метрика (например, загрузка процессора) существенно отклоняется от нормы. Какой визуальный подход, основанный на статистических принципах, наиболее уместен?", "options": ["Только текущее число метрики без исторического контекста и диапазона нормы", "Исключительно случайный цвет фона для состояния сервера без числовой базы", "График метрики без всяких визуальных ориентиров нормального диапазона", "График во времени с закрашенным коридором нормы ±2σ вокруг среднего"], "correct": 3, "explain": "Наложение визуального 'коридора нормы' (например, на основе стандартного отклонения) поверх временного графика метрики — распространённая и эффективная техника, позволяющая сразу интуитивно заметить статистически значимое отклонение от ожидаемого поведения.", "usage": {"code": true, "without": "Показываем только текущее число загрузки CPU без контекста — непонятно, норма это или тревога.", "with": "Рисуем метрику во времени и закрашиваем коридор ±2σ: выход за границу сразу бросается в глаза.\nimport numpy as np, matplotlib.pyplot as plt\nt=np.arange(100); plt.plot(t, cpu); plt.axhspan(m-2*s, m+2*s, alpha=.2)", "benefit": "аномалию видно мгновенно на фоне нормы"}}, {"q": "Дизайнер образовательного приложения хочет визуально объяснить принцип действия центральной предельной теоремы школьникам без использования формул. Какой интерактивный элемент наиболее уместен?", "options": ["Симуляция с бросками кубиков, строящая гистограмму средних до колокола", "Только статичная картинка одного нормального распределения без процесса", "Только финальная формула центральной предельной теоремы без интерактива", "Видео с диктором, читающим формальное доказательство теоремы вслух"], "correct": 0, "explain": "Интерактивная симуляция многократного взятия случайных выборок с построением гистограммы их средних значений в реальном времени — мощный, доступный без формул способ дать почувствовать суть центральной предельной теоремы даже школьникам.", "usage": {"code": true, "without": "Показываем школьникам формулу ЦПТ — она ничего им не говорит.", "with": "Даём кидать кубики и в реальном времени строим гистограмму средних — она сама превращается в колокол.\nimport numpy as np, matplotlib.pyplot as plt\nm=[np.mean(np.random.randint(1,7,10)) for _ in range(3000)]\nplt.hist(m, bins=20)", "benefit": "теорема прочувствована через игру"}}, {"q": "Финансовый аналитик должен объяснить руководству понятие волатильности актива через визуализацию, а не через формулу стандартного отклонения доходности. Какой график наиболее уместен?", "options": ["График, вообще никак не связанный с ценой рассматриваемого актива во времени", "Только одно финальное число волатильности без графика цены во времени", "Круговая диаграмма для представления волатильности актива по секторам", "График цены во времени: гладкая линия — низкая, резкие зубцы — высокая"], "correct": 3, "explain": "Визуальное сравнение 'гладкости' vs 'зазубренности' графика цены во времени — интуитивно понятный способ передать идею волатильности без необходимости сразу вводить формулу стандартного отклонения доходности.", "usage": {"code": false, "without": "Определяем волатильность как стандартное отклонение доходности — число, далёкое от интуиции руководства.", "with": "Показываем график цены во времени: гладкая линия — низкая волатильность, резкие зубцы — высокая.", "benefit": "волатильность видно по форме линии"}}, {"q": "Преподаватель статистики хочет наглядно показать студентам разницу между корреляцией и причинностью с помощью визуализации. Какой подход наиболее уместен?", "options": ["Только словесное утверждение без какой-либо визуализации самих данных", "Утверждение, что любая видимая корреляция автоматически означает причинность", "Только диаграмма рассеяния без пояснения возможных скрытых факторов", "Scatter с явной корреляцией рядом со схемой скрытой третьей переменной"], "correct": 3, "explain": "Комбинация диаграммы рассеяния (показывающей саму корреляцию) со схемой скрытой переменной (объясняющей происхождение этой корреляции без прямой причинности) — эффективный визуальный способ проиллюстрировать классическую ошибку 'корреляция не равна причинности'.", "usage": {"code": false, "without": "Повторяем лозунг 'корреляция не причинность', но не показываем, откуда берётся ложная связь.", "with": "Ставим рядом scatter (мороженое vs утопления) и схему скрытого фактора (жара), влияющего на оба.", "benefit": "видно, откуда берётся мнимая связь"}}, {"q": "На графике функции y=x² касательная проведена в точке x=3. Чему равен угловой коэффициент (наклон) этой касательной, если производная функции x² равна 2x?", "options": ["3", "9", "12", "6"], "correct": 3, "explain": "Производная y'=2x при x=3 равна 2×3=6 — это и есть угловой коэффициент (наклон) касательной в этой точке.", "usage": {"code": false, "without": "Наугад берём одно из чисел (9, 12) — например значение самой функции 3²=9, путая f(3) с f'(3).", "with": "Наклон касательной это производная 2x при x=3, то есть 6 — крутизна графика в точке, а не его высота.", "benefit": "не путаешь значение функции с её наклоном"}}, {"q": "На диаграмме рассеяния 80 из 100 точек данных показывают чёткий восходящий тренд, а 20 точек — явные выбросы, не следующие тренду. Какова доля точек, соответствующих основному тренду?", "options": ["75%", "85%", "80%", "70%"], "correct": 2, "explain": "80/100=0.8=80%.", "usage": {"code": false, "without": "Механически перебираем варианты, рискуя взять долю выбросов (20%) вместо основного тренда.", "with": "На scatter основной поток это 80 точек из 100 — визуально доминирующая часть, доля 80%.", "benefit": "не перепутать тренд с выбросами"}}, {"q": "На гистограмме распределения 1000 измерений интервал (столбец) от 40 до 50 содержит 250 измерений. Какова доля измерений, попадающих именно в этот интервал?", "options": ["25%", "30%", "15%", "20%"], "correct": 0, "explain": "250/1000=0.25=25%.", "usage": {"code": false, "without": "Считаем долю, не глядя на график, и легко ошибаемся интервалом.", "with": "Высота нужного столбца гистограммы — 250 из 1000 наблюдений, то есть 25% всей выборки.", "benefit": "долю читаешь прямо по высоте столбца"}}, {"q": "На графике сходимости последовательности видно, что члены последовательности приближаются к значению 5, и на 10-м члене расстояние до предела составляет 0.1, а на 20-м члене — 0.01 (сокращение в 10 раз каждые 10 членов). Какое расстояние до предела ожидается на 30-м члене при сохранении этой закономерности?", "options": ["0.01", "0.0001", "0.001", "0.1"], "correct": 2, "explain": "При сокращении в 10 раз каждые 10 членов: 0.01/10=0.001 на 30-м члене.", "usage": {"code": false, "without": "Пытаемся угадать ответ, не заметив закономерности сокращения в 10 раз за 10 членов.", "with": "На графике сходимости расстояние до предела делится на 10 каждые 10 членов: 0.1→0.01→0.001.", "benefit": "закономерность видно по шагам приближения"}}, {"q": "На визуализации единичного квадрата, преобразованного матрицей, площадь итоговой фигуры (параллелограмма) в 6 раз больше исходной площади квадрата. Чему равен модуль определителя этой матрицы?", "options": ["3", "2", "6", "1"], "correct": 2, "explain": "Модуль определителя матрицы линейного преобразования равен коэффициенту изменения площади — в данном случае 6.", "usage": {"code": false, "without": "Пытаемся считать определитель по элементам матрицы, которых в задаче даже нет.", "with": "Площадь фигуры выросла в 6 раз — значит |det| = 6, ведь определитель это коэффициент изменения площади.", "benefit": "определитель читаешь как масштаб площади"}}, {"q": "На графике трёх кривых (недообучение, норма, переобучение) кривая переобучения показывает ошибку 2% на тренировочных данных и 25% на тестовых. Кривая нормального обучения показывает 8% на тренировочных и 10% на тестовых. Насколько больше разрыв между тренировочной и тестовой ошибкой у переобученной модели по сравнению с нормальной (в процентных пунктах)?", "options": ["21 п.п.", "23 п.п.", "15 п.п.", "13 п.п."], "correct": 0, "explain": "Разрыв переобученной модели: 25-2=23 п.п. Разрыв нормальной модели: 10-8=2 п.п. Разница между разрывами: 23-2=21 п.п.", "usage": {"code": false, "without": "Берём голое 23% (разрыв переобученной модели), забыв вычесть разрыв нормальной.", "with": "Разрыв train/test виден как зазор кривых: 25-2=23 у переобученной, 10-8=2 у нормальной, разница 21 п.п.", "benefit": "сравниваешь именно зазоры, а не сырые ошибки"}}, {"q": "На комплексной плоскости число z=3+4i имеет модуль |z|=5 (по теореме Пифагора: √(3²+4²)=5). Если это число умножить на комплексное число с модулем 2, каким станет модуль результата?", "options": ["10", "20", "5", "7"], "correct": 0, "explain": "При умножении комплексных чисел их модули перемножаются: 5×2=10.", "usage": {"code": false, "without": "Пробуем складывать модули (5+2=7) или путаемся, что происходит с длиной при умножении.", "with": "На комплексной плоскости умножение растягивает вектор: модули перемножаются, 5×2=10.", "benefit": "модуль результата = произведение длин"}}, {"q": "На гистограмме выборочных средних из симуляции центральной предельной теоремы 950 из 1000 сгенерированных средних значений попали в интервал ±2 стандартных отклонения от общего среднего. Какова доля значений вне этого интервала?", "options": ["7%", "10%", "3%", "5%"], "correct": 3, "explain": "1000-950=50 значений вне интервала. 50/1000=0.05=5%.", "usage": {"code": false, "without": "Считаем долю внутри интервала (95%) вместо запрошенной доли снаружи.", "with": "Вне коридора ±2σ на гистограмме осталось 1000-950=50 значений, то есть 5% хвостов.", "benefit": "не путаешь центр распределения с хвостами"}}, {"q": "На графике волатильности актива за 30 дней амплитуда колебаний цены (разница между максимумом и минимумом) в первые 15 дней составила 10 денежных единиц, а во вторые 15 дней — 25 денежных единиц. Во сколько раз выросла амплитуда колебаний (визуальный показатель волатильности)?", "options": ["1.5 раза", "2 раза", "2.5 раза", "3 раза"], "correct": 2, "explain": "25/10=2.5 раза — во столько выросла амплитуда колебаний.", "usage": {"code": false, "without": "Берём разность амплитуд (25-10=15) вместо их отношения.", "with": "Амплитуда зубцов на графике выросла с 10 до 25 — в 25/10=2.5 раза, значит волатильность выше в 2.5 раза.", "benefit": "рост волатильности = отношение амплитуд"}}, {"q": "На графике с логарифмической шкалой по оси Y значение растёт от 10 до 1000 за 20 единиц времени по оси X, образуя прямую линию. Во сколько раз выросло значение за это время?", "options": ["100 раз", "50 раз", "1000 раз", "10 раз"], "correct": 0, "explain": "1000/10=100 — значение выросло в 100 раз, что на логарифмической шкале отображается прямой линией (характерно для экспоненциального роста).", "usage": {"code": false, "without": "Видя прямую на лог-шкале, ошибочно думаем про 'равномерный' прирост и путаемся в разах.", "with": "На лог-оси прямая = постоянное умножение: значение выросло с 10 до 1000, то есть в 1000/10=100 раз.", "benefit": "прямая на лог-шкале читается как рост в разы"}}, {"q": "На тепловой карте (heatmap) значения закодированы 5 оттенками цвета для диапазона от 0 до 100. Какой примерно диапазон значений соответствует одному оттенку при равномерном делении шкалы?", "options": ["50 единиц", "10 единиц", "20 единиц", "25 единиц"], "correct": 2, "explain": "100/5=20 единиц на один оттенок при равномерном делении диапазона.", "usage": {"code": false, "without": "Пытаемся угадать шаг оттенка, не разделив диапазон на число градаций.", "with": "5 оттенков делят диапазон 0–100 поровну: на один оттенок приходится 100/5=20 единиц значения.", "benefit": "цену деления цветовой шкалы находишь делением"}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
