<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Линейная алгебра (матрицы, SVD)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
    </div>
    <h1>Линейная алгебра (матрицы, SVD)</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Не подключено</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
(function () {
  const TEST_ID = "linear_algebra";
  const QUESTIONS = [{"q": "Что такое матрица?", "options": ["Прямоугольная таблица чисел, расположенных по строкам и столбцам", "Функция от одной переменной", "Число, обратное к вектору", "Уравнение прямой на плоскости"], "correct": 0, "explain": "Матрица — прямоугольный массив чисел (элементов), организованный в строки и столбцы, размера m×n."}, {"q": "Что такое единичная матрица?", "options": ["Матрица, состоящая только из единиц", "Квадратная матрица с единицами на главной диагонали и нулями вне её", "Матрица размером 1×1", "Матрица с определителем, равным нулю"], "correct": 1, "explain": "Единичная матрица I — нейтральный элемент при умножении матриц: A·I = I·A = A."}, {"q": "Что такое транспонирование матрицы?", "options": ["Умножение матрицы на -1", "Замена строк на столбцы (и наоборот)", "Вычисление определителя", "Приведение матрицы к треугольному виду"], "correct": 1, "explain": "Транспонированная матрица Aᵀ получается из A заменой строк на столбцы: (Aᵀ)ij = Aji."}, {"q": "Что такое вектор в контексте линейной алгебры?", "options": ["Упорядоченный набор чисел, представляющий элемент векторного пространства", "Только направление в трёхмерном пространстве", "Синоним матрицы", "Функция от времени"], "correct": 0, "explain": "Вектор — элемент векторного пространства, представимый как упорядоченный набор координат (столбец или строка чисел)."}, {"q": "Что такое скалярное (внутреннее) произведение двух векторов?", "options": ["Вектор, перпендикулярный обоим исходным векторам", "Число, равное сумме произведений соответствующих координат", "Матрица размера n×n", "Определитель разности векторов"], "correct": 1, "explain": "Скалярное произведение a·b = Σ aᵢbᵢ — число, характеризующее проекцию одного вектора на другой (связано с углом между ними)."}, {"q": "Что такое ранг матрицы?", "options": ["Количество строк в матрице", "Максимальное число линейно независимых строк (или столбцов) матрицы", "Сумма всех элементов матрицы", "Число ненулевых элементов на диагонали"], "correct": 1, "explain": "Ранг — размерность пространства, натянутого на строки (или столбцы) матрицы; показывает 'истинную' информационную ёмкость матрицы."}, {"q": "Что такое определитель (детерминант) квадратной матрицы?", "options": ["Число, характеризующее, обратима ли матрица, и связанное с масштабированием объёма при линейном преобразовании", "Сумма всех элементов главной диагонали", "Максимальный элемент матрицы", "Ранг матрицы"], "correct": 0, "explain": "Определитель det(A) — скаляр; если det(A)=0, матрица вырождена (необратима); |det(A)| также равен коэффициенту масштабирования объёма при преобразовании."}, {"q": "Что такое собственный вектор (eigenvector) матрицы A?", "options": ["Любой ненулевой вектор", "Вектор v, для которого Av = λv при некотором скаляре λ", "Вектор, ортогональный всем строкам A", "Столбец единичной матрицы"], "correct": 1, "explain": "Собственный вектор v сохраняет направление при умножении на матрицу A, лишь масштабируясь на собственное число λ."}, {"q": "Что такое линейная независимость набора векторов?", "options": ["Ни один из векторов не может быть выражен как линейная комбинация остальных", "Все векторы имеют одинаковую длину", "Векторы перпендикулярны друг другу", "Сумма векторов равна нулю"], "correct": 0, "explain": "Векторы линейно независимы, если единственное решение уравнения c₁v₁+...+cₙvₙ=0 — это все cᵢ=0, то есть ни один вектор не выражается через остальные."}, {"q": "Что такое обратная матрица A⁻¹?", "options": ["Матрица, транспонированная к A", "Матрица, для которой A·A⁻¹ = A⁻¹·A = I", "Матрица с противоположными знаками элементов", "Матрица нулей той же размерности"], "correct": 1, "explain": "Обратная матрица существует только для невырожденных (det≠0) квадратных матриц и удовлетворяет A·A⁻¹=I."}, {"q": "Почему матричное умножение в общем случае некоммутативно (AB ≠ BA)?", "options": ["Потому что порядок применения линейных преобразований, которые представляют матрицы, обычно влияет на результат", "Потому что матрицы всегда разного размера", "Это соглашение без математической причины", "Потому что коммутативность нарушается только для квадратных матриц"], "correct": 0, "explain": "Каждая матрица — это линейное преобразование; применение сначала B, а потом A (то есть AB), как правило, даёт иной результат, чем сначала A, потом B."}, {"q": "В чём смысл разложения матрицы на собственные значения и собственные векторы (eigendecomposition)?", "options": ["Оно раскладывает симметричную/диагонализируемую матрицу в произведение A = VΛV⁻¹, где Λ — диагональная матрица собственных значений, упрощая многие вычисления (например, возведение в степень)", "Оно применимо только к единичной матрице", "Оно всегда даёт ортогональные собственные векторы для любой матрицы", "Оно эквивалентно транспонированию"], "correct": 0, "explain": "Разложение A=VΛV⁻¹ позволяет свести сложные операции (Aⁿ, экспонента матрицы) к операциям над диагональной матрицей Λ."}, {"q": "Чем сингулярное разложение (SVD) отличается от разложения по собственным значениям?", "options": ["SVD применимо к любой (даже прямоугольной) матрице и раскладывает её как A=UΣVᵀ, где U и V ортогональны, а собственное разложение требует квадратной (обычно диагонализируемой) матрицы", "SVD работает только с квадратными симметричными матрицами", "Оба разложения идентичны для всех матриц", "SVD не связано с собственными значениями"], "correct": 0, "explain": "SVD существует для любой матрицы m×n; для симметричных положительно определённых матриц SVD и собственное разложение совпадают, но в общем случае SVD более универсально."}, {"q": "Что представляют собой сингулярные числа (singular values) в SVD?", "options": ["Собственные значения матрицы AᵀA (или AAᵀ), взятые в квадратном корне, характеризующие 'важность' соответствующих направлений", "Элементы главной диагонали исходной матрицы A", "Определитель матрицы A", "Ранг матрицы A"], "correct": 0, "explain": "Сингулярные числа σᵢ = √(собственные значения AᵀA), они всегда неотрицательны и упорядочены по убыванию, отражая масштаб растяжения по соответствующим ортогональным направлениям."}, {"q": "Почему SVD используется для снижения размерности данных (например, в PCA)?", "options": ["Отбрасывание малых сингулярных чисел даёт наилучшее низкоранговое приближение матрицы по норме Фробениуса (теорема Эккарта-Янга), сохраняя наибольшую долю 'энергии' данных", "SVD увеличивает размерность данных", "SVD применяется только к текстовым данным", "Сингулярные числа не связаны с дисперсией данных"], "correct": 0, "explain": "Теорема Эккарта-Янга гарантирует, что усечение SVD до k наибольших сингулярных чисел даёт наилучшее приближение ранга k в смысле наименьших квадратов."}, {"q": "В чём разница между собственным базисом и ортонормированным базисом?", "options": ["Ортонормированный базис состоит из единичных взаимно перпендикулярных векторов, тогда как собственные векторы не обязаны быть ортогональными (если матрица несимметрична)", "Это одно и то же для любой матрицы", "Собственный базис всегда ортонормирован", "Ортонормированный базис существует только в 2D"], "correct": 0, "explain": "Только для симметричных (или нормальных) матриц собственные векторы можно выбрать взаимно ортогональными; в общем случае это не так."}, {"q": "Почему положительно определённая матрица важна, например, в оптимизации и статистике?", "options": ["Она гарантирует, что квадратичная форма xᵀAx > 0 для всех x≠0, что соответствует выпуклой параболоидной форме функции (единственный минимум) и корректной ковариационной матрице", "Она всегда является единичной матрицей", "Она гарантирует равенство всех собственных значений", "Она не имеет отношения к оптимизации"], "correct": 0, "explain": "В оптимизации положительная определённость гессиана гарантирует локальный минимум; в статистике — корректность ковариационной матрицы (дисперсии не отрицательны)."}, {"q": "Что означает, что линейное преобразование сохраняет линейные комбинации?", "options": ["T(αu+βv) = αT(u)+βT(v) для любых векторов u,v и скаляров α,β — это определяющее свойство линейности", "T(u+v) всегда равно T(u)·T(v)", "Линейное преобразование сохраняет только длину векторов", "Это свойство выполняется только для единичной матрицы"], "correct": 0, "explain": "Аддитивность и однородность (сохранение линейных комбинаций) — определение линейного отображения, которое можно представить умножением на матрицу."}, {"q": "Почему ортогональные матрицы (Q) особенно удобны в вычислениях (QᵀQ=I)?", "options": ["Обратная матрица совпадает с транспонированной (Q⁻¹=Qᵀ), что упрощает вычисления и гарантирует сохранение длин и углов векторов", "Ортогональные матрицы всегда имеют нулевой определитель", "Ортогональные матрицы не имеют собственных значений", "Они существуют только в одномерном пространстве"], "correct": 0, "explain": "Ортогональные преобразования — изометрии (повороты/отражения), сохраняющие норму векторов; вычисление обратной матрицы сводится к дешёвому транспонированию."}, {"q": "Каков геометрический смысл того, что определитель матрицы равен нулю?", "options": ["Преобразование 'сжимает' пространство в подпространство меньшей размерности (матрица вырождена, необратима)", "Матрица обязательно единичная", "Все элементы матрицы равны нулю", "Матрица обязательно симметрична"], "correct": 0, "explain": "Нулевой определитель означает, что столбцы (строки) линейно зависимы — преобразование теряет как минимум одно измерение (например, сплющивает 3D-объём в плоскость)."}, {"q": "Зачем в методе наименьших квадратов (линейная регрессия) используют псевдообратную матрицу (Мура-Пенроуза), а не обычную обратную?", "options": ["Матрица признаков X часто не квадратная или вырожденная, и псевдообратная матрица (через SVD) даёт наилучшее решение в смысле минимума нормы ошибки даже без точной обратимости", "Псевдообратная матрица всегда быстрее вычисляется", "Обычная обратная матрица даёт другой результат регрессии", "Псевдообратная матрица применяется только для квадратных матриц"], "correct": 0, "explain": "X⁺ = (XᵀX)⁻¹Xᵀ (или через SVD) решает нормальные уравнения метода наименьших квадратов даже когда X не квадратная или XᵀX плохо обусловлена."}, {"q": "Как SVD применяется в сжатии изображений и почему это работает?", "options": ["Изображение представляется матрицей пикселей, и усечённое SVD (несколько первых сингулярных чисел) аппроксимирует изображение с минимальной потерей визуальной информации, требуя меньше данных для хранения", "SVD увеличивает размер файла изображения", "SVD применимо только к чёрно-белым изображениям без потерь", "SVD не связано с матричным представлением пикселей"], "correct": 0, "explain": "Большая часть визуальной информации сосредоточена в нескольких крупнейших сингулярных значениях; усечение остальных даёт компактное приближение с малой потерей качества."}, {"q": "Почему при обучении нейросетей важно, чтобы матрицы весов не вызывали 'взрыв' или 'затухание' градиентов, и как это связано с собственными числами?", "options": ["Если собственные (или сингулярные) числа матриц весов сильно больше или меньше 1, многократное перемножение через слои усиливает или гасит сигнал экспоненциально — отсюда важность правильной инициализации весов", "Собственные числа матриц весов не влияют на обучение нейросетей", "Взрыв градиентов связан только со скоростью обучения, а не с матрицами весов", "Нейросети не используют матричные операции"], "correct": 0, "explain": "Произведение многих матриц с сингулярными числами >1 или <1 экспоненциально усиливает/гасит сигнал по глубине сети — отсюда техники вроде Xavier/He-инициализации."}, {"q": "Почему матрица Грама (AᵀA) всегда симметрична и положительно полуопределена?", "options": ["Потому что (AᵀA)ᵀ=AᵀA (симметрия) и xᵀ(AᵀA)x = |Ax|² ≥ 0 для любого x (полуопределённость)", "Потому что это соглашение линейной алгебры без доказательства", "Только если A сама симметрична", "Только если A — единичная матрица"], "correct": 0, "explain": "Прямая алгебраическая проверка: транспонирование произведения даёт то же произвед очные матричные разложения (SVD) дорого пересчитывать инкрементально, поэтому на практике используют онлайн-варианты или приближённые обновления."}, {"q": "Инженер заметил, что при обучении модели матрица признаков имеет линейно зависимые столбцы (мультиколлинеарность), и XᵀX оказывается вырожденной. Какое решение наиболее корректно?", "options": ["Использовать регуляризацию (например, гребневую регрессию, добавляющую λI к XᵀX) или удалить/объединить избыточные признаки", "Просто увеличить количество наблюдений без изменения признаков", "Игнорировать проблему — вырожденность не влияет на результат", "Всегда транспонировать матрицу X"], "correct": 0, "explain": "Добавление λI (ridge regularization) делает матрицу (XᵀX+λI) невырожденной и обратимой, устраняя проблему мультиколлинеарности."}, {"q": "При диагонализации матрицы A = VΛV⁻¹ выяснилось, что некоторые собственные значения комплексные, хотя матрица вещественная. Что это означает?", "options": ["Это нормально для несимметричных вещественных матриц — комплексные собственные значения обычно связаны с вращательной компонентой преобразования", "Вычисления обязательно содержат ошибку", "Комплексные собственные значения возможны только для матриц с комплексными элементами", "Такая матрица не может быть диагонализирована"], "correct": 0, "explain": "Несимметричные вещественные матрицы могут иметь комплексно-сопряжённые пары собственных значений, что соответствует поворотам/спиралевидной динамике в соответствующей системе."}, {"q": "При сжатии изображения 1000×1000 через SVD выбраны только 20 из 1000 сингулярных чисел. Какой результат ожидаем?", "options": ["Существенное уменьшение объёма хранимых данных при сохранении основных визуальных черт, но с потерей мелких деталей", "Изображение станет идентичным оригиналу без потерь", "Объём данных увеличится", "SVD с 20 компонентами невозможно построить для такой матрицы"], "correct": 0, "explain": "Усечённое SVD с k=20 сохраняет крупные структуры (где сосредоточена основная 'энергия'), но теряет мелкие детали, кодируемые малыми сингулярными числами."}, {"q": "Разработчик реализует поворот 3D-объекта в графическом движке и после нескольких последовательных поворотов замечает, что объект слегка исказился (перестал быть жёстким телом). Какая наиболее вероятная причина?", "options": ["Накопление ошибок округления привело к тому, что матрица поворота перестала быть строго ортогональной — нужна периодическая ре-ортогонализация", "Матрицы поворота никогда не теряют ортогональность", "Проблема всегда в видеокарте, а не в математике", "Повороты нельзя комбинировать матричным умножением"], "correct": 0, "explain": "Многократное перемножение матриц с накоплением ошибок округления (float) постепенно нарушает свойство QᵀQ=I — практическое решение: периодическая нормализация/ре-ортогонализация матрицы."}, {"q": "Аналитик применяет PCA к данным и видит, что первая главная компонента объясняет 98% дисперсии. Какой практический вывод наиболее обоснован?", "options": ["Данные почти одномерны (сильно коррелированы вдоль одного направления), и можно значительно сократить размерность почти без потери информации", "PCA всегда даёт такой результат независимо от данных", "98% — признак ошибки в вычислениях", "Нужно обязательно использовать все компоненты несмотря на результат"], "correct": 0, "explain": "Если одна компонента объясняет почти всю дисперсию, это означает сильную линейную структуру/корреляцию в данных вдоль этого направления — остальные компоненты почти не несут информации."}, {"q": "При решении Ax=b итерационным методом (например, градиентным спуском) сходимость оказалась очень медленной. Матрица A имеет число обусловленности 10^6. Какая связь здесь наиболее вероятна?", "options": ["Высокое число обусловленности означает сильно вытянутые 'овраги' в ландшафте функции ошибки, что замедляет сходимость итерационных методов", "Число обусловленности не влияет на скорость сходимости", "Медленная сходимость всегда вызвана только выбором шага обучения", "Число обусловленности связано только с размером матрицы"], "correct": 0, "explain": "Плохо обусловленные матрицы создают сильно вытянутые эллиптические поверхности уровня, из-за чего градиентный спуск зигзагообразно и медленно сходится к минимуму."}, {"q": "Дана матрица A = [[2,1],[1,2]]. Чему равен её определитель?", "options": ["1", "3", "4", "5"], "correct": 1, "explain": "det(A) = 2·2 - 1·1 = 4-1 = 3."}, {"q": "Даны векторы a=(1,2,3) и b=(4,5,6). Чему равно их скалярное произведение?", "options": ["21", "28", "32", "36"], "correct": 2, "explain": "a·b = 1·4+2·5+3·6 = 4+10+18 = 32."}, {"q": "Матрица A = [[1,2],[3,4]]. Чему равен её след (сумма элементов главной диагонали)?", "options": ["3", "4", "5", "10"], "correct": 2, "explain": "tr(A) = 1+4 = 5."}, {"q": "Матрица A = [[3,0],[0,5]]. Какие у неё собственные значения?", "options": ["0 и 8", "3 и 5", "1 и 1", "8 и 15"], "correct": 1, "explain": "Для диагональной матрицы собственные значения совпадают с элементами главной диагонали: 3 и 5."}, {"q": "Даны две матрицы A (2×3) и B (3×4). Каков размер произведения AB?", "options": ["2×4", "3×3", "2×3", "4×2"], "correct": 0, "explain": "Произведение матриц m×n и n×p даёт матрицу m×p: 2×3 умножить на 3×4 даёт 2×4."}, {"q": "Вектор v=(3,4). Чему равна его евклидова норма (длина)?", "options": ["3", "4", "5", "7"], "correct": 2, "explain": "‖v‖ = √(3²+4²) = √(9+16) = √25 = 5."}, {"q": "Матрица A=[[1,2],[2,4]]. Чему равен её ранг?", "options": ["0", "1", "2", "4"], "correct": 1, "explain": "Вторая строка (2,4) = 2·(первая строка (1,2)), значит строки линейно зависимы, ранг равен 1."}, {"q": "Транспонирование матрицы A=[[1,2,3],[4,5,6]] (размер 2×3) даёт матрицу какого размера?", "options": ["2×3", "3×2", "6×1", "3×3"], "correct": 1, "explain": "Транспонирование меняет строки и столбцы местами: матрица 2×3 становится 3×2."}, {"q": "Матрицы A=[[1,2],[3,4]] и B=[[5,6],[7,8]]. Чему равен элемент (1,1) произведения AB?", "options": ["19", "22", "23", "43"], "correct": 0, "explain": "(AB)11 = 1·5+2·7 = 5+14 = 19."}, {"q": "Единичная матрица I размера 2×2 умножается на вектор v=(7,-3). Чему равен результат?", "options": ["(0,0)", "(7,-3)", "(-3,7)", "(14,-6)"], "correct": 1, "explain": "Умножение на единичную матрицу не меняет вектор: I·v = v = (7,-3)."}, {"q": "Матрица A=[[2,0],[0,0]]. Чему равен её ранг?", "options": ["0", "1", "2", "4"], "correct": 1, "explain": "Только одна строка ненулевая и линейно независимая, значит ранг равен 1."}, {"q": "Даны векторы a=(1,0) и b=(0,1). Ортогональны ли они, и чему равно их скалярное произведение?", "options": ["Да, скалярное произведение равно 0", "Нет, скалярное произведение равно 1", "Да, скалярное произведение равно 1", "Нет, скалярное произведение равно -1"], "correct": 0, "explain": "a·b = 1·0+0·1 = 0, нулевое скалярное произведение означает ортогональность (угол 90°)."}, {"q": "Матрица A=[[4,0],[0,9]]. Каковы её сингулярные числа?", "options": ["4 и 9", "2 и 3", "16 и 81", "36 и 0"], "correct": 0, "explain": "Для диагональной матрицы с неотрицательными элементами сингулярные числа равны абсолютным значениям диагональных элементов: 4 и 9."}, {"q": "Система уравнений: x+y=5, 2x+2y=10. Сколько решений она имеет?", "options": ["Ровно одно", "Бесконечно много (уравнения линейно зависимы)", "Ноль решений", "Ровно два"], "correct": 1, "explain": "Второе уравнение — это первое, умноженное на 2 (линейно зависимо), поэтому фактически одно уравнение с двумя неизвестными — бесконечно много решений."}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Google Drive sync ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  let accessToken = null;
  let tokenClient = null;

  function driveConfigured() {
    return typeof window.GOOGLE_CLIENT_ID === "string" && window.GOOGLE_CLIENT_ID.length > 0;
  }

  function ensureGis(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = cb;
    s.onerror = () => toast("Не удалось загрузить Google Identity Services (нет интернета?)");
    document.head.appendChild(s);
  }

  function getToken(cb) {
    if (accessToken) { cb(); return; }
    ensureGis(() => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.file",
          callback: (resp) => {
            if (resp.error) { toast("Ошибка авторизации: " + resp.error); return; }
            accessToken = resp.access_token;
            syncStatus.textContent = "Подключено к Google";
            cb();
          }
        });
      }
      tokenClient.requestAccessToken({ prompt: accessToken ? "" : "consent" });
    });
  }

  const DRIVE_FILENAME = "learntest_" + TEST_ID + ".json";

  function driveFindFile(cb) {
    fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name='" + DRIVE_FILENAME + "' and trashed=false") + "&spaces=drive&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(r => r.json()).then(d => cb((d.files && d.files[0]) || null)).catch(() => cb(null));
  }

  function driveUpload() {
    getToken(() => {
      driveFindFile((file) => {
        const metadata = { name: DRIVE_FILENAME, mimeType: "application/json" };
        const boundary = "-------314159265358979323846";
        const body =
          "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(metadata) +
          "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + JSON.stringify(state) +
          "\r\n--" + boundary + "--";
        const url = file
          ? "https://www.googleapis.com/upload/drive/v3/files/" + file.id + "?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        fetch(url, {
          method: file ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast("Прогресс отправлен в Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка отправки: " + e.message));
      });
    });
  }

  function driveDownload() {
    getToken(() => {
      driveFindFile((file) => {
        if (!file) { toast("Файл в Drive не найден"); return; }
        fetch("https://www.googleapis.com/drive/v3/files/" + file.id + "?alt=media", {
          headers: { Authorization: "Bearer " + accessToken }
        }).then(r => r.json()).then(remote => {
          if (!confirm("Заменить локальный прогресс данными из Drive?")) return;
          state = remote;
          saveState();
          render();
          toast("Прогресс загружен из Drive");
          syncModal.classList.remove("show");
        }).catch(e => toast("Ошибка загрузки: " + e.message));
      });
    });
  }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!driveConfigured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));
  document.getElementById("syncUploadBtn").addEventListener("click", driveUpload);
  document.getElementById("syncDownloadBtn").addEventListener("click", driveDownload);
})();
</script>
</body>
</html>
