<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Основы Computer Vision</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/computer_vision.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Основы Computer Vision</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "computer_vision";
  const QUESTIONS = [{"q": "Что такое пиксель в контексте цифрового изображения?", "options": ["Один из стандартных форматов файлов изображения", "Наименьший элемент картинки со значением цвета", "Единица измерения физического разрешения экрана", "Алгоритм сжатия растровых изображений без потерь"], "correct": 1, "explain": "Пиксель (picture element) — базовая единица растрового изображения, содержащая числовое значение цвета или интенсивности.", "usage": {"code": true, "without": "# изображение как абстрактный 'объект' — нельзя обратиться к точке\n# приходится вручную парсить байты файла, не зная где какой пиксель", "with": "import numpy as np\nimg = np.zeros((480, 640, 3), np.uint8)  # H x W x каналы\nimg[100, 200] = [255, 0, 0]  # пиксель (y=100,x=200) стал красным\nprint(img[100, 200])  # значение цвета конкретного пикселя", "benefit": "Прямой доступ к любой точке как к числу в массиве."}}, {"q": "Что такое свёрточный слой (convolutional layer) в нейросети?", "options": ["Слой, применяющий полносвязное умножение матриц ко всему входу", "Слой, сокращающий число выходных классов до нужного", "Слой со скользящим фильтром-ядром для локальных признаков", "Слой, переводящий изображение в текстовое описание"], "correct": 2, "explain": "Свёрточный слой применяет обучаемые фильтры (ядра), скользящие по изображению, извлекая локальные паттерны — края, текстуры и т.д.", "usage": {"code": true, "without": "import torch.nn as nn\n# разворачиваем картинку в вектор и гоним через Linear\nnn.Linear(3*224*224, 1000)  # ~150M весов, пространство разрушено", "with": "import torch.nn as nn\nnn.Conv2d(3, 64, kernel_size=3, padding=1)  # 1792 веса\n# фильтр скользит по изображению, ловит локальные края/текстуры", "benefit": "В тысячи раз меньше параметров и сохранённая структура."}}, {"q": "Что такое ядро (kernel) свёртки?", "options": ["Матрица весов для скользящей свёртки", "Слой пакетной нормализации активаций сети", "Название нелинейной функции активации нейрона", "Итоговый класс, предсказанный обученной моделью"], "correct": 0, "explain": "Ядро — обучаемая матрица малого размера (например, 3×3), которая скользит по изображению, вычисляя взвешенную сумму соседних пикселей.", "usage": {"code": true, "without": "# 'размытие' пишут руками с магическими числами\nfor y in range(h):\n  for x in range(w):\n    out[y,x] = (img[y-1,x]+img[y+1,x]+img[y,x-1]+img[y,x+1])/4", "with": "import cv2, numpy as np\nkernel = np.ones((3,3), np.float32)/9  # ядро-матрица весов\nout = cv2.filter2D(img, -1, kernel)  # скользящая свёртка", "benefit": "Любой фильтр — одна матрица весов вместо ручных циклов."}}, {"q": "Для чего используется pooling-слой (например, max pooling)?", "options": ["Для повышения пространственного разрешения картинки", "Для раскраски чёрно-белого изображения в цвет", "Для перевода изображения в текстовое описание", "Для сжатия карты признаков без потери главного"], "correct": 3, "explain": "Pooling (обычно max или average) уменьшает размер карты признаков, снижая вычислительную нагрузку и добавляя устойчивость к небольшим сдвигам.", "usage": {"code": true, "without": "import torch.nn as nn\n# тащим полное разрешение 224x224 через всю сеть\n# дорого по памяти и чувствительно к сдвигу на 1 пиксель", "with": "import torch.nn as nn\npool = nn.MaxPool2d(2)  # 224x224 -> 112x112\n# берём максимум в окне: меньше данных, устойчивость к сдвигам", "benefit": "Вдвое меньше карта признаков и инвариантность к малым сдвигам."}}, {"q": "Что такое функция активации ReLU?", "options": ["f(x) = x²", "f(x) = max(0, x)", "f(x) = sin(x)", "f(x) = 1/(1+e^-x)"], "correct": 1, "explain": "ReLU (Rectified Linear Unit) обнуляет отрицательные значения и оставляет положительные без изменений: f(x)=max(0,x).", "usage": {"code": true, "without": "import numpy as np\n# sigmoid: на глубоких слоях градиент затухает -> обучение стоит\ny = 1/(1+np.exp(-x))", "with": "import numpy as np\ny = np.maximum(0, x)  # ReLU: f(x)=max(0,x)\n# положительные проходят как есть, градиент не затухает", "benefit": "Простая нелинейность без затухания градиента."}}, {"q": "Что такое сегментация изображения?", "options": ["Поворот изображения на произвольный угол", "Определение одного класса для всего изображения", "Присвоение класса каждому пикселю изображения", "Изменение размера и масштаба изображения"], "correct": 2, "explain": "Сегментация присваивает метку класса каждому пикселю изображения, в отличие от классификации, которая даёт один класс на всё изображение.", "usage": {"code": true, "without": "# классифицируем всё изображение одним ярлыком\nlabel = model(img).argmax()  # 'кошка' — но ГДЕ она, неизвестно", "with": "import torch\nlogits = seg_model(img)          # (классы, H, W)\nmask = logits.argmax(dim=0)      # класс для КАЖДОГО пикселя\n# mask[y,x] = номер класса в этой точке", "benefit": "Понимание сцены на уровне пикселей, а не всей картинки."}}, {"q": "Чем детекция объектов (object detection) отличается от классификации изображений?", "options": ["Это по сути одна и та же задача, никакой разницы нет", "Детекция объектов принципиально не задействует нейросети", "Детекция рамкой локализует объекты, классификация — один класс", "Детекция работает исключительно с видео, а классификация — с фото"], "correct": 2, "explain": "Object detection одновременно решает две задачи: определяет, какие объекты есть на изображении, и указывает их местоположение (например, рамкой).", "usage": {"code": false, "without": "Классификация отвечает только 'что на картинке' — один класс на всё изображение, без координат. Если объектов несколько или важно их положение, такой ответ бесполезен.", "with": "Детекция находит несколько объектов сразу и возвращает для каждого класс и bounding box с координатами. Мы узнаём и что это, и где именно оно расположено.", "benefit": "Локализация нескольких объектов, а не один общий ярлык."}}, {"q": "Что такое аугментация данных (data augmentation) в компьютерном зрении?", "options": ["Расширение выборки трансформациями изображений", "Метод сжатия изображений без потери качества", "Алгоритм для точного распознавания лиц в кадре", "Удаление части обучающих данных ради ускорения"], "correct": 0, "explain": "Аугментация создаёт новые вариации существующих изображений (повороты, масштабирование, изменение яркости), улучшая обобщающую способность модели.", "usage": {"code": true, "without": "# обучаем на исходных N картинках 'как есть'\n# сеть запоминает ракурсы и переобучается", "with": "from torchvision import transforms\naug = transforms.Compose([\n  transforms.RandomHorizontalFlip(),\n  transforms.RandomRotation(15),\n  transforms.ColorJitter(0.2, 0.2)])  # новые вариации из тех же данных", "benefit": "Больше разнообразия без сбора новых данных, лучше обобщение."}}, {"q": "Что такое карта признаков (feature map) в свёрточной сети?", "options": ["Визуализация обученных весов финального слоя", "Результат применения свёрточного фильтра", "Полный перечень всех классов в датасете", "Итоговый результат классификации картинки"], "correct": 1, "explain": "Feature map — результат применения одного свёрточного фильтра, показывающий, где на изображении обнаружен соответствующий паттерн.", "usage": {"code": true, "without": "# смотрим только на итоговый класс, не понимая ЧТО увидел фильтр\npred = model(img).argmax()", "with": "import torch.nn as nn\nconv = nn.Conv2d(3, 16, 3, padding=1)\nfmap = conv(img)   # (16, H, W) — 16 карт признаков\n# fmap[k] показывает, где сработал фильтр k (например, край)", "benefit": "Видно, где на изображении обнаружен каждый паттерн."}}, {"q": "Что означает термин 'предобученная модель' (pretrained model) в CV?", "options": ["Модель совсем без обученных весов (случайная инициализация)", "Модель, которая ещё ни разу не проходила обучение", "Модель, предобученная на большом датасете (ImageNet)", "Модель, работающая исключительно с текстовыми данными"], "correct": 2, "explain": "Предобученные модели (например, ResNet на ImageNet) содержат уже выученные общие визуальные признаки, что ускоряет и улучшает решение новых задач (transfer learning).", "usage": {"code": true, "without": "import torch.nn as nn\nmodel = resnet50()  # случайные веса\n# нужны сотни тысяч размеченных примеров, чтобы выучить края с нуля", "with": "from torchvision.models import resnet50, ResNet50_Weights\nmodel = resnet50(weights=ResNet50_Weights.IMAGENET1K_V2)\n# общие признаки уже выучены, дообучаем под свою задачу", "benefit": "Меньше данных и времени за счёт переноса знаний."}}, {"q": "Почему свёрточные сети используют разделяемые (shared) веса фильтра по всему изображению, а не отдельный набор весов для каждой позиции?", "options": ["Снижает число параметров и даёт трансляционную инвариантность", "Разделяемые веса снижают точность, но ускоряют работу модели", "Полносвязные веса всегда предпочтительнее для изображений", "Разделение весов встречается только в устаревших архитектурах"], "correct": 0, "explain": "Один и тот же фильтр применяется по всему изображению, поэтому объект узнаётся независимо от того, где он расположен (трансляционная инвариантность), и параметров нужно значительно меньше.", "usage": {"code": false, "without": "Если для каждой позиции изображения завести свой набор весов, число параметров взрывается, а объект, сдвинутый на пару пикселей, придётся 'переучивать' заново — модель не узнает его в новом месте.", "with": "Один фильтр с общими весами скользит по всему изображению, поэтому паттерн распознаётся независимо от положения (трансляционная инвариантность), а параметров нужно в разы меньше.", "benefit": "Меньше параметров и узнавание объекта в любой точке кадра."}}, {"q": "Зачем в глубоких свёрточных сетях увеличивают число каналов (глубину карты признаков) при уменьшении пространственного разрешения по мере углубления сети?", "options": ["Число каналов никак не связано с уровнем абстракции признаков", "Пространственное разрешение обязано расти вместе с глубиной сети", "Рост числа каналов только замедляет сеть без всякой пользы", "Абстрактным признакам глубоких слоёв нужно больше каналов"], "correct": 3, "explain": "Классический паттерн архитектур (VGG, ResNet): по мере углубления сети пространственные размеры уменьшаются, а число каналов растёт, отражая переход от локальных к абстрактным признакам.", "usage": {"code": false, "without": "Если держать разрешение большим и мало каналов на всей глубине, сеть не сможет собрать абстрактные составные признаки и будет впустую тратить память на пространственные детали.", "with": "По мере углубления пространственный размер уменьшают, а число каналов растят: ранние слои ловят края/текстуры в высоком разрешении, поздние — абстрактные признаки, для которых нужно больше каналов, но меньше деталей.", "benefit": "Эффективный переход от локальных признаков к абстрактным."}}, {"q": "В чём архитектурная идея skip-connections (пропускных соединений), например, в ResNet?", "options": ["Skip-connections нужны исключительно в генеративных моделях", "Сигнал обходит слои и складывается позже, спасая градиент", "Skip-connections полностью заменяют собой свёрточные слои", "Они служат только для уменьшения размера изображения на входе"], "correct": 1, "explain": "Residual connections (x + F(x)) дают более прямой путь для градиента при обратном распространении, что решает проблему деградации при увеличении глубины сети.", "usage": {"code": true, "without": "import torch.nn as nn\n# просто складываем много слоёв подряд\nout = block3(block2(block1(x)))  # градиент затухает, глубокая сеть деградирует", "with": "# residual: даём сигналу обходной путь\nout = x + F(x)  # F — пара свёрток\n# градиент течёт напрямую через '+ x'", "benefit": "Обучаются очень глубокие сети без затухания градиента."}}, {"q": "Почему архитектуры с механизмом внимания (attention), такие как Vision Transformer (ViT), рассматривают изображение как последовательность патчей, а не применяют классическую свёртку?", "options": ["Attention даёт каждому патчу прямой обзор всех остальных", "Внимание полностью снимает необходимость в обучении сети", "ViT не способен обрабатывать изображения крупнее, чем 32×32", "Attention применим исключительно к текстовым данным"], "correct": 0, "explain": "В отличие от свёртки с ограниченным локальным полем зрения, self-attention вычисляет взаимодействие между всеми парами патчей сразу, естественно захватывая дальние (глобальные) зависимости.", "usage": {"code": false, "without": "Классическая свёртка видит только локальное окно (рецептивное поле), и чтобы связать далёкие части изображения, нужно много слоёв — дальний контекст улавливается косвенно и слабо.", "with": "ViT режет изображение на патчи-последовательность, и self-attention позволяет каждому патчу напрямую 'смотреть' на все остальные, сразу захватывая глобальные зависимости.", "benefit": "Прямой учёт дальних связей между частями изображения."}}, {"q": "Почему батч-нормализация (Batch Normalization) ускоряет обучение сверточных сетей?", "options": ["Батч-нормализация целиком заменяет функции активации", "Она применяется исключительно на стадии тестирования модели", "Нормализует активации мини-батча, стабилизируя градиенты", "Она заметно сокращает число слоёв в архитектуре сети"], "correct": 2, "explain": "Нормализация активаций к нулевому среднему и единичной дисперсии внутри батча снижает чувствительность обучения к масштабу весов и позволяет использовать более высокий learning rate.", "usage": {"code": true, "without": "import torch.nn as nn\n# без нормализации распределения активаций 'плывут' между слоями\n# приходится брать маленький learning rate, обучение медленное", "with": "import torch.nn as nn\nnet = nn.Sequential(nn.Conv2d(3,64,3), nn.BatchNorm2d(64), nn.ReLU())\n# активации нормализованы -> стабильные градиенты, больший lr", "benefit": "Стабильнее и быстрее обучение, можно выше learning rate."}}, {"q": "В чём разница между семантической сегментацией и instance-сегментацией?", "options": ["Это по сути одно и то же, различий между ними нет", "Instance-сегментация разделяет отдельные экземпляры класса", "Семантическая сегментация работает лишь с одним классом за раз", "Instance-сегментация вообще не использует нейросети"], "correct": 1, "explain": "Например, при семантической сегментации все пиксели 'человек' получают одну метку класса, а instance-сегментация различит 'человек 1' и 'человек 2' как отдельные объекты.", "usage": {"code": false, "without": "Семантическая сегментация красит все пиксели класса 'человек' одной меткой — два стоящих рядом человека сливаются в одно пятно, их не пересчитать и не разделить.", "with": "Instance-сегментация помимо класса различает отдельные экземпляры: 'человек 1' и 'человек 2' получают разные маски, даже если это один класс.", "benefit": "Различение отдельных объектов одного класса."}}, {"q": "Почему рецептивное поле (receptive field) нейрона в глубоком слое свёрточной сети намного больше, чем размер фильтра в этом слое?", "options": ["Оно задаётся исключительно размером входного изображения целиком", "Рецептивное поле только сокращается с глубиной сети", "Рецептивное поле всегда равно размеру фильтра слоя", "Оно накапливается через слои, охватывая область шире фильтра"], "correct": 3, "explain": "Эффективное рецептивное поле растёт с каждым слоем, так как нейрон более глубокого слоя агрегирует информацию через несколько предыдущих сверточных и pooling операций.", "usage": {"code": false, "without": "Если считать, что нейрон 'видит' только окно размером с фильтр текущего слоя, непонятно, как глубокая сеть распознаёт крупные объекты — по такой логике это невозможно.", "with": "Рецептивное поле накапливается через все предыдущие слои: нейрон глубокого слоя агрегирует информацию из широкой области исходного изображения, поэтому эффективно 'видит' куда больше размера своего фильтра.", "benefit": "Понимание, как глубокие слои охватывают крупные структуры."}}, {"q": "Зачем используется метрика IoU (Intersection over Union) при оценке качества детекции объектов?", "options": ["Измеряет степень перекрытия предсказанной и истинной рамок", "IoU оценивает только класс объекта без учёта его положения", "IoU применяется исключительно в сегментации, но не в детекции", "IoU совсем не связана с площадью перекрытия рамок"], "correct": 0, "explain": "IoU = площадь пересечения / площадь объединения двух рамок; чем ближе к 1, тем точнее предсказанная рамка совпадает с истинной.", "usage": {"code": true, "without": "# оцениваем детекцию только по совпадению класса\n# рамка может быть смещена/огромна, а 'угадал класс' = зачёт", "with": "def iou(a, b):  # a,b = (x1,y1,x2,y2)\n  ix1,iy1 = max(a[0],b[0]), max(a[1],b[1])\n  ix2,iy2 = min(a[2],b[2]), min(a[3],b[3])\n  inter = max(0,ix2-ix1)*max(0,iy2-iy1)\n  ua = (a[2]-a[0])*(a[3]-a[1]) + (b[2]-b[0])*(b[3]-b[1]) - inter\n  return inter/ua  # 0..1: насколько точно совпали рамки", "benefit": "Числовая оценка точности локализации, а не только класса."}}, {"q": "Почему модели компьютерного зрения могут быть уязвимы к состязательным атакам (adversarial examples) — почти незаметным для человека изменениям пикселей, полностью меняющим предсказание?", "options": ["Модели компьютерного зрения по природе защищены от таких атак", "Adversarial examples работают исключительно с чёрно-белыми фото", "Направленное возмущение незаметно пересекает границу решения", "Состязательные атаки возможны только для устаревших моделей"], "correct": 2, "explain": "Граница решения нейросети в многомерном пространстве признаков может проходить очень близко к обучающим примерам, и малые направленные шумы способны 'перепрыгнуть' эту границу.", "usage": {"code": false, "without": "Кажется, что раз модель точна на тесте, её нельзя обмануть — но это иллюзия: обычная оценка не проверяет устойчивость к специально подобранным возмущениям.", "with": "Нейросеть ищет закономерности в пространстве высокой размерности, и её граница решения проходит близко к примерам; малый направленный шум, незаметный человеку, 'перепрыгивает' границу и меняет предсказание.", "benefit": "Понимание, почему модель уязвима к незаметным атакам."}}, {"q": "Почему в архитектурах encoder-decoder (например, U-Net для сегментации) используют skip-connections между соответствующими слоями энкодера и декодера?", "options": ["Передают в декодер детали, потерянные при сжатии в энкодере", "Skip-connections в U-Net служат лишь ускорению, но не качеству", "U-Net по определению не использует никаких skip-connections", "Они полностью заменяют собой декодер в архитектуре U-Net"], "correct": 0, "explain": "U-Net соединяет слои энкодера и декодера одинакового пространственного разрешения, компенсируя потерю мелких деталей при последовательном сжатии изображения.", "usage": {"code": true, "without": "# декодер восстанавливает маску только из сжатого 'бутылочного горлышка'\nout = decoder(bottleneck)  # границы объектов размыты, детали потеряны", "with": "import torch\n# прокидываем детали с уровней энкодера напрямую в декодер\nx = torch.cat([upsampled, enc_feat], dim=1)  # skip-connection\nout = conv(x)  # чёткие границы", "benefit": "Возврат мелких деталей, потерянных при сжатии — точные границы."}}, {"q": "Почему предобученные на ImageNet сети (transfer learning) часто дают хороший старт даже для узкоспециализированных задач, например, распознавания дефектов на производстве?", "options": ["Ранние слои уже выучили универсальные признаки для любой задачи", "Ранние слои сети не содержат никакой полезной информации", "Предобученные сети всегда подходят без дообучения к любой задаче", "Transfer learning работает, лишь если данные идентичны ImageNet"], "correct": 0, "explain": "Общие низкоуровневые визуальные признаки переносимы между доменами, поэтому дообучение (fine-tuning) верхних слоёв на специфичных данных требует значительно меньше размеченных примеров.", "usage": {"code": true, "without": "import torch.nn as nn\nmodel = resnet18()  # с нуля\n# на маленьком датасете дефектов сеть переобучается и не сходится", "with": "from torchvision.models import resnet18, ResNet18_Weights\nmodel = resnet18(weights=ResNet18_Weights.DEFAULT)\nfor p in model.layer1.parameters(): p.requires_grad = False  # заморозили базовые признаки\n# дообучаем только верхние слои под дефекты", "benefit": "Универсальные низкоуровневые признаки экономят данные и время."}}, {"q": "Как архитектурное решение 'дилатированных свёрток' (dilated/atrous convolutions) помогает увеличить рецептивное поле без увеличения числа параметров или уменьшения разрешения?", "options": ["Дилатация сужает рецептивное поле ради точной локализации", "Дилатированные свёртки сокращают число каналов в сети", "Ядро с пропусками расширяет охват при том же числе весов", "Это просто синоним обычной свёртки без каких-либо отличий"], "correct": 2, "explain": "Дилатация вводит промежутки между элементами ядра, эффективно увеличивая охватываемую область без роста параметров — полезно, например, в сегментации, где важно сохранить разрешение.", "usage": {"code": true, "without": "import torch.nn as nn\n# чтобы расширить обзор — либо большое ядро (много весов),\n# либо ещё pooling (теряем разрешение)\nnn.Conv2d(64, 64, kernel_size=7)  # 49 весов на канал", "with": "import torch.nn as nn\nnn.Conv2d(64, 64, kernel_size=3, dilation=2)  # 9 весов,\n# но с 'пропусками' охват как у 5x5, разрешение сохранено", "benefit": "Больше рецептивное поле без роста параметров и потери деталей."}}, {"q": "Почему в задачах с несбалансированными классами (например, редкий дефект на изображении) обычная точность (accuracy) — плохая метрика для оценки модели детекции?", "options": ["Precision и recall неприменимы к задачам компьютерного зрения", "Модель всегда предсказывает частый класс, а accuracy высока", "Несбалансированность классов не влияет на выбор метрики оценки", "Accuracy одинаково хорошо работает при любом балансе классов"], "correct": 1, "explain": "При сильном дисбалансе (например, 99% 'нормальных' изображений) модель, всегда предсказывающая мажоритарный класс, получит высокую accuracy, но будет бесполезна для обнаружения редкого класса.", "usage": {"code": true, "without": "# 99% кадров без дефекта; модель всегда говорит 'нет дефекта'\nacc = (pred == y).mean()  # 0.99 — но дефекты не находятся вообще!", "with": "from sklearn.metrics import precision_score, recall_score, f1_score\nprint(recall_score(y, pred), precision_score(y, pred), f1_score(y, pred))\n# recall сразу покажет, что редкий класс пропущен", "benefit": "Метрики видят пропуск редкого важного класса, а accuracy — нет."}}, {"q": "Почему в некоторых задачах CV (например, автономное вождение) используют ансамбль из нескольких моделей или сенсоров (камера + LIDAR), а не полагаются на одну модель компьютерного зрения?", "options": ["LIDAR и камера дают идентичные данные, поэтому сочетание избыточно", "Одна хорошая модель CV гарантированно устраняет любые ошибки", "Разные сенсоры имеют разные слабости, и вместе они надёжнее", "Ансамбли всегда лишь замедляют работу, не давая преимуществ"], "correct": 2, "explain": "Мультимодальные системы (sensor fusion) компенсируют слабости отдельных сенсоров (например, камера плохо работает в темноте, LIDAR — при дожде), повышая общую надёжность.", "usage": {"code": false, "without": "Одна камера или одна модель имеет слепые зоны: камера плохо видит в темноте, отдельная модель делает систематические ошибки — при сбое источника система остаётся без страховки.", "with": "Ансамбль моделей и разные сенсоры (камера + LIDAR) имеют разные слабые места, и их объединение (sensor fusion) компенсирует отказ одного источника другим.", "benefit": "Надёжность и устойчивость к отказу отдельного сенсора/модели."}}, {"q": "Как выбор функции потерь (например, focal loss вместо обычной кросс-энтропии) помогает в детекции объектов при сильном дисбалансе между фоном и объектами?", "options": ["Focal loss применяется исключительно в задачах сегментации", "Focal loss по эффекту полностью идентична кросс-энтропии", "Выбор функции потерь никак не влияет на дисбаланс классов", "Focal loss снижает вес лёгкого фона в пользу объектов"], "correct": 3, "explain": "В детекции объектов подавляющее большинство регионов изображения — фон; focal loss явно понижает вес хорошо классифицированных (обычно фоновых) примеров, концентрируя обучение на трудных случаях.", "usage": {"code": false, "without": "Обычная кросс-энтропия одинаково учитывает все примеры; в детекции подавляющее большинство регионов — лёгкий фон, и он затапливает градиент, а редкие объекты почти не влияют на обучение.", "with": "Focal loss домножает потерю на (1-p)^γ, понижая вклад легко классифицированных фоновых примеров и фокусируя обучение на трудных и редких объектах.", "benefit": "Обучение концентрируется на объектах, а не на фоне."}}, {"q": "Почему архитектуры детекции 'anchor-based' (например, Faster R-CNN) предопределяют набор рамок-якорей разных размеров и пропорций перед предсказанием?", "options": ["Якоря задают ориентиры для предсказания малых сдвигов рамки", "Число якорей всегда точно равно числу объектов на изображении", "Anchor-based модели вовсе не используют регрессию координат", "Якоря нужны лишь для визуализации и не влияют на обучение"], "correct": 0, "explain": "Предопределённые якоря разных масштабов/пропорций служат базовыми гипотезами, относительно которых сеть регрессирует смещения — это упрощает задачу по сравнению с предсказанием координат с нуля.", "usage": {"code": false, "without": "Предсказывать абсолютные координаты рамки с нуля тяжело: масштабы и пропорции объектов сильно разные, и регрессия нестабильна.", "with": "Anchor-based модель заранее задаёт якоря разных размеров и пропорций, а сеть предсказывает лишь небольшие смещения относительно них — задача локализации упрощается и стабилизируется.", "benefit": "Стабильная локализация объектов разного масштаба."}}, {"q": "Почему аугментация данных должна учитывать специфику задачи — например, горизонтальное отражение уместно для классификации животных, но может быть неуместно для распознавания дорожных знаков?", "options": ["Аугментация никогда не затрагивает семантику объекта", "Любая аугментация всегда одинаково полезна для любой задачи", "Горизонтальное отражение всегда запрещено в компьютерном зрении", "Некоторые трансформации меняют смысл объекта и портят метку"], "correct": 3, "explain": "Аугментации должны сохранять валидность метки: отражение текста на знаке или зеркальное превращение 'левого' в 'правое' может создать физически некорректные или противоречивые обучающие примеры.", "usage": {"code": false, "without": "Слепое применение любой аугментации может испортить метку: зеркально отражённый дорожный знак с текстом становится нечитаемым или означает другое, и модель учится на неверных примерах.", "with": "Аугментацию подбирают под задачу — для животных горизонтальное отражение безопасно, для знаков его исключают или заменяют трансформациями, сохраняющими смысл.", "benefit": "Расширение данных без порчи семантики и меток."}}, {"q": "Почему точность модели на тестовом наборе может резко упасть при применении в реальных условиях (например, другое освещение, ракурс камеры), даже если модель показала отличные результаты на валидации?", "options": ["Валидационная точность всегда точно предсказывает поведение в проде", "Это сдвиг распределения: условия в проде иные, чем в обучении", "Такое невозможно, если модель обучена полностью правильно", "Проблема лишь в недостаточном числе слоёв в сети модели"], "correct": 1, "explain": "Модель обучается находить закономерности, специфичные для распределения обучающих данных; изменение условий (освещение, ракурс, сенсор) может нарушить это соответствие в реальном применении.", "usage": {"code": false, "without": "Полагаясь на высокую валидационную точность, ждут такого же качества в проде — но модель выучила закономерности своего распределения данных.", "with": "Понимая distribution shift, заранее учитывают, что реальные освещение, ракурс и сенсор отличаются от обучающих, и готовят данные/мониторинг под реальные условия.", "benefit": "Реалистичные ожидания и меньше сюрпризов в продакшене."}}, {"q": "Компания разрабатывает систему распознавания лиц и обнаруживает, что точность значительно ниже для некоторых демографических групп. Какая наиболее вероятная и ответственная причина/действие?", "options": ["Точность обязана быть равной при любом составе данных без проверок", "Датасет непредставителен — нужны сбалансированные данные и аудит", "Это неустранимое свойство любых систем распознавания лиц", "Проблема не в данных, а исключительно в архитектуре сети"], "correct": 1, "explain": "Смещение (bias) в обучающих данных — частая причина неравномерной точности по демографическим группам; ответственный подход включает аудит данных и метрик по подгруппам.", "usage": {"code": false, "without": "Считать, что точность обязана быть равной для всех групп 'по умолчанию', и не проверять состав данных — значит не заметить систематический провал по недопредставленной группе.", "with": "Ответственный подход: признать вероятную непредставительность датасета, собрать сбалансированные данные и оценивать метрики отдельно по подгруппам.", "benefit": "Выявление и устранение перекоса точности по демографии."}}, {"q": "Компания использует модель детекции дефектов на конвейере, обученную летом при ярком освещении. Зимой (более тусклое освещение) качество резко упало. Какое решение наиболее уместно?", "options": ["Достаточно просто повысить разрешение камеры на конвейере", "Модель обязана работать одинаково при любом освещении без вмешательства", "Дообучить на зимних кадрах или добавить аугментацию яркости", "Дело не в освещении — нужно менять архитектуру сети целиком"], "correct": 2, "explain": "Классический случай сдвига распределения из-за освещения; решение — расширить обучающие данные (реальные примеры или аугментация) под реальный диапазон условий эксплуатации.", "usage": {"code": true, "without": "# модель обучена на летних ярких снимках; зимой качество падает\n# 'ждём', что сеть сама справится с тусклым светом — не справляется", "with": "from torchvision import transforms\naug = transforms.ColorJitter(brightness=0.5, contrast=0.4)\n# + дообучение на реальных зимних кадрах под реальный диапазон света", "benefit": "Модель охватывает реальный диапазон условий эксплуатации."}}, {"q": "При обучении сегментационной модели для медицинских снимков IoU на тренировочных данных 0.95, но на новых пациентах — только 0.6. Какой вывод наиболее обоснован?", "options": ["IoU нельзя применять для медицинских изображений в принципе", "Это переобучение — нужны регуляризация и больше данных", "Надо срочно нарастить число слоёв сети, не трогая данные", "Модель работает отлично, а разрыв в IoU роли не играет"], "correct": 1, "explain": "Большой разрыв между качеством на обучении и на новых данных — классический признак переобучения; решение обычно требует работы с данными и регуляризацией, а не просто усложнения модели.", "usage": {"code": false, "without": "Разрыв IoU 0.95 на трейне и 0.6 на новых пациентах трактуют как 'модель отличная' или лечат добавлением слоёв — и переобучение только усугубляется.", "with": "Разрыв опознают как overfitting и лечат работой с данными: больше разнообразных снимков, регуляризация, кросс-валидация по пациентам.", "benefit": "Обобщение на новых пациентов, а не запоминание трейна."}}, {"q": "Инженер тестирует модель классификации и обнаруживает, что она с высокой уверенностью (99%) неверно классифицирует изображение с добавленным незаметным шумом. Как называется это явление и в чём его причина?", "options": ["Это рядовая случайная ошибка модели без названия и понятной причины", "Явление возникает лишь при использовании активации ReLU", "Adversarial example — направленное возмущение у границы решения", "Это значит, что все веса модели оказались равны нулю"], "correct": 2, "explain": "Adversarial examples целенаправленно конструируются так, чтобы минимально изменить пиксели, но резко сместить выход модели за счёт особенностей многомерной границы решения.", "usage": {"code": false, "without": "Уверенную ошибку на зашумлённой картинке списывают на случайный сбой без причины и не понимают, как её воспроизвести или защититься.", "with": "Явление опознают как adversarial example: направленное возмущение пикселей эксплуатирует особенности границы решения в пространстве признаков.", "benefit": "Понимание причины и путь к защите модели."}}, {"q": "Команда сравнивает две модели детекции: одна имеет высокий recall, но низкий precision, другая — наоборот. Для задачи скрининга редкого заболевания на медицинских снимках какая метрика важнее и почему?", "options": ["Precision всегда важнее recall в любой задаче без исключений", "Важнее recall: лучше лишняя тревога, чем пропуск больного", "Recall и precision вовсе не важны для медицинского скрининга", "Обе метрики абсолютно равнозначны в любом контексте всегда"], "correct": 1, "explain": "В скрининге заболеваний цена пропуска (ложноотрицательного результата) обычно выше цены ложной тревоги, поэтому высокий recall часто приоритетнее precision (хотя баланс зависит от контекста).", "usage": {"code": false, "without": "Гнаться за высоким precision в скрининге редкого заболевания — значит ради чистоты предсказаний пропускать реальные случаи (ложноотрицательные), а цена пропуска здесь высока.", "with": "Приоритет отдают recall: лучше выявить больше потенциальных случаев ценой части ложных тревог, чем упустить больного (баланс зависит от контекста).", "benefit": "Меньше пропущенных больных в скрининге."}}, {"q": "При развёртывании модели CV на мобильном устройстве обнаружена слишком высокая задержка (latency) из-за большого числа параметров. Какой подход наиболее уместен?", "options": ["Взять лёгкую архитектуру, квантование или дистилляцию модели", "Проблема решается лишь увеличением объёма обучающих данных", "Надо вовсе отказаться от нейросетей на мобильных устройствах", "Единственный выход — купить более мощное мобильное устройство"], "correct": 0, "explain": "Специализированные лёгкие архитектуры, квантование (снижение точности весов) и дистилляция знаний — стандартные техники для развёртывания CV-моделей в условиях ограниченных ресурсов.", "usage": {"code": true, "without": "import torch\n# гоним тяжёлую ResN50 на телефоне -> высокая задержка\nout = big_model(img)  # десятки млн параметров, тормозит", "with": "import torch\nm = torch.quantization.quantize_dynamic(model, dtype=torch.qint8)\n# + лёгкая архитектура (MobileNet) или дистилляция знаний", "benefit": "Быстрый инференс и малый размер на слабом устройстве."}}, {"q": "Модель детекции объектов показывает отличные результаты на статичных тестовых фото, но 'мигает' — то находит, то теряет объект на соседних кадрах видео. Какой подход поможет стабилизировать результат?", "options": ["Обучать модель строго на одиночных кадрах, полностью игнорируя видео", "Мигание предсказаний нельзя убрать техническими средствами", "Достаточно поднять разрешение каждого отдельного кадра видео", "Добавить трекинг объектов и сглаживание предсказаний по времени"], "correct": 3, "explain": "Покадровая независимая детекция игнорирует временную связность видео; трекинг или темпоральное сглаживание учитывают контекст соседних кадров, устраняя 'мигание'.", "usage": {"code": false, "without": "Обрабатывая каждый кадр видео полностью независимо, детектор игнорирует связь между соседними кадрами, поэтому объект 'мигает' — то находится, то теряется.", "with": "Добавляют временную согласованность: трекинг объектов между кадрами или сглаживание предсказаний по времени, используя контекст соседних кадров.", "benefit": "Стабильная детекция на видео без мигания."}}, {"q": "Специалист заметил, что модель сегментации отлично работает на изображениях высокого разрешения, использованных при обучении, но заметно хуже — на изображениях с камер низкого качества у конечных пользователей. Какой вывод и действие наиболее уместны?", "options": ["Разрешение картинки никак не влияет на качество сегментации", "Проблема решается лишь увеличением числа слоёв в модели", "Это сдвиг распределения — добавьте аугментацию шума и сжатия", "Надо обязать всех пользователей купить камеры высокого разрешения"], "correct": 2, "explain": "Несоответствие условий съёмки между обучением и продакшеном — классический источник деградации качества; аугментация, имитирующая реальные условия, помогает сократить этот разрыв.", "usage": {"code": false, "without": "Отличную работу на обучающих HD-снимках принимают за готовность к проду и не замечают, что у пользователей камеры дают шум, сжатие и низкое разрешение.", "with": "Опознают distribution shift по качеству и добавляют в обучение реалистичные примеры или аугментацию, имитирующую сжатие и шум дешёвых камер.", "benefit": "Сохранение качества на реальных камерах пользователей."}}, {"q": "При тестировании системы контроля качества на производстве обнаружено много ложных срабатываний (модель помечает годные детали как бракованные). Что стоит сделать в первую очередь, а не сразу менять архитектуру сети?", "options": ["Совсем отказаться от компьютерного зрения на этом производстве", "Ложные срабатывания всегда требуют уменьшить обучающую выборку", "Срочно нарастить число слоёв нейросети, не анализируя данные", "Проверить баланс классов, precision/recall и условия съёмки"], "correct": 3, "explain": "Диагностика перед изменением архитектуры — стандартный подход: часто проблема в данных (дисбаланс, условия съёмки), а не в самой модели, и её можно решить дешевле, чем переобучением с нуля.", "usage": {"code": false, "without": "Столкнувшись с потоком ложных срабатываний, сразу меняют архитектуру сети — дорого и часто мимо, ведь причина обычно в данных.", "with": "Сначала диагностируют: смотрят баланс классов и precision/recall на реальных данных, проверяют связь ложных срабатываний с освещением, ракурсом, новым типом детали.", "benefit": "Дешёвое устранение причины до переобучения с нуля."}}, {"q": "Команда планирует внедрить систему видеонаблюдения с распознаванием лиц в общественном месте. Помимо точности модели, что является критически важным нетехническим аспектом, который нужно учесть перед внедрением?", "options": ["Точность модели — единственный фактор, который стоит учитывать", "Этические вопросы вовсе не касаются инженерных CV-решений", "Правовые и этические аспекты — согласие на обработку биометрии", "Значение имеет только скорость обработки кадров в секунду"], "correct": 2, "explain": "Системы распознавания лиц регулируются законами о персональных данных (например, GDPR) и поднимают серьёзные этические вопросы (согласие, слежка, предвзятость по демографическим группам), которые нельзя игнорировать при внедрении.", "usage": {"code": false, "without": "Оценивать систему распознавания лиц только по точности модели — значит проигнорировать согласие на биометрию, законы о персональных данных и риски предвзятости, что грозит правовыми и репутационными последствиями.", "with": "До внедрения учитывают правовые и этические аспекты: согласие на обработку биометрии, соответствие законодательству (например, GDPR) и аудит предвзятости по группам.", "benefit": "Законное и этичное внедрение без правовых рисков."}}, {"q": "Изображение имеет размер 256×256 пикселей с 3 цветовыми каналами (RGB). Сколько всего числовых значений (пикселей × каналов) в этом изображении?", "options": ["768 — если взять только 256×3", "65536 — если взять только 256×256", "196608 — это 256×256×3 значения", "256 — это лишь одна сторона кадра"], "correct": 2, "explain": "256×256×3 = 196608.", "usage": {"code": true, "without": "# считают в уме 256*256*3 и ошибаются, путая с 256 или 768", "with": "import numpy as np\nimg = np.zeros((256, 256, 3), np.uint8)\nprint(img.size)  # 256*256*3 = 196608 значений", "benefit": "Точный объём данных прямо из массива, без ошибок счёта."}}, {"q": "К изображению 32×32 применяется свёрточный фильтр 3×3 с шагом (stride) 1 без паддинга. Какой размер выходной карты признаков?", "options": ["30×30 — по формуле (32−3)/1+1", "3×3 — совпадает с размером ядра", "29×29 — если забыть про +1", "32×32 — размер входа не меняется ('same')"], "correct": 0, "explain": "Формула: (N-F)/S+1 = (32-3)/1+1 = 30. Итоговый размер: 30×30.", "usage": {"code": true, "without": "# гадают размер выхода свёртки на глаз", "with": "N, F, S = 32, 3, 1  # вход, ядро, шаг, без паддинга\nout = (N - F)//S + 1  # (32-3)/1 + 1 = 30 -> 30x30\nprint(out)", "benefit": "Формула (N-F)/S+1 даёт точный размер карты признаков."}}, {"q": "Вход 64×64 проходит свёртку 3×3 с паддингом 1 и шагом 1, затем max pooling 2×2 с шагом 2. Какой размер на выходе? Считайте в два шага.", "options": ["64×64 — свёртка сохранила размер, но забыли применить pooling", "16×16 — если ошибочно поделить размер дважды на 2", "32×32 — свёртка сохраняет размер, pooling делит на 2", "31×31 — если у pooling забыть учесть шаг 2"], "correct": 2, "explain": "Шаг 1: свёртка 3×3 с паддингом 1, шаг 1 сохраняет размер — (64+2−3)/1+1 = 64. Шаг 2: pooling 2×2 с шагом 2 делит на 2 — 64/2 = 32. Итог 32×32.", "usage": {"code": true, "without": "# на глаз оценивают выход двух слоёв и путают порядок операций", "with": "N = (64 + 2*1 - 3)//1 + 1   # свёртка 'same' -> 64\nN = (N - 2)//2 + 1          # pooling /2 -> 32\nprint(N)  # 32x32", "benefit": "Пошаговый расчёт цепочки свёртка+pooling без угадывания."}}, {"q": "Свёрточный слой: 8 фильтров 3×3, вход 3 канала. Сколько обучаемых параметров с учётом смещения bias? Шаг 1 — веса, шаг 2 — плюс bias.", "options": ["224 — это 216 весов плюс 8 смещений", "216 — если забыть добавить смещения bias", "232 — если ошибочно прибавить bias дважды по 8", "27 — это лишь один фильтр размера 3×3×3"], "correct": 0, "explain": "Шаг 1: веса = фильтры × k × k × каналы = 8×3×3×3 = 216. Шаг 2: bias = по одному на фильтр = 8. Итог 216+8 = 224.", "usage": {"code": true, "without": "# считают только веса ядер, забывая про смещения bias", "with": "filters, k, in_ch = 8, 3, 3\nweights = filters * k*k * in_ch  # 216\nparams = weights + filters      # + bias -> 224\nprint(params)", "benefit": "Полный счёт параметров слоя вместе со смещениями."}}, {"q": "Рамки заданы координатами A=(0,0,2,2) и B=(1,1,3,3). Найдите IoU. Шаг 1 — площади пересечения и объединения, шаг 2 — их отношение.", "options": ["0.5 — если поделить пересечение на площадь одной рамки", "≈0.14 — это 1, делённое на объединение 7", "≈0.13 — если ошибочно взять объединение равным 8", "1.0 — если посчитать рамки полностью совпавшими"], "correct": 1, "explain": "Шаг 1: пересечение — окно x∈[1,2], y∈[1,2] = 1×1 = 1; площади рамок по 2×2 = 4, объединение = 4+4−1 = 7. Шаг 2: IoU = 1/7 ≈ 0.14.", "usage": {"code": true, "without": "# делят пересечение на площадь одной рамки, а не на объединение", "with": "inter = max(0, 2-1) * max(0, 2-1)   # 1\nunion = 4 + 4 - inter               # 7\nprint(inter/union)  # ~0.14", "benefit": "IoU из координат: пересечение над объединением, а не над рамкой."}}, {"q": "Три свёрточных слоя 3×3 подряд, шаг 1, без пулинга. Каково рецептивное поле нейрона верхнего слоя? Наращивайте по слоям.", "options": ["3×3 — если учесть только самый последний слой", "9×9 — если перемножить три ядра 3×3 между собой", "5×5 — если сложить лишь два слоя из трёх", "7×7 — три слоя дают 1→3→5→7"], "correct": 3, "explain": "Каждый слой 3×3 при шаге 1 расширяет рецептивное поле на 2. Наращиваем: 1 → 3 → 5 → 7. Итог 7×7.", "usage": {"code": true, "without": "# думают, что нейрон видит только окно размером с ядро (3x3)", "with": "rf = 1\nfor _ in range(3):     # три слоя 3x3, шаг 1\n    rf += (3 - 1)      # каждый добавляет 2\nprint(rf)  # 7 -> 7x7", "benefit": "Оценка реального обзора глубокого нейрона через стек слоёв."}}, {"q": "Карта 224×224 проходит три pooling-слоя, каждый уменьшает размер в 2 раза. Итоговый пространственный размер? Делите шаг за шагом.", "options": ["112×112 — если поделить размер только один раз", "28×28 — это 224, делённое на 2·2·2", "56×56 — если сделать лишь два деления из трёх", "8×8 — если ошибочно вычесть 3·2 из размера окна"], "correct": 1, "explain": "Каждый pooling делит размер на 2. Шаги: 224 → 112 → 56 → 28. Итог 28×28 (это 224 / 2^3).", "usage": {"code": true, "without": "# вычитают '3*2' вместо последовательного деления на 2", "with": "N = 224\nfor _ in range(3):  # три pooling'а /2\n    N //= 2\nprint(N)  # 28 -> 28x28", "benefit": "Точный размер после каскада pooling через деление на 2."}}, {"q": "Вход 100×100, свёртка 7×7 с шагом 2 и паддингом 3. Размер выхода? Применяйте формулу (N+2P−F)/S+1.", "options": ["47×47 — если совсем забыть про паддинг в формуле", "51×51 — если округлить деление вверх", "50×50 — это 99 делить на 2 вниз, плюс 1", "99×99 — если вовсе не делить на шаг 2"], "correct": 2, "explain": "Числитель: N+2P−F = 100+6−7 = 99. Делим на шаг: 99/2 = 49 (округление вниз). Плюс 1: 49+1 = 50. Итог 50×50.", "usage": {"code": true, "without": "# забывают паддинг или округляют деление на шаг вверх", "with": "N, F, P, S = 100, 7, 3, 2\nout = (N + 2*P - F)//S + 1  # (99)//2 + 1 = 50\nprint(out)  # 50x50", "benefit": "Размер выхода свёртки со шагом и паддингом по формуле."}}, {"q": "Модель детекции обучена на дневных снимках, а в проде ночью качество падает. Какая последовательность шагов подбора аугментаций верна?", "options": ["Определить сдвиг освещения → добавить jitter яркости → проверить ночью", "Сразу заменить архитектуру сети на трансформер → обучить с нуля → игнорировать причину", "Отражать кадры по горизонтали → перемешать классы местами → урезать датасет", "Поднять разрешение камеры → удалить ночные кадры → оставить только дневные"], "correct": 0, "explain": "Шаг 1: опознать причину — сдвиг распределения по освещению. Шаг 2: подобрать аугментацию под него — jitter яркости и контраста. Шаг 3: проверить на ночных кадрах, что разрыв сократился.", "usage": {"code": true, "without": "# наугад применяют случайные аугментации, не связанные с причиной сбоя", "with": "from torchvision import transforms\naug = transforms.ColorJitter(brightness=0.5, contrast=0.4)\n# затем валидация на реальных ночных кадрах", "benefit": "Аугментация нацелена на конкретный сдвиг, а не вслепую."}}, {"q": "Свёрточный слой: 32 фильтра 3×3, вход 16 каналов, с учётом bias. Сколько всего параметров? Шаг 1 — веса, шаг 2 — bias.", "options": ["4608 — если забыть добавить смещения bias", "288 — это лишь один фильтр 3×3×16 без числа фильтров", "4640 — это 4608 весов плюс 32 смещения", "4672 — если ошибочно прибавить bias дважды"], "correct": 2, "explain": "Шаг 1: веса = 32 × 3 × 3 × 16 = 4608. Шаг 2: bias = по одному на фильтр = 32. Итог 4608+32 = 4640.", "usage": {"code": true, "without": "# считают веса ядер, но опускают 32 смещения bias", "with": "filters, k, in_ch = 32, 3, 16\nweights = filters * k*k * in_ch  # 4608\nparams = weights + filters      # + bias -> 4640\nprint(params)", "benefit": "Полный счёт параметров слоя с входными каналами и bias."}}, {"q": "Пересечение рамок 30, объединение 50, порог совпадения IoU = 0.5. Как засчитать предсказание? Шаг 1 — IoU, шаг 2 — сравнить с порогом.", "options": ["IoU 0.6, но порог не важен — считаем ложным", "IoU 1.67, выше порога — верное срабатывание", "IoU 0.4, ниже порога 0.5 — считаем ложным срабатыванием", "IoU 0.6, выше порога 0.5 — верное срабатывание"], "correct": 3, "explain": "Шаг 1: IoU = пересечение/объединение = 30/50 = 0.6. Шаг 2: 0.6 ≥ порога 0.5, значит рамка совпала достаточно — предсказание засчитывается как верное (TP).", "usage": {"code": true, "without": "# засчитывают рамку по совпадению класса, не проверяя IoU против порога", "with": "iou = 30 / 50            # 0.6\nis_tp = iou >= 0.5       # True -> верное срабатывание\nprint(is_tp)", "benefit": "Решение TP/FP по IoU и порогу, а не по одному классу."}}, {"q": "Сегментация отлично работает на HD-снимках обучения, но плохо — на дешёвых камерах пользователей. Какая цепочка действий верна?", "options": ["Обязать пользователей купить HD-камеры → ничего не менять в самой модели", "Опознать сдвиг качества → добавить аугментацию шума и сжатия → дообучить", "Нарастить число слоёв сети → игнорировать разницу камер → переобучить с нуля целиком", "Удалить снимки низкого качества → обучать только на HD → сузить данные ещё сильнее"], "correct": 1, "explain": "Шаг 1: опознать причину — сдвиг распределения по качеству изображения. Шаг 2: подобрать аугментацию под него — шум и артефакты сжатия дешёвых камер. Шаг 3: дообучить модель на таких данных.", "usage": {"code": true, "without": "# считают провал случайным и лечат его добавлением слоёв сети", "with": "from torchvision import transforms\naug = transforms.Compose([\n    transforms.GaussianBlur(3),\n    transforms.RandomAdjustSharpness(0.5)])\n# имитируем шум и сжатие дешёвых камер, затем дообучение", "benefit": "Аугментация имитирует реальные камеры и закрывает сдвиг."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
