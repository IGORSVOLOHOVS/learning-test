<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Основы Computer Vision</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --accent: #5b8cff;
    --good: #2fbf71;
    --bad: #ef5350;
    --border: #2a2e3d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.45;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; }
  header { padding: 14px 0 10px; }
  h1 { font-size: 1.2rem; margin: 0 0 10px; }
  .progressbar { height: 8px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .25s; }
  .meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-top: 6px; }
  .block-label { display: inline-block; background: var(--card); border: 1px solid var(--border); color: var(--accent); font-size: .75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .question { font-size: 1.08rem; margin: 0 0 10px; white-space: pre-wrap; }
  .qsearch { margin: 0 0 14px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: #232838; color: var(--text);
    border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 1rem; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(0.995); }
  .opt.correct { border-color: var(--good); background: rgba(47,191,113,0.15); }
  .opt.wrong { border-color: var(--bad); background: rgba(239,83,80,0.15); }
  .opt.disabled { pointer-events: none; opacity: .85; }
  .opt.dim { opacity: .5; }
  .explain {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #171a24; border-left: 3px solid var(--accent);
    font-size: .92rem; color: #c7cadb; display: none;
  }
  .explain.show { display: block; }
  .usage { margin-top: 12px; display: none; flex-direction: column; gap: 10px; }
  .usage.show { display: flex; }
  .usage .u-part { padding: 10px 12px; border-radius: 10px; background: #171a24; border-left: 3px solid var(--border); }
  .usage .u-without { border-left-color: var(--bad); }
  .usage .u-with { border-left-color: var(--good); }
  .usage .u-label { font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; color: var(--muted); }
  .usage .u-without .u-label { color: var(--bad); }
  .usage .u-with .u-label { color: var(--good); }
  .usage .u-text { font-size: .9rem; color: #c7cadb; white-space: pre-wrap; }
  .usage pre { margin: 0; padding: 8px 10px; border-radius: 8px; background: #0f1117; overflow-x: auto; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .84rem; line-height: 1.45; color: #d7dbe8; }
  .usage .u-benefit { padding: 9px 12px; border-radius: 10px; background: rgba(47,191,113,0.14); font-size: .9rem; color: var(--text); }
  .nav { display: flex; gap: 10px; margin-top: 18px; }
  button.btn {
    flex: 1; padding: 14px; font-size: 1rem; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button.btn.secondary { background: #232838; color: var(--text); border: 1px solid var(--border); }
  button.btn:disabled { opacity: .4; pointer-events: none; }
  .topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .iconbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 8px 12px; font-size: .85rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .result { text-align: center; padding: 20px 0; }
  .result .score { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .blockscores { margin-top: 20px; text-align: left; }
  .blockscores .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .92rem; }
  a.back { color: var(--muted); text-decoration: none; font-size: .85rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 100; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 380px; width: 100%; }
  .modal h3 { margin-top: 0; }
  .modal .btn { margin-top: 10px; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9; --card: #ffffff; --text: #1b1d27; --muted: #6b6f80;
      --border: #e3e5ee;
    }
    .opt { background: #f7f8fc; }
    .explain { background: #f0f2fa; color: #3a3d4d; }
    .usage .u-part { background: #f0f2fa; }
    .usage .u-text { color: #3a3d4d; }
    .usage pre { background: #eceef7; color: #23262f; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="../index.html">&larr; Все тесты</a>
      <div style="display:flex; gap:8px;">
        <a class="iconbtn" href="../sims/computer_vision.html">🔬 Лаборатория</a>
        <button class="iconbtn" id="syncBtn">☁️ Синхронизировать</button>
      </div>
    </div>
    <h1>Основы Computer Vision</h1>
    <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
    <div class="meta">
      <span id="blockLabel"></span>
      <span id="progressText">0 / 50</span>
    </div>
  </header>

  <div id="quizArea"></div>

  <div id="resultArea" style="display:none"></div>

  <div style="margin-top:24px; text-align:center;">
    <button class="btn secondary" id="resetBtn">Сбросить прогресс и начать заново</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>Синхронизация всех тестов с Google Drive</h3>
    <p id="syncStatus" style="color:var(--muted); font-size:.9rem;">Один вход — синхронизируются сразу все тесты.</p>
    <button class="btn" id="syncUploadBtn">⬆️ Отправить весь прогресс в Drive</button>
    <button class="btn secondary" id="syncDownloadBtn">⬇️ Загрузить весь прогресс из Drive</button>
    <button class="btn secondary" id="syncCloseBtn">Закрыть</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="../sync.js"></script>
<script>
(function () {
  const TEST_ID = "computer_vision";
  const QUESTIONS = [{"q": "Что такое пиксель в контексте цифрового изображения?", "options": ["Тип файлового формата изображения", "Наименьший элемент изображения, хранящий значение цвета/яркости", "Единица измерения разрешения экрана", "Алгоритм сжатия изображений"], "correct": 1, "explain": "Пиксель (picture element) — базовая единица растрового изображения, содержащая числовое значение цвета или интенсивности.", "usage": {"code": true, "without": "# изображение как абстрактный 'объект' — нельзя обратиться к точке\n# приходится вручную парсить байты файла, не зная где какой пиксель", "with": "import numpy as np\nimg = np.zeros((480, 640, 3), np.uint8)  # H x W x каналы\nimg[100, 200] = [255, 0, 0]  # пиксель (y=100,x=200) стал красным\nprint(img[100, 200])  # значение цвета конкретного пикселя", "benefit": "Прямой доступ к любой точке как к числу в массиве."}}, {"q": "Что такое свёрточный слой (convolutional layer) в нейросети?", "options": ["Слой, который применяет полносвязное умножение матриц", "Слой, уменьшающий количество классов на выходе", "Слой, применяющий скользящий фильтр (ядро) к изображению для извлечения локальных признаков", "Слой, преобразующий изображение в текст"], "correct": 2, "explain": "Свёрточный слой применяет обучаемые фильтры (ядра), скользящие по изображению, извлекая локальные паттерны — края, текстуры и т.д.", "usage": {"code": true, "without": "import torch.nn as nn\n# разворачиваем картинку в вектор и гоним через Linear\nnn.Linear(3*224*224, 1000)  # ~150M весов, пространство разрушено", "with": "import torch.nn as nn\nnn.Conv2d(3, 64, kernel_size=3, padding=1)  # 1792 веса\n# фильтр скользит по изображению, ловит локальные края/текстуры", "benefit": "В тысячи раз меньше параметров и сохранённая структура."}}, {"q": "Что такое ядро (kernel) свёртки?", "options": ["Небольшая матрица весов, используемая для скользящего преобразования изображения", "Слой нормализации", "Название функции активации", "Итоговый класс, предсказанный моделью"], "correct": 0, "explain": "Ядро — обучаемая матрица малого размера (например, 3×3), которая скользит по изображению, вычисляя взвешенную сумму соседних пикселей.", "usage": {"code": true, "without": "# 'размытие' пишут руками с магическими числами\nfor y in range(h):\n  for x in range(w):\n    out[y,x] = (img[y-1,x]+img[y+1,x]+img[y,x-1]+img[y,x+1])/4", "with": "import cv2, numpy as np\nkernel = np.ones((3,3), np.float32)/9  # ядро-матрица весов\nout = cv2.filter2D(img, -1, kernel)  # скользящая свёртка", "benefit": "Любой фильтр — одна матрица весов вместо ручных циклов."}}, {"q": "Для чего используется pooling-слой (например, max pooling)?", "options": ["Для увеличения разрешения изображения", "Для добавления цвета в чёрно-белое изображение", "Для перевода изображения в текстовое описание", "Для уменьшения пространственной размерности карты признаков, сохраняя важную информацию"], "correct": 3, "explain": "Pooling (обычно max или average) уменьшает размер карты признаков, снижая вычислительную нагрузку и добавляя устойчивость к небольшим сдвигам.", "usage": {"code": true, "without": "import torch.nn as nn\n# тащим полное разрешение 224x224 через всю сеть\n# дорого по памяти и чувствительно к сдвигу на 1 пиксель", "with": "import torch.nn as nn\npool = nn.MaxPool2d(2)  # 224x224 -> 112x112\n# берём максимум в окне: меньше данных, устойчивость к сдвигам", "benefit": "Вдвое меньше карта признаков и инвариантность к малым сдвигам."}}, {"q": "Что такое функция активации ReLU?", "options": ["f(x) = x²", "f(x) = max(0, x)", "f(x) = sin(x)", "f(x) = 1/(1+e^-x)"], "correct": 1, "explain": "ReLU (Rectified Linear Unit) обнуляет отрицательные значения и оставляет положительные без изменений: f(x)=max(0,x).", "usage": {"code": true, "without": "import numpy as np\n# sigmoid: на глубоких слоях градиент затухает -> обучение стоит\ny = 1/(1+np.exp(-x))", "with": "import numpy as np\ny = np.maximum(0, x)  # ReLU: f(x)=max(0,x)\n# положительные проходят как есть, градиент не затухает", "benefit": "Простая нелинейность без затухания градиента."}}, {"q": "Что такое сегментация изображения?", "options": ["Поворот изображения на заданный угол", "Определение класса всего изображения целиком", "Разбиение изображения на смысловые области с присвоением класса каждому пикселю", "Изменение размера изображения"], "correct": 2, "explain": "Сегментация присваивает метку класса каждому пикселю изображения, в отличие от классификации, которая даёт один класс на всё изображение.", "usage": {"code": true, "without": "# классифицируем всё изображение одним ярлыком\nlabel = model(img).argmax()  # 'кошка' — но ГДЕ она, неизвестно", "with": "import torch\nlogits = seg_model(img)          # (классы, H, W)\nmask = logits.argmax(dim=0)      # класс для КАЖДОГО пикселя\n# mask[y,x] = номер класса в этой точке", "benefit": "Понимание сцены на уровне пикселей, а не всей картинки."}}, {"q": "Чем детекция объектов (object detection) отличается от классификации изображений?", "options": ["Это одно и то же", "Детекция не использует нейросети", "Детекция находит и локализует несколько объектов с их положением (bounding box), классификация даёт один класс для всего изображения", "Детекция работает только с видео, а классификация — с фото"], "correct": 2, "explain": "Object detection одновременно решает две задачи: определяет, какие объекты есть на изображении, и указывает их местоположение (например, рамкой).", "usage": {"code": false, "without": "Классификация отвечает только 'что на картинке' — один класс на всё изображение, без координат. Если объектов несколько или важно их положение, такой ответ бесполезен.", "with": "Детекция находит несколько объектов сразу и возвращает для каждого класс и bounding box с координатами. Мы узнаём и что это, и где именно оно расположено.", "benefit": "Локализация нескольких объектов, а не один общий ярлык."}}, {"q": "Что такое аугментация данных (data augmentation) в компьютерном зрении?", "options": ["Искусственное увеличение обучающей выборки за счёт трансформаций изображений (поворот, отражение, обрезка и т.д.)", "Метод сжатия изображений без потерь", "Алгоритм для распознавания лиц", "Удаление части обучающих данных для ускорения обучения"], "correct": 0, "explain": "Аугментация создаёт новые вариации существующих изображений (повороты, масштабирование, изменение яркости), улучшая обобщающую способность модели.", "usage": {"code": true, "without": "# обучаем на исходных N картинках 'как есть'\n# сеть запоминает ракурсы и переобучается", "with": "from torchvision import transforms\naug = transforms.Compose([\n  transforms.RandomHorizontalFlip(),\n  transforms.RandomRotation(15),\n  transforms.ColorJitter(0.2, 0.2)])  # новые вариации из тех же данных", "benefit": "Больше разнообразия без сбора новых данных, лучше обобщение."}}, {"q": "Что такое карта признаков (feature map) в свёрточной сети?", "options": ["Визуализация весов последнего слоя", "Выходной результат применения фильтра свёртки к входному изображению или предыдущему слою", "Список всех классов датасета", "Итоговый результат классификации"], "correct": 1, "explain": "Feature map — результат применения одного свёрточного фильтра, показывающий, где на изображении обнаружен соответствующий паттерн.", "usage": {"code": true, "without": "# смотрим только на итоговый класс, не понимая ЧТО увидел фильтр\npred = model(img).argmax()", "with": "import torch.nn as nn\nconv = nn.Conv2d(3, 16, 3, padding=1)\nfmap = conv(img)   # (16, H, W) — 16 карт признаков\n# fmap[k] показывает, где сработал фильтр k (например, край)", "benefit": "Видно, где на изображении обнаружен каждый паттерн."}}, {"q": "Что означает термин 'предобученная модель' (pretrained model) в CV?", "options": ["Модель без весов", "Модель, которая никогда не обучалась", "Модель, обученная на одном большом датасете (например, ImageNet), которую затем можно дообучить или использовать для других задач", "Модель, работающая только с текстом"], "correct": 2, "explain": "Предобученные модели (например, ResNet на ImageNet) содержат уже выученные общие визуальные признаки, что ускоряет и улучшает решение новых задач (transfer learning).", "usage": {"code": true, "without": "import torch.nn as nn\nmodel = resnet50()  # случайные веса\n# нужны сотни тысяч размеченных примеров, чтобы выучить края с нуля", "with": "from torchvision.models import resnet50, ResNet50_Weights\nmodel = resnet50(weights=ResNet50_Weights.IMAGENET1K_V2)\n# общие признаки уже выучены, дообучаем под свою задачу", "benefit": "Меньше данных и времени за счёт переноса знаний."}}, {"q": "Почему свёрточные сети используют разделяемые (shared) веса фильтра по всему изображению, а не отдельный набор весов для каждой позиции?", "options": ["Это резко уменьшает число параметров и придаёт модели свойство трансляционной инвариантности — паттерн распознаётся независимо от его положения на изображении", "Разделяемые веса делают модель менее точной, но более быстрой", "Полносвязные веса всегда лучше для изображений", "Разделение весов используется только в устаревших архитектурах"], "correct": 0, "explain": "Один и тот же фильтр применяется по всему изображению, поэтому объект узнаётся независимо от того, где он расположен (трансляционная инвариантность), и параметров нужно значительно меньше.", "usage": {"code": false, "without": "Если для каждой позиции изображения завести свой набор весов, число параметров взрывается, а объект, сдвинутый на пару пикселей, придётся 'переучивать' заново — модель не узнает его в новом месте.", "with": "Один фильтр с общими весами скользит по всему изображению, поэтому паттерн распознаётся независимо от положения (трансляционная инвариантность), а параметров нужно в разы меньше.", "benefit": "Меньше параметров и узнавание объекта в любой точке кадра."}}, {"q": "Зачем в глубоких свёрточных сетях увеличивают число каналов (глубину карты признаков) при уменьшении пространственного разрешения по мере углубления сети?", "options": ["Число каналов не связано с уровнем абстракции признаков", "Пространственное разрешение должно расти вместе с глубиной", "Увеличение каналов делает сеть медленнее без пользы", "Ранние слои извлекают простые локальные признаки (края, текстуры) в высоком разрешении, а поздние — всё более абстрактные и составные признаки, для которых нужно больше каналов, но меньше пространственных деталей"], "correct": 3, "explain": "Классический паттерн архитектур (VGG, ResNet): по мере углубления сети пространственные размеры уменьшаются, а число каналов растёт, отражая переход от локальных к абстрактным признакам.", "usage": {"code": false, "without": "Если держать разрешение большим и мало каналов на всей глубине, сеть не сможет собрать абстрактные составные признаки и будет впустую тратить память на пространственные детали.", "with": "По мере углубления пространственный размер уменьшают, а число каналов растят: ранние слои ловят края/текстуры в высоком разрешении, поздние — абстрактные признаки, для которых нужно больше каналов, но меньше деталей.", "benefit": "Эффективный переход от локальных признаков к абстрактным."}}, {"q": "В чём архитектурная идея skip-connections (пропускных соединений), например, в ResNet?", "options": ["Skip-connections нужны только для генеративных моделей", "Они позволяют сигналу (и градиенту) 'обходить' один или несколько слоёв, складываясь с выходом позже, что облегчает обучение очень глубоких сетей и борется с затуханием градиента", "Skip-connections полностью заменяют свёрточные слои", "Они используются только для уменьшения размера изображения"], "correct": 1, "explain": "Residual connections (x + F(x)) дают более прямой путь для градиента при обратном распространении, что решает проблему деградации при увеличении глубины сети.", "usage": {"code": true, "without": "import torch.nn as nn\n# просто складываем много слоёв подряд\nout = block3(block2(block1(x)))  # градиент затухает, глубокая сеть деградирует", "with": "# residual: даём сигналу обходной путь\nout = x + F(x)  # F — пара свёрток\n# градиент течёт напрямую через '+ x'", "benefit": "Обучаются очень глубокие сети без затухания градиента."}}, {"q": "Почему архитектуры с механизмом внимания (attention), такие как Vision Transformer (ViT), рассматривают изображение как последовательность патчей, а не применяют классическую свёртку?", "options": ["Attention позволяет каждому патчу 'смотреть' на все остальные патчи изображения напрямую, захватывая глобальные зависимости, тогда как свёртка ограничена локальным рецептивным полем без явного расширения контекста", "Внимание полностью исключает необходимость в обучении", "ViT не может обрабатывать изображения крупнее 32×32", "Attention работает только с текстовыми данными"], "correct": 0, "explain": "В отличие от свёртки с ограниченным локальным полем зрения, self-attention вычисляет взаимодействие между всеми парами патчей сразу, естественно захватывая дальние (глобальные) зависимости.", "usage": {"code": false, "without": "Классическая свёртка видит только локальное окно (рецептивное поле), и чтобы связать далёкие части изображения, нужно много слоёв — дальний контекст улавливается косвенно и слабо.", "with": "ViT режет изображение на патчи-последовательность, и self-attention позволяет каждому патчу напрямую 'смотреть' на все остальные, сразу захватывая глобальные зависимости.", "benefit": "Прямой учёт дальних связей между частями изображения."}}, {"q": "Почему батч-нормализация (Batch Normalization) ускоряет обучение сверточных сетей?", "options": ["Батч-нормализация полностью заменяет функции активации", "Она применяется только на этапе тестирования", "Она нормализует распределение активаций внутри мини-батча, уменьшая внутренний сдвиг распределений (internal covariate shift) между слоями и стабилизируя градиенты", "Она уменьшает количество слоёв в сети"], "correct": 2, "explain": "Нормализация активаций к нулевому среднему и единичной дисперсии внутри батча снижает чувствительность обучения к масштабу весов и позволяет использовать более высокий learning rate.", "usage": {"code": true, "without": "import torch.nn as nn\n# без нормализации распределения активаций 'плывут' между слоями\n# приходится брать маленький learning rate, обучение медленное", "with": "import torch.nn as nn\nnet = nn.Sequential(nn.Conv2d(3,64,3), nn.BatchNorm2d(64), nn.ReLU())\n# активации нормализованы -> стабильные градиенты, больший lr", "benefit": "Стабильнее и быстрее обучение, можно выше learning rate."}}, {"q": "В чём разница между семантической сегментацией и instance-сегментацией?", "options": ["Это одно и то же", "Семантическая сегментация присваивает класс каждому пикселю без различения отдельных объектов одного класса, а instance-сегментация дополнительно разделяет отдельные экземпляры объектов", "Семантическая сегментация работает только с одним классом за раз", "Instance-сегментация не использует нейросети"], "correct": 1, "explain": "Например, при семантической сегментации все пиксели 'человек' получают одну метку класса, а instance-сегментация различит 'человек 1' и 'человек 2' как отдельные объекты.", "usage": {"code": false, "without": "Семантическая сегментация красит все пиксели класса 'человек' одной меткой — два стоящих рядом человека сливаются в одно пятно, их не пересчитать и не разделить.", "with": "Instance-сегментация помимо класса различает отдельные экземпляры: 'человек 1' и 'человек 2' получают разные маски, даже если это один класс.", "benefit": "Различение отдельных объектов одного класса."}}, {"q": "Почему рецептивное поле (receptive field) нейрона в глубоком слое свёрточной сети намного больше, чем размер фильтра в этом слое?", "options": ["Оно определяется только размером входного изображения", "Рецептивное поле уменьшается с глубиной сети", "Рецептивное поле всегда равно размеру фильтра текущего слоя", "Рецептивное поле накапливается через все предыдущие слои — каждый следующий слой 'видит' уже обработанную информацию из более широкой области исходного изображения"], "correct": 3, "explain": "Эффективное рецептивное поле растёт с каждым слоем, так как нейрон более глубокого слоя агрегирует информацию через несколько предыдущих сверточных и pooling операций.", "usage": {"code": false, "without": "Если считать, что нейрон 'видит' только окно размером с фильтр текущего слоя, непонятно, как глубокая сеть распознаёт крупные объекты — по такой логике это невозможно.", "with": "Рецептивное поле накапливается через все предыдущие слои: нейрон глубокого слоя агрегирует информацию из широкой области исходного изображения, поэтому эффективно 'видит' куда больше размера своего фильтра.", "benefit": "Понимание, как глубокие слои охватывают крупные структуры."}}, {"q": "Зачем используется метрика IoU (Intersection over Union) при оценке качества детекции объектов?", "options": ["Она измеряет, насколько предсказанная рамка (bounding box) перекрывается с истинной, давая количественную оценку точности локализации объекта", "IoU измеряет только точность классификации без учёта расположения объекта", "IoU применяется исключительно для сегментации, а не детекции", "IoU не связана с областью перекрытия рамок"], "correct": 0, "explain": "IoU = площадь пересечения / площадь объединения двух рамок; чем ближе к 1, тем точнее предсказанная рамка совпадает с истинной.", "usage": {"code": true, "without": "# оцениваем детекцию только по совпадению класса\n# рамка может быть смещена/огромна, а 'угадал класс' = зачёт", "with": "def iou(a, b):  # a,b = (x1,y1,x2,y2)\n  ix1,iy1 = max(a[0],b[0]), max(a[1],b[1])\n  ix2,iy2 = min(a[2],b[2]), min(a[3],b[3])\n  inter = max(0,ix2-ix1)*max(0,iy2-iy1)\n  ua = (a[2]-a[0])*(a[3]-a[1]) + (b[2]-b[0])*(b[3]-b[1]) - inter\n  return inter/ua  # 0..1: насколько точно совпали рамки", "benefit": "Числовая оценка точности локализации, а не только класса."}}, {"q": "Почему модели компьютерного зрения могут быть уязвимы к состязательным атакам (adversarial examples) — почти незаметным для человека изменениям пикселей, полностью меняющим предсказание?", "options": ["Модели CV полностью защищены от таких атак по своей природе", "Adversarial examples работают только с чёрно-белыми изображениями", "Нейросети обучаются находить статистические закономерности в пространстве высокой размерности, и небольшие целенаправленные возмущения могут пересечь границу решения модели, даже не будучи заметны человеческому глазу", "Состязательные атаки возможны только для устаревших моделей"], "correct": 2, "explain": "Граница решения нейросети в многомерном пространстве признаков может проходить очень близко к обучающим примерам, и малые направленные шумы способны 'перепрыгнуть' эту границу.", "usage": {"code": false, "without": "Кажется, что раз модель точна на тесте, её нельзя обмануть — но это иллюзия: обычная оценка не проверяет устойчивость к специально подобранным возмущениям.", "with": "Нейросеть ищет закономерности в пространстве высокой размерности, и её граница решения проходит близко к примерам; малый направленный шум, незаметный человеку, 'перепрыгивает' границу и меняет предсказание.", "benefit": "Понимание, почему модель уязвима к незаметным атакам."}}, {"q": "Почему в архитектурах encoder-decoder (например, U-Net для сегментации) используют skip-connections между соответствующими слоями энкодера и декодера?", "options": ["Они передают детальную пространственную информацию, потерянную при сжатии (downsampling) в энкодере, напрямую в декодер, улучшая точность восстановления границ объектов", "Skip-connections в U-Net нужны только для ускорения обучения, а не для качества", "U-Net не использует skip-connections по определению", "Они полностью заменяют декодер"], "correct": 0, "explain": "U-Net соединяет слои энкодера и декодера одинакового пространственного разрешения, компенсируя потерю мелких деталей при последовательном сжатии изображения.", "usage": {"code": true, "without": "# декодер восстанавливает маску только из сжатого 'бутылочного горлышка'\nout = decoder(bottleneck)  # границы объектов размыты, детали потеряны", "with": "import torch\n# прокидываем детали с уровней энкодера напрямую в декодер\nx = torch.cat([upsampled, enc_feat], dim=1)  # skip-connection\nout = conv(x)  # чёткие границы", "benefit": "Возврат мелких деталей, потерянных при сжатии — точные границы."}}, {"q": "Почему предобученные на ImageNet сети (transfer learning) часто дают хороший старт даже для узкоспециализированных задач, например, распознавания дефектов на производстве?", "options": ["Ранние слои таких сетей уже выучили универсальные низкоуровневые признаки (края, текстуры, градиенты), полезные почти для любой визуальной задачи, что экономит данные и время обучения", "Ранние слои сети не содержат полезной информации", "Предобученные сети всегда идеально подходят без дообучения для любой задачи", "Transfer learning работает только если новые данные идентичны ImageNet"], "correct": 0, "explain": "Общие низкоуровневые визуальные признаки переносимы между доменами, поэтому дообучение (fine-tuning) верхних слоёв на специфичных данных требует значительно меньше размеченных примеров.", "usage": {"code": true, "without": "import torch.nn as nn\nmodel = resnet18()  # с нуля\n# на маленьком датасете дефектов сеть переобучается и не сходится", "with": "from torchvision.models import resnet18, ResNet18_Weights\nmodel = resnet18(weights=ResNet18_Weights.DEFAULT)\nfor p in model.layer1.parameters(): p.requires_grad = False  # заморозили базовые признаки\n# дообучаем только верхние слои под дефекты", "benefit": "Универсальные низкоуровневые признаки экономят данные и время."}}, {"q": "Как архитектурное решение 'дилатированных свёрток' (dilated/atrous convolutions) помогает увеличить рецептивное поле без увеличения числа параметров или уменьшения разрешения?", "options": ["Дилатация уменьшает рецептивное поле для более точной локализации", "Дилатированные свёртки уменьшают число каналов сети", "Фильтр применяется с 'пропусками' между элементами ядра, расширяя охватываемую область изображения при том же числе весов", "Это просто синоним обычной свёртки без изменений"], "correct": 2, "explain": "Дилатация вводит промежутки между элементами ядра, эффективно увеличивая охватываемую область без роста параметров — полезно, например, в сегментации, где важно сохранить разрешение.", "usage": {"code": true, "without": "import torch.nn as nn\n# чтобы расширить обзор — либо большое ядро (много весов),\n# либо ещё pooling (теряем разрешение)\nnn.Conv2d(64, 64, kernel_size=7)  # 49 весов на канал", "with": "import torch.nn as nn\nnn.Conv2d(64, 64, kernel_size=3, dilation=2)  # 9 весов,\n# но с 'пропусками' охват как у 5x5, разрешение сохранено", "benefit": "Больше рецептивное поле без роста параметров и потери деталей."}}, {"q": "Почему в задачах с несбалансированными классами (например, редкий дефект на изображении) обычная точность (accuracy) — плохая метрика для оценки модели детекции?", "options": ["Precision и recall не применимы к задачам компьютерного зрения", "Модель может достичь высокой точности, просто предсказывая 'нет дефекта' почти всегда, полностью игнорируя редкий, но важный класс — нужны метрики вроде precision/recall или F1", "Несбалансированные классы не влияют на выбор метрики", "Accuracy всегда одинаково хорошо работает независимо от баланса классов"], "correct": 1, "explain": "При сильном дисбалансе (например, 99% 'нормальных' изображений) модель, всегда предсказывающая мажоритарный класс, получит высокую accuracy, но будет бесполезна для обнаружения редкого класса.", "usage": {"code": true, "without": "# 99% кадров без дефекта; модель всегда говорит 'нет дефекта'\nacc = (pred == y).mean()  # 0.99 — но дефекты не находятся вообще!", "with": "from sklearn.metrics import precision_score, recall_score, f1_score\nprint(recall_score(y, pred), precision_score(y, pred), f1_score(y, pred))\n# recall сразу покажет, что редкий класс пропущен", "benefit": "Метрики видят пропуск редкого важного класса, а accuracy — нет."}}, {"q": "Почему в некоторых задачах CV (например, автономное вождение) используют ансамбль из нескольких моделей или сенсоров (камера + LIDAR), а не полагаются на одну модель компьютерного зрения?", "options": ["LIDAR и камера дают идентичную информацию, поэтому комбинация избыточна", "Одна хорошая модель CV гарантированно устраняет любые ошибки", "Разные источники данных и модели имеют разные слабые места и типы ошибок, и их комбинация повышает надёжность и устойчивость системы к отдельным сбоям", "Ансамбли всегда работают медленнее и не дают преимуществ"], "correct": 2, "explain": "Мультимодальные системы (sensor fusion) компенсируют слабости отдельных сенсоров (например, камера плохо работает в темноте, LIDAR — при дожде), повышая общую надёжность.", "usage": {"code": false, "without": "Одна камера или одна модель имеет слепые зоны: камера плохо видит в темноте, отдельная модель делает систематические ошибки — при сбое источника система остаётся без страховки.", "with": "Ансамбль моделей и разные сенсоры (камера + LIDAR) имеют разные слабые места, и их объединение (sensor fusion) компенсирует отказ одного источника другим.", "benefit": "Надёжность и устойчивость к отказу отдельного сенсора/модели."}}, {"q": "Как выбор функции потерь (например, focal loss вместо обычной кросс-энтропии) помогает в детекции объектов при сильном дисбалансе между фоном и объектами?", "options": ["Focal loss используется только для задач сегментации", "Focal loss идентична обычной кросс-энтропии по своему эффекту", "Выбор функции потерь не влияет на дисбаланс классов", "Focal loss уменьшает вклад легко классифицируемых примеров (в основном фон) в общий градиент, фокусируя обучение на сложных и редких примерах (объектах)"], "correct": 3, "explain": "В детекции объектов подавляющее большинство регионов изображения — фон; focal loss явно понижает вес хорошо классифицированных (обычно фоновых) примеров, концентрируя обучение на трудных случаях.", "usage": {"code": false, "without": "Обычная кросс-энтропия одинаково учитывает все примеры; в детекции подавляющее большинство регионов — лёгкий фон, и он затапливает градиент, а редкие объекты почти не влияют на обучение.", "with": "Focal loss домножает потерю на (1-p)^γ, понижая вклад легко классифицированных фоновых примеров и фокусируя обучение на трудных и редких объектах.", "benefit": "Обучение концентрируется на объектах, а не на фоне."}}, {"q": "Почему архитектуры детекции 'anchor-based' (например, Faster R-CNN) предопределяют набор рамок-якорей разных размеров и пропорций перед предсказанием?", "options": ["Якоря дают модели заранее заданные ориентиры формы и масштаба, относительно которых она предсказывает лишь небольшие корректировки, что упрощает и стабилизирует обучение локализации объектов разных размеров", "Число якорей всегда равно числу объектов на изображении", "Anchor-based модели не используют регрессию координат", "Якоря нужны только для визуализации результатов, не влияя на обучение"], "correct": 0, "explain": "Предопределённые якоря разных масштабов/пропорций служат базовыми гипотезами, относительно которых сеть регрессирует смещения — это упрощает задачу по сравнению с предсказанием координат с нуля.", "usage": {"code": false, "without": "Предсказывать абсолютные координаты рамки с нуля тяжело: масштабы и пропорции объектов сильно разные, и регрессия нестабильна.", "with": "Anchor-based модель заранее задаёт якоря разных размеров и пропорций, а сеть предсказывает лишь небольшие смещения относительно них — задача локализации упрощается и стабилизируется.", "benefit": "Стабильная локализация объектов разного масштаба."}}, {"q": "Почему аугментация данных должна учитывать специфику задачи — например, горизонтальное отражение уместно для классификации животных, но может быть неуместно для распознавания дорожных знаков?", "options": ["Аугментация никогда не влияет на семантику объекта", "Любая аугментация всегда одинаково полезна для любой задачи", "Горизонтальное отражение всегда запрещено в компьютерном зрении", "Некоторые трансформации могут изменить семантический смысл объекта (отражённый дорожный знак с текстом становится нечитаемым или неправильным), что вводит модель в заблуждение"], "correct": 3, "explain": "Аугментации должны сохранять валидность метки: отражение текста на знаке или зеркальное превращение 'левого' в 'правое' может создать физически некорректные или противоречивые обучающие примеры.", "usage": {"code": false, "without": "Слепое применение любой аугментации может испортить метку: зеркально отражённый дорожный знак с текстом становится нечитаемым или означает другое, и модель учится на неверных примерах.", "with": "Аугментацию подбирают под задачу — для животных горизонтальное отражение безопасно, для знаков его исключают или заменяют трансформациями, сохраняющими смысл.", "benefit": "Расширение данных без порчи семантики и меток."}}, {"q": "Почему точность модели на тестовом наборе может резко упасть при применении в реальных условиях (например, другое освещение, ракурс камеры), даже если модель показала отличные результаты на валидации?", "options": ["Валидационная точность всегда точно предсказывает поведение в реальных условиях", "Это классическая проблема сдвига распределения (distribution shift) — условия съёмки в продакшене отличаются от условий, представленных в обучающих/тестовых данных", "Это невозможно, если модель правильно обучена", "Проблема возникает только из-за недостаточного количества слоёв в сети"], "correct": 1, "explain": "Модель обучается находить закономерности, специфичные для распределения обучающих данных; изменение условий (освещение, ракурс, сенсор) может нарушить это соответствие в реальном применении.", "usage": {"code": false, "without": "Полагаясь на высокую валидационную точность, ждут такого же качества в проде — но модель выучила закономерности своего распределения данных.", "with": "Понимая distribution shift, заранее учитывают, что реальные освещение, ракурс и сенсор отличаются от обучающих, и готовят данные/мониторинг под реальные условия.", "benefit": "Реалистичные ожидания и меньше сюрпризов в продакшене."}}, {"q": "Компания разрабатывает систему распознавания лиц и обнаруживает, что точность значительно ниже для некоторых демографических групп. Какая наиболее вероятная и ответственная причина/действие?", "options": ["Точность должна быть одинаковой независимо от состава обучающих данных", "Обучающий датасет, вероятно, недостаточно репрезентативен для этих групп — нужно собрать более сбалансированные данные и провести отдельную оценку по подгруппам", "Это неизбежное свойство любых систем распознавания лиц, которое нельзя исправить", "Проблема не имеет отношения к данным, только к архитектуре сети"], "correct": 1, "explain": "Смещение (bias) в обучающих данных — частая причина неравномерной точности по демографическим группам; ответственный подход включает аудит данных и метрик по подгруппам.", "usage": {"code": false, "without": "Считать, что точность обязана быть равной для всех групп 'по умолчанию', и не проверять состав данных — значит не заметить систематический провал по недопредставленной группе.", "with": "Ответственный подход: признать вероятную непредставительность датасета, собрать сбалансированные данные и оценивать метрики отдельно по подгруппам.", "benefit": "Выявление и устранение перекоса точности по демографии."}}, {"q": "Компания использует модель детекции дефектов на конвейере, обученную летом при ярком освещении. Зимой (более тусклое освещение) качество резко упало. Какое решение наиболее уместно?", "options": ["Нужно просто увеличить разрешение камеры", "Модель должна работать одинаково независимо от условий освещения без вмешательства", "Дообучить модель на данных с зимним освещением или добавить аугментацию по яркости/контрасту, отражающую реальные условия эксплуатации", "Проблема не связана с освещением, нужно поменять архитектуру сети"], "correct": 2, "explain": "Классический случай сдвига распределения из-за освещения; решение — расширить обучающие данные (реальные примеры или аугментация) под реальный диапазон условий эксплуатации.", "usage": {"code": true, "without": "# модель обучена на летних ярких снимках; зимой качество падает\n# 'ждём', что сеть сама справится с тусклым светом — не справляется", "with": "from torchvision import transforms\naug = transforms.ColorJitter(brightness=0.5, contrast=0.4)\n# + дообучение на реальных зимних кадрах под реальный диапазон света", "benefit": "Модель охватывает реальный диапазон условий эксплуатации."}}, {"q": "При обучении сегментационной модели для медицинских снимков IoU на тренировочных данных 0.95, но на новых пациентах — только 0.6. Какой вывод наиболее обоснован?", "options": ["IoU нельзя использовать для медицинских изображений", "Вероятно, переобучение (overfitting) на специфику обучающей выборки — нужны регуляризация, больше разнообразных данных или кросс-валидация по пациентам", "Нужно немедленно увеличить количество слоёв сети без изменения данных", "Модель работает отлично, разница IoU не имеет значения"], "correct": 1, "explain": "Большой разрыв между качеством на обучении и на новых данных — классический признак переобучения; решение обычно требует работы с данными и регуляризацией, а не просто усложнения модели.", "usage": {"code": false, "without": "Разрыв IoU 0.95 на трейне и 0.6 на новых пациентах трактуют как 'модель отличная' или лечат добавлением слоёв — и переобучение только усугубляется.", "with": "Разрыв опознают как overfitting и лечат работой с данными: больше разнообразных снимков, регуляризация, кросс-валидация по пациентам.", "benefit": "Обобщение на новых пациентов, а не запоминание трейна."}}, {"q": "Инженер тестирует модель классификации и обнаруживает, что она с высокой уверенностью (99%) неверно классифицирует изображение с добавленным незаметным шумом. Как называется это явление и в чём его причина?", "options": ["Это обычная ошибка модели без особого названия и причины", "Явление возникает только при использовании ReLU активации", "Adversarial example — направленное возмущение пикселей, использующее особенности границы решения модели в пространстве признаков", "Это означает, что все веса модели равны нулю"], "correct": 2, "explain": "Adversarial examples целенаправленно конструируются так, чтобы минимально изменить пиксели, но резко сместить выход модели за счёт особенностей многомерной границы решения.", "usage": {"code": false, "without": "Уверенную ошибку на зашумлённой картинке списывают на случайный сбой без причины и не понимают, как её воспроизвести или защититься.", "with": "Явление опознают как adversarial example: направленное возмущение пикселей эксплуатирует особенности границы решения в пространстве признаков.", "benefit": "Понимание причины и путь к защите модели."}}, {"q": "Команда сравнивает две модели детекции: одна имеет высокий recall, но низкий precision, другая — наоборот. Для задачи скрининга редкого заболевания на медицинских снимках какая метрика важнее и почему?", "options": ["Precision всегда важнее recall в любых задачах без исключений", "Высокий recall обычно важнее — лучше выявить больше потенциальных случаев ценой некоторого числа ложных срабатываний, чем пропустить реальное заболевание", "Recall и precision не имеют значения для медицинского скрининга", "Обе метрики абсолютно равнозначны в любых контекстах"], "correct": 1, "explain": "В скрининге заболеваний цена пропуска (ложноотрицательного результата) обычно выше цены ложной тревоги, поэтому высокий recall часто приоритетнее precision (хотя баланс зависит от контекста).", "usage": {"code": false, "without": "Гнаться за высоким precision в скрининге редкого заболевания — значит ради чистоты предсказаний пропускать реальные случаи (ложноотрицательные), а цена пропуска здесь высока.", "with": "Приоритет отдают recall: лучше выявить больше потенциальных случаев ценой части ложных тревог, чем упустить больного (баланс зависит от контекста).", "benefit": "Меньше пропущенных больных в скрининге."}}, {"q": "При развёртывании модели CV на мобильном устройстве обнаружена слишком высокая задержка (latency) из-за большого числа параметров. Какой подход наиболее уместен?", "options": ["Использовать более лёгкую архитектуру (например, MobileNet), квантование весов или дистилляцию модели для уменьшения размера и ускорения инференса", "Проблема решается только увеличением объёма обучающих данных", "Нужно отказаться от использования нейросетей на мобильных устройствах", "Единственное решение — использовать более мощное мобильное устройство"], "correct": 0, "explain": "Специализированные лёгкие архитектуры, квантование (снижение точности весов) и дистилляция знаний — стандартные техники для развёртывания CV-моделей в условиях ограниченных ресурсов.", "usage": {"code": true, "without": "import torch\n# гоним тяжёлую ResN50 на телефоне -> высокая задержка\nout = big_model(img)  # десятки млн параметров, тормозит", "with": "import torch\nm = torch.quantization.quantize_dynamic(model, dtype=torch.qint8)\n# + лёгкая архитектура (MobileNet) или дистилляция знаний", "benefit": "Быстрый инференс и малый размер на слабом устройстве."}}, {"q": "Модель детекции объектов показывает отличные результаты на статичных тестовых фото, но 'мигает' — то находит, то теряет объект на соседних кадрах видео. Какой подход поможет стабилизировать результат?", "options": ["Нужно обучать модель исключительно на одном кадре без учёта видео вообще", "Мигание предсказаний нельзя устранить техническими средствами", "Проблема решается только увеличением разрешения каждого отдельного кадра", "Добавить временную согласованность — трекинг объектов между кадрами или сглаживание предсказаний по времени, а не обрабатывать каждый кадр полностью независимо"], "correct": 3, "explain": "Покадровая независимая детекция игнорирует временную связность видео; трекинг или темпоральное сглаживание учитывают контекст соседних кадров, устраняя 'мигание'.", "usage": {"code": false, "without": "Обрабатывая каждый кадр видео полностью независимо, детектор игнорирует связь между соседними кадрами, поэтому объект 'мигает' — то находится, то теряется.", "with": "Добавляют временную согласованность: трекинг объектов между кадрами или сглаживание предсказаний по времени, используя контекст соседних кадров.", "benefit": "Стабильная детекция на видео без мигания."}}, {"q": "Специалист заметил, что модель сегментации отлично работает на изображениях высокого разрешения, использованных при обучении, но заметно хуже — на изображениях с камер низкого качества у конечных пользователей. Какой вывод и действие наиболее уместны?", "options": ["Разрешение изображения не может влиять на качество сегментации", "Проблема решается только увеличением числа слоёв модели", "Вероятно, есть сдвиг распределения (разрешение/шум/сжатие) между обучающими и реальными данными — нужно добавить в обучение примеры с реалистичным качеством или аугментацию, имитирующую сжатие/шум", "Нужно требовать от всех пользователей камеры высокого разрешения"], "correct": 2, "explain": "Несоответствие условий съёмки между обучением и продакшеном — классический источник деградации качества; аугментация, имитирующая реальные условия, помогает сократить этот разрыв.", "usage": {"code": false, "without": "Отличную работу на обучающих HD-снимках принимают за готовность к проду и не замечают, что у пользователей камеры дают шум, сжатие и низкое разрешение.", "with": "Опознают distribution shift по качеству и добавляют в обучение реалистичные примеры или аугментацию, имитирующую сжатие и шум дешёвых камер.", "benefit": "Сохранение качества на реальных камерах пользователей."}}, {"q": "При тестировании системы контроля качества на производстве обнаружено много ложных срабатываний (модель помечает годные детали как бракованные). Что стоит сделать в первую очередь, а не сразу менять архитектуру сети?", "options": ["Полностью отказаться от использования компьютерного зрения на этом производстве", "Ложные срабатывания всегда означают, что нужно уменьшить размер обучающей выборки", "Немедленно увеличить количество слоёв нейросети без анализа данных", "Проанализировать баланс классов и метрики precision/recall на реальных данных, а также проверить, не связаны ли ложные срабатывания с конкретными условиями (освещение, ракурс, новый тип детали)"], "correct": 3, "explain": "Диагностика перед изменением архитектуры — стандартный подход: часто проблема в данных (дисбаланс, условия съёмки), а не в самой модели, и её можно решить дешевле, чем переобучением с нуля.", "usage": {"code": false, "without": "Столкнувшись с потоком ложных срабатываний, сразу меняют архитектуру сети — дорого и часто мимо, ведь причина обычно в данных.", "with": "Сначала диагностируют: смотрят баланс классов и precision/recall на реальных данных, проверяют связь ложных срабатываний с освещением, ракурсом, новым типом детали.", "benefit": "Дешёвое устранение причины до переобучения с нуля."}}, {"q": "Команда планирует внедрить систему видеонаблюдения с распознаванием лиц в общественном месте. Помимо точности модели, что является критически важным нетехническим аспектом, который нужно учесть перед внедрением?", "options": ["Точность модели — единственный фактор, который стоит учитывать", "Этические вопросы не относятся к инженерным решениям по CV", "Правовые и этические аспекты — согласие на обработку биометрических данных, соответствие законодательству о персональных данных и риски предвзятости системы", "Только скорость обработки кадров в секунду имеет значение"], "correct": 2, "explain": "Системы распознавания лиц регулируются законами о персональных данных (например, GDPR) и поднимают серьёзные этические вопросы (согласие, слежка, предвзятость по демографическим группам), которые нельзя игнорировать при внедрении.", "usage": {"code": false, "without": "Оценивать систему распознавания лиц только по точности модели — значит проигнорировать согласие на биометрию, законы о персональных данных и риски предвзятости, что грозит правовыми и репутационными последствиями.", "with": "До внедрения учитывают правовые и этические аспекты: согласие на обработку биометрии, соответствие законодательству (например, GDPR) и аудит предвзятости по группам.", "benefit": "Законное и этичное внедрение без правовых рисков."}}, {"q": "Изображение имеет размер 256×256 пикселей с 3 цветовыми каналами (RGB). Сколько всего числовых значений (пикселей × каналов) в этом изображении?", "options": ["768", "65536", "196608", "256"], "correct": 2, "explain": "256×256×3 = 196608.", "usage": {"code": true, "without": "# считают в уме 256*256*3 и ошибаются, путая с 256 или 768", "with": "import numpy as np\nimg = np.zeros((256, 256, 3), np.uint8)\nprint(img.size)  # 256*256*3 = 196608 значений", "benefit": "Точный объём данных прямо из массива, без ошибок счёта."}}, {"q": "К изображению 32×32 применяется свёрточный фильтр 3×3 с шагом (stride) 1 без паддинга. Какой размер выходной карты признаков?", "options": ["30×30", "3×3", "29×29", "32×32"], "correct": 0, "explain": "Формула: (N-F)/S+1 = (32-3)/1+1 = 30. Итоговый размер: 30×30.", "usage": {"code": true, "without": "# гадают размер выхода свёртки на глаз", "with": "N, F, S = 32, 3, 1  # вход, ядро, шаг, без паддинга\nout = (N - F)//S + 1  # (32-3)/1 + 1 = 30 -> 30x30\nprint(out)", "benefit": "Формула (N-F)/S+1 даёт точный размер карты признаков."}}, {"q": "Применяется max pooling 2×2 с шагом 2 к карте признаков размером 8×8. Какой будет итоговый размер?", "options": ["4×4", "6×6", "8×8", "2×2"], "correct": 0, "explain": "При pooling 2×2 stride 2 размер уменьшается вдвое по каждой оси: 8/2=4, итог 4×4.", "usage": {"code": true, "without": "# думают, что pooling меняет размер как-то нелинейно", "with": "N, k, s = 8, 2, 2  # вход, окно, шаг\nout = (N - k)//s + 1  # (8-2)/2 + 1 = 4 -> 4x4\nprint(out)", "benefit": "Точный размер после pooling: 8x8 -> 4x4."}}, {"q": "Предсказанная рамка объекта и истинная рамка имеют площадь пересечения 40 и площадь объединения 100. Чему равен IoU?", "options": ["0.2", "4.0", "0.4", "0.6"], "correct": 2, "explain": "IoU = площадь пересечения / площадь объединения = 40/100 = 0.4.", "usage": {"code": true, "without": "# путают IoU с отношением пересечения к площади одной рамки", "with": "inter, union = 40, 100\niou = inter / union  # 40/100 = 0.4\nprint(iou)", "benefit": "IoU = пересечение / объединение = 0.4."}}, {"q": "Модель классификации на тестовом наборе из 200 изображений правильно определила 170. Какова точность (accuracy) модели?", "options": ["80%", "85%", "75%", "70%"], "correct": 1, "explain": "Accuracy = 170/200 = 0.85 = 85%.", "usage": {"code": true, "without": "# делят не на то число или считают долю ошибок", "with": "correct, total = 170, 200\nacc = correct / total  # 0.85 = 85%\nprint(acc)", "benefit": "Accuracy = верные/всего = 85%."}}, {"q": "Для задачи бинарной классификации: true positive=40, false positive=10, false negative=5. Чему равен precision?", "options": ["5/45 ≈ 0.11", "40/55 ≈ 0.73", "40/50 = 0.8", "40/45 ≈ 0.89"], "correct": 2, "explain": "Precision = TP/(TP+FP) = 40/(40+10) = 40/50 = 0.8.", "usage": {"code": true, "without": "# путают precision с recall, деля на TP+FN", "with": "TP, FP = 40, 10\nprecision = TP / (TP + FP)  # 40/50 = 0.8\nprint(precision)", "benefit": "Precision = TP/(TP+FP) = 0.8."}}, {"q": "Для того же примера (TP=40, FP=10, FN=5): чему равен recall?", "options": ["40/50 = 0.8", "40/45 ≈ 0.89", "40/55 ≈ 0.73", "5/45 ≈ 0.11"], "correct": 1, "explain": "Recall = TP/(TP+FN) = 40/(40+5) = 40/45 ≈ 0.89.", "usage": {"code": true, "without": "# путают recall с precision, деля на TP+FP", "with": "TP, FN = 40, 5\nrecall = TP / (TP + FN)  # 40/45 ≈ 0.89\nprint(recall)", "benefit": "Recall = TP/(TP+FN) ≈ 0.89."}}, {"q": "Свёрточная сеть уменьшает изображение 224×224 последовательно через 5 pooling-слоёв с фактором уменьшения 2 каждый. Какой итоговый пространственный размер?", "options": ["112×112", "28×28", "7×7", "14×14"], "correct": 2, "explain": "224 / 2^5 = 224/32 = 7. Итоговый размер: 7×7.", "usage": {"code": true, "without": "# вычитают '5*2' вместо деления на степень двойки", "with": "N = 224\nfor _ in range(5): N //= 2  # каждый pooling делит на 2\nprint(N)  # 224/32 = 7 -> 7x7", "benefit": "5 pooling'ов делят 224 на 2^5 = 7x7."}}, {"q": "Батч из 32 цветных изображений размером 64×64. Каков общий объём тензора входных данных (batch, height, width, channels)?", "options": ["32×3 = 96", "32×64×64×3 = 393216", "32×64×64 = 131072", "64×64×3 = 12288"], "correct": 1, "explain": "Общий объём = 32 (батч) × 64 × 64 × 3 (каналы) = 393216 значений.", "usage": {"code": true, "without": "# забывают батч или каналы в подсчёте объёма тензора", "with": "import numpy as np\nx = np.zeros((32, 64, 64, 3))  # batch,H,W,каналы\nprint(x.size)  # 32*64*64*3 = 393216", "benefit": "Полный объём входного тензора = 393216 значений."}}, {"q": "Свёрточный слой имеет 16 фильтров размером 3×3, применяемых к входу с 3 каналами (без учёта смещения/bias). Сколько всего обучаемых параметров в этом слое?", "options": ["432", "1440", "48", "144"], "correct": 0, "explain": "Число параметров = число фильтров × размер фильтра × число входных каналов = 16 × (3×3) × 3 = 16×9×3 = 432.", "usage": {"code": true, "without": "# считают только 3x3 фильтра, забывая входные каналы", "with": "filters, k, in_ch = 16, 3, 3\nparams = filters * (k*k) * in_ch  # 16*9*3 = 432 (без bias)\nprint(params)", "benefit": "Параметры свёртки = filters·k·k·in_ch = 432."}}, {"q": "К изображению применяется свёртка 5×5 с паддингом (padding) 2 и шагом 1 к входу размером 20×20. Какой размер выхода?", "options": ["18×18", "22×22", "16×16", "20×20"], "correct": 3, "explain": "Формула: (N+2P-F)/S+1 = (20+4-5)/1+1 = 19+1=20. При паддинге 2 и фильтре 5×5 размер сохраняется: 20×20 ('same' паддинг).", "usage": {"code": true, "without": "# ждут уменьшения размера, забыв про паддинг ('valid')", "with": "N, F, P, S = 20, 5, 2, 1\nout = (N + 2*P - F)//S + 1  # (20+4-5)/1 + 1 = 20 -> 'same'\nprint(out)", "benefit": "Паддинг 2 при ядре 5x5 сохраняет размер: 20x20."}}, {"q": "Датасет для детекции содержит 1000 изображений, из которых модель верно нашла объект (TP) на 850, пропустила (FN) 100, и ложно сработала (FP) на 50 изображениях без объекта. Чему равен F1-score (приблизительно)?", "options": ["≈0.92", "≈0.70", "≈0.85", "≈0.94"], "correct": 0, "explain": "Precision=850/(850+50)=0.944, Recall=850/(850+100)=0.895. F1=2·(P·R)/(P+R)=2·(0.944·0.895)/(0.944+0.895)≈0.919≈0.92.", "usage": {"code": true, "without": "# оценивают детектор одним числом (precision ИЛИ recall) — картина неполная", "with": "TP, FP, FN = 850, 50, 100\nP = TP/(TP+FP); R = TP/(TP+FN)\nf1 = 2*P*R/(P+R)  # ≈ 0.92\nprint(round(f1, 2))", "benefit": "F1 объединяет precision и recall в одну оценку ≈ 0.92."}}];
  const STORAGE_KEY = "learntest_" + TEST_ID;
  const BLOCK_NAMES = [
    "Теоретический фундамент",
    "Углублённая теория",
    "Анализ и проектирование",
    "Синтез и кейсы",
    "Практика и расчёты"
  ];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { current: 0, answers: {} };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const quizArea = document.getElementById("quizArea");
  const resultArea = document.getElementById("resultArea");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const blockLabel = document.getElementById("blockLabel");

  function blockOf(idx) { return Math.floor(idx / 10); }

  function render() {
    if (state.current >= QUESTIONS.length) {
      renderResult();
      return;
    }
    resultArea.style.display = "none";
    quizArea.style.display = "block";

    const idx = state.current;
    const q = QUESTIONS[idx];
    const answered = state.answers[idx];

    progressFill.style.width = Math.round((idx / QUESTIONS.length) * 100) + "%";
    progressText.textContent = (idx + 1) + " / " + QUESTIONS.length;
    blockLabel.textContent = "Блок " + (blockOf(idx) + 1) + ": " + BLOCK_NAMES[blockOf(idx)];

    let html = '<div class="card">';
    html += '<div class="question">' + escapeHtml(q.q) + '</div>';
    html += '<div class="qsearch"><a class="iconbtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=' + encodeURIComponent(q.q) + '">🔍 Найти в Google</a></div>';
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      let cls = "opt";
      if (answered) {
        cls += " disabled";
        if (i === q.correct) cls += " correct";
        else if (i === answered.selected) cls += " wrong";
        else cls += " dim";
      }
      html += '<button class="' + cls + '" data-i="' + i + '">' + escapeHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="explain' + (answered ? ' show' : '') + '" id="explainBox">' + escapeHtml(q.explain || "") + '</div>';
    if (q.usage) {
      const u = q.usage;
      const wrap = (s) => u.code ? ('<pre>' + escapeHtml(s || "") + '</pre>') : ('<div class="u-text">' + escapeHtml(s || "") + '</div>');
      html += '<div class="usage' + (answered ? ' show' : '') + '">';
      html += '<div class="u-part u-without"><div class="u-label">Без этого</div>' + wrap(u.without) + '</div>';
      html += '<div class="u-part u-with"><div class="u-label">С этим</div>' + wrap(u.with) + '</div>';
      if (u.benefit) html += '<div class="u-benefit">✅ Выгода: ' + escapeHtml(u.benefit) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="nav">';
    html += '<button class="btn secondary" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>Назад</button>';
    html += '<button class="btn" id="nextBtn"' + (answered ? '' : ' disabled') + '>' + (idx === QUESTIONS.length - 1 ? 'Завершить' : 'Далее') + '</button>';
    html += '</div>';

    quizArea.innerHTML = html;

    quizArea.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        if (state.answers[idx]) return;
        const sel = parseInt(btn.dataset.i, 10);
        state.answers[idx] = { selected: sel, correct: sel === q.correct };
        saveState();
        render();
      });
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      state.current = Math.max(0, idx - 1);
      saveState();
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      state.current = idx + 1;
      saveState();
      render();
    });
  }

  function renderResult() {
    quizArea.style.display = "none";
    resultArea.style.display = "block";
    progressFill.style.width = "100%";
    progressText.textContent = QUESTIONS.length + " / " + QUESTIONS.length;
    blockLabel.textContent = "Тест завершён";

    let correct = 0;
    const blockStats = [0, 0, 0, 0, 0];
    const blockTotals = [0, 0, 0, 0, 0];
    QUESTIONS.forEach((q, i) => {
      const b = blockOf(i);
      blockTotals[b]++;
      if (state.answers[i] && state.answers[i].correct) {
        correct++;
        blockStats[b]++;
      }
    });

    let html = '<div class="card result">';
    html += '<div class="score">' + correct + ' / ' + QUESTIONS.length + '</div>';
    html += '<div style="color:var(--muted); margin-top:6px;">правильных ответов</div>';
    html += '<div class="blockscores">';
    BLOCK_NAMES.forEach((name, i) => {
      html += '<div class="row"><span>' + (i + 1) + '. ' + name + '</span><span>' + blockStats[i] + ' / ' + blockTotals[i] + '</span></div>';
    });
    html += '</div></div>';
    html += '<div class="nav"><button class="btn" id="reviewBtn">Пересмотреть ответы</button></div>';
    resultArea.innerHTML = html;

    document.getElementById("reviewBtn").addEventListener("click", () => {
      state.current = 0;
      render();
    });
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : s;
    return div.innerHTML;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Сбросить весь прогресс этого теста?")) {
      state = { current: 0, answers: {} };
      saveState();
      render();
    }
  });

  render();

  // ---- Синхронизация всех тестов (Google Drive), общий модуль sync.js ----
  const toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  const syncModal = document.getElementById("syncModal");
  const syncStatus = document.getElementById("syncStatus");
  const uploadBtn = document.getElementById("syncUploadBtn");
  const downloadBtn = document.getElementById("syncDownloadBtn");

  function setBusy(busy) { uploadBtn.disabled = busy; downloadBtn.disabled = busy; }

  document.getElementById("syncBtn").addEventListener("click", () => {
    if (!window.LTSync || !LTSync.configured()) {
      toast("Синхронизация не настроена: укажите GOOGLE_CLIENT_ID в config.js");
      return;
    }
    syncStatus.textContent = LTSync.hasToken()
      ? "Google уже подключён — вход не потребуется."
      : "Один вход — синхронизируются сразу все тесты.";
    syncModal.classList.add("show");
  });
  document.getElementById("syncCloseBtn").addEventListener("click", () => syncModal.classList.remove("show"));

  uploadBtn.addEventListener("click", () => {
    setBusy(true);
    syncStatus.textContent = "Отправка…";
    LTSync.uploadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Отправка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        toast(failed ? ("Отправлено " + ok + ", ошибок: " + failed) : ("Отправлено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!confirm("Заменить локальный прогресс всех тестов данными из Drive?")) return;
    setBusy(true);
    syncStatus.textContent = "Загрузка…";
    LTSync.downloadAll({
      onProgress: (d, t) => { syncStatus.textContent = "Загрузка… " + d + "/" + t; },
      onDone: (ok, failed) => {
        setBusy(false);
        state = loadState();
        render();
        toast(failed ? ("Загружено " + ok + ", ошибок: " + failed) : ("Загружено тестов: " + ok));
        syncModal.classList.remove("show");
      },
      onError: (msg) => { setBusy(false); toast(msg); syncStatus.textContent = msg; }
    });
  });
})();
</script>
</body>
</html>
